/* ════════════════════════════════════════
   LOCAL STORAGE — settings + progress + scores
════════════════════════════════════════ */
const LS_SET='mutuni_s', LS_PROG='mutuni_p', LS_SCORES='mutuni_scores';
const DEFAULT_SETTINGS = {lang:'fr', fontSize:'md', theme:'dark', provider:'hf', hfToken:''};
function loadSettings(){
  try{ const s=JSON.parse(localStorage.getItem(LS_SET)); return s?{...DEFAULT_SETTINGS,...s}:DEFAULT_SETTINGS; }
  catch(e){ return DEFAULT_SETTINGS; }
}
function saveSettings(s){ try{localStorage.setItem(LS_SET,JSON.stringify(s));}catch(e){} }
function loadProgress(){
  try{
    const raw=JSON.parse(localStorage.getItem(LS_PROG));
    if(!raw)return {};
    const p={};
    for(const[k,v]of Object.entries(raw)) p[k]=new Set(v);
    return p;
  }catch(e){return {};}
}
function saveProgress(p){
  try{
    const obj={};
    for(const[k,v]of Object.entries(p)) obj[k]=[...v];
    localStorage.setItem(LS_PROG,JSON.stringify(obj));
  }catch(e){}
}

function loadScores() {
  try {
    const data = JSON.parse(localStorage.getItem(LS_SCORES));
    return data || {};
  } catch { return {}; }
}
function saveScores(scores) {
  try { localStorage.setItem(LS_SCORES, JSON.stringify(scores)); } catch(e) {}
}
function addScore(matnId, baytIdx, score) {
  const key = `${matnId}-${baytIdx}`;
  const all = loadScores();
  if (!all[key]) all[key] = [];
  all[key].push(score);
  if (all[key].length > 10) all[key].shift();
  saveScores(all);
}
function getAvgScore(matnId, baytIdx) {
  const key = `${matnId}-${baytIdx}`;
  const all = loadScores();
  if (!all[key] || all[key].length === 0) return null;
  const sum = all[key].reduce((a,b) => a+b, 0);
  return sum / all[key].length;
}
function getMatnIdFromBabId(babId, matnDb) {
  for (const [matnId, db] of Object.entries(matnDb)) {
    if (db.abwab.some(b => b.id === babId)) return matnId;
    if (db.allMatn && db.allMatn.id === babId) return matnId;
  }
  return null;
}

/* ════════════ UTILS ════════════ */
const norm = (t="") =>
  t.replace(/[\u064B-\u065F\u0670\u0640]/g,"")
   .replace(/[أإآٱ]/g,"ا").replace(/ة/g,"ه").replace(/ى/g,"ي")
   .replace(/\s+/g," ").trim();
const hasMicSupport = () => !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder);
const AR=["٠","١","٢","٣","٤","٥","٦","٧","٨","٩"];
const arNum = n => String(n).replace(/\d/g,d=>AR[d]);

function levenshtein(a,b){
  const m=a.length,n=b.length;
  if(m===0) return n; if(n===0) return m;
  const dp=new Array(n+1);
  for(let j=0;j<=n;j++) dp[j]=j;
  for(let i=1;i<=m;i++){
    let prev=dp[0]; dp[0]=i;
    for(let j=1;j<=n;j++){
      const tmp=dp[j];
      dp[j]=Math.min(dp[j]+1, dp[j-1]+1, prev+(a[i-1]===b[j-1]?0:1));
      prev=tmp;
    }
  }
  return dp[n];
}
const MATCH_TOLERANCE = 0.34;
function tryAdvance(ptr, wsNorm, recognizedText){
  const rFlatFull = norm(recognizedText).replace(/\s+/g,"");
  if(!rFlatFull) return ptr;
  let bestPtr = ptr;
  const maxOffset = Math.min(6, rFlatFull.length-1);
  for(let off=0; off<=maxOffset; off++){
    const rFlat = rFlatFull.slice(off);
    if(!rFlat) break;
    let acc = "";
    const maxLook = Math.min(wsNorm.length, ptr + 14);
    for(let i=ptr; i<maxLook; i++){
      acc += wsNorm[i];
      if(acc.length > rFlat.length + 8) break;
      if(rFlat.length < acc.length) break;
      const candidate = rFlat.slice(0, acc.length);
      const dist = levenshtein(acc, candidate);
      const tol = Math.max(1, Math.ceil(acc.length*MATCH_TOLERANCE));
      if(dist<=tol && i+1>bestPtr) bestPtr = i+1;
    }
  }
  return bestPtr;
}

/* ════════════ RECONNAISSANCE VOCALE — Provider Groq ou Hugging Face ════════════ */
const BUFFER_TICK_MS = 1200;
const RATE_LIMIT_MAX = 18;
const RATE_LIMIT_WINDOW_MS = 60000;
const EPISODE_MAX_MS = 12000;
const EPISODE_HARD_MAX_MS = 25000;
const MIN_BLOB_BYTES = 900;

function pickMimeType(){
  const candidates=["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/ogg;codecs=opus","audio/ogg"];
  for(const c of candidates){ if(window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(c)) return c; }
  return "";
}
function blobToBase64(blob){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onloadend=()=>resolve(String(r.result).split(",")[1]||"");
    r.onerror=reject;
    r.readAsDataURL(blob);
  });
}

async function transcribeHF(b64, mimeType, prompt, token) {
  const MODEL = "yousifgamalo/quran-s-finetuned";
  const url = `https://api-inference.huggingface.co/models/${MODEL}`;
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i=0; i<binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const blob = new Blob([bytes], {type: mimeType || "audio/webm"});
  const response = await fetch(url, {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${token}`,
      "Content-Type": "application/octet-stream",
    },
    body: blob,
  });
  if (!response.ok) {
    const errText = await response.text();
    throw new Error(`HF API error ${response.status}: ${errText}`);
  }
  const data = await response.json();
  return data.text || "";
}

async function transcribeGroq(b64, mimeType, prompt) {
  const res = await fetch("/.netlify/functions/transcribe", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({audio: b64, mimeType, prompt})
  });
  if (!res.ok) {
    const errData = await res.json().catch(()=>({}));
    throw new Error(errData.error || `Groq error ${res.status}`);
  }
  const data = await res.json();
  return data.text || "";
}

function useAsrRecording(onTranscript, tFn, expectedText = "", provider = "hf", hfToken = ""){
  const [listening,setListening]=useState(false);
  const [processing,setProcessing]=useState(0);
  const [srError,setSrError]=useState(null);
  const streamRef=useRef(null);
  const recRef=useRef(null), dataRef=useRef([]), mimeRef=useRef("");
  const listeningRef=useRef(false);
  const episodeStartRef=useRef(0);
  const sendTimestampsRef=useRef([]);
  const sendingRef=useRef(false);
  const onTranscriptRef=useRef(onTranscript);
  onTranscriptRef.current=onTranscript;
  const expectedTextRef=useRef(expectedText);
  expectedTextRef.current=expectedText;
  const providerRef=useRef(provider);
  providerRef.current=provider;
  const hfTokenRef=useRef(hfToken);
  hfTokenRef.current=hfToken;

  const canSendNow=()=>{
    const now=Date.now();
    sendTimestampsRef.current=sendTimestampsRef.current.filter(t=>now-t<RATE_LIMIT_WINDOW_MS);
    return sendTimestampsRef.current.length<RATE_LIMIT_MAX;
  };

  const cleanup=()=>{
    listeningRef.current=false;
    if(recRef.current){ try{recRef.current.ondataavailable=null;recRef.current.onstop=null;if(recRef.current.state!=="inactive")recRef.current.stop();}catch(e){} recRef.current=null; }
    if(streamRef.current){ streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current=null; }
    setListening(false);
  };

  useEffect(()=>()=>cleanup(),[]);

  const sendWithRetry=async(blob, attempt)=>{
    try{
      const b64=await blobToBase64(blob);
      let text = "";
      const promptText = expectedTextRef.current || 
        "متون التجويد بالعربية الفصحى: تحفة الأطفال، الجزرية، البيقونية. نصوص شعرية بالحروف العربية مع التشكيل. كلمات مثل: الإظهار، الإدغام، الإقلاب، الإخفاء، المد، القصر، اللين، الغنة، التفخيم، الترقيق، الراءات، اللامات، الوقف، الابتداء، النون الساكنة، التنوين، الميم الساكنة، الإمالة، الفتح، الكسر، الضم، السكون، الشدة، الصلة، التكبير، التهليل، الصلاة على النبي";
      
      if (providerRef.current === "groq") {
        text = await transcribeGroq(b64, mimeRef.current, promptText);
      } else {
        if (!hfTokenRef.current) {
          throw new Error(tFn("tokenMissing"));
        }
        text = await transcribeHF(b64, mimeRef.current, promptText, hfTokenRef.current);
      }
      setSrError(null);
      if (text) onTranscriptRef.current(text);
    }catch(err){
      if(attempt<2){
        await new Promise(r=>setTimeout(r,900));
        return sendWithRetry(blob, attempt+1);
      }
      setSrError(tFn("errApi")+" "+(err.message || String(err)));
    }
  };

  const sendSnapshot=async(forceRestart)=>{
    if(sendingRef.current) return;
    if(dataRef.current.length===0) return;
    if(!canSendNow()) return;
    const blob=new Blob(dataRef.current,{type:mimeRef.current||"audio/webm"});
    if(blob.size<MIN_BLOB_BYTES) return;
    sendingRef.current=true;
    sendTimestampsRef.current.push(Date.now());
    setProcessing(p=>p+1);
    await sendWithRetry(blob,0);
    setProcessing(p=>Math.max(0,p-1));
    sendingRef.current=false;
    if(forceRestart && listeningRef.current) restartEpisode();
  };

  const restartEpisode=()=>{
    if(!streamRef.current || !listeningRef.current) return;
    if(recRef.current){ try{recRef.current.ondataavailable=null;recRef.current.onstop=null;if(recRef.current.state!=="inactive")recRef.current.stop();}catch(e){} }
    dataRef.current=[];
    const mr=new MediaRecorder(streamRef.current, mimeRef.current?{mimeType:mimeRef.current}:undefined);
    mr.ondataavailable=(e)=>{
      if(e.data && e.data.size>0) dataRef.current.push(e.data);
      if(!listeningRef.current) return;
      const age=Date.now()-episodeStartRef.current;
      if(age>=EPISODE_HARD_MAX_MS && !sendingRef.current){ restartEpisode(); return; }
      sendSnapshot(age>=EPISODE_MAX_MS);
    };
    recRef.current=mr;
    episodeStartRef.current=Date.now();
    mr.start(BUFFER_TICK_MS);
  };

  const startFn=async()=>{
    setSrError(null);
    if(!hasMicSupport()){ setSrError(tFn("errChrome")); return; }
    if(location.protocol!=="https:"&&location.hostname!=="localhost"&&location.hostname!=="127.0.0.1"){ setSrError(tFn("errHttps")); return; }
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});
      streamRef.current=stream;
      mimeRef.current=pickMimeType();
      listeningRef.current=true; setListening(true);
      restartEpisode();
    }catch(err){
      if(err && (err.name==="NotAllowedError"||err.name==="PermissionDeniedError")) setSrError(tFn("errMic"));
      else setSrError(tFn("errStart")(err && err.message?err.message:String(err)));
      cleanup();
    }
  };

  const stopFn=()=>cleanup();
  const toggle=()=>{ if(listening) stopFn(); else startFn(); };

  return {listening, processing:processing>0, srError, toggle, stopFn};
}

/* ════════════ WORD ════════════ */
const Word = ({text,revealed,confidence}) => {
  const len=text.replace(/[\u064B-\u065F\u0670\u0640]/g,"").length;
  let color = "var(--wrd-col)";
  if (revealed && confidence !== undefined) {
    if (confidence >= 0.85) color = "#4ade80";
    else if (confidence >= 0.65) color = "#fbbf24";
    else color = "#f87171";
  }
  return revealed
    ? <span style={{fontFamily:"'Scheherazade New',serif",fontSize:"var(--az)",lineHeight:1.9,color,transition:"color .3s",margin:"0 3px",display:"inline-block",animation:"wrd .35s ease",direction:"rtl"}}>{text}</span>
    : <span style={{display:"inline-block",height:26,minWidth:Math.max(16,len*10),background:"var(--wrd-bg)",borderRadius:4,margin:"0 3px",verticalAlign:"middle"}}/>;
};

/* ════════════ CHAPTERS ════════════ */
function Chapters({matnId,onBack,onSelect,onSelectAll,onFocus,progress,tFn}){
  const db=MATN_DB[matnId]||MATN_DB.tuhfa;
  const activeAbwab=db.abwab;
  const activeTotal=db.total;
  const done=activeAbwab.reduce((s,b)=>s+(progress[b.id]?.size??0),0);
  const allDone=activeAbwab.every(b=>(progress[b.id]?.size??0)===b.bayts.length);
  const hasWeak = (() => {
    const scores = loadScores();
    let weakCount = 0;
    let idx = 0;
    for (const bab of activeAbwab) {
      for (let i = 0; i < bab.bayts.length; i++) {
        const key = `${matnId}-${idx}`;
        const sc = scores[key];
        if (sc) {
          const avg = sc.reduce((a,b) => a + b, 0) / sc.length;
          if (avg < 0.6) weakCount++;
        }
        idx++;
      }
    }
    return weakCount > 0;
  })();

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 16px 12px",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
        <button onClick={onBack} style={BS}>←</button>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Scheherazade New',serif",fontSize:20,color:"#d4a843",direction:"rtl"}}>{db.label}</div>
          <div style={{fontSize:11,color:"var(--sub)"}}>{tFn("baytsComp2",done,activeTotal)}</div>
        </div>
      </div>
      <div style={{padding:"10px 16px 4px"}}>
        <div style={{background:"rgba(0,0,0,0.3)",borderRadius:99,height:5,overflow:"hidden"}}>
          <div style={{background:"linear-gradient(90deg,#c9943e,#d4a843)",height:"100%",width:`${done/activeTotal*100}%`,borderRadius:99,transition:"width .6s"}}/>
        </div>
      </div>
      {hasWeak && (
        <div onClick={onFocus} style={{
          background:"linear-gradient(140deg,#2c1a0a,#5c3315)",
          borderRadius:14,padding:"14px 16px",margin:"8px 16px 0",
          border:"1px solid rgba(212,168,67,0.25)",cursor:"pointer",
          display:"flex",alignItems:"center",gap:12
        }}>
          <span style={{fontSize:20}}>🎯</span>
          <span style={{flex:1,fontSize:13,color:"#d4a843",fontWeight:600}}>{tFn("focusBtn")}</span>
          <span style={{fontSize:18,color:"rgba(212,168,67,0.4)"}}>›</span>
        </div>
      )}
      <div onClick={onSelectAll} style={{
        background:`linear-gradient(140deg,#0a1a0a,${allDone?"#2a5c1a":"#175c2e"})`,
        margin:"8px 16px 0",borderRadius:18,padding:"16px",cursor:"pointer",minHeight:72,
        border:allDone?"2px solid rgba(212,168,67,0.7)":"2px solid rgba(212,168,67,0.35)",
        display:"flex",alignItems:"center",gap:14,
        boxShadow:"0 6px 24px rgba(0,0,0,0.5)",
      }}>
        <div style={{width:48,height:48,borderRadius:14,background:"rgba(212,168,67,0.18)",border:"1px solid rgba(212,168,67,0.4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>
          {allDone?"🏆":"▶"}
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:15,fontWeight:700,color:"#d4a843",marginBottom:2}}>{tFn("reciteAll")}</div>
          <div style={{fontFamily:"'Scheherazade New',serif",fontSize:14,color:"rgba(212,168,67,0.75)",direction:"rtl",marginBottom:3}}>{db.label}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.45)"}}>{activeTotal} bayts · {activeAbwab.length} chapitres</div>
        </div>
        <div style={{color:"rgba(212,168,67,0.6)",fontSize:24}}>›</div>
      </div>
      <div style={{padding:"4px 16px 80px"}}>
        <div style={{fontSize:11,color:"var(--sub)",textTransform:"uppercase",letterSpacing:1,margin:"14px 0 10px"}}>{tFn("orChoose")}</div>
        {activeAbwab.map((bab,i)=>{
          const bd=(progress[bab.id]?.size??0),bt=bab.bayts.length,ok=bd===bt;
          let chapAvg = null;
          const scores = loadScores();
          let totalScore = 0, count = 0;
          let startIdx = 0;
          for (const b of activeAbwab) {
            if (b.id === bab.id) break;
            startIdx += b.bayts.length;
          }
          for (let i2 = 0; i2 < bab.bayts.length; i2++) {
            const key = `${matnId}-${startIdx + i2}`;
            const sc = scores[key];
            if (sc) {
              const avg = sc.reduce((a,b) => a + b, 0) / sc.length;
              totalScore += avg;
              count++;
            }
          }
          if (count > 0) chapAvg = totalScore / count;
          const color = chapAvg !== null ? (chapAvg >= 0.7 ? '#4ade80' : chapAvg >= 0.5 ? '#fbbf24' : '#f87171') : 'rgba(255,255,255,0.2)';
          return(
            <div key={bab.id} onClick={()=>onSelect(bab)} style={{background:`linear-gradient(140deg,${bab.clr[0]} 0%,${bab.clr[1]} 100%)`,borderRadius:16,padding:"16px",marginBottom:10,cursor:"pointer",border:ok?"1.5px solid rgba(212,168,67,0.45)":"1px solid rgba(255,255,255,0.07)",display:"flex",alignItems:"center",gap:13}}>

              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{fontFamily:"'Scheherazade New',serif",fontSize:16,direction:"rtl",color:"#f5f0e8",marginBottom:1}}>{bab.title}</div>
                  {chapAvg !== null && (
                    <span style={{fontSize:10,color,background:"rgba(0,0,0,0.3)",borderRadius:99,padding:"1px 8px",fontWeight:600}}>
                      {Math.round(chapAvg*100)}%
                    </span>
                  )}
                </div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>{bab.sub}</div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginTop:7}}>
                  <div style={{flex:1,background:"rgba(0,0,0,0.3)",borderRadius:99,height:4,overflow:"hidden"}}><div style={{background:ok?"#d4a843":"rgba(255,255,255,0.3)",height:"100%",width:`${bd/bt*100}%`,borderRadius:99}}/></div>
                  <span style={{fontSize:11,color:"rgba(255,255,255,0.35)",flexShrink:0}}>{bd}/{bt}</span>
                </div>
              </div>
              <div style={{color:"rgba(255,255,255,0.22)",fontSize:22}}>›</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

  const [bi,setBi]=useState(0);
  const [mask,setMask]=useState([]);
  const [done,setDone]=useState(false);
  const ptrRef=useRef(0),maskRef=useRef([]),procRef=useRef(null);
  const [score,setScore]=useState(null);
  const baytText=bab.bayts[bi]||"";
  const words=baytText.replace(/#/g," ").split(/\s+/).filter(Boolean);
  const parts=baytText.split("#").map(p=>p.trim().split(/\s+/).filter(Boolean));

  procRef.current=(text)=>{
    const ws=(bab.bayts[bi]||"").replace(/#/g," ").split(/\s+/).filter(Boolean);
    const wsNorm=ws.map(norm);
    const newPtr=tryAdvance(ptrRef.current, wsNorm, text);
    if(newPtr>ptrRef.current){
      for(let i=ptrRef.current;i<newPtr;i++) maskRef.current[i]=true;
      ptrRef.current=newPtr;
      setMask([...maskRef.current]);
      if(newPtr>=ws.length){
        setDone(true);
        const matchRatio = ws.length > 0 ? maskRef.current.filter(Boolean).length / ws.length : 0;
        setScore(matchRatio);
        onProgress(bab.id,bi);
        if (matnId) addScore(matnId, bi, matchRatio);
        stopFn();
      }
    }
  };

  const {listening,processing,srError,toggle,stopFn}=useAsrRecording(
    (text)=>procRef.current(text),
    tFn,
    baytText,
    sett.provider,
    sett.hfToken
  );

  useEffect(()=>{
    const w=(bab.bayts[bi]||"").replace(/#/g," ").split(/\s+/).filter(Boolean);
    ptrRef.current=0;maskRef.current=new Array(w.length).fill(false);
    setMask(new Array(w.length).fill(false));setDone(false);setScore(null);
  },[bi,bab.id]);

  const revealOne=()=>{
    const ws=(bab.bayts[bi]||"").replace(/#/g," ").split(/\s+/).filter(Boolean);
    const ptr=ptrRef.current;
    if(ptr<ws.length){
      maskRef.current[ptr]=true;
      ptrRef.current=ptr+1;
      setMask([...maskRef.current]);
      if(ptr+1>=ws.length){
        setDone(true);
        const matchRatio = ws.length > 0 ? maskRef.current.filter(Boolean).length / ws.length : 0;
        setScore(matchRatio);
        onProgress(bab.id,bi);
        if (matnId) addScore(matnId, bi, matchRatio);
      }
    }
  };
  const reset=()=>{stopFn();ptrRef.current=0;maskRef.current=new Array(words.length).fill(false);setMask(new Array(words.length).fill(false));setDone(false);setScore(null);};
  const prev=()=>{stopFn();setBi(x=>Math.max(0,x-1));};
  const next=()=>{stopFn();setBi(x=>Math.min(bab.bayts.length-1,x+1));};
  const revealed=mask.filter(Boolean).length;
  const alreadyDone=progress[bab.id]?.has(bi)??false;

  let gi=0;
  const baytEl=parts.map((pw,pi)=>{
    const els=pw.map((w,wi)=>{
      const idx=gi++;
      const conf = score !== null ? Math.min(1, score + (wi / pw.length) * 0.2) : undefined;
      return <Word key={idx} text={w} revealed={showAll||mask[idx]} confidence={conf}/>;
    });
    return(<div key={pi}><div style={{direction:"rtl",textAlign:"center",lineHeight:2,flexWrap:"wrap",display:"flex",justifyContent:"center"}}>{els}</div>{pi<parts.length-1&&<div style={{textAlign:"center",color:"rgba(212,168,67,0.35)",fontSize:13,margin:"1px 0"}}>◆</div>}</div>);
  });

  return(
    <React.Fragment>
      <div style={{flex:1,padding:"16px 16px 14px",display:"flex",flexDirection:"column",alignItems:"center"}}>
        <div style={{width:"100%",maxWidth:500,marginBottom:14}}>
          <div style={{background:"rgba(255,255,255,0.08)",borderRadius:99,height:5,overflow:"hidden"}}>
            <div style={{background:bab.clr[1],filter:"brightness(1.7)",height:"100%",width:`${revealed/Math.max(words.length,1)*100}%`,borderRadius:99,transition:"width .3s"}}/>
          </div>
          <div style={{textAlign:"center",fontSize:11,color:"var(--sub)",marginTop:3}}>{tFn("words",revealed,words.length)}</div>
        </div>
        <div style={{background:"rgba(212,168,67,0.1)",border:"1px solid rgba(212,168,67,0.2)",borderRadius:99,padding:"4px 14px",fontSize:13,color:"#d4a843",fontFamily:"'Scheherazade New',serif",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
          <span>البَيْتُ {arNum(bi+1)}</span>
          {alreadyDone && <span style={{color:"#4ade80"}}>✓</span>}
          {score !== null && <span style={{fontSize:11,color:score>=0.7?'#4ade80':score>=0.5?'#fbbf24':'#f87171'}}>({Math.round(score*100)}%)</span>}
        </div>
        <div style={{background:done?"rgba(180,255,210,0.04)":"rgba(255,255,255,0.04)",borderRadius:22,padding:"24px 18px",width:"100%",maxWidth:500,border:`1px solid ${done?"rgba(180,255,210,0.18)":"rgba(255,255,255,0.07)"}`,transition:"all .5s"}}>{baytEl}</div>
        {done&&(
          <div style={{marginTop:14,background:"rgba(180,255,210,0.07)",border:"1px solid rgba(180,255,210,0.18)",borderRadius:16,padding:"14px 20px",textAlign:"center",width:"100%",maxWidth:500}}>
            <div style={{fontSize:24,marginBottom:2}}>{bi===bab.bayts.length-1?"🏆":"🌟"}</div>
            <div style={{fontFamily:"'Scheherazade New',serif",fontSize:20,color:"#b8f5cc"}}>{bi===bab.bayts.length-1?tFn("babDone"):tFn("ahsant")}</div>
          </div>
        )}
        {listening&&(
          <div style={{marginTop:10,display:"flex",alignItems:"center",gap:8,fontSize:12,color:"#7ab89a"}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:processing?"#d4a843":"#e74c3c",display:"inline-block",animation:"pulse 1.2s ease infinite"}}/>
            {processing?tFn("processingTxt"):tFn("listening")}
          </div>
        )}
        {srError&&(
          <div style={{marginTop:10,background:"rgba(231,76,60,0.09)",border:"1px solid rgba(231,76,60,0.25)",borderRadius:12,padding:"10px 14px",fontSize:12,color:"#ffaaaa",textAlign:"center",maxWidth:500,lineHeight:1.6}}>⚠️ {srError}</div>
        )}
      </div>
      <div style={{padding:"0 14px 32px"}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:16}}>
          {mode==="voice"?(
            <button onClick={toggle} style={{width:76,height:76,borderRadius:"50%",border:"none",cursor:"pointer",fontSize:28,background:listening?"linear-gradient(135deg,#8b1a1a,#c0392b)":done?"rgba(180,255,210,0.1)":`linear-gradient(135deg,${bab.clr[0]},${bab.clr[1]})`,boxShadow:listening?"0 0 0 10px rgba(192,57,43,0.12),0 8px 24px rgba(0,0,0,0.5)":"0 8px 28px rgba(0,0,0,0.5)",transition:"all .3s",filter:"brightness(1.2)"}}>
              {listening?"⏸":done?"✓":"🎤"}
            </button>
          ):(
            <button onClick={done?undefined:revealOne} style={{width:76,height:76,borderRadius:"50%",border:"none",cursor:done?"default":"pointer",fontSize:26,background:done?"rgba(180,255,210,0.1)":`linear-gradient(135deg,${bab.clr[0]},${bab.clr[1]})`,boxShadow:"0 8px 28px rgba(0,0,0,0.5)",filter:"brightness(1.2)"}}>
              {done?"✓":"👆"}
            </button>
          )}
        </div>
        <div style={{display:"flex",gap:10}}>
          {[{l:"⌂",fn:onBack,dis:false,fl:.5},{l:tFn("prev"),fn:prev,dis:bi===0},{l:tFn("rst"),fn:reset,dis:false,fl:.5},{l:tFn("next"),fn:next,dis:bi===bab.bayts.length-1}].map((b,i)=>(
            <button key={i} onClick={b.fn} disabled={b.dis} style={{flex:b.fl??1,padding:"13px 8px",borderRadius:13,border:"1px solid rgba(255,255,255,0.07)",background:"rgba(255,255,255,0.05)",color:b.dis?"rgba(255,255,255,0.18)":"rgba(255,255,255,0.72)",fontSize:i===1?17:13,cursor:b.dis?"not-allowed":"pointer"}}>{b.l}</button>
          ))}
        </div>
      </div>
    </React.Fragment>
  );
}

/* ════════════ CONTINUOUS FLOW ════════════ */
function ContinuousFlow({bab,isAll,mode,setMode,onProgress,showAll,setShowAll,tFn,onBack,matnId,sett}){
  const flat=useMemo(()=>{
    const arr=[];
    bab.bayts.forEach((baytText,bIdx)=>{
      const parts=baytText.split("#").map(p=>p.trim().split(/\s+/).filter(Boolean));
      parts.forEach((pw,pIdx)=>{
        pw.forEach((w,wIdx)=>{
          arr.push({bIdx,word:w,lastOfBayt:pIdx===parts.length-1&&wIdx===pw.length-1});
        });
      });
    });
    return arr;
  },[bab.id]);

  const baytStart=useMemo(()=>{
    const s=[];let acc=0;
    bab.bayts.forEach(bt=>{s.push(acc);acc+=bt.replace(/#/g," ").split(/\s+/).filter(Boolean).length;});
    return s;
  },[bab.id]);

  const [mask,setMask]=useState(()=>new Array(flat.length).fill(false));
  const ptrRef=useRef(0),maskRef=useRef(new Array(flat.length).fill(false));
  const procRef=useRef(null);
  const baytRefs=useRef({});
  const [baytScores,setBaytScores]=useState({});

  const markBaytDone=(bIdx, matchRatio)=>{
    if(isAll){
      const c=chapterOfMatn(bIdx,bab.chapMap);
      if(c) onProgress(c.id,bIdx-c.start);
    } else {
      onProgress(bab.id,bIdx);
    }
    if (matnId !== undefined) {
      addScore(matnId, bIdx, matchRatio);
    }
    setBaytScores(prev => ({...prev, [bIdx]: matchRatio}));
  };

  const currentBaytText = useMemo(() => {
    if (ptrRef.current >= flat.length) return "";
    const bIdx = flat[ptrRef.current].bIdx;
    return bab.bayts[bIdx] || "";
  }, [ptrRef.current, bab.bayts]);

  procRef.current=(text)=>{
    const wsNorm=flat.map(f=>norm(f.word));
    const newPtr=tryAdvance(ptrRef.current, wsNorm, text);
    if(newPtr>ptrRef.current){
      for(let i=ptrRef.current;i<newPtr;i++){
        maskRef.current[i]=true;
        if(flat[i].lastOfBayt) {
          const bIdx = flat[i].bIdx;
          const start = baytStart[bIdx];
          const end = (bIdx+1 < baytStart.length) ? baytStart[bIdx+1] : flat.length;
          const totalWords = end - start;
          let matched = 0;
          for (let j=start; j<end; j++) if (maskRef.current[j]) matched++;
          const ratio = totalWords > 0 ? matched / totalWords : 0;
          markBaytDone(bIdx, ratio);
        }
      }
      ptrRef.current=newPtr;
      setMask([...maskRef.current]);
      if(newPtr>=flat.length) stopFn();
    }
  };

  const {listening,processing,srError,toggle,stopFn}=useAsrRecording(
    (text)=>procRef.current(text),
    tFn,
    currentBaytText,
    sett.provider,
    sett.hfToken
  );

  const revealOne=()=>{
    const ptr=ptrRef.current;
    if(ptr<flat.length){
      maskRef.current[ptr]=true;
      if(flat[ptr].lastOfBayt) {
        const bIdx = flat[ptr].bIdx;
        const start = baytStart[bIdx];
        const end = (bIdx+1 < baytStart.length) ? baytStart[bIdx+1] : flat.length;
        const totalWords = end - start;
        let matched = 0;
        for (let j=start; j<end; j++) if (maskRef.current[j]) matched++;
        const ratio = totalWords > 0 ? matched / totalWords : 0;
        markBaytDone(bIdx, ratio);
      }
      ptrRef.current=ptr+1;
      setMask([...maskRef.current]);
    }
  };
  const resetAll=()=>{stopFn();ptrRef.current=0;maskRef.current=new Array(flat.length).fill(false);setMask(new Array(flat.length).fill(false));setBaytScores({});};

  const activeBIdx = ptrRef.current<flat.length ? flat[ptrRef.current].bIdx : bab.bayts.length-1;
  const isFullyDone = ptrRef.current>=flat.length;
  const revealedWords = mask.filter(Boolean).length;
  const activeClr = isAll ? (chapterOfMatn(activeBIdx,bab.chapMap)?.clr||bab.clr) : bab.clr;

  useEffect(()=>{
    const node=baytRefs.current[activeBIdx];
    if(node) node.scrollIntoView({behavior:"smooth",block:"center"});
  },[activeBIdx]);

  return(
    <React.Fragment>
      <div style={{padding:"10px 16px 4px"}}>
        <div style={{background:"rgba(255,255,255,0.08)",borderRadius:99,height:5,overflow:"hidden"}}>
          <div style={{background:activeClr[1],filter:"brightness(1.7)",height:"100%",width:`${revealedWords/Math.max(flat.length,1)*100}%`,borderRadius:99,transition:"width .3s"}}/>
        </div>
        <div style={{textAlign:"center",fontSize:11,color:"#7ab89a",marginTop:3}}>
          {tFn('words',revealedWords,flat.length)} · {tFn('baytsOf',Math.min(activeBIdx+1,bab.bayts.length),bab.bayts.length)}
        </div>
      </div>

      <div style={{padding:"6px 16px 4px"}}>
        {bab.bayts.map((baytText,bIdx)=>{
          const chap=isAll?chapterOfMatn(bIdx,bab.chapMap):null;
          const prevChap=isAll&&bIdx>0?chapterOfMatn(bIdx-1,bab.chapMap):null;
          const showDivider=isAll&&chap&&(!prevChap||chap.title!==prevChap.title);
          const isActive=bIdx===activeBIdx&&!isFullyDone;
          const isDone=bIdx<activeBIdx||isFullyDone;
          const score = baytScores[bIdx] !== undefined ? baytScores[bIdx] : null;
          const scoreColor = score !== null ? (score >= 0.7 ? '#4ade80' : score >= 0.5 ? '#fbbf24' : '#f87171') : null;
          const parts=baytText.split("#").map(p=>p.trim().split(/\s+/).filter(Boolean));
          let li=0;
          return(
            <React.Fragment key={bIdx}>
              {showDivider&&(
                <div style={{display:"flex",alignItems:"center",gap:10,margin:"22px 0 12px"}}>
                  <div style={{flex:1,height:1,background:"rgba(212,168,67,0.2)"}}/>
                  <div style={{fontFamily:"'Scheherazade New',serif",fontSize:15,color:"#d4a843",whiteSpace:"nowrap"}}>{chap.title}</div>
                  <div style={{flex:1,height:1,background:"rgba(212,168,67,0.2)"}}/>
                </div>
              )}
              <div ref={el=>baytRefs.current[bIdx]=el} style={{
                scrollMarginTop:90,
                background:isActive?"rgba(212,168,67,0.07)":isDone?"rgba(180,255,210,0.025)":"transparent",
                border:isActive?"1px solid rgba(212,168,67,0.3)":"1px solid transparent",
                borderRadius:16,padding:"12px 10px",marginBottom:6,transition:"all .4s",
                contentVisibility:isActive?"visible":"auto",containIntrinsicSize:"0 110px",
              }}>
                <div style={{fontSize:10,color:isActive?"#d4a843":"rgba(255,255,255,0.25)",marginBottom:3,fontFamily:"'Scheherazade New',serif",display:"flex",justifyContent:"center",gap:5,alignItems:"center"}}>
                  <span>{arNum(bIdx+1)}</span>
                  {isDone && <span style={{color:"#7ab89a"}}>✓</span>}
                  {score !== null && (
                    <span style={{fontSize:9,color:scoreColor,background:"rgba(0,0,0,0.3)",padding:"0 6px",borderRadius:99}}>
                      {Math.round(score*100)}%
                    </span>
                  )}
                </div>
                {parts.map((pw,pIdx)=>(
                  <div key={pIdx}>
                    <div style={{direction:"rtl",textAlign:"center",lineHeight:1.85,flexWrap:"wrap",display:"flex",justifyContent:"center"}}>
                      {pw.map(w=>{const flatIdx=baytStart[bIdx]+li;li++; return <Word key={flatIdx} text={w} revealed={showAll||mask[flatIdx]} confidence={score !== null ? score : undefined}/>;})}
                    </div>
                    {pIdx<parts.length-1&&<div style={{textAlign:"center",color:"rgba(212,168,67,0.3)",fontSize:12}}>◆</div>}
                  </div>
                ))}
              </div>
            </React.Fragment>
          );
        })}

        {isFullyDone&&(
          <div style={{marginTop:18,background:"rgba(180,255,210,0.07)",border:"1px solid rgba(180,255,210,0.18)",borderRadius:16,padding:"20px",textAlign:"center"}}>
            <div style={{fontSize:30,marginBottom:4}}>🏆</div>
            <div style={{fontFamily:"'Scheherazade New',serif",fontSize:22,color:"#b8f5cc"}}>{isAll?tFn("matnDone"):tFn("babDone")}</div>
            <div style={{fontSize:12,color:"var(--sub)",marginTop:3}}>{tFn("barakAllah")}</div>
          </div>
        )}
        {listening&&(
          <div style={{marginTop:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8,fontSize:12,color:"var(--sub)"}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:processing?"#d4a843":"#e74c3c",display:"inline-block",animation:"pulse 1.2s ease infinite"}}/>
            {processing?tFn("processingTxt"):tFn("listening")}
          </div>
        )}
        {srError&&(
          <div style={{marginTop:12,background:"rgba(231,76,60,0.09)",border:"1px solid rgba(231,76,60,0.25)",borderRadius:12,padding:"10px 14px",fontSize:12,color:"#ffaaaa",textAlign:"center",lineHeight:1.6}}>⚠️ {srError}</div>
        )}
      </div>

      <div style={{position:"fixed",bottom:100,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:540,padding:"0 16px",display:"flex",justifyContent:"center",zIndex:99,pointerEvents:"none"}}>
        <div style={{display:"flex",gap:6,pointerEvents:"auto",background:"rgba(5,12,6,0.85)",backdropFilter:"blur(12px)",padding:"6px",borderRadius:14,border:"1px solid rgba(255,255,255,0.08)",boxShadow:"0 -2px 16px rgba(0,0,0,0.35)"}}>
          <button onClick={()=>setShowAll(s=>!s)} style={{fontSize:11,padding:"7px 10px",borderRadius:10,border:showAll?"1px solid rgba(212,168,67,0.4)":"1px solid rgba(255,255,255,0.07)",cursor:"pointer",background:showAll?"rgba(212,168,67,0.13)":"rgba(255,255,255,0.06)",color:showAll?"#d4a843":"rgba(255,255,255,0.55)",fontWeight:showAll?600:400}}>
            {showAll?tFn("hide"):tFn("see")}
          </button>
          <div style={{width:1,background:"rgba(255,255,255,0.1)",margin:"2px 1px"}}/>
          {[["voice",tFn("voiceMd")],["manual",tFn("manMd")]].map(([m,l])=>(
            <button key={m} onClick={()=>setMode(m)} style={{fontSize:11,padding:"7px 10px",borderRadius:10,border:"none",cursor:"pointer",background:mode===m?"linear-gradient(135deg,#175c2e,#0d4021)":"rgba(255,255,255,0.06)",color:mode===m?"#f5f0e8":"rgba(255,255,255,0.45)",fontWeight:mode===m?600:400}}>{l}</button>
          ))}
        </div>
      </div>

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:540,padding:"12px 16px 28px",background:"linear-gradient(0deg,var(--bg) 55%,transparent)",display:"flex",justifyContent:"center",gap:12,alignItems:"center",zIndex:100,pointerEvents:"none"}}>
        <div style={{display:"flex",gap:10,pointerEvents:"auto",background:"rgba(5,12,6,0.85)",backdropFilter:"blur(12px)",padding:"10px 16px",borderRadius:20,border:"1px solid rgba(255,255,255,0.08)",boxShadow:"0 -4px 24px rgba(0,0,0,0.4)"}}>
          <button onClick={()=>{stopFn();onBack();}} style={{...BS,fontSize:15,padding:"10px 12px"}} title="Retour">←</button>
          <button onClick={resetAll} style={{...BS,fontSize:15,padding:"10px 12px"}}>🔄</button>
          {mode==="voice"?(
            <button onClick={toggle} style={{width:60,height:60,borderRadius:"50%",border:"none",cursor:"pointer",fontSize:24,background:listening?"linear-gradient(135deg,#8b1a1a,#c0392b)":isFullyDone?"rgba(180,255,210,0.12)":`linear-gradient(135deg,${activeClr[0]},${activeClr[1]})`,boxShadow:listening?"0 0 0 8px rgba(192,57,43,0.12),0 6px 20px rgba(0,0,0,0.5)":"0 6px 20px rgba(0,0,0,0.5)",filter:"brightness(1.2)"}}>
              {listening?"⏸":isFullyDone?"✓":"🎤"}
            </button>
          ):(
            <button onClick={isFullyDone?undefined:revealOne} style={{width:60,height:60,borderRadius:"50%",border:"none",cursor:isFullyDone?"default":"pointer",fontSize:22,background:isFullyDone?"rgba(180,255,210,0.12)":`linear-gradient(135deg,${activeClr[0]},${activeClr[1]})`,boxShadow:"0 6px 20px rgba(0,0,0,0.5)",filter:"brightness(1.2)"}}>
              {isFullyDone?"✓":"👆"}
            </button>
          )}
        </div>
      </div>
      <div style={{height:150}}/>
    </React.Fragment>
  );
}

/* ════════════ PROGRESS ════════════ */
function Progress({onBack,onGoMatn,onFocus,progress,tFn,matnDb}){
  const done=Object.values(progress).reduce((s,v)=>s+v.size,0);
  const pct=GRAND_TOTAL?Math.round(done/GRAND_TOTAL*100):0,deg=pct/100*360;
  const matnRows=CATALOG.filter(m=>m.avail).map(m=>{
    const db=matnDb[m.id];
    const mDone=db.abwab.reduce((s,b)=>s+(progress[b.id]?.size??0),0);
    return {m,db,mDone,mPct:db.total?Math.round(mDone/db.total*100):0};
  });
  const hasWeak = (() => {
    const scores = loadScores();
    for (const key of Object.keys(scores)) {
      const avg = scores[key].reduce((a,b)=>a+b,0) / scores[key].length;
      if (avg < 0.6) return true;
    }
    return false;
  })();

  return(
    <div style={{padding:"0 16px 80px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 0 22px"}}>
        <button onClick={onBack} style={BS}>←</button>
        <h2 style={{margin:0,fontSize:18,fontWeight:600,color:"var(--txt)"}}>{tFn("myProg")}</h2>
      </div>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{width:148,height:148,borderRadius:"50%",background:`conic-gradient(#d4a843 ${deg}deg,rgba(255,255,255,0.07) ${deg}deg)`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}>
          <div style={{width:114,height:114,borderRadius:"50%",background:"var(--bg)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <div style={{fontSize:28,fontWeight:700,color:"#d4a843"}}>{pct}%</div>
            <div style={{fontSize:11,color:"var(--sub)"}}>{tFn("compl")}</div>
          </div>
        </div>
        <div style={{fontSize:14,color:"var(--sub)"}}>{tFn("master",done,GRAND_TOTAL)}</div>
      </div>
      {hasWeak && (
        <div onClick={onFocus} style={{
          background:"linear-gradient(140deg,#2c1a0a,#5c3315)",
          borderRadius:14,padding:"14px 16px",marginBottom:16,
          border:"1px solid rgba(212,168,67,0.3)",cursor:"pointer",
          display:"flex",alignItems:"center",gap:12
        }}>
          <span style={{fontSize:20}}>🎯</span>
          <span style={{flex:1,fontSize:13,color:"#d4a843",fontWeight:600}}>{tFn("focusBtn")}</span>
          <span style={{fontSize:18,color:"rgba(212,168,67,0.4)"}}>›</span>
        </div>
      )}
      <div style={{fontSize:12,color:"var(--sub)",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>{tFn("detailChap")}</div>
      {matnRows.map(({m,db,mDone,mPct})=>{
        const ok=mDone===db.total;
        return(
          <div key={m.id} onClick={()=>onGoMatn(m.id)} style={{cursor:"pointer",background:"rgba(255,255,255,0.05)",borderRadius:13,padding:"13px 15px",marginBottom:9,border:ok?"1px solid rgba(212,168,67,0.35)":"1px solid transparent"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
              <span style={{fontFamily:"'Scheherazade New',serif",fontSize:16,direction:"rtl"}}>{m.title}{ok?" ✓":""}</span>
              <span style={{fontSize:13,color:ok?"#b8f5cc":"#7ab89a",fontWeight:ok?600:400,flexShrink:0}}>{mDone}/{db.total}</span>
            </div>
            <div style={{background:"rgba(0,0,0,0.3)",borderRadius:99,height:4,overflow:"hidden"}}>
              <div style={{background:ok?"#b8f5cc":"linear-gradient(90deg,#c9943e,#d4a843)",height:"100%",width:`${mPct}%`,borderRadius:99,transition:"width .5s"}}/>
            </div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:5}}>{m.fr} · {db.abwab.length} chapitres</div>
          </div>
        );
      })}
    </div>
  );
}

/* ════════════ SETTINGS ════════════ */
function Settings({sett,setSett,progress,setProgress,tFn}){
  const [askReset,setAskReset]=useState(false);
  const [installReady,setInstallReady]=useState(()=>!!window.__mutuniInstallPrompt);
  const [installed,setInstalled]=useState(()=>
    (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) || window.navigator.standalone===true
  );
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

  useEffect(()=>{
    const onReady=()=>setInstallReady(true);
    window.addEventListener("mutuni-install-ready",onReady);
    window.addEventListener("appinstalled",()=>setInstalled(true));
    return ()=>window.removeEventListener("mutuni-install-ready",onReady);
  },[]);

  const doInstall=async()=>{
    const evt=window.__mutuniInstallPrompt;
    if(!evt) return;
    evt.prompt();
    const {outcome}=await evt.userChoice;
    if(outcome==="accepted"){ window.__mutuniInstallPrompt=null; setInstallReady(false); }
  };
  const upd=(k,v)=>{const ns={...sett,[k]:v};setSett(ns);saveSettings(ns);applyTheme(ns.theme,ns.fontSize);};
  const doReset=()=>{setProgress({});saveProgress({});localStorage.removeItem(LS_SCORES);setAskReset(false);};
  const done=Object.values(progress).reduce((s,v)=>s+v.size,0);
  return(
    <div style={{padding:"0 16px 80px",color:"var(--txt)"}}>
      <h2 style={{margin:"20px 0 24px",fontSize:18,fontWeight:600,color:"var(--txt)"}}>{tFn('settTitle')}</h2>

      <div style={{marginBottom:24}}>
        <div style={{fontSize:12,color:"var(--sub)",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>{tFn('providerLabel')}</div>
        <div style={{display:"flex",gap:10}}>
          {[["groq",tFn('providerGroq')],["hf",tFn('providerHF')]].map(([p,lbl])=>(
            <button key={p} onClick={()=>upd("provider",p)} style={{
              flex:1,padding:"14px 8px",borderRadius:14,border:"none",cursor:"pointer",fontSize:13,
              background:sett.provider===p?"linear-gradient(135deg,#0d4021,#175c2e)":"var(--ibg)",
              color:sett.provider===p?"#d4a843":"var(--txt)",
              fontWeight:sett.provider===p?700:400,
              border:sett.provider===p?"1px solid rgba(212,168,67,0.4)":"1px solid var(--cbord)",
            }}>{lbl}</button>
          ))}
        </div>
      </div>

      {sett.provider==="hf" && (
        <div style={{marginBottom:24}}>
          <div style={{fontSize:12,color:"var(--sub)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>{tFn('hfTokenLabel')}</div>
          <input
            type="password"
            placeholder={tFn('hfTokenPlaceholder')}
            value={sett.hfToken}
            onChange={(e)=>upd("hfToken",e.target.value.trim())}
            style={{width:"100%",padding:"14px 16px",borderRadius:14,border:"1px solid var(--cbord)",background:"var(--ibg)",color:"var(--txt)",fontSize:14,outline:"none",fontFamily:"monospace"}}
          />
          <div style={{fontSize:10,color:"var(--sub)",marginTop:6}}>
            🔑 Obtiens un token gratuit sur <a href="https://huggingface.co/settings/tokens" target="_blank" rel="noopener noreferrer" style={{color:"#d4a843"}}>huggingface.co/settings/tokens</a>
          </div>
        </div>
      )}

      <div style={{marginBottom:24}}>
        <div style={{fontSize:12,color:"var(--sub)",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>{tFn('langLabel')}</div>
        <div style={{display:"flex",gap:10}}>
          {[["fr","🇫🇷 Français"],["en","🇬🇧 English"],["ar","🕌 العربية"]].map(([l,lbl])=>(
            <button key={l} onClick={()=>upd("lang",l)} style={{
              flex:1,padding:"14px 8px",borderRadius:14,border:"none",cursor:"pointer",fontSize:14,
              background:sett.lang===l?"linear-gradient(135deg,#0d4021,#175c2e)":"var(--ibg)",
              color:sett.lang===l?"#d4a843":"var(--txt)",
              fontWeight:sett.lang===l?700:400,
              border:sett.lang===l?"1px solid rgba(212,168,67,0.4)":"1px solid var(--cbord)",
            }}>{lbl}</button>
          ))}
        </div>
      </div>

      <div style={{marginBottom:24}}>
        <div style={{fontSize:12,color:"var(--sub)",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>{tFn('fontLabel')}</div>
        <div style={{display:"flex",gap:8}}>
          {[["sm","أ","szSm"],["md","أ","szMd"],["lg","أ","szXl"],["xl","أ","szXl"]].map(([fs,ch,lk],i)=>(
            <button key={fs} onClick={()=>upd("fontSize",fs)} style={{
              flex:1,padding:"12px 4px",borderRadius:14,border:"none",cursor:"pointer",
              background:sett.fontSize===fs?"linear-gradient(135deg,#0d4021,#175c2e)":"var(--ibg)",
              color:sett.fontSize===fs?"#d4a843":"var(--txt)",
              fontSize:[16,20,26,34][i],fontFamily:"'Scheherazade New',serif",
              border:sett.fontSize===fs?"1px solid rgba(212,168,67,0.4)":"1px solid var(--cbord)",
            }}>{ch}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:8,marginTop:5}}>
          {[tFn('szSm'),tFn('szMd'),tFn('szLg'),tFn('szXl')].map((l,i)=>(
            <div key={i} style={{flex:1,textAlign:"center",fontSize:10,color:"var(--sub)"}}>{l}</div>
          ))}
        </div>
      </div>

      <div style={{marginBottom:28}}>
        <div style={{fontSize:12,color:"var(--sub)",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>{tFn('themeLabel')}</div>
        <div style={{display:"flex",gap:10}}>
          {[["dark",tFn('dark')],["light",tFn('light')]].map(([th,lbl])=>(
            <button key={th} onClick={()=>upd("theme",th)} style={{
              flex:1,padding:"14px 8px",borderRadius:14,border:"none",cursor:"pointer",fontSize:14,
              background:sett.theme===th?"linear-gradient(135deg,#0d4021,#175c2e)":"var(--ibg)",
              color:sett.theme===th?"#d4a843":"var(--txt)",
              fontWeight:sett.theme===th?700:400,
              border:sett.theme===th?"1px solid rgba(212,168,67,0.4)":"1px solid var(--cbord)",
            }}>{lbl}</button>
          ))}
        </div>
      </div>

      <div style={{background:"var(--ibg)",borderRadius:16,padding:"16px",border:"1px solid var(--cbord)",marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{fontSize:14,fontWeight:600,color:"var(--txt)"}}>{tFn('prog')}</span>
          <span style={{fontSize:13,color:"#d4a843",fontWeight:700}}>{done} / {GRAND_TOTAL}</span>
        </div>
        <div style={{background:"var(--pb)",borderRadius:99,height:5,overflow:"hidden",marginBottom:6}}>
          <div style={{background:"#d4a843",height:"100%",width:`${Math.round(done/GRAND_TOTAL*100)}%`,borderRadius:99,transition:"width .5s"}}/>
        </div>
        <div style={{fontSize:11,color:"var(--sub)"}}>{tFn('progSaved')}</div>
      </div>

      {!askReset
        ? <button onClick={()=>setAskReset(true)} style={{width:"100%",padding:"14px",borderRadius:14,border:"1px solid rgba(231,76,60,0.3)",background:"rgba(231,76,60,0.06)",color:"#e88",fontSize:14,cursor:"pointer"}}>
            🗑 {tFn('resetBtn')}
          </button>
        : <div style={{background:"rgba(231,76,60,0.09)",border:"1px solid rgba(231,76,60,0.3)",borderRadius:14,padding:"16px"}}>
            <div style={{fontSize:13,color:"#ffaaaa",marginBottom:12,textAlign:"center"}}>{tFn('resetAsk')}</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setAskReset(false)} style={{flex:1,padding:"12px",borderRadius:12,border:"1px solid var(--cbord)",background:"var(--ibg)",color:"var(--txt)",cursor:"pointer"}}>✕</button>
              <button onClick={doReset} style={{flex:1,padding:"12px",borderRadius:12,border:"none",background:"#c0392b",color:"white",cursor:"pointer",fontWeight:700}}>✓</button>
            </div>
          </div>
      }

      <div style={{textAlign:"center",marginTop:24,padding:"14px 16px",background:"rgba(212,168,67,0.08)",borderRadius:14,border:"1px solid rgba(212,168,67,0.2)"}}>
        {installed ? (
          <>
            <div style={{fontSize:13,fontWeight:600,color:"#d4a843",marginBottom:2}}>{tFn('installedTitle')}</div>
            <div style={{fontSize:11,color:"var(--sub)"}}>{tFn('installedDesc')}</div>
          </>
        ) : installReady ? (
          <>
            <div style={{fontSize:13,fontWeight:600,color:"#d4a843",marginBottom:10}}>{tFn('installTitle')}</div>
            <button onClick={doInstall} style={{padding:"12px 24px",borderRadius:12,border:"none",background:"#d4a843",color:"#132a24",fontWeight:700,fontSize:14,cursor:"pointer"}}>
              {tFn('installNow')}
            </button>
          </>
        ) : isIOS ? (
          <>
            <div style={{fontSize:13,fontWeight:600,color:"#d4a843",marginBottom:4}}>{tFn('installTitle')}</div>
            <div style={{fontSize:11,color:"var(--sub)",lineHeight:1.6}}>
              {tFn('installIOS')}<br/>
              <span style={{opacity:.7}}>{tFn('installFreeNote')}</span>
            </div>
          </>
        ) : (
          <>
            <div style={{fontSize:13,fontWeight:600,color:"#d4a843",marginBottom:4}}>{tFn('installTitle')}</div>
            <div style={{fontSize:11,color:"var(--sub)",lineHeight:1.6,whiteSpace:"pre-line"}}>
              {tFn('installAndroidDesktop')}<br/>
              <span style={{opacity:.7}}>{tFn('installFreeNote')}</span>
            </div>
          </>
        )}
      </div>

      <div style={{marginTop:16,padding:"18px 16px",background:"rgba(200,60,90,0.07)",borderRadius:14,border:"1px solid rgba(200,60,90,0.18)"}}>
        <div style={{textAlign:"center",fontSize:13,fontWeight:600,color:"#e0a8b8",marginBottom:6}}>{tFn('supportTitle')}</div>
        <div style={{fontSize:11,color:"var(--sub)",textAlign:"center",lineHeight:1.6,marginBottom:12}}>
          {tFn('supportDesc')}
        </div>
        <div style={{display:"flex",gap:10}}>
          <a href="https://paypal.me/REMPLACER_PAR_TON_LIEN" target="_blank" rel="noopener noreferrer"
             style={{flex:1,textAlign:"center",padding:"12px 8px",borderRadius:12,border:"1px solid rgba(255,255,255,0.12)",background:"var(--ibg)",color:"var(--txt)",fontSize:13,fontWeight:600,textDecoration:"none"}}>
            PayPal
          </a>
          <a href="https://revolut.me/REMPLACER_PAR_TON_LIEN" target="_blank" rel="noopener noreferrer"
             style={{flex:1,textAlign:"center",padding:"12px 8px",borderRadius:12,border:"1px solid rgba(255,255,255,0.12)",background:"var(--ibg)",color:"var(--txt)",fontSize:13,fontWeight:600,textDecoration:"none"}}>
            Revolut
          </a>
        </div>
      </div>

      <div style={{textAlign:"center",marginTop:16,fontSize:11,color:"var(--sub)"}}>{tFn('version')}</div>
    </div>
  );
}

/* ════════════ APP ════════════ */
function App(){
  const [screen,setScreen]=useState("home");
  const [selBab,setSelBab]=useState(null);
  const [selMatnId,setSelMatnId]=useState("tuhfa");
  const [progress,setProgress]=useState(()=>loadProgress());
  const [sett,setSett]=useState(()=>loadSettings());

  useEffect(()=>{ applyTheme(sett.theme,sett.fontSize); },[sett.theme,sett.fontSize]);
  useEffect(()=>{ saveProgress(progress); },[progress]);

  const addProgress=useCallback((babId,baytIdx)=>{
    setProgress(prev=>{const s=new Set(prev[babId]||[]);s.add(baytIdx);return{...prev,[babId]:s};});
  },[]);

  const tFn = useCallback((key,...args)=>t(sett.lang,key,...args),[sett.lang]);

  const createFocusBab = (matnId) => {
    const db = MATN_DB[matnId];
    if (!db) return null;
    const scores = loadScores();
    const weakBayts = [];
    let idx = 0;
    for (const bab of db.abwab) {
      for (let i = 0; i < bab.bayts.length; i++) {
        const key = `${matnId}-${idx}`;
        const sc = scores[key];
        if (sc) {
          const avg = sc.reduce((a,b) => a+b, 0) / sc.length;
          if (avg < 0.6) weakBayts.push(bab.bayts[i]);
        }
        idx++;
      }
    }
    if (weakBayts.length === 0) return null;
    return {
      id: `focus-${matnId}`,
      title: `🎯 ${db.label} — faiblesses`,
      sub: `${weakBayts.length} bayts à revoir`,
      clr: ["#2c1a0a","#5c3315"],
      bayts: weakBayts,
    };
  };

  const NAV=[
    {icon:"🏠",key:"home",sc:"home"},
    {icon:"📊",key:"prog",sc:"progress"},
    {icon:"⚙️",key:"sett",sc:"settings"},
  ];

  return(
    <div style={{minHeight:"100vh",background:THEMES[sett.theme].bgGrad,color:"var(--txt)",fontFamily:"'Segoe UI',system-ui,-apple-system,sans-serif",maxWidth:540,margin:"0 auto",position:"relative",overflowX:"hidden"}}>
      {screen!=="review"&&(
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:540,background:"var(--nav-bg)",backdropFilter:"blur(12px)",borderTop:"1px solid var(--nav-bord)",display:"flex",padding:"10px 0 24px",zIndex:200}}>
          {NAV.map(({icon,key,sc})=>(
            <button key={sc} onClick={()=>setScreen(sc)} style={{flex:1,background:"none",border:"none",color:screen===sc?"#d4a843":"var(--sub)",cursor:"pointer",padding:"6px",fontSize:11,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <span style={{fontSize:24}}>{icon}</span>{tFn(key)}
            </button>
          ))}
        </div>
      )}
      <div style={{paddingBottom:screen!=="review"?80:0,overflowY:"auto"}}>
        {screen==="home"     && <Home onGoMatn={(id)=>{setSelMatnId(id);setScreen("chapters");}} onFocus={()=>{
          const focusBab = createFocusBab(selMatnId);
          if (focusBab) { setSelBab(focusBab); setScreen("review"); }
        }} progress={progress} tFn={tFn} sett={sett} matnDb={MATN_DB}/>}
        {screen==="chapters" && <Chapters matnId={selMatnId} onBack={()=>{setScreen("home");}} onSelect={b=>{setSelBab(b);setScreen("review");}} onSelectAll={()=>{const db=MATN_DB[selMatnId];setSelBab(db.allMatn);setScreen("review");}} onFocus={()=>{
          const focusBab = createFocusBab(selMatnId);
          if (focusBab) { setSelBab(focusBab); setScreen("review"); }
        }} progress={progress} tFn={tFn}/>}
        {screen==="review"   && selBab && <Review bab={selBab} onBack={()=>setScreen("chapters")} onProgress={addProgress} progress={progress} tFn={tFn} matnId={selMatnId} sett={sett}/>}
        {screen==="progress" && <Progress onBack={()=>setScreen("home")} onGoMatn={(id)=>{setSelMatnId(id);setScreen("chapters");}} onFocus={()=>{
          const focusBab = createFocusBab(selMatnId);
          if (focusBab) { setSelBab(focusBab); setScreen("review"); }
        }} progress={progress} tFn={tFn} matnDb={MATN_DB}/>}
        {screen==="settings" && <Settings sett={sett} setSett={setSett} progress={progress} setProgress={setProgress} tFn={tFn}/>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
