const norm = (t="") =>
  t.replace(/[\u064B-\u065F\u0670\u0640]/g,"")
   .replace(/[أإآٱ]/g,"ا").replace(/ة/g,"ه").replace(/ى/g,"ي")
   .replace(/\s+/g," ").trim();
const hasMicSupport = () => !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder);
const AR=["٠","١","٢","٣","٤","٥","٦","٧","٨","٩"];
const arNum = n => String(n).replace(/\d/g,d=>AR[d]);

function levenshtein(a,b){
  const m=a.length,n=b.length;
  if(m===0) return n; if(n===0) return m;
  const dp=new Array(n+1);
  for(let j=0;j<=n;j++) dp[j]=j;
  for(let i=1;i<=m;i++){
    let prev=dp[0]; dp[0]=i;
    for(let j=1;j<=n;j++){
      const tmp=dp[j];
      dp[j]=Math.min(dp[j]+1, dp[j-1]+1, prev+(a[i-1]===b[j-1]?0:1));
      prev=tmp;
    }
  }
  return dp[n];
}
// Tolère les petites différences de transcription (ex : nûn du tanwin avalé par un ikhfâ')
function wordsClose(r,e){
  if(!r||!e) return false;
  if(r===e) return true;
  const maxLen=Math.max(r.length,e.length);
  if(maxLen<=2) return false;
  const dist=levenshtein(r,e);
  const tol = maxLen<=4?1:(maxLen<=7?2:4);
  return dist<=tol;
}
function wordMatches(r,e){
  return r===e||(r.length>1&&e.startsWith(r))||(r.length>1&&r.startsWith(e))||(r.length>2&&e.includes(r))||wordsClose(r,e);
}

/* ════════════ RECONNAISSANCE VOCALE — Whisper (Groq) via Netlify Function ════════════
   Remplace l'ancienne Web Speech API (Chrome/Android uniquement, souvent lente/imprécise).
   On enregistre l'audio du micro par petits segments (coupés automatiquement aux silences),
   chaque segment est envoyé à /.netlify/functions/transcribe qui interroge Whisper sur Groq. */
const SEND_INTERVAL_MS = 700;
const EPISODE_MAX_MS = 4000;
const MIN_BLOB_BYTES = 900;

function pickMimeType(){
  const candidates=["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/ogg;codecs=opus","audio/ogg"];
  for(const c of candidates){ if(window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(c)) return c; }
  return "";
}
function blobToBase64(blob){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onloadend=()=>resolve(String(r.result).split(",")[1]||"");
    r.onerror=reject;
    r.readAsDataURL(blob);
  });
}

function useAsrRecording(onTranscript, tFn){
  const [listening,setListening]=useState(false);
  const [processing,setProcessing]=useState(0);
  const [srError,setSrError]=useState(null);
  const streamRef=useRef(null);
  const recRef=useRef(null), dataRef=useRef([]), mimeRef=useRef("");
  const listeningRef=useRef(false);
  const episodeStartRef=useRef(0);
  const sendingRef=useRef(false);
  const onTranscriptRef=useRef(onTranscript);
  onTranscriptRef.current=onTranscript;

  const cleanup=()=>{
    listeningRef.current=false;
    if(recRef.current){ try{recRef.current.ondataavailable=null;recRef.current.onstop=null;if(recRef.current.state!=="inactive")recRef.current.stop();}catch(e){} recRef.current=null; }
    if(streamRef.current){ streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current=null; }
    setListening(false);
  };

  useEffect(()=>()=>cleanup(),[]);

  const sendSnapshot=async(forceRestart)=>{
    if(sendingRef.current) return;
    if(dataRef.current.length===0) return;
    const blob=new Blob(dataRef.current,{type:mimeRef.current||"audio/webm"});
    if(blob.size<MIN_BLOB_BYTES) return;
    sendingRef.current=true;
    setProcessing(p=>p+1);
    try{
      const b64=await blobToBase64(blob);
      const res=await fetch("/.netlify/functions/transcribe",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({audio:b64,mimeType:mimeRef.current})});
      let data={}; try{data=await res.json();}catch(e){}
      if(!res.ok){ setSrError(data.error||tFn("errApi")); }
      else if(data.text) onTranscriptRef.current(data.text);
    }catch(err){
      setSrError(tFn("errNet"));
    }finally{
      setProcessing(p=>Math.max(0,p-1));
      sendingRef.current=false;
      if(forceRestart && listeningRef.current) restartEpisode();
    }
  };

  const restartEpisode=()=>{
    if(!streamRef.current || !listeningRef.current) return;
    if(recRef.current){ try{recRef.current.ondataavailable=null;recRef.current.onstop=null;if(recRef.current.state!=="inactive")recRef.current.stop();}catch(e){} }
    dataRef.current=[];
    const mr=new MediaRecorder(streamRef.current, mimeRef.current?{mimeType:mimeRef.current}:undefined);
    mr.ondataavailable=(e)=>{
      if(e.data && e.data.size>0) dataRef.current.push(e.data);
      if(!listeningRef.current) return;
      const age=Date.now()-episodeStartRef.current;
      sendSnapshot(age>=EPISODE_MAX_MS);
    };
    recRef.current=mr;
    episodeStartRef.current=Date.now();
    mr.start(SEND_INTERVAL_MS);
  };

  const startFn=async()=>{
    setSrError(null);
    if(!hasMicSupport()){ setSrError(tFn("errChrome")); return; }
    if(location.protocol!=="https:"&&location.hostname!=="localhost"&&location.hostname!=="127.0.0.1"){ setSrError(tFn("errHttps")); return; }
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});
      streamRef.current=stream;
      mimeRef.current=pickMimeType();
      listeningRef.current=true; setListening(true);
      restartEpisode();
    }catch(err){
      if(err && (err.name==="NotAllowedError"||err.name==="PermissionDeniedError")) setSrError(tFn("errMic"));
      else setSrError(tFn("errStart")(err && err.message?err.message:String(err)));
      cleanup();
    }
  };

  const stopFn=()=>cleanup();
  const toggle=()=>{ if(listening) stopFn(); else startFn(); };

  return {listening, processing:processing>0, srError, toggle, stopFn};
}

    "وَصَادُ ضَادُ طَاءٌ ظَاءُ مُطْبَقَهْ # وَفَرَّ مِنْ لُبٍّ الْحُرُوفُ الْمُذْلَقَهْ",
    "صَفِيرُهَا صَادٌ وَزَايٌ سِينُ # قَلْقَلَةٌ قُطْبُ جَدٍ وَاللِّينُ",
    "وَاوٌ وَيَاءٌ سُكِّنَا وَانْفَتَحَا # قَبْلَهُمَا وَالِانْحِرَافُ صَحَّحَا",
    "فِي اللَّامِ وَالرَّا وَبِتَكْرِيرٍ جُعِلْ # وَلِلتَّفَشِّي الشِّينُ ضَاداً اسْتَطِلْ",
  ]},
  {id:"jaz-taj",title:"التَّجويد",sub:"Règles du tajwid",clr:["#1a1000","#3a2800"],bayts:[
    "وَالْأَخْذُ بِالتَّجْوِيدِ حَتْمٌ لَازِمُ # مَنْ لَمْ يُصَحِّحِ الْقُرْآنَ آثِمُ",
    "لِأَنَّهُ بِهِ الْإِلَهُ أَنْزَلَا # وَهَكَذَا مِنْهُ إِلَيْنَا وَصَلَا",
    "وَهُوَ أَيْضاً حِلْيَةُ التِّلَاوَةِ # وَزِينَةُ الْأَدَاءِ وَالْقِرَاءَةِ",
    "وَهُوَ إِعْطَاءُ الْحُرُوفِ حَقَّهَا # مِنْ صِفَةٍ لَهَا وَمُسْتَحَقَّهَا",
    "وَرَدُّ كُلٍّ وَاحِدٍ لِأَصْلِهِ # وَاللَّفْظُ فِي نَظِيرِهِ كَمِثْلِهِ",
    "مُكَمَّلاً مِنْ غَيْرِ مَا تَكَلُّفِ # بِاللُّطْفِ فِي النُّطْقِ بِلَا تَعَسُّفِ",
    "وَلَيْسَ بَيْنَهُ وَبَيْنَ تَرْكِهِ # إِلَّا رِيَاضَةُ امْرِئٍ بِفَكِّهِ",
  ]},
  {id:"jaz-trq",title:"التَّرقيق والتنبيهات",sub:"Allègements",clr:["#1a0808","#3a1510"],bayts:[
    "فَرَقِّقَنْ مُسْتَفِلاً مِنْ أَحْرُفِ # وَحَاذِرَنْ تَفْخِيمَ لَفْظِ الْأَلِفِ",
    "وَهَمْزَ أَلْحَمْدُ أَعُوذُ اهْدِنَا # أَلِللَّهِ ثُمَّ لَامَ لِلَّهِ لَنَا",
    "وَلْيَتَلَطَّفْ وَعَلَى اللَّهِ وَلَا الضَّ # وَالْمِيمَ مِنْ مَخْمَصَةٍ وَمِنْ مَرَضْ",
    "وَبَاءَ بَرْقٍ بَاطِلٍ بِهِمْ بِذِي # وَأَحْرِصْ عَلَى الشِّدَّةِ وَالْجَهْرِ الَّذِي",
    "فِيهَا وَفِي الْجِيمِ كَحُبِّ الصَّبْرِ # رَبْوَةٍ اجْتُثَّتْ وَحَجٍّ الْفَجْرِ",
    "وَبَيِّنَنْ مُقَلْقَلاً إِنْ سَكَنَا # وَإِنْ يَكُنْ فِي الْوَقْفِ كَانَ أَبْيَنَا",
    "وَحَاءَ حَصْحَصَ أَحَطْتُ الْحَقُّ # وَسِينَ مُسْتَقِيمٍ يَسْطُو يَسْقُو",
  ]},
  {id:"jaz-raa",title:"الرَّاءات",sub:"Règles du Ra'",clr:["#081820","#103545"],bayts:[
    "وَرَقِّقِ الرَّاءَ إِذَا مَا كُسِرَتْ # كَذَاكَ بَعْدَ الْكَسْرِ حَيْثُ سَكَنَتْ",
    "إِنْ لَمْ تَكُنْ مِنْ قَبْلِ حَرْفِ اسْتِعْلَا # أَوْ كَانَتِ الْكَسْرَةُ لَيْسَتْ أَصْلَا",
    "وَالْخُلْفُ فِي فِرْقٍ لِكَسْرٍ يُوجَدُ # وَأَخْفِفِ التَّكْرِيرَا إِذَا تُشَدَّدُ",
  ]},
  {id:"jaz-lam",title:"اللَّامات والتحذيرات",sub:"Lam & mises en garde",clr:["#181808","#353520"],bayts:[
    "وَفَخِّمِ اللَّامَ مِنِ اسْمِ اللَّهِ # عَنْ فَتْحٍ أَوْ ضَمٍّ كَعَبْدُ اللَّهِ",
    "وَحَرْفَ الِاسْتِعْلَاءِ فَخِّمْ وَاخْصُصَا # لِأَطْبَاقِ أَقْوَى نَحْوُ قَالَ وَالْعَصَا",
    "وَبَيِّنِ الْإِطْبَاقَ مِنْ أَحَطْتُ مَعْ # بَسَطَتَ وَالْخُلْفُ بِنَخْلُقْكُمْ وَقَعْ",
    "وَأَحْرِصْ عَلَى السُّكُونِ فِي جَعَلْنَا # أَنْعَمْتَ وَالْمَغْضُوبِ مَعْ ضَلَلْنَا",
    "وَخَلِّصِ انْفِتَاحَ مَحْذُوراً عَسَى # خَوْفَ اشْتِبَاهِهِ بِمَحْظُوراً عَسَى",
    "وَرَاعِ شِدَّةً بِكَافٍ وَبِتَا # كَشِرْكِكُمْ وَتَتَوَفَّى فِتْنَتَا",
    "وَأَوَّلَيْ مِثْلٍ وَجِنْسٍ إِنْ سَكَنْ # أَدْغِمْ كَقُلْ رَبِّ وَبَلْ لَا وَأَبِنْ",
    "فِي يَوْمٍ مَعْ قَالُوا وَهُمْ وَقُلْ نَعَمْ # سَبِّحْهُ لَا تَزِغْ قُلُوبَ فَالْتَقَمْ",
  ]},
  {id:"jaz-dad",title:"الضَّاد والظَّاء",sub:"Distinction ض / ظ",clr:["#100818","#251535"],bayts:[
    "وَالضَّادَ بِاسْتِطَالَةٍ وَمَخْرَجٍ # مَيِّزْ مِنَ الظَّاءِ وَكُلُّهَا تَجِي",
    "فِي الظَّعْنِ ظِلٌّ الظُّهْرِ عُظْمَ الْحِفْظِ # أَيْقِظْ وَأَنْظِرْ عَظْمَ ظَهْرِ اللَّفْظِ",
    "ظَاهِرْ لَظَى ظُوَاظُ ظَلَمَا # أُغْلُظْ ظَلَامَ ظُفْرٍ انْتَظِرْ ظَمَا",
    "أَظْفَرَ ظَنَّاً كَيْفَ جَا وَعِظْ سِوَى # عِضِينَ ظَلَّ النَّحْلِ زُخْرُفٍ سَوَا",
    "وَظَلَّتَ ظَلْتُمْ وَبِرُومٍ ظَلُّوا # كَالْحِجْرِ ظَلَّتْ شُعَرَا نَظَلُّ",
    "يَظْلَلْنَ مَحْظُوراً مَعَ الْمُحْتَظِرِ # وَكُنْتَ فَظًّا وَجَمِيعَ النَّظَرِ",
    "إِلَّا بِوَيْلٌ هَلْ وَأُولَى نَاضِرَهْ # وَالْغَيْظُ لَا الرَّعْدُ وَهُودٌ قَاصِرَهْ",
    "وَالْحَظُّ لَا الْحَضُّ عَلَى الطَّعَامِ # وَفِي ظَنِينِ الْخِلَافُ سَامِي",
  ]},
  {id:"jaz-nun",title:"النون والميم المشددتان والميم الساكنة",sub:"Ghunna & Meem Sakin",clr:["#08180a","#153520"],bayts:[
    "وَإِنْ تَلَاقَيَا الْبَيَانُ لَازِمُ # أَنْقَضَ ظَهْرَكَ يَعَضُّ الظَّالِمُ",
    "وَاضْطُرَّ مَعْ وَعَظْتَ مَعْ أَفَضْتُمُ # وَصَفَّ هَا جِبَاهُهُمْ عَلَيْهِمُ",
    "وَأَظْهِرِ الْغُنَّةَ مِنْ نُونٍ وَمِنْ # مِيمٍ إِذَا مَا شُدِّدَا وَأَخْفِيَنْ",
    "الْمِيمَ إِنْ تَسْكُنْ بِغُنَّةٍ لَدَى # بَاءٍ عَلَى الْمُخْتَارِ مِنْ أَهْلِ الْأَدَا",
    "وَأَظْهِرَنْهَا عِنْدَ بَاقِي الْأَحْرُفِ # وَاحْذَرْ لَدَى وَاوٍ وَفَا أَنْ تَخْتَفِي",
  ]},
  {id:"jaz-non-tan",title:"النون الساكنة والتنوين",sub:"Noon Sakinah & Tanwin",clr:["#071426","#0f2a52"],bayts:[
    "وَحُكْمُ تَنْوِينٍ وَنُونٍ يُلْفَى # إِظْهَارٌ أَدْغَامٌ وَقَلْبٌ إِخْفَا",
    "فَعِنْدَ حَرْفِ الْحَلْقِ أَظْهِرْ وَأَدْغِمْ # فِي اللَّامِ وَالرَّا لَا بِغُنَّةٍ لَزِمْ",
    "وَأَدْغِمَنْ بِغُنَّةٍ فِي يُومِنُ # إِلَّا بِكِلْمَةٍ كَدُنْيَا عَنْوَنُوا",
    "وَالْقَلْبُ عِنْدَ الْبَا بِغُنَّةٍ كَذَا # لِأَخْفِيَ لَدَى بَاقِي الْحُرُوفِ أُخِذَا",
  ]},
  {id:"jaz-mad",title:"المَدَّات",sub:"Prolongations",clr:["#081428","#103060"],bayts:[
    "وَالْمَدُّ لَازِمٌ وَوَاجِبٌ أَتَى # وَجَائِزٌ وَهُوَ وَقَصْرٌ ثَبَتَا",
    "فَلَازِمٌ إِنْ جَاءَ بَعْدَ حَرْفِ مَدْ # سَاكِنٌ حَالَيْنِ وَبِالطُّولِ يُمَدْ",
    "وَوَاجِبٌ إِنْ جَاءَ قَبْلَ هَمْزَةٍ # مُتَّصِلاً إِنْ جُمِعَا بِكِلْمَةٍ",
    "وَجَائِزٌ إِذَا أَتَى مُنْفَصِلَا # أَوْ عَرَضَ السُّكُونُ وَقْفاً مُسْجَلَا",
  ]},
  {id:"jaz-waqf",title:"الوُقُوف والابتداء",sub:"Arrêt et reprise",clr:["#101428","#203060"],bayts:[
    "وَبَعْدَ تَجْوِيدِكَ لِلْحُرُوفِ # لَا بُدَّ مِنْ مَعْرِفَةِ الْوُقُوفِ",
    "وَالِابْتِدَاءُ وَهِيَ تُقْسَمُ إِذَنْ # ثَلَاثَةً تَامٌّ وَكَافٍ وَحَسَنْ",
    "وَهِيَ لِمَا تَمَّ فَإِنْ لَمْ يُوجَدِ # تَعَلُّقٌ أَوْ كَانَ مَعْنًى فَابْتَدِي",
    "فَالتَّامُّ فَالْكَافِي وَلَفْظاً فَامْنَعَنْ # إِلَّا رُؤُوسَ الْآي جَوِّزْ فَالْحَسَنْ",
    "وَغَيْرُ مَا تَمَّ قَبِيحٌ وَلَهُ # الْوَقْفُ مُضْطَراً وَيَبْدَا قَبْلَهُ",
    "وَلَيْسَ فِي الْقُرْآنِ مِنْ وَقْفٍ يَجِبْ # وَلَا حَرَامٌ غَيْرُ مَا لَهُ سَبَبْ",
  ]},
  {id:"jaz-maqtu",title:"المقطوع والموصول",sub:"Séparé / uni",clr:["#1a0a20","#351545"],bayts:[
    "وَاعْرِفْ لِمَقْطُوعٍ وَمَوْصُولٍ وَتَا # فِي الْمُصْحَفِ الْإِمَامِ فِيمَا قَدْ أَتَا",
    "فَاقْطَعْ بِعَشْرِ كَلِمَاتٍ أَنْ لَا # مَعْ مَلْجَإٍ وَلَا إِلَهَ إِلَّا",
    "وَتَعْبُدُوا يَاسِينَ ثَانِي هُودَ لَا # يُشْرِكْنَ تُشْرِكْ يَدْخُلَنْ تَعْلُوا عَلَى",
    "أَنْ لَا يَقُولُوا لَا أَقُولَ إِنْ مَا # بِالرَّعْدِ وَالْمَفْتُوحَ صِلْ وَعَنْ مَا",
    "نُهُوا اقْطَعُوا مِنْ مَا بِرُومٍ وَالنِّسَا # خُلْفُ الْمُنَافِقِينَ أَمْ مَنْ أَسَّسَا",
    "فُصِّلَتِ النِّسَاءِ وَذِبْحَ حَيْثُ مَا # وَأَنْ لَمِ الْمَفْتُوحَ كَسْرُ إِنَّ مَا",
    "لَأَنْعَامَ وَالْمَفْتُوحَ يَدْعُونَ مَعَا # وَخُلْفُ الْأَنْفَالِ وَالنَّحْلِ وَقَعَا",
    "وَكُلُّ مَا سَأَلْتُمُوهُ وَاخْتُلِفْ # رُدُّوا كَذَا قُلْ بِئْسَمَا وَالْوَصْلَ صِفْ",
    "خَلَفْتُمُونِي وَاشْتَرَوْا فِي مَا اقْطَعَا # أُوحِي أَفَضْتُمُ اشْتَهَتْ يَبْلُو مَعَا",
    "ثَانِي فَعَلْنَ وَقَعَتْ رُومٌ كِلَا # تَنْزِيلُ شُعَرَا وَغَيْرَهَا صِلَا",
    "فَأَيْنَمَا كَالنَّحْلِ صِلْ وَمُخْتَلِفْ # فِي الشُّعَرَا الْأَحْزَابِ وَالنِّسَا وُصِفْ",
    "وَصِلْ فَإِلَّمْ هُودَ أَلَّنْ نَجْعَلَا # نَجْمَعَ كَيْلَا تَحْزَنُوا تَأْسَوْا عَلَى",
    "حَجٌّ عَلَيْكَ حَرَجٌ وَقَطَعَهُمْ # عَنْ مَنْ يَشَاءُ مَنْ تَوَلَّى يَوْمَ هُمْ",
    "وَمَالِ هَذَا وَالَّذِينَ هَؤُلَا # تَحِينَ فِي الْإِمَامِ صِلْ وَوُهِّلَا",
    "وَوَزَنُوهُمْ وَكَالُوهُمْ صِلْ # كَذَا مِنَ الْ وَيَا وَهَا لَا تَفْصِلْ",
  ]},
  {id:"jaz-taat",title:"التَّاءات",sub:"Ta' marbuta",clr:["#1c1008","#3c2818"],bayts:[
    "وَرَحْمَتُ الزُّخْرُفِ بِالتَّا زَبَرَهْ # لَأَعْرَافٍ رُومٍ هُودَ كَافٍ الْبَقَرَهْ",
    "نِعْمَتُهَا ثَلَاثٌ نَحْلٍ إِبْرَهَمْ # مَعَاً أَخِيرَاتٌ عُقُودُ الثَّانِ هَمْ",
    "لُقْمَانُ ثُمَّ فَاطِرٌ كَالطُّورِ # عِمْرَانَ لَعْنَتُ بِهَا وَالنُّورِ",
    "وَامْرَأَتُ يُوسُفَ عِمْرَانَ الْقَصَصْ # تَحْرِيمُ مَعْصِيَتْ بِقَدْ سَمِعَ يُخَصْ",
    "شَجَرَتَ الدُّخَانِ سُنَّتْ فَاطِرٍ # كُلَّاً وَالْأَنْفَالِ وَأُخْرَى غَافِرٍ",
    "قُرَّتُ عَيْنٍ جَنَّتُ فِي وَقَعَتْ # فِطْرَتَ بَقِيَّتْ وَابْنَتُ وَكَلِمَتْ",
    "أَوْسَطَ الْأَعْرَافِ وَكُلَّمَا اخْتُلِفْ # جَمْعاً وَفَرْداً فِيهِ بِالتَّاءِ عُرِفْ",
  ]},
  {id:"jaz-hamz",title:"هَمزات الوَصل والوقف",sub:"Hamzat al-wasl",clr:["#081820","#103545"],bayts:[
    "وَابْدَأْ بِهَمْزِ الْوَصْلِ مِنْ فِعْلٍ بِضَمْ # إِنْ كَانَ ثَالِثٌ مِنَ الْفِعْلِ يُضَمّْ",
    "وَاكْسِرْهُ حَالَ الْكَسْرِ وَالْفَتْحِ وَفِي # لَأَسْمَاءِ غَيْرِ اللَّامِ كَسْرُهَا كُفِي",
    "فِي ابْنٍ مَعَ ابْنَتٍ وَامْرِئٍ وَاثْنَيْنِ # وَامْرَأَةٍ وَاسْمٍ مَعَ اثْنَتَيْنِ",

  {id:"durr-14",title:"يَاءَاتُ الإِضَافَةِ",sub:"Les Yâ' d'annexion (Yâ'ât al-Idâfa)",clr:["#0a2540","#154568"],bayts:[
    "كَقَالُونَ أُدْ لِيْ دِيْنِ سَكِّنْ وَإِخْوَتِيْ # وَرَبِّي افْتَحَ اَصْلًا وَاسْكِنِ الْبَابَ حُمِّلَا",
    "سِوَى عِنْدَ لاَمِ الْعُرْفِ إِلاَّ النِّدَا وَغَيْـ # -رَ مَحْيَايَ مِنْ بَعْدِي اسْمُهُ وَاحْذِفَنْ وِلَا",
    "عِبَادِيَ لاَ يَسْمُو وَقَوْمِي افْتَحًا لَهُروح # وَقُلْ لِعِبَادِي طِبْ فَشَا وَلَهُخلف وَلَا",
    "لَدَى لامِ عُرْفٍ نَحْوُ رَبِّي عِبَادِ لا النْ # نِدَا مِسَّنِي آتَانِ أَهْلَكَنِي مُلَا",
  ]},
  {id:"durr-15",title:"الْيَاءَاتُ الزَّوَائِدُ",sub:"Les Yâ' additionnels (Zawâ'id)",clr:["#0e2e30","#1c5658"],bayts:[
    "وَتَثْبُتُ فِي الْحَالَيْنِ لا يَتَّقِي بِيُو # سُفَ حُزْ كَرُوسِ الآيِ وَالْحَبْرُ مُوْصِلَا",
    "يُوَافِقُ مَا فِي الْحِرْزِ فِي الدَّاعِ وَاتَّقُو # نِ تَسْأَلْنِ تُؤْتُونِيْ كَذَا اخْشَوْنِ مَعْ وَلَا",
    "وَأَشْرَكْتُمُونِ الْبَادِ تُخْزُونِ قَدْ هَدَا # نِ وَاتَّبِعُوْنِي ثُمَّ كِيْدُونِ وُصِّلَا",
    "دَعَانِي وَخَافُونِي وَقَدْ زَادَ فَاتِحًا # يُرِدْنِ بِحَالَيْهِ وَتَتَّبِعَنْ أَلَا",
    "تَلاَقِ التَّنَادِيْ بِنْ عِبَادِي اتَّقُو طَمَا # دُعَاءِ اتْلُ وَاحْذِفْ مَعْ تُمِدُّوْنَنِي فُلَا",
    "وَآتَانِ نَمْلٍ يُسْرُ وَصْلٍ وَتَمَّتِ الْ # أُصُولُ بِعَوْنِ اللهِ دُرًّا مُفَصَّلَا",
  ]},
  {id:"durr-16",title:"سُوْرَةُ الْبَقَرَةِ",sub:"Sourate Al-Baqara",clr:["#0a2030","#134560"],bayts:[
    "حُرُوْف التَّهَجِّي افْصِلْ بِسَكْتٍ كَحَا أَلِفْ # أَلاَ يَخْدَعُونَ اعْلَمْ حِجىً وَاشْمِمًا طِلَا",
    "بِقِيْلَ وَمَا مَعْهُ وَيُرْجَعُ كَيْفَ جَا # إِذَا كَانَ لِلأُخْرَى فَسَمِّ حُلًى حَلَا",
    "وَالامْرُ اتْلُ وَاعْكِسْ أَوَّلَ الْقَصِّ هُوْ وَهِيْ # يُمِلَّ هْوَ ثُمَّ هْوَ اسْكِنًا أُدْ وَحُمِّلَا",
    "فَحَرِّكْ وَأَيْنَ اضْمُمْ مَلائِكَةِ اسْجُدُوا # أَزَلَّ فَشَا لاَ خَوْفَ بِالْفَتْحِ حُوِّلَا",
    "وَعَدْنَا اتْلُ بَارِئْ بَابَ يَأْمُرْ أَتِمَّ حُمْ # أُسَارَى فِدًا خِفُّ الأَمَانِيَ مُسْجَلَا",
    "أَلاَ يَعْبُدُوا خَاطِبْ فَشَا يَعْمَلُونَ قُلْ # حَوَى قَبْلَهُ أَصْلٌ وَبِالْغَيْبِ فُقْ حَلَا",
    "وَقُلْ حَسَنًا مَعْهُ تُفَادُو وَنُنْسِهَا # وَتَسْأَلْ حَوَى وَالضَّمُّ وَالرَّفْعُ أُصِّلَا",
    "وَكَسْرَ اتَّخِذْ أُْد سَكِّنَ اَرْنَا وَأَرْنِ حُزْ # خِطَابَ يَقُولُو طِبْ وَقَبْلَ وَمِنْ حَلاَ",
    "وَقَبْلُ يَعِي إِذْ غِبْ فَتىً وَيَرَى اتْلُ خَا # طِبًا حُزْ وَأَنَّ اكْسِرْ مَعًا حَائِزَ الْعُلَا",
    "وَأَوَّلُ يَطَّوَّع حَلاَ الْمَيْتَةَ اشْدُدَن # وَمَيْتَهْ وَمَيْتًا أُْد وَالانْعَامُ حُلِّلَا",
    "وَفِي حُجُرَاتٍ طُلْ وَفِي الْمَيْتِ حُزْ وَأَوْ # وَلَ السَّاكِنَيْنِ اضْمُمْ فَتىً وَبِقُلْ حَلَا",
    "بِكَسْرٍ وَطَاءَ اضْطُرَّ فَاكْسِرْهُ آمِنًا # وَرَفْعُكَ لَيْسَ الْبِرَّ فَوْزٌ وَثَقِّلَا",
    "وَلَكِنْ وَبَعْدُ انْصِبْ أَلاَ اشْدُدْ لِتُكْمِلُوا # كَمُوصٍ حِمًا وَالْعُسْرُ وَالْيُسْرُ أُثْقِلَا",
    "وَالاذْنُ وَسُحْقًا الاُكْلُ إِذْ أُكْلُهَا الرُّعُبْ # وَخُطْوَاتِ سُحْتٍ شُغْلِ رُحْمًا حَوَى الْعُلَا",
    "وَنُذْرًا وَنُكْرًا رُسْلُنَا خُشْبُ سُبْلَنَا # حِمًا عُذْرًا اَوْ يَا قُرْبَةٌ سَكَّنَ الْمَلَا",
    "بُيُوتَ اضْمُمًا وَارْفَعْ رَفَثْ وَفُسُوقَ مَعْ # جِدَالَ وَخَفْضٌ فِي الْمَلائِكَةُ انْقُلَا",
    "لِيَحْكُمَ جَهِّلْ حَيْثُ جَا وَيَقُولُ فَانْـ # -صِبِ اِعْلَمْ كَثِيرُ الْبَا فِدًا وَانْصِبُوا حُلَا",
    "قُلِ الْعَفْوُ وَاضْمُمْ أَنْ يَخَافَا حُلاَ أَبٍ # وَفَتْحُ فَتىً وَاقْرَأْ تُضَارَ كَذَا وَلَا",
    "يُضَارَ بِخِفٍّ مَعْ سُكُونٍ وَقَدْرُهُ # فَحَرِّكْ إِذًا وَارْفَعْ وَصِيَّةَ حُطْ فُلَا",
    "يُضَاعِفُهُ انْصِبْ حُزْ وَشَدِّدْهُ كَيْفَ جَا # إِذًا حُمْ وَيَبْصُطْ بَصْطَةَ الْخَلْقِ يُعْتَلَا",
    "عَسِيْتُ افْتَحِ اذْ غَرْفَه يُضَمُّ دِفَاعُ حُزْ # وَأَعْلَمُ فُزْ وَاكْسِرْ فَصُرْهُنَّ طِبْ أَلَا",
    "نِعِمَّا حُزَ اسْكِنْ أُدْ وَمَيْسَرَةِ افْتَحًَا # كَيَحْسَبُ أُدْ وَاكْسِرْهُ فُقْ فَأَذْنُوا وِلَا",
    "وَبِالْفَتْحِ أَنْ تُذْكِرْ بِنَصْبٍ فَصَاحَةٌ # رِهَانٌ حِمىً يَغْفِرْ يُعَذِّبْ حَمَى الْعُلا َ",
    "بِرَفْعٍ نُفَرِّقْ يَاءُ نَرْفَعُ مَنْ نَشَا # ءُ يُوْسُفَ نَسْلُكْهُ نُعَلِّمُهُ حَلَا",
  ]},
  {id:"durr-17",title:"سُوْرَةُ آلِ عِمْرَانَ",sub:"Sourate Âl 'Imrân",clr:["#0a2a2e","#124a4f"],bayts:[
    "يَرَوْنَ خِطَابًا حُزْ وَفُزْ يَقْتُلُوا تَقِيْـ # يَةً مَعْ وَضَعْتُ حُمْ وَإِنَّ افْتَحًَا فُلَا",
    "يُبَشِّرُ كُلًاّ فِدْ قُلِ الطَّائِرِ اتْلُ طَا # ئِرًا حُزْ نُوَفِّي الْيَا طُوَى افْتَحْ لِمَا فُلَا",
    "وَيَأْمُرُكُمْ فَانْصِبْ وَقُلْ يُرْجَعُونَ حُمْ # وَحَجُّ اكْسِرَنْ وَاقْرَأْ يَضُرُّكُمُ أَلَا",
    "وَقَاتَلَ مِتُّ اضْمُمْ جَمِيعًا أَلاَ يَغْلْ # لَ جَهِّلْ حِمىً وَالْغَيْبُ يَحْسِبُ فُضِّلَا",
    "بِكُفْرٍ وَبُخْلٍ الآخِرَ اعْكِسْ بِفَتْحِ بَا # كَذِيْ فَرَحٍ وَاشْدُدْ يَمِيْزَ مَعًا حَلَا",
    "وَيَحْزُنُ فَافْتَحْ ضُمَّ كُلًاّ سِوَى الَّذِيْ # لَدَى الأَنْبِيَا فَالضَّمُّ وَالْكَسْرُ أَحْفَلَا",
    "سَنَكْتُبُ مَعْ مَا بَعْدُ كَالْبَصْرِ فُزْ يُبَيْ # يِنُنْ يَكْتُمُوا خَاطِبْ حَنَا خَفَّفُوا طُلَا",
    "يَغُرَّنْكَ يَحْطِمْ نَذْهَبَ اوْ نُرِيَنْكَ يَسْـ # -تَخِفَّنْ وَشَدِّدْ لَكِنِ الَّذْ مَعًَا أَلَا",
  ]},
  {id:"durr-18",title:"سُوْرَةُ النِّسَاءِ",sub:"Sourate An-Nisâ'",clr:["#0a2438","#123f5c"],bayts:[
    "وَالارْحَامِ فَانْصِبْ أُمِّ كُلًاّ كَحَفْصِ فُقْ # فَوَاحِدَةٌ مَعْهُ قِيَامًا وَجُهِّلَا",
    "أَحَلَّ وَنَصْبَ اللهُ وَاللاَّتِ أُدْ يَكُنْ # فَأَنِّثْ وَأَشْمِمْ بَابَ أَصْدَقُ طِبْ وَلَا",
    "وَلاَ يُظْلَمُوا أُْد يَا وَحُزْ حَصِرَتْ فَنَوْ # وِنِ انْصِبْ وَأُخْرَى مُؤْمِنًا فَتْحُهُ بَلَا",
    "وَغَيْرُ انْصِبًا فُزْ نُونَ يُؤْتِيِهْ حُطْ وَيَدْ # خُلُوا سَمِّ طِبْ جَهِّلْ كَطَوْلٍ وَكَافَ الَا",
    "وَفَاطِرَ مَعْ نَزَّلْ وَتِلْوَيْهِ سَمِّ حُمْ # وَتَلْوُوْا فِدًا تَعْدُوا اتْلُ سَكِّنْ مُثَقِّلا",
  ]},
  {id:"durr-19",title:"سُوْرَةُ الْمَائِدَةِ",sub:"Sourate Al-Mâ'ida",clr:["#0c2f35","#155a5e"],bayts:[
    "وَشَنْآنُ سَكِّنْ أَوْفِ إِنْ صَدُّ فَافْتَحًَا # وَأَرْجُلِكُمْ فَانْصِبْ حَلاَ الْخَفْضُ أُعْمِلَا",
    "مِنِ اجْلِ اكْسِرْ انْقُلْ أُدْ وَقَاسِيَةً عَبَدْ # وَطَاغُوتَ وَلْيَحْكُمْ كَشُعْبَةَ فُصِّلَا",
    "وَرَفْعَ الْجُرُوحَ اعْلَمْ وَبِالنَّصْبِ مَعْ جَزَ # اءُ نُوِّنْ وَمِثْلِ ارْفَعْ رِسَالاتِ حُوِّلَا",
    "مَعَ الأَوَّلِيْنَ اضْمُمْ غُيُوبِ عُيُونِ مَعْ # جُيُوبِ شُيُوخًا فِدْ وَيَوْمَ ارْفَعِ الْمَلَا",
  ]},
  {id:"durr-20",title:"سُوْرَةُ الأَنْعَامِ",sub:"Sourate Al-An'âm",clr:["#0a1f3a","#153a63"],bayts:[
    "وَيُصْرَفْ فَسَمَّي نَحْشُرُ الْيَا نَقُولُ مَعْ # سَبَأْ لَمْ يَكُنْ وَانْصِبْ نُكَذِّبُ وَالْوِلَا",
    "حَوَى ارْفَعْ يَكُنْ أَنِّثْ فِدًا يَعْقِلُوا وَتَحْـ # -تُ خَاطِبْ كَيَاسِيْنَ الْقَصَصْ يُوْسُفٍ حَلَا",
    "فَتَحْنَا وَتَحْتُ اشْدُدْ أَلاَ طِبْ وَالانْبِيَا # مَعَ اقْتَرَبَتْ حُزْ إِذْ وَيُكْذِبُ أُصِّلَا",
    "وَحُزْ فَتْحَ إِنَّهْ مَعْ فَإِنَّهْ وَفَائِزٌ # تَوَفَّتْهُ وَاسْتَهْوَتْهُ يُنْجِي فَثَقِّلَا",
    "بِثَانٍِ أَتَى وَالْخِفَّ فِي الْكُلِّ حُزْ وَتَحْـ # -تَ صَادَ يُرَى وَالرَّفْعُ آزَرَ حُصِّلَا",
    "هُنَا دَرَجَاتِ النُّوْنُ يَجْعَلْ وَبَعْدُ خَا # طِبًا دَرَسَتْ وَاضْمُمْ عُدُوًّا حُلىً حَلَا",
    "وَطِبْ مُسْتَقِرُّ افْتَحْ وَكَسْرَ انَّهَا وَيُؤْ # مِنُوافِدْ وَحَبْرٌ سَمِّ حُرِّمَ فُصِّلَا",
    "وَحُزْ كَلِمَتْ وَالْيَاءُ نَحْشُرُهُمْ يَدٌ # يَكُونَ يَكُنْ أَنِّثْ وَمَيْتَةً انْجَلَا",
    "بِرَفْعِ مَعًا عَنْهُ وَذَكِّر يَكُونَ فُزْ # وَخِفُّ وَأَنْ حِفْظٌ وَقُلْ فَرَّقُوا فُلَا",
    "وَعَشْرُ فَنَوِّنْ وَارْفَعْ اَمْثَالِهَا حُلًا # كَذَا الضِّعْفِ وَانْصِبْ قَبْلَهُ نَوِّنًا طُلَا",
  ]},
  {id:"durr-21",title:"سُوْرَةُ الأَعْرَافِ وَالأَنْفَالِ",sub:"Sourates Al-A'râf et Al-Anfâl",clr:["#0d2b2b","#1a4f4a"],bayts:[
    "هُنَا تُخْرَجُوا سَمَّى حِمًى نَصْبُ خَالِصَهْ # أَتَى تُفْتَحُ اشْدُدْ مَعْ أُبَلِّغُكُمْ حَلَا",
    "يُغَشِّيْ لَهُيعقوب أَنْ لَعْنَةُ اتْلُ كَحَمْزَةٍ # وَلاَ يَخْرُجُ اضْمُمْ وَاكْسِرِ الْخُلْفُ بُجِّلَا",
    "وَخَفْضُ إِلَهٍ غَيْرُهُ نَكِدًاأَلاَ افْـ # تَحَنْ يَقْتُلُوا مَعْ يَتْبَعُ اشْدُدْ وَقُلْ عَلَا",
    "لَهُأبوجعفر وَرِسَالَتْ يَحْلُ وَاضْمُمْ حُلِيِّ فِدْ # وَحُزْ حَلْيِهِمْ تُغْفَرْ خَطِيْئَاتُ حُمِّلَا",
    "كَوَرْشٍ يَقُولُوا خَاطِبَنْ حُمْ وَيَلْحَدُو اضْـ # -مُمِ اكْسِرْ كَحَا فِدْ ضُمَّ طَا يَبْطِشُ اسْجِلَا",
    "وَقَصْرَ أَنَا مَعْ كَسْرٍ اعْلَمْ وَمُرْدِفِي افْـ # -تَحَنْ مُوْهِنٌ وَاقْرَأْ يُغَشِّي انْصِبِ الْوِلَا",
    "حَلاَ يَعْمَلُوا خَاطِبْ طَرَى حَيَّ أَظْهِرَنْ # فَتًى حُ- زْ وَيَحْسَبْ أُدْ وَخَاطَبَ فَاعْتَلَا",
    "وَفِي تُرْهِبُوا اشْدُدْ طِبْ وَضُعْفًا فَحَرِّكِ امْـ # -دُدِ اهْمِزْ بِلا نُوْنٍ أُسَارَى مَعًا أَلَا",
    "يَكُونَ فَأَنِّثْ إِذْ وِلاَيَةَ ذِي افْتَحَنْ # فِنًا وَاقْرَإِ الأَسْرَى حَمِيْدًا مُحَصِّلَا",
  ]},
  {id:"durr-22",title:"سُوْرَةُ التَّوْبَةِ وَيُوْنُسَ وَهُوْدٍ عَلَيْهِمَا الصَّلاةُ وَالسَّلامُ",sub:"Sourates At-Tawba, Yûnus et Hûd",clr:["#0a2540","#154568"],bayts:[
    "وَقُلْ عَمَرَهْ مَعْهَا سُقَاةَ الْخِلاَفَ بِنْ # عُزَيْرُ فَنَوِّنْ حُزْ وَعَيْنَ عَشَرْ أَلَا",
    "فَسَكِّنْ جَمِيْعًا وَامْدُدْ اثْنَا يَضِلُّ حُطْ # بِضَمٍّ وَخِفَّ اسْكِنْ مَعَ الْفَتْحِ مَدْخَلَا",
    "وَكِلْمَةُ فَانْصِبْ ثَانِيًا ضُمَّ مِيْمَ يَلْـ # -مِزُ الْكُلَّ حُزْ وَالرَّفْعُ فِي رَحْمَةٍ فُلَا",
    "وَفِي الْمُعْذِرُونَ الْخِفُّ وَالسُّوءِ فَافْتَحًا # وَالانْصَارِ فَارْفَعْ حُزْ وَأُسِّسَ وَالْوِلَا",
    "فَسَمِّ انْصِبِ اتْلُ افْتَحْ تُقَطَّعَ إِذْ حِمىً # وَبِالضَّمِّ فُزْ إِلاَّ أَنِ الْخِفُّ قُلْ إِلَى",
    "يَرَوْنَ خِطَابًا حُزْ وَبِالْغَيْبِ فِدْ يَزِيْـ # -غُ أَنِّثْ فَشَا افْتَحْ إِنَّهُ يَبْدَؤُ انْجَلَا",
    "وَقُلْ لَقَضَى الشَّامِ حُمْ يَمْكُرُوايَدٌ # وَيَنْشُرُكُمْ أُد قِطْعًا اسْكِنْ حُلىً حَلَا",
    "يَهِدِّيْ سُكُونُ الْهَاءِ إِذْ كَسْرُهَا حَوَى # وَفَلْيَفْرَحُوا خَاطِبْ طِلًا يَجْمَعُوا طَلَى",
    "إِذًا أَصْغَرَ ارْفَعْ حُقَّ مَعْ شُرَكَاءَكُمْ # كَأَكْبَرْ وَوَصْلٌ فَاجْمَعُوا افْتَحْ طَوًى اسْئَلَا",
    "ءَأَلسِّحْرُ أَمْ أَخْبِرْ حُلىً وَافْتِحِ اتْلُ فَا # قَ إِنِّي لَكُمْ إِبْدَالُ بَادِىَء حُمِّلَا",
    "عَمِلْ غَيْرَ حَبْرٌ كَالْكِسَائِي وَنَوِّنُوا # ثَمُودَ فِدًا وَاتْرُكْ حِمًا سِلْمُ فَانْقُلَا",
    "سَلامٌ وَيَعْقُوبَ ارْفَعَنْ فُزْ وَنَصْبُ حَا # فِظِ امْرَأَتُكْ إِنْ كُلًاّ اتْلُ مُثَقِّلَا",
    "وَلَمَّا مَعَ الطَّارِقْ أَتَى وَبِيَا وَزُخْـ # -رُفٍ جُدْ وَخِفُّ الْكُلِّ فُقْ زُلَفَا أَلَا",
    "بِضَمٍّ وَخَفِّفْ وَاكْسِرَنْ بِقْيَةٍ جَنَى # وَمَا يَعْمَلُوا خَاطِبْ مَعَ النَّمْلِ حُفَّلَا",
  ]},
  {id:"durr-23",title:"سُوْرَةُ يُوْسُفَ عليه الصلاة والسلام وَالرَّعْدِ",sub:"Sourates Yûsuf et Ar-Ra'd",clr:["#0e2e30","#1c5658"],bayts:[
    "وَيَا أَبَتِ افْتَحْ أُدْ وَنَرْتَعْ وَبَعْدُ يَا # وَحَاشَا بِحَذْفٍ وَافْتَحِ السِّجْنُ أَوَّلَا",
    "حِمىً كُذِّبُوا اتْلُ الْخِفُّ نُجِّيَ حَامِدٌ # وَيُسْقَى مَعَ الْكُفَّارُ صَدَّ اضْمُمَنْ حَلَا",
  ]},
  {id:"durr-24",title:"وَمِنْ سُوْرَةِ إِبْرَاهِيْمَ عليه الصلاة والسلام إِلَى سُوْرَةِ الْكَهْفِ",sub:"De sourate Ibrâhîm à sourate Al-Kahf",clr:["#0a2030","#134560"],bayts:[
    "وَطِبْ رَفْعَ أَللهِ ابْتِدَاءً كَذَا اكْسِرَنْ # نَ أَنَّا صَبَبْنَا وَاخْفِضِ افْتَحْهُ مُوْصِلَا",
    "يَضِلُّ اضْمُمَنْ لُقْمَانَ حُزْ غَيْرُهَا يَدٌ # وَفُزْ مُصْرِخِيِّ افْتَحْ عَلِيٌّ كَذَا حَلاَ",
    "وَيَقْنَطُ كَسْرُ النُّوْنِ فُزْ وَتُبَشِّرُو # نِ فَافْتَحْ أَبًا يُنْزِلْ وَمَا بَعْدُ يُجْتَلَا",
    "كَمَا الْقِدْرُ شِقِّ افْتَحْ تُشَاقُّونِ نُوْنَهُ اتْـ # -لُ يَدْعُونَ حِفْظٌ مُفْرِطُونَ اشْدُدِ الْعُلَا",
    "وَنُسْقِيْكُمُ افْتَحْ حُمْ وَأَنِّثْ إِذًا وَيَجْـ # -حَدُونَ فَخَاطِبْ طِبْ كَذَاكَ يَرَوْا حُلَا",
    "وَيُنْزِلُ عَنْهُيعقوب اشْدُدْ لِيَجْزِيَ نُونٌ اِذْ # وَيَتَّخِذُوا خَاطِبْ حَلاَ نخْرِجُ انْجَلَا",
    "حَوَى الْيَا وَضُمَّ افْتَحْ أَلاَ افْتَحْ وَضُمَّ حُطْ # وَحُزْ مَدَّ آمَرْنَا يُلَقَّاهُ أُوْصِلَا",
    "وَأُفِّ افْتَحَنْ حَقًّا وَقُلْ خَطَأً أَتَى # وَنَخْسِفْ نُعْيْدَ الْيَا وَنُرْسِلَ حُمِّلَا",
    "وَنُغْرِقَ يَمٌّ أَنِّثِ اتْلُ طَمَى وَشَدْ # دِدِ الْخُلْفَ بِنْ وَالرِّيْحِ بِالْجَمْعِ أُصِّلَا",
    "كَصَادَ سَبَأْ وَالأَنْبِيَا نَاءَ أُدْ مَعًا # خِلافَكَ مَعْ تَفْجُرْ لَنَا الْخِفُّ حُمِّلَا",
  ]},
  {id:"durr-25",title:"سُوْرَةُ الْكَهْفِ",sub:"Sourate Al-Kahf",clr:["#0a2a2e","#124a4f"],bayts:[
    "وَتَزْوَرُّ حُزْ وَاكْسِرْ بِوَرْقِ كَثُمْرِهِ # بِضَمَّيْ طُوىً فَتْحَا اتْلُ يَا ثُمْرٌ إِذْ حَلَا",
    "وَمَدُّكَ لَكِنَّا أَلاَ طِبْ نُسَيِّرُ الْـ # جِبَالَ كَحَفْصِ الْحَقُّ بِالْخَفْضِ حُلِّلَا",
    "وَكُنْتُ افْتَحَ اشْهَدْنَا وَحَامِيَةٍ وَضَمْـ # -مَتَيْ قُبُلًا أُدْ يَا نَقُولُ فَكَمِّلَا",
    "زَكِيَّةَ يَسْمُوا كُلَّ يُبْدِلَ خِفَّ حُطْ # جَزَاءُ كَحَفْصٍ ضَمُّ سَدَّيْنِ حُوِّلَا",
    "كَسَدًّا هُنَا آتُوْنِ بِالْمَدِّ فَاخِرٌ # وَعَنْهُخلف فَمَا اسْطَاعُوا يُخَفِّفُ فَاقْبَلَا",
  ]},
  {id:"durr-26",title:"وَمِنْ سُوْرَةِ مَرْيَمَ عليها السلام إِلَى سُوْرَةِ الْفُرْقَانِ",sub:"De sourate Maryam à sourate Al-Furqân",clr:["#0a2438","#123f5c"],bayts:[
    "يَرِثْ رَفْعُ حُزْ وَاضْمُمْ عِتِيًّا وَبَابَهُ # خَلَقْتُكَ فِدْ وَالْهَمْزُ فِي لأَهَبْ أَلاَ",
    "وَنَسْيًاٍ بِكَسْر فُز وَمَنْ تَحْتَهَا اكْسِرِ اخْـ # -فِضًا يَعْلُ تَسَّاقَطْ فَذَكِّرْ حُلًا حَلَا",
    "وَشَدِّدْ فَتىً قَوْلُ انْصِبًا حُزْ وَأَنَّ فَاكْـ # سِرَنْ يَحْلُ نُوْرِثْ شُدَّ طِبْ يَذْكُرُ اعْتَلَا",
    "وَفُزْ وَلَدًا لاَ نُوْحَ فَافْتَحْ يَكَادُ أَنْ # نِثِ اِنِّي أَنَا افْتَحْ آدَ وَالْكَسْرَ حُطْ وَلَا",
    "أَنَا اخْتَرْتُ فِدْ سَكِّنْ لِتُصْنَعْ وَاجْزِمَنْ # كَنُخْلِفْهُ أَسْنَى اضْمُمْ سِوًى حُمْ وَطُوِّلَا",
    "فَيَسْحَتَ ضُمَّ اكْسِرْ وَبِالْقَطْعِ أَجْمِعُوا # وَهَذَانِ حُزْ أَنِّثْ يُخَيِّلُ يُجْتَلَى",
    "وَفُزْ لاَ تَخَافُ ارْفَعْ وَإِثْرِي اكْسِرِ اِسْكِنَنْ # كَذَا اضْمُمْ حَمَلْنَا وَاكْسِرِ اشْدُدْ طَ- مَا وَلَا",
    "لِنُحْرِقَ سَكِّنْ خَفِّفْ اعْلَمْهُ وَافْتَحًا # وَضُمَّ بَدَا نَنْفُخْ بِيَا حُلْ مُجَهِّلَا",
    "وَيُقْضَى بِنُوْنٍ سَمِّ وَانْصِبْ كَوَحْيُهُ # لِيَعْقُوبِهِمْ وَافْتَحْ وَإِنَّكَ لاَ انْجَلَا",
    "وَزَهْرَةَ فَتْحُ الْهَا حُلًا يَأْتِهِمْ بَدَا # وَطِبْ نُوْنَ يُحْصِنْ أَنِّثًا أُدْ وَجُهِّلَا",
    "مَعَ الْيَاءِ نَقْدِرْ حُْز حَرَامٌ فَشَا وَأَنْ # نِثَنْ جَهِّلَنْ نَطْوِي السَّمَاءَ ارْفَعِ الْعُلَا",
    "وَبَا رَبِّ ضُمَّ اهْمِزْ مَعًا رَبَأَتْ أَتَى # لِيَقْطَعْ لِيَقْضُوا أَسْكِنُوا اللاَّمَ يَا أُولَى",
    "وَلُؤْلُؤٍ انْصِبْ ذِيْ وَأَنِّثْ يَنَالَ فِيْـ # ـهِمَا وَمُعَاجِزِيْنَ بِالْمَدِّ حُلِّلَا",
    "وَيَدْعُونَ الاُخْرَى فَتْحُ سِيْنَا حِمًى وَتُنْـ # -بِتُ افْتَحْ بِضَمٍّ يَحْلُ هَيْهَاتَ أُدْ كِلَا",
    "فَلِلتَّا اكْسِرَنْ وَالْفَتْحُ وَالضَّمُّ تَهْجُرُو # نَ تَنْوِيْنُ تَتْرَا آهِلٌ وَحُلىً بِلاَ",
    "وَإِنَّهُمُ افْتَحْ فِدْ وَقَالَ مَعًا فَتىً # وَخَفَّفْ فَرَضْنَا أَنْ مَعًا وَارْفَعِ الْوِلَا",
    "حَلاَ اشْدُدْهُمَا بَعْدُ انْصِبًا غَضِبَ افْتَحَنْ # نَ ضَادًا وَبَعْدُ الْخَفْضُ فِي اللهِ أُوْصِلَا",
    "وَلاَ يَتَأَلَّ اعْلَمْ وَكِبْرَهُ ضُمَّ حُطْ # وَغَيْرِ انْصِب اُدْ دُرِّيٌّ اضْمُمْ مُثَقِّلَا",
    "حِمىً فِدْ تَوَقَّدْ يَذْهَبُ اضْمُمْ بِكَسْرٍ اُدْ # وَيَحْسِبُ خَاطِبْ فُقْ وَحُقٌّ لِيُبْدِلَا",
  ]},
  {id:"durr-27",title:"وَمِنْ سُوْرَةِ الْفُرْقَانِ إِلَى سُوْرَةِ الرُّوْمِ",sub:"De sourate Al-Furqân à sourate Ar-Rûm",clr:["#0c2f35","#155a5e"],bayts:[
    "وَنَحْشُرُ يَا حُزْ إِذْ وَجُهِّلَ نَتَّخِذْ # أَلاَ اشْدُدْ تَشَقُّقْ جَمْعُ ذُرِّيَّةٍ حَلَا",
    "وَيَأْمُرُ خَاطِبْ فِدْ يَضِيْقُ وَعَطْفَهُ انْـ # -صِبَنَّ وَأَتْبَاعُكْ حَلاَ خَلْقُ أُوْصِلَا",
    "نَزَلْ شُدَّ بَعْدُ انْصِبْ وَنَوِّنْ سَبَأْ شِهَا # بِ حُزْ مَكُثَ افْتَحْ يَا وَإِذْ طَابَ قُلْ أَلَا",
    "وَإِنَّا وَإِنَّ افْتَحْ حَلاَ وَطَرَى خِطَا # بُ يَذَّكَّرُوا أَدْرَكْ أَلاَ هَادِ وَالْوِلَا",
    "فَتىً يُصْدِرَ افْتَحْ ضُمَّ أُدْ وَاضْمُمِ اكْسِرَنْ # حَلاَ وَيُصَدِّقْ فِه فَذَانِكَ يُعْتَلَا",
    "وَيُجْبَى فَأَنِّثْ طِبْ وَسَمِّ خُسِفْ وَنَشْـ # -أَةً حَافِظٌ وَانْصِبْ مَوَدَّةُ يُجْتَلَا",
    "وَنَوِّنْهُ وَانْصِبْ بَيْنَكُمْ فِي فَصَاحَةٍ # وَمَعْ وَيَقُولُ النُّوْنُ وَلَ كَسْرَهُ انْقُلَا",
  ]},
  {id:"durr-28",title:"سُوْرَةُ الرُّوْمِ وَلُقْمَانَ عليه السلام وَالسَّجْدَةِ",sub:"Sourates Ar-Rûm, Luqmân et As-Sajda",clr:["#0a1f3a","#153a63"],bayts:[
    "وَطِبْ يَرْجِعُوا خَاطِبْ لِتُرْبُوا وَضُمَّ حُزْ # يُذِيْقَهُمُ نُوْنٌ يَعِيْ كِسْفًا انْقُلَا",
    "وَضَعْفًا بِضَمٍّ رَحْمَةٌ نَصْبُ فُزْ وَيَتْـ # -تَخِذْ حُزْ تُصَعِّرْ إِذْ حَمَى نِعْمَةً حَلَا",
    "وَإِذْ خَلْقَهُ الإِسْكَانُ أُخْفِي حِمىً وَفَتْـ # -حُهُ مَعْ لِمَا فَصْلٌ وَبِالْكَسْرِ طِبْ وَلَا",
  ]},
  {id:"durr-29",title:"سُوْرَةُ الأَحْزَابِ وَسَبَأٍ وَفَاطِرٍ",sub:"Sourates Al-Ahzâb, Saba' et Fâtir",clr:["#0d2b2b","#1a4f4a"],bayts:[
    "مَعًا يَعْمَلُوا خَاطِبْ حُلىً وَالظُّنُونَ قِفْ # مَعَ اخْتَيْهِ مَدًّا فُقْ وَيَسَّاءَلُوا طُلَا",
    "وَسَادَاتِنَا اجْمَعْ بَيِّنَاتٍ حَوَى وَعَا # لِمٍ قُلْ فِنًا وَارْفَعْ طَمَا وَكَذَا حُلَى",
    "أَلِيْمٌ وَمِنْسَأْتَهْ حَمَى الْهَمْزَ فَاتِحًا # تَبَيَّنَتِ الضَّمَّانِ وَالْكَسْرُ طُوِّلَا",
    "كَذَا إِنْ تَوَلَّيْتُمْ وَفُقْ مَسْكَنِ اكْسِرَنْ # نُجَازِي اكْسِرَنْ بِالنُّوْنِ بَعْدُ انْصِبَنْ حَلَا",
    "كَذَلِكَ نَجْزِيْ كُلَّ بَاعَدَ رَبُّنَا افْـ # -تَحِ ارْفَعْ أُذِنْ فُزِّعْ يُسَمِّي حِمًى كِلَا",
    "وَفِي الْغُرْفَةِ اجْمَعْ فُزْ تَنَاؤُشُ وَاوُ حُمْ # وَغَيْرُ اخْفِضَنْ تَذْهَبْ فَضُمَّ اكْسِرَنْ أَلَا",
    "لَهُأبوجعفر نَفْسُكَ انْصِبْ يُنْقَصُ افْتَحْ وَضُمَّ حُزْ # وَفِي السَّيِّءِ اكْسِرْ هَمْزَهُ فُتُبَجَّلَا",
  ]},
  {id:"durr-30",title:"سُوْرَةُ يس وَالصَّافَّاتِ",sub:"Sourates Yâ-Sîn et As-Sâffât",clr:["#0a2540","#154568"],bayts:[
    "أَئِنْ فَافْتَحَنْ خَفِّفْ ذُكِرْتُمْ وَصَيْحَةً # وَوَاحِدَةً كَانَتْ مَعًا فَارْفَعِ الْعُلَا",
    "وَنَصْبُ الْقَمَرْ إِذْ طَابَ ذُرِّيَّةَ اجْمَعَن # حِمىً يَخْصِمُونَ اسْكِنْ أَلاَ اكْسِرْ فَتىً حَلَا",
    "وَشَدِّدْ فَشَا وَاقْصُرْ أَبًا فَاكِهِيْنَ فَا # كِهُو ضُمَّ بَا جُبْلًا حَلاَ اللاَّمَ ثَقِّلَا",
    "يَهُنْ نَنْكُسِ افْتَحْ ضُمَّ خَفِّفْ فِدًا وَحُطْ # لِيُنْذِرَ خَاطِبْ يَقْدِرُ الْحِقْفُ حُوِّلَا",
    "وَطَابَ هُنَا وَاحْذِفْ لِتَنْوِينِ زِيْنَةٍ # فِنًا وَاسْكِنَنْ أَوْ أُدْ وَكَالْبَزِّ أَوْصِلَا",
    "تَنَاصَرُوا اشْدُدْ تَا تَلَظَّى طُوًى يَزِفْـ # -فُ فَافْتَحْ فَتىً وَاللهُ رَبُّ انْصِبَنْ حَلَا",
    "وَرَبُّ وَإِلْيَاسِيْنَ كَالْبَصْرِ أُدْ وَكَالْـ # -مَدِيْنِي حَلاَ وَصْلُ اصْطَفَى أَصْلُهُ اعْتَلَا",
  ]},
  {id:"durr-31",title:"وَمِنْ سُوْرَةِ (ص) إِلَى سُوْرَةِ الأَحْقَافِ",sub:"De sourate Sâd à sourate Al-Ahqâf",clr:["#0e2e30","#1c5658"],bayts:[
    "لِيَدَّبَّرُوا خَاطِبْ وَفَا خَفَّ نُصْبِ صَا # دَهُ اضْمُمْ أَلاَ وَافْتَحْهُ وَالنُّونَ حُمِّلَا",
    "وَحُزْ يُوْعَدُوا خَاطِبْ وَأُدْ كَسْرَ أَنَّمَا # أَمَنْ شَدِّدِ اعْلَمْ فِدْ عِبَادَهُ أَوْصَلَا",
    "وَقُلْ حَسْرَتَايَ اعْلَمْ وَفَتْحٌ جَنًى وَسَكْـ # -كِنِ الْخُلْفَ بِنْ يَدْعُو اتْلُ أَوْ أَنْ وَقَلْبِ لَا",
    "تُنَوِّنْهُ وَاقْطَعِ ادْخُلُوا حُمْ سَيَدْخُلُو # نَ جَهِّلْ أَلاَ طِبْ أَنِّثَنْ يَنْفَعُ الْعُلَا",
    "سَوَاءٌ أَتَى اخْفِضْ حُزْ وَنَحْسَاتِ كَسْرُ حَا # وَنَحْشُرُ أَعْدَا الْيَا اتْلُ وَارْفَعْ مُجَهِّلَا",
    "وَبِالنُّوْنِ سَمَّى حُمْ يُبَشِّرُ فِي حِمًى # وَيُرْسِلُ يُوْحِيْ انْصِبْ أَلاَ عِنْدَ حُوِّلَا",
    "وَجِئْنَاكُمُ سَقْفًا كَبَصْرٍ إِذًا وَحُزْ # كَحَفْصٍ نُقَيِّضْ يَا وَأَسْوِرَةٌ حُلَا",
    "وَفِي سُلُفًا فَتْحَانِ ضُمَّ يَصِدُّ فُقْ # وَيَلْقَوْا كَسَالَ الطُّوْرِ بِالْفَتْحِ أُصِّلَا",
    "وَطِبْ يَرْجِعُونَ النَّصْبُ فِي قِيْلِهِ فَشَا # وَتَغْلِي فَذَكِّرْ طُلْ وَضَمُّ اعْتِلُوا حَلَا",
    "وَبِالْكَسْرِ إِذْ آيَاتٌ اكْسِرْ مَعًا حِمًى # وَبِالرَّفْعِ فُوْزٌ خَاطِبًا يُؤْمِنُوا طُلَا",
    "لِنَجْزِيْ بِيَا جَهِّلْ أَلاَ كُلُّ ثَانِيًا # بِنَصْبٍ حَوَى وَالسَّاعَةَ الرَّفْعُ فُصِّلَا",
  ]},
  {id:"durr-32",title:"وَمِنْ سُوْرَةِ الأَحْقَافِ إِلَى سُوْرَةِ الرَّحْمَنِ عز وجل",sub:"De sourate Al-Ahqâf à sourate Ar-Rahmân",clr:["#0a2030","#134560"],bayts:[
    "وَحُزْ فَصْلُهُ كُرْهًا تَرَى وَالْوِلاَ كَعَا # صِمٍ تَقْطَعُوا أُمْلِي اسْكِنِ الْيَاءَ حُلِّلَا",
    "وَنَبْلُوا كَذَا طِبْ يُؤْمِنُوا وَالثَّلاثَ خَا # طِبًا حُزْ سَيُؤْتِيْهِ بِنُونٍ يَلِيْ وِلَا",
    "وَحُطْ يَعْمَلُوا خَاطِبْ وَفَتْحَا تُقَدِّمُوا # حَوَى حُجُرَاتِ الْفَتْحُ فِي الْجِيْمِ أُعْمِلاَ",
    "وَإِخْوَتِكُمْ حِرْزٌ وَنُوْنَ يَقُولُ أُدْ # وَقَوْمِ انْصِبًا حِفْظًا وَوَاتَّبَعَتْ حَلَا",
    "وَبَعْدُ ارْفَعَنْ وَالصَّادُ فِي بِمُصَيْطِرٍ # مَعَ الْجَمْعِ فِدْ وَالْحَبْرُ كَذَّبَ ثَقَّلَا",
    "كَتَا اللاَّتَ طُلْ تَمْرُونَهُ حُمْ وَمُسْتَقِرْ # رٌ اخْفِضْ إِذًا سَتَعْلَمُو الْغَيْبُ فُصِّلَا",
  ]},
  {id:"durr-33",title:"وَمِنْ سُوْرَةِ الرَّحْمَنِ - عز وجل - إِلَى سُوْرَةِ الامْتِحَانِ",sub:"De sourate Ar-Rahmân à sourate Al-Mumtahana",clr:["#0a2a2e","#124a4f"],bayts:[
    "فَشَا الْمُنْشِآتُ افْتَحْ نُحَاسٌ طَوَى وَحُوْ # رُ عِيْنٌ فَشَا وَاخْفِضْ أَلاَ شُرْبَ فُضِّلَا",
    "بِفَتْحٍ فَرَوْحُ اضْمُمْ طُوَى وَحِمىً أُخِذْ # وَبَعْدُ كَحَفْصٍ أَنْظِرُوا اضْمُمْ وَصِلْ فُلَا",
    "وَيُؤْخَذُ أَنِّثْ إِذْ حَمَى نَزَلَ اشْدُدِ اذْ # وَخَاطِبْ يَكُونُوا طِبْ وَآتَاكُمُ حَلَا",
    "وَيَظَّاهَرُوا كَالشَّامِ أَنِّثْ مَعًا يَكُو # نُ دُوْلَةٌ اِذْ رَفْعٌ وَأَكْثَرُ حُصِّلَا",
    "وَفُزْ يَتَنَاجَوْ يَنْتَجُوا مَعْ تَنْتَجُو # طُوًى يُخْرِبُوا خَفِّفْهُ مَعْ جُدُرٍ حَلَا",
  ]},
  {id:"durr-34",title:"وَمِنْ سُوْرَةِ الامْتَحَانِ إِلَى سُوْرَةِ الْجِنِّ",sub:"De sourate Al-Mumtahana à sourate Al-Jinn",clr:["#0a2438","#123f5c"],bayts:[
    "وَيُفْصَلُ مَعْ أَنْصَارَ حَاوٍ كَحَفْصِهِمْ # لَوَوْا ثِقْلٌ اُدْ وَالْخِفُّ يَسْرِيْ أَكُنْ حَلَا",
    "وَيَجْمَعُكُمْ نُوْنٌ حِمًى وُجْدِ كَسْرُ يَا # تَفَاوُتِ فِدْ تَدْعُونَ فِي تَدَّعُوا حُلَى",
    "وَحُطْ يُؤْمِنُوا يَذَّكَّرُوا يَسْأَلُ اضْمُمًا # أَلاَ وَشَهَادَاتٍ خَطِيْئَاتِ حُمِّلَا",
  ]},
  {id:"durr-35",title:"وَمِنْ سُوْرَةِ الْجِنِّ إِلَى سُوْرَةِ الْمُرْسَلاتِ",sub:"De sourate Al-Jinn à sourate Al-Mursalât",clr:["#0c2f35","#155a5e"],bayts:[
    "وَأَنَّهْ تَعَالَى كَانَ لَمَّا افْتَحًا أَبٌ # تَقُولَ تَقَوَّلْ حُزْ وَقُلْ إِنَّمَا أَلَا",
    "وَقَالَ فَتىً يَعْلَمْ فَضُمَّ طَوَى وَحَا # مَ وَطْأً وَرَبُّ اخْفِضْ حَوَى الرِّجْزَ إِذْ حَلاَ",
    "فَضُمَّ وَإِذْ أَدْبَرْ حَكَىَ وَإذَا دَبَرْ # وَيَذْكُرُ أُدْ يُمْنَى حُلًى وَسَلاسِلَا",
    "لَدَى الْوَقْفِ فَاقْصُرْ طُلْ قَوَارِيْرَ أَوَّلاَ # فَنَوِّنْ فَتىً وَالْقَصْرُ فِي الْوَقْفِ طِبْ وَلَا",
    "وَعَالِيْهِمُ انْصِبْ فُزْ وَإِسْتَبْرَقُ اخْفِضًا # أَلاَ وَيَشَاءُونْ الْخِطَابُ حِمًى وِلَا",
  ]},
  {id:"durr-36",title:"وَمِنْ سُوْرَةِ الْمُرْسَلاتِ إِلَى سُوْرَةِ الْغَاشِيَةِ",sub:"De sourate Al-Mursalât à sourate Al-Ghâshiya",clr:["#0a1f3a","#153a63"],bayts:[
    "وَحُزْ أُقِّتَتْ هَمْزًا وَبِالْوَاوِ خَفَّ أُدْ # وَضُمَّ جِمَالاَتُ افْتَحِ انْطَلِقُواطُلَا",
    "بِثَانٍ وَقَصْرٌ لاَبِثِيْنَ يَدٌ وَمُدْ # دَ فُقْ رَبُّ وَالرَّحْمَنُ بِالْخَفْضِ حُمِّلَا",
    "تَزَكَّى حَلاَ اشْدُدْ نَاخِرَهْ طِبْ وَنُونُ مُنْـ # -ذِرٌ قُتِّلَتْ شَدِّدْ أَلاَ سُعِّرَتْ طِلَا",
    "وَحُزْ نُشِّرَتْ خَفِّفْ وَضَادُ ظَنِينِ يَا # تُكَذِّبُ غَيْبًا أُدْ وَتَعْرِفُ جَهِّلَا",
    "وَنَضْرَةُ حُزْ أُدْ وَاتْلُ يَصْلَى وَآخِرَ الْـ # بُرُوجِ كَحَفْصٍ يُؤْثِرُوا خَاطِبًا حُلَا",
  ]},
  {id:"durr-37",title:"وَمِنْ سُوْرَةِ الْغَاشِيَةِ إِلَى آخِرِ الْقُرْآنِ",sub:"De sourate Al-Ghâshiya à la fin du Coran",clr:["#0d2b2b","#1a4f4a"],bayts:[
    "وَيُسْمَعُ مَعْ مَا بَعْدَ كَالْكُوْفِ يَا أَخِي # وَإِيَّابَهُمْ شَدِّدْ فَقَدَّرَ أُعْمِلَا",
    "تَحُضُّونَ فَامْدُدْ إِذْ يُعَذِّبُ يُوْثِقُ افْـ # تَحًا فَكُّ إِطْعَامٌ كَحَفْصٍ حُلًى حَلَا",
    "وَقُلْ لُبَدًا مَعْهُ الْبَرِيَّةِ شُدَّ أُدْ # وَمَطْلَعِ فَاكْسِرْ فُزْ وَجَمَّعَ ثَقِّلَا",
    "أَلاَ يَعْلُ لِيْلافِ اتْلُ مَعْهُ إِلاَفِهِمْ # وَكُفْؤًا سُكُونُ الْفَاءِ حِصْنٌ تَكَمَّلَا",
    "وَتَمَّ نِظَامُ الدُّرَّةِ احْسِبْ بِعَدِّهَا # وَعَامَ أَضَاحَجِّي فَأَحْسِنْ تَفَؤُّلَا",
    "غَرِيْبَةُ أَوْطَانٍ بِنَجْدٍ نَظَمْتُهَا # وَعُظْمُ اشْتِغَالِ الْبَالِ وَافٍ وَكَيْفَ لاَ",
    "صُدِدْتُ عَنِ الْبَيْتِ الْحَرَامِ وَزَوْرِيَ الْـ # -مَقَامَ الشَّرِيْفَ الْمُصْطَفَى أَشْرَفَ الْمَلَا",
    "وَطَوَّقَنِي الأَعْرَابُ بِاللَّيْلِ غَفْلَةُ # فَمَا تَرَكُوا شَيْئًا وَكِدْتُ لأُقْتَلَا",
    "فَأَدْرَكَنِيْ اللُّطْفُ الْخَفِيُّ وَرَدَّنِيْ # عُنَيْزَةَ حَتَّى جَاءَنِي مَنْ تَكَفَّلَا",
    "بِحَمْلِي وَإِيْصَالِي لِطَيْبَةَ آمِنًا # فَيَا رَبِّ بَلِّغْنِي مُرَادِيْ وَسَهِّلَا",
    "وَمُنَّ بِجَمْعِ الشَّمْلِ وَاغْفِرْ ذُنَوبَنَا # وَصَلِّ عَلَى خَيْرِ الأَنَامِ وَمَنْ تَلَا",
  ]},
];

const TOTAL_DURR = DURRAH_ABWAB.reduce((s,b)=>s+b.bayts.length,0);

    "وَظُنَّ بِهِ خَيْرًا وَسَامِحْ نَسِيجَهُ # بِالاِغْضاَءِ وَالْحُسْنَى وَإِنْ كانَ هَلْهَلَا",
    "وَسَلِّمْ لإِحْدَى الْحُسْنَيَيْنِ إِصَابَةٌ # وَالاُخْرَى اجْتِهادٌ رَامَ صَوْبًا فَأَمْحَلَا",
    "وَإِنْ كانَ خَرْقُ فَادَّرِكْهُ بِفَضْلَةٍ # مِنَ الْحِلْمِ ولْيُصْلِحْهُ مَنْ جَادَ مِقْوَلَا",
    "وَقُلْ صَادِقًا لَوْلاَ الْوِئَامُ وَرُوحُهُ # لَطاَحَ الأَنَامُ الْكُلُّ فِي الْخُلْفِ وَالْقِلَا",
    "وَعِشْ سَالِمًا صَدْرًا وَعَنْ غِيبَةٍ فَغِبْ # تُحَضَّرْ حِظَارَ الْقُدْسِ أَنْقَى مُغَسَّلاَ",
    "وَهذَا زَمَانُ الصَّبْرِ مَنْ لَكَ بِالَّتِي # كَقَبْضٍ عَلَى جَمْرٍ فَتَنْجُو مِنَ الْبلَا",
    "وَلَوْ أَنَّ عَيْنًا سَاعَدتْ لتَوَكَّفَتْ # سَحَائِبُهَا بِالدَّمْعِ دِيْمًا وَهُطَّلَا",
    "وَلكِنَّها عَنْ قَسْوَةِ الْقَلْبِ قَحْطُهاَ # فَيَا ضَيْعَةَ الأَعْمَارِ تَمْشِى سَبَهْلَلَا",
    "بِنَفسِي مَنِ اسْتَهْدَىَ إلَى اللهِ وَحْدَهُ # وَكانَ لَهُ الْقُرْآنُ شِرْبًا وَمَغْسَلَا",
    "وَطَابَتْ عَلَيْهِ أَرْضُهُ فَتفَتَّقَتْ # بِكُلِّ عَبِيرٍ حِينَ أَصْبَحَ مُخْضَلَا",
    "فَطُوْبَى لَهُ وَالشَّوْقُ يَبْعَثُ هَمُّهُ # وَزَنْدُ الأَسَى يَهْتَاجُ فِي الْقَلْبِ مُشْعِلَا",
    "هُوَ المُجْتَبَى يَغْدُو عَلَى النَّاسِ كُلِّهِمْ # قَرِيبًا غَرِيبًا مُسْتَمَالًا مُؤَمَّلَا",
    "يَعُدُّ جَمِيعَ النَّاسِ مَوْلىً لأَنَّهُمْ # عَلَى مَا قَضَاهُ اللهُ يُجْرُونَ أَفْعُلَا",
    "يَرَى نَفْسَهُ بِالذَّمِّ أَوْلَى لأَنَّهَا # عَلَى المَجْدِ لَمْ تَلْعقْ مِنَ الصَّبْرِ وَالْأَلَا",
    "وَقَدْ قِيلَ كُنْ كَالْكَلْبِ يُقْصِيهِ # أَهْلُهُ وَمَا يَأْتَلِي فِي نُصْحِهِمْ مُتَبَذِّلَا",
    "لَعَلَّ إِلهَ الْعَرْشِ يَا إِخْوَتِي يَقِي # جَمَاعَتَنَا كُلَّ المَكاَرِهِ هُوَّلَا",
    "وَيَجْعَلُنَا مِمَّنْ يَكُونُ كِتاَبُهُ # شَفِيعًا لَهُمْ إِذْ مَا نَسُوْهُ فَيمْحَلَا",
    "وَبِاللهِ حَوْلِى وَاعْتِصَامِي وَقُوَّتِى # وَمَالِيَ إِلاَّ سِتْرُهُ مُتَجَلِّلَا",
    "فَيَا رَبِّ أَنْتَ اللهُ حَسْبِي وَعُدَّتِي # عَلَيْكَ اعْتِمَادِي ضَارِعًا مُتَوَكِّلَا",
  ]},
  {id:"shat-02",title:"بَابُ الاسْتِعَاذَةِ",sub:"Al-Isti'âdha (formule de refuge)",clr:["#0a2438","#123f5c"],bayts:[
    "إِذَا مَا أَرَدْتَ الدَّهْرَ تَقْرَأُ فَاسْتَعِذْ # جِهَارًا مِنَ الشَّيْطَانِ بِاللهِ مُسْجَلاَ",
    "عَلَى مَا أَتَى فِي النَّحْلِ يُسْرًا # وَإِنْ تَزِدْ لِرَبِّكَ تَنْزِيهًا فَلَسْتَ مُجَهَّلَا",
    "وَقَدْ ذَكَرُوا لَفْظَ الرَّسُولِ فَلَمْ يَزِدْ # وَلَوْ صَحَّ هذَا النَّقْلُ لَمْ يُبْقِ مُجْمَلَا",
    "وَفِيهِ مَقَالٌ فِي الأُصُولِ فُرُوعُهُ # فَلاَ تَعْدُ مِنْهَا بَاسِقًا وَمُظَلِّلَا",
    "وَإِخْفَاؤُهُ فَصْلٌ أَبَاهُ وَعُاَتُنَا # وَكَمْ مِنْ فَتىً كالْمَهْدَوِي فِيهِ أَعْمَلَا",
  ]},
  {id:"shat-03",title:"بَابُ الْبَسْمَلَةِ",sub:"Al-Basmala",clr:["#0c2f35","#155a5e"],bayts:[
    "وَبَسْمَلَ بَيْنَ السُّورَتَيْنِ بِسُنَّةٍ # رِجَالٌ نَمَوْهاَ دِرْيَةً وَتَحَمُّلَا",
    "وَوَصْلُكَ بَيْنَ السُّورَتَيْنِ فَصَاحَةٌ # وَصِلْ وَاسْكُتَنْ كُلٌّ جَلاَيَاهُ حَصَّلَا",
    "وَلاَ نَصَّ كَلاَّ حُبَّ وجْهٌ ذَكَرْتُهُ # وَفِيهاَ خِلاَفٌ جِيدُهُ وَاضِحُ الطُّلَا",
    "وسَكْتُهُمُ الْمُخْتَارُ دُونَ تَنَفُّسٍ # وَبَعْضُهُمُ فِي الأَرْبِعِ الزُّهْرِ بَسْمَلَا",
    "لَهُمْ دُونَ نَصٍّ وَهْوَ فِيهِنَّ سَاكِتٌ # لِحَمْزَةَ فَافْهَمْهُ وَلَيْسَ مُخَذَّلَا",
    "وَمَهْمَا تَصِلْهَا أَوْ بَدَأْتَ بَرَاءَةً # لِتَنْزِيْلِهاَ بالسَّيْفِ لَسْتَ مُبَسْمِلَا",
    "وَلاَ بُدَّ مِنْهاَ فِي ابْتِدَائِكَ سُورَةً # سِوَاهاَ وَفي الأَجْزَاءِ خَيَّرَ مَنْ تَلَا",
    "وَمَهْمَا تَصِلْهَا مَعْ أَوَاخِرِ سُورَةٍ # فَلاَ تَقِفَنَّ الدَّهْرَ فِيهاَ فَتَثْقُلَا",
  ]},
  {id:"shat-04",title:"سُوْرَةُ أُمِّ الْقُرْآنِ",sub:"Sourate Al-Fâtiha",clr:["#0a1f3a","#153a63"],bayts:[
    "وَمَالِكِ يَوْمِ الدِّينِ رَاوِيهِ نَاَصِرٌ # وَعَنْدَ سِرَاطٍ وَالسِّرَاطَ لِ قُنْبُلَا",
    "بِحَيْثُ أَتَى وَالصَّادُ زَايًا اشِمَّهَا # لَدَى خَلَفٍ وَاشْمِمْ لِخَلاَّدِ الاَوَّلَا",
    "عَلَيْهِمْ إِلَيْهِمْ حَمْزَةٌ وَلَدَيْهِموُ # جَمِيعًا بِضَمِّ الْهاءِ وَقْفًا وَمَوْصِلاَ",
    "وَصِلْ ضَمَّ مِيمِ الْجَمْعِ قَبْلَ مُحَرَّكٍ # دِرَاكًا وَقاَلُونٌ بِتَخْيِيرِهِ جَلَا",
    "وَمِنْ قَبْلِ هَمْزِ الْقَطْعِ صِلْهَا لِوَرْشِهِمْ # وَأَسْكَنَهاَ الْبَاقُونَ بَعْدُ لِتَكْمُلَا",
    "وَمِنْ دُونِ وَصْلٍ ضَمُّهَا قَبْلَ سَاكِنٍ # لِكُلٍ وَبَعْدَ الْهَاءِ كَسْرُ فَتَى الْعَلَا",
    "مَعَ الْكَسْرِ قَبْلَ الْهَا أَوِ الْيَاءِ سَاكِنًا # وَفي الْوَصْلِ كَسْرُ الْهَاءِ بالضَّمِّ شَمْلَلَا",
    "كَمَا بِهِمُ الأَسْبَابُ ثُمَّ عَلَيْهِمُ الْـ # قِتَالُ وَقِفْ لِلْكُلِّ بِالْكَسْرِ مُكْمِلَا",
  ]},
  {id:"shat-05",title:"بَابُ الإدْغَامِ الْكَبِيرِ",sub:"Le grand Idghâm",clr:["#0d2b2b","#1a4f4a"],bayts:[
    "وَدُونَكَ الاُِدْغَامَ الْكَبِيرَ وَقُطْبُهُ # أَبُو عَمْرٍو الْبَصْرِيُّ فِيهِ تَحَفَّلَا",
    "فَفِي كِلْمَةٍ عَنْهُ مَنَاسِككُّمْ وَمَا # سَلَككُّمْ وَبَاقِي الْبَابِ لَيْسَ مُعَوَّلَا",
    "وَمَا كَانَ مِنْ مِثْلَيْنِ فِي كِلْمَتَيْهِمَا # فَلاَ بُدَّ مِنْ إدْغَامِ مَا كانَ أَوَّلَا",
    "كَيَعْلَمُ مَا فِيهِ هُدًى وَطُبِعْ عَلَى # قُلُوبِهِمُ وَالْعَفْوَ وَأْمُرْ تَمَثَّلَا",
    "إِذَا لَمْ يَكُنْ تَا مُخْبِرٍ أَوْ مُخَاطَبٍ # أوِ الْمُكْتَسِي تنْوِينَهُ أَوْ مُثَقَّلَا",
    "كَكُنْتُ تُرَابًا أَنْتَ تُكْرِهُ وَاسِعٌ # عَلِيمٌ وَأَيْضًا تَمَّ مِيقاَتُ مُثِّلَا",
    "وَقَدْ أَظْهَرُوا فِي الْكَافِ يَحْزُنْكَ كُفْرُهُ # إِذِ النُّونُ تُخْفَى قَبْلَهَا لِتُجَمَّلَا",
    "وَعِنْدَهُمُ الْوَجْهَانِ في كُلِّ مَوْضِعٍ # تَسَمَّى لِأَجْلِ الْحَذْفِ فِيهِ مُعَلَّلَا",
    "كَيَبْتَغِ مَجْزُومًا وَإِنْ يَكُ كاذِبا # وَيَخْلُ لَكُمْ عَنْ عَالِمٍ طَيِّبِ الْخَلَا",
    "وَيَا قَوْمِ مَالِي ثُمَّ يَا قَوْمِ مَنْ بِلاَ # خِلاَفٍ عَلَى الْإِدْغَامِ لاَ شَكَّ أُرْسِلَا",
    "وَإِظْهَارُ قَوْمٍ آلَ لُوطٍ لِكَوْنِهِ # قَلِيلَ حُرُوفٍ رَدَّه مَنُْ تَنَبَّلَا",
    "بِإِدْغاَمِ لَكَ كَيْدًا وَلَوْ حَجَّ مُظْهِرٌ # بِإِعْلاَلِ ثَانِيهِ إِذَا صَحَّ لاَعْتَلَا",
    "فَإِبْدَالُهُ مِنْ هَمْزَةٍ هَاءٌ اَصْلُهَا # وَقَدْ قَالَ بَعْضُ النَّاسِ مِنْ وَاوٍ ابْدِلَا",
    "وَوَاوَ هُوَ الْمَضْمومُ هَاءً َكَهُو وَمَنْ # فَأَدْغِمْ وَمَنْ يُظْهِرْ فَبِالْمَدِّ عَلَّلَا",
    "وَيَأْتِيَ يَوْمٌ أَدْغَمُوهُ وَنَحْوَهُ # وَلاَ فَرْقَ يُنْجِي مَنْ عَلَى الْمَدِّ عَوَّلَا",
    "وَقَبْلَ يَئِسْنَ الْيَاءُ في الَّلاءِ عَارِضٌ # سُكُونًا أَوَ اصْلًا فَهُوَ يُظْهِرُ مُسْهِلَا",
  ]},
  {id:"shat-06",title:"بَابُ إِدْغَامِ الْحَرْفَيْنِ الْمُتَقَارِبَيْنِ فِي كِلْمَةٍ وَفِي كِلْمَتَيْنِ",sub:"Idghâm des lettres proches",clr:["#0a2540","#154568"],bayts:[
    "وَإِنْ كِلْمَةٌ حَرْفَانِ فِيهَا تَقَارَبَا # فإِدْغَامُهُ لِلْقَافِ في الْكافِ مُجْتَلَا",
    "وَهذَا إِذَا مَا قَبْلَهُ مُتَحَرِّكٌ # مُبِينٌ وَبَعْدَ الْكافِ مِيمٌ تَخَلَّلَا",
    "كَيَرْزُقُكُمْ وَاثقَكُّمُوا وَخَلَقكُّمُو # وَمِيثَاقَكُمْ أَظْهِرْ وَنَرْزُقُكَ انْجَلَا",
    "وَاِدْغَامُ ذِي التَّحْرِيمِ طَلَّقَكُنَّ قُلْ # أَحَقُّ وَبِالتَّأْنِيثِ وَالْجَمْعِ أُثْقِلَا",
    "وَمَهْماَ يَكُونَا كِلْمَتَيْنِ فَمُدْغِمٌ # أَوَائِلَ كِلْمِ الْبَيْتِ بَعْدُ عَلَى الْوِلَا",
    "شِفَا لَمْ تَضِقْ نَفْسًا بِهَا رُمْ دَوَا ضنٍ # ثَوَى كانَ ذَا حُسْنٍ سَأَى مِنْهُ قَدْ جَلَا",
    "إِذَا لَمْ يُنَوَّنْ أَوْ يَكُنْ تَا مُخَاطَبٍ # وَمَا لَيْسَ مَجْزُومًا وَلاَ مُتَثَقِّلَا",
    "فَزُحْزِحْ عَنِ النَّارِ الَّذِي حَاهُ مُدْغَمٌ # وَفي الْكاَفِ قَافٌ وَهْوَ في الْقَافِ أُدْخِلَا",
    "خَلَقْ كُلَّ شَيْءٍ لَكْ قُصُورًا وأُظْهِرَا # إِذَا سَكَنَ الْحَرْفُ الَّذِي قَبْلُ أُقْبِلاَ",
    "وَفي ذِي المَعَارِجِ تَعْرُجُ الْجِيمُ مُدْغَمٌ # وَمِنْ قَبْلُ أَخْرَج شَّطْأَهُ قَدْ تَثَقَّلَا",
    "وَعِنْدَ سَبِيلًا شِينُ ذِي الْعَرْشِ مُدْغَمٌ # وَضَادَ لِبَعْضِ شَأْنِهِمْ مُدْغَمًا تَلَا",
    "وَفي زُوِّجَتْ سِينُ النُّفُوسِ وَمُدْغَمٌ # لَهُ الرَّاْسُ شَيْبًا بِاخْتِلاَفٍ تَوَصَّلَا",
    "وَلِلدَّالِ كِلْمٌ تُرْبُ سَهْلٍ ذَكَا شَذًا # ضَفَا ثَمَّ زُهْدٌ صِدْقُهُ ظَاهِرٌ جلَا",
    "وَلَمْ تُدَّغَمْ مَفْتُوحَةً بَعْدَ سَاكِنٍ # بِحَرْفٍ بِغَيْرِ التَّاءِ فَاعْلَمْهُ وَاعْمَلَا",
    "وَفِي عَشْرِهَا وَالطَّاءِ تُدْغَمُ تَاؤُهَا # وَفي أَحْرُفٍ وَجْهَانِ عَنْهُ تَهَلَّلَا",
    "فَمَعْ حُمِّلُوا التَّوْرَاةَ ثُمَّ الزَّكَاةَ قُلْ # وَقُلْ آتِ ذَا الْ وَلْتَأْتِ طَائِفَةٌ عَلَا",
    "وَفي جِئْتِ شَيْئًا أَظْهَرُوا لِخِطَابِهِ # وَنُقْصَانِهِ وَالْكَسْرُ الاِدْغَامَ سَهَّلَا",
    "وَفي خَمْسَةٍ وَهْيَ الأَوائِلُ ثَاؤُهَا # وَفي الصَّادِ ثُمَّ السِّينِ ذَالٌ تَدَخَّلَا",
    "وَفي الَّلامِ رَاءٌ وَهْيَ في الرَّا وَأُظْهِرَا # إِذا انْفَتَحَا بَعدَ المُسَكَّنِ مُنْرَلَا",
    "سِوَى قالَ ثُمَّ النُّونُ تُدْغَمُ فِيهِمَا # عَلَى إِثْرِ تَحْرِيكٍ سِوَى نَحْنُ مُسْجَلَا",
    "وَتُسْكُنُ عَنْهُ الْمِيمُ مِنْ قَبْلِ بَائِهَا # عَلَى إِثْرِ تَحْرِيكٍ فَتَخْفَى تَنَزُّلَا",
    "وَفي مَنْ يَشَاءُ با يُعَذِّبُ حَيْثُمَا # أَتَى مُدْغَمٌ فَادْرِ الأُصُولَ لِتَأْصُلَا",
    "وَلاَ يَمْنَعُ الإِدْغامُ إِذْ هُوَ عَارِضٌ # إِمَالَةَ كَالأَبْرَارِ وَالنَّارِ أَثْقِلَا",
    "وَأَشْمِمْ وَرُمْ فِي غَيْرِ بَاءٍ وَمِيمِهَا # مَعَ الْبَاءِ أَوْ مِيمٍ وَكُنْ مُتَأَمِّلاَ",
    "وَإِدْغَامُ حَرْفٍ قَبْلَهُ صَحَّ سَاكِنٌ # عَسِيرٌ وَبِالإِخْفَاءِ طَبَّقَ مَفْصِلَا",
    "خُذِ الْعَفْوَ وَأْمُرْ ثُمَّ مِنْ بَعْدِ ظُلْمِهِ # وَفي المَهْدِ ثُمَّ الخُلْدِ وَالْعِلْمِ فَاشْمُلَا",
  ]},
  {id:"shat-07",title:"بَابُ هَاءِ الْكِنَايَةِ",sub:"Le Hâ' de rappel (Kinâya)",clr:["#0e2e30","#1c5658"],bayts:[
    "وَلَمْ يَصِلُوا هَا مُضْمَرٍ قَبْلَ سَاكِنٍ # وَمَا قَبْلَهُ التَّحْرِيكُ لِلْكُلِّ وُصِّلَا",
    "وَمَا قَبْلَهُ التَّسْكِينُ لاِبْنِ كَثِيرِهِمْ # وَفِيهِ مُهَانًا مَعْهُ حَفْصٌ أَخُو وِلَا",
    "وَسَكِّنْ يُؤَدِّهْ مَعْ نُوَلِّهْ وَنُصْلِهِ # وَنُؤْتِهِ مِنْهَا فَاعَتَبِرْ صَافِيًا حَلَا",
    "وَعَنْهُمْ وَعَنْ حَفْصٍ فَأَلْقِهْ وَيَتَّقِهْ # حَمَى صَفْوَهُ قَوْمٌ بِخُلْفٍ وَأَنْهَلَا",
    "وَقُلْ بسُكُونِ الْقَافِ وَالْقَصْرِ حَفْصُهُمْ # وَيَاْتِهْ لَدَى طه بِالاِسْكَانِ يُجْتَلَا",
    "وَفي الْكُلِّ قَصْرُ الْهَاءِ بَانَ لِسَانُهُ # بخُلْفٍ وَفِي طَهَ بِوَجْهَيْنِ بُجِّلَا",
    "وَإِسْكَانُ يَرْضَهُ يُمْنُهُ لُبْسُ طَيِّبٍ # بِخُلْفِهِمِاَ وَالْقَصُرَ فَاذْكُرْهُ نَوْفَلَا",
    "لَهُ الرَّحْبُ وَالزِّلْزَالُ خَيْرًا يَرَهْ بِهَا # وَشَرًّا يَرَهْ حَرْفَيْهِ سَكِّنْ لِيَسْهُلَا",
    "وَعى نَفَرٌ أَرْجِئْهُ بِالْهَمْزِ سَاكِنا # وَفي الْهَاءِ ضَمٌّ لَفَّ دَعْوَاهُ حَرْمَلَا",
    "وَأَسْكِنْ نَصِيرًا فَازَ وَاكْسِرْ لِغَيْرِهِمْ # وَصِلْهَا جوَادًا دُونَ رَيْبٍ لِتُوصَلَا",
  ]},
  {id:"shat-08",title:"بَابُ الْمَدِّ وَالْقَصْرِ",sub:"Madd et Qasr (prolongations)",clr:["#0a2030","#134560"],bayts:[
    "إِذَا أَلِفٌ أَوْ يَاؤُهَا بَعْدَ كَسْرَةٍ # أَوِ الْوَاوُ عَنْ ضَمٍّ لَقِي الْهَمْزَ طُوِّلَا",
    "فَإِنْ يَنْفَصِلْ فَالْقَصْرَ بَادِرْهُ طَالِبًا # بِخُلْفِهِماَ يُرْوِيكَ دَرًّا وَمُخْضَلَا",
    "كَجِئَ وَعَنْ سُوءٍ وَشَاءَ اتِّصَالُهُ # وَمَفْصُولُهُ في أُمِّهَا أَمْرُهُ إِلَى",
    "وَمَا بَعْدَ هَمْزٍ ثَابِتٍ أَوْ مُغَيَّرٍ # فَقَصْرٌ وَقَدْ يُرْوَى لِوَرْش مُطَوَّلَا",
    "وَوَسَّطَهُ قَوْمٌ كَآمَنَ هَؤُلاَ # ءِآلِهَةً آتى لِلاِيْمَانِ مُثِّلَا",
    "سِوى يَاءِ إِسْرَاءيِلَ أَوْ بَعْدَ سَاكِنٍ # صَحِيحٍ كَقُرْآنِ وَمَسْئُولًا اسْأَلَا",
    "وَمَا بَعْدَ هَمْزِ الْوَصْلِ إيتِ # وَبَعْضُهُمْ يُؤَاخِذُكُمْ آلانَ مُسْتَفْهِمًا تَلَا",
    "وَعَادً الاُولَى وَابْنُ غَلْبُونَ طَاهِرٌ # بِقَصْرِ جَمِيعِ الْبَاب قَالَ وَقَوَّلَا",
    "وَعَنْ كُلِّهِمْ بِالْمَدِّ مَا قَبْلَ سَاكِنٍ # وعِنْدَ سُكُونِ الْوَقْفِ وَجْهَانِ أُصِّلا",
    "وَمُدَّ لَهُ عِنْدَ الْفَوَاتِحِ مُشْبِعا # وَفي عَيْنٍ الْوَجْهَانِ وَالطُّولُ فُضِّلَا",
    "وَفي نَحْوِ طهَ الْقَصْرُ إِذْ لَيْسَ سَاكِنٌ # وَمَا فِي أَلِفْ مِنْ حَرْفِ مَدٍ فَيُمْطَلَا",
    "وَإِنْ تَسْكُنِ الْيَا بَيْنَ فَتْحٍ وَهَمْزَةٍ # بِكِلْمَةٍ أَوْ وَاوٌ فَوَجْهَانِ جُمِّلَا",
    "بِطُولٍ وَقَصْرٍ وَصْلُ وَرْشٍ وَوَقْفُهُ # وَعِنْدَ سُكُونِ الْوَقْفِ لِلْكُلِّ أُعْمِلَا",
    "وَعَنْهُمْ سُقُوطُ الْمَدِّ فِيهِ وَوَرْشُهُمْ # يُوَافِقُهُمْ فِي حَيْثُ لا هَمْزَ مُدْخَلَا",
    "وَفِي وَاوِ سَوْآتٍ خِلاَفٌ لِوَرْشِهِمْ # وَعَنْ كُلٍ الْمَوْءُودَةُ اقْصُرْ وَمَوْئِلَا",
  ]},
  {id:"shat-09",title:"بَابُ الْهَمْزَتَيْنِ مِنْ كَلِمَةٍ",sub:"Les deux Hamza dans un mot",clr:["#0a2a2e","#124a4f"],bayts:[
    "وَتَسْهِيلُ أُخْرَى هَمْزَتَيْنِ بِكِلْمةٍ # سَمَا وَبِذَاتِ الْفتْحِ خُلْفٌ لِتَجْمُلَا",
    "وَقُلْ أَلِفًا عَنْ أَهْلِ مِصْرَ تَبَدَّلَّتْ # لِوَرْشٍ وَفي بَغْدَادَ يُرْوَى مُسَهَّلَا",
    "وَحَقَّقَهَا فِي فُصِّلَتْ صُحْبَةٌ ءأَعْـ # جَمِيٌّ وَالاْولَى أَسْقِطَنَّ لِتُسْهِلاَ",
    "وَهَمْزَة أَذْهَبْتُمْ فِي الاَحْقَافِ شُفِّعَتْ # بِأُخْرَى كَمَا دَامَتْ وِصَالًا مُوَصَّلَا",
    "وَفِي نُونَ فِي أَنْ كَانَ شَفَّعَ حَمْزَةٌ # وَشُعْبَةُ أَيْضًا وَالدِّمَشْقِيْ مُسَهِّلَا",
    "وَفِي آلِ عِمْرَانٍ عَنِ ابْنِ كَثِيرِهِمْ # يُشَفَّعُ أَنْ يُؤْتَى إِلَى مَا تَسَهَّلَا",
    "وَطه وفِي الأَعْرَافِ وَالشُّعَرَا بِهَا # ءَآمَنْتُمُ لِلكُلِّ ثَالِثًا ابْدِلَا",
    "وَحَقَّقَ ثَانٍ صُحْبَةٌ وَلِقُنْبُلٍ # بِإِسْقَاطِهِ الأُولَى بِطَهَ تُقُبِّلَا",
    "وَفي كُلِّهَا حَفْصٌ وَأَبْدَلَ قُنْبُلٌ # فِي اْلاَعْرَافِ مِنْهَا الْوَاوَ وَالْمُلْكِ مُوْصِلَا",
    "وَإِنْ هَمْزُ وَصْلٍ بَيْنَ لاَمٍ مُسَكَّنٍ # وَهَمْزَةِ الاِسْتِفْهَامِ فَامْدُدْهُ مُبْدِلَا",
    "فَلِلْكُلِّ ذَا أَوْلى وَيَقْصُرُهُ الَّذِي # يُسَهِّلُ عَنْ كُلِّ كَآلانَ مُثِّلَا",
    "وَلاَ مَدَّ بَيْنَ الْهَمْزَتَيْنِ هُنَا وَلاَ # بِحَيْثُ ثَلاَثٌ يَتَّفِقْنَ تَنَزُّلَا",
    "وَأَضْرُبُ جَمْعِ الْهَمْزَتَيْنِ ثَلاَثَةٌ # ءأَنْذَرْتَهُمْ أَمْ لَمْ أَئِنَّا أَءُنْزِلَا",
    "وَمَدُّكَ قَبْلَ الْفَتْحِ وَالْكَسْرِ حُجَّةٌ # بِهَا لُذُّ وَقَبْلَ الْكَسْرِ خُلْفٌ لَهُ وَلَا",
    "وَفي سَبْعَةٍ لاَ خُلْفَ عَنْهُ بِمَرْيَمٍ # وَفي حَرْفَيِ الأَعْرَافِ وَالشُّعَرَا الْعُلَا",
    "أَئِنَّكَ آئِفْكًا مَعًا فَوْقَ صَادِهَا # وَفي فُصِّلَتْ حَرْفٌ وَبِالخُلْفِ سُهِّلَا",
    "وَآئِمَّةً بِالخُلْفِ قَدْ مَدَّ وَحْدَهُ # وَسَهِّلْ سَمَا وَصْفًا وَفي النَّحْوِ أُبْدِلَا",
    "وَمَدُّكَ قَبْلَ الضَّمِّ لَبَّى حَبِيبُهُ # بِخُلْفهِمَا بَرَّا وَجَاءَ لِيَفْصِلَا",
    "وَفي آلِ عِمْرَانَ رَووْا لِهِشَامِهِمْ # كَحَفْصٍ وَفي الْبَاقِي كَقَالُونَ وَاعْتَلاَ",
  ]},
  {id:"shat-10",title:"بَابُ الْهَمْزَتَيْنِ مِنْ كَلِمَتَيْنِ",sub:"Les deux Hamza entre deux mots",clr:["#0a2438","#123f5c"],bayts:[
    "وَأَسْقَطَ الأُولَى في اتِّفَاقِهِمَا مَعًا # إِذَا كَانَتَا مِنْ كِلْمَتَيْنِ فَتَى الْعُلَا",
    "كَجَا أَمْرُنَا مِنَ السَّماَ إِنَّ أَوْلِيَا # أُولَئِكَ أَنْوَاعُ اتِّفَاقٍ تَجَمَّلَا",
    "وَقَالُونُ وَالْبَزِّيُّ في الْفَتْحِ وَافَقَا # وَفي غَيْرِهِ كَالْياَ وَكَالْوَاوِ سَهَّلَا",
    "وَبِالسُّوءِ إِلاَّ أَبْدَلاَ ثُمَّ أَدْغَمَا # وَفِيهِ خِلاَفٌ عَنْهُمَا لَيْسَ مُقْفَلَا",
    "وَالاُخْرَى كَمَدٍّ عِنْدَ وَرْشٍ وَقُنْبُلٍ # وَقَدْ قِيلَ مَحْضُ المَدِّ عَنْهَا تَبَدَّلَا",
    "وَفي هؤُلاَ إِنْ وَالْبِغَا إِنْ لِوَرْشِهِمْ # بِيَاءٍ خَفِيفِ الْكَسْرِ بَعْضُهُمْ تَلَا",
    "وَإِنْ حَرْفُ مَدٍّ قَبْلَ هَمْزٍ مُغَيَّرٍ # يَجُزْ قَصْرُهُ وَالْمَدُّ مَا زَالَ أَعْدَلَا",
    "وَتَسْهِيلُ الاُخْرَى في اخْتِلاَفِهِماَ سَمَا # تَفِيءَ إِلَى مَعْ جَاءَ أُمَّةً اُنْزِلَا",
    "نَشَاءُ أَصَبْنَا والسَّماءِ أَوِ ائْتِنَا # فَنَوْعَانِ قُلْ كالْيَا وَكَالْوَاوِ سُهِّلَا",
    "وَنَوْعَانِ مِنْهَا أُبْدِلاَ مِنْهُمَا وَقُلْ # يَشَاءُ إِلى كالْيَاءِ أَقْيَسُ مَعْدِلَا",
    "وَعَنْ أَكْثَرِ الْقُرَّاءِ تُبْدَلُ وَاوُهَا # وَكُلٌّ بِهَمْزِ الْكُلِّ يَبْدَا مُفَصِّلَا",
    "وَالاِبْدَالُ مَحْضٌ وَالْمُسَهَّلُ بَيْنَ مَا # هُوَ الْهَمْزُ وَالحَرْفُ الَّذِي مِنهُ أُشْكِلَا",
  ]},
  {id:"shat-11",title:"باب الهمز المفرد",sub:"Le Hamza isolé",clr:["#0c2f35","#155a5e"],bayts:[
    "إِذَا سَكَنَتْ فَاءً مِنَ الْفِعْلِ هَمْزَةٌ # فَوَرْشٌ يُرِيهَا حَرْفَ مَدٍّ مُبَدِّلَا",
    "سِوَى جُمْلَةِ الإِيوَاءِ وَالْوَاوُ عَنْهُ إِنْ # تَفَتَّحَ إِثْرَ الضَّمِّ نَحْوُ مُؤَجَّلَا",
    "وَيُبْدَلُ لِلسُّوسِيِّ كُلُّ مُسَكَّنٍ # مِنَ الْهَمْزِ مَدًّا غَيْرَ مَجْزُومٍ اْهْمِلاَ",
    "تَسُؤْ وَنَشَأْ سِتٌّ وَعَشْرٌ يَشَأ وَمَعْ # يُهَيِّئْ وَنَنْسَأْهَا يُنَبَّأْ تَكَمَّلَا",
    "وَهَيِّئْ وَأَنْبِئْهُمْ وَنَبِّئْ بِأَرْبَعٍ # وَأَرْجِئْ مَعًا وَاقْرَأْ ثَلاَثًا فَحَصِّلَا",
    "وتُؤْوِي وَتُؤْوِيهِ أَخَفُّ بِهَمْزِهِ # وَرِئْيًا بِتَرْكِ الْهَمْزِ يُشْبِهُ الامْتِلَا",
    "وَمُؤْصَدَةٌ أَوْصَدتُّ يُشْبِهُ كُلُّهُ # تَخَيَّرَهُ أَهْلُ الأَدَاءِ مُعَلِّلَا",
    "وَبَارِئِكُمُ بِالْهَمْزِ حَالَ سُكُونِهِ # وَقَالَ ابْنَ غَلْبُونٍ بِيَاءٍ تَبَدَّلَا",
    "وَوَالاَهُ في بِئْرٍ وَفي بِئْسَ وَرْشُهُمْ # وَفي الذِّئْبِ وَرْشٌ وَالْكِسَائِي فَأَبْدَلَا",
    "وَفي لُؤْلُؤٍ في العُرْفِ وَالنُّكْرِ شُعْبَةٌ # وَيَأْلِتْكُمُ الدُّورِي وَالاِبْدَالُ يُجْتَلَا",
    "وَوَرْشٌ لِئَلاَّ والنَّسِيءُ بِيَائِهِ # وَأَدْغَمَ في يَاءِ النَّسِىءِ فَثَقَّلَا",
    "وَإِبْدَالُ أُخْرَى الْهَمْزَتَيْنِ لِكُلِّهِمْ # إِذَا سَكَنَتْ عَزْمٌ كَآدَمَ أُوهِلَا",
  ]},
  {id:"shat-12",title:"بَابُ نَقْلِ حَرَكَةِ الْهَمْزَةِ إِلَى السَّاكِنِ قَبْلَهَا",sub:"Transfert de la voyelle du Hamza",clr:["#0a1f3a","#153a63"],bayts:[
    "وَحَرِّكْ لِوَرْشٍ كُلَّ سَاكِنٍ آخِرٍ # صَحِيحٍ بِشَكْلِ الْهَمْزِ واحْذِفْهُ مُسْهِلَا",
    "وَعَنْ حَمْزَةٍ في الْوَقْفِ خُلْفٌ وَعِنْدَهُ # رَوَى خَلَفٌ في الْوَصْلِ سَكْتًا مُقَلَّلَا",
    "وَيَسْكُتُ في شَيْءٍ وَشَيْئًا وَبَعْضُهُمْ # لَدَى الَّلامِ لِلتَّعْرِيفِ عَنْ حَمْزَةٍ تَلَا",
    "وَشَيْءٍ وَشَيْئًا لَمْ يَزِدْ وَلِنَافِعٍ # لَدَى يُونُسٍ آلانَ بِالنَّقْلِ نُقِّلَا",
    "وَقُلْ عَادًا الأُوْلَى بِإِسْكَانِ لامِهِ # وَتَنْوِينُهُ بِالْكَسْرِ كَاسِيهِ ظَلَّلَا",
    "وَأَدْغَمَ بَاقِيهِمْ وَبِالنَّقْلِ وَصْلُهُمْ # وَبَدْؤُهُمُ وَالْبَدْءُ بِالأَصْلِ فُضِّلاَ",
    "لِقَالُونَ وَالْبَصْرِي وَتُهْمَزُ وَاوُهُ # لِقَالُونَ حَالَ النَّقْلِ بَدْءًا وَمَوْصِلَا",
    "وَتَبْدَاْ بِهَمْزِ الْوَصْلِ في النَّقْلِ كُلِّهِ # وَإِنْ كُنْتَ مُعْتَدًّا بِعَارِضِهِ فَلَا",
    "وَنقْلُ رِدًا عَنْ نَافِعٍ وَكِتَابِيَهْ # بِالاِسْكانِ عَنْ وَرْشٍ أَصَحُّ تَقَبَّلَا",
  ]},
  {id:"shat-13",title:"بَابُ وَقْفِ حَمْزَةَ وَهِشَامٍ عَلَى الْهَمْزِ",sub:"Arrêt de Hamza et Hishâm sur le Hamza",clr:["#0d2b2b","#1a4f4a"],bayts:[
    "وَحَمْزَةُ عِنْدَ الْوَقْفِ سَهَّلَ هَمْزَهُ # إِذَا كَانَ وَسْطًا أَوْ تَطَرَّفَ مَنْزِلَا",
    "فَأَبْدِلْهُ عَنْهُ حَرْفَ مَدِّ مُسَكِّنًا # وَمِنْ قَبْلِهِ تَحْرِيكُهُ قَدْ تَنَزَّلَا",
    "وَحَرِّكْ بِهِ مَا قَبْلَهُ مَتَسَكِّنًا # وَأَسْقِطْهُ حَتَّى يَرْجِعَ اللَّفْظُ أَسْهَلَا",
    "سِوَى أَنَّهُ مِنْ بَعْدِ مَا أَلِفٍ جَرى # يُسَهِّلُهُ مَهْمَا تَوَسَّطَ مَدْخَلَا",
    "وَيُبْدِلُهُ مَهْمَا تَطَرَّفَ مِثْلَهُ # وَيَقْصُرُ أَوْ يَمْضِي عَلَى الْمَدِّ أَطْوَلَا",
    "وَيُدْغِمُ فِيهِ الْوَاوَ وَالْيَاءَ مُبْدِلا # إِذَا زِيدَتَا مِنْ قَبْلُ حَتَّى يُفَصَّلَا",
    "وَيُسْمِعُ بَعْدَ الْكَسْرِ وَالضَّمِّ هَمْزَهُ # لَدى فَتْحِهِ يَاءًا وَوَاوًا مُحَوَّلَا",
    "وَفي غَيْرِ هذَا بَيْنَ بَيْنَ وَمِثْلُهُ # يَقُولُ هِشَامٌ مَا تَطَرَّفَ مُسْهِلَا",
    "وَرِءْيَا عَلَى إِظْهَارِهِ وَإِدْغَامِهِ # وَبَعْضٌ بِكَسْرِ الْهَا لِيَاءٍ تَحَوَّلَا",
    "كَقَوْلِكَ أَنْبِئْهُمْ وَنَبِّئْهُمُ وَقَدْ # رَوَوْا أَنَّهُ بِالخَطِّ كانَ مُسَهِّلَا",
    "فَفِي الْيَا يَلِي والْوَاوِ وَالحَذْفِ رَسْمَهُ # وَالاَخْفَشُ بَعْدَ الْكَسْرِ والضَّمِّ أَبْدَلَا",
    "بِيَاءٍ وَعَنْهُ الْوَاوُ في عَكْسِهِ وَمَنْ # حَكَى فِيهِمَا كَالْيَا وَكَالْوَاوِ أَعْضَلاَ",
    "وَمْسْتَهْزِءُونَ الْحَذْفُ فِيهِ وَنَحْوُهُ # وَضَمٌّ وَكَسْرٌ قَبْلُ قِيلَ وَأُخْمِلًا",
    "وَمَا فِيهِ يُلْفَى وَاسِطًا بِزَوَائِدٍ # دَخَلْنَ عَلَيْهِ فِيهِ وَجْهَانِ أُعْمِلَا",
    "كَمَا هَا وَيَا وَالَّلامِ وَالْبَا وَنَحْوِهَا # وَلاَمَاتِ تَعْرِيفٍ لِمَنْ قَدْ تَأَمَّلَا",
    "وَأَشْمِمْ وَرُمُ فِيمَا سِوى مُتَبَدِّلٍ # بِهَا حَرْفَ مَدٍّ وَاعْرِفِ الْبَابَ مَحْفِلًا",
    "وَمَا وَاوٌ اَصْلِيٌّ تَسَكَّنَ قَبْلَهُ # أوِ الْيَا فَعَنْ بَعْضٍ بِالاِدْغَامِ حُمِّلَا",
    "وَمَا قَبْلَهُ التَحْرِيكُ أَوْ أَلِفٌ مُحَرْ # رَكًا طَرَفًا فَالْبَعْضُ بالرَّوْمِ سَهَّلَا",
    "وَمَنْ لَمْ يَرُمْ وَاعَتدَّ مَحْضًا سُكُونَهُ # وَألْحَقَ مَفْتُوحًا فَقَدْ شَذَّ مُوغِلَا",
    "وَفِي الْهَمْزِ أَنْحَاءٌ وَعِنْدَ نُحَاتِهِ # يُضِيءُ سَنَاهُ كُلَّمَا اسْوَدَّ أَلْيَلَا",
  ]},
  {id:"shat-14",title:"بَابُ الإِظْهَارِ وَالإِدْغَامِ",sub:"Al-Izhâr et Al-Idghâm",clr:["#0a2540","#154568"],bayts:[
    "سأَذْكُرُ أَلْفَاظًا تَلِيهَا حُرُوفُهَا # بالاِظْهَارِ وَالإدْغَامِ تُرْوىَ وَتُجْتَلَا",
    "فَدُونَكَ إِذْ فِي بَيْتهَا وَحُرُوفَهَا # وَمَا بَعْدُ بالتَقْييدِ قُدْهُ مُذَلَّلَا",
    "سَأُسْمِي وَبَعْدَ الْوَاوِ تَسْمُو حُرُوفُ مَنْ # تَسَمَّى عَلَى سِيمَا تَرُوقُ مُقَبَّلَا",
    "وَفِي دَالِ قَدْ أَيْضًا وَتَاءِ مُؤَنَّثٍ # وَفِي هَلْ وَبَلْ فَاحْتَلْ بِذِهْنِكَ أَحْيَلَا",
  ]},
  {id:"shat-15",title:"ذِكْرُ ذَالِ إِذْ",sub:"Le Dhâl de « idh »",clr:["#0e2e30","#1c5658"],bayts:[
    "نَعَمْ إِذْ تَمَشَّتْ زَيْنَبٌ صَالَ دَلُّهَا # سَمِيَّ جَمَالٍ وَاصِلًا مَنْ تَوَصَّلا",
    "فإِظْهَارُهَا أجْرى دوَامَ نَسِيْمِهَا # وَأَظْهَرَ رَيَّا قوْلِهِ وَاصِفٌ جَلَا",
    "وَأَدْغَمَ ضَنْكًا وَاصِلٌ تُومَ دُرِّه # وَأَدْغَمْ مُوْلَى وُجْدُهُ دائمٌ وَلَا",
  ]},
  {id:"shat-16",title:"ذِكْرُ دَالِ قَدْ",sub:"Le Dâl de « qad »",clr:["#0a2030","#134560"],bayts:[
    "وَقَدْ سَحَبَتْ ذيْلًا ضَفَا ظَلَّ زَرْنَبٌ # جلَتْهُ صبَاهُ شاَئِقًا وَمُعَلَّلَا",
    "فَاظْهَرَهَا نَجمٌ بدَا دَلَّ وَاضِحًا # وَأَدْغَمَ وَرْشٌ ضَرَّ ظمْآنَ وَامْتَلَا",
    "وَأَدْغَمَ مُرْوٍ وَاكِفٌ ضَيْرَ ذَابِلٍ # زَوَى ظِلَّهُ وَغْرٌ تَسَدَّاهُ كَلْكلَا",
    "وَفِي حَرْفِ زَيَّنَا خِلاَفٌ وَمُظْهِرٌ # هِشَامٌ بِصَادٍ حَرْفَهُ مُتَحمِّلَا",
  ]},
  {id:"shat-17",title:"ذِكْرُ تَاءِ التَّأْنِيثِ",sub:"Le Tâ' du féminin",clr:["#0a2a2e","#124a4f"],bayts:[
    "وَأَبْدَتْ سَنَا ثَغْرٍ صَفَتْ زُرْقُ ظَلْمِهِ # جمَعْنَ وُرُودًا بَارِدًا عَطِرَ الطِّلَا",
    "فإِظْهَارُهُ دُرٌّ نَمَتْهُ بُدُورُهُ # وَأَدْغَمَ وَرْشٌ ظَافِرًا وَمُخَوِّلَا",
    "وَأَظْهَرَ كهْفٌ وَافِرٌ سَيْبُ جُودِهِ # زَكيٌّ وَفيٌّ عُصْرَةً وَمُحَلَّلَا",
    "وَاظْهَرَ رَاوِيهِ هِشَامٌ لَهُدِّمَتْ # وَفِي وَجَبَتْ خُلْفُ ابْنِ ذَكْوانَ يُفْتَلَا",
  ]},
  {id:"shat-18",title:"ذِكْرُ لامِ هَلْ وَبَلْ",sub:"Le Lâm de « hal » et « bal »",clr:["#0a2438","#123f5c"],bayts:[
    "أَلاَ بَلْ وَهَلْ تَرْوِي ثَنَا ظَعْنِ زَيْنَبٍ # سَمِيرَ نَوَاهَا طِلْحَ ضُرٍ وَمُبْتَلَا",
    "فَأَدْغَمَهَا رَاوٍ وَأَدْغَمَ فَاضِلٌ # وَقُورٌ ثنَاهُ سَرَّ تَيْمًا وَقَدْ حَلَا",
    "وَبَلْ فِي النِّسَا خَلاَّدُهُمْ بِخِلاَفِهِ # وَفِي هَلْ تَرَى الإدْغَامُ حُبَّ وَحُمِّلَا",
    "وَأَظْهِرْ لَدَى وَاعٍ نَبِيلٍ ضَمَانُهُ # وَفِي الرَّعْدِ هَلْ وَاسْتَوْفِ لاَ زَاجِرًا هَلاُ",
  ]},
  {id:"shat-19",title:"بَابُ اتِّفَاقِهِمْ فِي إِدْغَامِ إِذْ وَقَدْ وَتَاءِ التَّأْنِيثِ وَهَلْ وَبَلْ",sub:"Accord sur l'Idghâm (idh, qad, tâ', hal, bal)",clr:["#0c2f35","#155a5e"],bayts:[
    "وَلاَ خُلفَ فِي الإِدْغَامِ إِذْ ذَلَّ ظاَلِمٌ # وَقَدْ تيَّمَتْ دَعْدٌ وَسِيمًا تَبَتَّلَا",
    "وَقَامَتْ تُرِيْهِ دُمْيَةٌ طِيْبَ وَصْفِهَا # وَقُلْ بَلْ وَهَلْ رَاهَا لَبِيْبٌ وَيَعْقِلَا",
    "وَمَا أَوْلُ الْمِثْلَينِ فِيهِ مُسَكَّنٌ # فَلاَ بُدَّ مِنْ إِدْغَامِهِ مُتَمَثِّلاَ",
  ]},
  {id:"shat-20",title:"بَابُ حُرُوفٍ قَرُبَتْ مَخَارِجُهَا",sub:"Lettres aux points d'articulation proches",clr:["#0a1f3a","#153a63"],bayts:[
    "وَإِدْغَامُ بَاءِ الْجَزْمِ فِي الْفَاءٍ قَدْ رَسَا # حَمِيدًا وَخَيِّرْ فِي يَتُبْ قاَصِدًا وَلَا",
    "وَمَعْ جَزْمِهِ يَفْعَلْ بِذَلِكَ سَلَّمُوا # وَنَخْسِفْ بِهِمْ رَاعَوْا وَشَذَّا تَثَقُّلًا",
    "وَعُذْتُ عَلَى إِدْغَامِهِ وَنَبَذْتُهاَ # شَوَاهِدُ حَمَّادٍ وَأَورِثْتُمُوا حَلَا",
    "لَهُ شَرْعُهُ وَالرَّاءُ جَزْمًا بِلاَمِهاَ # كَوَاصِبرْ لِحُكْمِ طالَ بُالْخُلْفُ يَذْبُلَا",
    "وَيَاسِيْنَ أَظْهِرْ عنْ فَتًى حَقُهُ بَدَا # وَنُونَ وَفيهِ الْخُلْفُ عَنْ وَرْشِهِمْ خَلَا",
    "وَحِرْمِيُّ نَصْرٍ صَادَ مَرْيَمَ مَنْ يُرِدْ # ثَوَابَ لَبِثْتَ الْفَرْدَ وَالجَمْعُ وَصَّلَا",
    "وَطاسِيْنَ عِنْدَ الْمِيْمِ فَازَ اتَخَذْتُمْ # أَخَذْتُمْ وَفِي الإِفْرَادِ عاشَرَ دَغْفَلَا",
    "وَفِي ارْكَبْ هُدَى بَرٍّ قَرِيبٍ بِخُلْفِهِمْ # كَمَا ضاَعَ جاَ يَلْهَثْ لَهُ دَارِ جُهَّلَا",
    "وَقَالُونُ ذُو خُلْفٍ وَفِي الْبَقَرَهْ فَقُلْ # يُعَذِّبْ دَنَا بِالْخُلْفِ جَوْدًا وَمُوبِلَا",
  ]},
  {id:"shat-21",title:"بَابُ أَحْكَامِ النُّوْنِ السَّاكِنَةِ وَالتَّنْوِيْنِ",sub:"Le Nûn Sâkin et le Tanwîn",clr:["#0d2b2b","#1a4f4a"],bayts:[
    "وَكُلُّهُمُ التَّنْوينَ وَالنُّونَ أَدْغَمُوا # بِلاَ غُنَّةٍ فِي اللاَّمِ وَالرَّا لِيَجْمُلَا",
    "وَكُلٌّ بِيَنْمُو أَدْغَمُوا مَعَ غُنَّةٍ # وَفِي الْوَاوِ وَالْيَا دُونَهَا خَلَفٌ تَلَا",
    "وَعِنْدَهُمَا لِلكُلِّ أَظْهِرْ بِكِلْمَةٍ # مَخَافَةَ إِشْبَاهِ الْمُضَاعَفِ أَثْقَلَا",
    "وَعِنْدَ حُرُوفِ الْحَلْقِ لِلكُلِ أُظْهِرَا # أَلاَ هاَجَ حُكْمٌ عَمَّ خاَلِيْهِ غُفَّلَا",
    "وَقَلْبُهُمَا مِيْمًا لَدَى الْبَا وَأَخْفِيَا # عَلَى غُنَّةٍ عِنْدَ الْبَوَاقِي لِيَكْمُلَا",
  ]},
  {id:"shat-22",title:"بَابُ الْفَتْحِ وَالإِمَالَةِ وَبَيْنَ اللَّفْظَيْنِ",sub:"Al-Fath et Al-Imâla",clr:["#0a2540","#154568"],bayts:[
    "وَحَمْزَةُ مِنْهُمْ وَالْكِسَائِيُّ بَعْدَهُ # أَمَالاَ ذَوَاتِ الْياَءِ حَيْثُ تأَصَّلَا",
    "وَتَثْنِيَةُ الأَسْماءِ تَكْشِفُهَا وَإِنْ # رَدَدْتَ إِلَيْكَ الْفِعْلَ صَادَفْتَ مَنْهلَا",
    "هَدَى وَاشْتَرَاهُ وَالْهَوَى وَهُدَاهُمُ # وَفِي أَلِفِ التَّأْنِيثِ فِي الْكُلِّ مَيَّلَا",
    "وَكَيْفَ جَرَتْ فَعْلَى فَفِيهَا وُجُودُهَا # وَإِنْ ضُمَّ أَوْ يُفْتَحْ فَعَالَى فَحَصِّلَا",
    "وَفِي اسْمٍ فِي الاِستِفْهَامِ أَنَّى وَفِي مَتَى # مَعًا وَعَسَى أَيْضًا أَمَالاَ وَقُلْ بَلَى",
    "وَمَا رَسَمُوا بالْيَاءِ غَيْرَ لَدَى وَمَا # زَكَى وَإِلَى مِنْ بَعْدُ حَتَّى وَقُلْ عَلَى",
    "وَكُلُّ ثُلاَثِيٍّ يَزِيْدُ فَإِنَّهُ # مُمَالٌ كَزَكَّاهَا وَأَنْجَى مَعَ ابْتَلَى",
    "وَلَكِنَّ أَحْيَا عَنْهُمَا بَعْدَ وَاوِهِ # وَفِيمَا سَوَاهُ لِلكِسَائِيِّ مُيِّلًا",
    "وَرُءْيَايَ وَالرءُيَا وَمَرْضَاتِ كَيْفَمَا # أَتَى وَخَطَايَا مِثْلُهُ مُتَقَبَّلًا",
    "وَمَحْيَاهُمُو أَيْضًا وَحَقَّ تُقَاتِهِ # وَفِي قَدْ هَدَانِي لَيْسَ أمْرُكَ مُشْكِلَا",
    "وَفِي الْكَهْفِ أَنْسَانِيْ وَمِنْ قَبْلُ جَاءَ مَنْ # عَصَانِيْ وَأَوْصَانِيْ بِمَرْيَمَ يُجْتَلَا",
    "وَفِيهَا وَفِي طَاسِيْنَ آتَانِيَ الَّذِي # أَذَعْتُ بِهِ حَتَّى تَضَوَّعَ مَنْدَلَا",
    "وَحَرَفُ تَلاَهَا مَعْ طَحَاهَا وَفِي سَجَى # وَحَرْفُ دَحَاهَا وَهْيَ بِالْوَاوِ تُبْتَلَا",
    "وَأَمَّا ضُحَاهَا وَالضُّحَى وَالرِّبا مَعَ الْـ # قُوَى فَأَمَالاَهَا وَبِالْوَاوِ تُخْتَلَا",
    "وَرُؤيَاكَ مَعْ مَثْوَايَ عَنْهُ لِحَفْصِهِمْ # وَمَحْيَايَ مِشْكَاةٍ هُدَايَ قَدِ انجَلَا",
    "وَممَّا أَمَالاَهُ أَوَاخِرُ آيِ مَا # بطِه وَآيِ الْنَّجْمِ كَيْ تَتَعَدَّلاَ",
    "وَفِي الشَّمْسِ وَالأَعْلَى وَفِي اللَّيْلِ وَالضُّحَى # وَفِي اقْرَأَ وَفِي وَالنَّازِعَاتِ تَمَيَّلَا",
    "وَمِنْ تَحْتِهَا ثُمَّ الْقِيَامَةِ فِي الْـ # مَعَارِجِ يا مِنْهَالُ أَفْلَحْتَ مُنْهِلَا",
    "رَمَى صُحْبَةٌ أَعْمَى فِي الاِسْراءِ ثَانِيًا # سُوًى وَسُدًى فِي الْوَقْفِ عَنْهُمْ تَسَبَّلاِ",
    "وَرَاءُ تَراءَى فازَ فِي شُعَرَائِهِ # وَأَعْمى فِي الاِسْرا حُكْمُ صُحْبَةٍ اَوَّلَا",
    "وَمَا بَعْدَ رَاءٍ شَاعَ حُكْمًا وَحَفْصُهُمْ # يُوَالِي بِمَجْرَاهَا وَفي هُودَ أُنْزِلَا",
    "نَأَى شَرْعُ يُمْنٍ بِاخْتِلاَفٍ وَشُعْبَةٌ # في الاِسْرَا وَهُمْ وَالنُّونُ ضَوْءُ سَنًا تَلَا",
    "إِنَاهُ لَهُ شَافٍ وَقُلْ أَوْ كِلاَهُمَا # شَفَا وَلِكَسْرٍ أَوْ لِيَاءٍ تَمَيَّلَا",
    "وَذُو الرَّاءِ وَرْشٌ بَيْنَ بَيْنَ وَفي أَرَا # كَهُمْ وَذَوَاتِ الْيَا لَهُ الْخُلْفُ جُمِّلَا",
    "وَلكِنْ رُءُوسُ الآيِ قَدْ قَلَّ فَتْحُهَا # لَهُ غَيْرَ مَاهَا فِيهِ فَاحْضُرْ مُكَمَّلَا",
    "وَكَيْفَ أَتَتْ فَعْلَى وَآخِرُ آيِ مَا # تَقَدَّمَ لِلبَصْرِيْ سِوَى رَاهُمَا اعْتَلَا",
    "وَيَا وَيْلَتَى أَنَّى وَيَا حَسْرَتَى طَوَوْا # وعَنْ غَيْرِهِ قِسْهَا وَيَا أَسَفَى الْعُلَا",
    "وَكَيْفَ الثُّلاَثِيْ غَيْرَ زَاغَتْ بِمَاضِيٍ # أَمِلْ خَابَ خَافُوا طَابَ ضَاقَتْ فَتُجْمِلَا",
    "وَحَاقَ وَزَاغُوا جَاءَ شَاءَ وَزَادَ فُزْ # وَجَاءَ ابْنُ ذَكْوَانٍ وَفِي شَاءَ مَيَّلَا",
    "فَزَادَهُمُ الأُولَى وَفِي الْغَيْرِ خُلْفُهُ # وَقُلْ صُحْبَةٌ بَلْ رَانَ وَاصْحَبْ مُعَدَّلَا",
    "وَفِي أَلِفَاتٍ قَبْلَ رَا طَرَفٍ أَتَتْ # بِكَسْرٍ أَمِلْ تُدْعَى حَمِيدًا وَتُقْبَلاَ",
    "كَأَبْصَارِهِمْ وَالدَّارِ ثُمَّ الْحِمَارِ مَعْ # حِمَارِكَ وَالْكُفَّارِ وَاقْتَسْ لِتَنْضُلَا",
    "وَمَعْ كَافِرِينَ الْكافِرِينَ بِيَائِهِ # وَهَارٍ رَوَى مُرْوٍ بِخُلْفٍ صَدٍ حَلَا",
    "بَدَارِ وَجَبَّارِينَ وَالْجَارِ تَمَّمُوا # وَوَرْشٌ جَمِيعَ الْبَابِ كَانَ مُقَلِّلَا",
    "وَهذَانِ عَنْهُ بِاخْتِلاَفٍ وَمَعَهُ في الْـ # بَوَارِ وَفي الْقَهَّارِ حَمْزَةُ قَلَّلَا",
    "وَإِضْجَاعُ ذِي رَاءَيْنِ حَجَّ رُوَاتُهُ # كَالأَبْرَارِ وَالتَّقْلِيلُ جادَلَ فَيْصَلَا",
    "وَإِضْجَاعُ أَنْصَارِي تَمِيمٌ وَسَارِعُوا # نُسَارِعُ وَالْبَارِي وَبَارِئِكُمْ تَلَا",
    "وَآذَانِهِمْ طُغْيَانِهِمْ وَيُسَارِعُـ # ونَ آذَانِنَا عَنْهُ الْجَوَارِي تَمَثَّلَا",
    "يُوَارِي أُوَارِي فِي العُقُودِ بِخُلْفِهِ # ضِعَافًا وَحَرْفَا النَّمْلِ آتِيكَ قُوَّلَا",
    "بِخُلْفٍ ضَمَمْنَاهُ مَشَارِبُ لَامِعٌ # وَآنِيَةٍ فِي هَلْ أَتَاكَ لِأَعْدَلَا",
    "وَفِي الْكَافِرُونَ عَابِدُونَ وَعَابِدٌ # وَخُلْفُهُمُ في النَّاسِ في الْجَرِّ حُصِّلَا",
    "حِمَارِكَ وَالمِحْرَابِ إِكْرَاهِهِنَّ وَالْـ # حِمَارِ وَفي الإِكْرَامِ عِمْرَانَ مُثِّلَا",
    "وَكُلٌّ بِخُلْفٍ لاِبْنِ ذَكْوَانَ غَيْرَ مَا # يُجَرُّ مِنَ الْمِحْرَابِ فَاعْلَمْ لِتَعْمَلَا",
    "وَلاَ يَمْنَعُ الإِسْكَانُ فِي الْوَقْفِ عَارِضًا # إِمَالَةَ مَا لِلكَسْرِ فِي الْوَصْلِ مُيِّلَا",
    "وَقَبْلَ سُكُونٍ قِفْ بِمَا فِي أُصُولِهِمْ # وَذُو الرَّاءِ فِيهِ الخُلْفُ في الْوَصْلِ يُجُتَلَا",
    "كَمُوسَى الْهُدَى عِيسَى ابْنَ مَرْيَمَ والْقُرَى الْ # لَتِي مَعَ ذِكْرَى الدَّارِ فَافْهَمْ مُحَصِّلَا",
    "وَقَدْ فَخَّمُوا التَّنْوِينَ وَقْفًا وَرَقَّقُوا # وَتَفْخِيمُهُمْ في النَّصْبِ أَجْمَعُ أَشْمُلاَ",
    "مُسَمَّى وَمَوْلًى رَفْعُهُ مَعْ جَرِّهِ # وَمَنْصُوبُهُ غُزَّى وَتَتْرًا تَزَيَّلَا",
  ]},
  {id:"shat-23",title:"بَابُ مَذْهَبِ الْكِسَائِيِّ فِي إِمَالَةِ هَاءِ التَّأْنِيثِ فِي الْوَقْفِ",sub:"Imâla du Hâ' du féminin (Al-Kisâ'î)",clr:["#0e2e30","#1c5658"],bayts:[
    "وَفِي هَاءِ تَأْنِيثِ الْوُقُوفِ وَقَبْلَهَا # مُمَالُ الْكِسَائِيْ غَيْرَ عَشْرٍ لِيَعْدِلَا",
    "وَيَجْمَعُهَا حَقٌ ضِغَاطُ عَصٍ خَظَا # وَأَكْهَرُ بَعْدَ الْيَاءِ يَسْكُنُ مُيِّلَا",
    "أَوِ الْكَسْرِ وَالإِسْكَانُ لَيْسَ بِحَاجِزٍ # وَيَضْعُفُ بَعْدَ الْفَتْحِ وَالضَّمِّ أَرْجُلَا",
    "لَعِبْرَهْ مِائَهْ وِجْهَهْ وَلَيْكَهْ وَبَعْضُهُمْ # سِوى أَلِفٍ عِنْدَ الْكِسَائِيِّ مَيَّلَا",
  ]},
  {id:"shat-24",title:"بَابُ مَذَاهِبِهِمْ فِي الرَّاءَاتِ",sub:"Les Râ' (roulement du Ra')",clr:["#0a2030","#134560"],bayts:[
    "وَرَقَّقَ وَرْشٌ كُلَّ رَاءٍ وَقَبْلَهَا # مُسَكَّنَةً يَاءٌ أَوِ الْكَسْرُ مُوصَلَا",
    "وَلَمْ يَرَ فَصْلًا سَاكِنًا بَعْدَ كَسْرَةٍ # سِوى حَرْفِ الاِسْتِعْلاَ سِوَى الْخَا فَكَمَّلَا",
    "وَفَخَّمَهَا في الأَعْجَمِيِّ وَفِي إِرَمْ # وَتَكْرِيرِهَا حَتَّى يُرى مُتَعَدِّلَا",
    "وَتَفْخِيمُهُ ذِكْرًا وَسِتْرًا وَبَابَهُ # لَدى جِلَّةِ الأَصْحَابِ أَعْمَرُ أَرْحُلَا",
    "وَفي شَرَرٍ عَنْهُ يُرَقِّقُ كُلُّهُمْ # وَحَيْرَانَ بِالتَّفْخِيمِ بَعْضٌ تَقَبَّلَا",
    "وَفي الرَّاءِ عَنْ وَرْشٍ سِوَى مَا ذَكَرْتُهُ # مَذَاهِبُ شَذَّتْ فِي الأَدَاءِ تَوَقُّلَا",
    "وَلاَ بُدَّ مِنْ تَرْقِيِقِهاَ بَعْدَ كَسْرَةٍ # إِذَا سَكَنَتْ ياَ صَاحِ لِلسَّبْعَةِ المَلا",
    "وَمَا حَرْفُ الاِسْتِعْلاَءُ بَعْدُ فَرَاؤُهُ # لِكُلِّهِمُ التَّفْخِيمُ فِيهاَ تَذَلَّلَا",
    "وَيَجْمَعُهاَ قِظْ خُصَّ ضَغْطٍ وَخُلْفُهُمْ # بِفِرْقٍ جَرى بَيْنَ المَشَايِخِ سَلْسَلَا",
    "وَمَا بَعْدَ كَسْرٍ عَارِضٍ أَوْ مُفَصَّلٍ # فَفَخِّمْ فَهذاَ حُكْمُهُ مُتَبَذِّلاَ",
    "وَمَا بَعْدَهُ كَسْرٌ أَوِ الْيَا فَمَا لَهُمْ # بِتَرْقِيقِهِ نَصٌّ وَثِيقٌ فَيَمْثُلَا",
    "وَمَا لِقِيَاسٍ فِي الْقِرَاءة مَدْخَلٌ # فَدُونَكَ مَا فِيهِ الرِّضاَ مُتَكَفِّلَا",
    "وَتَرْقِيقُهاَ مَكْسُورَةً عِنْدَ وَصْلِهِمْ # وَتَفْخِيمُهاَ في الْوَقْفِ أَجْمَعُ أَشْمُلَا",
    "وَلكِنَّهَا في وَقْفِهِمْ مَعَ غَيْرِهاَ # تُرَقَّقُ بَعْدَ الْكَسْرِ أَوْ مَا تَمَيَّلَا",
    "أَوِ الْيَاء تَأْتِي بِالسُّكُونِ وَرَوْمُهُمْ # كَمَا وَصْلِهِمْ فَابْلُ الذَّكَاءَ مُصَقَّلَا",
    "وَفِيماَ عَدَا هذَا الَّذِي قَدْ وَصَفْتُهُ # عَلَى الأَصْلِ بِالتَّفْخِيمِ كُنْ مُتَعَمِّلَا",
  ]},
  {id:"shat-25",title:"بَابُ اللَّامَاتِ",sub:"Les Lâm",clr:["#0a2a2e","#124a4f"],bayts:[
    "وَغَلَّظَ وَرْشٌ فَتْحَ لاَمٍ لِصَادِهاَ # أَوِ الطَّاءِ أَوْ لِلظَّاءِ قَبْلُ تَنَزُّلَا",
    "إِذَا فُتِحَتْ أَوْ سُكِّنَتْ كَصَلاتِهِمْ # وَمَطْلَعِ أَيْضًا ثمَّ ظَلَّ وَيُوصَلَا",
    "وَفي طَالَ خُلْفٌ مَعْ فِصَالًا وَعِنْدَماَ # يُسَكَّنُ وَقْفًا وَالمُفَخَّمُ فُضِّلَا",
    "وَحُكْمُ ذَوَاتِ الْياَءِ مِنْهاَ كَهذِهِ # وَعِنْدَ رُءُوسِ الآيِ تَرْقِيقُهاَ اعْتَلَا",
    "وَكُلٌّ لَدَى اسْمِ اللهِ مِنْ بَعْدِ كَسْرَةٍ # يُرَقِّقُهَا حَتَّى يَرُوقَ مُرَتَّلَا",
    "كَمَا فَخَّمُوهُ بَعْدَ فَتْحٍ وَضَمَّةٍ # فَتَمَّ نِظَامُ الشَّمْلِ وَصْلًا وَفَيْصَلَا",
  ]},
  {id:"shat-26",title:"بَابُ الْوَقْفِ عَلَى أَوَاخِرِ الْكَلِمِ",sub:"L'arrêt en fin de mot",clr:["#0a2438","#123f5c"],bayts:[
    "وَالاِسْكَانُ أَصْلُ الْوَقْفِ وَهْوَ اشْتِقَاقُهُ # مِنَ الْوَقْفِ عَنْ تَحْرِيكِ حَرْفٍ تَعَزَّلَا",
    "وَعِنْدَ أَبِي عَمْرٍو وَكُوفِيِّهِمْ بِهِ # مِنَ الرَّوْمِ وَالإِشْمَامِ سَمْتٌ تَجَمَّلَا",
    "وَأَكْثَرُ أَعْلاَمِ الْقُرَانِ يَرَاهُما # لِسَائِرِهِمْ أَوْلَى الْعَلاَئِقِ مِطْوَلاَ",
    "وَرَوْمُكَ إِسْمَاعُ المُحَرَّكِ وَاقِفًا # بِصَوْتٍ خَفِيٍّ كُلَّ دَانٍ تَنَوَّلَا",
    "وَالاِشْمَامُ إِطْبَاقُ الشِّفَاهِ بُعَيْدَ مَا # يُسَكَّنُ لاَ صَوْتٌ هُنَاكَ فَيَصْحَلَا",
    "وَفِعْلُهُماَ في الضَّمِّ وَالرَّفْعِ وَارِدٌ # وَرَوْمُكَ عِنْدَ الْكَسْرِ وَالْجَرِّ وُصِّلَا",
    "وَلَمْ يَرَهُ في الْفَتْحِ وَالنَّصْبِ قَارِئٌ # وَعِنْدَ إِمَامِ النَّحْوِ في الْكُلِّ أُعْمِلَا",
    "وَمَا نُوِّعَ التَّحْرِيكُ إِلاَّ لِلاَزِمٍ # بِنَاءً وَإِعْرَابًا غَداَ مُتَنَقِّلَا",
    "وَفي هَاءِ تَأْنِيثٍ وَمِيمِ الْجَمِيعِ قُلْ # وَعَارِضِ شَكْلٍ لَمْ يَكُوناَ لِيَدْخُلَا",
    "وَفي الْهَاءِ لِلإِضْمَارِ قَوْمٌ أَبَوْهُمَا # وَمِنْ قَبْلِهِ ضَمٌّ أَوِ الْكَسْرُ مُثِّلَا",
    "أَوُ امَّاهُمَا وَاوٌ وَيَاءٌ وَبَعْضُهُمْ # يُرَى لَهُمَا فِي كُلِّ حَالٍ مُحَلِّلَا",
  ]},
  {id:"shat-27",title:"بَابُ الْوَقْفِ عَلَى مَرْسُومِ الْخَطِّ",sub:"L'arrêt selon le tracé du Mushaf",clr:["#0c2f35","#155a5e"],bayts:[
    "وَكُوفِيُّهُمْ وَالْمَازِنِيُّ وَنَافِعٌ # عُنُوا بِاتَّبَاعِ الْخَطِّ فِي وَقْفِ الاِبْتِلَا",
    "وَلاِبْنِ كَثِيٍر يُرْتَضَى وَابْنِ عَامِرٍ # وَمَا اخْتَلَفُوا فِيهِ حَرٍ أَنْ يُفَصَّلَا",
    "إِذَا كُتِبَتْ بِالتَّاءِ هَاءُ مُؤَنَّثٍ # فَبِالْهَاءِ قِفْ حَقَّا رِضًى وَمُعَوِّلَا",
    "وَفي اللاَّتَ مَعْ مَرْضَاتِ مَعْ ذَاتَ بَهْجَةٍ # وَلاَتَ رِضًى هَيْهَاتَ هَادِيِه رُفِّلَا",
    "وَقِفْ يَا أَبَهْ كُفْؤًا دَنَا وَكَأَيِّنِ الْـ # وُقُوفُ بِنُونٍ وَهْوَ بِالْيَاءِ حُصِّلَا",
    "وَمَالِ لَدَى الْفُرْقَانِ وَالْكَهْفِ وَالنِّسَا # وَسَالَ عَلَى مَا حَجَّ وَالْخُلْفُ رُتِّلَا",
    "وَيَا أَيُّهَا فَوْقَ الدُّخَانِ وَأَيُّهَا # لَدَى النُّورِ وَالرِّحْمنِ رَافَقْنَ حُمَّلاَ",
    "وَفي الْهَا عَلَى الإِتْبَاعِ ضَمَّ ابْنُ عَامِرٍ # لَدَى الْوَصْلِ وَالْمَرْسُومِ فِيهِنَّ أَخْيَلَا",
    "وَقِفْ وَيْكَأَنَّهْ وَيْكَأَنَّ بِرَسْمِهِ # وَبِالْيَاءِ قِفْ رِفْقًا وَبِالْكَافِ حُلِّلَا",
    "وَأَيًّا بأَيًّا مَا شَفَا وَسِوَاهُمَا # بِمَا وَبِوَادِي النَمْلِ بِالْيَا سَنًا تَلَا",
    "وَفِي مَهْ وَمِمَّهْ قِفْ وَعَمَّهْ لِمَهْ بِمَهْ # بِخُلْفٍ عَنِ الْبَزِّيِّ وَادْفَعْ مُجَهِّلَا",
  ]},
  {id:"shat-28",title:"بَابُ مَذَاهِبِهِمْ فِي يَاءَاتِ الإِضَافَةِ",sub:"Les Yâ' d'annexion (Yâ'ât al-Idâfa)",clr:["#0a1f3a","#153a63"],bayts:[
    "وَلَيْسَتْ بِلاَمِ الْفِعْلِ يَاءُ إِضَافَةٍ # وَمَا هِيَ مِنْ نَفْسِ اْلأُصُولِ فَتُشْكِلَا",
    "وَلكِنَّهَا كالْهَاءِ وَالْكَافِ كُلُّ مَا # تَلِيهِ يُرى لِلْهَاءِ وَالْكَافِ مَدْخَلَا",
    "وَفي مِائَتَيْ ياَءٍ وَعَشْرٍ مُنِيفَةٍ # وَثِنْتَيْنِ خُلْفُ الْقَوْمِ أَحْكِيهِ مُجْمَلَا",
    "فَتِسْعُونَ مَعْ هَمْزٍ بِفَتْحٍ وَتِسَعُهَا # سَما فَتْحُهاَ إَلاَّ مَوَاضِعَ هُمَّلَا",
    "فَأَرْنِي وَتَفْتِنِّي اتَّبِعْنِي سُكُونُهاَ # لِكُلٍ وَتَرْحَمْنِي أَكُنْ وَلَقَدْ جَلَا",
    "ذَرُونِيَ وَادْعُونِيْ اذْكُرُونِيَ فَتْحُهاَ # دَوَاءٌ وَأَوْزِعْنِي مَعًا جَادَ هُطَّلَا",
    "لِيَبْلُوَنِي مَعْهُ سَبِيلِي لِنَافِعٍ # وَعَنْهُ وَلِلْبصْرِي ثَمَانٍ تُنُخِّلَا",
    "بِيُوسُفَ إِنيِّ الأَوَّلاَنِ وَلِيْ بِها # وَضَيْفِْي وَيَسِّرْ لِيْ وَدُونِيْ تَمَثَّلَا",
    "وَيَاءَانِ في اجْعَلْ لِي وَأَرْبَعٌ إِذْ حَمَتْ # هُدَاهاَ وَلكِنِّي بِهاَ اثْناَنِ وُكِّلَا",
    "وَتَحْتِي وَقُلْ في هُودَ إِنِّي أَرَاكُمُو # وَقُلْ فَطَرَنْ في هُودَ هَادِيِهِ أَوْصَلَا",
    "وَيَحْزُنُنِيْ حِرْمِيُّهُمْ تَعِدَانِنِي # حَشَرْتَنِيَ أَعْمى تَأْمُرُونِيَ وَصَّلاَ",
    "أَرَهْطِي سَمَا مَوْلىً وَمَالِي سَمَا لِوىً # لَعَلِّي سَمَا كُفْؤًا مَعِي نَفْرُ الْعُلَا",
    "عِمَادٌ وَتَحْتَ النَّمْلِ عِنْدِيَ حُسْنُهُ # إِلَى دُرِّهِ بِالْخُلْفِ وَافَقَ مُوهَلَا",
    "وثِنْتَانِ مَعْ خَمْسِينَ مَعْ كَسْرِ هَمْزَةٍ # بِفتْحٍ أُولِي حُكْمٍ سِوَى مَا تَعَزَّلَا",
    "بَنَاتِيْ وَأَنْصَارِيْ عِبَادِيْ وَلَعْنَتِيْ # وَمَا بَعْدَهُ إِنْ شَاءَ بِالْفَتْحِ أُهْمِلَا",
    "وَفِي إِخْوَتِيْ وَرْشٌ يَدِيْ عَنْ أُولِيْ حِمَى # وَفِي رُسُلِي أَصْلٌ كَسَا وَافِيَ الْمُلَا",
    "وَأُمِّيْ وَأَجْرِيْ سُكِّنَا دِينُ صُحْبَةٍ # دُعَاءِيْ وَآباءِيْ لِكُوفٍ تَجَمَّلَا",
    "وَحُزْنِيْ وَتَوْفِيقِيْ ظِلاَلٌ وَكُلُّهُمْ # يُصَدِّقْنِيَ أَنْظِرْنِيْ وَأَخَّرْتَنِي إِلَى",
    "وَذُرِّيَّتِي يَدْعُونَنِيْ وَخِطَابُهُ # وَعَشْرٌ يَلِيهَا الْهَمْزُ بِالضَّمِّ مُشْكَلَا",
    "فَعَنْ نَافِعٍ فَافْتَحْ وَأَسْكِنْ لِكُلِّهِمْ # بِعَهْدِي وَآتُونِي لتَفْتَحَ مُقْفَلَا",
    "وَفِي اللاَّمِ لِلتَّعْرِيفِ أَرْبَعُ عَشْرَةٍ # فَإِسْكَانُهَا فَاشٍ وَعَهْدِيَ فِي عُلَا",
    "وَقُلْ لِعِبَادِيْ كَانَ شَرْعًا وَفِي النِّدَا # حِمًى شَاعَ آيَاتِيْ كَمَا فَاحَ مَنْزِلَا",
    "فَخَمْسَ عِبَادِي اعْدُدْ وَعَهْدِيْ أَرَادَنِيْ # وَرَبِّي الَّذِي آتَانِ آياتِيَ الْحُلَا",
    "وَأَهْلَكَنِيْ مِنْهَا وَفِي صَادَ مَسَّنِي # مَعَ الأَنَبِيَا رَبِّيْ فِي الاَعْرَافِ كَمَّلَا",
    "وَسَبْعٌ بِهَمْزِ الْوَصْلِ فَرْدًا وَفَتْحُهُمْ # أَخِيْ مَعَ إِنِّيْ حَقَّهُ لَيْتَنِيْ حَلَا",
    "وَنَفْسِيْ سَمَا ذِكْرِيْ سَمَا قَوْمِيَ الرِّضَا # حَمِيدُ هُدىً بَعْدِيْ سَمَا صَفْوُهُ وِلاَ",
    "وَمَعْ غَيْرِ هَمْزٍ فِي ثَلاَثيِنَ خُلْفُهُمْ # وَمَحْيايَ جِيْ بالْخُلْفِ وَالْفَتْحُ خُوِّلَا",
    "وَعَمَّ عُلًا وَجْهِيْ وَبَيْتِيْ بِنُوحِ عَنْ # لِوىً وَسِوَاهُ عُدَّ أَصْلًا لِيُحْفَلَا",
    "وَمَعْ شُرَكَاءِيْ مِنْ وَرَاءِيْ دَوَّنُوا # وَلِيْ دِينِ عَنْ هَادٍ بِخُلْفٍ لَهُ الْحُلَا",
    "مَمَاتِيْ أَتَى أَرْضِيْ صِرَاطِيْ ابْنُ عَامِرٍ # وَفِي النَّمْلِ مَالِي دُمْ لِمَنْ رَاقَ نَوْفَلَا",
    "وَلِيْ نَعْجَةٌ مَا كَانَ لِيْ اثْنَيْنِ مَعْ مَعِيْ # ثَمَانٍ عُلًا وَالظُّلَّةُ الثَّانِ عَنْ جِلَا",
    "وَمَعْ تُوْمِنُوا لِي يُؤْمِنُوا بِيْ جَاوَيَا # عِبَادِيَ صِفْ وَالْحَذْفُ عَنْ شَاكِرٍ دَلَا",
    "وَفَتْحُ وَلِيْ فِيهَا لِوَرْشٍ وَحَفْصِهِمْ # وَمَالِيَ فِي يَاسِيْنَ سَكِّنْ فَتَكْمُلَا",
  ]},
  {id:"shat-29",title:"بَابُ يَاءَاتِ الزَّوَائِدِ",sub:"Les Yâ' additionnels (Zawâ'id)",clr:["#0d2b2b","#1a4f4a"],bayts:[
    "وَدُونَكَ يَاءَاتٍ تُسَمَّى زَوَائِدَا # لأَنْ كُنَّ عَنْ خَطِّ المَصَاحِفِ مَعْزِلَا",
    "وَتَثْبُتُ في الْحَالَيْنَ دُرَّا لَوَامِعاَ # بِخُلْفٍ وَأُولَى النَّمْلِ حَمْزَةُ كَمَّلَا",
    "وَفِي الْوَصْلِ حَمَّادٌ شَكُورٌ إِمَامُهُ # وَجُمْلَتُهاَ سِتُونَ وَاثْنَانِ فَاعْقِلَا",
    "فَيَسْرِي إِلى الدَّاعِ الْجَوَارِ المُنَادِ يَهْـ # ـدِيَنْ يُؤْتِيَنْ مَعْ أَنْ تُعَلِّمَنِي وِلَا",
    "وَأَخَّرْتَنِي الإِسْراَ وَتَتَّبِعَنْ سَما # وَفي الْكَهْفِ نَبْغِيْ يَأْتِ فِي هُودَ رُفِّلَا",
    "سَماَ وَدُعَاءِيْ فِي جَنَا حُلْوِ هَدْيِهِ # وَفي اتَّبِعُونِيْ أَهْدِكُمْ حَقُّهُ بَلَا",
    "وَإِنْ تَرَنِيْ عَنْهُمْ تُمِدُّونَنِيْ سَماَ # فَرِيقًا وَيَدْعُ الدَّاعِ هَاكَ جَنًا حَلَا",
    "وَفي الْفَجْرِ بِالْوَادِيْ دَناَ جَرَيَانُهُ # وَفي الْوَقْفِ بِالْوَجْهَيْنِ وَافَقَ قُنْبُلاَ",
    "وَأَكْرَمَنِيْ مَعْهُ أَهَانَنِ إِذْ هَدَى # وَحَذْفُهُمَا لِلْمَازِنِيْ عُدَّ أَعْدَلَا",
    "وَفي النَّمْلِ آتانِيْ وَيُفْتَحُ عَنْ أُوِلِيْ # حِمىً وَخِلافُ الْوَقْفِ بَيْنَ حُلًا عَلَا",
    "وَمَعْ كَالْجَوَابِ الْبَادِ حَقٌّ جَناَهُماَ # وَفي الْمُهْتَدِ الإِسْرَا وَتَحْتُ أَخُو حُلَا",
    "وَفي اتَّبَعَنْ فِي آلِ عِمْرَانَ عَنْهُمَا # وَكِيدُونِ فِي الأَعْرَافَ حَجَّ لِيُحْمَلَا",
    "بِخُلْفٍ وَتُؤْتُونِيْ بِيُوسُفَ حَقُّهُ # وَفي هُودَ تَسْأَلْنِيْ حَوَارِيْهِ جَمَّلَا",
    "وَتُخْزُونِ فِيهاَ حَجَّ أَشْرَكْتُمُونِ قَدْ # هَدَانِ اتَّقُونِ يَا أُولِي اخْشَوْنِ مَعْ وَلَا",
    "وَعَنْهُ وَخَافُونِ وَمَنْ يَتَّقِيْ زَكاَ # بِيُوسُفَ وَافَى كَالصَّحِيحَ مُعَلَّلَا",
    "وَفِي المُتَعَالِي دُرُّهُ وَالتَّلًاقِ وَالتْـ # تَنَادِ دَرَا بَاغِيهِ بِالْخُلْفِ جُهِّلَا",
    "وَمَعْ دَعْوَةَ الدَّاعِ دَعَانِي حَلاَ جَنا # وَلَيْسَا لِقَالُونٍ عَنِ الْغُرِّ سُبَّلَا",
    "نَذِيرِيْ لِوَرْشٍ ثُمَّ تُرْدِينِ تَرْجُمُو # نِ فَاعْتَزِلُونِ سِتَّةٌ نُذُرِي جَلَا",
    "وَعِيدِيْ ثَلاَثٌ يُنْقِذُونِ يُكَذِّبُو # نِ قَالَ نَكِيرِيْ أَرْبَعٌ عَنْهُ وُصِّلَا",
    "فَبَشِّرْ عِبَادِي افْتَحْ وَقِفْ سَاكِنًا يَدا # وَوَاتَّبِعُونِي حَجَّ في الزُّخْرُفِ الْعَلَا",
    "وَفي الْكَهْفِ تَسْأَلْنِيْ عَنِ الْكُلِّ يَاؤُهُ # عَلَى رَسْمِهِ وَالْحَذْفُ بِالْخُلْفِ مُثِّلَا",
    "وَفي نَرْتَعِيْ خُلْفٌ زَكاَ وَجَمِيعُهُمْ # بِالإِثْبَاتِ تَحْتَ النَّمْلِ يَهْدِيَنِي تَلَا",
    "فَهذِي أُصُولُ الْقَوْمِ حَالَ اطِّرَادِهاَ # أَجَابَتْ بِعَوْنِ اللهِ فَانْتَظَمَتْ حُلَا",
    "وَإِنِّي لأَرْجُوهُ لِنَظْمِ حُرُوفِهِمْ # نَفَائِسَ أَعْلاَقٍ تُنَفِّسُ عُطَّلاَ",
    "سَأَمِضي عَلَى شَرْطِي وَبِاللهِ أَكْتَفِي وَماَ # خَابَ ذُو جِدٍّ إِذَا هُوَ حَسْبَلَا",
  ]},
  {id:"shat-30",title:"سُوْرَةُ الْبَقَرَةِ",sub:"Sourate Al-Baqara",clr:["#0a2540","#154568"],bayts:[
    "وَمَا يَخْدَعُونَ الْفَتْحُ مِنْ قَبْلِ سَاكِنٍ # وَبَعْدُ ذَكَا وَالْغَيْرُ كَالْحَرْفِ أَوَّلَا",
    "وخَفَّفَ كُوفٍ يَكْذِبُونَ وَيَاؤُهُ # بِفَتْحٍ وَلِلْبَاقِينَ ضُمَّ وَثُقِّلَا",
    "وَقِيْلَ وَغِيْضَ ثُمَّ جِيءَ يُشِمُّهَا # لَدَى كَسْرِهَا ضَمَّا رِجَالٌ لِتَكْمُلَا",
    "وَحِيلَ بِإِشْمَامٍ وَسِيقَ كَمَا رَسَا # وَسِيءَ وَسِيئَتْ كَانَ رَاوِيهِ أَنْبَلَا",
    "وَهَا هُوَ بَعْدَ الْوَاوِ وَالْفَا وَلاَمِهَا # وَهَا هِيَ أَسْكِنْ رَاضِيًا بَارِدًا حَلَا",
    "وَثُمَّ هْوَ رِفْقًا بَانَ وَالضَّمُّ غَيْرُهُمُ # وَكَسْرٌ وَعَنْ كُلٍّ يُمِلَّ هُوَ انْجَلَا",
    "وَفِي فَأَزَلَّ اللاَّمَ خَفِّفْ لِحَمْزَةٍ # وَزِدْ أَلِفًا مِنْ قَبْلِهِ فَتُكَمِّلَا",
    "وَآدَمَ فَارْفَعْ نَاصِبًا كَلِمَاتِهِ # بِكَسْرٍ وَلِلْمَكِّيِّ عَكْسٌ تَحَوَّلَا",
    "وَيُقْبَلُ الاُولى أَنَّثُوا دُونَ حَاجِزٍ # وَعَدْنَا جَمِيعًا دُونَ مَا أَلِفَ حَلَا",
    "وَإِسْكَانُ بَارِئْكُمْ وَيَأْمُرُكُمْ لَهُ # وَيَأْمُرُهُمْ أَيْضًا وَتَأْمُرُهُمْ تَلَا",
    "وَيَنْصُرُكُمْ أَيْضًا وَيُشْعِرُكُمْ وَكَمْ # جَلِيلٍ عَنِ الْدُّورِيِّ مُخْتَلِسًا جَلَا",
    "وَفِيهَا وَفِي الأَعْرَافِ نَغْفِرْ بِنُونِهِ # وَلاَ ضَمَّ وَاكْسِرْ فَاءَهُ حِينَ ظَلَّلَا",
    "وَذَكِّرْ هُنَا أَصْلًا وَلِلشَّامِ أَنَّثُوا # وَعَنْ نَافِعٍ مَعْهُ في الاَعْرَافِ وُصِّلَا",
    "وَجَمْعًا وَفَرْدًا فِي النَّبِيءِ وَفي النُّبُو # ءَةِ الْهَمْزَ كُلٌّ غَيْرَ نَافِعٍ ابْدَلاَ",
    "وَقَالُونُ فِي الأَحْزَابِ فِي لِلنَّبيِّ مَعْ # بُيُوتَ النَّبيِّ الْيَاءَ شَدَّدَ مُبْدِلَا",
    "وَفي الصَّابِئِينَ الْهَمْزُ وَالصَّابِئُونَ خُذْ # وَهُزْؤًا وَكُفْؤًا في السَّوَاكِنِ فُصِّلَا",
    "وَضُمَّ لِبَاقِيهِمْ وَحَمْزَةُ وَقْفُهُ # بِوَاوٍ وَحَفْصٌ وَاقِفًا ثُمَّ مُوصِلَا",
    "وَبِالْغَيْبِ عَمَّا تَعْمَلُونَ هُنَا دَنَا # وَغَيْبُكَ في الثَّانِي ِإلَى صَفْوَهِ دَلَا",
    "خَطِيئَتُهُ التَّوْحِيدُ عَنْ غَيْرِ نَافِعٍ # وَلاَ يَعْبُدُونَ الْغَيْبُ شَايَعَ دُخْلُلَا",
    "وَقُلْ حَسَنًا شُكْرًا وَحُسْنًا بِضَمِّهِ # وَسَاكِنِهِ الْبَاقُونَ وَاحْسِنْ مُقَوِّلَا",
    "وَتَظَّاهَرُونَ الظَّاءُ خُفِّفَ ثَابِتًا # وَعَنْهُمْ لَدَى التَّحْرِيمِ أَيْضًا تَحَلَّلَا",
    "وَحَمْزَةُ أَسْرَى فِي أُسَارَى وَضَمُّهُمْ # تُفَادُوهُمُو وَالْمَدُّ إِذْ رَاقَ نُفِّلَا",
