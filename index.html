    "مَعْ فَتْحِ ضَمٍ إِذْ حِمًا ثِقْ وَكسَرْ # فِي الْمُنْشَئَاتُ الشِّينَ صِفْ خُلْفًا فَخَرْ",
    "سَنَفْرُغُ الْيَاءُ شَفَا وَكَسْرُ ضَمْ # شُوَاظُ دُمْ نُحَاسُ جَرُّ الرَّفْعِ شِمْ",
    "حَبْرٌ كِلاَ يَطْمِثْ بِضَمِّ الْكَسْرِ رُمْ # خُلْفٌ وَيَا ذِي آخِرًا وَاوٌ كَرُمْ",
  ]},
  {id:"tayb-57",title:"وَمِنْ سُورَةِ الوَاقِعَةِ إلَى سُورَةِ التَّغَابُنِ",sub:"De sourate Al-Wâqi'a à sourate At-Taghâbun",clr:["#0a2a2e","#124a4f"],bayts:[
    "حُورٌ وَعِينٌ خَفْضُ رَفْعٍ ثُبْ رِضَا # وَشَرْبَ فَاضْمُمْهُ مَدًا نَصْرٍ فَضَا",
    "خِفُّ قَدَرْنَا دِنْ فَرَوحُ اضْمُمْ غِذَا # بِمَوْقِعٍ شَفَا اضْمُمْ اكْسِرْ أَخَذَا",
    "مِيثَاقَ فَارْفَعْ حُزْ وَكُلُّ كَثُرَا # قَطْعَ انْظُرُونَا وَاكْسِرِ الضَّمَّ فَرَا",
    "يُؤْخَذُ أَنِّثْ كَمْ ثَوى خِفُّ نَزَلْ # إِذْ عَنْ غَلاَ الخُلْفُ وَخَفِّفْ صِفْ دَخَلْ",
    "صَادَيْ مُصَدِّقْ وَيَكُونُوا خَاطِبَنْ # غَوْثًا أَتَاكُمُ اقْصُرَنْ حُزْ وَاحْذِفَنْ",
    "قَبْلَ الْغَنِىُّ هُوَ عَمَّ، وَامْدُدِ # وَخِفُّ هَا يَظَّهَّرُوا كَنْزٌ ثُدِي",
    "وَضُمَّ وَاكْسِرْ خَفِّفِ الظَّا نَلْ مَعَا # يَكُونُ أَنِّثْ ثِقْ وَأَكْثَرَ ارْفَعَا",
    "ظِلًاّ وَيَنْتَجُوا كَيَنْتَهُوا غَدَا # فُزْ تَنتَجُوا غِثْ وَالمْجَالِسِ امْدُدَا",
    "نَلْ وَانْشِزُوا مَعًا فَضَمُّ الكَسْرِ عَمْ # عَنْ صَفْوِ خُلْفٍ يُخْرِبُونَ الثِّقْلَ حُمْ",

    "وَتَقْتَضِي رِضاً بِغَيْرِ سُخْطِ # فَائِقَةً أَلْفِيَّةَ ابْنِ مُعْطِي",
    "وَهْوَ بِسَبْقٍ حَائِزٌ تَفْضِيلَا # مُسْتَوْجِبٌ ثَنَائِيَ الْجَمِيلَا",
    "وَاللَّهُ يَقْضِي بِهِبَاتٍ وَافِرَهْ # لِي وَلَهُ فِي دَرَجَاتِ الْآخِرَهْ",
  ]},
  {id:"alf-02",title:"الْكَلَامُ وَمَا يَتَأَلَّفُ مِنْهُ",sub:"La parole et ses composants",clr:["#0f1a32","#1e3260"],bayts:[
    "«كَلَامُنَا»: لَفْظٌ مُفِيدٌ كَـ «اسْتَقِمْ» # وَاسْمٌ وَفِعْلٌ ثُمَّ حَرْفٌ: الْكَلِمْ",
    "وَاحِدُهُ كَلِمَةٌ، وَالْقَوْلُ عَمّْ # وَكِلْمَةٌ بِهَا كَلَامٌ قَدْ يُؤَمّْ",
    "بِالْجَرِّ وَالتَّنْوِينِ وَالنِّدَا وَ «أَلْ» # وَمُسْنَدٍ: لِلِاسْمِ مَيْزُهُ حَصَلْ",
    "بِتَا «فَعَلْتَ، وَأَتَتْ» وَيَا «افْعَلِي» # وَنُونِ «أَقْبِلَنَّ»: فِعْلٌ يَنْجَلِي",
    "سِوَاهُمَا الْحَرْفُ كَـ «هَلْ، وَفِي، وَلَمْ» # فِعْلٌ مُضَارِعٌ يَلِي «لَمْ» كَـ «يَشَمّْ»",
    "وَمَاضِيَ الْأَفْعَالِ بِالتَّا مِزْ، وَسِمْ # بِالنُّونِ فِعْلَ الْأَمْرِ؛ إِنْ أَمْرٌ فُهِمْ",
    "وَالْأَمْرُ إِنْ لَمْ يَكُ لِلنُّونِ مَحَلّْ # فِيهِ: هُوَ اسْمٌ نَحْوُ «صَهْ، وَحَيَّهَلْ»",
  ]},
  {id:"alf-03",title:"الْمُعْرَبُ وَالْمَبْنِيُّ",sub:"Déclinable et indéclinable",clr:["#140f32","#271e60"],bayts:[
    "وَالِاسْمُ مِنْهُ مُعْرَبٌ، وَمَبْنِيّ # لِشَبَهٍ مِنَ الْحُرُوفِ مُدْنِي",
    "كَالشَّبَهِ الْوَضْعِيِّ فِي اسْمَيْ «جِئْتَنَا» # وَالْمَعْنَوِيِّ فِي «مَتَى» وَفِي «هُنَا»",
    "وَكَنِيَابَةٍ عَنِ الْفِعْلِ بِلَا # تَأَثُّرٍ، وَكَافْتِقَارٍ أُصِّلَا",
    "وَمُعْرَبُ الْأَسْمَاءِ مَا قَدْ سَلِمَا # مِنْ شَبَهِ الْحَرْفِ كَـ «أَرْضٍ، وَسُمَا»",
    "وَفِعْلُ أَمْرٍ وَمَضِيٍّ بُنِيَا # وَأَعْرَبُوا مُضَارَعاً إِنْ عَرَبَا",
    "وَمِنْ نُونِ تَوْكِيدٍ مُبَاشِرٍ وَمِنْ # نُونِ إِنَاثٍ كَيَرْعَنْ مِنْ فَتَنْ",
    "وَكُلُّ حَرْفٍ مُسْتَحِقٍّ لِلْبِنَا # وَالْأَصْلُ فِي الْمَبْنِيِّ أَنْ يُسَكَّنَا",
    "وَمِنْهُ ذُو فَتْحٍ وَذُو كَسْرٍ وَضَمّ # كَـ «أَيْنَ، أَمْسِ، حَيْثُ» وَالسَّاكِنُ كَـ «كَمْ»",
    "وَالرَّفْعُ وَالنَّصْبُ اجْعَلْنْ إِعْرَابَا # لِاسْمٍ وَفِعْلٍ نَحْوُ «لَنْ أَهَابَا»",
    "وَالِاسْمُ قَدْ خُصِّصَ بِالْجَرِّ كَمَا # قَدْ خُصِّصَ الْفِعْلُ بِأَنْ يُنْجَزِمَا",
    "فَارْفَعْ بِضَمٍّ وَانْصِبْنْ فَتْحاً وَجَرّْ # كَسْراً كَذِكْرِ اللَّهِ عَبْدُهُ يَسِرْ",
    "وَاجْزِمْ بِتَسْكِينٍ وَغَيْرُ مَا ذُكِرْ # يَنُوبُ نَحْوُ «جَاءَ أَخُو بَنِي نَمِرْ»",
    "وَارْفَعْ بِوَاوٍ وَانْصِبْنَّ بِالْأَلِفْ # وَاجْرُرْ بِيَاءٍ مَا مِنَ الْأَسْمَاءِ أَصِفْ",
    "مِنْ ذَاكَ ذُو إِنْ صَحْبَةٍ أَبَانَا # وَالْفَمُ حَيْثُ الْمِيمُ مِنْهُ بَانَا",
    "«أَبٌ، أَخٌ، حَمٌ» كَذَاكَ وَ«هِنَّ» # وَالنُّقْصُ فِي هَذَا الْأَخِيرِ أَحْسَنُ",
    "وَفِي «أَبٍ» وَتَالِيَيْهِ يَنْدُرْ # وَقِصَرُهَا مِنْ نُقْصِهِنَّ أَشْهَرُ",
    "وَشَرْطُ ذَا الْإِعْرَابِ أَنْ يُضَفْنْ لَا # لِلْيَاءِ كَـ «جَاءَ أَخُو أَبِيكَ ذَا اعْتَلَا»",
    "بِالْأَلِفِ اِرْفَعِ الْمُثَنَّى وَ«كُلَّا» # إِذَا بِمُضْمَرٍ مُضَافاً وَصَلَا",
    "«كِلْتَا» كَذَاكَ «اثْنَانِ» وَ«اثْنَتَانِ» # كَـ «ابْنَيْنِ» وَ«ابْنَتَيْنِ» يَجْرِيَانِ",
    "وَتَخْلَفُ الْيَا فِي جَمِيعِهَا الْأَلِفْ # جَرّاً وَنَصْباً بَعْدَ فَتْحٍ قَدْ أُلِفْ",
    "وَارْفَعْ بِوَاوٍ وَبِيَاءٍ وَاجْرُرْ وَانْصِبْ # سَالِمَ جَمْعِ عَامِرٍ وَمُذْنِبْ",
    "وَشِبْهُ «ذَيْنِ» وَبِهِ «عِشْرُونَا» # وَ«بَابُهُ» أَلْحَقْ وَ«الْأَهْلُونَا»",
    "«أُولُو» وَ«عَالِمُونَ» «عَلِّيُّونَا» # وَ«أَرْضُونَ» شَذَّ وَ«السِّنُونَا»",
    "وَ«بَابُهُ» وَمِثْلُ «حِينٍ» قَدْ يُرَدْ # ذَا الْبَابِ وَهُوَ عِنْدَ قَوْمٍ يُطَرَّدْ",
    "وَنُونُ مَجْمُوعٍ وَمَا بِهِ أُلْحِقْ # فَافْتَحْ وَقُلَّ مَنْ بِكَسْرِهِ نُطِقْ",
    "وَنُونُ مَا ثَنَّى وَالْمُلْحَقُ بِهِ # بِعَكْسِ ذَاكَ اسْتَعْمَلُوهُ فَانْتَبِهْ",
    "وَمَا بِتَا وَأَلِفٍ قَدْ جُمِعَا # يُكْسَرُ فِي الْجَرِّ وَفِي النَّصْبِ مَعَا",
    "كَذَا «أُولَاتٍ» وَ«الَّذِي» اسْماً قَدْ جُعِلْ # كَـ «أَذْرُعَاتٍ» فِيهِ ذَا أَيْضاً قَبْلْ",
    "وَجَرّْ بِالْفَتْحَةِ مَا لَا يَنْصَرِفْ # مَا لَمْ يُضَفْ أَوْ يَكُ بَعْدَ «أَلْ» رُدِفْ",
    "وَاجْعَلْ لِنَحْوِ «يَفْعَلَانِ» النُّونَا # رَفْعاً وَ«تَدْعِينَ» وَ«تَسْأَلُونَا»",
    "وَحَذْفُهَا لِلْجَزْمِ وَالنَّصْبِ سُمِّهْ # كَـ «لَمْ تَكُونِي لِتَرُومِي مَظْلَمَهْ»",
    "وَسُمّْ مُعْتَلّاً مِنَ الْأَسْمَاءِ مَا # كَـ «الْمُصْطَفَى» وَ«الْمُرْتَقَى» مَكَارِمَا",
    "فَالْأَوَّلُ الْإِعْرَابُ فِيهِ قُدِّرَا # جَمِيعُهُ وَهُوَ الَّذِي قَدْ قُصِرَا",
    "وَالثَّانِي مَنْقُوصٌ وَنَصْبُهُ ظَهَرْ # وَرَفْعُهُ يُنَوِّي كَذَا أَيْضاً يَجْرِ",
    "وَأَيُّ فِعْلٍ آخِرٌ مِنْهُ أَلِفْ # أَوْ وَاوٌ أَوْ يَاءٌ فَمُعْتَلّاً عَرِفْ",
    "فَالْأَلِفُ انُوِ فِيهِ غَيْرَ الْجَزْمِ # وَأَبْدِ نَصْبَ مَا كَـ «يَدْعُو» يَرْمِي",
    "وَالرَّفْعُ فِيهِمَا انُوْا وَاحْذِفْ جَازِمَا # ثَلَاثَهُنَّ تَقْضِ حُكْماً لَازِمَا",
  ]},
  {id:"alf-04",title:"النَّكِرَةُ وَالْمَعْرِفَةُ",sub:"L'indéfini et le défini",clr:["#0f2132","#1e3f60"],bayts:[
    "نَكِرَةٌ: قَابِلُ «أَلْ» مُؤَثِّرَا # أَوْ وَاقِعٌ مَوْقِعَ مَا قَدْ ذُكِرَا",
    "وَغَيْرُهُ مَعْرِفَةٌ كَـ «هُمْ، وَذِي # وَهِنْدَ، وَابْنِي، وَالْغُلَامِ، وَالَّذِي»",
    "فَمَا لِذِي غَيْبَةٍ أَوْ حُضُورِ # كَـ «أَنْتَ، وَهْوَ»: سَمِّ بِالضَّمِيرِ",
    "وَذُو اتِّصَالٍ مِنْهُ مَا لَا يُبْتَدَا # وَلَا يَلِي «إِلَّا» اخْتِيَاراً أَبَدَا",
    "كَالْيَاءِ وَالْكَافِ مِنِ «ابْنِي أَكْرَمَكْ» # وَالْيَاءِ وَالْهَا مِنْ «سَلِيهِ مَا مَلَكْ»",
    "وَكُلُّ مُضْمَرٍ لَهُ الْبِنَا يَجِبْ # وَلَفْظُ مَا جُرَّ كَلَفْظِ مَا نُصِبْ",
    "لِلرَّفْعِ وَالنَّصْبِ وَجَرٍّ «نَا» صَلَحْ # كَـ «اعْرِفْ بِنَا، فَإِنَّنَا نِلْنَا الْمِنَحْ»",
    "وَأَلِفٌ وَالْوَاوُ وَالنُّونُ لِمَا # غَابَ وَغَيْرِهِ كَـ «قَامَا، وَاعْلَمَا»",
    "وَمِنْ ضَمِيرِ الرَّفْعِ مَا يَسْتَتِرُ # كَـ «افْعَلْ، أُوَافِقْ، نَغْتَبِطْ، إِذْ تَشْكُرُ»",
    "وَذُو ارْتِفَاعٍ وَانْفِصَالٍ «أَنَا، هُو # وَأَنْتَ»، وَالْفُرُوعُ لَا تَشْتَبِهُ",
    "وَذُو انْتِصَابٍ فِي انْفِصَالٍ جُعِلَا # «إِيَّايَ»، وَالتَّفْرِيعُ لَيْسَ مُشْكِلَا",
    "وَفِي اخْتِيَارٍ لَا يَجِيءُ الْمُنْفَصِلْ # إِذَا تَأَتَّى أَنْ يَجِيءَ الْمُتَّصِلْ",
    "وَصِلْ أَوِ افْصِلْ هَاءَ «سَلْنِيهِ» وَمَا # أَشْبَهَهُ، فِي «كُنْتُهُ» الْخُلْفُ انْتَمَى",
    "كَذَاكَ «خِلْتَنِيهِ»، وَاتِّصَالَا # أَخْتَارُ، غَيْرِي اخْتَارَ الِانْفِصَالَا",
    "وَقَدِّمِ الْأَخَصَّ فِي اتِّصَالِ # وَقَدِّمَنْ مَا شِئْتَ فِي انْفِصَالِ",
    "وَفِي اتِّحَادِ الرُّتْبَةِ الْزَمْ فَصْلَا # وَقَدْ يُبِيحُ الْغَيْبُ فِيهِ وَصْلَا",
    "وَقَبْلَ «يَا النَّفْسِ» مَعَ الْفِعْلِ الْتُزِمْ # نُونُ وِقَايَةٍ، وَ «لَيْسِي» قَدْ نُظِمْ",
    "وَ «لَيْتَنِي» فَشَا، وَ «لَيْتِي» نَدَرَا # وَمَعْ «لَعَلَّ» اعْكِسْ، وَكُنْ مُخَيَّرَا",
    "فِي الْبَاقِيَاتِ، وَاضْطِرَاراً خَفَّفَا # «مِنِّي، وَعَنِّي» بَعْضُ مَنْ قَدْ سَلَفَا",
    "وَفِي «لَدُنِّي، لَدُنِي» قَلَّ، وَفِي # «قَدْنِي، وَقَطْنِي» الْحَذْفُ أَيْضاً قَدْ يَفِي",
  ]},
  {id:"alf-05",title:"الْعَلَمُ",sub:"Le nom propre",clr:["#180f32","#2f1e60"],bayts:[
    "«اسْمٌ يُعَيِّنُ الْمُسَمَّى مُطْلَقَا» # عَلَمُهُ كَـ «جَعْفَرٍ، وَخِرْنِقَا»",
    "وَقَرَنٍ، وَعَدَنٍ، وَلَاحِقِ # وَشَدْقَمٍ، وَهَيْلَةٍ، وَوَاشِقِ»",
    "وَاسْماً أَتَى وَكُنْيَةً وَلَقَبَا # وَأَخِّرَنْ ذَا إِنْ سِوَاهُ صَحِبَا",
    "وَإِنْ يَكُونَا مُفْرَدَيْنِ فَأَضِفْ # حَتْماً، وَإِلَّا أَتْبِعِ الَّذِي رَدِفْ",
    "وَمِنْهُ مَنْقُولٌ كَـ «فَضْلٍ، وَأَسَدْ» # وَذُو ارْتِجَالٍ كَـ «سُعَادَ، وَأُدَدْ»",
    "وَجُمْلَةٌ، وَمَا بِمَزْجٍ رُكِّبَا # ذَا إِنْ بِغَيْرِ «وَيْهِ» تَمَّ؛ أُعْرِبَا",
    "وَشَاعَ فِي الْأَعْلَامِ ذُو الْإِضَافَهْ # كَـ «عَبْدِ شَمْسٍ، وَأَبِي قُحَافَهْ»",
    "وَوَضَعُوا لِبَعْضِ الْأَجْنَاسِ عَلَمْ # كَعَلَمِ الْأَشْخَاصِ لَفْظاً، وَهْوَ عَمّْ",
    "مِنْ ذَاكَ «أُمُّ عِرْيَطٍ» لِلْعَقْرَبِ # وَهكَذَا «ثُعَالَةٌ» لِلثَّعْلَبِ",
    "وَمِثْلُهُ «بَرَّةُ» لِلْمَبَرَّهْ # كَذَا «فَجَارِ» عَلَمٌ لِلْفَجْرَهْ",
  ]},
  {id:"alf-06",title:"اسْمُ الْإِشَارَةِ",sub:"Le démonstratif",clr:["#0f1632","#1e2b60"],bayts:[
    "بِـ «ذَا» لِمُفْرَدٍ مُذَكَّرٍ أَشِرْ # بِـ «ذِي، وَذِهْ، تِي، تَا» عَلَى الْأُنْثَى اقْتَصِرْ",
    "وَ «ذَانِ، تَانِ» لِلْمُثَنَّى الْمُرْتَفِعْ # وَفِي سِوَاهُ «ذَيْنِ، تَيْنِ» اذْكُرْ تُطِعْ",
    "وَبِـ «أُولَى» أَشِرْ لِجَمْعٍ مُطْلَقَا # وَالْمَدُّ أَوْلَى، وَلَدَى الْبُعْدِ انْطِقَا",
    "بِالْكَافِ حَرْفاً دُونَ لَامٍ أَوْ مَعَهْ # وَاللَّامُ إِنْ قَدَّمْتَ «هَا» مُمْتَنِعَهْ",
    "وَبِـ «هُنَا، أَوْ هَهُنَا» أَشِرْ إِلَى # دَانِي الْمَكَانِ، وَبِهِ الْكَافَ صِلَا",
    "فِي الْبُعْدِ، أَوْ بِـ «ثَمَّ» فُهْ، أَوْ «هَنَّا» # أَوْ بِـ «هُنَالِكَ» انْطِقَنْ، أَوْ «هِنَّا»",
  ]},
  {id:"alf-07",title:"الْمَوْصُولُ",sub:"Le relatif (mawsûl)",clr:["#110f32","#201e60"],bayts:[
    "مَوْصُولُ الْأَسْمَاءِ «الَّذِي»، الْأُنْثَى «الَّتِي» # وَالْيَا إِذَا مَا ثُنِّيَا لَا تُثْبِتِ",
    "بَلْ مَا تَلِيهِ أَوْلِهِ الْعَلَامَهْ # وَالنُّونُ إِنْ تُشَدَّدْ فَلَا مَلَامَهْ",
    "وَالنُّونُ مِنْ «ذَيْنِ، وَتَيْنِ» شُدِّدَا # أَيْضاً، وَتَعْوِيضٌ بِذَاكَ قُصِدَا",
    "جَمْعُ «الَّذِي»: «الْأُلَى، الَّذِينَ» مُطْلَقَا # وَبَعْضُهُمْ بِالْوَاوِ رَفْعاً نَطَقَا",
    "بِـ «اللَّاتِ، وَاللَّاءِ»: «الَّتِي» قَدْ جُمِعَا # وَ «اللَّاءِ» كَـ «الَّذِينَ» نَزْراً وَقَعَا",
    "وَ «مَنْ، وَمَا، وَأَلْ» تُسَاوِي مَا ذُكِرْ # وَهَكَذَا «ذُو» عِنْدَ طَيِّئٍ شُهِرْ",
    "وَكَـ «الَّتِي» أَيْضاً لَدَيْهِمْ «ذَاتُ» # وَمَوْضِعَ «اللَّاتِي» أَتَى «ذَوَاتُ»",
    "وَمِثْلُ «مَا»: «ذَا» بَعْدَ «مَا» اسْتِفْهَامِ # أَوْ «مَنْ» إِذَا لَمْ تُلْغَ فِي الْكَلَامِ",
    "وَكُلُّهَا يَلْزَمُ بَعْدَهُ صِلَهْ # عَلَى ضَمِيرٍ لَائِقٍ مُشْتَمِلَهْ",
    "وَجُمْلَةٌ أَوْ شِبْهُهَا الَّذِي وُصِلْ # بِهِ كَـ «مَنْ عِنْدِي الَّذِي ابْنُهُ كُفِلْ»",
    "وَصِفَةٌ صَرِيحَةٌ صِلَةُ أَلْ # وَكَوْنُهَا بِمُعْرَبِ الْأَفْعَالِ قَلّْ",
    "«أَيٌّ» كَـ «مَا»، وَأُعْرِبَتْ مَا لَمْ تُضَفْ # وَصَدْرُ وَصْلِهَا ضَمِيرٌ انْحَذَفْ",
    "وَبَعْضُهُمْ أَعْرَبَ مُطْلَقاً، وَفِي # ذَا الْحَذْفِ «أَيّاً» غَيْرُ «أَيٍّ» يَقْتَفِي",
    "إِنْ يُسْتَطَلْ وَصْلٌ، وَإِنْ لَمْ يُسْتَطَلْ # فَالْحَذْفُ نَزْرٌ، وَأَبَوْا أَنْ يُخْتَزَلْ",
    "إِنْ صَلَحَ الْبَاقِي لِوَصْلٍ مُكْمِلِ # وَالْحَذْفُ عِنْدَهُمْ كَثِيرٌ مُنْجَلِي",
    "فِي عَائِدٍ مُتَّصِلٍ إِنِ انْتَصَبْ # بِفِعْلٍ أَوْ وَصْفٍ كَـ «مَنْ نَرْجُو يَهَبْ»",
    "كَذَاكَ حَذْفُ مَا بِوَصْفٍ خُفِضَا # كَـ «أَنْتَ قَاضٍ» بَعْدَ أَمْرٍ مِنْ «قَضَى»",
    "كَذَا الَّذِي جُرَّ بِمَا الْمَوْصُولَ جَرّْ # كَـ «مُرَّ بِالَّذِي مَرَرْتُ فَهْوَ بَرّْ»",
  ]},
  {id:"alf-08",title:"الْمُعَرَّفُ بِأَدَاةِ التَّعْرِيفِ",sub:"Le défini par 'al'",clr:["#0f1c32","#1e3660"],bayts:[
    "«أَلْ» حَرْفُ تَعْرِيفٍ، أَوِ اللَّامُ فَقَطْ # فَـ «نَمَطٌ» عَرَّفْتَ قُلْ فِيهِ: «النَّمَطْ»",
    "وَقَدْ تُزَادُ لَازِماً كَـ «اللَّاتِ # وَالْآنَ، وَالَّذِينَ، ثُمَّ اللَّاتِ»",
    "وَلِاضْطِرَارٍ كَـ «بَنَاتِ الْأَوْبَرِ» # كَذَا «وَطِبْتَ النَّفْسَ يَا قَيْسُ السَّرِي»",
    "وَبَعْضُ الْأَعْلَامِ عَلَيْهِ دَخَلَا # لِلَمْحِ مَا قَدْ كَانَ عَنْهُ نُقِلَا",
    "كَـ «الْفَضْلِ، وَالْحَارِثِ، وَالنُّعْمَانِ» # فَذِكْرُ ذَا وَحَذْفُهُ سِيَّانِ",
    "وَقَدْ يَصِيرُ عَلَماً بِالْغَلَبَهْ # مُضَافٌ أَوْ مَصْحُوبُ «أَلْ» كَـ «الْعَقَبَهْ»",
    "وَحَذْفَ «أَلْ» ذِي إِنْ تُنَادِ أَوْ تُضِفْ # أَوْجِبْ، وَفِي غَيْرِهِمَا قَدْ تَنْحَذِفْ",
  ]},
  {id:"alf-09",title:"الِابْتِدَاءُ",sub:"La phrase nominale (mubtada/khabar)",clr:["#0f1232","#1e2460"],bayts:[
    "مُبْتَدَأٌ «زَيْدٌ»، وَ «عَاذِرٌ» خَبَرْ # إِنْ قُلْتَ: «زَيْدٌ عَاذِرٌ مَنِ اعْتَذَرْ»",
    "وَأَوَّلٌ مُبْتَدَأٌ، وَالثَّانِي # فَاعِلٌ اغْنَى فِي: «أَسَارٍ ذَانِ؟»",
    "وَقِسْ، وَكَاسْتِفْهَامٍ النَّفْيُ، وَقَدْ # يَجُوزُ نَحْوُ «فَائِزٌ أُولُو الرَّشَدْ»",
    "وَالثَّانِ مُبْتَداً وَذَا الْوَصْفُ خَبَرْ # إِنْ فِي سِوَى الْإِفْرَادِ طِبْقاً اسْتَقَرّْ",
    "وَرَفَعُوا مُبْتَدَأً بِالِابْتِدَا # كَذَاكَ رَفْعُ خَبَرٍ بِالْمُبْتَدَا",
    "وَ «الْخَبَرُ»: الْجُزْءُ الْمُتِمُّ الْفَائِدَهْ # كَـ «اللَّهُ بَرٌّ، وَالْأَيَادِي شَاهِدَهْ»",
    "وَمُفْرَداً يَأْتِي، وَيَأْتِي جُمْلَهْ # حَاوِيَةً مَعْنَى الَّذِي سِيقَتْ لَهْ",
    "وَإِنْ تَكُنْ إِيَّاهُ مَعْنىً اكْتَفَى # بِهَا كَـ «نُطْقِي اللَّهُ حَسْبِي وَكَفَى»",
    "وَالْمُفْرَدُ الْجَامِدُ فَارِغٌ، وَإِنْ # يُشْتَقَّ فَهْوَ ذُو ضَمِيرٍ مُسْتَكِنّْ",
    "وَأَبْرِزَنْهُ مُطْلَقاً حَيْثُ تَلَا # مَا لَيْسَ مَعْنَاهُ لَهُ مُحَصَّلَا",
    "وَأَخْبَرُوا بِظَرْفٍ أَوْ بِحَرْفِ جَرّْ # نَاوِينَ مَعْنَى «كَائِنٍ، أَوِ اسْتَقَرّْ»",
    "وَلَا يَكُونُ اسْمُ زَمَانٍ خَبَرَا # عَنْ جُثَّةٍ، وَإِنْ يُفِدْ فَأَخْبِرَا",
    "وَلَا يَجُوزُ الِابْتِدَا بِالنَّكِرَهْ # مَا لَمْ تُفِدْ كَـ «عِنْدَ زَيْدٍ نَمِرَهْ»",
    "وَهَلْ فَتىً فِيكُمْ؟ فَمَا خِلٌّ لَنَا # وَرَجُلٌ مِنَ الْكِرَامِ عِنْدَنَا",
    "وَرَغْبَةٌ فِي الْخَيْرِ خَيْرٌ، وَعَمَلْ # بِرٍّ يَزِينُ»، وَلْيُقَسْ مَا لَمْ يُقَلْ",
    "وَالْأَصْلُ فِي الْأَخْبَارِ أَنْ تُؤَخَّرَا # وَجَوَّزُوا التَّقْدِيمَ إِذْ لَا ضَرَرَا",
    "فَامْنَعْهُ حِينَ يَسْتَوِي الْجُزْآنِ # عُرْفاً وَنُكْراً عَادِمَيْ بَيَانِ",
    "كَذَا إِذَا مَا الْفِعْلُ كَانَ الْخَبَرَا # أَوْ قُصِدَ اسْتِعْمَالُهُ مُنْحَصِرَا",
    "أَوْ كَانَ مُسْنَداً لِذِي لَامِ ابْتِدَا # أَوْ لَازِمِ الصَّدْرِ كَـ «مَنْ لِي مُنْجِدَا؟»",
    "وَنَحْوُ «عِنْدِي دِرْهَمٌ، وَلِي وَطَرْ» # مُلْتَزَمٌ فِيهِ: تَقَدُّمُ الْخَبَرْ",
    "كَذَا إِذَا عَادَ عَلَيْهِ مُضْمَرُ # مِمَّا بِهِ عَنْهُ مُبِيناً يُخْبَرُ",
    "كَذَا إِذَا يَسْتَوْجِبُ التَّصْدِيرَا # كَـ «أَيْنَ مَنْ عَلِمْتَهُ نَصِيرَا؟»",
    "وَخَبَرَ الْمَحْصُورِ قَدِّمْ أَبَدَا # كَـ «مَا لَنَا إِلَّا اتِّبَاعُ أَحْمَدَا»",
    "وَحَذْفُ مَا يُعْلَمُ جَائِزٌ؛ كَمَا # تَقُولُ: «زَيْدٌ» بَعْدَ «مَنْ عِنْدَكُمَا؟»",
    "وَفِي جَوَابِ «كَيْفَ زَيْدٌ؟» قُلْ: «دَنِفْ» # فَـ «زَيْدٌ» اسْتُغْنِيَ عَنْهُ إِذْ عُرِفْ",
    "وَبَعْدَ «لَوْلَا» غَالِباً حَذْفُ الْخَبَرْ # حَتْمٌ، وَفِي نَصِّ يَمِينٍ ذَا اسْتَقَرّْ",
    "وَبَعْدَ وَاوٍ عَيَّنَتْ مَفْهُومَ «مَعْ» # كَمِثْلِ «كُلُّ صَانِعٍ وَمَا صَنَعْ»",
    "وَقَبْلَ حَالٍ لَا يَكُونُ خَبَرَا # عَنِ الَّذِي خَبَرُهُ قَدْ أُضْمِرَا",
    "كَـ «ضَرْبِيَ الْعَبْدَ مُسِيئاً، وَأَتَمّْ # تَبْيِينِيَ الْحَقَّ مَنُوطاً بِالْحِكَمْ»",
    "وَأَخْبَرُوا بِاثْنَيْنِ أَوْ بِأَكْثَرَا # عَنْ وَاحِدٍ كَـ «هُمْ سَرَاةٌ شُعَرَا»",
  ]},
  {id:"alf-10",title:"«كَانَ» وَأَخَوَاتُهَا",sub:"Kâna et ses sœurs",clr:["#0f1a32","#1e3260"],bayts:[
    "تَرْفَعُ «كَانَ» الْمُبْتَدَا اسْماً، وَالْخَبَرْ # تَنْصِبُهُ كَـ «كَانَ سَيِّداً عُمَرْ»",
    "كَـ «كَانَ»: «ظَلَّ، بَاتَ، أَضْحَى، أَصْبَحَا # أَمْسَى، وَصَارَ، لَيْسَ، زَالَ، بَرِحَا",
    "فَتِئَ، وَانْفَكَّ»، وَهَذِي الْأَرْبَعَهْ # لِشِبْهِ نَفْيٍ أَوْ لِنَفْيٍ مُتْبَعَهْ",
    "وَمِثْلُ «كَانَ»: «دَامَ» مَسْبُوقاً بِـ «مَا» # كَـ «أَعْطِ مَا دُمْتَ مُصِيباً دِرْهَمَا»",
    "وَغَيْرُ مَاضٍ مِثْلَهُ قَدْ عَمِلَا # إِنْ كَانَ غَيْرُ الْمَاضِ مِنْهُ اسْتُعْمِلَا",
    "وَفِي جَمِيعِهَا تَوَسُّطَ الْخَبَرْ # أَجِزْ، وَكُلٌّ سَبْقَهُ «دَامَ» حَظَرْ",
    "كَذَاكَ سَبْقُ خَبَرٍ «مَا» النَّافِيَهْ # فَجِئْ بِهَا مَتْلُوَّةً لَا تَالِيَهْ",
    "وَمَنْعُ سَبْقِ خَبَرٍ «لَيْسَ» اصْطُفِي # وَذُو تَمَامٍ مَا بِرَفْعٍ يَكْتَفِي",
    "وَمَا سِوَاهُ نَاقِصٌ، وَالنَّقْصُ فِي # «فَتِئَ، لَيْسَ، زَالَ» دَائِماً قُفِي",
    "وَلَا يَلِي الْعَامِلَ مَعْمُولُ الْخَبَرْ # إِلَّا إِذَا ظَرْفاً أَتَى أَوْ حَرْفَ جَرّْ",
    "وَمُضْمَرَ الشَّأْنِ اسْماً انْوِ إِنْ وَقَعْ # مُوهِمُ مَا اسْتَبَانَ أَنَّهُ امْتَنَعْ",
    "وَقَدْ تُزَادُ «كَانَ» فِي حَشْوٍ كَـ «مَا # كَانَ أَصَحَّ عِلْمَ مَنْ تَقَدَّمَا!»",
    "وَيَحْذِفُونَهَا وَيُبْقُونَ الْخَبَرْ # وَبَعْدَ «إِنْ، وَلَوْ» كَثِيراً ذَا اشْتَهَرْ",
    "وَبَعْدَ «أَنْ» تَعْوِيضُ «مَا» عَنْهَا ارْتُكِبْ # كَمِثْلِ «أَمَّا أَنْتَ بَرّاً فَاقْتَرِبْ»",
    "وَمِنْ مُضَارِعٍ لِـ «كَانَ» مُنْجَزِمْ # تُحْذَفُ نُونٌ، وَهْوَ حَذْفٌ مَا الْتُزِمْ",
  ]},
  {id:"alf-11",title:"«مَا، وَلَا، وَلَاتَ، وَإِنِ» الْمُشَبَّهَاتُ بِـ «لَيْسَ»",sub:"Les particules assimilées à laysa",clr:["#140f32","#271e60"],bayts:[
    "إِعْمَالَ «لَيْسَ» أُعْمِلَتْ «مَا» دُونَ «إِنْ» # مَعَ بَقَا النَّفْيِ وَتَرْتِيبٍ زُكِنْ",
    "وَسَبْقَ حَرْفِ جَرٍّ أَوْ ظَرْفٍ - كَـ «مَا # بِي أَنْتَ مَعْنِيّاً» - أَجَازَ الْعُلَمَا",
    "وَرَفْعَ مَعْطُوفٍ بِـ «لَكِنْ» أَوْ بِـ «بَلْ» # مِنْ بَعْدِ مَنْصُوبٍ بِـ «مَا»: الْزَمْ حَيْثُ حَلّْ",
    "وَبَعْدَ «مَا، وَلَيْسَ» جَرَّ الْبَا الْخَبَرْ # وَبَعْدَ «لَا» وَنَفْيِ «كَانَ» قَدْ يُجَرّْ",
    "فِي النَّكِرَاتِ أُعْمِلَتْ كَـ «لَيْسَ»: «لَا» # وَقَدْ تَلِي «لَاتَ، وَإِنْ» ذَا الْعَمَلَا",
    "وَمَا لِـ «لَاتَ» فِي سِوَى «حِينٍ» عَمَلْ # وَحَذْفُ ذِي الرَّفْعِ فَشَا، وَالْعَكْسُ قَلّْ",
  ]},
  {id:"alf-12",title:"أَفْعَالُ الْمُقَارَبَةِ",sub:"Les verbes d'imminence",clr:["#0f2132","#1e3f60"],bayts:[
    "كَـ «كَانَ»: «كَادَ، وَعَسَى»، لَكِنْ نَدَرْ # غَيْرُ مُضَارِعٍ لِهَذَيْنِ خَبَرْ",
    "وَكَوْنُهُ بِدُونِ «أَنْ» بَعْدَ «عَسَى» # نَزْرٌ، وَ «كَادَ» الْأَمْرُ فِيهِ عُكِسَا",
    "وَكَـ «عَسَى»: «حَرَى»، وَلَكِنْ جُعِلَا # خَبَرُهَا حَتْماً بِـ «أَنْ» مُتَّصِلَا",
    "وَأَلْزَمُوا «اخْلَوْلَقَ»: «أَنْ» مِثْلَ «حَرَى» # وَبَعْدَ «أَوْشَكَ» انْتِفَا «أَنْ» نَزُرَا",
    "وَمِثْلُ «كَادَ» - فِي الْأَصَحِّ - «كَرَبَا» # وَتَرْكُ «أَنْ» مَعْ ذِي الشُّرُوعِ وَجَبَا",
    "كَـ «أَنْشَأَ السَّائِقُ يَحْدُو، وَطَفِقْ» # كَذَا «جَعَلْتُ، وَأَخَذْتُ، وَعَلِقْ»",
    "وَاسْتَعْمَلُوا مُضَارَعاً لِـ «أَوْشَكَا # وَكَادَ» لَا غَيْرُ، وَزَادُوا «مُوشِكَا»",
    "بَعْدَ «عَسَى، اخْلَوْلَقَ، أَوْشَكْ» قَدْ يَرِدْ # غِنىً بِـ «أَنْ يَفْعَلَ» عَنْ ثَانٍ فُقِدْ",
    "وَجَرِّدَنْ «عَسَى» أَوِ ارْفَعْ مُضْمَرَا # بِهَا؛ إِذَا اسْمٌ قَبْلَهَا قَدْ ذُكِرَا",
    "وَالْفَتْحَ وَالْكَسْرَ أَجِزْ فِي السِّينِ مِنْ # نَحْوِ «عَسَيْتُ»، وَانْتِقَا الْفَتْحِ زُكِنْ",
  ]},
  {id:"alf-13",title:"«إِنَّ» وَأَخَوَاتُهَا",sub:"Inna et ses sœurs",clr:["#180f32","#2f1e60"],bayts:[
    "لِـ «إِنَّ، أَنَّ، لَيْتَ، لَكِنَّ، لَعَلّْ # كَأَنَّ»: عَكْسُ مَا لِـ «كَانَ» مِنْ عَمَلْ",
    "كَـ «إِنَّ زَيْداً عَالِمٌ بِأَنِّي # كُفْءٌ، وَلَكِنَّ ابْنَهُ ذُو ضِغْنِ»",
    "وَرَاعِ ذَا التَّرْتِيبَ إِلَّا فِي الَّذِي # كَـ «لَيْتَ فِيهَا - أَوْ هُنَا - غَيْرَ الْبَذِي»",
    "وَهَمْزَ «إِنَّ» افْتَحْ لِسَدِّ مَصْدَرِ # مَسَدَّهَا، وَفِي سِوَى ذَاكَ اكْسِرِ",
    "فَاكْسِرْ فِي الِابْتِدَا، وَفِي بَدْءِ صِلَهْ # وَحَيْثُ «إِنَّ» لِيَمِينٍ مُكْمِلَهْ",
    "أَوْ حُكِيَتْ بِالْقَوْلِ، أَوْ حَلَّتْ مَحَلّْ # حَالٍ كَـ «زُرْتُهُ وَإِنِّي ذُو أَمَلْ»",
    "وَكَسَرُوا مِنْ بَعْدِ فِعْلٍ عُلِّقَا # بِاللَّامِ كَـ «اعْلَمْ إِنَّهُ لَذُو تُقَى»",
    "بَعْدَ «إِذَا» فُجَاءَةٍ أَوْ قَسَمِ # لَا لَامَ بَعْدَهُ بِوَجْهَيْنِ نُمِي",
    "مَعْ تِلْوِ فَا الْجَزَا، وَذَا يَطَّرِدُ # فِي نَحْوِ «خَيْرُ الْقَوْلِ إِنِّي أَحْمَدُ»",
    "وَبَعْدَ ذَاتِ الْكَسْرِ تَصْحَبُ الْخَبَرْ # لَامُ ابْتِدَاءٍ نَحْوُ «إِنِّي لَوَزَرْ»",
    "وَلَا يَلِي ذِي اللَّامَ مَا قَدْ نُفِيَا # وَلَا مِنَ الْأَفْعَالِ مَا كَـ «رَضِيَا»",
    "وَقَدْ يَلِيهَا مَعَ «قَدْ» كَـ «إِنَّ ذَا # لَقَدْ سَمَا عَلَى الْعِدَا مُسْتَحْوِذَا»",
    "وَتَصْحَبُ الْوَاسِطَ مَعْمُولَ الْخَبَرْ # وَالْفَصْلَ، وَاسْماً حَلَّ قَبْلَهُ الْخَبَرْ",
    "وَوَصْلُ «مَا» بِذِي الْحُرُوفِ مُبْطِلُ # إِعْمَالَهَا، وَقَدْ يُبَقَّى الْعَمَلُ",
    "وَجَائِزٌ رَفْعُكَ مَعْطُوفاً عَلَى # مَنْصُوبِ «إِنَّ» بَعْدَ أَنْ تَسْتَكْمِلَا",
    "وَأُلْحِقَتْ بِـ «إِنَّ»: «لَكِنَّ، وَأَنّْ» # مِنْ دُونِ «لَيْتَ، وَلَعَلَّ، وَكَأَنّْ»",
    "وَخُفِّفَتْ «إِنَّ» فَقَلَّ الْعَمَلُ # وَتَلْزَمُ اللَّامُ إِذَا مَا تُهْمَلُ",
    "وَرُبَّمَا اسْتُغْنِيَ عَنْهَا إِنْ بَدَا # مَا نَاطِقٌ أَرَادَهُ مُعْتَمِدَا",
    "وَالْفِعْلُ إِنْ لَمْ يَكُ نَاسِخاً فَلَا # تُلْفِيهِ غَالِباً بِـ «إِنْ» ذِي مُوصَلَا",
    "وَإِنْ تُخَفَّفْ «أَنَّ» فَاسْمُهَا اسْتَكَنّْ # وَالْخَبَرَ اجْعَلْ جُمْلَةً مِنْ بَعْدِ «أَنْ»",
    "وَإِنْ يَكُنْ فِعْلاً وَلَمْ يَكُنْ دُعَا # وَلَمْ يَكُنْ تَصْرِيفُهُ مُمْتَنِعَا",
    "فَالْأَحْسَنُ الْفَصْلُ بِـ «قَدْ» أَوْ نَفْيٍ أَوْ # تَنْفِيسٍ أَوْ «لَوْ»، وَقَلِيلٌ ذِكْرُ «لَوْ»",
    "وَخُفِّفَتْ «كَأَنَّ» أَيْضاً فَنُوِي # مَنْصُوبُهَا، وَثَابِتاً أَيْضاً رُوِي",
  ]},
  {id:"alf-14",title:"«لَا» الَّتِي لِنَفْيِ الْجِنْسِ",sub:"Le lâ de négation générique",clr:["#0f1632","#1e2b60"],bayts:[
    "عَمَلَ «إِنَّ» اجْعَلْ لِـ «لَا» فِي نَكِرَهْ # مُفْرَدَةً جَاءَتْكَ أَوْ مُكَرَّرَهْ",
    "فَانْصِبْ بِهَا مُضَافاً أَوْ مُضَارِعَهْ # وَبَعْدَ ذَاكَ الْخَبَرَ اذْكُرْ رَافِعَهْ",
    "وَرَكِّبِ الْمُفْرَدَ فَاتِحاً كَـ «لَا # حَوْلَ وَلَا قُوَّةَ»، وَالثَّانِ اجْعَلَا",
    "مَرْفُوعاً أَوْ مَنْصُوباً أَوْ مُرَكَّبَا # وَإِنْ رَفَعْتَ أَوَّلاً لَا تَنْصِبَا",
    "وَمُفْرَدًا نَعَتًا لِمُبْنًى يَلِي # فَافْتَحْ أَوِ انْصِبْنْ أَوِ ارْفَعْ تَعْدِلِ",
    "وَغَيْرُ مَا يَلِي وَغَيْرُ الْمُفْرَدِ # لَا تَبْنِ وَانْصِبْهُ أَوِ الرَّفْعَ اقْصِدِ",
    "وَالْعَطْفُ إِنْ لَمْ تَتَكَرَّرْ لَا احْكُمَا # لَهُ بِمَا لِلنَّعْتِ ذِي الْفَصْلِ انْتَمَى",
    "وَأَعْطِ لَا مَعْ هَمْزَةِ اسْتِفْهَامٍ # مَا تَسْتَحِقُّ دُونَ الْاسْتِفْهَامِ",
    "وَشَاعَ فِي ذَا الْبَابِ إِسْقَاطُ الْخَبَرِ # إِذَا الْمُرَادُ مَعَ سُقُوطِهِ ظَهَرْ",
  ]},
  {id:"alf-15",title:"ظَنَّ وَأَخَوَاتُهَا",sub:"Zhanna et ses sœurs",clr:["#110f32","#201e60"],bayts:[
    "انْصِبْ بِفِعْلِ الْقَلْبِ جُزْأَيْ ابْتِدَا # أَعْنِي «رَأَى، خَالَ، عَلِمْتُ، وَجَدَا»",
    "«ظَنَّ، حَسِبْتُ، وَزَعَمْتُ» مَعْ عَدِّ # «حَجَا، دَرَى، وَجَعَلَ» الَّذِي كَاعْتَقَدْ",
    "وَهَبْ، تَعَلَّمْ، وَالَّتِي كَصِّيرَا # أَيْضًا بِهَا انْصِبْ مُبْتَدَأً وَخَبَرَا",
    "وَخُصَّ بِالتَّعَلِيقِ وَالْإِلْغَاءِ مَا # مِنْ قَبْلُ «هَبْ»، وَالْأَمْرُ «هَبْ» قَدْ أُلْزِمَا",
    "كَذَا «تَعَلَّمْ»، وَلِغَيْرِ الْمَاضِ مِنْ # سِوَاهُمَا اجْعَلْ كُلَّ مَا لَهُ زَكَنْ",
    "وَجَوَّزَ الْإِلْغَاءَ لَا فِي الِابْتِدَا # وَانْوِ ضَمِيرَ الشَّأْنِ أَوْ لَامَ ابْتِدَا",
    "فِي مُوهِمِ إِلْغَاءٍ مَا تَقَدَّمَا # وَالْتَزِمِ التَّعَلِيقَ قَبْلَ نَفْيِ مَا",
    "وَ«إِنْ، وَلَا»، لَامُ ابْتِدَاءٍ أَوْ قَسَمْ # كَذَا، وَالِاسْتِفْهَامُ ذَا لَهُ انْحَتَمْ",
    "لِعِلْمِ عِرْفَانٍ وَظَنٍّ تُهَمَهْ # تَعْدِيَةٌ لِوَاحِدٍ مُلْتَزَمَهْ",
    "وَلِـ «رَأَى» الرُّؤْيَا انْمِ مَا لِـ «عَلِمَا» # طَالِبَ مَفْعُولَيْنِ مِنْ قَبْلُ انْتَمَى",
    "وَلَا تُجِزْ هُنَا بِلَا دَلِيلِ # سُقُوطَ مَفْعُولَيْنِ أَوْ مَفْعُولِ",
    "وَكَـ «تَظُنُّ» اجْعَلْ «تَقُولُ» إِنْ وَلِي # مُسْتَفْهَمًا بِهِ وَلَمْ يَنْفَصِلِ",
    "بِغَيْرِ ظَرْفٍ أَوْ كَظَرْفٍ أَوْ عَمَلْ # وَإِنْ بِبَعْضِ ذِي فَصَلْتَ يُحْتَمَلْ",
    "وَأُجْرِيَ الْقَوْلُ كَظَنٍّ مُطْلَقًا # عِنْدَ سُلَيْمٍ نَحْوُ «قُلْ ذَا مُشْفِقًا»",
  ]},
  {id:"alf-16",title:"أَعْلَمَ وَأَرَى",sub:"A'lama et Ará (verbes à 3 objets)",clr:["#0f1c32","#1e3660"],bayts:[
    "إِلَى ثَلَاثَةٍ «رَأَى، وَعَلِمَا» # عَدُّوا؛ إِذَا صَارَا «أَرَى، وَأَعْلَمَا»",
    "وَمَا لِمَفْعُولَيْ «عَلِمْتُ» مُطْلَقًا # لِلثَّانِ وَالثَّالِثِ أَيْضًا حُقِّقَا",
    "وَإِنْ تَعَدَّيَا لِوَاحِدٍ بِلَا # هَمْزٍ: فَلِاثْنَيْنِ بِهِ تَوَصَّلَا",
    "وَالثَّانِ مِنْهُمَا كَثَانِي اثْنَيْ «كَسَا» # فَهُوَ بِهِ فِي كُلِّ حُكْمٍ ذُو ائْتِسَا",
    "وَكَـ «أَرَى» السَّابِقِ «نَبَّا، أَخْبَرَا # حَدَّثَ، أَنْبَأَ، كَذَاكَ خَبَّرَا»",
  ]},
  {id:"alf-17",title:"الْفَاعِلُ",sub:"Le sujet (fâ'il)",clr:["#0f1232","#1e2460"],bayts:[
    "الْفَاعِلُ: الَّذِي كَمَرْفُوعَيْ «أَتَى # زَيْدٌ، مُنِيرًا وَجْهُهُ، نِعْمَ الْفَتَى»",
    "وَبَعْدَ فِعْلٍ فَاعِلٌ، فَإِنْ ظَهَرْ # فَهُوَ، وَإِلَّا فَضَمِيرٌ اسْتَتَرْ",
    "وَجَرِّدِ الْفِعْلَ إِذَا مَا أُسْنِدَا # لِاثْنَيْنِ أَوْ جَمْعٍ كَـ «فَازَ الشُّهَدَا»",
    "وَقَدْ يُقَالُ: «سَعِدَا، وَسَعِدُوا» # وَالْفِعْلُ لِلظَّاهِرِ بَعْدُ مُسْنَدُ",
    "وَيَرْفَعُ الْفَاعِلَ فِعْلٌ أُضْمِرَا # كَمِثْلِ «زَيْدٌ» فِي جَوَابِ «مَنْ قَرَا؟»",
    "وَتَاءُ تَأْنِيثٍ تَلِي الْمَاضِي إِذَا # كَانَ لِأُنْثَى كَـ «أَبَتْ هِنْدُ الْأَذَى»",
    "وَإِنَّمَا تَلْزَمُ فِعْلَ مُضْمَرِ # مُتَّصِلٍ أَوْ مُفْهِمٍ ذَاتَ حِرِ",
    "وَقَدْ يُبِيحُ الْفَصْلُ تَرْكَ التَّاءِ فِي # نَحْوِ «أَتَى الْقَاضِيَ بِنْتُ الْوَاقِفِ»",
    "وَالْحَذْفُ مَعْ فَصْلٍ بِـ «إِلَّا» فُضِّلَا # كَـ «مَا زَكَا إِلَّا فَتَاةُ ابْنِ الْعَلَا»",
    "وَالْحَذْفُ قَدْ يَأْتِي بِلَا فَصْلٍ، وَمَعْ # ضَمِيرِ ذِي الْمَجَازِ فِي شِعْرٍ وَقَعْ",
    "وَالتَّاءُ مَعْ جَمْعٍ سِوَى السَّالِمِ مِنْ # مُذَكَّرٍ: كَالتَّاءِ مَعْ إِحْدَى اللَّبِنْ",
    "وَالْحَذْفَ فِي «نِعْمَ الْفَتَاةُ» اسْتَحْسَنُوا # لِأَنَّ قَصْدَ الْجِنْسِ فِيهِ بَيِّنُ",
    "وَالْأَصْلُ فِي الْفَاعِلِ أَنْ يَتَّصِلَا # وَالْأَصْلُ فِي الْمَفْعُولِ أَنْ يَنْفَصِلَا",
    "وَقَدْ يُجَاءُ بِخِلَافِ الْأَصْلِ # وَقَدْ يَجِي الْمَفْعُولُ قَبْلَ الْفِعْلِ",
    "وَأَخِّرِ الْمَفْعُولَ إِنْ لَبْسٌ حُذِرْ # أَوْ أُضْمِرَ الْفَاعِلُ غَيْرَ مُنْحَصِرْ",
    "وَمَا بِـ «إِلَّا» أَوْ بِـ «إِنَّمَا» انْحَصَرْ # أَخِّرْ، وَقَدْ يَسْبِقُ إِنْ قَصْدٌ ظَهَرْ",
    "وَشَاعَ نَحْوُ «خَافَ رَبَّهُ عُمَرْ» # وَشَذَّ نَحْوُ «زَانَ نَوْرُهُ الشَّجَرْ»",
  ]},
  {id:"alf-18",title:"النَّائِبُ عَنِ الْفَاعِلِ",sub:"Le substitut du sujet (passif)",clr:["#0f1a32","#1e3260"],bayts:[
    "يَنُوبُ مَفْعُولٌ بِهِ عَنْ فَاعِلِ # فِيمَا لَهُ كَـ «نِيلَ خَيْرُ نَائِلِ»",
    "فَأَوَّلَ الْفِعْلِ اضْمُمَنْ، وَالْمُتَّصِلْ # بِالْآخِرِ اكْسِرْ فِي مُضِيٍّ كَـ «وُصِلْ»",
    "وَاجْعَلْهُ مِنْ مُضَارِعٍ مُنْفَتِحَا # كَـ «يَنْتَحِي» الْمَقُولِ فِيهِ: «يُنْتَحَى»",
    "وَالثَّانِيَ التَّالِيَ «تَا الْمُطَاوَعَهْ» # كَالْأَوَّلِ اجْعَلْهُ بِلَا مُنَازَعَهْ",
    "وَثَالِثَ الَّذِي بِهَمْزِ الْوَصْلِ # كَالْأَوَّلِ اجْعَلَنَّهُ كَـ «اسْتُحْلِي»",
    "وَاكْسِرْ أَوَ اشْمِمْ فَا ثُلَاثِيٍّ أُعِلِّ # عَيْنًا، وَضَمٌّ جَا - كَـ «بُوعَ» - فَاحْتُمِلْ",
    "وَإِنْ بِشَكْلٍ خِيفَ لَبْسٌ يُجْتَنَبْ # وَمَا لِـ «بَاعَ» قَدْ يُرَى لِنَحْوِ «حَبِّ»",
    "وَمَا لِفَا «بَاعَ»: لِمَا الْعَيْنُ تَلِي # فِي «اخْتَارَ، وَانْقَادَ» وَشِبْهٍ يَنْجَلِي",
    "وَقَابِلٌ مِنْ ظَرْفٍ أَوْ مِنْ مَصْدَرِ # أَوْ حَرْفِ جَرٍّ بِنِيَابَةٍ حَرِي",
    "وَلَا يَنُوبُ بَعْضُ هَذِي إِنْ وُجِدْ # فِي اللَّفْظِ مَفْعُولٌ بِهِ، وَقَدْ يَرِدْ",
    "وَبِاتِّفَاقٍ قَدْ يَنُوبُ الثَّانِ مِنْ # بَابِ «كَسَا» فِيمَا الْتِبَاسُهُ أُمِنْ",
    "فِي بَابِ «ظَنَّ، وَأَرَى» الْمَنْعُ اشْتَهَرْ # وَلَا أَرَى مَنْعًا إِذَا الْقَصْدُ ظَهَرْ",
    "وَمَا سِوَى النَّائِبِ مِمَّا عُلِّقَا # بِالرَّافِعِ: النَّصْبُ لَهُ مُحَقَّقَا",
  ]},
  {id:"alf-19",title:"اشْتِغَالُ الْعَامِلِ عَنِ الْمَعْمُولِ",sub:"L'ishtighâl",clr:["#140f32","#271e60"],bayts:[
    "إِنْ مُضْمَرُ اسْمٍ سَابِقٍ فِعْلًا شَغَلْ # عَنْهُ بِنَصْبِ لَفْظِهِ أَوِ الْمَحَلِّ",
    "فَالسَّابِقَ انْصِبْهُ بِفِعْلٍ أُضْمِرَا # حَتْمًا مُوَافِقٍ لِمَا قَدْ أُظْهِرَا",
    "وَالنَّصْبُ حَتْمٌ إِنْ تَلَا السَّابِقُ مَا # يَخْتَصُّ بِالْفِعْلِ كَـ «إِنْ، وَحَيْثُمَا»",
    "وَإِنْ تَلَا السَّابِقُ مَا بِالِابْتِدَا # يَخْتَصُّ: فَالرَّفْعَ الْتَزِمْهُ أَبَدَا",
    "كَذَا إِذَا الْفِعْلُ تَلَا مَا لَمْ يَرِدْ # مَا قَبْلَهُ مَعْمُولَ مَا بَعْدُ وُجِدْ",
    "وَاخْتِيرَ نَصْبٌ قَبْلَ فِعْلٍ ذِي طَلَبْ # وَبَعْدَ مَا إِيلَاؤُهُ الْفِعْلَ غَلَبْ",
    "وَبَعْدَ عَاطِفٍ بِلَا فَصْلٍ عَلَى # مَعْمُولِ فِعْلٍ مُسْتَقِرٍّ أَوَّلَا",
    "وَإِنْ تَلَا الْمَعْطُوفُ فِعْلًا مُخْبَرَا # بِهِ عَنِ اسْمٍ فَاعْطِفَنْ مُخَيَّرَا",
    "وَالرَّفْعُ فِي غَيْرِ الَّذِي مَرَّ رَجَحْ # فَمَا أُبِيحَ افْعَلْ، وَدَعْ مَا لَمْ يُبَحْ",
    "وَفَصْلُ مَشْغُولٍ بِحَرْفِ جَرٍّ # أَوْ بِإِضَافَةٍ كَوَصْلٍ يَجْرِي",
    "وَسَوِّ فِي ذَا الْبَابِ وَصْفًا ذَا عَمَلْ # بِالْفِعْلِ؛ إِنْ لَمْ يَكُ مَانِعٌ حَصَلْ",
    "وَعُلْقَةٌ حَاصِلَةٌ بِتَابِعِ # كَعُلْقَةٍ بِنَفْسِ الِاسْمِ الْوَاقِعِ",
  ]},
  {id:"alf-20",title:"تَعَدِّي الْفِعْلِ وَلُزُومُهُ",sub:"Verbes transitifs et intransitifs",clr:["#0f2132","#1e3f60"],bayts:[
    "عَلَامَةُ الْفِعْلِ الْمُعَدَّى أَنْ تَصِلْ # هَا غَيْرَ مَصْدَرٍ بِهِ نَحْوُ «عَمَلْ»",
    "فَانْصِبْ بِهِ مَفْعُولَهُ إِنْ لَمْ يَنُبْ # عَنْ فَاعِلٍ نَحْوُ «تَدَبَّرْتُ الْكُتُبْ»",
    "وَلَازِمٌ غَيْرُ الْمُعَدَّى، وَحُتِمْ # لُزُومُ أَفْعَالِ السَّجَايَا كَـ «نَهِمْ»",
    "كَذَا «افْعَلَلَّ»، وَالْمُضَاهِي «اقْعَنْسَسَا» # وَمَا اقْتَضَى نَظَافَةً أَوْ دَنَسَا",
    "أَوْ عَرَضًا، أَوْ طَاوَعَ الْمُعَدَّى # لِوَاحِدٍ كَـ «مَدَّهُ فَامْتَدَّا»",
    "وَعَدِّ لَازِمًا بِحَرْفِ جَرٍّ # وَإِنْ حُذِفْ فَالنَّصْبُ لِلْمُنْجَرِّ",
    "نَقْلًا، وَفِي «أَنَّ، وَأَنْ» يَطَّرِدُ # مَعْ أَمْنِ لَبْسٍ كَـ «عَجِبْتُ أَنْ يَدُوا»",
    "وَالْأَصْلُ سَبْقُ فَاعِلٍ مَعْنًى كَـ «مَنْ» # مِنْ «أَلْبِسَنْ مَنْ زَارَكُمْ نَسْجَ الْيَمَنْ»",
    "وَيَلْزَمُ الْأَصْلُ لِمُوجِبٍ عَرَا # وَتَرْكُ ذَاكَ الْأَصْلِ حَتْمًا قَدْ يُرَى",
    "وَحَذْفَ فَضْلَةٍ أَجِزْ إِنْ لَمْ يَضِرْ # كَحَذْفِ مَا سِيقَ جَوَابًا أَوْ حُصِرْ",
    "وَيُحْذَفُ النَّاصِبُهَا إِنْ عُلِمَا # وَقَدْ يَكُونُ حَذْفُهُ مُلْتَزَمَا",
  ]},
  {id:"alf-21",title:"التَّنَازُعُ فِي الْعَمَلِ",sub:"Le tanâzu' (conflit de régence)",clr:["#180f32","#2f1e60"],bayts:[
    "إِنْ عَامِلَانِ اقْتَضَيَا فِي اسْمٍ عَمَلْ # قَبْلُ: فَلِلْوَاحِدِ مِنْهُمَا الْعَمَلْ",
    "وَالثَّانِ أَوْلَى عِنْدَ أَهْلِ الْبَصْرَهْ # وَاخْتَارَ عَكْسًا غَيْرُهُمْ ذَا أُسْرَهْ",
    "وَأَعْمِلِ الْمُهْمَلَ فِي ضَمِيرِ مَا # تَنَازَعَاهُ، وَالْتَزِمْ مَا الْتُزِمَا",
    "كَـ «يُحْسِنَانِ وَيُسِيءُ ابْنَاكَا # وَقَدْ بَغَى وَاعْتَدَيَا عَبْدَاكَا»",
    "وَلَا تَجِئْ مَعْ أَوَّلٍ قَدْ أُهْمِلَا # بِمُضْمَرٍ لِغَيْرِ رَفْعٍ أُوهِلَا",
    "بَلْ حَذْفَهُ الْزَمْ إِنْ يَكُنْ غَيْرَ خَبَرْ # وَأَخِّرَنْهُ إِنْ يَكُنْ هُوَ الْخَبَرْ",
    "وَأَظْهِرِ انْ يَكُنْ ضَمِيرٌ خَبَرَا # لِغَيْرِ مَا يُطَابِقُ الْمُفَسِّرَا",
    "نَحْوُ «أَظُنُّ وَيَظُنَّانِي أَخَا # زَيْدًا وَعَمْرًا أَخَوَيْنِ فِي الرَّخَا»",
  ]},
  {id:"alf-22",title:"الْمَفْعُولُ الْمُطْلَقُ",sub:"Le complément absolu",clr:["#0f1632","#1e2b60"],bayts:[
    "«الْمَصْدَرُ»: اسْمُ مَا سِوَى الزَّمَانِ مِنْ # مَدْلُولَيِ الْفِعْلِ كَـ «أَمْنٍ» مِنْ «أَمِنْ»",
    "بِمِثْلِهِ أَوْ فِعْلٍ أَوْ وَصْفٍ نُصِبْ # وَكَوْنُهُ أَصْلًا لِهَذَيْنِ انْتُخِبْ",
    "تَوْكِيدًا أَوْ نَوْعًا يُبِينُ أَوْ عَدَدْ # كَـ «سِرْتُ سَيْرَتَيْنِ؛ سَيْرَ ذِي رَشَدْ»",
    "وَقَدْ يَنُوبُ عَنْهُ مَا عَلَيْهِ دَلِّ # كَـ «جِدَّ كُلَّ الْجِدِّ، وَافْرَحِ الْجَذَلْ»",
    "وَمَا لِتَوْكِيدٍ فَوَحِّدْ أَبَدَا # وَثَنِّ وَاجْمَعْ غَيْرَهُ وَأَفْرِدَا",
    "وَحَذْفُ عَامِلِ الْمُؤَكَّدِ امْتَنَعْ # وَفِي سِوَاهُ لِدَلِيلٍ مُتَّسَعْ",
    "وَالْحَذْفُ حَتْمٌ مَعَ آتٍ بَدَلَا # مِنْ فِعْلِهِ كَـ «نَدْلًا» اللَّذْ كَـ «انْدُلَا»",
    "وَمَا لِتَفْصِيلٍ كَـ «إِمَّا مَنًّا # عَامِلُهُ يُحْذَفُ حَيْثُ عَنَّا»",
    "كَذَا مُكَرَّرٌ وَذُو حَصْرٍ وَرَدْ # نَائِبَ فِعْلٍ لِاسْمِ عَيْنٍ اسْتَنَدْ",
    "وَمِنْهُ مَا يَدْعُونَهُ مُؤَكِّدًا # لِنَفْسِهِ أَوْ غَيْرِهِ، فَالْمُبْتَدَا",
    "نَحْوُ «لَهُ عَلَيَّ أَلْفٌ عُرْفَا» # وَالثَّانِ كَـ «ابْنِي أَنْتَ حَقًّا صِرْفَا»",
    "كَذَاكَ ذُو التَّشْبِيهِ بَعْدَ جُمْلَهْ # كَـ «لِي بُكًا بُكَاءَ ذَاتِ عُضْلَهْ»",
  ]},
  {id:"alf-23",title:"الْمَفْعُولُ لَهُ",sub:"Le complément de cause",clr:["#110f32","#201e60"],bayts:[
    "يُنْصَبُ مَفْعُولًا لَهُ الْمَصْدَرُ إِنْ # أَبَانَ تَعْلِيلًا كَـ «جُدْ شُكْرًا، وَدِنْ»",
    "وَهُوَ بِمَا يَعْمَلُ فِيهِ مُتَّحِدْ # وَقْتًا وَفَاعِلًا، وَإِنْ شَرْطٌ فُقِدْ",
    "فَاجْرُرْهُ بِالْحَرْفِ، وَلَيْسَ يَمْتَنِعْ # مَعَ الشُّرُوطِ كَـ «لِزُهْدٍ ذَا قَنِعْ»",
    "وَقَلَّ أَنْ يَصْحَبَهُ الْمُجَرَّدُ # وَالْعَكْسُ فِي مَصْحُوبِ «أَلْ»، وَأَنْشَدُوا",
    "«لَا أَقْعُدُ الْجُبْنُ عَنِ الْهَيْجَاءِ # وَلَوْ تَوَالَتْ زُمَرُ الْأَعْدَاءِ»",
  ]},
  {id:"alf-24",title:"الْمَفْعُولُ فِيهِ وَهُوَ الْمُسَمَّى ظَرْفًا",sub:"Le complément de lieu/temps",clr:["#0f1c32","#1e3660"],bayts:[
    "«الظَّرْفُ»: وَقْتٌ أَوْ مَكَانٌ ضُمِّنَا # «فِي» بِاطِّرَادٍ كَـ «هُنَا امْكُثْ أَزْمُنَا»",
    "فَانْصِبْهُ بِالْوَاقِعِ فِيهِ مُظْهَرَا # كَانَ، وَإِلَّا فَانْوِهِ مُقَدَّرَا",
    "وَكُلُّ وَقْتٍ قَابِلٌ ذَاكَ، وَمَا # يَقْبَلُهُ الْمَكَانُ إِلَّا مُبْهَمَا",
    "نَحْوُ الْجِهَاتِ، وَالْمَقَادِيرِ، وَمَا # صِيغَ مِنَ الْفِعْلِ كَـ «مَرْمًى» مِنْ «رَمَى»",
    "وَشَرْطُ كَوْنِ ذَا مَقِيسًا أَنْ يَقَعْ # ظَرْفًا لِمَا فِي أَصْلِهِ مَعْهُ اجْتَمَعْ",
    "وَمَا يُرَى ظَرْفًا وَغَيْرَ ظَرْفِ # فَذَاكَ ذُو تَصَرُّفٍ فِي الْعُرْفِ",
    "وَغَيْرُ ذِي التَّصَرُّفِ الَّذِي لَزِمْ # ظَرْفِيَّةً أَوْ شِبْهَهَا مِنَ الْكَلِمْ",
    "وَقَدْ يَنُوبُ عَنْ مَكَانٍ مَصْدَرُ # وَذَاكَ فِي ظَرْفِ الزَّمَانِ يَكْثُرُ",
  ]},
  {id:"alf-25",title:"الْمَفْعُولُ مَعَهُ",sub:"Le complément d'accompagnement",clr:["#0f1232","#1e2460"],bayts:[
    "يُنْصَبُ تَالِي الْوَاوِ مَفْعُولًا مَعَهْ # فِي نَحْوِ «سِيرِي وَالطَّرِيقَ مُسْرِعَهْ»",
    "بِمَا مِنَ الْفِعْلِ وَشِبْهِهِ سَبَقْ # ذَا النَّصْبُ، لَا بِالْوَاوِ فِي الْقَوْلِ الْأَحَقِّ",
    "وَبَعْدَ «مَا» اسْتِفْهَامٍ أَوْ «كَيْفَ» نَصَبْ # بِفِعْلِ كَوْنٍ مُضْمَرٍ بَعْضُ الْعَرَبْ",
    "وَالْعَطْفُ إِنْ يُمْكِنْ بِلَا ضَعْفٍ أَحَقِّ # وَالنَّصْبُ مُخْتَارٌ لَدَى ضَعْفِ النَّسَقْ",
    "وَالنَّصْبُ إِنْ لَمْ يَجُزِ الْعَطْفُ يَجِبْ # أَوِ اعْتَقِدْ إِضْمَارَ عَامِلٍ تُصِبْ",
  ]},
  {id:"alf-26",title:"الِاسْتِثْنَاءُ",sub:"L'exception",clr:["#0f1a32","#1e3260"],bayts:[
    "مَا اسْتَثْنَتِ «إِلَّا» مَعْ تَمَامٍ يَنْتَصِبْ # وَبَعْدَ نَفْيٍ أَوْ كَنَفْيٍ انْتُخِبْ",
    "إِتْبَاعُ مَا اتَّصَلَ، وَانْصِبْ مَا انْقَطَعْ # وَعَنْ تَمِيمٍ فِيهِ إِبْدَالٌ وَقَعْ",
    "وَغَيْرُ نَصْبِ سَابِقٍ فِي النَّفْيِ قَدْ # يَأْتِي، وَلَكِنْ نَصْبَهُ اخْتَرْ إِنْ وَرَدْ",
    "وَإِنْ يُفَرَّغْ سَابِقٌ «إِلَّا» لِمَا # بَعْدُ: يَكُنْ كَمَا لَوِ «إِلَّا» عُدِمَا",
    "وَأَلْغِ «إِلَّا» ذَاتَ تَوْكِيدٍ كَـ «لَا # تَمُرُّرْ بِهِمْ إِلَّا الْفَتَى إِلَّا الْعَلَا»",
    "وَإِنْ تُكَرَّرْ لَا لِتَوْكِيدٍ فَمَعْ # تَفْرِيغٍ التَّأْثِيرَ بِالْعَامِلِ دَعْ",
    "فِي وَاحِدٍ مِمَّا بِـ «إِلَّا» اسْتُثْنِي # وَلَيْسَ عَنْ نَصْبِ سِوَاهُ مُغْنِي",
    "وَدُونَ تَفْرِيغٍ مَعَ التَّقَدُّمِ # نَصْبَ الْجَمِيعِ احْكُمْ بِهِ وَالْتَزِمِ",
    "وَانْصِبْ لِتَأْخِيرٍ وَجِئْ بِوَاحِدِ # مِنْهَا كَمَا لَوْ كَانَ دُونَ زَائِدِ",
    "كَـ «لَمْ يَفُوا إِلَّا امْرُؤٌ إِلَّا عَلِيٌّ» # وَحُكْمُهَا فِي الْقَصْدِ حُكْمُ الْأَوَّلِ",
    "وَاسْتَثْنِ مَجْرُورًا بِـ «غَيْرٍ» مُعْرَبَا # بِمَا لَمْ يُسْتَثْنَ بِـ «إِلَّا» نُسِبَا",
    "وَلِـ «سِوَىً، سُوَىً، سَوَاءٍ» اجْعَلَا # - عَلَى الْأَصَحِّ - مَا لِـ «غَيْرٍ» جُعَلَا",
    "وَاسْتَثْنِ نَاصِبًا بِـ «لَيْسَ، وَخَلَا» # وَبِـ «عَدَا» وَبِـ «يَكُونُ» بَعْدَ «لَا»",
    "وَاجْرُرْ بِسَابِقَيْ «يَكُونُ» إِنْ تُرِدْ # وَبَعْدَ «مَا» انْصِبْ، وَانْجِرَارٌ قَدْ يَرِدْ",
    "وَحَيْثُ جَرَّا فَهُمَا حَرْفَانِ # كَمَا هُمَا إِنْ نَصَبَا فِعْلَانِ",
    "وَكَـ «خَلَا»: «حَاشَا»، وَلَا تَصْحَبُ «مَا» # وَقِيلَ: «حَاشَ، وَحَشَا» فَاحْفَظْهُمَا",
  ]},
  {id:"alf-27",title:"الْحَالُ",sub:"Le circonstant d'état (hâl)",clr:["#140f32","#271e60"],bayts:[
    "«الْحَالُ»: وَصْفٌ فَضْلَةٌ مُنْتَصِبُ # مُفْهِمُ «فِي حَالِ» كَـ «فَرْدًا أَذْهَبُ»",
    "وَكَوْنُهُ مُنْتَقِلًا مُشْتَقًّا # يَغْلِبُ، لَكِنْ لَيْسَ مُسْتَحَقًّا",
    "وَيَكْثُرُ الْجُمُودُ فِي سِعْرٍ وَفِي # مُبْدِي تَأَوُّلٍ بِلَا تَكَلُّفِ",
    "كَـ «بِعْهُ مُدًّا بِكَذَا يَدًا بِيَدْ» # وَ «كَرَّ زَيْدٌ أَسَدًا» أَيْ: كَأَسَدْ",
    "وَالْحَالُ إِنْ عُرِّفَ لَفْظًا فَاعْتَقِدْ # تَنْكِيرَهُ مَعْنًى كَـ «وَحْدَكَ اجْتَهِدْ»",
    "وَمَصْدَرٌ مُنَكَّرٌ حَالًا يَقَعْ # بِكَثْرَةٍ كَـ «بَغْتَةً زَيْدٌ طَلَعْ»",
    "وَلَمْ يُنَكَّرْ غَالِبًا ذُو الْحَالِ إِنْ # لَمْ يَتَأَخَّرْ أَوْ يُخَصَّصْ أَوْ يَبِنْ",
    "مِنْ بَعْدِ نَفْيٍ أَوْ مُضَاهِيهِ كَـ «لَا # يَبْغِ امْرُؤٌ عَلَى امْرِئٍ مُسْتَسْهِلَا»",
    "وَسَبْقَ حَالِ مَا بِحَرْفِ جَرٍّ قَدْ # أَبَوْا، وَلَا أَمْنَعُهُ فَقَدْ وَرَدْ",
    "وَلَا تُجِزْ حَالًا مِنَ الْمُضَافِ لَهْ # إِلَّا إِذَا اقْتَضَى الْمُضَافُ عَمَلَهْ",
    "أَوْ كَانَ جُزْءَ مَا لَهُ أُضِيفَا # أَوْ مِثْلَ جُزْئِهِ، فَلَا تَحِيفَا",
    "وَالْحَالُ إِنْ يُنْصَبْ بِفِعْلٍ صُرِّفَا # أَوْ صِفَةٍ أَشْبَهَتِ الْمُصَرَّفَا",
    "فَجَائِزٌ تَقْدِيمُهُ كَـ «مُسْرِعَا # ذَا رَاحِلٌ، وَمُخْلِصًا زَيْدٌ دَعَا»",
    "وَعَامِلٌ ضُمِّنَ مَعْنَى الْفِعْلِ لَا # حُرُوفَهُ: مُؤَخَّرًا لَنْ يَعْمَلَا",
    "كَـ «تِلْكَ، لَيْتَ، وَكَأَنَّ»، وَنَدَرْ # نَحْوُ «سَعِيدٌ مُسْتَقِرًّا فِي هَجَرْ»",
    "وَنَحْوُ «زَيْدٌ مُفْرَدًا أَنْفَعُ مِنْ # عَمْرٍو مُعَانًا» مُسْتَجَازٌ لَنْ يَهِنْ",
    "وَالْحَالُ قَدْ يَجِيءُ ذَا تَعَدُّدِ # لِمُفْرَدٍ - فَاعْلَمْ - وَغَيْرِ مُفْرَدِ",
    "وَعَامِلُ الْحَالِ بِهَا قَدْ أُكِّدَا # فِي نَحْوِ «لَا تَعْثَ فِي الْأَرْضِ مُفْسِدَا»",
    "وَإِنْ تُؤَكِّدْ جُمْلَةً فَمُضْمَرُ # عَامِلُهَا، وَلَفْظُهَا يُؤَخَّرُ",
    "وَمَوْضِعَ الْحَالِ تَجِيءُ جُمْلَهْ # كَـ «جَاءَ زَيْدٌ وَهُوَ نَاوٍ رِحْلَهْ»",
    "وَذَاتُ بَدْءٍ بِمُضَارِعٍ ثَبَتْ # حَوَتْ ضَمِيرًا، وَمِنَ الْوَاوِ خَلَتْ",
    "وَذَاتَ وَاوٍ بَعْدَهَا انْوِ مُبْتَدَا # لَهُ الْمُضَارِعَ اجْعَلَنَّ مُسْنَدَا",
    "وَجُمْلَةُ الْحَالِ سِوَى مَا قُدِّمَا # بِوَاوٍ أَوْ بِمُضْمَرٍ أَوْ بِهِمَا",
    "وَالْحَالُ قَدْ يُحْذَفُ مَا فِيهَا عَمَلْ # وَبَعْضُ مَا يُحْذَفُ ذِكْرُهُ حُظِلْ",
  ]},
  {id:"alf-28",title:"التَّمْيِيزُ",sub:"Le spécificatif (tamyîz)",clr:["#0f2132","#1e3f60"],bayts:[
    "اسْمٌ بِمَعْنَى «مِنْ» مُبِينٌ نَكِرَهْ # يُنْصَبُ تَمْيِيزًا بِمَا قَدْ فَسَّرَهْ",
    "كَـ «شِبْرٍ أَرْضًا، وَقَفِيزٍ بُرًّا # وَمَنَوَيْنِ عَسَلًا وَتَمْرَا»",
    "وَبَعْدَ ذِي وَنَحْوِهَا اجْرُرْهُ إِذَا # أَضَفْتَهَا كَـ «مُدُّ حِنْطَةٍ غِذَا»",
    "وَالنَّصْبُ بَعْدَ مَا أُضِيفَ وَجَبَا # إِنْ كَانَ مِثْلَ «مِلْءُ الْأَرْضِ ذَهَبَا»",
    "وَالْفَاعِلَ الْمَعْنَى انْصِبَنْ بِـ «أَفْعَلَا» # مُفَضِّلًا كَـ «أَنْتَ أَعْلَى مَنْزِلَا»",
    "وَبَعْدَ كُلِّ مَا اقْتَضَى تَعَجُّبَا # مَيِّزْ كَـ «أَكْرِمْ بِأَبِي بَكْرٍ أَبَا!»",
    "وَاجْرُرْ بِـ «مِنْ» إِنْ شِئْتَ غَيْرَ ذِي الْعَدَدْ # وَالْفَاعِلِ الْمَعْنَى كَـ «طِبْ نَفْسًا تُفَدْ»",
    "وَعَامِلَ التَّمْيِيزِ قَدِّمْ مُطْلَقَا # وَالْفِعْلُ ذُو التَّصْرِيفِ نَزْرًا سُبِقَا",
  ]},
  {id:"alf-29",title:"حُرُوفُ الْجَرِّ",sub:"Les prépositions",clr:["#180f32","#2f1e60"],bayts:[
    "هَاكَ حُرُوفَ الْجَرِّ وَهِيَ: «مِنْ، إِلَى # حَتَّى، خَلَا، حَاشَا، عَدَا، فِي، عَنْ، عَلَى",
    "مُذْ، مُنْذُ، رُبَّ، اللَّامُ، كَيْ، وَاوٌ، وَتَا # وَالْكَافُ، وَالْبَا، وَلَعَلَّ، وَمَتَى»",
    "بِالظَّاهِرِ اخْصُصْ «مُنْذُ، مُذْ، وَحَتَّى # وَالْكَافَ، وَالْوَاوَ، وَرُبَّ، وَالتَّا»",
    "وَاخْصُصْ بِـ «مُذْ، وَمُنْذُ» وَقْتًا، وَبِـ «رُبِّ # مُنَكَّرًا، وَالتَّاءُ لِـ «اللَّهِ، وَرُبِّ»",
    "وَمَا رَوَوْا مِنْ نَحْوِ «رُبَّهُ فَتَى» # نَزْرٌ، كَذَا «كَهَا»، وَنَحْوُهُ أَتَى",
    "بَعِّضْ، وَبَيِّنْ، وَابْتَدِئْ فِي الْأَمْكِنَهْ # بِـ «مِنْ»، وَقَدْ تَأْتِي لِبَدْءِ الْأَزْمِنَهْ",
    "وَزِيدَ فِي نَفْيٍ وَشِبْهِهِ فَجَرِّ # نَكِرَةً كَـ «مَا لِبَاغٍ مِنْ مَفَرِّ»",
    "لِلِانْتِهَا «حَتَّى، وَلَامٌ، وَإِلَى» # وَ«مِنْ، وَبَاءٌ» يُفْهِمَانِ بَدَلَا",
    "وَاللَّامُ لِلْمِلْكِ، وَشِبْهِهِ، وَفِي # تَعْدِيَةٍ أَيْضًا، وَتَعْلِيلٍ قُفِي",
    "وَزِيدَ، وَالظَّرْفِيَّةَ اسْتَبِنْ بِـ «بَا # وَفِي»، وَقَدْ يُبَيِّنَانِ السَّبَبَا",
    "بِالْبَا اسْتَعِنْ، وَعَدِّ، عَوِّضْ، أَلْصِقِ # وَمِثْلَ «مَعْ، وَمِنْ، وَعَنْ» بِهَا انْطِقِ",
    "«عَلَى» لِلِاسْتِعْلَا، وَمَعْنَى «فِي، وَعَنْ» # بِـ «عَنْ» تَجَاوُزًا عَنَى مَنْ قَدْ فَطَنْ",
    "وَقَدْ تَجِي مَوْضِعَ «بَعْدٍ، وَعَلَى» # كَمَا «عَلَى» مَوْضِعَ «عَنْ» قَدْ جُعِلَا",
    "شَبِّهْ بِكَافٍ، وَبِهَا التَّعْلِيلُ قَدْ # يُعْنَى، وَزَائِدًا لِتَوْكِيدٍ وَرَدْ",
    "وَاسْتُعْمِلَ اسْمًا، وَكَذَا «عَنْ، وَعَلَى» # مِنْ أَجْلِ ذَا عَلَيْهِمَا «مِنْ» دَخَلَا",
    "وَ«مُذْ، وَمُنْذُ» اسْمَانِ حَيْثُ رَفَعَا # أَوْ أُولِيَا الْفِعْلَ كَـ «جِئْتُ مُذْ دَعَا»",
    "وَإِنْ يَجُرَّا فِي مُضِيٍّ فَكَـ «مِنْ» # هُمَا، وَفِي الْحُضُورِ مَعْنَى «فِي» اسْتَبِنْ",
    "وَبَعْدَ «مِنْ، وَعَنْ، وَبَاءٍ» زِيدَ «مَا» # فَلَمْ يَعُقْ عَنْ عَمَلٍ قَدْ عُلِمَا",
    "وَزِيدَ بَعْدَ «رُبِّ، وَالْكَافِ» فَكَفِّ # وَقَدْ تَلِيهِمَا وَجَرٌّ لَمْ يُكَفِّ",
    "وَحُذِفَتْ «رُبَّ» فَجَرَّتْ بَعْدَ «بَلْ # وَالْفَا»، وَبَعْدَ الْوَاوِ شَاعَ ذَا الْعَمَلْ",
    "وَقَدْ يُجَرُّ بِسِوَى «رُبِّ» لَدَى # حَذْفٍ، وَبَعْضُهُ يُرَى مُطَّرِدَا",
  ]},
  {id:"alf-30",title:"الْإِضَافَةُ",sub:"L'annexion (idâfa)",clr:["#0f1632","#1e2b60"],bayts:[
    "نُونًا تَلِي الْإِعْرَابَ أَوْ تَنْوِينَا # مِمَّا تُضِيفُ احْذِفْ كَـ «طُورِ سِينَا»",
    "وَالثَّانِيَ اجْرُرْ، وَانْوِ «مِنْ» أَوْ «فِي» إِذَا # لَمْ يَصْلُحِ إِلَّا ذَاكَ، وَاللَّامَ خُذَا",
    "لِمَا سِوَى ذَيْنِكَ، وَاخْصُصْ أَوَّلَا # أَوْ أَعْطِهِ التَّعْرِيفَ بِالَّذِي تَلَا",
    "وَإِنْ يُشَابِهِ الْمُضَافُ «يَفْعَلُ» # وَصْفًا فَعَنْ تَنْكِيرِهِ لَا يُعْزَلُ",
    "كَـ «رُبَّ رَاجِينَا، عَظِيمِ الْأَمَلِ # مُرَوَّعِ الْقَلْبِ، قَلِيلِ الْحِيَلِ»",
    "وَذِي الْإِضَافَةِ اسْمُهَا لَفْظِيَّهْ # وَتِلْكَ مَحْضَةٌ وَمَعْنَوِيَّهْ",
    "وَوَصْلُ «أَلْ» بِذَا الْمُضَافِ مُغْتَفَرْ # إِنْ وُصِلَتْ بِالثَّانِ كَـ «الْجَعْدِ الشَّعَرْ»",
    "أَوْ بِالَّذِي لَهُ أُضِيفَ الثَّانِي # كَـ «زَيْدٌ الضَّارِبُ رَأْسِ الْجَانِي»",
    "وَكَوْنُهَا فِي الْوَصْفِ كَافٍ إِنْ وَقَعْ # مُثَنًّى أَوْ جَمْعًا سَبِيلَهُ اتَّبَعْ",
    "وَرُبَّمَا أَكْسَبَ ثَانٍ أَوَّلَا # تَأْنِيثًا إِنْ كَانَ لِحَذْفٍ مُوهَلَا",
    "وَلَا يُضَافُ اسْمٌ لِمَا بِهِ اتَّحَدْ # مَعْنًى، وَأَوَّلْ مُوهِمًا إِذَا وَرَدْ",
    "وَبَعْضُ الْأَسْمَاءِ يُضَافُ أَبَدَا # وَبَعْضُ ذَا قَدْ يَأْتِ لَفْظًا مُفْرَدَا",
    "وَبَعْضُ مَا يُضَافُ حَتْمًا امْتَنَعْ # إِيلَاؤُهُ اسْمًا ظَاهِرًا حَيْثُ وَقَعْ",
    "كَـ «وَحْدَ، لَبَّيْ، وَدَوَالَيْ، سَعْدَيْ» # وَشَذَّ إِيلَاءُ «يَدَيْ» لِـ «لَبَّيْ»",
    "وَأَلْزَمُوا إِضَافَةً إِلَى الْجُمَلْ # «حَيْثُ، وَإِذْ»، وَإِنْ يُنَوَّنْ يُحْتَمَلْ",
    "إِفْرَادُ «إِذْ»، وَمَا كَـ «إِذْ» مَعْنًى كَـ «إِذْ» # أَضِفْ جَوَازًا نَحْوُ «حِينَ جَا نُبِذْ»",
    "وَإِنْ تَكُنْ شَرْطاً أَوِ اسْتِفْهَامَا # فَمُطْلَقاً كَمِّلْ بِهَا الْكَلَامَا",
    "وَأَلْزَمُوا إِضَافَةً «لَدُنْ» فَجَرّْ # وَنَصْبُ «غُدْوَةٍ» بِهِ عَنْهُمْ نَدَرْ",
    "وَ «مَعَ»: «مَعْ» فِيهَا قَلِيلٌ، وَنُقِلْ # فَتْحٌ وَكَسْرٌ لِسُكُونٍ يَتَّصِلْ",
    "وَاضْمُمْ بِنَاءً «غَيْراً» إِنْ عَدِمْتَ مَا # لَهُ أُضِيفَ نَاوِياً مَا عُدِمَا",
    "«قَبْلٌ، كَغَيْرٍ؛ بَعْدُ، حَسْبُ، أَوَّلُ # وَدُونُ، وَالْجِهَاتُ أَيْضاً، وَعَلُ»",
    "وَأَعْرَبُوا نَصْباً إِذَا مَا نُكِّرَا # «قَبْلاً» وَمَا مِنْ بَعْدِهِ قَدْ ذُكِرَا",
    "وَمَا يَلِي الْمُضَافَ يَأْتِي خَلَفَا # عَنْهُ فِي الِاعْرَابِ إِذَا مَا حُذِفَا",
    "وَرُبَّمَا جَرُّوا الَّذِي أَبْقَوْا كَمَا # قَدْ كَانَ قَبْلَ حَذْفِ مَا تَقَدَّمَا",
    "لَكِنْ بِشَرْطِ أَنْ يَكُونَ مَا حُذِفْ # مُمَاثِلاً لِمَا عَلَيْهِ قَدْ عُطِفْ",
    "وَيُحْذَفُ الثَّانِي فَيَبْقَى الْأَوَّلُ # كَحَالِهِ إِذَا بِهِ يَتَّصِلُ",
    "بِشَرْطِ عَطْفٍ وَإِضَافَةٍ إِلَى # مِثْلِ الَّذِي لَهُ أَضَفْتَ الْأَوَّلَا",
    "فَصْلَ مُضَافٍ شِبْهِ فِعْلٍ مَا نَصَبْ # مَفْعُولاً اوْ ظَرْفاً: أَجِزْ، وَلَمْ يُعَبْ",
    "فَصْلُ يَمِينٍ، وَاضْطِرَاراً وُجِدَا # بِأَجْنَبِيٍّ، أَوْ بِنَعْتٍ، أَوْ نِدَا",
  ]},
  {id:"alf-31",title:"الْمُضَافُ إِلَى يَاءِ الْمُتَكَلِّمِ",sub:"L'annexion au yâ' du locuteur",clr:["#110f32","#201e60"],bayts:[
    "آخِرَ مَا أُضِيفَ لِلْيَا اكْسِرْ إِذَا # لَمْ يَكُنْ مُعْتَلّاً كَـ «رَامٍ، وَقَذَى»",
    "أَوْ يَكُ كَـ «ابْنَيْنِ، وَزَيْدِينَ» فَذِي # جَمِيعُهَا الْيَا بَعْدُ فَتْحُهَا احْتُذِي",
    "وَتُدْغَمُ الْيَا فِيهِ وَالْوَاوُ، وَإِنْ # مَا قَبْلَ وَاوٍ ضُمَّ فَاكْسِرْهُ يَهُنْ",
    "وَأَلِفاً سَلِّمْ، وَفِي الْمَقْصُورِ عَنْ # هُذَيْلٍ انْقِلَابُهَا يَاءً حَسَنْ",
  ]},
  {id:"alf-32",title:"إِعْمَالُ الْمَصْدَرِ",sub:"La régence du masdar",clr:["#0f1c32","#1e3660"],bayts:[
    "بِفِعْلِهِ الْمَصْدَرَ أَلْحِقْ فِي الْعَمَلْ # مُضَافاً اوْ مُجَرَّداً أَوْ مَعَ «أَلْ»",
    "إِنْ كَانَ فِعْلٌ مَعَ «أَنْ» أَوْ «مَا» يَحُلّْ # مَحَلَّهُ، وَلِاسْمِ مَصْدَرٍ عَمَلْ",
    "وَبَعْدَ جَرِّهِ الَّذِي أُضِيفَ لَهْ # كَمِّلْ بِنَصْبٍ أَوْ بِرَفْعٍ عَمَلَهْ",
    "وَجُرَّ مَا يَتْبَعُ مَا جُرَّ، وَمَنْ # رَاعَى فِي الِاتْبَاعِ الْمَحَلَّ فَحَسَنْ",
  ]},
  {id:"alf-33",title:"إِعْمَالُ اسْمِ الْفَاعِلِ",sub:"La régence du nom d'agent",clr:["#0f1232","#1e2460"],bayts:[
    "كَفِعْلِهِ اسْمُ فَاعِلٍ فِي الْعَمَلِ # إِنْ كَانَ عَنْ مُضِيِّهِ بِمَعْزِلِ",
    "وَوَلِيَ اسْتِفْهَاماً، اوْ حَرْفَ نِدَا # أَوْ نَفْياً، اوْ جَا صِفَةً، أَوْ مُسْنَدَا",
    "وَقَدْ يَكُونُ نَعْتَ مَحْذُوفٍ عُرِفْ # فَيَسْتَحِقُّ الْعَمَلَ الَّذِي وُصِفْ",
    "وَإِنْ يَكُنْ صِلَةَ «أَلْ» فَفِي الْمُضِي # وَغَيْرِهِ إِعْمَالُهُ قَدِ ارْتُضِي",
    "«فَعَّالٌ، اوْ مِفْعَالٌ، اوْ فَعُولُ» # فِي كَثْرَةٍ عَنْ «فَاعِلٍ» بَدِيلُ",
    "فَيَسْتَحِقُّ مَا لَهُ مِنْ عَمَلِ # وَفِي «فَعِيلٍ» قَلَّ ذَا وَ «فَعِلِ»",
    "وَمَا سِوَى الْمُفْرَدِ مِثْلَهُ جُعِلْ # فِي الْحُكْمِ وَالشُّرُوطِ حَيْثُمَا عَمِلْ",
    "وَانْصِبْ بِذِي الْإِعْمَالِ تِلْواً وَاخْفِضِ # وَهْوَ لِنَصْبِ مَا سِوَاهُ مُقْتَضِي",
    "وَاجْرُرْ أَوِ انْصِبْ تَابِعَ الَّذِي انْخَفَضْ # كَـ «مُبْتَغِي جَاهٍ وَمَالاً مَنْ نَهَضْ»",
    "وَكُلُّ مَا قُرِّرَ لِاسْمِ فَاعِلِ # يُعْطَى اسْمَ مَفْعُولٍ بِلَا تَفَاضُلِ",
    "فَهْوَ كَفِعْلٍ صِيغَ لِلْمَفْعُولِ فِي # مَعْنَاهُ كَـ «الْمُعْطَى كَفَافاً يَكْتَفِي»",
    "وَقَدْ يُضَافُ ذَا إِلَى اسْمٍ مُرْتَفِعْ # مَعْنىً كَـ «مَحْمُودُ الْمَقَاصِدِ الْوَرِعْ»",
  ]},
  {id:"alf-34",title:"أَبْنِيَةُ الْمَصَادِرِ",sub:"Les schèmes du masdar",clr:["#0f1a32","#1e3260"],bayts:[
    "«فَعْلٌ» قِيَاسُ مَصْدَرِ الْمُعَدَّى # مِنْ ذِي ثَلَاثَةٍ كَـ «رَدَّ رَدَّا»",
    "وَ «فَعِلَ» اللَّازِمُ بَابُهُ «فَعَلْ» # كَـ «فَرَحٍ»، وَكَـ «جَوىً»، وَكَـ «شَلَلْ»",
    "وَ «فَعَلَ» اللَّازِمُ مِثْلُ «قَعَدَا» # لَهُ «فُعُولٌ» بِاطِّرَادٍ كَـ «غَدَا»",
    "مَا لَمْ يَكُنْ مُسْتَوْجِباً «فِعَالَا» # أَوْ «فَعَلَاناً» - فَادْرِ - أَوْ «فُعَالَا»",
    "فَأَوَّلٌ لِذِي امْتِنَاعٍ كَـ «أَبَى» # وَالثَّانِ لِلَّذِي اقْتَضَى تَقَلُّبَا",
    "لِلدَّا «فُعَالٌ» أَوْ لِصَوْتٍ، وَشَمَلْ # سَيْراً وَصَوْتاً «الْفَعِيلُ» كَـ «صَهَلْ»",
    "«فُعُولَةٌ، فَعَالَةٌ» لِـ «فَعُلَا» # كَـ «سَهُلَ الْأَمْرُ، وَزَيْدٌ جَزُلَا»",
    "وَمَا أَتَى مُخَالِفاً لِمَا مَضَى # فَبَابُهُ النَّقْلُ كَـ «سُخْطٍ، وَرِضَا»",
    "وَغَيْرُ ذِي ثَلَاثَةٍ مَقِيسُ # مَصْدَرُهُ كَـ «قُدِّسَ التَّقْدِيسُ",
    "وَزَكِّهِ تَزْكِيَةً، وَأَجْمِلَا # إِجْمَالَ مَنْ تَجَمُّلاً تَجَمَّلَا»",
    "وَاسْتَعِذِ اسْتِعَاذَةً، ثُمَّ أَقِمْ # إِقَامَةً»، وَغَالِباً ذَا «التَّا» لَزِمْ",
    "وَمَا يَلِي الْآخِرُ مُدَّ وَافْتَحَا # مَعْ كَسْرِ تِلْوِ الثَّانِ مِمَّا افْتُتِحَا",
    "بِهَمْزِ وَصْلٍ كَـ «اصْطَفَى»، وَضُمَّ مَا # يَرْبَعُ فِي أَمْثَالِ «قَدْ تَلَمْلَمَا»",
    "«فِعْلَالٌ، اوْ فَعْلَلَةٌ» لِـ «فَعْلَلَا» # وَاجْعَلْ مَقِيساً ثَانِياً لَا أَوَّلَا",
    "لِـ «فَاعَلَ»: «الْفِعَالُ، وَالْمُفَاعَلَهْ» # وَغَيْرُ مَا مَرَّ السَّمَاعُ عَادَلَهْ",
    "وَ «فَعْلَةٌ» لِمَرَّةٍ كَـ «جَلْسَهْ» # وَ «فِعْلَةٌ» لِهَيْئَةٍ كَـ «جِلْسَهْ»",
    "فِي غَيْرِ ذِي الثَّلَاثِ بِالتَّا الْمَرَّهْ # وَشَذَّ فِيهِ هَيْئَةٌ كَـ «الْخِمْرَهْ»",
  ]},
  {id:"alf-35",title:"أَبْنِيَةُ أَسْمَاءِ الْفَاعِلِينَ وَالصِّفَاتِ الْمُشَبَّهَةِ بِهَا",sub:"Schèmes du nom d'agent",clr:["#140f32","#271e60"],bayts:[
    "كَـ «فَاعِلٍ» صُغِ اسْمَ فَاعِلٍ إِذَا # مِنْ ذِي ثَلَاثَةٍ يَكُونُ كَـ «غَذَا»",
    "وَهْوَ قَلِيلٌ فِي «فَعُلْتُ، وَفَعِلْ» # غَيْرَ مُعَدّىً، بَلْ قِيَاسُهُ «فَعِلْ",
    "وَأَفْعَلٌ، فَعْلَانُ» نَحْوُ «أَشِرِ» # وَنَحْوُ «صَدْيَانَ»، وَنَحْوُ «الْأَجْهَرِ»",
    "وَ «فَعْلٌ» اوْلَى وَ «فَعِيلٌ» بِـ «فَعُلْ» # كَـ «الضَّخْمِ، وَالْجَمِيلِ» وَالْفِعْلُ «جَمُلْ»",
    "وَ «أَفْعَلٌ» فِيهِ قَلِيلٌ وَ «فَعَلْ» # وَبِسِوَى الْـ «فَاعِلِ» قَدْ يَغْنَى «فَعَلْ»",
    "وَزِنَةُ الْمُضَارِعِ اسْمُ فَاعِلِ # مِنْ غَيْرِ ذِي الثَّلَاثِ كَـ «الْمُوَاصِلِ»",
    "مَعْ كَسْرِ مَتْلُوِّ الْأَخِيرِ مُطْلَقَا # وَضَمِّ مِيمٍ زَائِدٍ قَدْ سَبَقَا",
    "وَإِنْ فَتَحْتَ مِنْهُ مَا كَانَ انْكَسَرْ # صَارَ اسْمَ مَفْعُولٍ كَمِثْلِ «الْمُنْتَظَرْ»",
    "وَفِي اسْمِ مَفْعُولِ الثُّلَاثِيِّ اطَّرَدْ # زِنَةُ «مَفْعُولٍ» كَآتٍ مِنْ «قَصَدْ»",
    "وَنَابَ نَقْلاً عَنْهُ ذُو «فَعِيلِ» # نَحْوُ «فَتَاةٍ أَوْ فَتىً كَحِيلِ»",
  ]},
  {id:"alf-36",title:"الصِّفَةُ الْمُشَبَّهَةُ بِاسْمِ الْفَاعِلِ",sub:"L'adjectif assimilé",clr:["#0f2132","#1e3f60"],bayts:[
    "صِفَةٌ اسْتُحْسِنَ جَرُّ فَاعِلِ # مَعْنىً بِهَا: الْمُشْبِهَةُ اسْمَ الْفَاعِلِ",
    "وَصَوْغُهَا مِنْ لَازِمٍ لِحَاضِرِ # كَـ «طَاهِرِ الْقَلْبِ جَمِيلِ الظَّاهِرِ»",
    "وَعَمَلُ اسْمِ فَاعِلِ الْمُعَدَّى # لَهَا عَلَى الْحَدِّ الَّذِي قَدْ حُدَّا",
    "وَسَبْقُ مَا تَعْمَلُ فِيهِ مُجْتَنَبْ # وَكَوْنُهُ ذَا سَبَبِيَّةٍ وَجَبْ",
    "فَارْفَعْ بِهَا وَانْصِبْ وَجُرَّ - مَعَ «أَلْ» # وَدُونَ «أَلْ» - مَصْحُوبَ «أَلْ»، وَمَا اتَّصَلْ",
    "بِهَا: مُضَافاً أَوْ مُجَرَّداً، وَلَا # تَجْرُرْ بِهَا مَعَ «أَلْ» سُماً مِنْ «أَلْ» خَلَا",
    "وَمِنْ إِضَافَةٍ لِتَالِيهَا، وَمَا # لَمْ يَخْلُ فَهْوَ بِالْجَوَازِ وُسِمَا",
  ]},
  {id:"alf-37",title:"التَّعَجُّبُ",sub:"L'exclamative",clr:["#180f32","#2f1e60"],bayts:[
    "بِـ «أَفْعَلَ» انْطِقْ بَعْدَ «مَا» تَعَجُّبَا # أَوْ جِئْ بِـ «أَفْعِلْ» قَبْلَ مَجْرُورٍ بِبَا",
    "وَتِلْوَ «أَفْعَلَ» انْصِبَنَّهُ كَـ «مَا # أَوْفَى خَلِيلَيْنَا! وَأَصْدِقْ بِهِمَا!»",
    "وَحَذْفَ مَا مِنْهُ تَعَجَّبْتَ اسْتَبِحْ # إِنْ كَانَ عِنْدَ الْحَذْفِ مَعْنَاهُ يَضِحْ",
    "وَفِي كِلَا الْفِعْلَيْنِ قِدْماً لَزِمَا # مَنْعُ تَصَرُّفٍ بِحُكْمٍ حُتِمَا",
    "وَصُغْهُمَا مِنْ ذِي ثَلَاثٍ، صُرِّفَا # قَابِلِ فَضْلٍ، تَمَّ، غَيْرِ ذِي انْتِفَا",
    "وَغَيْرِ ذِي وَصْفٍ يُضَاهِي «أَشْهَلَا» # وَغَيْرِ سَالِكٍ سَبِيلَ «فُعِلَا»",
    "وَ «أَشْدِدَ، اوْ أَشَدَّ» أَوْ شِبْهُهُمَا # يَخْلُفُ مَا بَعْضَ الشُّرُوطِ عَدِمَا",
    "وَمَصْدَرُ الْعَادِمِ بَعْدُ يَنْتَصِبْ # وَبَعْدَ «أَفْعِلْ» جَرُّهُ بِالْبَا يَجِبْ",
    "وَبِالنُّدُورِ احْكُمْ لِغَيْرِ مَا ذُكِرْ # وَلَا تَقِسْ عَلَى الَّذِي مِنْهُ أُثِرْ",
    "وَفِعْلُ هَذَا الْبَابِ لَنْ يُقَدَّمَا # مَعْمُولُهُ، وَوَصْلَهُ بِهِ الْزَمَا",
    "وَفَصْلُهُ بِظَرْفٍ اوْ بِحَرْفِ جَرّْ # مُسْتَعْمَلٌ، وَالْخُلْفُ فِي ذَاكَ اسْتَقَرّْ",
  ]},
  {id:"alf-38",title:"«نِعْمَ، وَبِئْسَ» وَمَا جَرَى مَجْرَاهُمَا",sub:"Ni'ma et bi'sa (éloge/blâme)",clr:["#0f1632","#1e2b60"],bayts:[
    "فِعْلَانِ غَيْرُ مُتَصَرِّفَيْنِ # «نِعْمَ، وَبِئْسَ»؛ رَافِعَانِ اسْمَيْنِ",
    "مُقَارِنَيْ «أَلْ»، أَوْ مُضَافَيْنِ لِمَا # قَارَنَهَا كَـ «نِعْمَ عُقْبَى الْكُرَمَا»",
    "وَيَرْفَعَانِ مُضْمَراً يُفَسِّرُهْ # مُمَيِّزٌ كَـ «نِعْمَ قَوْماً مَعْشَرُهْ»",
    "وَجَمْعُ تَمْيِيزٍ وَفَاعِلٍ ظَهَرْ # فِيهِ خِلَافٌ عَنْهُمُ قَدِ اشْتَهَرْ",
    "وَ «مَا»: مُمَيِّزٌ، وَقِيلَ: فَاعِلُ # فِي نَحْوِ «نِعْمَ مَا يَقُولُ الْفَاضِلُ»",
    "وَيُذْكَرُ الْمَخْصُوصُ بَعْدُ مُبْتَدَا # أَوْ خَبَرَ اسْمٍ لَيْسَ يَبْدُو أَبَدَا",
    "وَإِنْ يُقَدَّمْ مُشْعِرٌ بِهِ كَفَى # كَـ «الْعِلْمُ نِعْمَ الْمُقْتَنَى وَالْمُقْتَفَى»",
    "وَاجْعَلْ كَـ «بِئْسَ»: «سَاءَ»، وَاجْعَلْ «فَعُلَا» # مِنْ ذِي ثَلَاثَةٍ: كَـ «نِعْمَ» مُسْجَلَا",
    "وَمِثْلُ «نِعْمَ»: «حَبَّذَا»، الْفَاعِلُ «ذَا» # وَإِنْ تُرِدْ ذَمّاً فَقُلْ: «لَا حَبَّذَا»",
    "وَأَوْلِ «ذَا» الْمَخْصُوصَ أَيّاً كَانَ لَا # تَعْدِلْ بِـ «ذَا»؛ فَهْوَ يُضَاهِي الْمَثَلَا",
    "وَمَا سِوَى «ذَا» ارْفَعْ بِـ «حَبَّ»، أَوْ فَجُرّْ # بِالْبَا، وَدُونَ «ذَا» انْضِمَامُ الْحَا كَثُرْ",
  ]},
  {id:"alf-39",title:"أَفْعَلُ التَّفْضِيلِ",sub:"Le comparatif/superlatif",clr:["#110f32","#201e60"],bayts:[
    "صُغْ مِنْ مَصُوغٍ مِنْهُ لِلتَّعَجُّبِ # «أَفْعَلَ» لِلتَّفْضِيلِ، وَائْبَ اللَّذْ أُبِي",
    "وَمَا بِهِ إِلَى تَعَجُّبٍ وُصِلْ # لِمَانِعٍ بِهِ: إِلَى التَّفْضِيلِ صِلْ",
    "وَ «أَفْعَلَ» التَّفْضِيلِ صِلْهُ أَبَدَا # تَقْدِيراً اوْ لَفْظاً بِـ «مِنْ» إِنْ جُرِّدَا",
    "وَإِنْ لِمَنْكُورٍ يُضَفْ أَوْ جُرِّدَا # أُلْزِمَ تَذْكِيراً، وَأَنْ يُوَحَّدَا",
    "وَتِلْوُ «أَلْ» طِبْقٌ، وَمَا لِمَعْرِفَهْ # أُضِيفَ: ذُو وَجْهَيْنِ عَنْ ذِي مَعْرِفَهْ",
    "هَذَا إِذَا نَوَيْتَ مَعْنَى «مِنْ»، وَإِنْ # لَمْ تَنْوِ فَهْوَ طِبْقُ مَا بِهِ قُرِنْ",
    "وَإِنْ تَكُنْ بِتِلْوِ «مِنْ» مُسْتَفْهِمَا # فَلَهُمَا كُنْ أَبَداً مُقَدِّمَا",
    "كَمِثْلِ «مِمَّنْ أَنْتَ خَيْرٌ؟»، وَلَدَى # إِخْبَارٍ التَّقْدِيمُ نَزْراً وَرَدَا",
    "وَرَفْعُهُ الظَّاهِرَ نَزْرٌ، وَمَتَى # عَاقَبَ فِعْلاً فَكَثِيراً ثَبَتَا",
    "كَـ «لَنْ تَرَى فِي النَّاسِ مِنْ رَفِيقِ # أَوْلَى بِهِ الْفَضْلُ مِنَ الصِّدِّيقِ»",
  ]},
  {id:"alf-40",title:"النَّعْتُ",sub:"L'épithète",clr:["#0f1c32","#1e3660"],bayts:[
    "يَتْبَعُ فِي الْإِعْرَابِ الْأَسْمَاءَ الْأُوَلْ # نَعْتٌ، وَتَوْكِيدٌ، وَعَطْفٌ، وَبَدَلْ",
    "فَـ «النَّعْتُ»: تَابِعٌ مُتِمٌّ مَا سَبَقْ # بِوَسْمِهِ، أَوْ وَسْمِ مَا بِهِ اعْتَلَقْ",
    "وَلْيُعْطَ فِي التَّعْرِيفِ وَالتَّنْكِيرِ مَا # لِمَا تَلَا كَـ «امْرُرْ بِقَوْمٍ كُرَمَا»",
    "وَهْوَ لَدَى التَّوْحِيدِ وَالتَّذْكِيرِ أَوْ # سِوَاهُمَا: كَالْفِعْلِ، فَاقْفُ مَا قَفَوْا",
    "وَانْعَتْ بِمُشْتَقٍّ كَـ «صَعْبٍ، وَذَرِبْ» # وَشِبْهِهِ كَـ «ذَا، وَذِي، وَالْمُنْتَسِبْ»",
    "وَنَعَتُوا بِجُمْلَةٍ مُنَكَّرَا # فَأُعْطِيَتْ مَا أُعْطِيَتْهُ خَبَرَا",
    "وَامْنَعْ هُنَا إِيقَاعَ ذَاتِ الطَّلَبِ # وَإِنْ أَتَتْ فَالْقَوْلَ أَضْمِرْ تُصِبِ",
    "وَنَعَتُوا بِمَصْدَرٍ كَثِيرَا # فَالْتَزَمُوا الْإِفْرَادَ وَالتَّذْكِيرَا",
    "وَنَعْتُ غَيْرِ وَاحِدٍ إِذَا اخْتَلَفْ # فَعَاطِفاً فَرِّقْهُ، لَا إِذَا ائْتَلَفْ",
    "وَنَعْتَ مَعْمُولَيْ وَحِيدَيْ مَعْنَى # وَعَمَلٍ: أَتْبِعْ بِغَيْرِ اسْتِثْنَا",
    "وَإِنْ نُعُوتٌ كَثُرَتْ وَقَدْ تَلَتْ # مُفْتَقِراً لِذِكْرِهِنَّ: أُتْبِعَتْ",
    "وَاقْطَعْ أَوَ اتْبِعْ إِنْ يَكُنْ مُعَيَّنَا # بِدُونِهَا، أَوْ بَعْضَهَا اقْطَعْ مُعْلِنَا",
    "وَارْفَعْ أَوِ انْصِبْ إِنْ قَطَعْتَ مُضْمِرَا # مُبْتَدَأً أَوْ نَاصِباً لَنْ يَظْهَرَا",
    "وَمَا مِنَ الْمَنْعُوتِ وَالنَّعْتِ عُقِلْ # يَجُوزُ حَذْفُهُ، وَفِي النَّعْتِ يَقِلّْ",
  ]},
  {id:"alf-41",title:"التَّوْكِيدُ",sub:"Le renforcement (tawkîd)",clr:["#0f1232","#1e2460"],bayts:[
    "بِـ «النَّفْسِ» أَوْ بِـ «الْعَيْنِ» الِاسْمُ أُكِّدَا # مَعَ ضَمِيرٍ طَابَقَ الْمُؤَكَّدَا",
    "وَاجْمَعْهُمَا بِـ «أَفْعُلٍ» إِنْ تَبِعَا # مَا لَيْسَ وَاحِداً تَكُنْ مُتَّبِعَا",
    "وَ «كُلّاً» اذْكُرْ فِي الشُّمُولِ، وَ «كِلَا # كِلْتَا، جَمِيعاً»؛ بِالضَّمِيرِ مُوصَلَا",
    "وَاسْتَعْمَلُوا أَيْضاً كَـ «كُلٍّ»: «فَاعِلَهْ» # مِنْ «عَمَّ» فِي التَّوْكِيدِ مِثْلَ «النَّافِلَهْ»",
    "وَبَعْدَ «كُلٍّ» أَكَّدُوا بِـ «أَجْمَعَا # جَمْعَاءَ، أَجْمَعِينَ، ثُمَّ جُمَعَا»",
    "وَدُونَ «كُلٍّ» قَدْ يَجِيءُ «أَجْمَعُ # جَمْعَاءُ، أَجْمَعُونَ، ثُمَّ جُمَعُ»",
    "وَإِنْ يُفِدْ تَوْكِيدُ مَنْكُورٍ قُبِلْ # وَعَنْ نُحَاةِ الْبَصْرَةِ الْمَنْعُ شَمِلْ",
    "وَاغْنَ بِـ «كِلْتَا» فِي مُثَنًّى وَ «كِلَا» # عَنْ وَزْنِ «فَعْلَاءَ» وَوَزْنِ «أَفْعَلَا»",
    "وَإِنْ تُؤَكِّدِ الضَّمِيرَ الْمُتَّصِلْ # بِـ «النَّفْسِ، وَالْعَيْنِ» فَبَعْدَ الْمُنْفَصِلْ",
    "عَنَيْتُ ذَا الرَّفْعِ، وَأَكَّدُوا بِمَا # سِوَاهُمَا، وَالْقَيْدُ لَنْ يُلْتَزَمَا",
    "وَمَا مِنَ التَّوْكِيدِ لَفْظِيٌّ يَجِي # مُكَرَّراً كَقَوْلِكَ: «ادْرُجِي ادْرُجِي»",
    "وَلَا تُعِدْ لَفْظَ ضَمِيرٍ مُتَّصِلْ # إِلَّا مَعَ اللَّفْظِ الَّذِي بِهِ وُصِلْ",
    "كَذَا الْحُرُوفُ غَيْرَ مَا تَحَصَّلَا # بِهِ جَوَابٌ كَـ «نَعَمْ» وَكَـ «بَلَى»",
    "وَمُضْمَرَ الرَّفْعِ الَّذِي قَدِ انْفَصَلْ # أَكِّدْ بِهِ كُلَّ ضَمِيرٍ اتَّصَلْ",
  ]},
  {id:"alf-42",title:"الْعَطْفُ",sub:"La coordination",clr:["#0f1a32","#1e3260"],bayts:[
    "الْعَطْفُ: إِمَّا ذُو بَيَانٍ، أَوْ نَسَقْ # وَالْغَرَضُ الْآنَ بَيَانُ مَا سَبَقْ",
    "فَـ «ذُو الْبَيَانِ»: تَابِعٌ، شِبْهُ الصِّفَهْ # حَقِيقَةُ الْقَصْدِ بِهِ مُنْكَشِفَهْ",
    "فَأَوْلِيَنْهُ مِنْ وِفَاقِ الْأَوَّلِ # مَا مِنْ وِفَاقِ الْأَوَّلِ النَّعْتُ وَلِي",
    "فَقَدْ يَكُونَانِ مُنَكَّرَيْنِ # كَمَا يَكُونَانِ مُعَرَّفَيْنِ",
    "وَصَالِحاً لِبَدَلِيَّةٍ يُرَى # فِي غَيْرِ نَحْوِ «يَا غُلَامُ يَعْمَرَا»",
    "وَنَحْوِ «بِشْرٍ» تَابِعِ «الْبَكْرِيِّ» # وَلَيْسَ أَنْ يُبْدَلَ بِالْمَرْضِيِّ",
  ]},
  {id:"alf-43",title:"عَطْفُ النَّسَقِ",sub:"La coordination par particules",clr:["#140f32","#271e60"],bayts:[
    "تَالٍ بِحَرْفٍ مُتْبِعٍ: «عَطْفُ النَّسَقْ» # كَـ «اخْصُصْ بِوُدٍّ وَثَنَاءٍ مَنْ صَدَقْ»",
    "فَالْعَطْفُ مُطْلَقاً بِـ «وَاوٍ، ثُمَّ، فَا # حَتَّى، أَمَ، اوْ» كَـ «فِيكَ صِدْقٌ وَوَفَا»",
    "وَأَتْبَعَتْ لَفْظاً فَحَسْبُ «بَلْ، وَلَا # لَكِنْ» كَـ «لَمْ يَبْدُ امْرُؤٌ لَكِنْ طَلَا»",
    "فَاعْطِفْ بِوَاوٍ لَاحِقاً أَوْ سَابِقَا # فِي الْحُكْمِ، أَوْ مُصَاحِباً مُوَافِقَا",
    "وَاخْصُصْ بِهَا عَطْفَ الَّذِي لَا يُغْنِي # مَتْبُوعُهُ كَـ «اصْطَفَّ هَذَا وَابْنِي»",
    "وَالْفَاءُ لِلتَّرْتِيبِ بِاتِّصَالِ # وَ «ثُمَّ» لِلتَّرْتِيبِ بِانْفِصَالِ",
    "وَاخْصُصْ بِفَاءٍ عَطْفَ مَا لَيْسَ صِلَهْ # عَلَى الَّذِي اسْتَقَرَّ أَنَّهُ الصِّلَهْ",
    "بَعْضاً بِـ «حَتَّى» اعْطِفْ عَلَى كُلٍّ، وَلَا # يَكُونُ إِلَّا غَايَةَ الَّذِي تَلَا",
    "وَ «أَمْ» بِهَا اعْطِفْ إِثْرَ هَمْزِ التَّسْوِيَهْ # أَوْ هَمْزَةٍ عَنْ لَفْظِ «أَيٍّ» مُغْنِيَهْ",
    "وَرُبَّمَا حُذِفَتِ الْهَمْزَةُ إِنْ # كَانَ خَفَا الْمَعْنَى بِحَذْفِهَا أُمِنْ",
    "وَبِانْقِطَاعٍ وَبِمَعْنَى «بَلْ» وَفَتْ # إِنْ تَكُ مِمَّا قُيِّدَتْ بِهِ خَلَتْ",
    "خَيِّرْ، أَبِحْ، قَسِّمْ بِـ «أَوْ»، وَأَبْهِمِ # وَاشْكُكْ، وَإِضْرَابٌ بِهَا أَيْضاً نُمِي",
    "وَرُبَّمَا عَاقَبَتِ الْوَاوَ إِذَا # لَمْ يُلْفِ ذُو النُّطْقِ لِلَبْسٍ مَنْفَذَا",
    "وَمِثْلُ «أَوْ» فِي الْقَصْدِ «إِمَّا» الثَّانِيَهْ # فِي نَحْوِ «إِمَّا ذِي وَإِمَّا النَّائِيَهْ»",
    "وَأَوْلِ «لَكِنْ» نَفْياً اوْ نَهْياً، وَ «لَا» # نِدَاءً اوْ أَمْراً أَوِ اثْبَاتاً تَلَا",
    "وَ «بَلْ» كَـ «لَكِنْ» بَعْدَ مَصْحُوبَيْهَا # كَـ «لَمْ أَكُنْ فِي مَرْبَعٍ، بَلْ تَيْهَا»",
    "وَانْقُلْ بِهَا لِلثَّانِ حُكْمَ الْأَوَّلِ # فِي الْخَبَرِ الْمُثْبَتِ وَالْأَمْرِ الْجَلِي",
    "وَإِنْ عَلَى ضَمِيرِ رَفْعٍ مُتَّصِلْ # عَطَفْتَ فَافْصِلْ بِالضَّمِيرِ الْمُنْفَصِلْ",
    "أَوْ فَاصِلٍ مَا، وَبِلَا فَصْلٍ يَرِدْ # فِي النَّظْمِ فَاشِياً، وَضَعْفَهُ اعْتَقِدْ",
    "وَعَوْدُ خَافِضٍ لَدَى عَطْفٍ عَلَى # ضَمِيرِ خَفْضٍ: لَازِماً قَدْ جُعِلَا",
    "وَلَيْسَ عِنْدِي لَازِماً؛ إِذْ قَدْ أَتَى # فِي النَّظْمِ وَالنَّثْرِ الصَّحِيحِ مُثْبَتَا",
    "وَالْفَاءُ قَدْ تُحْذَفُ مَعْ مَا عَطَفَتْ # وَالْوَاوُ إِذْ لَا لَبْسَ، وَهْيَ انْفَرَدَتْ",
    "بِعَطْفِ عَامِلٍ مُزَالٍ قَدْ بَقِي # مَعْمُولُهُ؛ دَفْعاً لِوَهْمٍ اتُّقِي",
    "وَحَذْفَ مَتْبُوعٍ بَدَا هُنَا اسْتَبِحْ # وَعَطْفُكَ الْفِعْلَ عَلَى الْفِعْلِ يَصِحّْ",
    "وَاعْطِفْ عَلَى اسْمٍ شِبْهِ فِعْلٍ فِعْلَا # وَعَكْساً اسْتَعْمِلْ تَجِدْهُ سَهْلَا",
  ]},
  {id:"alf-44",title:"الْبَدَلُ",sub:"L'apposition (badal)",clr:["#0f2132","#1e3f60"],bayts:[
    "التَّابِعُ الْمَقْصُودُ بِالْحُكْمِ بِلَا # وَاسِطَةٍ هُوَ الْمُسَمَّى: «بَدَلَا»",
    "مُطَابِقاً، أَوْ بَعْضاً، اوْ مَا يُشْتَمَلْ # عَلَيْهِ يُلْفَى، أَوْ كَمَعْطُوفٍ بِـ «بَلْ»",
    "وَذَا لِلِاضْرَابِ اعْزُ إِنْ قَصْداً صَحِبْ # وَدُونَ قَصْدٍ غَلَطٌ بِهِ سُلِبْ",
    "كَـ «زُرْهُ خَالِداً، وَقَبِّلْهُ الْيَدَا # وَاعْرِفْهُ حَقَّهُ، وَخُذْ نَبْلاً مُدَى»",
    "وَمِنْ ضَمِيرِ الْحَاضِرِ الظَّاهِرَ لَا # تُبْدِلْهُ إِلَّا مَا إِحَاطَةً جَلَا",
    "أَوِ اقْتَضَى بَعْضاً، أَوِ اشْتِمَالَا # كَـ «إِنَّكَ ابْتِهَاجَكَ اسْتَمَالَا»",
    "وَبَدَلُ الْمُضَمَّنِ الْهَمْزَ يَلِي # هَمْزاً كَـ «مَنْ ذَا؟ أَسَعِيدٌ أَمْ عَلِي؟»",
    "وَيُبْدَلُ الْفِعْلُ مِنَ الْفِعْلِ كَـ «مَنْ # يَصِلْ إِلَيْنَا يَسْتَعِنْ بِنَا يُعَنْ»",
  ]},
  {id:"alf-45",title:"النِّدَاءُ",sub:"L'apostrophe (vocatif)",clr:["#180f32","#2f1e60"],bayts:[
    "وَلِلْمُنَادَى النَّاءِ أَوْ كَالنَّاءِ «يَا # وَأَيْ، وَآ، كَذَا أَيَا، ثُمَّ هَيَا»",
    "وَالْهَمْزُ لِلدَّانِي، وَ «وَا» لِمَنْ نُدِبْ # أَوْ «يَا»، وَغَيْرُ «وَا» لَدَى اللَّبْسِ اجْتُنِبْ",
    "وَغَيْرُ مُنْدُوبٍ وَمُضْمَرٍ وَمَا # جَا مُسْتَغَاثاً: قَدْ يُعَرَّى فَاعْلَمَا",
    "وَذَاكَ فِي اسْمِ الْجِنْسِ وَالْمُشَارِ لَهْ # قَلَّ، وَمَنْ يَمْنَعْهُ فَانْصُرْ عَاذِلَهْ",
    "وَابْنِ الْمُعَرَّفَ الْمُنَادَى الْمُفْرَدَا # عَلَى الَّذِي فِي رَفْعِهِ قَدْ عُهِدَا",
    "وَانْوِ انْضِمَامَ مَا بَنَوْا قَبْلَ النِّدَا # وَلْيُجْرَ مُجْرَى ذِي بِنَاءٍ جُدِّدَا",
    "وَالْمُفْرَدَ الْمَنْكُورَ وَالْمُضَافَا # وَشِبْهَهُ انْصِبْ عَادِماً خِلَافَا",
    "وَنَحْوَ «زَيْدٍ» ضُمَّ وَافْتَحَنَّ مِنْ # نَحْوِ «أَزَيْدُ بْنَ سَعِيدٍ! لَا تَهِنْ»",
    "وَالضَّمُّ إِنْ لَمْ يَلِ الِابْنُ عَلَمَا # وَيَلِ الِابْنَ عَلَمٌ: قَدْ حُتِمَا",
    "وَاضْمُمْ أَوِ انْصِبْ مَا اضْطِرَاراً نُوِّنَا # مِمَّا لَهُ اسْتِحْقَاقُ ضَمٍّ بُيِّنَا",
    "وَبِاضْطِرَارٍ خُصَّ جَمْعُ «يَا، وَأَلْ» # إِلَّا مَعَ «اللَّهِ» وَمَحْكِيِّ الْجُمَلْ",
    "وَالْأَكْثَرُ «اللَّهُمَّ» بِالتَّعْوِيضِ # وَشَذَّ «يَا اللَّهُمَّ» فِي قَرِيضِ",
    "تَابِعَ ذِي الضَّمِّ الْمُضَافَ دُونَ «أَلْ» # أَلْزِمْهُ نَصْباً كَـ «أَزَيْدُ ذَا الْحِيَلْ!»",
    "وَمَا سِوَاهُ ارْفَعْ أَوِ انْصِبْ، وَاجْعَلَا # كَمُسْتَقِلٍّ نَسَقاً وَبَدَلَا",
    "وَإِنْ يَكُنْ مَصْحُوبَ «أَلْ» مَا نُسِقَا # فَفِيهِ وَجْهَانِ، وَرَفْعٌ يُنْتَقَى",
  ]},
  {id:"alf-46",title:"النُّدْبَةُ وَالتَّرْخِيمُ",sub:"La lamentation et l'apocope",clr:["#0f1632","#1e2b60"],bayts:[
    "مَا لِلْمُنَادَى اجْعَلْ لِمَنْدُوبٍ، وَمَا # نُكِّرَ لَمْ يُنْدَبْ، وَلَا مَا أُبْهِمَا",
    "وَيُنْدَبُ الْمَوْصُولُ بِالَّذِي اشْتَهَرْ # كَـ «بِئْرَ زَمْزَمٍ» يَلِي «وَا مَنْ حَفَرْ!»",
    "وَمُنْتَهَى الْمَنْدُوبِ صِلْهُ بِالْأَلِفْ # مَتْلُوُّهَا إِنْ كَانَ مِثْلَهَا حُذِفْ",
    "كَذَاكَ تَنْوِينُ الَّذِي بِهِ كَمَلْ # مِنْ صِلَةٍ أَوْ غَيْرِهَا، نِلْتَ الْأَمَلْ",
    "وَالشَّكْلَ حَتْماً أَوْلِهِ مُجَانِسَا # إِنْ يَكُنِ الْفَتْحُ بِوَهْمٍ لَابِسَا",
    "وَوَاقِفاً زِدْ هَاءَ سَكْتٍ إِنْ تُرِدْ # وَإِنْ تَشَأْ فَالْمَدَّ وَالْهَا لَا تَزِدْ",
    "وَقَائِلٌ: «وَا عَبْدِيَا! وَا عَبْدَا!» # مَنْ فِي النِّدَا الْيَا ذَا سُكُونٍ أَبْدَى",
    "«تَرْخِيماً»: احْذِفْ آخِرَ الْمُنَادَى # كَـ «يَا سُعَا!» فِيمَنْ دَعَا «سُعَادَا»",
    "وَجَوِّزَنْهُ مُطْلَقاً فِي كُلِّ مَا # أُنِّثَ بِالْهَا، وَالَّذِي قَدْ رُخِّمَا",
    "بِحَذْفِهَا وَفِّرْهُ بَعْدُ، وَاحْظُلَا # تَرْخِيمَ مَا مِنْ هَذِهِ الْهَا قَدْ خَلَا",
    "إلَّا الرُّبَاعِيَّ فَمَا فَوْقُ، الْعَلَمْ # دُونَ إضَافَةٍ، وَإِسْنَادٍ مُتَمّْ",
    "وَمَعَ الَاخِرِ احْذِفِ الَّذِي تَلَا # إِنْ زِيدَ لِيناً سَاكِناً مُكَمِّلَا",
    "أَرْبَعَةً فَصَاعِداً، وَالْخُلْفُ فِي # وَاوٍ وَيَاءٍ بِهِمَا فَتْحٌ قُفِي",
    "وَالْعَجُزَ احْذِفْ مِنْ مُرَكَّبٍ، وَقَلّْ # تَرْخِيمُ جُمْلَةٍ، وَذَا عَمْرٌو نَقَلْ",
    "وَإِنْ نَوَيْتَ بَعْدَ حَذْفٍ مَا حُذِفْ # فَالْبَاقِيَ اسْتَعْمِلْ بِمَا فِيهِ أُلِفْ",
    "وَاجْعَلْهُ إِنْ لَمْ تَنْوِ مَحْذُوفاً كَمَا # لَوْ كَانَ بِالْآخِرِ وَضْعاً تُمِّمَا",
    "فَقُلْ عَلَى الْأَوَّلِ فِي «ثَمُودَ»: «يَا # ثَمُو!»، وَ «يَا ثَمِي!» عَلَى الثَّانِي بِيَا",
    "وَالْتَزِمِ الْأَوَّلَ فِي كَـ «مُسْلِمَهْ» # وَجَوِّزِ الْوَجْهَيْنِ فِي كَـ «مَسْلَمَهْ»",
    "وَلِاضْطِرَارٍ رَخَّمُوا دُونَ نِدَا # مَا لِلنِّدَا يَصْلُحُ نَحْوُ «أَحْمَدَا»",
