  {id:"alf-47",title:"الِاخْتِصَاصُ",sub:"La spécification",clr:["#110f32","#201e60"],bayts:[
    "«الِاخْتِصَاصُ»: كَنِدَاءٍ دُونَ «يَا» # كَـ «أَيُّهَا الْفَتَى!» بِإِثْرِ «ارْجُونِيَا»",
    "وَقَدْ يُرَى ذَا دُونَ «أَيٍّ» تِلْوَ «أَلْ» # كَمِثْلِ «نَحْنُ \\- الْعُرْبَ \\- أَسْخَى مَنْ بَذَلْ»",
  ]},
  {id:"alf-48",title:"التَّحْذِيرُ وَالْإِغْرَاءُ",sub:"La mise en garde et l'incitation",clr:["#0f1c32","#1e3660"],bayts:[
    "«إِيَّاكَ وَالشَّرَّ!» وَنَحْوَهُ نَصَبْ # مُحَذِّرٌ بِمَا اسْتِتَارُهُ وَجَبْ",
    "وَدُونَ عَطْفٍ ذَا لِـ «إِيَّا» انْسُبْ، وَمَا # سِوَاهُ سَتْرُ فِعْلِهِ لَنْ يَلْزَمَا",
    "إِلَّا مَعَ الْعَطْفِ أَوِ التَّكْرَارِ # كَـ «الضَّيْغَمَ الضَّيْغَمَ يَا ذَا السَّارِي!»",
    "وَشَذَّ «إِيَّايَ»، وَ «إِيَّاهُ» أَشَذّْ # وَعَنْ سَبِيلِ الْقَصْدِ مَنْ قَاسَ انْتَبَذْ",
    "وَكَمُحَذَّرٍ بِلَا «إِيَّا» اجْعَلَا # مُغْرىً بِهِ فِي كُلِّ مَا قَدْ فُصِّلَا",
  ]},
  {id:"alf-49",title:"أَسْمَاءُ الْأَفْعَالِ وَالْأَصْوَاتِ",sub:"Noms de verbe et interjections",clr:["#0f1232","#1e2460"],bayts:[
    "مَا نَابَ عَنْ فِعْلٍ كَـ «شَتَّانَ، وَصَهْ» # هُوَ:«اسْمُ فِعْلٍ»، وَكَذَا «أَوَّهْ، وَمَهْ»",
    "وَمَا بِمَعْنَى «افْعَلْ» كَـ «آمِينَ» كَثُرْ # وَغَيْرُهُ كَـ «وَيْ، وَهَيْهَاتَ» نَزُرْ",
    "وَالْفِعْلُ مِنْ أَسْمَائِهِ «عَلَيْكَا» # وَهَكَذَا «دُونَكَ، مَعْ إِلَيْكَا»",
    "كَذَا «رُوَيْدَ، بَلْهَ» نَاصِبَيْنِ # وَيَعْمَلَانِ الْخَفْضَ مَصْدَرَيْنِ",
    "وَمَا لِمَا تَنُوبُ عَنْهُ مِنْ عَمَلْ # لَهَا، وَأَخِّرْ مَا لِذِي فِيهِ الْعَمَلْ",
    "وَاحْكُمْ بِتَنْكِيرِ الَّذِي يُنَوَّنُ # مِنْهَا، وَتَعْرِيفُ سِوَاهُ بَيِّنُ",
    "وَمَا بِهِ خُوطِبَ مَا لَا يَعْقِلُ # مِنْ مُشْبِهِ اسْمِ الْفِعْلِ صَوْتاً يُجْعَلُ",
    "كَذَا الَّذِي أَجْدَى حِكَايَةً كَـ «قَبْ» # وَالْزَمْ بِنَا النَّوْعَيْنِ فَهْوَ قَدْ وَجَبْ",
  ]},
  {id:"alf-50",title:"نُونَا التَّوْكِيدِ",sub:"Les deux nûn de renforcement",clr:["#0f1a32","#1e3260"],bayts:[
    "لِلْفِعْلِ تَوْكِيدٌ بِنُونَيْنِ هُمَا # كَنُونَيِ «اذْهَبَنَّ، وَاقْصِدَنْهُمَا»",
    "يُؤَكِّدَانِ «افْعَلْ»، وَ «يَفْعَلْ» آتِيَا # ذَا طَلَبٍ، أَوْ شَرْطاً «امَّا» تَالِيَا",
    "أَوْ مُثْبَتاً فِي قَسَمٍ مُسْتَقْبَلَا # وَقَلَّ بَعْدَ «مَا، وَلَمْ» وَبَعْدَ «لَا»",
    "وَغَيْرِ «إِمَّا» مِنْ طَوَالِبِ الْجَزَا # وَآخِرَ الْمُؤَكَّدِ افْتَحْ كَـ «ابْرُزَا»",
    "وَاشْكُلْهُ قَبْلَ مُضْمَرٍ لَيْنٍ بِمَا # جَانَسَ مِنْ تَحَرُّكٍ قَدْ عُلِمَا",
    "وَالْمُضْمَرَ احْذِفَنَّهُ إِلَّا الْأَلِفْ # وَإِنْ يَكُنْ فِي آخِرِ الْفِعْلِ أَلِفْ",
    "فَاجْعَلْهُ مِنْهُ \\- رَافِعاً غَيْرَ الْيَا # وَالْوَاوِ \\- يَاءً كَـ «اسْعَيَنَّ سَعْيَا»",
    "وَاحْذِفْهُ مِنْ رَافِعِ هَاتَيْنِ، وَفِي # وَاوٍ وَيَا شَكْلٌ مُجَانِسٌ قُفِي",
    "نَحْوُ «اخْشَيِنْ يَا هِنْدُ!» بِالْكَسْرِ، وَ «يَا # قَوْمِ اخْشَوُنْ!» وَاضْمُمْ، وَقِسْ مُسَوِّيَا",
    "وَلَمْ تَقَعْ خَفِيفَةً بَعْدَ الْأَلِفْ # لَكِنْ شَدِيدَةً، وَكَسْرُهَا أُلِفْ",
    "وَأَلِفاً زِدْ قَبْلَهَا مُؤَكِّدَا # فِعْلاً إِلَى نُونِ الْإِنَاثِ أُسْنِدَا",
    "وَاحْذِفْ خَفِيفَةً لِسَاكِنٍ رَدِفْ # وَبَعْدَ غَيْرِ فَتْحَةٍ إِذَا تَقِفْ",
    "وَارْدُدْ إِذَا حَذَفْتَهَا فِي الْوَقْفِ مَا # مِنْ أَجْلِهَا فِي الْوَصْلِ كَانَ عُدِمَا",
    "وَأَبْدِلَنْهَا بَعْدَ فَتْحٍ أَلِفَا # وَقْفاً كَمَا تَقُولُ فِي «قِفَنْ»: «قِفَا»",
  ]},
  {id:"alf-51",title:"مَا لَا يَنْصَرِفُ",sub:"Le non-décliné (mamnû' min as-sarf)",clr:["#140f32","#271e60"],bayts:[
    "«الصَّرْفُ»: تَنْوِينٌ أَتَى مُبَيِّنَا # مَعْنىً بِهِ يَكُونُ الِاسْمُ أَمْكَنَا",
    "فَأَلِفُ التَّأْنِيثِ مُطْلَقاً مَنَعْ # صَرْفَ الَّذِي حَوَاهُ كَيْفَمَا وَقَعْ",
    "وَزَائِدَا «فَعْلَانَ» فِي وَصْفٍ سَلِمْ # مِنْ أَنْ يُرَى بِتَاءِ تَأْنِيثٍ خُتِمْ",
    "وَوَصْفٌ اصْلِيٌّ وَوَزْنُ «أَفْعَلَا» # مَمْنُوعَ تَأْنِيثٍ بِتَا كَـ «أَشْهَلَا»",
    "وَأَلْغِيَنَّ عَارِضَ الْوَصْفِيَّهْ # كَـ «أَرْبَعٍ»، وَعَارِضَ الْإِسْمِيَّهْ",
    "فَـ «الْأَدْهَمُ» الْقَيْدُ؛ لِكَوْنِهِ وُضِعْ # فِي الْأَصْلِ وَصْفاً: انْصِرَافُهُ مُنِعْ",
    "وَ «أَجْدَلٌ، وَأَخْيَلٌ، وَأَفْعَى» # مَصْرُوفَةٌ، وَقَدْ يُنَلْنَ الْمَنْعَا",
    "وَمَنْعُ عَدْلٍ مَعَ وَصْفٍ مُعْتَبَرْ # فِي لَفْظِ «مَثْنَى، وَثُلَاثَ، وَأُخَرْ»",
    "وَوَزْنُ «مَثْنَى، وَثُلَاثَ» كَهُمَا # مِنْ وَاحِدٍ لِأَرْبَعٍ فَلْيُعْلَمَا",
    "وَكُنْ لِجَمْعٍ مُشْبِهٍ «مَفَاعِلَا # أَوِ الْمَفَاعِيلَ» بِمَنْعٍ كَافِلَا",
    "وَذَا اعْتِلَالٍ مِنْهُ \\- كَـ «الْجَوَارِي» \\- # رَفْعاً وَجَرّاً: أَجْرِهِ كَـ «سَارِي»",
    "وَلِـ «سَرَاوِيلَ» بِهَذَا الْجَمْعِ # شَبَهٌ اقْتَضَى عُمُومَ الْمَنْعِ",
    "وَإِنْ بِهِ سُمِّيَ أَوْ بِمَا لَحِقْ # بِهِ: فَالِانْصِرَافُ مَنْعُهُ يَحِقّْ",
    "وَالْعَلَمَ امْنَعْ صَرْفَهُ مُرَكَّبَا # تَرْكِيبَ مَزْجٍ نَحْوُ: «مَعْدِيكَرِبَا»",
    "كَذَا حَاوِي زَائِدَيْ «فَعْلَانَا» # كَـ «غَطَفَانَ»، وَكَـ «أَصْبَهَانَا»",
    "كَذَا مُؤَنَّثٌ بِهَاءٍ مُطْلَقَا # وَشَرْطُ مَنْعِ الْعَارِ كَوْنُهُ ارْتَقَى",
    "فَوْقَ الثَّلَاثِ، أَوْ كَـ «جُورَ»، أَوْ «سَقَرْ» # أَوْ «زَيْدٍ» اسْمَ امْرَأَةٍ لَا اسْمَ ذَكَرْ",
    "وَجْهَانِ فِي الْعَادِمِ تَذْكِيراً سَبَقْ # وَعُجْمَةً كَـ «هِنْدَ»، وَالْمَنْعُ أَحَقّْ",
    "وَالْعَجَمِيُّ الْوَضْعِ وَالتَّعْرِيفِ مَعْ # زَيْدٍ عَلَى الثَّلَاثِ: صَرْفُهُ امْتَنَعْ",
    "كَذَاكَ ذُو وَزْنٍ يَخُصُّ الْفِعْلَا # أَوْ غَالِبٍ كَـ «أَحْمَدٍ، وَيَعْلَى»",
    "وَمَا يَصِيرُ عَلَماً مِنْ ذِي أَلِفْ # زِيدَتْ لِإِلْحَاقٍ: فَلَيْسَ يَنْصَرِفْ",
    "وَالْعَلَمَ امْنَعْ صَرْفَهُ إِنْ عُدِلَا # كَـ «فُعَلِ» التَّوْكِيدِ، أَوْ كَـ «ثُعَلَا»",
    "وَالْعَدْلُ وَالتَّعْرِيفُ مَانِعَا «سَحَرْ» # إِذَا بِهِ التَّعْيِينُ قَصْداً يُعْتَبَرْ",
    "وَابْنِ عَلَى الْكَسْرِ «فَعَالِ» عَلَمَا # مُؤَنَّثاً، وَهْوَ نَظِيرُ «جُشَمَا»",
    "عِنْدَ تَمِيمٍ، وَاصْرِفَنْ مَا نُكِّرَا # مِنْ كُلِّ مَا التَّعْرِيفُ فِيهِ أَثَّرَا",
    "وَمَا يَكُونُ مِنْهُ مَنْقُوصاً فَفِي # إِعْرَابِهِ نَهْجَ «جَوَارٍ» يَقْتَفِي",
    "وَلِاضْطِرَارٍ أَوْ تَنَاسُبٍ صُرِفْ # ذُو الْمَنْعِ، وَالْمَصْرُوفُ قَدْ لَا يَنْصَرِفْ",
  ]},
  {id:"alf-52",title:"إِعْرَابُ الْفِعْلِ",sub:"La déclinaison du verbe",clr:["#0f2132","#1e3f60"],bayts:[
    "ارْفَعْ مُضَارِعاً إِذَا يُجَرَّدُ # مِنْ نَاصِبٍ وَجَازِمٍ كَـ «تَسْعَدُ»",
    "وَبِـ «لَنِ» انْصِبْهُ، وَ «كَيْ»، كَذَا بِـ «أَنْ» # لَا بَعْدَ عِلْمٍ، وَالَّتِي مِنْ بَعْدِ ظَنّْ",
    "فَانْصِبْ بِهَا، وَالرَّفْعَ صَحِّحْ، وَاعْتَقِدْ # تَخْفِيفَهَا مِنْ «أَنَّ» فَهْوَ مُطَّرِدْ",
    "وَبَعْضُهُمْ أَهْمَلَ «أَنْ» حَمْلاً عَلَى # «مَا» \\- أُخْتِهَا \\- حَيْثُ اسْتَحَقَّتْ عَمَلَا",
    "وَنَصَبُوا بِـ «إِذَنِ» الْمُسْتَقْبَلَا # إِنْ صُدِّرَتْ، وَالْفِعْلُ بَعْدُ مُوصَلَا",
    "أَوْ قَبْلَهُ الْيَمِينُ، وَانْصِبْ وَارْفَعَا # إِذَا «إِذَنْ» مِنْ بَعْدِ عَطْفٍ وَقَعَا",
    "وَبَيْنَ «لَا» وَلَامِ جَرٍّ الْتُزِمْ # إِظْهَارُ «أَنْ» نَاصِبَةً، وَإِنْ عُدِمْ",
    "«لَا» فَـ «أَنَ» اعْمِلْ مُظْهِراً أَوْ مُضْمِرَا # وَبَعْدَ نَفْيِ «كَانَ» حَتْماً أُضْمِرَا",
    "كَذَاكَ بَعْدَ «أَوْ» إِذَا يَصْلُحُ فِي # مَوْضِعِهَا «حَتَّى، أَوِ الَّا»: «أَنْ» خَفِي",
    "وَبَعْدَ «حَتَّى» هَكَذَا إِضْمَارُ «أَنْ» # حَتْمٌ كَـ «جُدْ حَتَّى تَسُرَّ ذَا حَزَنْ»",
    "وَتِلْوَ «حَتَّى» حَالاً اوْ مُؤَوَّلَا # بِهِ ارْفَعَنَّ، وَانْصِبِ الْمُسْتَقْبَلَا",
    "وَبَعْدَ فَا جَوَابِ نَفْيٍ أَوْ طَلَبْ # مَحْضَيْنِ: «أَنْ» \\- وَسَتْرُهُ حَتْمٌ \\- نَصَبْ",
    "وَالْوَاوُ كَالْفَا إِنْ تُفِدْ مَفْهُومَ «مَعْ» # كَـ «لَا تَكُنْ جَلْداً وَتُظْهِرَ الْجَزَعْ»",
    "وَبَعْدَ غَيْرِ النَّفْيِ جَزْماً اعْتَمِدْ # إِنْ تَسْقُطِ الْفَا وَالْجَزَاءُ قَدْ قُصِدْ",
    "وَشَرْطُ جَزْمٍ بَعْدَ نَهْيٍ أَنْ تَضَعْ # «إِنْ» قَبْلَ «لَا» دُونَ تَخَالُفٍ يَقَعْ",
    "وَالْأَمْرُ إِنْ كَانَ بِغَيْرِ «افْعَلْ» فَلَا # تَنْصِبْ جَوَابَهُ، وَجَزْمَهُ اقْبَلَا",
    "وَالْفِعْلُ بَعْدَ الْفَاءِ فِي الرَّجَا نُصِبْ # كَنَصْبِ مَا إِلَى التَّمَنِّي يَنْتَسِبْ",
    "وَإِنْ عَلَى اسْمٍ خَالِصٍ فِعْلٌ عُطِفْ # تَنْصِبُهُ «أَنْ» ثَابِتاً أَوْ مُنْحَذِفْ",
    "وَشَذَّ حَذْفُ «أَنْ» وَنَصْبٌ فِي سِوَى # مَا مَرَّ، فَاقْبَلْ مِنْهُ مَا عَدْلٌ رَوَى",
  ]},
  {id:"alf-53",title:"عَوَامِلُ الْجَزْمِ",sub:"Les régissants du jazm",clr:["#180f32","#2f1e60"],bayts:[
    "بِـ «لَا» وَلَامٍ طَالِباً ضَعْ جَزْمَا # فِي الْفِعْلِ هَكَذَا بِـ «لَمْ، وَلَمَّا»",
    "وَاجْزِمْ بِـ «إِنْ، وَمَنْ، وَمَا، وَمَهْمَا # أَيٍّ، مَتَى، أَيَّانَ، أَيْنَ، إِذْمَا",
    "وَحَيْثُمَا، أَنَّى»، وَحَرْفٌ «إِذْمَا» # كَـ «إِنْ»، وَبَاقِي الْأَدَوَاتِ أَسْمَا",
    "فِعْلَيْنِ يَقْتَضِينَ: شَرْطٌ قُدِّمَا # يَتْلُو الْجَزَاءُ وَجَوَاباً وُسِمَا",
    "وَمَاضِيَيْنِ أَوْ مُضَارِعَيْنِ # تُلْفِيهِمَا، أَوْ مُتَخَالِفَيْنِ",
    "وَبَعْدَ مَاضٍ رَفْعُكَ الْجَزَا حَسَنْ # وَرَفْعُهُ بَعْدَ مُضَارِعٍ وَهَنْ",
    "وَاقْرُنْ بِفَا حَتْماً جَوَاباً لَوْ جُعِلْ # شَرْطاً لِـ «إِنْ» أَوْ غَيْرِهَا لَمْ يَنْجَعِلْ",
    "وَتَخْلُفُ الْفَاءَ «إِذَا» الْمُفَاجَأَهْ # كَـ «إِنْ تَجُدْ إِذَا لَنَا مُكَافَأَهْ»",
    "وَالْفِعْلُ مِنْ بَعْدِ الْجَزَا إِنْ يَقْتَرِنْ # بِالْفَا أَوِ الْوَاوِ بِتَثْلِيثٍ قَمِنْ",
    "وَجَزْمٌ اوْ نَصْبٌ لِفِعْلٍ إِثْرَ فَا # أَوْ وَاوٍ انْ بِالْجُمْلَتَيْنِ اكْتُنِفَا",
    "وَالشَّرْطُ يُغْنِي عَنْ جَوَابٍ قَدْ عُلِمْ # وَالْعَكْسُ قَدْ يَأْتِي إِنِ الْمَعْنَى فُهِمْ",
    "وَاحْذِفْ لَدَى اجْتِمَاعِ شَرْطٍ وَقَسَمْ # جَوَابَ مَا أَخَّرْتَ فَهْوَ مُلْتَزَمْ",
    "وَإِنْ تَوَالَيَا وَقَبْلُ ذُو خَبَرْ # فَالشَّرْطَ رَجِّحْ مُطْلَقاً بِلَا حَذَرْ",
    "وَرُبَّمَا رُجِّحَ بَعْدَ قَسَمِ # شَرْطٌ بِلَا ذِي خَبَرٍ مُقَدَّمِ",
  ]},
  {id:"alf-54",title:"فَصْلُ لَوْ",sub:"La particule law",clr:["#0f1632","#1e2b60"],bayts:[
    "«لَوْ»: حَرْفُ شَرْطٍ فِي مُضِيٍّ، وَيَقِلّْ # إِيلَاؤُهَا مُسْتَقْبَلاً، لَكِنْ قُبِلْ",
    "وَهْيَ فِي الِاخْتِصَاصِ بِالْفِعْلِ كَـ «إِنْ» # لَكِنَّ «لَوْ»: «أَنَّ» بِهَا قَدْ تَقْتَرِنْ",
    "وَإِنْ مُضَارِعٌ تَلَاهَا صُرِفَا # إِلَى الْمُضِيِّ نَحْوُ «لَوْ يَفِي كَفَى»",
  ]},
  {id:"alf-55",title:"«أَمَّا، وَلَوْلَا، وَلَوْمَا»",sub:"Ammâ, lawlâ, lawmâ",clr:["#110f32","#201e60"],bayts:[
    "«أَمَّا» كَـ «مَهْمَا يَكُ مِنْ شَيْءٍ»، وَفَا # لِتِلْوِ تِلْوِهَا وُجُوباً أُلِفَا",
    "وَحَذْفُ ذِي الْفَا قَلَّ فِي نَثْرٍ إِذَا # لَمْ يَكُ قَوْلٌ مَعَهَا قَدْ نُبِذَا",
    "«لَوْلَا، وَلَوْمَا» يَلْزَمَانِ الِابْتِدَا # إِذَا امْتِنَاعاً بِوُجُودٍ عَقَدَا",
    "وَبِهِمَا التَّحْضِيضَ مِزْ، وَ «هَلَّا # أَلَّا، أَلَا»، وَأَوْلِيَنْهَا فِعْلَا",
    "وَقَدْ يَلِيهَا اسْمٌ بِفِعْلٍ مُضْمَرِ # عُلِّقَ، أَوْ بِظَاهِرٍ مُؤَخَّرِ",
  ]},
  {id:"alf-56",title:"الْإِخْبَارُ بِـ «الَّذِي» وَالْأَلِفِ وَاللَّامِ",sub:"L'information par 'alladhî' et 'al'",clr:["#0f1c32","#1e3660"],bayts:[
    "مَا قِيلَ: أَخْبِرْ عَنْهُ بِـ «الَّذِي» خَبَرْ # عَنِ «الَّذِي» مُبْتَدَأً قَبْلُ اسْتَقَرّْ",
    "وَمَا سِوَاهُمَا فَوَسِّطْهُ صِلَهْ # عَائِدُهَا خَلَفُ مُعْطِي التَّكْمِلَهْ",
    "نَحْوُ «الَّذِي ضَرَبْتُهُ زَيْدٌ»، فَذَا # «ضَرَبْتُ زَيْداً» كَانَ، فَادْرِ الْمَأْخَذَا",
    "وَبِـ «اللَّذَيْنِ، وَالَّذِينَ، وَالَّتِي» # أَخْبِرْ مُرَاعِياً وِفَاقَ الْمُثْبَتِ",
    "قَبُولُ تَأْخِيرٍ وَتَعْرِيفٍ لِمَا # أُخْبِرَ عَنْهُ هَهُنَا قَدْ حُتِمَا",
    "كَذَا الْغِنَى عَنْهُ بِأَجْنَبِيٍّ اوْ # بِمُضْمَرٍ: شَرْطٌ، فَرَاعِ مَا رَعَوْا",
    "وَأَخْبَرُوا هُنَا بِـ «أَلْ» عَنْ بَعْضِ مَا # يَكُونُ فِيهِ الْفِعْلُ قَدْ تَقَدَّمَا",
    "إِنْ صَحَّ صَوْغُ صِلَةٍ مِنْهُ لِـ «أَلْ» # كَصَوْغِ «وَاقٍ» مِنْ «وَقَى اللَّهُ الْبَطَلْ»",
    "وَإِنْ يَكُنْ مَا رَفَعَتْ صِلَةُ «أَلْ» # ضَمِيرَ غَيْرِهَا: أُبِينَ وَانْفَصَلْ",
  ]},
  {id:"alf-57",title:"الْعَدَدُ",sub:"Les nombres",clr:["#0f1232","#1e2460"],bayts:[
    "«ثَلَاثَةً» بِالتَّاءِ قُلْ «لِلْعَشَرَهْ» # فِي عَدِّ مَا آحَادُهُ مُذَكَّرَهْ",
    "فِي الضِّدِّ جَرِّدْ، وَالْمُمَيِّزَ اجْرُرِ # جَمْعاً بِلَفْظِ قِلَّةٍ فِي الْأَكْثَرِ",
    "وَ «مِئَةً، وَالْأَلْفَ» لِلْفَرْدِ أَضِفْ # وَ «مِئَةٌ» بِالْجَمْعِ نَزْراً قَدْ رُدِفْ",
    "وَ «أَحَدَ» اذْكُرْ وَصِلَنْهُ بِـ «عَشَرْ» # مُرَكِّباً قَاصِدَ مَعْدُودٍ ذَكَرْ",
    "وَقُلْ لَدَى التَّأْنِيثِ: «إِحْدَى عَشْرَهْ» # وَالشِّينُ فِيهَا عَنْ تَمِيمٍ كَسْرَهْ",
    "وَمَعَ غَيْرِ «أَحَدٍ، وَإِحْدَى» # مَا مَعْهُمَا فَعَلْتَ فَافْعَلْ قَصْدَا",
    "وَلِـ «ثَلَاثَةٍ، وَتِسْعَةٍ» وَمَا # بَيْنَهُمَا إِنْ رُكِّبَا: مَا قُدِّمَا",
    "وَأَوْلِ «عَشْرَةَ»: «اثْنَتَيْ»، وَ «عَشَرَا» # «اثْنَيْ» إِذَا أُنْثَى تَشَا أَوْ ذَكَرَا",
    "وَالْيَا لِغَيْرِ الرَّفْعِ، وَارْفَعْ بِالْأَلِفْ # وَالْفَتْحُ فِي جُزْأَيْ سِوَاهُمَا أُلِفْ",
    "وَمَيِّزِ «الْعِشْرِينَ لِلتِّسْعِينَا» # بِوَاحِدٍ كَـ «أَرْبَعِينَ حِينَا»",
    "وَمَيَّزُوا مُرَكَّباً بِمِثْلِ مَا # مُيِّزَ «عِشْرُونَ»، فَسَوِّيَنْهُمَا",
    "وَإِنْ أُضِيفَ عَدَدٌ مُرَكَّبُ # يَبْقَ الْبِنَا، وَعَجُزٌ قَدْ يُعْرَبُ",
    "وَصُغْ مِنِ «اثْنَيْنِ» فَمَا فَوْقُ إِلَى # «عَشَرَةٍ»: كَـ «فَاعِلٍ» مِنْ «فَعَلَا»",
    "وَاخْتِمْهُ فِي التَّأْنِيثِ بِالتَّا، وَمَتَى # ذَكَّرْتَ فَاذْكُرْ «فَاعِلاً» بِغَيْرِ تَا",
    "وَإِنْ تُرِدْ بَعْضَ الَّذِي مِنْهُ بُنِي # تُضِفْ إِلَيْهِ مِثْلَ «بَعْضٍ» بَيِّنِ",
    "وَإِنْ تُرِدْ جَعْلَ الْأَقَلِّ مِثْلَ مَا # فَوْقُ فَحُكْمَ «جَاعِلٍ» لَهُ احْكُمَا",
    "وَإِنْ أَرَدْتَ مِثْلَ «ثَانِي اثْنَيْنِ» # مُرَكَّباً فَجِئْ بِتَرْكِيبَيْنِ",
    "أَوْ «فَاعِلاً» بِحَالَتَيْهِ أَضِفِ # إِلَى مُرَكَّبٍ بِمَا تَنْوِي يَفِي",
    "وَشَاعَ الِاسْتِغْنَا بِـ «حَادِي عَشَرَا» # وَنَحْوِهِ، وَقَبْلَ «عِشْرِينَ» اذْكُرَا",
    "وَبَابِهِ «الْفَاعِلَ» مِنْ لَفْظِ الْعَدَدْ # بِحَالَتَيْهِ قَبْلَ وَاوٍ يُعْتَمَدْ",
  ]},
  {id:"alf-58",title:"«كَمْ، وَكَأَيِّنْ، وَكَذَا»",sub:"Kam, ka'ayyin, kadhâ",clr:["#0f1a32","#1e3260"],bayts:[
    "مَيِّزْ فِي الِاسْتِفْهَامِ «كَمْ»: بِمِثْلِ مَا # مَيَّزْتَ «عِشْرِينَ» كَـ «كَمْ شَخْصاً سَمَا؟»",
    "وَأَجِزَ انْ تَجُرَّهُ «مِنْ» مُضْمَرَا # إِنْ وَلِيَتْ «كَمْ» حَرْفَ جَرٍّ مُظْهَرَا",
    "وَاسْتَعْمِلَنْهَا مُخْبِراً كَـ «عَشَرَهْ» # أَوْ «مِئَةٍ» كَـ «كَمْ رِجَالٍ، أَوْ مَرَهْ»",
    "كَـ «كَمْ»: «كَأَيِّنْ، وَكَذَا»، وَيَنْتَصِبْ # تَمْيِيزُ ذَيْنِ، أَوْ بِهِ صِلْ «مِنْ» تُصِبْ",
  ]},
  {id:"alf-59",title:"الْحِكَايَةُ",sub:"La citation (hikâya)",clr:["#140f32","#271e60"],bayts:[
    "احْكِ بِـ «أَيٍّ» مَا لِمَنْكُورٍ سُئِلْ # عَنْهُ بِهَا فِي الْوَقْفِ، أَوْ حِينَ تَصِلْ",
    "وَوَقْفاً احْكِ مَا لِمَنْكُورٍ بِـ «مَنْ» # وَالنُّونَ حَرِّكْ مُطْلَقاً وَأَشْبِعَنّْ",
    "وَقُلْ:«مَنَانِ؟ وَمَنَيْنِ؟» بَعْدَ «لِي # إِلْفَانِ بِابْنَيْنِ»، وَسَكِّنْ تَعْدِلِ",
    "وَقُلْ لِمَنْ قَالَ «أَتَتْ بِنْتٌ»: «مَنَهْ؟» # وَالنُّونُ قَبْلَ تَا الْمُثَنَّى مُسْكَنَهْ",
    "وَالْفَتْحُ نَزْرٌ، وَصِلِ التَّا وَالْأَلِفْ # بِـ «مَنْ» بِإِثْرِ «ذَا بِنِسْوَةٍ كَلِفْ»",
    "وَقُلْ: «مَنُونَ؟ وَمَنِينَ؟» مُسْكِنَا # إِنْ قِيلَ: «جَا قَوْمٌ لِقَوْمٍ فُطَنَا»",
    "وَإِنْ تَصِلْ فَلَفْظُ «مَنْ» لَا يَخْتَلِفْ # وَنَادِرٌ «مَنُونَ» فِي نَظْمٍ عُرِفْ",
    "وَالْعَلَمَ احْكِيَنَّهُ مِنْ بَعْدِ «مَنْ» # إِنْ عَرِيَتْ مِنْ عَاطِفٍ بِهَا اقْتَرَنْ",
  ]},
  {id:"alf-60",title:"التَّأْنِيثُ",sub:"Le féminin",clr:["#0f2132","#1e3f60"],bayts:[
    "عَلَامَةُ التَّأْنِيثِ تَاءٌ أَوْ أَلِفْ # وَفِي أَسَامٍ قَدَّرُوا التَّا كَـ «الْكَتِفْ»",
    "وَيُعْرَفُ التَّقْدِيرُ بِالضَّمِيرِ # وَنَحْوِهِ كَالرَّدِّ فِي التَّصْغِيرِ",
    "وَلَا تَلِي فَارِقَةً «فَعُولَا» # أَصْلاً، وَلَا «الْمِفْعَالَ، وَالْمِفْعِيلَا»",
    "كَذَاكَ «مِفْعَلٌ»، وَمَا تَلِيهِ # تَا الْفَرْقِ مِنْ ذِي فَشُذُوذٌ فِيهِ",
    "وَمِنْ «فَعِيلٍ» كَـ «قَتِيلٍ» إِنْ تَبِعْ # مَوْصُوفَهُ غَالِباً التَّا تَمْتَنِعْ",
    "وَأَلِفُ التَّأْنِيثِ ذَاتُ قَصْرِ # وَذَاتُ مَدٍّ نَحْوُ أُنْثَى «الْغُرِّ»",
    "وَالِاشْتِهَارُ فِي مَبَانِي الْأُولَى # يُبْدِيهِ وَزْنُ «أُرَبَى، وَالطُّولَى",
    "وَمَرَطَى»، وَوَزْنُ «فَعْلَى» جَمْعَا # أَوْ مَصْدَراً، أَوْ صِفَةً كَـ «شَبْعَى»",
    "وَكَـ «حُبَارَى، سُمَّهَى، سِبَطْرَى # ذِكْرَى، وَحِثِّيثَى، مَعَ الْكُفَرَّى»",
    "كَذَاكَ «خُلَّيْطَى، مَعَ الشُّقَّارَى» # وَاعْزُ لِغَيْرِ هَذِهِ اسْتِنْدَارَا",
    "لِمَدِّهَا «فَعْلَاءُ، أَفْعِلَاءُ # \\- مُثَلَّثَ الْعَيْنِ -، وَفَعْلَلَاءُ",
    "ثُمَّ فِعَالَا، فُعْلُلَا، فَاعُولَا # وَفَاعِلَاءُ، فِعْلِيَا، مَفْعُولَا»",
    "وَمُطْلَقُ الْعَيْنِ «فَعَالَا»، وَكَذَا # مُطْلَقُ فَاءٍ «فَعَلَاءُ» أُخِذَا",
  ]},
  {id:"alf-61",title:"الْمَقْصُورُ وَالْمَمْدُودُ",sub:"Le maqsûr et le mamdûd",clr:["#180f32","#2f1e60"],bayts:[
    "إِذَا اسْمٌ اسْتَوْجَبَ مِنْ قَبْلِ الطَّرَفْ # فَتْحاً وَكَانَ ذَا نَظِيرٍ كَـ «الْأَسَفْ»",
    "فَلِنَظِيرِهِ الْمُعَلِّ الْآخِرِ # ثُبُوتُ قَصْرٍ بِقِيَاسٍ ظَاهِرِ",
    "كَـ «فِعَلٍ، وَفُعَلٍ» فِي جَمْعِ مَا # كَـ «فِعْلَةٍ، وَفُعْلَةٍ» نَحْوُ «الدُّمَى»",
    "وَمَا اسْتَحَقَّ قَبْلَ آخِرٍ أَلِفْ # فَالْمَدُّ فِي نَظِيرِهِ حَتْماً عُرِفْ",
    "كَمَصْدَرِ الْفِعْلِ الَّذِي قَدْ بُدِئَا # بِهَمْزِ وَصْلٍ كَـ «ارْعَوَى»، وَكَـ «ارْتَأَى»",
    "وَالْعَادِمُ النَّظِيرِ ذَا قَصْرٍ وَذَا # مَدٍّ بِنَقْلٍ كَـ «الْحِجَا»، وَكَـ «الْحِذَا»",
    "وَقَصْرُ ذِي الْمَدِّ اضْطِرَاراً مُجْمَعُ # عَلَيْهِ، وَالْعَكْسُ بِخُلْفٍ يَقَعُ",
  ]},
  {id:"alf-62",title:"كَيْفِيَّةُ تَثْنِيَةِ الْمَقْصُورِ وَالْمَمْدُودِ وَجَمْعِهِمَا تَصْحِيحاً",sub:"Duel et pluriel du maqsûr/mamdûd",clr:["#0f1632","#1e2b60"],bayts:[
    "آخِرَ مَقْصُورٍ تُثَنِّي اجْعَلْهُ يَا # إِنْ كَانَ عَنْ ثَلَاثَةٍ مُرْتَقِيَا",
    "كَذَا الَّذِي الْيَا أَصْلُهُ نَحْوُ «الْفَتَى» # وَالْجَامِدُ الَّذِي أُمِيلَ كَـ «مَتَى»",
    "فِي غَيْرِ ذَا تُقْلَبُ وَاواً الْأَلِفْ # وَأَوْلِهَا مَا كَانَ قَبْلُ قَدْ أُلِفْ",
    "وَمَا كَـ «صَحْرَاءَ» بِوَاوٍ ثُنِّيَا # وَنَحْوُ «عِلْبَاءٍ، كِسَاءٍ، وَحَيَا»",
    "بِوَاوٍ اوْ هَمْزٍ، وَغَيْرَ مَا ذُكِرْ # صَحِّحْ، وَمَا شَذَّ عَلَى نَقْلٍ قُصِرْ",
    "وَاحْذِفْ مِنَ الْمَقْصُورِ فِي جَمْعٍ عَلَى # حَدِّ الْمُثَنَّى مَا بِهِ تَكَمَّلَا",
    "وَالْفَتْحَ أَبْقِ مُشْعِراً بِمَا حُذِفْ # وَإِنْ جَمَعْتَهُ بِتَاءٍ وَأَلِفْ",
    "فَالْأَلِفَ اقْلِبْ قَلْبَهَا فِي التَّثْنِيَهْ # وَتَاءَ ذِي التَّا أَلْزِمَنَّ تَنْحِيَهْ",
    "وَالسَّالِمَ الْعَيْنِ الثُّلَاثِي اسْماً أَنِلْ # إِتْبَاعَ عَيْنٍ فَاءَهُ بِمَا شُكِلْ",
    "إِنْ سَاكِنَ الْعَيْنِ مُؤَنَّثاً بَدَا # مُخْتَتَماً بِالتَّاءِ أَوْ مُجَرَّدَا",
    "وَسَكِّنِ التَّالِيَ غَيْرَ الْفَتْحِ أَوْ # خَفِّفْهُ بِالْفَتْحِ، فَكُلّاً قَدْ رَوَوْا",
    "وَمَنَعُوا إِتْبَاعَ نَحْوِ «ذِرْوَهْ # وَزُبْيَةٍ»، وَشَذَّ كَسْرُ «جِرْوَهْ»",
    "وَنَادِرٌ أَوْ ذُو اضْطِرَارٍ غَيْرُ مَا # قَدَّمْتُهُ، أَوْ لِأُنَاسٍ انْتَمَى",
  ]},
  {id:"alf-63",title:"جَمْعُ التَّكْسِيرِ",sub:"Le pluriel brisé",clr:["#110f32","#201e60"],bayts:[
    "«أَفْعِلَةٌ، أَفْعُلُ، ثُمَّ فِعْلَهْ # ثُمَّتَ أَفْعَالٌ»: جُمُوعُ قِلَّهْ",
    "وَبَعْضُ ذِي بِكَثْرَةٍ وَضْعاً يَفِي # كَـ «أَرْجُلٍ»، وَالْعَكْسُ جَاءَ كَـ «الصُّفِي»",
    "لِـ «فَعْلٍ» اسْماً صَحَّ عَيْناً: «أَفْعُلُ» # وَلِلرُّبَاعِيِّ اسْماً ايْضاً يُجْعَلُ",
    "إِنْ كَانَ كَـ «الْعَنَاقِ، وَالذِّرَاعِ» فِي # مَدٍّ وَتَأْنِيثٍ وَعَدِّ الْأَحْرُفِ",
    "وَغَيْرُ مَا «أَفْعُلُ» فِيهِ مُطَّرِدْ # مِنَ الثُّلَاثِي اسْماً بِـ «أَفْعَالٍ» يَرِدْ",
    "وَغَالِباً أَغْنَاهُمُ «فِعْلَانُ» # فِي «فُعَلٍ» كَقَوْلِهِمْ: «صِرْدَانُ»",
    "فِي اسْمٍ مُذَكَّرٍ رُبَاعِيٍّ بِمَدّْ # ثَالِثٍ «افْعِلَةُ» عَنْهُمُ اطَّرَدْ",
    "وَالْزَمْهُ فِي «فَعَالٍ، اوْ فِعَالِ» # مُصَاحِبَيْ تَضْعِيفٍ اوْ إِعْلَالِ",
    "«فُعْلٌ» لِنَحْوِ «أَحْمَرٍ، وَحَمْرَا» # وَ «فِعْلَةٌ» جَمْعاً بِنَقْلٍ يُدْرَى",
    "وَ «فُعُلٌ» لِاسْمٍ رُبَاعِيٍّ بِمَدّْ # قَدْ زِيدَ قَبْلَ لَامٍ؛ اعْلَالاً فَقَدْ",
    "مَا لَمْ يُضَاعَفْ فِي الْأَعَمِّ ذُو الْأَلِفْ # وَ «فُعَلٌ» جَمْعاً لِـ «فُعْلَةٍ» عُرِفْ",
    "وَنَحْوِ «كُبْرَى»، وَلِـ «فِعْلَةٍ»: «فِعَلْ» # وَقَدْ يَجِيءُ جَمْعُهُ عَلَى «فُعَلْ»",
    "فِي نَحْوِ «رَامٍ» ذُو اطِّرَادٍ «فُعَلَهْ» # وَشَاعَ نَحْوُ «كَامِلٍ، وَكَمَلَهْ»",
    "«فَعْلَى» لِوَصْفٍ كَـ «قَتِيلٍ، وَزَمِنْ # وَهَالِكٍ»، وَ «مَيِّتٌ» بِهِ قَمِنْ",
    "لِـ «فُعْلٍ» اسْماً صَحَّ لَاماً: «فِعَلَهْ» # وَالْوَضْعُ فِي «فَعْلٍ، وَفِعْلٍ» قَلَّلَهْ",
    "وَ «فُعَّلٌ» لِـ «فَاعِلٍ، وَفَاعِلَهْ» # وَصْفَيْنِ نَحْوُ «عَاذِلٍ، وَعَاذِلَهْ»",
    "وَمِثْلُهُ «الْفُعَّالُ» فِيمَا ذُكِّرَا # وَذَانِ فِي الْمُعَلِّ لَاماً نَدَرَا",
    "«فَعْلٌ، وَفَعْلَةٌ»: «فِعَالٌ» لَهُمَا # وَقَلَّ فِيمَا عَيْنُهُ الْيَا مِنْهُمَا",
    "وَ «فَعَلٌ» أَيْضاً لَهُ «فِعَالُ» # مَا لَمْ يَكُنْ فِي لَامِهِ اعْتِلَالُ",
    "أَوْ يَكُ مُضْعَفاً، وَمِثْلُ «فَعَلِ» # ذُو التَّا وَ «فُعْلٌ، مَعَ فِعْلٍ»، فَاقْبَلِ",
    "وَفِي «فَعِيلٍ» وَصْفَ «فَاعِلٍ»: وَرَدْ # كَذَاكَ فِي أُنْثَاهُ أَيْضاً اطَّرَدْ",
    "وَشَاعَ فِي وَصْفٍ عَلَى «فَعْلَانَا» # أَوْ أُنْثَيَيْهِ أَوْ عَلَى «فُعْلَانَا»",
    "وَمِثْلُهُ «فُعْلَانَةٌ»، وَالْزَمْهُ فِي # نَحْوِ «طَوِيلٍ، وَطَوِيلَةٍ» تَفِي",
    "وَبِـ «فُعُولٍ»: «فَعِلٌ» نَحْوُ «كَبِدْ» # يُخَصُّ غَالِباً، كَذَاكَ يَطَّرِدْ",
    "فِي «فَعْلٍ» اسْماً مُطْلَقَ الْفَا، وَ «فَعَلْ» # لَهُ، وَلِـ «الْفُعَالِ»: «فِعْلَانٌ» حَصَلْ",
    "وَشَاعَ فِي «حُوتٍ، وَقَاعٍ» مَعَ مَا # ضَاهَاهُمَا، وَقَلَّ فِي غَيْرِهِمَا",
    "وَ «فَعْلاً» اسْماً وَ «فَعِيلاً» وَ «فَعَلْ» # غَيْرَ مُعَلِّ الْعَيْنِ: «فُعْلَانٌ» شَمَلْ",
    "وَلِـ «كَرِيمٍ، وَبَخِيلٍ»: «فُعَلَا» # كَذَا لِمَا ضَاهَاهُمَا قَدْ جُعِلَا",
    "وَنَابَ عَنْهُ «أَفْعِلَاءُ» فِي الْمُعَلّْ # لَاماً وَمُضْعَفٍ، وَغَيْرُ ذَاكَ قَلّْ",
    "«فَوَاعِلٌ» لِـ «فَوْعَلٍ، وَفَاعَلِ # وَفَاعِلَاءَ»، مَعَ نَحْوِ كَاهِلِ",
    "وَحَائِضٍ، وَصَاهِلٍ، وَفَاعِلَهْ» # وَشَذَّ فِي «الْفَارِسِ» مَعْ مَا مَاثَلَهْ",
    "وَبِـ «فَعَائِلَ» اجْمَعَنْ «فَعَالَهْ» # وَشِبْهَهُ ذَا تَاءٍ اوْ مُزَالَهْ",
    "وَبِـ «الْفَعَالِي، وَالْفَعَالَى» جُمِعَا # «صَحْرَاءُ، وَالْعَذْرَاءُ»، وَالْقَيْسَ اتْبَعَا",
    "وَاجْعَلْ «فَعَالِيَّ» لِغَيْرِ ذِي نَسَبْ # جُدِّدَ كَـ «الْكُرْسِيِّ» تَتْبَعِ الْعَرَبْ",
    "وَبِـ «فَعَالِلَ» وَشِبْهِهِ انْطِقَا # فِي جَمْعِ مَا فَوْقَ الثَّلَاثَةِ ارْتَقَى",
    "مِنْ غَيْرِ مَا مَضَى، وَمِنْ خُمَاسِي # جُرِّدَ الَاخِرَ انْفِ بِالْقِيَاسِ",
    "وَالرَّابِعُ الشَّبِيهُ بِالْمَزِيدِ قَدْ # يُحْذَفُ دُونَ مَا بِهِ تَمَّ الْعَدَدْ",
    "وَزَائِدَ الْعَادِي الرُّبَاعِي احْذِفْهُ مَا # لَمْ يَكُ لَيْناً إِثْرَهُ اللَّذْ خَتَمَا",
    "وَالسِّينَ وَالتَّا مِنْ كَـ «مُسْتَدْعٍ» أَزِلْ # إِذْ بِبِنَا الْجَمْعِ بَقَاهُمَا مُخِلّْ",
    "وَالْمِيمُ أَوْلَى مِنْ سِوَاهُ بِالْبَقَا # وَالْهَمْزُ وَالْيَا مِثْلُهُ إِنْ سَبَقَا",
    "وَالْيَاءَ لَا الْوَاوَ احْذِفِ انْ جَمَعْتَ مَا # كَـ «حَيْزَبُونٍ» فَهْوَ حُكْمٌ حُتِمَا",
    "وَخَيَّرُوا فِي زَائِدَيْ «سَرَنْدَى» # وَكُلِّ مَا ضَاهَاهُ كَـ «الْعَلَنْدَى»",
  ]},
  {id:"alf-64",title:"التَّصْغِيرُ",sub:"Le diminutif",clr:["#0f1c32","#1e3660"],bayts:[
    "«فُعَيْلاً» اجْعَلِ الثُّلَاثِيَّ إِذَا # صَغَّرْتَهُ نَحْوُ «قُذَيٍّ» فِي «قَذَى»",
    "«فُعَيْعِلٌ، مَعَ فُعَيْعِيلٍ» لِمَا # فَاقَ كَجَعْلِ «دِرْهَمٍ» «دُرَيْهِمَا»",
    "وَمَا بِهِ لِمُنْتَهَى الْجَمْعِ وُصِلْ # بِهِ إِلَى أَمْثِلَةِ التَّصْغِيرِ صِلْ",
    "وَجَائِزٌ تَعْوِيضُ يَا قَبْلَ الطَّرَفْ # إِنْ كَانَ بَعْضُ الِاسْمِ فِيهِمَا انْحَذَفْ",
    "وَحَائِدٌ عَنِ الْقِيَاسِ كُلُّ مَا # خَالَفَ فِي الْبَابَيْنِ حُكْماً رُسِمَا",
    "لِتِلْوِ يَا التَّصْغِيرِ مِنْ قَبْلِ عَلَمْ # تَأْنِيثٍ اوْ مَدَّتِهِ: الْفَتْحُ انْحَتَمْ",
    "كَذَاكَ مَا مَدَّةَ «أَفْعَالٍ» سَبَقْ # أَوْ مَدَّ «سَكْرَانَ» وَمَا بِهِ الْتَحَقْ",
    "وَأَلِفُ التَّأْنِيثِ حَيْثُ مُدَّا # وَتَاؤُهُ مُنْفَصِلَيْنِ عُدَّا",
    "كَذَا الْمَزِيدُ آخِراً لِلنَّسَبِ # وَعَجُزُ الْمُضَافِ وَالْمُرَكَّبِ",
    "وَهَكَذَا زِيَادَتَا «فَعْلَانِ» # مِنْ بَعْدِ أَرْبَعٍ كَـ «زَعْفَرَانِ»",
    "وَقَدِّرِ انْفِصَالَ مَا دَلَّ عَلَى # تَثْنِيَةٍ أَوْ جَمْعِ تَصْحِيحٍ جَلَا",
    "وَأَلِفُ التَّأْنِيثِ ذُو الْقَصْرِ مَتَى # زَادَ عَلَى أَرْبَعَةٍ لَنْ يَثْبُتَا",
    "وَعِنْدَ تَصْغِيرِ «حُبَارَى» خَيِّرِ # بَيْنَ «الْحُبَيْرَى» - فَادْرِ - وَ «الْحُبَيِّرِ»",
    "وَارْدُدْ لِأَصْلٍ ثَانِياً لَيْناً قُلِبْ # فَـ «قِيمَةً» صَيِّرْ «قُوَيْمَةً» تُصِبْ",
    "وَشَذَّ فِي «عِيدٍ»: «عُيَيْدٌ»، وَحُتِمْ # لِلْجَمْعِ مِنْ ذَا مَا لِتَصْغِيرٍ عُلِمْ",
    "وَالْأَلِفُ الثَّانِي الْمَزِيدُ يُجْعَلُ # وَاواً، كَذَا مَا الْأَصْلُ فِيهِ يُجْهَلُ",
    "وَكَمِّلِ الْمَنْقُوصَ فِي التَّصْغِيرِ مَا # لَمْ يَحْوِ غَيْرَ التَّاءِ ثَالِثاً كَـ «مَا»",
    "وَمَنْ بِتَرْخِيمٍ يُصَغِّرُ اكْتَفَى # بِالْأَصْلِ كَـ «الْعُطَيْفِ» يَعْنِي «الْمَعْطِفَا»",
    "وَاخْتِمْ بِتَا التَّأْنِيثِ مَا صَغَّرْتَ مِنْ # مُؤَنَّثٍ عَارٍ ثُلَاثِيٍّ كَـ «سِنّْ»",
    "مَا لَمْ يَكُنْ بِالتَّا يُرَى ذَا لَبْسِ # كَـ «شَجَرٍ، وَبَقَرٍ، وَخَمْسِ»",
    "وَشَذَّ تَرْكٌ دُونَ لَبْسٍ، وَنَدَرْ # لَحَاقُ تَا فِيمَا ثُلَاثِيّاً كَثَرْ",
    "وَصَغَّرُوا شُذُوذاً «الَّذِي، الَّتِي # وَذَا» مَعَ الْفُرُوعِ مِنْهَا «تَا، وَتِي»",
  ]},
  {id:"alf-65",title:"النَّسَبُ",sub:"Le relatif (nisba)",clr:["#0f1232","#1e2460"],bayts:[
    "يَاءً كَيَا «الْكُرْسِيِّ» زَادُوا لِلنَّسَبْ # وَكُلُّ مَا تَلِيهِ كَسْرُهُ وَجَبْ",
    "وَمِثْلَهُ مِمَّا حَوَاهُ احْذِفْ، وَتَا # تَأْنِيثٍ اوْ مَدَّتَهُ لَا تُثْبِتَا",
    "وَإِنْ تَكُنْ تَرْبَعُ ذَا ثَانٍ سَكَنْ # فَقَلْبُهَا وَاواً وَحَذْفُهَا حَسَنْ",
    "لِشِبْهِهَا الْمُلْحِقِ وَالْأَصْلِيِّ مَا # لَهَا، وَلِلْأَصْلِيِّ قَلْبٌ يُعْتَمَى",
    "وَالْأَلِفَ الْجَائِزَ أَرْبَعاً أَزِلْ # كَذَاكَ يَا الْمَنْقُوصِ خَامِساً عُزِلْ",
    "وَالْحَذْفُ فِي الْيَا رَابِعاً أَحَقُّ مِنْ # قَلْبٍ، وَحَتْمٌ قَلْبُ ثَالِثٍ يَعِنّْ",
    "وَأَوْلِ ذَا الْقَلْبِ انْفِتَاحاً، وَ «فَعِلْ # وَفُعِلٌ» عَيْنَهُمَا افْتَحْ وَ «فِعِلْ»",
    "وَقِيلَ فِي «الْمَرْمِيِّ»: «مَرْمَوِيُّ» # وَاخْتِيرَ فِي اسْتِعْمَالِهِمْ «مَرْمِيُّ»",
    "وَنَحْوُ «حَيٍّ» فَتْحُ ثَانِيهِ يَجِبْ # وَارْدُدْهُ وَاواً إِنْ يَكُنْ عَنْهُ قُلِبْ",
    "وَعَلَمَ التَّثْنِيَةِ احْذِفْ لِلنَّسَبْ # وَمِثْلُ ذَا فِي جَمْعِ تَصْحِيحٍ وَجَبْ",
    "وَثَالِثٌ مِنْ نَحْوِ «طَيِّبٍ» حُذِفْ # وَشَذَّ «طَائِيٌّ» مَقُولاً بِالْأَلِفْ",
    "وَ «فَعَلِيٌّ» فِي «فَعِيلَةَ» الْتُزِمْ # وَ «فُعَلِيٌّ» فِي «فُعَيْلَةٍ» حُتِمْ",
    "وَأَلْحَقُوا مُعَلَّ لَامٍ عَرِيَا # مِنَ الْمِثَالَيْنِ بِمَا التَّا أُولِيَا",
    "وَتَمَّمُوا مَا كَانَ كَـ «الطَّوِيلَهْ» # وَهَكَذَا مَا كَانَ كَـ «الْجَلِيلَهْ»",
    "وَهَمْزُ ذِي مَدٍّ يُنَالُ فِي النَّسَبْ # مَا كَانَ فِي تَثْنِيَةٍ لَهُ انْتَسَبْ",
    "وَانْسُبْ لِصَدْرِ جُمْلَةٍ وَصَدْرِ مَا # رُكِّبَ مَزْجاً وَلِثَانٍ تَمَّمَا",
    "إِضَافَةً مَبْدُوءَةً بِـ «ابْنٍ، أَوَ ابْ» # أَوْ مَا لَهُ التَّعْرِيفُ بِالثَّانِي وَجَبْ",
    "فِيمَا سِوَى هَذَا انْسُبَنْ لِلْأَوَّلِ # مَا لَمْ يُخَفْ لَبْسٌ كَـ «عَبْدِ الْأَشْهَلِ»",
    "وَاجْبُرْ بِرَدِّ اللَّامِ مَا مِنْهُ حُذِفْ # جَوَازاً انْ لَمْ يَكُ رَدُّهُ أُلِفْ",
    "فِي جَمْعَيِ التَّصْحِيحِ أَوْ فِي التَّثْنِيَهْ # وَحَقُّ مَجْبُورٍ بِهَذِي تَوْفِيَهْ",
    "وَبِـ «أَخٍ»: «أُخْتاً»، وَ «بِابْنٍ»: «بِنْتَا» # أَلْحِقْ، وَيُونُسٌ أَبَى حَذْفَ التَّا",
    "وَضَاعِفِ الثَّانِيَ مِنْ ثُنَائِي # ثَانِيهِ ذُو لِينٍ كَـ «لَا، وَلَائِي»",
    "وَإِنْ يَكُنْ كَـ «شِيَةٍ» مَا الْفَا عَدِمْ # فَجَبْرُهُ وَفَتْحُ عَيْنِهِ الْتُزِمْ",
    "وَالْوَاحِدَ اذْكُرْ نَاسِباً لِلْجَمْعِ # إِنْ لَمْ يُشَابِهْ وَاحِداً بِالْوَضْعِ",
    "وَمَعَ «فَاعِلٍ، وَفَعَّالٍ، فَعِلْ» # فِي نَسَبٍ أَغْنَى عَنِ الْيَا فَقُبِلْ",
    "وَغَيْرُ مَا أَسْلَفْتُهُ مُقَرَّرَا # عَلَى الَّذِي يُنْقَلُ مِنْهُ اقْتُصِرَا",
  ]},
  {id:"alf-66",title:"الْوَقْفُ",sub:"La pause (waqf)",clr:["#0f1a32","#1e3260"],bayts:[
    "تَنْوِيناً اثْرَ فَتْحٍ اجْعَلْ أَلِفَا # وَقْفاً، وَتِلْوَ غَيْرِ فَتْحٍ احْذِفَا",
    "وَاحْذِفْ لِوَقْفٍ فِي سِوَى اضْطِرَارِ # صِلَةَ غَيْرِ الْفَتْحِ فِي الْإِضْمَارِ",
    "وَأَشْبَهَتْ «إِذاً» مُنَوَّناً نُصِبْ # فَأَلِفاً فِي الْوَقْفِ نُونُهَا قُلِبْ",
    "وَحَذْفُ يَا الْمَنْقُوصِ ذِي التَّنْوِينِ - مَا # لَمْ يُنْصَبَ - اوْلَى مِنْ ثُبُوتٍ، فَاعْلَمَا",
    "وَغَيْرُ ذِي التَّنْوِينِ بِالْعَكْسِ، وَفِي # نَحْوِ «مُرٍ» لُزُومُ رَدِّ الْيَا اقْتُفِي",
    "وَغَيْرَ هَا التَّأْنِيثِ مِنْ مُحَرَّكِ # سَكِّنْهُ، أَوْ قِفْ رَائِمَ التَّحَرُّكِ",
    "أَوْ أَشْمِمِ الضَّمَّةَ، أَوْ قِفْ مُضْعِفَا # مَا لَيْسَ هَمْزاً أَوْ عَلِيلاً إِنْ قَفَا",
    "مُحَرَّكاً، أَوْ حَرَكَاتٍ انْقُلَا # لِسَاكِنٍ تَحْرِيكُهُ لَنْ يُحْظَلَا",
    "وَنَقْلُ فَتْحٍ مِنْ سِوَى الْمَهْمُوزِ لَا # يَرَاهُ بَصْرِيٌّ، وَكُوفٍ نَقَلَا",
    "وَالنَّقْلُ إِنْ يُعْدَمْ نَظِيرٌ مُمْتَنِعْ # وَذَاكَ فِي الْمَهْمُوزِ لَيْسَ يَمْتَنِعْ",
    "فِي الْوَقْفِ تَا تَأْنِيثِ الِاسْمِ هَا جُعِلْ # إِنْ لَمْ يَكُنْ بِسَاكِنٍ صَحَّ وُصِلْ",
    "وَقَلَّ ذَا فِي جَمْعِ تَصْحِيحٍ وَمَا # ضَاهَى، وَغَيْرُ ذَيْنِ بِالْعَكْسِ انْتَمَى",
    "وَقِفْ بِهَا السَّكْتِ عَلَى الْفِعْلِ الْمُعَلّْ # بِحَذْفِ آخِرٍ كَـ «أَعْطِ مَنْ سَأَلْ»",
    "وَلَيْسَ حَتْماً فِي سِوَى مَا كَـ «عِ» أَوْ # كَـ «يَعِ» مَجْزُوماً، فَرَاعِ مَا رَعَوْا",
    "وَ «مَا» فِي الِاسْتِفْهَامِ إِنْ جُرَّتْ حُذِفْ # أَلِفُهَا، وَأَوْلِهَا الْهَا إِنْ تَقِفْ",
    "وَلَيْسَ حَتْماً فِي سِوَى مَا انْخَفَضَا # بِاسْمٍ كَقَوْلِكَ: «اقْتِضَاءَ مَ اقْتَضَى؟»",
    "وَوَصْلَ ذِي الْهَاءِ أَجِزْ بِكُلِّ مَا # حُرِّكَ تَحْرِيكَ بِنَاءٍ لَزِمَا",
    "وَوَصْلُهَا بِغَيْرِ تَحْرِيكِ بِنَا # أُدِيمَ: شَذَّ، فِي الْمُدَامِ اسْتُحْسِنَا",
    "وَرُبَّمَا أُعْطِيَ لَفْظُ الْوَصْلِ مَا # لِلْوَقْفِ نَثْراً، وَفَشَا مُنْتَظِمَا",
  ]},
  {id:"alf-67",title:"الْإِمَالَةُ",sub:"L'inclinaison vocalique (imâla)",clr:["#140f32","#271e60"],bayts:[
    "الْأَلِفَ الْمُبْدَلَ مِنْ يَا فِي طَرَفْ # أَمِلْ، كَذَا الْوَاقِعُ مِنْهُ الْيَا خَلَفْ",
    "دُونَ مَزِيدٍ أَوْ شُذُوذٍ، وَلِمَا # تَلِيهِ هَا التَّأْنِيثِ مَا الْهَا عَدِمَا",
    "وَهَكَذَا بَدَلُ عَيْنِ الْفِعْلِ إِنْ # يَؤُلْ إِلَى «فِلْتُ» كَمَاضِي «خَفْ، وَدِنْ»",
    "كَذَاكَ تَالِي الْيَاءِ، وَالْفَصْلُ اغْتُفِرْ # بِحَرْفٍ، اوْ مَعَ هَا كَـ «جَيْبَهَا أَدِرْ»",
    "كَذَاكَ مَا يَلِيهِ كَسْرٌ، أَوْ يَلِي # تَالِيَ كَسْرٍ، أَوْ سُكُونٍ قَدْ وَلِي",
    "كَسْراً، وَفَصْلُ الْهَا كَلَا فَصْلٍ يُعَدّْ # فَـ «دِرْهَمَاكَ» مَنْ يُمِلْهُ لَمْ يُصَدّْ",
    "وَحَرْفُ الِاسْتِعْلَا يَكُفُّ مُظْهَرَا # مِنْ كَسْرٍ اوْ يَا، وَكَذَا تَكُفُّ رَا",
    "إِنْ كَانَ مَا يَكُفُّ بَعْدُ مُتَّصِلْ # أَوْ بَعْدَ حَرْفٍ، أَوْ بِحَرْفَيْنِ فُصِلْ",
    "كَذَا إِذَا قُدِّمَ مَا لَمْ يَنْكَسِرْ # أَوْ يَسْكُنِ اثْرَ الْكَسْرِ كَـ «الْمِطْوَاعَ مِرْ»",
    "وَكَفُّ مُسْتَعْلٍ وَرَا يَنْكَفُّ # بِكَسْرِ رَا كَـ «غَارِماً لَا أَجْفُو»",
    "وَلَا تُمِلْ لِسَبَبٍ لَمْ يَتَّصِلْ # وَالْكَفُّ قَدْ يُوجِبُهُ مَا يَنْفَصِلْ",
    "وَقَدْ أَمَالُوا لِتَنَاسُبٍ بِلَا # دَاعٍ سِوَاهُ كَـ «عِمَادَا، وَتَلَا»",
    "وَلَا تُمِلْ مَا لَمْ يَنَلْ تَمَكُّنَا # دُونَ سَمَاعٍ غَيْرَ «هَا» وَغَيْرَ «نَا»",
    "وَالْفَتْحَ قَبْلَ كَسْرِ رَاءٍ فِي طَرَفْ # أَمِلْ كَـ «لِلْأَيْسَرِ مِلْ تُكْفَ الْكُلَفْ»",
    "كَذَا الَّذِي تَلِيهِ هَا التَّأْنِيثِ فِي # وَقْفٍ إِذَا مَا كَانَ غَيْرَ أَلِفِ",
  ]},
  {id:"alf-68",title:"التَّصْرِيفُ",sub:"La morphologie (sarf)",clr:["#0f2132","#1e3f60"],bayts:[
    "حَرْفٌ وَشِبْهُهُ مِنَ الصَّرْفِ بَرِي # وَمَا سِوَاهُمَا بِتَصْرِيفٍ حَرِي",
    "وَلَيْسَ أَدْنَى مِنْ ثُلَاثِيٍّ يُرَى # قَابِلَ تَصْرِيفٍ، سِوَى مَا غُيِّرَا",
    "وَمُنْتَهَى اسْمٍ خَمْسٌ انْ تَجَرَّدَا # وَإِنْ يُزَدْ فِيهِ فَمَا سَبْعاً عَدَا",
    "وَغَيْرَ آخِرِ الثُّلَاثِي افْتَحْ وَضُمّْ # وَاكْسِرْ، وَزِدْ تَسْكِينَ ثَانِيهِ تَعُمّْ",
    "وَ «فِعُلٌ» أُهْمِلَ، وَالْعَكْسُ يَقِلّْ # لِقَصْدِهِمْ تَخْصِيصَ فِعْلٍ بِـ «فُعِلْ»",
    "وَافْتَحْ وَضُمَّ وَاكْسِرِ الثَّانِيَ مِنْ # فِعْلٍ ثُلَاثِيٍّ، وَزِدْ نَحْوَ «ضُمِنْ»",
    "وَمُنْتَهَاهُ أَرْبَعٌ إِنْ جُرِّدَا # وَإِنْ يُزَدْ فِيهِ فَمَا سِتّاً عَدَا",
    "لِاسْمٍ مُجَرَّدٍ رُبَاعٍ «فَعْلَلُ # وَفِعْلِلٌ، وَفِعْلَلٌ، وَفُعْلُلُ",
    "وَمَعْ فِعَلٍّ، فُعْلَلٌ»، وَإِنْ عَلَا # فَمَعْ «فَعَلَّلٍ» حَوَى «فَعْلَلِلَا",
    "كَذَا فُعَلِّلٌ، وَفِعْلَلٌّ»، وَمَا # غَايَرَ لِلزَّيْدِ أَوِ النَّقْصِ انْتَمَى",
    "وَالْحَرْفُ إِنْ يَلْزَمْ فَأَصْلٌ، وَالَّذِي # لَا يَلْزَمُ الزَّائِدُ مِثْلُ تَا «احْتُذِي»",
    "بِضِمْنِ «فِعْلٍ» قَابِلِ الْأُصُولَ فِي # وَزْنٍ، وَزَائِدٌ بِلَفْظِهِ اكْتُفِي",
    "وَضَاعِفِ اللَّامَ إِذَا أَصْلٌ بَقِي # كَرَاءِ «جَعْفَرٍ»، وَقَافِ «فُسْتُقِ»",
    "وَإِنْ يَكُ الزَّائِدُ ضِعْفَ أَصْلِ # فَاجْعَلْ لَهُ فِي الْوَزْنِ مَا لِلْأَصْلِ",
    "وَاحْكُمْ بِتَأْصِيلِ حُرُوفِ «سِمْسِمِ» # وَنَحْوِهِ، وَالْخُلْفُ فِي كَـ «لَمْلِمِ»",
    "فَأَلِفٌ أَكْثَرَ مِنْ أَصْلَيْنِ # صَاحَبَ: زَائِدٌ بِغَيْرِ مَيْنِ",
    "وَالْيَا كَذَا وَالْوَاوُ إِنْ لَمْ يَقَعَا # كَمَا هُمَا فِي «يُؤْيُؤٍ، وَوَعْوَعَا»",
    "وَهَكَذَا هَمْزٌ وَمِيمٌ سَبَقَا # ثَلَاثَةً تَأْصِيلُهَا تَحَقَّقَا",
    "كَذَاكَ هَمْزٌ آخِرٌ بَعْدَ أَلِفْ # أَكْثَرَ مِنْ حَرْفَيْنِ لَفْظُهَا رَدِفْ",
    "وَالنُّونُ فِي الْآخِرِ كَالْهَمْزِ، وَفِي # نَحْوِ «غَضَنْفَرٍ» أَصَالَةً كُفِي",
    "وَالتَّاءُ فِي التَّأْنِيثِ وَالْمُضَارَعَهْ # وَنَحْوِ الِاسْتِفْعَالِ وَالْمُطَاوَعَهْ",
    "وَالْهَاءُ وَقْفاً كَـ «لِمَهْ؟ وَلَمْ تَرَهْ» # وَاللَّامُ فِي الْإِشَارَةِ الْمُشْتَهِرَهْ",
    "وَامْنَعْ زِيَادَةً بِلَا قَيْدٍ ثَبَتْ # إِنْ لَمْ تُبَيَّنْ حُجَّةٌ كَـ «حَظِلَتْ»",
  ]},
  {id:"alf-69",title:"فَصْلٌ فِي زِيَادَةِ هَمْزَةِ الْوَصْلِ",sub:"La hamza de liaison",clr:["#180f32","#2f1e60"],bayts:[
    "لِلْوَصْلِ هَمْزٌ سَابِقٌ لَا يَثْبُتُ # إِلَّا إِذَا ابْتُدِي بِهِ كَـ «اسْتَثْبِتُوا»",
    "وَهْوَ لِفِعْلٍ مَاضٍ احْتَوَى عَلَى # أَكْثَرَ مِنْ أَرْبَعَةٍ نَحْوُ «انْجَلَى»",
    "وَالْأَمْرِ وَالْمَصْدَرِ مِنْهُ، وَكَذَا # أَمْرُ الثُّلَاثِيْ كَـ «اخْشَ، وَامْضِ، وَانْفُذَا»",
    "وَفِي «اسْمٍ، اسْتٍ، ابْنٍ، ابْنِمٍ» سُمِعْ # وَ «اثْنَيْنِ، وَامْرِئٍ»، وَتَأْنِيثٌ تَبِعْ",
    "وَ «ايْمُنُ»، هَمْزُ «أَلْ» كَذَا، وَيُبْدَلُ # مَدّاً فِي الِاسْتِفْهَامِ أَوْ يُسَهَّلُ",
  ]},
  {id:"alf-70",title:"الْإِبْدَالُ",sub:"La substitution (ibdâl)",clr:["#0f1632","#1e2b60"],bayts:[
    "أَحْرُفُ الِابْدَالِ: «هَدَأْتَ مُوطِيَا» # فَأَبْدِلِ الْهَمْزَةَ مِنْ وَاوٍ وَيَا",
    "آخِراً اثْرَ أَلِفٍ زِيدَ، وَفِي # فَاعِلِ مَا أُعِلَّ عَيْناً ذَا اقْتُفِي",
    "وَالْمَدُّ زِيدَ ثَالِثاً فِي الْوَاحِدِ # هَمْزاً يُرَى فِي مِثْلِ كَـ «الْقَلَائِدِ»",
    "كَذَاكَ ثَانِي لَيِّنَيْنِ اكْتَنَفَا # مَدَّ «مَفَاعِلَ» كَجَمْعٍ «نَيِّفَا»",
    "وَافْتَحْ وَرُدَّ الْهَمْزَ يَا فِيمَا أُعِلّْ # لَاماً، وَفِي مِثْلِ «هِرَاوَةٍ» جُعِلْ",
    "وَاواً، وَهَمْزاً أَوَّلَ الْوَاوَيْنِ رُدّْ # فِي بَدْءِ غَيْرِ شِبْهِ «وُوفِيَ الْأَشُدّْ»",
    "وَمَدّاً ابْدِلْ ثَانِيَ الْهَمْزَيْنِ مِنْ # كِلْمَةٍ انْ يَسْكُنْ كَـ «آثِرْ، وَائْتَمِنْ»",

    "وَهَكَذَا الْجَمْعُ الصَّحِيحُ فَاعْرِفِ # وَرَفْعُ مَا ثَنَّيْتَهُ بِالْأَلِفِ",
    "وَارْفَع  بِنُونٍ يَفْعَلاَنِ يَفْعَلُونَ # وَتَفْعَلَانِ تَفْعَلِينَ تَفْعَلُونْ",
  ]},
  {id:"ajr-05",title:"بَابُ عَلَامَاتِ النَّصْبِ",sub:"Les marques du nasb",clr:["#122c34","#235565"],bayts:[
    "عَلَامَةَ النَّصْبِ لَهَا كُنْ مُحْصِيَا # الْفَتْحَ وَالْأَلِفَ وَالْكَسْرَ وَيَا",
    "وَحَذَفَ نُونٍ فَالَّذِي الفَتْحُ بِهِ # عَلَامَةٌ يَا ذَا النُّهَى لِنَصْبِهِ",
    "مُكَسَّرُ الْجُمُوعِ ثُمَّ الْمُفْرَدُ # ثُمَّ الْمُضَارِعُ الَّذِي كَتَسْعَدُ",
    "بِالْأَلِفِ الْخَمْسَةَ نَصْبَهَا الْتَزِمْ # وَانْصِبْ بِكَسْرِ جَمْعَ تَأْنِيتُ سَلِمْ",
    "وَاعْلَمْ بِأَنَّ الْجَمْعَ وَالْمُثَنَّى # نَصْبُهُمَا بِاليَاءِ حَيْثُ عَنَّا",
    "وَخَمْسَةُ الْأَفْعَالِ نَصْبُهَا ثَبَتْ # بِحَذْفِ نُونِهَا إِذَا مَا نُصِبَتْ",
  ]},
  {id:"ajr-06",title:"بَابُ عَلَامَاتِ الخَفْضِ",sub:"Les marques du khafd",clr:["#122a34","#235265"],bayts:[
    "عَلَامَةُ الْخَفْضِ الَّتِي بِهَا يَفِي # كَسْرٌ وَيَاءٌ ثُمَّ فَتْحٌ فَاعْرِفِ",
    "فَالْخَفضُ بِالْكَسْرِ لِمُفْرَدٍ وَفَى # وَجَمْعِ تَكْسِيرٍ إِذَا مَا انْصَرَفَا",
    "وَجَمْعِ تَأْنِيثِ سَلِيمِ الْمَبْنَى # وَاخْفِضْ بِيَاءِ يَا أَخِي المُثَنَّى",
    "وَاخْفِضْ بِفَتْحِ كُلَّ مَا لَا يَنْصَرِفْ # وَالْجَمْعَ وَالْخَمْسَةَ فَاعْرِفْ وَاعْتَرِفْ",
  ]},
  {id:"ajr-07",title:"بَابُ عَلَامَاتِ الجَزْمِ",sub:"Les marques du jazm",clr:["#123134","#236065"],bayts:[
    "إِنَّ السُّكَونَ يَا ذَوِي الْأَدْهَانِ # وَالْحَذْفَ لِلْجَزْمِ عَلَامَتَانِ",
    "فَاجْزِمْ بِتَسْكِينِ مُضَارِعًا أَتَى # صَحِيحَ الْآخِرِ كَلَمْ يَقُمْ فَتَى",
    "وَاجْزِمْ بِحَذْفَ مَا اكْتَسَى اعْتِلالَا # آخِرُهُ وَالخَمْسَةَ الأَفْعَالَالاً",
  ]},
  {id:"ajr-08",title:"بَابُ الأَفْعَالِ",sub:"Les verbes",clr:["#122434","#234765"],bayts:[
    "وَهْيَ ثَلَاثَةٌ : مُضِي قَدْ خَلاَ # وَفِعْلُ أَمْرٍ وَمُضَارِعٌ تَلاَ",
    "فَالْمَاضِي مَفْتُوحُ الْأَخِيرِ أَبَدًا # وَالْأَمْرُ بِالْجَزْمِ لَدَى البَعْضِ ارْتَدَى",
    "ثُمَّ الْمُضَارِعُ الَّذِي فِي صَدْرِهِ # إِحْدَى زَوَائِدِ أَنَيْتُ فَادْرِهِ",
    "وَحُكْمُهُ الرَّفْعُ إِذَا يُجَرَّدُ # مِنْ نَاصِبٍ وَجَازِمٍ كَتَسْعَدُ",
  ]},
  {id:"ajr-09",title:"بَابُ النَّوَاصِب",sub:"Particules régissant le nasb du verbe",clr:["#123431","#236560"],bayts:[
    "وَنَصْبُهُ بِأَنْ وَلَنْ إِذَا وَكَيْ # وَلَامِ كَيْ لَامِ الجُحُودِ يَا أَخَيْ",
    "كَذَاكَ حَتَّى وَالْجَوَابُ بِالْفَا # وَالْوَاوِ ثُمَّ أَوْ رُزِقْتَ النُّطْفَا",
  ]},
  {id:"ajr-10",title:"بَابُ الجَوَازِمِ",sub:"Particules régissant le jazm",clr:["#122c34","#235565"],bayts:[
    "وَجَزْمُهُ إِذَا أَرَدْتَ الْجَزْمَا # بِلَمْ وَلَمَّا وَأَلَمْ أَلَمَّا",
    "وَلاَمِ الْأَمْرِ وَالدُّعَاءِ ثُمَّ لَا # فِي النَّهْيِ وَالدُّعَاءِ نِلْتَ الأَمَلاَ",
    "وَإِنْ وَمَا وَمَنْ وَأَنَّى مَهْمَا # أَيِّ مَتَى أَيَّانَ أَيْنَ إِذْمَا",
    "وَحَيْثُمَا وَكَيْفَمَا ثُمَّ إِذَا # فِي الشَّعْرِ لَا فِي النَّثْرِ فَادْرِ المَأْخَذَا",
  ]},
  {id:"ajr-11",title:"بَابُ الفاعل",sub:"Le sujet (fâ'il)",clr:["#122a34","#235265"],bayts:[
    "الفَاعِلَ ارْفَعْ وَهُوَ مَا قَدْ أُسْنِدَا # إِلَيْهِ فِعْلٌ قَبْلَهُ قَدْ وُجِدًا",
    "وَظَاهِرًا يَأْتِي وَيَأْتِي مُضْمَرَا # كَاصْطَادَ زَيْدٌ وَاشْتَرَيْتُ أَعْفَرَا",
  ]},
  {id:"ajr-12",title:"بَابُ المَفْعُولِ الَّذِي لَمْ يُسَمَّ فَاعِلُهُ",sub:"Le substitut du sujet (passif)",clr:["#123134","#236065"],bayts:[
    "إِذَا حَذَفْتَ فِي الْكَلَامِ فَاعِلاً # مُخْتَصِرًا أَوْ مُبْهِما أَوْ جَاهِلاَ",
    "فَأَوْجِبِ التَّأْخِيرَ لِلْمَفْعُولِ بِهِ # وَالرَّفْعَ حَيْثُ نَابَ عَنْهُ فَانْتَبِهْ",
    "فَأَوَّلَ الْفِعْلِ اضْمُمَنْ وَكَسْرُ مَا # قُبَيْلَ آخِرِ الْمُضِيِّ حُتِمَا",
    "وَمَا قُبَيْلَ آخِرِ الْمُضَارِعِ # يَجِبُ فَتْحُهُ بِلاَ مُنَازِعِ",
    "وَظَاهِرًا وَمُصْمَرًا أَيْضًا ثَبَتْ # كَأُكْرِمَتْ هِنْدٌ وَهِنْدٌ ضُرِبَتْ",
  ]},
  {id:"ajr-13",title:"بَابُ المُبْتَدَا وَالخَبَر",sub:"Le mubtada et le khabar",clr:["#122434","#234765"],bayts:[
    "الْمُبْتَدَا اسْمٌ مِنْ عَوَامِلَ سَلِمْ # لَفْظِيَّةٍ وَهُوَ بِرَفْعِ قَدْ وَسِمْ",
    "وَظَاهِرًا يَأْتِي وَيَأْتِي مُضْمَرًا # كَالْقَوْلُ يُسْتَقْبَحُ وَهُوَ مُفْتَرَى",
    "وَالْخَبَرُ الْجُزْءُ الَّذِي قَدْ أُسْنِدَا # إِلَيْهِ وَارْتِفَاعَهُ الْزَمْ أَبَدًا",
    "وَمُفْرَدًا يَأْتِي وَغَيْرَ مُفْرَدٍ # فَأَوَّلُ نَحْوُ سَعِيدٌ مُهْتَدِي",
    "وَالثَّانِ قُلْ: أَرْبَعَةٌ مَجْرُورُ # نَحْوُ الْعُقُوبَةُ لِمَنْ يَجُورُ",
    "وَالطَّرْفُ نَحْوُ الْخَيْرُ عِنْدَ أَهْلِنَا # وَالْفِعْلُ مَعْ فَاعِلِهِ كَقَوْلِنَا",
    "زيدٌ أَتَى وَالْمُبْتَدَا مَعَ الْخَبَرْ # كَقَوْلِهِمْ: زَيدٌ أَبُوهُ ذُو بَطَرْ",
  ]},
  {id:"ajr-14",title:"بَابُ كَانَ وَأَخَوَاتِهَا",sub:"Kâna et ses sœurs",clr:["#123431","#236560"],bayts:[
    "وَرَفْعُكَ الاِسْمَ وَنَصْبُكَ الخَبَرْ # بِهَذِهِ الْأَفْعَالِ حُكْمٌ مُعْتَبَرْ",
    "كَانَ وَظَلَّ بَاتَ أَضْحَى أَصْبَحَا # أَمْسَى وَصَارَ لَيْسَ مَعْ مَا بَرِحَا",
    "مَا زَالَ مَا انْفَكَّ وَمَا فَتِئَ مَا # دَامَ وَمَا مِنْهَا تَصَرَّفَ احْكُمَا",
    "لَهُ بِمَا لَهَا كَكَانَ قَائِمَا # زَيدٌ وَكُنْ بَرًّا وَأَصْبِحْ صَائِمَا",
  ]},
  {id:"ajr-15",title:"بَابُ إِنَّ وَأَخَوَاتِهَا",sub:"Inna et ses sœurs",clr:["#122c34","#235565"],bayts:[
    "عَمَلُ كَانَ عَكْسُهُ لِإِنَّ أَنَّ # لَكِنَّ لَيْتَ وَلَعَلَّ وَكَأَنْ",
    "تَقُولُ: إِنَّ مَالِكًا لَعَالِمُ # وَمِثْلُهُ لَيْتَ الْحَبِيبَ قَادِمُ",
    "أَكِدْ بِإِنَّ أَنَّ شَبِّهُ بِكَأَنْ # لَكِنَّ يَا صَاحِ لِلاِسْتِدْرَاكِ عَنْ",
    "وَلِلتَّمَنِّي لَيْتَ عِنْدَهُمْ حَصَلَ # وَلِلتَّرَبِّي وَالتَّوَقُعِ لَعَلْ",
  ]},
  {id:"ajr-16",title:"بَابُ ظَنَّ وَأَخَوَاتِهَا",sub:"Zhanna et ses sœurs",clr:["#122a34","#235265"],bayts:[
    "انْصِبْ بِأَفْعَالِ الْقُلُوبِ مُبْتَدَا # وَخَبَرًا وَهْيَ ظَنَنْتُ وَجَدَا",
    "رَأَى حَسِبْتُ وَجَعَلْتُ زَعَمَا # كَذَاكَ خِلْتُ وَاتَّخَذْتُ عَلِمَا",
    "تَقُولُ: قَدْ ظَنَنْتُ زَيْدًا صَادِقًا # فِي قَوْلِهِ وَخِلْتُ عَمْرًا حَاذِقًا",
  ]},
  {id:"ajr-17",title:"بَابُ النَّعْتِ",sub:"L'épithète",clr:["#123134","#236065"],bayts:[
    "النَّعْتُ قَدْ قَالَ ذَوُو الْأَلْبَابِ # يَتْبَعُ لِلْمَنْعُوتِ فِي الْإِعْرَابِ",
    "كَذَاكَ فِي التَّعْرِيفِ والتَّنْكِيرِ # كَجَاءَ زَيدٌ صَاحِبُ الْأَمِيرِ",
  ]},
  {id:"ajr-18",title:"بَابُ المَعْرِفَةِ وَالنَّكِرَةِ",sub:"Le défini et l'indéfini",clr:["#122434","#234765"],bayts:[
    "اعْلَمْ هُدِيتَ الرُّشْدَ أَنَّ الْمَعْرِفَهُ # خَمْسَةُ أَشْيَا عِنْدَ أَهْلِ الْمَعْرِفَهْ",
    "وَهْيَ الضَّمِيرُ ثُمَّ الاِسْمُ الْعَلَمُ # وَذُو الْأَدَاةِ ثُمَّ الاِسْمُ الْمُبْهَمُ",
    "وَمَا إِلَى أَحَدٍ هَذِي الأَرْبَعَهُ # أُضِيفَ فَافْهَمِ الْمِثَالَ وَاتْبَعَهُ",
    "نَحْوُ أَنَا وَهِنْدُ وَالْغُلامُ # وَذَاكَ وَابْنِي عَمَّنَا إِنْعَامُ",
    "وَإِنْ تَرَ اسْمًا شَائِعًا فِي جِنْسِهِ # وَلَمْ يُعَيِّنْ وَاحِدًا فِي نَفْسِهِ",
    "فَهْوَ الْمُنَكَرُ وَمَهْمَا تُرِدِ # تَقْرِيبَ حَدِّهِ لِفَهْمِ الْمُبْتَدِي",
    "فَكُلُّ مَا لِأَلِف وَاللاَّمِ # يَصْلُحُ كَالْفَرَسِ وَالْغُلَامِ",
  ]},
  {id:"ajr-19",title:"بَابُ العَطف",sub:"La coordination",clr:["#123431","#236560"],bayts:[
    "هَذَا وَإِنَّ الْعَطْفَ أَيْضًا تَابِعُ # حُرُوفُهُ عَشَرَةٌ يَا سَامِعُ",
    "الْوَاوُ وَالْفَا ثُمَّ أَوْ إِمَّا وَبَلْ # لَكِنْ وَحَتَّى لَا وَأَمْ فَاجْهَدْ تَنَلْ",
    "كَجَاءَ زَيدٌ وَمُحَمَّدٌ # وَقَدْ سَقَيْتُ عَمْرًا أَوْ سَعِيدًا مِنْ ثَمَدْ",
    "وَقَوْلُ عَامِرٍ وَخَالِدٍ سَدَدْ # وَمَنْ يَتُبْ وَيَسْتَقِمْ يَلْقَ الرَّشَدْ",
  ]},
  {id:"ajr-20",title:"بَابُ التَّوْكِيدِ",sub:"Le renforcement",clr:["#122c34","#235565"],bayts:[
    "وَيَتْبَعُ الْمُؤَكَّدَ التَّوْكِيدُ فِي # رَفْعٍ وَنَصْبَ ثُمَّ خَفْضٍ فَاعْرِفِ",
    "كَذَاكَ فِي التَّعْرِيفِ فَاقْفُ الْأَثَرَا # وَهَذِهِ أَلْفَاظُهُ كَمَا تَرَى",
    "النَّفْسُ وَالْعَيْنُ وَكُلٌّ أَجْمَعُ # وَمَا لِأَجْمَعَ لَدَيْهِمْ يَتْبَعُ",
    "كَجَاءَ زَيدٌ نَفْسُهُ يَصُولُ # وَإِنَّ قَوْمِي كُلَّهُمْ عُدُولُ",
    "وَمَرَّ ذَا بِالْقَوْمِ أَجْمَعِينَا # فَاحْفَظْ مِثَالاً حَسَنًا مُبِينًا",
  ]},
  {id:"ajr-21",title:"بَابُ البَدَل",sub:"L'apposition",clr:["#122a34","#235265"],bayts:[
    "إِذَا اسْمُ ابْدِلَ مِنِ اسْمٍ يُنْحَلُ # إِعْرَابَهُ وَالْفِعْلُ أَيْضًا يُبْدَلُ",
    "أَقْسَامُهُ أَرْبَعَةٌ فَإِنْ تُرِدْ # إِحْصَاءَهَا فَاسْمَعْ لِقَوْلِي تَسْتَفِدْ",
    "فَبَدَلُ الشَّيْءِ مِنَ الشَّيْءِ كَجَا # زَيدٌ أَخُوكَ ذَا سُرُورٍ بَهِجَا",
    "وَبَدَلُ الْبَعْضِ مِنَ الْكُلِّ كَمَنْ # يَأْكُلْ رَغِيْفًا نِصْفَهُ يُعْطِ الثَّمَنْ",
    "وَبَدَلُ الاشْتِمَالِ نَحْوُ رَاقَنِي # مُحَمَّدٌ جَمَالُهُ فَشَاقَنِي",
    "وَبَدَلُ الْغَلَطِ نَحْوُ قَدْ رَكِبْ # زَيدٌ حِمَارًا فَرَسًا يَبْغِي اللَّعِبْ",
  ]},
  {id:"ajr-22",title:"بَابُ المَفْعُولِ بِهِ",sub:"Le complément d'objet",clr:["#123134","#236065"],bayts:[
    "مَهْمَا تَرَ اسْمًا وَقَعَ الْفِعْلُ بِهِ # فَذَاكَ مَفْعُولٌ فَقُلْ بِنَصْبِهِ",
    "كَمِثْلِ زُرْتُ الْعَالِمَ الْأَدِيبَا # وَقَدْ رَكِبْتُ الْفَرَسَ النَّجِيبَا",
    "وَظَاهِرًا يَأْتِي وَيَأْتِي مُضْمَرًا # فَأَوَّلٌ: مِثَالُهُ مَا ذُكِرَا",
    "كَزَارَنِي أَخِي وَإِيَّاهُ أَصِلْ # وَالثَّانِ: قُلْ مُتَّصِلٌ وَمُنْفَصِلْ",
  ]},

    "أَقَلُّ مَا مِنْهُ الْكَلَامَ رَكَّبُوا # اسْمَانِ أَوِ اسْمٌ وَ فِعْلٌ كَارْكَبُوا",
    "كَذَاكَ مِنْ فِعْلٍ وَحَرْفٍ وُجِدَا # وَجَاءَ مِنْ إِسْمٍ وَحَرْفٍ فِي النِّشدَا",
    "وَ قُسِّمَ الْكَلَامُ للِأَخْبَارِ # وَالأَمْرِ وَ النَّهْيِ وَ الاسْتِخْبَارِ",
    "ثُمَّ الْكَلَامُ ثَانِيًا قَدِ انْقَسَمْ # إلَى تَمَنٍّ وَ لِعَرْضٍ وقَسَمْ",
    "وَ ثَالِثًا إِلَى مَجَازٍ وإلَى # حَقِيقَةٍ وَحَدُّهَا مَا اسْتُعْمِلَا",
    "مِنْ ذَاكَ فِي مَوْضُوعِهِ وَقِيلَ مَا # يَجْرِي خِطَابًا فِي اصْطِلَاحٍ قَدُمَا",
    "أَقْسَامُهَا ثَلاثَةٌ شَرْعِيُّ # وَاللُّغَويُّ الْوَضْعِ وَ الْعُرْفيُّ",
    "ثُمَّ الْمَجَازُ مَا بِهِ تُجُوِّزَا # فِي اللَّفْظِ عَنْ مَوْضُوعِهِ تَجَوُّزَا",
    "بِنَقْصٍ اوْ زِيَادَةٍ أَوْ نَقْلِ # أَوِاسْتِعَارَةٍ كَنَقْص أَهْلِ",
    "وَ هْوَ الْمُرَادُ فِي سُؤَالِ القَرْيَهْ # كَمَا أَتَى فِي الذِّكْرِ دُونَ مِرْيَهْ",
    "وَكَازْدِيَادِ الكَافِ فِي \"كَمِثْلِِهِ\" # وَالغَائِطِ الْمَنْقُوْلِ عَنْ مَحَلِّهِ",
    "رَابِعُهَا كَقَولِهِ تَعَالَى: # \"يُرِيدُ أَنْ يَنْْقَضَ\" يَعْنِي مَالَا",
  ]},
  {id:"wrq-05",title:"بَابُ الأَمْرِ",sub:"L'ordre (al-amr)",clr:["#382f13","#695825"],bayts:[
    "وَحَدُّه استِدعَاء فِعْلٍ وَاجِبِ # بِالقَولِ مِمَّنْ كَانَ دُونَ الطَّالِبِ",
    "بِصِيغَةِ افْعَلْ فَالوُجُوبُ حُقِّقَا # حَيثُ القَرِبنَةُ انتَفَتْ وَأُطْلِقَا",
    "لَامَعْ دَلِيلٍ دَلَّنَا شَرْعًا عَلَى # إِبَاحَةٍ فِي الفِعْلِ أَوْ نَدْبٍ فَلَا",
    "بَلْ صَرْفُهُ عَنِ الوُجُوبِ حُتِمَا # بِحَمْلِهِ عَلَى الْمُرَادِ مِنْهُمَا",
    "وَلمَ ْ يُفِدْ فَورًا وَلَا تَكْرَارَا # إِنْ لمَّ ْيَرِدْ مَا يَقْتَضِي التَّكْرَارَا",
    "وَالأَمْرُ بِالفِعْلِ الْمُهِمِّ الْمُنْحَتِمْ # أَمْرٌ بِهِ وَ بِالَّذِي بِهِ يَتِمْ",
    "كَالأَمْرِ بِالصَّلَاةِ أَمْرٌ بِالوُضُو # وَ كُلِّ شَيءٍ لِلصَّلَاةِ يُفْرَضُ",
    "وَحَيثُمَا إِنْ جِيءَ بِالْمَطْلُوبِ # يَخْرُجْ بِهِ عَنْ عُهْدَةِ الوُجُوبِ",
  ]},
  {id:"wrq-06",title:"بَابُ النَّهْيِ",sub:"L'interdiction (an-nahy)",clr:["#383513","#696325"],bayts:[
    "تَعْرِيفُهُ اسْتِدْعَاءُ تَرْكٍ قَدْ وَجَبْ # بِالقَوْلِ مِمَّنْ كَانَ دُونَ مَنْ طَلَبْ",
    "وَأَمْرُنِا بِالشَيءِ نَهْيٌ مَانِعُ # مِنْ ضِدِّهِ وَالعَكْسُ أَيضًا وَاقِعُ",
    "وَصِيغَةُ الأَمْرِ الَّتِي مَضَتْ تَرِدْ # وَ القَصْدُ مِنْهَا أَنْ يُبَاحَ مَا وُجِدْ",
    "كَمَا أَتَتْ وَالقَصْدُ مِنْهَا التَّسْوِيَهْ # كَذَا لِتَهْدِيدٍ وَتَكْوِينٍ هِيَهْ",
    "وَالمؤْمِنُونَ فِي خِطَابِ اللهِ # قَدْ دَخَلُوا إِلَّا الصَّبِي وَالسَّاهِي",
    "وَذَا الْجُنُونِ كُلَّهُمْ لمَ ْيَدْخُلُوا # وَالكَافِرُونَ فِي الخِطَابِ دَخَلُوا",
    "فِي سَائِرِ الفُرُوْعِ لِلشَّرِيعَهْ # وَفِي الَّذِي بِدُوْنِهِ مَمْنُوعَهْ",
    "وَ ذَلِكَ الِإسْلَامُ فَالفُرُوْعُ # تَصْحِيحُهَا بِدُوْنِهِ مَمْنُوْعُ",
  ]},
  {id:"wrq-07",title:"بَابُ العَامِّ",sub:"Le général ('âmm)",clr:["#382b13","#695025"],bayts:[
    "وَحَدُّهُ لَفْظٌ يَعُمُّ أَكْثَرَا # مِنْ وَاحِدٍ مِنْ غَيْرِ مَا حَصْرٍ يُرَى",
    "مِنْ قَولِهِمْ عَمَمْتُهُمْ بِمَا مَعِي # وَلْتَنْحَصِرْ أَلفَاظُهُ فِي أَرْبَعِ",
    "الجَمْعُ وَالفَرْدُ الْمُعَرَّفَانِ # بِالَّلَامِ كَالكَافِرِ وَ الِإنْسَانِ",
    "وَكُلُّ مُبْهَمٍ مِنَ الأَسْمَاءِ # مِنْ ذَاكَ مَا لِلشَّرْطِ وَ الجَزَاءِ",
    "وَلَفْظُ مَنْ فِي عَاقِلٍ وَلَفْظُ مَا # فِي غَيْرِهِ وَلَفْظُ أَيٍّ فِيْهِمَا",
    "وَ لَفْظُ أَيْنَ وَهْوَ لِلْمَكَانِ # كَذَا مَتَى الْمَوضُوْعُ لِلزَّمَانِ",
    "وَلَفْظُ لَا فِي النَّكِرَاتِ ثُمَّ مَا # فِي لَفْظِ مَنْ أَتَى بِهَا مُسْتَفْهِمَا",
    "ثُمَّ العُمُومُ أُبْطِلَتْ دَعْواهُ # فِي الفِعْلِ بَلْ وَمَا جَرَى مَجْرَاهُ",
  ]},
  {id:"wrq-08",title:"بَابُ الخَاصِّ",sub:"Le particulier (khâss)",clr:["#383213","#695e25"],bayts:[
    "وَالخَاصُ لَفْظٌ لَا يَعُمُّ أَكْثَرَا # مِنْ وَاحِدٍ أَوْ عَمَّ مَعْ حَصْرٍ جَرَى",
    "وَالقَصْدُ بِالتَّخْصِيْصِ حَيْثُمَا حَصَلْ # تَمْيِيْزُ بَعْضِ جُمْلَةٍ فِيهَا دَخَلْ",
    "وَ مَا بِهِ التَّخْصِيْصُ إِمَّا مُتَّصِلْ # كَمَا سَيَأتِي آنِفًا أَوْ مُنْفَصِلْ",
    "فَالشَّرْطُ وَالتَّقْيِيدُ بِالوَصْفِ اتَّصَلْ # كَذَاكَ الِاسْتِثْنَا وَغَيرُهَا انْفَصَلْ",
    "وَحَدُّ الِاسْتِثْنَاءِ مَا بِهِ خَرَجْ # مِنَ الكَلَامِ بَعْضُ مَا فِيهِ انْدَرَجْ",
    "وَ شَرْطُهُ أَنْ لَّا يُرَى مُنْفَصِلَا # وَلمَ ْيَكُنْ مُسْتَغْرِقًا لِمَا خَلَا",
    "وَالنُّطْقُ مَعْ إِسْمَاعِ مَنْ بِقُرْبِهِ # وَقَصْدُهُ مِنْ قَبْلِ نُطْقِهِ بِهِ",
    "وَالأَصْلُ فِيهِ أَنَّ مُسْتَثْنَاهُ # مِنْ جِنْسِهِ وَ جَازَ مِنْ سِوَاهُ",
    "وَجَازَ أَنْ يُقَدَّمَ الْمُسْتَثْنَى # وَالشَّرْطُ أَيضًا لِظُهُورِ الْمَعْنَى",
    "وَيُحْمَلُ الْمُطْلَقُ مَهْمَا وُجِدَا # عَلَى الَّذِي بِالوَصْفِ مِنْهُ قُيِّدَا",
    "فَمُطْلَقُ التَّحْرِيرِ فِي الأَيمَانِ # مُقَيَّدٌ فِي القَتْلِ بِالِإيمَانِ",
    "فَيُحْمَلُ الْمُطْلَقُ فِي التَّحْرِيرِ # عَلَى الَّذِي قُيِّدَ فِي التَّكْفِيرِ",
    "ثُمَّ الكِتَابَ بِالكِتَابِ خَصَّصُوا # وَسُنَّةٌ بِسُنَّةٍ تُخَصَّصُ",
    "وَخَصَّصُوا بِالسُنَّةِ الكِتَابَا # وَعَكْسَهُ اسْتَعْمِلْ يَكُنْ صَوَابَا",
    "وَالذِّكْرُ بِالِإجْمَاعِ مَخْصُوصٌ كَمَا # قَدْ خُصَّ بِالقِيَاسِ كُلٌ مِنْهُمَا",
  ]},
  {id:"wrq-09",title:"بَابُ الْمُجْمَلِ وَالْمُبَيَّنِ",sub:"L'ambigu et l'explicite",clr:["#382f13","#695825"],bayts:[
    "مَا كَانَ مُحْتَاجًا إِلَى بَيَانِ # فَمُجْمَلٌ وَضَابِطُ البَيَانِ",
    "إِخْرَاجُهُ مِنْ حَالَةِ الِإشْكَالِ # إِلَى التَّجَلِّي وَاتِّضَاحِ الحَالِ",
    "كَالقُرْءِ وَهْوَ وَاحِدُ الأَقْرَاءِ # فِي الحَيْضِ وَالطُّهْرِ مِنَ النِّسَاءِ",
    "وَالنَّصُ عُرْفًا كُلُ لَفْظٍ وَارِدِ # لَمْ يَحْتَمِلْ إِلَّا لِمَعْنىً وَاحِدِ",
    "كَقَدْ رَأَيْتُ جَعْفَرًا وَقِيلَ مَا # تَأْوِيلُهُ تَنْزِيلُهُ فَلْيُعْلَمَا",
    "وَالظَّاهِرُ الَّذِي يُفِيدُ مَنْ سَمِعْ # مَعْنىً سِوَى الْمَعْنَى الَّذِي لَهُ وُضِعْ",
    "كَالأَسَدِ اِسْمُ وَاحِدِ السِّبَاعِ # وَقَدْ يُرَى لِلرَّجُلِ الشُّجَاعِ",
    "وَالظَّاهِرُ الْمَذْكُورُ حَيْثُ أَشْكَلَا # مَفْهُومُهُ فَبِالدَّلِيلِ أُوِّلَا",
    "وَصَارَ بَعْدَ ذَلِكَ التَّأْوِيْلِ # مُقَيَّدًا فِي الِاسْمِ بِالدَّلِيْلِ",
  ]},
  {id:"wrq-10",title:"بَابُ الأَفْعَالِ",sub:"Les actes (du Prophète ﷺ)",clr:["#383513","#696325"],bayts:[
    "أَفْعَالُ طَهَ صَاحِبِ الشَّرِيْعَهْ # جَمِيْعُهَا مَرْضِيَّةٌ بَدِيْعَهْ",
    "وَكُلُّهَا إِمَّا تُسَمَّى قُرْبَهْ # وَطَاعَةً أَوْ لاَ فَفِعْلُ القُرْبَهْ",
    "مِنَ الخُصُوصِيَّاتِ حَيْثُ قَامَا # دَلِيْلُهَا كَوَصْلِهِ الصِّيَامَا",
    "وَحَيْثُ لَمْ يَقُمْ دَلِيْلُهَا وَجَبْ # وَقِيْلَ مَوْقُوفٌ وَقِيْلَ مُسْتَحَبْ",
    "فِي حَقِّهِ وَحَقِّنَا وَأَمَّا # مَا لَمْ يَكُنْ بِقُرْبَةٍ يُسَمَّى",
    "فَإِنَّهُ فِي حَقِّهِ مُبَاحُ # وَفِعْلُهُ أَيْضًا لَنَا يُبَاحُ",
    "وَإِنْ أَقَرَّ قَوْلَ غَيْرِهِ جُعِلْ # كَقَوْلِهِ كَذَاكَ فِعْلٌ قَدْ فُعِلْ",
    "وَمَا جَرَى فِي عَصْرِهِ ثُمَّ اِطَّلَعْ # عَلَيْهِ إِنْ أَقَرَّهُ فَلْيُتَّبَعْ",
  ]},
  {id:"wrq-11",title:"بَابُ النَّسْخِ",sub:"L'abrogation (naskh)",clr:["#382b13","#695025"],bayts:[
    "النَّسْخُ نَقْلٌ أَوْ إِزَالَةٌ كَمَا # حَكَوهُ عَنْ أَهْلِ اللِّسَانِ فِيهِمَا",
    "وَحَدُّهُ رَفْعُ الخِطَابِ اللَّاحِقِ # ثُبُوتَ حُكْمٍ بِالخِطَابِ السَّابِقِ",
    "رَفْعًا عَلَى وَجْهٍ أَتَى لَولَاهُ # لَكَانَ ذَاكَ ثَابِتًا كَمَا هُو",
    "إِذَا تَرَاخَى عَنْهُ فِي الزَّمَانِ # مَا بَعْدَهُ مِنَ الخِطَابِ الثَّانِي",
    "وَجَازَ نَسْخُ الرَّسْمِ دُوْنَ الحُكْمِ # كَذَاكَ نَسْخُ الحُكْمِ دُوْنَ الرَّسْمِ",
    "وَنَسْخُ كُلٍّ مِْنهُمَا إِلَى بَدَلْ # وَدُونَهُ وَذَاكَ تَخْفِيفٌ حَصَلْ",
    "وَجَازَ أَيْضًا كَونُ ذَلِكَ البَدَلْ # أَخَفَّ أَوْ أَشَدَّ مِمَّا قَدْ بَطَلْ",
    "ثُمَّ الكِتَابُ بِالكِتَابِ يُنْسَخُ # كَسُنَّةٍ بِسُنَّةٍ فَتُنْسَخُ",
    "وَلَمْ يَجُزْ أَنْ يُنْسَخَ الكِتَابُ # بِسُنَّةٍ بَلْ عَكْسُهُ صَوَابُ",
    "وَذُوْ تَوَاتُرٍ بِمِثْلِهِ نُسِخْ # وَغَيْرُهُ بِغَيْرِهِ فَلْيَنْتَسِخْ",
    "وَاخْتَارَ قَوْمٌ نَسْخَ مَا تَوَاتَرَا # بِغَيْرِهِ وَعَكْسُهُ حَتْمًا يُرَى",
  ]},
  {id:"wrq-12",title:"بَابٌ فِي التَّعَارُضِ بَيْنَ الأَدِلَّةِ وَالتَّرْجِيْحِ",sub:"Contradiction entre preuves et arbitrage",clr:["#383213","#695e25"],bayts:[
    "تَعَارُضُ النُّطْقَيْنِ فِي الأَحْكَامِ # يَأْتِي عَلَى أَرْبَعَةٍ أَقْسَامِ",
    "إِمَّا عُمُومٌ أَوْ خُصُوصٌ فِيْهِمَا # أَوْ كُلُّ نُطْقٍ فِيْهِ وَصْفٌ مِنْهُمَا",
    "أَوْ فِيْهِ كُلٌّ مِنْهُمَا وَيُعْتَبَرْ # كُلٌّ مِنَ الوَصْفَيْنِ مِنْ وَجْهٍ ظَهَرْ",
    "فَالجَمْعُ بَيْنَ مَا تَعَارَضَا هُنَا # فِي الأَوَّلَيْنِ وَاجِبٌ إِنْ أَمْكَنَا",
    "وَحَيْثُ لَا إِمْكَانَ فَالتَّوَقُفُ # مَالَمْ يَكُنْ تَارِيْخُ كُلٍّ يُعْرَفُ",
    "فَإِنْ عَلِمْنَا وَقْتَ كُلٍّ مِنْهُمَا # فَالثَّانِ نَاسِخٌ لِمَا تَقَدَّمَا",
    "وَخَصَّصُوا فِي الثَّالِثِ الْمَعْلُومِ # بِذِي الخُصُوصِ لَفْظَ ذِي العُمُومِ",
    "وَفِي الأَخِيْرِ شَطْرُ كُلِّ نُطْقِ # مِنْ كُلِّ شِقٍّ حُكْمُ ذَاكَ النُّطْقِ",
    "فَاخْصُصْ عُمُومَ كُلِّ نُطْقٍ مِنْهُمَا # بِالضِدِّ مِنْ قِسْمَيهِ وَاعْرِفَنْهُمَا",
  ]},
  {id:"wrq-13",title:"بَابُ الإِجْمَاعِ",sub:"Le consensus (ijmâ')",clr:["#382f13","#695825"],bayts:[
    "هُوَ اتِّفَاقُ كُلِّ أَهْلِ الْعَصْرِ # أَيْ عُلَمَاءِ الْفِقْهِ دُوْنَ نُكْرِ",
    "عَلَى اعْتِبَارِ حُكْمِ أَمْرٍ قَدْ حَدَثْ # شَرْعًا كَحُرْمَةِ الصَّلَاةِ بِالْحَدَثْ",
    "وَاحْتُجَّ بِالِإجْمَاعِ مِنْ ذِي الأُمَّهْ # لَاغَيْرِهَا إِذْ خُصِّصَتْ بِالْعِصْمَهْ",
    "وكُلُّ إِجْمَاعٍ فَحُجَّةٌ عَلَى # مَنْ بَعْدَهُ فِي كُلِّ عَصْرٍ أَقْبَلَا",
    "ثُمَّ انْقِرَاضُ عَصْرِهِ لَمْ يُشْتَرَطْ # أَيْ فِي انْعِقَادِهِ وقِيلَ مُشْتَرَطْ",
    "وَلمَ ْيَجُزْ لِأَهْلِهِ أَنْ يَرْجِعُوا # إِلَّا عَلَى الثَّانِي فَلَيْسَ يُمْنَعُ",
    "وَلْيُعْتَبَرْ عَلَيْهِ قَوْلُ مَنْ وُلِدْ # وَصَارَ مِثْلَهُمْ فَقِيهًا مُجْتَهِدْ",
    "وَيَحْصُلُ الِإجْمَاعُ بِالأَقْوَالِ # مِنْ كُلِّ أَهْلِهِ وَبِالأَفْعَالِ",
    "وَقَوْلُ بَعْضٍ حَيْثُ بَاقِيهِمْ فَعَلْ # وَبِانْتِشَارٍ مَعْ سُكُوتِهِمْ حَصَلْ",
    "ثُمَّ الصَّحَابِي قَولُهُ عَنْ مَذْهَبِهْ # عَلَى الْجَدِيدِ فَهْوَ لَايُحْتَجُّ بِهْ",
    "وَفِي الْقَدِيمِ حُجَّةٌ لِمَا وَرَدْ # فِي حَقِّهِمْ وَضَعَّفُوهُ فَلْيُرَدْ",
  ]},
  {id:"wrq-14",title:"بَابُ الأَخْبَارِ",sub:"Les rapports (akhbâr)",clr:["#383513","#696325"],bayts:[
    "وَالْخَبَرُ اللَّفْظُ الْمُفِيدُ الْمُحْتَمِلْ # صِدْقًا وَكِذْبًا مِنْهُ نَوْعٌ قَدْ نُقِلْ",
    "تَوَاتُرًا لِلْعِلْمِ قَدْ أَفَادَا # وَمَا عَدَا هَذَا اعْتَبِرْ آحَادَا",
    "فَأَوَّلُ النَّوْعَيْنِ مَا رَوَاهُ # جَمْعٌ لَنَا لِمِثْلِهِ عَزَاهُ",
    "وَهَكَذَا إِلَى الَّذِي عَنْهُ الْخَبَرْ # لَا بِاجْتِهَادٍ بَلْ سَمَاعٍ أَوْ نَظَرْ",
    "وَكُلُّ جَمْعٍ شَرْطُهُ أَنْ يَسْمَعُوا # وَالْكِذْبُ مِنْهُمْ بِالتَّواطِي يُمْنَعُ",
    "ثَانِيهِمَا الآحَادُ يُوجِبُ الْعَمَلْ # لَا العِلْمَ لَكِنْ عِنْدَهُ الظَّنُّ حَصَلْ",
    "لِمُرْسَلٍ وَمُسْنَدٍ قَدْ قُسِّمَا # وَسَوْفَ يَأْتِي ذِكْرُ كُلٍّ مِنْهُمَا",
    "فَحَيْثُمَا بَعْضُ الرُّوَاةِ يُفْقَدُ # فَمُرْسَلٌ وَمَا عَدَاهُ مُسْنَدُ",
    "لِلِاحْتِجَاجِ صَالِحٌ لَا الْمُرْسَلُ # لَكِنْ مَرَاسِيلُ الصَّحَابِي تُقْبَلُ",
    "كَذَا سَعِيدُ بْنُ الْمُسَيَّبِ اقْبَلَا # فِي الاحْتِجَاجِ مَا رَوَاهُ مُرْسَلَا",
    "وَأَلْحَقُوا بِالْمُسْنَدِ الْمُعَنْعَنَا # فِي حُكْمِهِ الَّذِي لَهُ تَبَيَّنَا",
    "وَقَاَل مَنْ عَلَيْهِ شَيْخُهُ قَرَا # حَدَّثَنِي كَمَا يَقُولُ أَخْبَرَا",
    "وَلَمْ يَقُلْ فِي عَكْسِهِ حَدَّثَنِي # لَكِنْ يَقُولُ رَاويًا أَخْبَرَني",
    "وَحَيْثُ لَمْ يَقْرَأْ وَقَدْ أَجَازَهْ # يَقُولُ قَدْ أَخْبَرَنِي إِجَازَهْ",
  ]},
  {id:"wrq-15",title:"بَابُ القِيَاسِ",sub:"Le raisonnement analogique (qiyâs)",clr:["#382b13","#695025"],bayts:[
    "أَمَّا الْقِيَاسُ فَهْوَ رَدُّ الْفَرْعِ # لِلأَصْلِ فِي حُكْمٍ صَحِيحٍ شَرْعِي",
    "لِعِلَّةٍ جَامِعَةٍ فِي الْحُكْمِ # وَلْيُعْتَبَرْ ثَلَاثَةً فِي الرَّسْمِ",
    "لِعِلَّةٍ أَضِفْهُ أَوْ دَلَالَهْ # أَوْ شَبَهٍ ثُمَّ اعْتَبِرْ أَحْوَالَهْ",
    "أَوَّلُهَا مَا كَانَ فِيهِ الْعِلَّهْ # مُوجِبَةً لِلْحُكْمِ مُسْتَقِلَّهْ",
    "فَضَرْبُهُ لِلْوَالِدَيْنِ مُمْتَنِعْ # كَقَوْلِ أُفٍّ وَهْوَ لِلِإيذَا مُنِعْ",
    "وَالثَّانِ مَا لَمْ يُوجِبِ التَّعْلِيلُ # حُكْمًا بِهِ لَكِنَّهُ دَلِيلُ",
    "فَيُسْتَدَلُّ بِالنَّظِيرِ الْمُعْتَبَرْ # شَرْعًا عَلَى نَظِيرِهِ فَيُعْتَبَرْ",
    "كَقَوْلِنَا مَالُ الصَّبِيِّ تَلْزَمُ # زَكَاتُهُ كَبَالِغٍ أَيْ لِلنُّمُو",
    "والثَّالِثُ الْفَرْعُ الَّذِي تَرَدَّدَا # مَا بَيْنَ أَصْلَيْنِ اعْتِبَارًا وُجِدَا",
    "فَلْيَلَْتَحِقْ بِأَيِّ ذَيْنِ أَكْثَرَا # مِنْ غَيْرِهِ فِي وَصْفِهِ الَّذِي يُرَى",
    "فَيُلْحَقُ الرَّقِيقُ فِي الِإتْلَافِ # بِالْمَالِ لَا بِالْحُرِّ فِي الأَوْصَافِ",
  ]},
  {id:"wrq-16",title:"فَصْلٌ فِي شُرُوطِ الْقِيَاسِ",sub:"Les conditions du qiyâs",clr:["#383213","#695e25"],bayts:[
    "وَالشَّرْطُ فِي الْقِيَاسِ كَوْنُ الْفَرْعِ # مُنَاسِبًا لأَصْلِهِ فِي الْجَمْعِ",
    "بِأَنْ يَكُونَ جَامِعُ الأَمْرَيْنِ # مُنَاسِبًا لِلْحُكْمِ دُونَ مَيْنِ",
    "وَكَوْنُ ذَاكَ الأَصْلِ ثَابِتًا بِمَا # يُوَافِقُ الْخَصْمَيْنِ فِي رَأَيَيْهِمَا",
    "وَشَرْطُ كُلِّ عِلَّةٍ أَنْ تَطَّرِدْ # فِي كُلِّ مَعْلُولَاتِهَا الَّّّتِي تَرِدْ",
    "لَمْ تَنْتَقِضْ لَفْظًا وَلَا مَعْنًى فَلَا # قِيَاسَ فِي ذَاتِ انْتِقَاضٍ مُسْجَلَا",
    "وَالْحُكْمُ مِنْ شُرُوطِهِ أَنْ يَتْبَعَا # عِلَّتَهُ نَفْيًا وَإِثْبَاتًا مَعَا",
    "فَهْيَ الَّتِي لَهُ حَقِيقًا تَجْلِبُ # وَهْوَ الَّذِي لَهَا كَذَاكَ يُجْلَبُ",
  ]},
  {id:"wrq-17",title:"فَصْلٌ فِي حُكْمِ الْأَشْيَاءِ قَبْلَ الشَّرْعِ",sub:"Le statut des choses avant la Révélation",clr:["#382f13","#695825"],bayts:[
    "لَا حُكْمَ قَبْلَ بِعْثَةِ الرَّسُولِ # بَلْ بَعْدَهَا بِمُقْتَضَى الدَّلِيلِ",
    "وَالأَصْلُ فِي الأَشْيَاءِ قَبْلَ الشَّرْعِ # تَحْرِيمُهَا لَا بَعْدَ حُكْمٍ شَرْعِي",
    "بَلْ مَا أَحَلَّ الشَّرْعُ حَلَّلْنَاهُ # وَمَا نَهَانَا عَنْهُ حَرَّمْنَاهُ",
    "وَحَيْثُ لَمْ نَجِدْ دَلِيلَ حِلِّ # شَرْعًا تَمَسَّكْنَا بِحُكْمِ الأَصْلِ",
    "مُسْتَصْحِبِينَ الأَصْلَ لَا سِوَاهُ # وَقَالَ قَوْمٌ ضِدَّ مَا قُلْنَاهُ",
    "أَيْ أَصْلُهَا التَّحْلِيلُ إِلَّا إِنْ وَرَدْ # تَحْرِيمُهَا فِي شَرْعِنَا فَلَا يُرَدْ",
    "وَقِيلَ إِنَّ الأَصْلَ فِيمَا يَنْفَعُ # جَوَازُهُ وَمَا يَضُرُّ يُمْنَعُ",
    "وَحَدُّ الِاسْتِصْحَابِ أَخْذُ الْمُجْتَهِدْ # بِالأَصْلِ عَنْ دَلِيلِ حُكْمٍ قَدْ فُقِدْ",
  ]},
  {id:"wrq-18",title:"بَابُ تَرْتِيبِ الأَدِلَّةِ",sub:"La hiérarchie des preuves",clr:["#383513","#696325"],bayts:[
    "وَقَدَّمُوا مِنَ الأَدِلَّةِ الْجَلِي # عَلَى الْخَفِيِّ بِاعْتِبَارِ الْعَمَلِ",
    "وَقَدَّمُوا مِنْهَا مُفِيدَ العِلْمِ # عَلَى مُفِيدِ الظَّنِّ أَيْ لِلْحُكْمِ",
    "إِلَّا مَعَ الْخُصُوصِ وَالْعُمُومِ # فَلْيُؤْتَ بِالتَّخْصِيصِ لَا التَّقْدِيمِ",
    "وَالنُّطْقَ قَدِّمْ عَنْ قِياسِهِمْ تَفِ # وَقَدَّمُوا جَلِيَّهُ عَلَى الْخَفي",
    "وَإنْ يَكُنْ فِي النُّطْقِ مِنْ كِتَابِ # أَوْ سُنَّةٍ تَغْيِيرُ الاسْتِصْحَابِ",
    "فَالنُّطْقُ حُجَّةٌ إِذًا وَإِلَّا # فَكُنْ بِالاسْتِصْحَابِ مُسْتَدِلَّا",
  ]},
  {id:"wrq-19",title:"بَابُ صِفَةِ الْمُفْتِي وَالْمُسْتَفْتِي",sub:"Qualités du mufti et du demandeur d'avis",clr:["#382b13","#695025"],bayts:[
    "وَالشَّرْطُ فِي الْمُفْتِي اجْتِهَادٌ وَهْوَ أَنْ # يَعْرِفَ مِنْ آيِ الْكِتَابِ وَالسُّنَنْ",
    "وَالفِقْهِ فِي فُرُوعِهِ الشَّوَارِدِ # وَكُلِّ مَا لَهُ مِنَ الْقَوَاعِدِ",
    "مَعْ مَا بِهِ مِنَ الْمَذَاهِبِ الَّتِي # تَقَرَّرَتْ وَمِنْ خِلَافٍ مُثْبَتِ",
    "وَالنَّحْوِ وَالأُصُولِ مَعْ عِلْمِ الأَدَبْ # وَاللُّغَةِ الَّتِي أَتَتْ عَنِ الْعَرَبْ",
    "قَدْراً بِهِ يَسْتَنْبِطُ الْمَسَائِلَا # بِنَفْسِهِ لِمَنْ يَكُونُ سَائَلا",
    "مَعْ عِلْمِهِ التَّفْسِيرَ فِي الآيَاتِ # وَفِي الْحَدِيثِ حَالَةَ الرُّوَاةِ",
    "وَمَوْضِعَ الِإجْمَاعِ وَالْخِلَافِ # فَعِلْمُ هَذَا الْقَدْرِ فِيهِ كَافِ",
    "وَمِنْ شُرُوطِ السَّائِلِ الْمُسْتَفْتِي # أَنْ لَّا يَكُونَ عَالِمًا كَالْمُفْتِي",
    "فَحَيْثُ كَاَنَ مِثْلَهُ مُجْتَهِدَا # فَلَا يَجُوزُ كَوْنُهُ مُقَلِّدَا",
  ]},
  {id:"wrq-20",title:"فَصْلٌ فِي التَّقْلِيدِ",sub:"L'imitation (taqlîd)",clr:["#383213","#695e25"],bayts:[
    "تَقْلِيدُنَا قَبُولُ قَوْلِ الْقَائِلِ # مِنْ غَيْرِ ذِكْرِ حُجَّةٍ لِلسَّائِلِ",
    "وَقِيلَ بَلْ قَبُولُنَا مَقَالَهْ # مَعْ جَهْلِنَا مِنْ أَيْنَ ذَاكَ قَالَهْ",
    "فَفِي قَبُولِ قَوْلِ طَهَ الْمُصْطَفَى # بِالْحُكْمِ تَقْلِيدٌ لَهُ بِلَا خَفَا",
    "وَقِيلَ لَا لِأَنَّ مَا قَدْ قَالَهُ # جَمِيعُهُ بِالْوَحْيِ قَدْ أَتَى لَهُ",
  ]},
  {id:"wrq-21",title:"بَابُ الِاجْتِهَادِ",sub:"L'effort d'interprétation (ijtihâd)",clr:["#382f13","#695825"],bayts:[
    "وَحَدُّهُ أَنَّ يَبْذُلَ الَّذِي اجْتَهَدْ # مَجْهُودَهُ فِي نَيْلِ أَمْرٍ قَدْ قَصَدْ",
    "وَلْيَنْقَسِمْ إِلَى صَوَابٍ وَخَطَأْ # وَقِيلَ فِي الْفُرُوعِ يُمْنَعُ الْخَطَأْ",
    "وَفِي أُصُولِ الدِّينِ ذَا الْوَجْهُ امْتَنَعْ # إِذْ فِيهِ تَصْوِيبٌ لِأَرْبَابِ الْبِدَعْ",
    "مِنَ النَّصَارَى حَيْثُ كُفْراً ثَلَّثُوا # وَالزَّاعِمِينَ أَنَّهُمْ لَنْ يُبْعَثُوا",
    "أَوْ لَا يَرَوْنَ رَبَّهُمْ بِالْعَيْنِ # كَذَا الْمَجُوسُ فِي ادِّعَا الأَصْلَيْنِ",
    "وَمَنْ أَصَابَ فِي الْفُرُوعِ يُعْطَى # أَجْرَيْنِ وَاجْعَلْ نِصْفَهُ مَنْ أَخْطَا",

/* ════════════ WORD ════════════ */
const Word = ({text,revealed}) => {
  const len=text.replace(/[\u064B-\u065F\u0670\u0640]/g,"").length;
  return revealed
    ? <span style={{fontFamily:"'Scheherazade New',serif",fontSize:"var(--az)",lineHeight:1.9,color:"var(--wrd-col)",margin:"0 3px",display:"inline-block",animation:"wrd .35s ease",direction:"rtl"}}>{text}</span>
    : <span style={{display:"inline-block",height:26,minWidth:Math.max(16,len*10),background:"var(--wrd-bg)",borderRadius:4,margin:"0 3px",verticalAlign:"middle"}}/>;
};

        ))}

/* ════════════ SINGLE BAYT FLOW (carte, navigation manuelle) ════════════ */
function SingleBaytFlow({bab,mode,onProgress,progress,showAll,tFn,onBack}){
  const [bi,setBi]=useState(0);
  const [mask,setMask]=useState([]);
  const [done,setDone]=useState(false);
  const ptrRef=useRef(0),maskRef=useRef([]),procRef=useRef(null);

  const baytText=bab.bayts[bi]||"";
  const words=baytText.replace(/#/g," ").split(/\s+/).filter(Boolean);
  const parts=baytText.split("#").map(p=>p.trim().split(/\s+/).filter(Boolean));

  procRef.current=(text)=>{
    const ws=(bab.bayts[bi]||"").replace(/#/g," ").split(/\s+/).filter(Boolean);
    const rw=norm(text).split(/\s+/).filter(Boolean);
    let ptr=ptrRef.current,ch=false;
    for(const r of rw){
      if(ptr>=ws.length)break;
      const e=norm(ws[ptr]);
      if(wordMatches(r,e)){maskRef.current[ptr]=true;ptr++;ch=true;continue;}
      if(ptr+1<ws.length){
        const fused=e+norm(ws[ptr+1]);
        if(wordMatches(r,fused)){maskRef.current[ptr]=true;maskRef.current[ptr+1]=true;ptr+=2;ch=true;continue;}
      }
    }
    if(ch){ptrRef.current=ptr;setMask([...maskRef.current]);if(ptr>=ws.length){setDone(true);onProgress(bab.id,bi);stopFn();}}
  };

  const {listening,processing,srError,toggle,stopFn}=useAsrRecording((text)=>procRef.current(text), tFn);

  useEffect(()=>{
    const w=(bab.bayts[bi]||"").replace(/#/g," ").split(/\s+/).filter(Boolean);
    ptrRef.current=0;maskRef.current=new Array(w.length).fill(false);
    setMask(new Array(w.length).fill(false));setDone(false);
  },[bi,bab.id]);

  const revealOne=()=>{
    const ws=(bab.bayts[bi]||"").replace(/#/g," ").split(/\s+/).filter(Boolean);
    const ptr=ptrRef.current;
    if(ptr<ws.length){maskRef.current[ptr]=true;ptrRef.current=ptr+1;setMask([...maskRef.current]);if(ptr+1>=ws.length){setDone(true);onProgress(bab.id,bi);}}
  };
  const reset=()=>{stopFn();ptrRef.current=0;maskRef.current=new Array(words.length).fill(false);setMask(new Array(words.length).fill(false));setDone(false);};
  const prev=()=>{stopFn();setBi(x=>Math.max(0,x-1));};
  const next=()=>{stopFn();setBi(x=>Math.min(bab.bayts.length-1,x+1));};
  const revealed=mask.filter(Boolean).length;
  const alreadyDone=progress[bab.id]?.has(bi)??false;

  let gi=0;
  const baytEl=parts.map((pw,pi)=>{
    const els=pw.map(w=>{const idx=gi++;return <Word key={idx} text={w} revealed={showAll||mask[idx]}/>;});
    return(<div key={pi}><div style={{direction:"rtl",textAlign:"center",lineHeight:2,flexWrap:"wrap",display:"flex",justifyContent:"center"}}>{els}</div>{pi<parts.length-1&&<div style={{textAlign:"center",color:"rgba(212,168,67,0.35)",fontSize:13,margin:"1px 0"}}>◆</div>}</div>);
  });

  return(
    <React.Fragment>
      <div style={{flex:1,padding:"16px 16px 14px",display:"flex",flexDirection:"column",alignItems:"center"}}>
        <div style={{width:"100%",maxWidth:500,marginBottom:14}}>
          <div style={{background:"rgba(255,255,255,0.08)",borderRadius:99,height:5,overflow:"hidden"}}>
            <div style={{background:bab.clr[1],filter:"brightness(1.7)",height:"100%",width:`${revealed/Math.max(words.length,1)*100}%`,borderRadius:99,transition:"width .3s"}}/>
          </div>
          <div style={{textAlign:"center",fontSize:11,color:"var(--sub)",marginTop:3}}>{tFn("words",revealed,words.length)}</div>
        </div>
        <div style={{background:"rgba(212,168,67,0.1)",border:"1px solid rgba(212,168,67,0.2)",borderRadius:99,padding:"4px 14px",fontSize:13,color:"#d4a843",fontFamily:"'Scheherazade New',serif",marginBottom:14}}>البَيْتُ {arNum(bi+1)}{alreadyDone?" ✓":""}</div>
        <div style={{background:done?"rgba(180,255,210,0.04)":"rgba(255,255,255,0.04)",borderRadius:22,padding:"24px 18px",width:"100%",maxWidth:500,border:`1px solid ${done?"rgba(180,255,210,0.18)":"rgba(255,255,255,0.07)"}`,transition:"all .5s"}}>{baytEl}</div>
        {done&&(
          <div style={{marginTop:14,background:"rgba(180,255,210,0.07)",border:"1px solid rgba(180,255,210,0.18)",borderRadius:16,padding:"14px 20px",textAlign:"center",width:"100%",maxWidth:500}}>
            <div style={{fontSize:24,marginBottom:2}}>{bi===bab.bayts.length-1?"🏆":"🌟"}</div>
            <div style={{fontFamily:"'Scheherazade New',serif",fontSize:20,color:"#b8f5cc"}}>{bi===bab.bayts.length-1?tFn("babDone"):tFn("ahsant")}</div>
          </div>
        )}
        {listening&&(
          <div style={{marginTop:10,display:"flex",alignItems:"center",gap:8,fontSize:12,color:"#7ab89a"}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:processing?"#d4a843":"#e74c3c",display:"inline-block",animation:"pulse 1.2s ease infinite"}}/>
            {processing?tFn("processingTxt"):tFn("listening")}
          </div>
        )}
        {srError&&(
          <div style={{marginTop:10,background:"rgba(231,76,60,0.09)",border:"1px solid rgba(231,76,60,0.25)",borderRadius:12,padding:"10px 14px",fontSize:12,color:"#ffaaaa",textAlign:"center",maxWidth:500,lineHeight:1.6}}>⚠️ {srError}</div>
        )}
      </div>
      <div style={{padding:"0 14px 32px"}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:16}}>
          {mode==="voice"?(
            <button onClick={toggle} style={{width:76,height:76,borderRadius:"50%",border:"none",cursor:"pointer",fontSize:28,background:listening?"linear-gradient(135deg,#8b1a1a,#c0392b)":done?"rgba(180,255,210,0.1)":`linear-gradient(135deg,${bab.clr[0]},${bab.clr[1]})`,boxShadow:listening?"0 0 0 10px rgba(192,57,43,0.12),0 8px 24px rgba(0,0,0,0.5)":"0 8px 28px rgba(0,0,0,0.5)",transition:"all .3s",filter:"brightness(1.2)"}}>
              {listening?"⏸":done?"✓":"🎤"}
            </button>
          ):(
            <button onClick={done?undefined:revealOne} style={{width:76,height:76,borderRadius:"50%",border:"none",cursor:done?"default":"pointer",fontSize:26,background:done?"rgba(180,255,210,0.1)":`linear-gradient(135deg,${bab.clr[0]},${bab.clr[1]})`,boxShadow:"0 8px 28px rgba(0,0,0,0.5)",filter:"brightness(1.2)"}}>
              {done?"✓":"👆"}
            </button>
          )}
        </div>
        <div style={{display:"flex",gap:10}}>
          {[{l:"⌂",fn:onBack,dis:false,fl:.5},{l:tFn("prev"),fn:prev,dis:bi===0},{l:tFn("rst"),fn:reset,dis:false,fl:.5},{l:tFn("next"),fn:next,dis:bi===bab.bayts.length-1}].map((b,i)=>(
            <button key={i} onClick={b.fn} disabled={b.dis} style={{flex:b.fl??1,padding:"13px 8px",borderRadius:13,border:"1px solid rgba(255,255,255,0.07)",background:"rgba(255,255,255,0.05)",color:b.dis?"rgba(255,255,255,0.18)":"rgba(255,255,255,0.72)",fontSize:i===1?17:13,cursor:b.dis?"not-allowed":"pointer"}}>{b.l}</button>
          ))}
        </div>
      </div>
    </React.Fragment>
  );
}

/* ════════════ CONTINUOUS FLOW (grande page scrollable, auto-scroll) ════════════ */
function ContinuousFlow({bab,isAll,mode,onProgress,showAll,tFn,onBack}){
  const flat=useMemo(()=>{
    const arr=[];
    bab.bayts.forEach((baytText,bIdx)=>{
      const parts=baytText.split("#").map(p=>p.trim().split(/\s+/).filter(Boolean));
      parts.forEach((pw,pIdx)=>{
        pw.forEach((w,wIdx)=>{
          arr.push({bIdx,word:w,lastOfBayt:pIdx===parts.length-1&&wIdx===pw.length-1});
        });
      });
    });
    return arr;
  },[bab.id]);

  const baytStart=useMemo(()=>{
    const s=[];let acc=0;
    bab.bayts.forEach(bt=>{s.push(acc);acc+=bt.replace(/#/g," ").split(/\s+/).filter(Boolean).length;});
    return s;
  },[bab.id]);

  const [mask,setMask]=useState(()=>new Array(flat.length).fill(false));
  const ptrRef=useRef(0),maskRef=useRef(new Array(flat.length).fill(false));
  const procRef=useRef(null);
  const baytRefs=useRef({});

  const markBaytDone=(bIdx)=>{
    if(isAll){
      const c=chapterOfMatn(bIdx,bab.chapMap);
      if(c) onProgress(c.id,bIdx-c.start);
    } else {
      onProgress(bab.id,bIdx);
    }
  };

  procRef.current=(text)=>{
    const rw=norm(text).split(/\s+/).filter(Boolean);
    let ptr=ptrRef.current,ch=false;
    for(const r of rw){
      if(ptr>=flat.length)break;
      const e=norm(flat[ptr].word);
      if(wordMatches(r,e)){
        maskRef.current[ptr]=true;
        if(flat[ptr].lastOfBayt) markBaytDone(flat[ptr].bIdx);
        ptr++;ch=true;continue;
      }
      if(ptr+1<flat.length){
        const fused=e+norm(flat[ptr+1].word);
        if(wordMatches(r,fused)){
          maskRef.current[ptr]=true;
          if(flat[ptr].lastOfBayt) markBaytDone(flat[ptr].bIdx);
          maskRef.current[ptr+1]=true;
          if(flat[ptr+1].lastOfBayt) markBaytDone(flat[ptr+1].bIdx);
          ptr+=2;ch=true;continue;
        }
      }
    }
    if(ch){
      ptrRef.current=ptr;setMask([...maskRef.current]);
      if(ptr>=flat.length) stopFn();
    }
  };

  const {listening,processing,srError,toggle,stopFn}=useAsrRecording((text)=>procRef.current(text), tFn);

  const revealOne=()=>{
    const ptr=ptrRef.current;
    if(ptr<flat.length){
      maskRef.current[ptr]=true;
      if(flat[ptr].lastOfBayt) markBaytDone(flat[ptr].bIdx);
      ptrRef.current=ptr+1;setMask([...maskRef.current]);
    }
  };
  const resetAll=()=>{stopFn();ptrRef.current=0;maskRef.current=new Array(flat.length).fill(false);setMask(new Array(flat.length).fill(false));};

  const activeBIdx = ptrRef.current<flat.length ? flat[ptrRef.current].bIdx : bab.bayts.length-1;
  const isFullyDone = ptrRef.current>=flat.length;
  const revealedWords = mask.filter(Boolean).length;
  const activeClr = isAll ? (chapterOfMatn(activeBIdx,bab.chapMap)?.clr||bab.clr) : bab.clr;

  useEffect(()=>{
    const node=baytRefs.current[activeBIdx];
    if(node) node.scrollIntoView({behavior:"smooth",block:"center"});
  },[activeBIdx]);

  return(
    <React.Fragment>
      <div style={{padding:"10px 16px 4px"}}>
        <div style={{background:"rgba(255,255,255,0.08)",borderRadius:99,height:5,overflow:"hidden"}}>
          <div style={{background:activeClr[1],filter:"brightness(1.7)",height:"100%",width:`${revealedWords/Math.max(flat.length,1)*100}%`,borderRadius:99,transition:"width .3s"}}/>
        </div>
        <div style={{textAlign:"center",fontSize:11,color:"#7ab89a",marginTop:3}}>
          {tFn('words',revealedWords,flat.length)} · {tFn('baytsOf',Math.min(activeBIdx+1,bab.bayts.length),bab.bayts.length)}
        </div>
      </div>

      <div style={{padding:"6px 16px 4px"}}>
        {bab.bayts.map((baytText,bIdx)=>{
          const chap=isAll?chapterOfMatn(bIdx,bab.chapMap):null;
          const prevChap=isAll&&bIdx>0?chapterOfMatn(bIdx-1,bab.chapMap):null;
          const showDivider=isAll&&chap&&(!prevChap||chap.title!==prevChap.title);
          const isActive=bIdx===activeBIdx&&!isFullyDone;
          const isDone=bIdx<activeBIdx||isFullyDone;
          const parts=baytText.split("#").map(p=>p.trim().split(/\s+/).filter(Boolean));
          let li=0;
          return(
            <React.Fragment key={bIdx}>
              {showDivider&&(
                <div style={{display:"flex",alignItems:"center",gap:10,margin:"22px 0 12px"}}>
                  <div style={{flex:1,height:1,background:"rgba(212,168,67,0.2)"}}/>
                  <div style={{fontFamily:"'Scheherazade New',serif",fontSize:15,color:"#d4a843",whiteSpace:"nowrap"}}>{chap.title}</div>
                  <div style={{flex:1,height:1,background:"rgba(212,168,67,0.2)"}}/>
                </div>
              )}
              <div ref={el=>baytRefs.current[bIdx]=el} style={{
                scrollMarginTop:90,
                background:isActive?"rgba(212,168,67,0.07)":isDone?"rgba(180,255,210,0.025)":"transparent",
                border:isActive?"1px solid rgba(212,168,67,0.3)":"1px solid transparent",
                borderRadius:16,padding:"12px 10px",marginBottom:6,transition:"all .4s",
                contentVisibility:isActive?"visible":"auto",containIntrinsicSize:"0 110px",
              }}>
                <div style={{fontSize:10,color:isActive?"#d4a843":"rgba(255,255,255,0.25)",marginBottom:3,fontFamily:"'Scheherazade New',serif",display:"flex",justifyContent:"center",gap:5}}>
                  <span>{arNum(bIdx+1)}</span>{isDone&&<span style={{color:"#7ab89a"}}>✓</span>}
                </div>
                {parts.map((pw,pIdx)=>(
                  <div key={pIdx}>
                    <div style={{direction:"rtl",textAlign:"center",lineHeight:1.85,flexWrap:"wrap",display:"flex",justifyContent:"center"}}>
                      {pw.map(w=>{const flatIdx=baytStart[bIdx]+li;li++;return <Word key={flatIdx} text={w} revealed={showAll||mask[flatIdx]}/>;})}
                    </div>
                    {pIdx<parts.length-1&&<div style={{textAlign:"center",color:"rgba(212,168,67,0.3)",fontSize:12}}>◆</div>}
                  </div>
                ))}
              </div>
            </React.Fragment>
          );
        })}

        {isFullyDone&&(
          <div style={{marginTop:18,background:"rgba(180,255,210,0.07)",border:"1px solid rgba(180,255,210,0.18)",borderRadius:16,padding:"20px",textAlign:"center"}}>
            <div style={{fontSize:30,marginBottom:4}}>🏆</div>
            <div style={{fontFamily:"'Scheherazade New',serif",fontSize:22,color:"#b8f5cc"}}>{isAll?tFn("matnDone"):tFn("babDone")}</div>
            <div style={{fontSize:12,color:"var(--sub)",marginTop:3}}>{tFn("barakAllah")}</div>
          </div>
        )}
        {listening&&(
          <div style={{marginTop:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8,fontSize:12,color:"var(--sub)"}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:processing?"#d4a843":"#e74c3c",display:"inline-block",animation:"pulse 1.2s ease infinite"}}/>
            {processing?tFn("processingTxt"):tFn("listening")}
          </div>
        )}
        {srError&&(
          <div style={{marginTop:12,background:"rgba(231,76,60,0.09)",border:"1px solid rgba(231,76,60,0.25)",borderRadius:12,padding:"10px 14px",fontSize:12,color:"#ffaaaa",textAlign:"center",lineHeight:1.6}}>⚠️ {srError}</div>
        )}
      </div>

      {/* ▓▓ BOUTON MICRO FIXE EN BAS — toujours visible ▓▓ */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:540,padding:"12px 16px 28px",background:"linear-gradient(0deg,var(--bg) 55%,transparent)",display:"flex",justifyContent:"center",gap:12,alignItems:"center",zIndex:100,pointerEvents:"none"}}>
        <div style={{display:"flex",gap:10,pointerEvents:"auto",background:"rgba(5,12,6,0.85)",backdropFilter:"blur(12px)",padding:"10px 16px",borderRadius:20,border:"1px solid rgba(255,255,255,0.08)",boxShadow:"0 -4px 24px rgba(0,0,0,0.4)"}}>
          <button onClick={()=>{stopFn();onBack();}} style={{...BS,fontSize:15,padding:"10px 12px"}} title="Retour">←</button>
          <button onClick={resetAll} style={{...BS,fontSize:15,padding:"10px 12px"}}>🔄</button>
          {mode==="voice"?(
            <button onClick={toggle} style={{width:60,height:60,borderRadius:"50%",border:"none",cursor:"pointer",fontSize:24,background:listening?"linear-gradient(135deg,#8b1a1a,#c0392b)":isFullyDone?"rgba(180,255,210,0.12)":`linear-gradient(135deg,${activeClr[0]},${activeClr[1]})`,boxShadow:listening?"0 0 0 8px rgba(192,57,43,0.12),0 6px 20px rgba(0,0,0,0.5)":"0 6px 20px rgba(0,0,0,0.5)",filter:"brightness(1.2)"}}>
              {listening?"⏸":isFullyDone?"✓":"🎤"}
            </button>
          ):(
            <button onClick={isFullyDone?undefined:revealOne} style={{width:60,height:60,borderRadius:"50%",border:"none",cursor:isFullyDone?"default":"pointer",fontSize:22,background:isFullyDone?"rgba(180,255,210,0.12)":`linear-gradient(135deg,${activeClr[0]},${activeClr[1]})`,boxShadow:"0 6px 20px rgba(0,0,0,0.5)",filter:"brightness(1.2)"}}>
              {isFullyDone?"✓":"👆"}
            </button>
          )}
        </div>
      </div>
      {/* Padding pour compenser la hauteur du bouton fixed */}
      <div style={{height:100}}/>
    </React.Fragment>
  );
}


/* ════════════ PROGRESS ════════════ */
function Progress({onBack,onGoMatn,progress,tFn,matnDb}){
  const done=Object.values(progress).reduce((s,v)=>s+v.size,0);
  const pct=GRAND_TOTAL?Math.round(done/GRAND_TOTAL*100):0,deg=pct/100*360;
  const matnRows=CATALOG.filter(m=>m.avail).map(m=>{
    const db=matnDb[m.id];
    const mDone=db.abwab.reduce((s,b)=>s+(progress[b.id]?.size??0),0);
    return {m,db,mDone,mPct:db.total?Math.round(mDone/db.total*100):0};
  });
  return(
    <div style={{padding:"0 16px 80px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 0 22px"}}>
        <button onClick={onBack} style={BS}>←</button>
        <h2 style={{margin:0,fontSize:18,fontWeight:600,color:"var(--txt)"}}>{tFn("myProg")}</h2>
      </div>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{width:148,height:148,borderRadius:"50%",background:`conic-gradient(#d4a843 ${deg}deg,rgba(255,255,255,0.07) ${deg}deg)`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}>
          <div style={{width:114,height:114,borderRadius:"50%",background:"var(--bg)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <div style={{fontSize:28,fontWeight:700,color:"#d4a843"}}>{pct}%</div>
            <div style={{fontSize:11,color:"var(--sub)"}}>{tFn("compl")}</div>
          </div>
        </div>
        <div style={{fontSize:14,color:"var(--sub)"}}>{tFn("master",done,GRAND_TOTAL)}</div>
      </div>
      <div style={{fontSize:12,color:"var(--sub)",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>{tFn("detailChap")}</div>
      {matnRows.map(({m,db,mDone,mPct})=>{
        const ok=mDone===db.total;
        return(
          <div key={m.id} onClick={()=>onGoMatn(m.id)} style={{cursor:"pointer",background:"rgba(255,255,255,0.05)",borderRadius:13,padding:"13px 15px",marginBottom:9,border:ok?"1px solid rgba(212,168,67,0.35)":"1px solid transparent"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
              <span style={{fontFamily:"'Scheherazade New',serif",fontSize:16,direction:"rtl"}}>{m.title}{ok?" ✓":""}</span>
              <span style={{fontSize:13,color:ok?"#b8f5cc":"#7ab89a",fontWeight:ok?600:400,flexShrink:0}}>{mDone}/{db.total}</span>
            </div>
            <div style={{background:"rgba(0,0,0,0.3)",borderRadius:99,height:4,overflow:"hidden"}}>
              <div style={{background:ok?"#b8f5cc":"linear-gradient(90deg,#c9943e,#d4a843)",height:"100%",width:`${mPct}%`,borderRadius:99,transition:"width .5s"}}/>
            </div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:5}}>{m.fr} · {db.abwab.length} chapitres</div>
          </div>
        );
      })}
    </div>
  );
}

        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:540,background:"var(--nav-bg)",backdropFilter:"blur(12px)",borderTop:"1px solid var(--nav-bord)",display:"flex",padding:"10px 0 24px",zIndex:200}}>
          {NAV.map(({icon,key,sc})=>(
            <button key={sc} onClick={()=>setScreen(sc)} style={{flex:1,background:"none",border:"none",color:screen===sc?"#d4a843":"var(--sub)",cursor:"pointer",padding:"6px",fontSize:11,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <span style={{fontSize:24}}>{icon}</span>{tFn(key)}
            </button>
          ))}
        </div>
      )}
      <div style={{paddingBottom:screen!=="review"?80:0,overflowY:"auto"}}>
        {screen==="home"     && <Home onGoMatn={(id)=>{setSelMatnId(id);setScreen("chapters");}} progress={progress} tFn={tFn} sett={sett} matnDb={MATN_DB}/>}
        {screen==="chapters" && <Chapters matnId={selMatnId} onBack={()=>{setScreen("home");}} onSelect={b=>{setSelBab(b);setScreen("review");}} onSelectAll={()=>{const db=MATN_DB[selMatnId];setSelBab(db.allMatn);setScreen("review");}} progress={progress} tFn={tFn}/>}
        {screen==="review"   && selBab && <Review bab={selBab} onBack={()=>setScreen("chapters")} onProgress={addProgress} progress={progress} tFn={tFn}/>}
        {screen==="progress" && <Progress onBack={()=>setScreen("home")} onGoMatn={(id)=>{setSelMatnId(id);setScreen("chapters");}} progress={progress} tFn={tFn} matnDb={MATN_DB}/>}
        {screen==="settings" && <Settings sett={sett} setSett={setSett} progress={progress} setProgress={setProgress} tFn={tFn}/>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
