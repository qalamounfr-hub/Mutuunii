    "وَحَيْثُ أَتَاكَ الْقُدْسُ إِسُكَانُ دَالِهِ # دَوَاءٌ وَلِلْبَاقِينَ بِالضَّمِّ أُرْسِلَا",
    "وَيُنْزِلُ خَفِّفْهُ وَتُنْزِلُ مِثْلُهُ # وَنُنْزِلُ حَقٌّ وَهْوَ في الْحِجْرِ ثُقِّلَا",
    "وَخُفِّفَ لِلْبَصْرِيْ بِسُبْحَانَ وَالَّذِي # في الاَنْعَامِ لِلْمَكِّيْ عَلَى أَنْ يُنَزِّلَا",
    "وَمُنْزِلُهَا التَّخْفِيفُ حَقٌّ شِفَاؤُهُ # وَخُفِّفَ عَنْهُمْ يُنْزِلُ الْغَيْثَ مُسْجَلَا",
    "وَجِبْرِيلَ فَتْحُ الْجِيمِ وَالرَّا وَبَعْدَهَا # وَعَى هَمْزَةً مَكْسُورَةً صُحْبَةٌ وِلَا",
    "بِحَيْثُ أَتَى وَالْيَاءَ يَحْذِفُ شُعْبَةٌ # وَمَكِيُّهُمْ في الْجِيمِ بالْفَتْحِ وُكِّلَا",
    "وَدَعْ يَاءَ مِيكَائِيلَ وَالْهَمْزَ قَبْلَهُ # عَلَى حُجَّةٍ وَالْيَاءُ يُحْذَفُ أَجْمَلَا",
    "وَلكِنْ خَفَيفٌ وَالشَّيَاطِينُ رَفْعُهُ # كَمَا شَرَطُوا وَالْعَكْسُ نَحْوٌ سَمَا الْعُلاَ",
    "وَنَنْسَخْ بِهِ ضَمٌّ وَكَسْرٌ كَفَى وَنُنْـ # سِهَا مِثْلُهُ مِنْ غَيْرِ هَمْزٍ ذَكَتْ إِلَى",
    "عَلِيمٌ وَقَالُوا الْوَاوُ اْلاُولَى سُقُوطُهَا # وَكُنْ فَيَكُونُ النَّصْبُ في الرَّفْعِ كُفِّلَا",
    "وَفي آلِ عِمْرَانٍ في الاُولَى وَمَرْيَمٍ # وَفِي الطَّوْلِ عَنْهُ وَهْوَ بِاللَّفْظِ أُعْمِلَا",
    "وَفي النَّحْلِ مَعْ يس بِالْعَطْفِ نَصْبُهُ # كَفَى رَاوِيًا وَانْقَادَ مَعْنَاهُ يَعْمَلَا",
    "وَتُسْأَلُ ضَمُّوا التَّاءَ وَالَّلامَ حَرَّكُوا # بِرَفْعٍ خُلُودًا وَهْوَ مِنْ بَعْدِ نَفْيِ لَا",
    "وَفيهاَ وَفي نَصِّ النِّساَءِ ثَلاَثَةٌ # أَوَاخِرُ إَبْرَاهَامَ لَاَحَ وَجَمَّلَا",
    "وَمَعْ آخِرِ الأَنْعَامِ حَرْفَا بَرَاءَةٍ # أَخِيرًا وَتَحْتَ الرَّعْدِ حَرْفٌ تَنَزَّلَا",
    "وَفي مَرْيَمٍ وَالنَّحْلِ خَمْسَةُ أَحْرُفٍ # وَآخِرُ مَا فِي الْعَنْكَبُوتِ مُنَزَّلَا",
    "وَفي النَّجْمَ وَالشُّورَى وَفي الذَّارِيَاتِ وَالْـ # حَدِيدِ وَيَرْوِي في امْتِحَانِهِ الاَوَّلَا",
    "وَوَجْهَانِ فِيهِ لاِبْنِ ذَكْوَانَ هَهُنَا # وَوَاتَّخِذُوا بِالْفَتْحِ عَمَّ وَأَوْغَلَا",
    "وَأَرْنَا وَأَرْنِيْ سَاكِنَا الْكَسْرِ دُمْ يَدًا # وَفي فُصِّلَتْ يُرْوِي صَفًا دَرِّهِ كُلَا",
    "وَأَخْفَاهُمَا طَلْقٌ وَخِفُّ ابْنِ عَامِرٍ # فَأُمْتِعُهُ أَوْصَى بِوَصَّى كَمَا اعْتَلَا",
    "وَفي أَمْ يَقُولُونَ الْخِطَابُ كَمَا عَلاَ # شَفَا وَرَءُوفٌ قَصْرُ صُحْبَتِهِ حَلَا",
    "وَخَاطَبَ عَمَّا يَعْمَلُونَ كَمَا شَفَا # وَلاَمُ مُوَلِّيْهَا عَلَى الْفَتْحِ كُمِّلَا",
    "وَفي يَعْمَلُونَ الْغَيْبُ حَلَّ وَسَاكِنٌ # بِحَرْفَيْهِ يَطَّوَّعْ وَفي الطَّاءِ ثُقِّلاَ",
    "وَفي التَّاءِ يَاءٌ شَاعَ وَالرِّيحَ وَحَّدَا # وَفي الكَهْفِ مَعْهَا وَالشَّرِيعَةِ وَصَّلَا",
    "وَفي النَّمْلِ وَاْلأَعْرَافِ وَالرُّومِ ثَانِيًا # وَفَاطِرِ دُمْ شُكْرًا وَفي الْحِجْرِ فُصِّلَا",
    "وَفي سُورَةِ الشُّورَى وَمِنْ تَحْتِ رَعْدِهِ # خُصُوصٌ وَفي الْفُرْقَانِ زَاكِيهِ هَلَّلَا",
    "وَأَيُّ خِطَابٍ بَعْدُ عَمَّ وَلَوْ تَرَى # وَفي إِذْ يَرَوْنَ الْيَاءُ بِالضَّمِّ كُلِّلَا",
    "وَحَيْثُ أَتَي خُطُوَاتٌ الطَّاءُ سَاكِنٌ # وَقُلْ ضَمُّهُ عَنْ زَاهِدً كَيْفَ رَتَّلَا",
    "وَضَمُّكَ أَولَى السَّاكِنَيْنِ لِثَالِثٍ # يُضَمُّ لُزُومًا كَسْرُهُ فِي نَدٍ حَلَا",
    "قُلِ ادْعُوا أَوِ انْقُصْ قَالَتِ اخْرُجْ أَنِ اعْبُدُوا # وَمَحْظُورًا انْظُرْ مَعْ قَدِ اسْتُهْزِئَ اعْتَلَا",
    "سِوى أَوْ وَقُلْ لاِبْنِ الْعَلاَ وَبِكَسْرِهِ # لِتَنْوِيِنهِ قالَ ابْنُ ذَكْوَانَ مُقْوِلَا",
    "بِخُلْفٍ لَهُ فِي رَحْمَةٍ وَخَبِيثَةٍ # وَرَفْعُكَ لَيْسَ الْبِرُّ يُنْصَبُ فِي عُلَا",
    "وَلكِنْ خَفِيفٌ وَارْفَعِ اْلبِرَّ عَمَّ فِيـ # هِماَ وَمُوَصٍّ ثِقْلُهُ صَحَّ شُلْشُلَا",
    "وَفِدْيَةُ نَوِّنْ وَارْفَعِ الْخَفْضَ بَعْدُ فِي # طَعَامٍ لَدى غُصْنِ دَنَا وَتَذَلَّلَا",
    "مَسَاكِينَ مَجْمُوعًا وَلَيْسَ مُنَوَّنًا # وَيُفْتَحُ مِنْهُ النُّونُ عَمَّ وَأَبْجَلَا",
    "وَنَقْلُ قُرَانٍ وَالْقُرَانِ دَوَاؤُنَا # وَفِي تُكْمِلُوا قُلْ شُعْبَةُ الْمِيمَ ثَقَّلَا",
    "وَكَسْرُ بُيُوتٍ وَالْبُيُوتَ يُضَمُّ عَنْ # حِمَى جِلَّةٍ وَجْهًا عَلَى الأَصْلِ أَقْبَلَا",
    "وَلاَ تَقْتُلُوهُمْ بَعْدَهُ يَقْتُلُوكُمُو # فَإِنْ قَتَلُوكُمْ قَصْرُهاَ شَاعَ وَانْجَلَا",
    "وَبِالرَّفْعِ نَوِّنْهُ فَلاَ رَفَثٌ وَلاَ # فُسُوقٌ وَلاَ حَقًّا وَزَانَ مُحَمَّلاَ",
    "وَفَتْحُك سِينَ السِّلْمِ أَصْلُ رِضًى دَنَا # وَحَتَّى يَقُولَ الرَّفْعُ فِي اللاَّمِ أُوِّلَا",
    "وَفي التَّاء فَاضْمُمْ وَافْتَحِ الْجِيمَ تَرْجِعُ الْ # أُمُورُ سَمَا نَصَّا وَحَيْثُ تَنَزَّلَا",
    "وَإِثْمٌ كَبِيرٌ شَاعَ بِالثَّا مُثَلَّثًا # وَغَيْرُهُمَا بِالَبَاءِ نُقْطَةٌ اسْفَلَا",
    "قُلِ الْعَفْوَ لِلْبَصْرِيِّ رَفْعٌ وَبَعْدَهُ # لأَعْنَتْكُمْ بِالْخُلْفِ أَحْمَدُ سَهَّلَا",
    "وَيَطْهُرْنَ فِي الطَّاءِ السُّكُونُ وَهَاؤُهُ # يُضَمُّ وَخَفَّا إِذْ سَمَا كَيْفَ عُوِّلَا",
    "وَضَمُّ يَخَافاَ فَازَ وَالْكُلُّ أَدْغَمُوا # تُضَارِرْ وَضَمَّ الرَّاءَ حَقٌّ وَذُو جَلَا",
    "وَقَصْرُ أَتَيْتُمْ مِنْ رِبًا وَأَتَيْتمُو # هُنَا دَارَ وَجْهًا لَيْسَ إِلاَ مُبَجَّلَا",
    "مَعًا قَدْرُ حَرِّكْ مِنْ صَحَابٍ وَحَيْثُ جَا # يُضَمُّ تَمَسُّوهُنَّ وَامْدُدْهُ شُلْشُلَا",
    "وَصِيَّةً ارْفَعْ صَفْوُ حِرْمِيِّهِ رِضىً # وَيَبْصُطُ عَنْهُمْ غَيْرَ قُنْبُلِ اعْتَلَا",
    "وَبِالسِّينِ بَاقِيِهِمْ وَفي الْخَلْقِ بَصْطَةً # وَقُلْ فِيهِماَ الوَجْهَانِ قَوْلاَ مُوَصَّلَا",
    "يُضَاعِفَهُ ارْفَعْ فِي الْحَدِيدِ وَهَهُنَا # سَماَ شُكْرُهُ وَالْعَيْنُ في الْكُلِّ ثُقِّلَا",
    "كَماَ دَارَ وَاقْصُرْ مَعْ مُضَعَّفَةٍ وَقُلْ # عَسَيْتُمْ بِكَسْرِ السِّينِ حَيْثُ أَتى انْجَلَا",
    "دِفَاعُ بِهاَ وَالْحَجِّ فَتْحٌ وَسَاكِنٌ # وَقَصْرٌ خُصُوصًا غَرْفَةً ضَمَّ ذُو وِلاِ",
    "وَلاَ بَيْعَ نَوِّنْهُ وَلاَ خُلَّةٌ وَلاَ # شَفَاعَةَ وَارْفَعْهُنَّ ذَا أُِسْوَةٍ تَلَا",
    "وَلاَ لَغْوَ لاَ تَأْثِيمَ لاَ بَيْعَ مَعْ وَلاَ # خِلاَلَ بِإِبْرَاهِيمَ وَالطُّورِ وُصِّلاَ",
    "وَمَدُّ أَناَ في الْوَصْلَ مَعْ ضَمِّ هَمْزَةٍ # وَفَتْحٍ أَتَى وَالْخُلْفُ في الْكَسْرِ بُجِّلَا",
    "وَنُنْشِزُهَا ذَاكٍ وَبِالرَّاءِ غَيْرُهُمْ # وَصِلْ يَتَسَنَّهْ دُونَ هَاءٍ شَمَرْدَلَا",
    "وَبِالْوَصْلِ قَالَ اعْلَمْ مَعَ الْجَزْمِ شَافِعٌ # فَصُرْهُنَّ ضَمُّ الصَّادِ بِالْكَسْرِ فُصِّلَا",
    "وَجُزْءًا وَجُزْءٌ ضَمَّ الاِسْكَانَ صِفْ وَحَيْـ # ثُماَ أُكْلُهَا ذِكْرًا وَفي الْغَيْرِ ذُو حُلَا",
    "وَفي رُبْوَةٍ فِي الْمُؤْمِنِينِ وَههُناَ # عَلَى فَتْحِ ضَمِّ الراءِ نَبَّهْثُ كُفَّلَا",
    "وَفي الْوَصْلِ لِلْبَزِّيِّ شَدِّدْ تَيَمَّمُوا # وَتَاءَ تَوَفَّى فِي النِّسَا عَنْهُ مُجْمِلَا",
    "وَفي آلِ عِمْرَانٍ لَهُ لاَ تَفَرَّقُوا # وَالاَنْعَامُ فِيهاَ فَتَفَرَّقَ مُثِّلَا",
    "وَعِنْدَ الْعُقُودِ التَّاءُ فِي لاَ تَعَاَوَنُوا # وَيَرْوِى ثَلاَثاَ فِي تَلَقَّفُ مُثَّلَا",
    "تَنَزَّلُ عَنْهُ أَرْبَعٌ وَتَنَاصَرُو # نَ نَارًا تَلَظَّى إِذْ تَلَقَّوْنَ ثُقِّلَا",
    "تَكَلَّمُ مَعْ حَرْفَيْ تَوَلَّوْا بِهُودِهاَ # وَفي نُورِهَا وَالإِمْتِحاَنِ وَبَعْدَلَا",
    "فِي الاَنْفَالِ أَيْضًا ثُمَّ فِيهَا تَنَازَعُوا # تَبَرَّجْنَ في الأَحْزَابِ مَعْ أَنْ تَبَدَّلَا",
    "وَفي التَّوْبَةِ الْغَرَّاءِ قُلْ هَلْ تَرَبَّصُو # نَ عَنْهُ وَجَمْعُ السَّاكِنَيْنِ هُنَا انْجَلَى",
    "تَمَيَّزُ يَرْوِي ثُمَّ حَرْفَ تَخَيَّرُو # نَ عَنْهُ تَلَهَّى قَبْلَهُ الْهَاءَ وَصَّلَا",
    "وَفي الْحُجُراتِ التَّاءُ فِي لِتَعَارَفُوا # وَبَعْدَ وَلاَ حَرْفَانِ مِنْ قَبْلِهِ جَلَا",
    "وَكُنْتُمْ تَمَنَّوْنَ الَّذِي مَعْ تَفَكَّهُو # نَ عَنْهُ عَلَى وَجْهَيْنِ فَافْهَمْ مُحَصِّلاَ",
    "نِعِمَّا مَعًا في النُّونِ فَتْحٌ كَمَا شَفَا # وَإِخْفَاءُ كَسْرِ الْعَيْنِ صِيغَ بِهِ حُلَا",
    "وَيَا وَنُكَفِّرْ عَنْ كِرَامٍ وَجَزْمُهُ # أَتَى شَافِيًا وَالْغَيْرُ بِالرَّفْعِ وُكِّلَا",
    "وَيَحْسَبُ كَسْرُ السِّينِ مُسْتَقبِلًا سَمَا # رِضَاهُ وَلَمْ يَلْزَمْ قِيَاسًا مُؤَصَّلَا",
    "وَقُلْ فَأْذَنُوا بِالْمَدِّ وَاكْسِرْ فَتىً صَفَا # وَمَيْسَرَةٍ بِالضَّمِّ في السِّينِ أُصِّلَا",
    "وَتَصَّدَّقُوا خِفٌّ نَمَا تُرْجَعُونَ قُلْ # بِضَمٍّ وَفَتْحٍ عَنْ سِوَى وَلَدِ الْعَلَا",
    "وَفي أَنْ تَضِلَّ الْكَسْرُ فَازَ وَخَفَّفُوا # فَتُذْكِرَ حَقًّا وَارْفَعِ الرَّا فَتَعْدِلَا",
    "تِجَارَةٌ انْصِبْ رَفْعَهُ فِي النِّسَا ثَوَى # وَحَاضِرةٌ مَعْهَا هُنَا عَاصِمٌ تَلَا",
    "وَحَقٌّ رِهَانٍ ضَمُّ كَسْرٍ وَفَتْحَةٍ # وَقَصْرٌ وَيَغْفِرْ مَعْ يُعَذِّبْ سَمَا الْعُلَا",
    "شَذَا الْجَزْمِ وَالتَّوْحِيدُ فِي وَكِتَابِهِ # شَرِيفٌ وَفي التَّحْرِيمِ جَمْعُ حِمىً عَلَا",
    "وَبَيْتِيْ وَعَهْدِيْ فَاذُكُرُونِي مُضَافُهَا # وَرَبِّي وَبِيْ مِنِّيْ وَإِنِّيِ مَعًا حُلَا",
  ]},
  {id:"shat-31",title:"فَرْشُ سُوْرَةِ آلِ عِمْرَانَ",sub:"Sourate Âl 'Imrân",clr:["#0e2e30","#1c5658"],bayts:[
    "وَإِضْجَاعُكَ التَّوْرَاةَ مَا رُدَّ حُسْنُهُ # وَقُلِّلَ فِي جَوْدٍ وَبِالْخُلْفِ بَلَّلَا",
    "وَفي تُغْلَبُونَ الْغَيْبُ مَعْ تُحْشَرُونَ فِي # رِضًا وَتَرَوْنَ الْغَيْبُ خُصَّ وَخُلِّلَا",
    "وَرِضْوَانٌ اضْمُمْ غَيْرَ ثَانِي الْعُقُودِ كَسْـ # ـرَهُ صَحَّ إِنَّ الدِّينَ بِالْفَتْحِ رُفِّلَا",
    "وَفي يُقْتلُونَ الثَّانِ قَالَ يُقَاتِلُو # نَ حَمْزَةُ وَهْوَ الْحَبْرُ سَادَ مُقَتَّلَا",
    "وَفي بَلَدٍ مَيْتٍ مَعَ المَيْتِ خَفَّفُوا # صَفَا نَفَرًا وَالمَيْتَةُ الْخِفُّ خُوِّلاَ",
    "وَمَيْتًا لَدَى الأَنْعَامِ وَالْحُجُرَاتِ خُذْ # وَمَا لَمْ يَمُتْ لِلْكلِّ جَاءَ مُثَقَّلَا",
    "وَكَفَّلَهاَ الْكُوفِيْ ثَقِيلًا وَسَكَّنُوا # وَضَعْتُ وَضَمُّوا سَاكِنًا صَحَّ كُفَّلَا",
    "وَقُلْ زَكَرِيَّا دُونَ هَمْزِ جَمِيعِهِ # صِحَابٌ وَرَفْعٌ غَيْرُ شُعْبَةَ الاُوَّلَا",
    "وَذَكِّرْ فَنَادَاهُ وأَضْجِعْهُ شَاهِدًا # وَمِنْ بَعْدُ أَنَّ اللهَ يُكْسَرُ فِي كِلَا",
    "مَعَ الْكَهْفِ وَالإِسْرَاءِ يَبْشُرُ كَمْ سَمَا # نَعَمْ ضُمَّ حَرِّكْ وَاكْسِرِ الضَّمَّ أَثْقَلَا",
    "نعَمْ عَمَّ فِي الشُّورَى وَفي التَّوْبَةِ اعْكِسُوا # لِحَمْزَةَ مَعْ كَافٍ مَعَ الْحِجْرِ أَوَّلَا",
    "نُعَلِّمُهُ بِالْيَاءِ نَصُّ أَئِمَّةٍ # وَبِالْكَسْرِ أَنِّيْ أَخْلُقُ اعْتَادَ أَفْصَلَا",
    "وَفِي طَائِرًا طَيْرًا بِهاَ وَعُقُودِهاَ # خُصُوصًا وَيَاءٌ فِي نُوَفِّيهِمُ عَلَا",
    "وَلاَ أَلِفٌ فِي هَا هَأَنْتُمْ زَكاَ جَنًا # وَسَهِّلْ أَخاَ حَمْدٍ وَكَمْ مُبْدِلٍ جَلَا",
    "وَفي هَائِهِ التَّنْبِيهُ مِنْ ثَابِتٍ هُدىً # وَإِبْدَالُهُ مِنْ هَمْزَةٍ زَانَ جَمَّلَا",
    "وَيَحْتَمِلُ الْوَجْهَيْنِ عَنْ غَيْرِهِمْ وَكَمْ # وَجِيهٍ بِهِ الْوَجْهَيْنِ لِلْكُلِّ حَمَّلَا",
    "وَيَقْصُرُ فِي التنْبِيهِ ذُو الْقَصْرِ مَذْهَبًا # وَذُو الْبَدَلِ الْوَجْهاَنِ عَنْهُ مُسَهِّلا",
    "وَضُمَّ وَحَرِّكْ تَعْلَمُونَ الْكِتَابَ مَعْ # مُشَدَّدَةٍ مِنْ بَعْدُ بِالْكَسْرِ ذُلِّلَا",
    "وَرَفْعُ وَلاَ يَأْمُرْكُمُو رُوحُهُ سَماَ # وَبِالتَّاءِ آتَيْناَ مَعَ الضَّمِّ خُوِّلَا",
    "وَكَسْرُ لِماَ فِيهِ وَبِالْغَيْبِ تُرْجَعُو # نَ عَادَ وَفيِ تَبْغُونَ حَاكِيهِ عَوَّلاَ",
    "وَبِالْكَسْرِ حَجُّ الْبَيْتِ عَنْ شَاهِدٍ وَغَيْـ # ـبُ مَا تَفْعَلُوا لَنْ تُكْفَرُوهُ لَهُمْ تَلَا",
    "يَضِرْكُمْ بِكَسْرِ الضَّادِ مَعْ جَزْمِ رَائِهِ # سَماَ وَيَضُمُّ الْغَيْرُ وَالرَّاءَ ثَقَّلَا",
    "وَفِيماَ هُناَ قُلْ مُنْزِلِينَ وَمُنْزِلُو # نَ لِلْيَحْصَبِي فِي الْعَنْكَبُوتِ مُثَقِّلَا",
    "وَحَقُّ نَصِيرٍ كَسْرُ وَاوِ مُسَوِّمِيـ # ـنَ قُلْ سَارِعُوا لاَ وَاوَ قَبْلُ كَماَ انْجَلَى",
    "وَقَرْحٌ بِضَمِّ الْقَافِ وَالْقَرْحُ صُحْبَةٌ # وَمَعْ مَدِّ كَائِنْ كَسْرُ هَمْزَتِهِ دَلَا",
    "وَلاَ يَاءَ مَكْسُورًا وَقَاتَلَ بَعْدَهُ # يُمَدُّ وَفَتْحُ الضَّمِّ وَالْكَسْرِ ذُو وِلَا",
    "وَحُرِّكَ عَيْنُ الرُّعْبِ ضَمَّا كَمَا رَسَا # وَرُعْبًا وَيَغْشَى أَنَّثُوا شَائِعًا تَلَا",
    "وَقُلْ كُلَّهُ للهِ بِالرَّفْعِ حَامِدًا # بِمَا يَعْمَلُونَ الْغَيْبُ شَايَعَ دُخْلُلَا",
    "وَمِتُّمْ وَمِتْناَ مُتَّ فِي ضَمِّ كَسْرِهاَ # صَفَا نَفَرٌ وِرْدًا وَحَفْصٌ هُناَ اجْتَلَا",
    "وَبِالْغَيْبِ عَنْهُ تَجْمَعُونَ وَضُمَّ فِي # يَغُلَّ وَفَتْحُ الضَّمِّ إِذْ شَاعَ كُفِّلَا",
    "بِمَا قُتِلُوا التَّشْدِيدُ لَبَّى وَبَعْدَهُ # وَفي الْحَجِّ لِلشَّامِيْ وَالآخِرُ كَمَّلَا",
    "دَرَاكِ وَقَدْ قَالاَ فِي الاَنْعَامِ قَتَّلُوا # وَبِالْخُلْفِ غَيْبًا يَحْسَبَنَّ لَهُ وَلَا",
    "وَأَنَّ اكْسِرُوا رِفْقًا وَيَحْزُنُ غَيْرَ اْلاَنْـ # ـبِيَاءِ بِضَمٍّ وَاكْسِرِ الضَّمَّ أَحْفَلَا",
    "وَخَاطَبَ حَرْفَا يَحْسِبَنَّ فَخُذْ وَقُلْ # بِمَا يَعْمَلُونَ الْغَيْبُ حَقٌّ وَذُو مَلَا",
    "يَمِيزَ مَعَ الأنْفَالِ فَاكْسِرْ سُكُونَهُ # وَشَدِّدْهُ بَعْدَ الْفَتْحِ وَالضَّمِّ شُلْشُلاَ",
    "سَنَكْتُبُ يَاءٌ ضُمَّ مَعْ فَتْحِ ضَمِّهِ # وَقَتْلَ ارْفَعُوا مَعْ يَا نَقُولُ فَيَكْمُلَا",
    "وَبِالزُّبُرِ الشَّامِيْ كَذَا رَسْمُهُمْ وَبِالْـ # كِتَابِ هِشَامٌ وَاكْشِفِ الرَّسْمَ مُجْمِلَا",
    "صَفَا حَقُّ غَيْبٍ يَكْتُمُونَ يُبَيِّنُنْنَ # لاَ تَحْسَبَنَّ الْغَيْبُ كَيْفَ سَمَا اعْتَلَا",
    "وَحَقَّا بِضَمِّ الْبَا فَلاَ يَحْسِبُنَّهُمْ # وَغَيْبٍ وَفِيهِ الْعَطْفُ أَوْ جَاءَ مُبْدَلَا",
    "هُناَ قَاتَلُوا أَخِّرْ شِفَاءً وَبَعْدُ فِي # بَرَاءةَ أَخِّرْ يَقْتُلُونَ شَمَرْدَلَا",
    "وَيَاآتُها وَجْهِيْ وَإِنِّيْ كِلاَهُمَا # وَمِنِّيَ وَاجْعَلْ لِيْ وَأَنْصَاريَ الْمِلَا",
  ]},
  {id:"shat-32",title:"سُوْرَةُ النِّسَاءِ",sub:"Sourate An-Nisâ'",clr:["#0a2030","#134560"],bayts:[
    "وَكُوفِيُّهُمْ تَسَّاءَلُونَ مُخَفَّفًا # وَحَمْزَةُ وَالأَرْحَامَ بِالْخَفْضِ جَمَّلَا",
    "وَقَصْرُ قِيَامًا عَمَّ يَصْلَوْنَ ضُمَّ كَمْ # صَفَا نَافِعٌ بِالرَّفْعِ وَاحِدَةً جَلَا",
    "وَيُوصَى بِفَتْحِ الصَّادِ صَحَّ كَمَا دَنَا # وَوَافَقَ حَفْصٌ فِي الأَخِيرِ مُجَمَّلَا",
    "وَفِي أُمًّ مَعْ فِي أُمِّهَا فَلأُمِّهِ # لَدَى الْوَصْلِ ضَمُّ الهَمْزِ بِالْكَسْرِ شَمْلَلَا",
    "وَفي أُمَّهَاتِ النَّحْلِ وَالنُّورِ وَالزُّمَرْ # مَعَ النَّجْمِ شَافٍ وَاكْسِرِ الْمِيمَ فَيْصَلَا",
    "وَنُدْخِلْهُ نُونٌ مَعْ طَلاَقٍ وَفَوْقُ مَعْ # نُكَفِّرْ نُعَذِّبْ مَعْهُ في الْفَتْحِ إِذْ كَلَا",
    "وَهذَانِ هاتَيْنِ الَّلذَانِ الَّلذَيْنِ قُلْ # يُشَدَّدُ لِلْمَكِّيْ فَذَانِكَ دُمْ حَلَا",
    "وَضَمَّ هُنَا كَرْهًا وَعِنْدَ بَرَاءةٍ # شِهَابٌ وَفي الأَحْقَافِ ثُبِّتَ مَعْقِلَا",
    "وَفي الْكُلِّ فَافْتَحْ يَا مُبَيِّنَةٍ دَنَا # صَحِيحًا وَكَسْرُ الْجَمْعِ كَمْ شَرَفًا عَلاَ",
    "وَفي مُحْصَنَاتٍ فاكْسِرِ الصَّادَ رَاوِيًا # وَفي المُحْصَنَاتِ اكْسِرْ لَهُ غَيْرَ أَوَّلَا",
    "وَضَمٌّ وَكَسْرٌ فِي أَحَلَّ صِحَابُهُ # وُجُوهٌ وَفِي أَحْصَنَّ عَنْ نَفَرِ الْعُلَا",
    "مَعَ الْحَجِّ ضَمُّوا مَدْخَلًا خَصَّهُ وَسَلْ # فَسَلْ حَرَّكُوا بِالنَّقْلِ رَاشِدُهُ دَلَا",
    "وَفي عَاقَدَتْ قَصْرٌ ثَوَى وَمَعَ الْحَدِيـ # ـدِ فَتْحُ سُكُونِ الْبُخْلِ وَالضَّمِّ شَمْلَلَا",
    "وَفي حَسَنَهْ حِرْمِيُّ رَفْعٍ وَضَمُّهُمْ # تَسَوَّى نَماَ حَقًّا وَعَمَّ مُثَقَّلَا",
    "وَلاَمَسْتُمُ اقْصُرْ تَحْتَهاَ وَبِهاَ شَفاَ # وَرَفْعُ قَلِيلٌ مِنْهُمُ النَّصْبَ كُلِّلَا",
    "وَأَنِّثْ يَكُنْ عَنْ دَارِمٍ تُظْلَمُونَ غَيْـ # ـبُ شُهْدٍ دَنَا إِدْغَامُ بَيَّتَ فِي حُلَا",
    "وَإِشْمَامُ صَادٍ سَاكِنٍ قَبْلَ دَالِهِ # كَأَصْدَقُ زَايًا شَاعَ وَارْتَاحَ أَشْمُلَا",
    "وَفِيهَا وَتَحْتَ الْفَتْحِ قُلْ فَتَثَبَّتُوا # مِنَ الثَّبْتِ وَالْغَيْرُ الْبَيَانَ تَبَدَّلَا",
    "وَعَمَّ فَتًى قَصْرُ السَّلاَمَ مُؤَخَّرًا # وَغَيْرَ أُولِيْ بِالرَّفْعِ فِى حَقِّ نَهْشَلَا",
    "وَنُؤْتِيهِ بِالْيَا فِى حِمَاهُ وَضَمُّ يَدْ # خُلُونَ وَفَتحُ الضَّمِّ حَقٌّ صِرًى حَلَا",
    "وَفي مَرْيَمٍ وَالطَّوْلِ الاَوَّلِ عَنْهُمُ # وَفِي الثَّانِ دُمْ صَفْوًا وَفِي فَاطِرٍ حَلَا",
    "وَيَصَّالَحَا فَاضْمُمْ وَسَكِّنْ مُخَفِّفًا # مَعَ الْقَصْرِ وَاكْسِرْ لاَمَهُ ثَابِتًا تَلَا",
    "وَتَلْوُوا بِحَذْفِ الْوَاوِ الاُولى وَلاَمَهُ # فَضُمَّ سُكُونًا لَسْتَ فِيهِ مُجْهَّلَا",
    "وَنُزِّلَ فَتْحُ الضَّمِّ وَالْكَسْرِ حِصْنُهُ # وَأُنْزِلَ عَنْهُمْ عَاصِمٌ بَعْدُ نُزِّلاَ",
    "وَيَا سَوْفَ تُؤْتِيِهِمْ عَزيزٌ وَحَمْزَةٌ # سَيُؤتِيهِمُ فِي الدَّرْكِ كُوفٍ تَحَمَّلَا",
    "بِالاِسْكَانِ تَعْدُوا سَكِّنُوهُ وَخَفِّفُوا # خُصُوصًا وَأَخْفَى الْعَيْنَ قَالُونُ مُسْهِلَا",
    "وَفي الانْبِياَ ضَمُّ الزَّبُورِ وَههُناَ # زَبُورًا وَفي الإِسْراَ لِحَمْزَةَ أُسْجِلَا",
  ]},
  {id:"shat-33",title:"سُوْرَةُ الْمَائِدَةِ",sub:"Sourate Al-Mâ'ida",clr:["#0a2a2e","#124a4f"],bayts:[
    "وَسَكِّنْ مَعًا شَنَآنُ صَحَّا كِلاَهُمَا # وَفي كَسْرِ أَنَ صَدُّوكمْ حَامِدٌ دَلَا",
    "مَعَ الْقَصْرِ شَدِّدْ يَاءَ قَاسِيَةً شَفَا # وَأَرْجُلِكُمْ بِالنَّصْبِ عَمَّ رِضًا عَلَا",
    "وَفي رُسُلُنَا مَعْ رُسْلُكُم ثُمَّ رُسْلُهُمْ # وَفي سُبْلَنَا فِي الضَّمِّ الاِسْكَانُ حُصِّلَا",
    "وَفِي كَلِمَاتِ السُّحْتِ عَمَّ نُهَى فَتًى # وَكَيْفَ أَتى أُذْنٌ بِهِ نَافِعٌ تَلَا",
    "وَرُحْمًا سِوَى الشَّامِي وَنُذْرًا صِحَابُهُمْ # حَمَوْهُ وَنُكْرًا شَرْعُ حَقٍ لَهُ عُلَا",
    "وَنُكْرٍ دَنَا وَالْعَيْنُ فَارْفَعْ وَعَطْفَهَا # رِضىً وَالْجُرُوحَ ارْفَعْ رِضى نَفَرٍ مَلَا",
    "وَحَمْزَةُ وَلْيَحْكُمْ بِكَسْرٍ وَنَصْبِهِ # يُحَرِّكُهُ يَبْغُونَ خَاطَبَ كُمَّلَا",
    "وَقَبْلَ يَقُولَ الْوَاوُ غصْنٌ وَرَافِعٌ # سِوَى ابْنِ الْعَلاَ مَنْ يَرْتَدِدْ عَمَّ مُرْسَلَا",
    "وَحُرِّكَ بِالإِدْغَامِ لِلْغَيْرِ دَالُهُ # وَبِالْخَفْضِ وَالْكُفَّارَ رَاوِيهِ حَصَّلَا",
    "وَبَا عَبَدَ اضْمُمْ واَخْفِضِ التَّا بَعْدُ فُزْ # رِسَالَتَهُ اجْمَعْ وَاكْسِرِ التَّا كَمَا اعْتَلَا",
    "صَفَا وَتَكُونُ الرَّفْعُ حَجَّ شُهُودُهُ # وَعَقَّدْتُمُ التَّخْفِيفُ مِنْ صُحْبَةٍ وِلَا",
    "وَفي الْعَيْنِ فَامْدُدْ مُقْسِطًا فَجَزَاءُ نَوْ # وِّنُوا مِثْلُ مَا فِي خَفْضِهِ الرَّفْعُ ثُمَّلاَ",
    "وَكَفَّارَةٌ نَوِّنْ طَعاَمِ بَرَفْعِ خَفْـ # ـضِهِ دُمْ غِنىً وَاقْصُرْ قِيَامًا لَهُ مُلَا",
    "وَضَمَّ اسْتُحِقَّ افْتَحْ لَحِفْصٍ وَكَسْرَهُ # وَفي الأَوْلَياَنِ الأَوَّلِينَ فَطِبْ صِلَا",
    "وَضَمَّ الْغُيُوبِ يَكْسِرَانِ عُيُونًا الْـ # ـعُيُونِ شُيُوخًا دَانَهُ صُحْبَهٌ مِلَا",
    "جُيُوبِ مُنِيرٌ دُونَ شَكٍّ وَسَاحِرٌ # بِسِحْرٌ بِهاَ مَعْ هُودَ وَالصَّفِّ شَمْلَلَا",
    "وَخَاطَبَ فِي هَلْ يَسْتَطِيعُ رُوَاتُهُ # وَرَبُّكَ رَفْعُ الْبَاءِ بِالنَّصْبَ رُتِّلَا",
    "وَيَوْمَ بِرَفْعٍ خُذْ وَإِنِّي ثَلاَثُهاَ # وَلِي وَيَدِيْ أُمِّيْ مُضَافَاتُهاَ الْعُلَا",
  ]},
  {id:"shat-34",title:"سُوْرَةُ الأَنْعَامِ",sub:"Sourate Al-An'âm",clr:["#0a2438","#123f5c"],bayts:[
    "وَصُحْبَةُ يُصْرَفْ فَتْحُ ضَمٍّ وَرَاؤُهُ # بِكَسْرٍ وَذَكِّرْ لَمْ يَكُنْ شَاعَ وَانْجَلَا",
    "وَفِتْنَتُهُمْ بالرَّفْعِ عَنْ دِينِ كَامِلٍ # وَبَا رَبِّناَ بِالنَّصْبِ شَرَّفَ وُصَّلَا",
    "نُكَذِّبُ نَصْبُ الرَّفْعِ فَازَ عَلِيمُهُ # وَفِي وَنَكُونَ انْصِبْهُ فِي كَسْبِهِ عُلَا",
    "وَلَلدَّارُ حَذْفُ اللاَّمِ الاُخْرَى ابْنُ عَامِرٍ # وَالآخِرَةُ المَرْفُوعُ بِالْخِفْضِ وُكِّلَا",
    "وَعَمَّ عُلًا لاَ يَعْقِلُونَ وَتَحْتَهاَ # خِطاَبًا وَقُلْ فَي يُوسُفٍ عَمَّ نَيْطَلَا",
    "وَيَاسِينَ مِنْ أَصْلٍ وَلاَ يُكْذِبُونَكَ الْـ # خَفِيفُ أَتى رُحْبًا وَطَابَ تأَوُّلَا",
    "أَرَيْتَ فِي الاِسْتِفْهَامِ لاَ عَيْنَ رَاجِعٌ # وَعَنْ نَافِعٍ سَهِّلْ وَكَمْ مُبْدِلٍ جَلَا",
    "إِذَا فُتِحَتْ شَدِّدْ لِشَامٍ وَهَهُنَا # فَتَحْناَ وَفِي الأَعْرَافِ وَاقْتَرَبَتْ كِلَا",
    "وَبِالْغُدْوَةِ الشَّامِيُّ بِالضَّمِّ ههُناَ # وَعَنْ أَلِفٍ وَاوٌ وَفِي الْكَهْفِ وَصَّلاَ",
    "وَإِنَّ بِفَتْحٍ عَمَّ نَصْرًا وَبَعْدُ كَمْ # نَماَ يَسْتَبِينَ صُحْبَةٌ ذَكَّرُوا وِلَا",
    "سَبِيلَ بِرَفْعٍ خُذْ وَيَقْضِ بِضَمِّ سَا # كِنٍ مَعَ ضَمِّ الْكَسْرِ شَدِّدْ وَأَهْمِلَا",
    "نَعَمْ دُونَ إِلْبَاسٍ وَذكَّرَ مُضْجِعًا # تَوَفَّاهُ وَاسْتَهْوَاهُ حَمْزَةُ مُنْسِلَا",
    "مَعًا خُفيَةً فِي ضَمِّهِ كَسْرُ شُعْبَةٍ # وَأَنْجَيْتَ لِلْكًوِفِيِّ أَنْجَى تَحَوَّلَا",
    "قُلِ اللهُ يُنْجِيكُمْ يُثَقِّلُ مَعْهُمُ # هِشَامٌ وَشَامٍ يُنْسِيَنَّكَ ثَقَّلَا",
    "وَحَرْفَيْ رَأَى كُلًاّ أَمِلْ مُزْنَ صُحْبَةٍ # وَفِي هَمْزِهِ حُسْنٌ وَفِي الرَّاءِ يُجْتَلَا",
    "بِخُلْفٍ وَخُلْفٌ فِيهِماَ مَعَ مُضْمِرٍ # مُصِيبٌ وَعَنْ عُثْمَانَ في الْكُلِّ قَلِّلَا",
    "وَقَبلَ السُّكُونِ الرَّا أَمِلْ فِي صَفاَ يَدٍ # بِخُلْفٍ وَقُلْ فِي الْهَمْزِ خُلْفٌ يَقِي صِلَا",
    "وَقِفْ فِيهِ كَالأُولَى وَنَحْوُ رَأَتْ رَأَوْا # رَأَيْتَ بِفَتْحِ الْكُلِّ وَقْفًا وَمَوْصِلَا",
    "وَخَفِّفَ نُونًا قَبْلَ فِي اللهِ مَنْ لَهُ # بِخُلْفٍ أَتى وَالْحَذْفُ لَمْ يَكُ أَوَّلَا",
    "وَفي دَرَجَاتِ النُّونُ مَعْ يُوسُفٍ # ثَوَى وَوَالَّليْسَعَ الْحَرْفاَنِ حَرِّكْ مُثَقِّلَا",
    "وَسَكِّنْ شِفَاءً وَاقْتَدِهْ حَذْفُ هَائِهِ # شِفَاءً وَبِالتَّحْرِيكِ بِالْكَسْرِ كُفِّلَا",
    "وَمُدَّ بِخُلْفٍ مَاجَ وَالْكُلُّ وَاقِفٌ # بِإِسْكَانِهِ يَذْكُو عَبِيرًا وَمَنْدَلَا",
    "وَتُبْدُونَهَا تُخْفُونَ مَعْ تَجْعَلُونَهُ # عَلَى غَيْبِهِ حَقًّا وَيُنْذِرُ صَنْدَلَا",
    "وَبَيْنَكُمُ ارْفَعْ فِي صَفَا نَفَرٍ وَجَا # عِلُ اقْصُرْ وَفَتْحُ الْكَسْرِ وَالرَّفْعِ ثُمِّلاَ",
    "وَعَنْهُمْ بِنَصْبِ اللَّيْلِ وَاكْسِرْ بِمُسْتَقَرْ # رٌ الْقَافَ حَقًّا خَرَّقُوا ثِقْلُهُ انْجَلَا",
    "وَضَمَّانِ مَعْ يَاسِينَ فِي ثَمَرٍ شَفَا # وَدَارَسْتَ حَقٌّ مَدُّهُ وَلَقَدْ حَلَا",
    "وَحَرِّكْ وَسَكنْ كَافِيًا وَاكْسِر اَنَّهَا # حِمى صَوْبِهِ بِالْخُلْفِ دَرَّ وَأَوْبَلَا",
    "وَخَاطَبَ فِيهَا يُؤْمِنُونَ كَمَا فَشَا # وَصُحْبَةُ كُفْؤٍ فِي الشَّرِيعَةِ وَصَّلَا",
    "وَكَسْرٌ وَفَتْحٌ ضُمَّ فِي قِبَلًا حَمَى # ظَهِيرًا وَلِلْكُوفِيِّ فِي الْكَهْفِ وُصِّلَا",
    "وَقُلْ كَلِماَتٌ دُونَ مَا أَلِفٍ ثَوَى # وَفي يُونُسٍ وَالطَّوْلِ حَامِيهِ ظَلَّلَا",
    "وَشَدَّدَ حَفْصٌ مُنْزَلٌ وَابْنُ عَامِرٍ # وَحُرِّمَ فَتْحُ الضَّمِّ وَالْكَسْرِ إذْ عَلَا",
    "وَفُصِّلَ إِذْ ثَنَّى يَضِلُّونَ ضَمَّ مَعْ # يَضِلُّوا الَّذِي فِي يُونُسٍ ثَاِبتًا وَلَا",
    "رِسَالاَتِ فَرْدٌ وَافْتَحُوا دُونَ عِلَّةٍ # وَضَيْقًا مَعَ الْفُرْقَانِ حَرِّكُ مُثْقِلَا",
    "بِكَسْرٍ سِوَى المَكِّيْ وَرَا حَرَجًا هُنَا # عَلَى كَسْرِهَا إلْفٌ صَفَا وَتَوَسَّلَا",
    "وَيَصْعَدُ خِفٌّ سَاكِنٌ دُمْ وَمَدُّهُ # صَحِيحٌ وَخِفُّ الْعَيْنِ دَاوَمَ صَنْدَلَا",
    "ونَحْشُرَ مَعْ ثَانٍ بِيُونُسَ وَهُوَ فِي # سَبَأَ مَعْ نَقُولُ الْيَا فِي الأَرْبَعِ عُمِّلَا",
    "وَخَاطَبَ شَامٍ يَعْلَمُونَ وَمَنْ تَكُو # نُ فِيهَا وَتَحْتَ النَّمْلِ ذَكِّرْهُ شُلْشُلَا",
    "مَكَانَاتِ مَدَّ النُّونَ فِي الْكُلِّ شعْبَةٌ # بِزَعْمِهِمُ الْحَرْفَانِ بِالضَّمِّ رُتِّلَا",
    "وَزَيَّنَ فِي ضَمٍّ وَكَسْرٍ وَرَفْعُ قَتْـ # لَ أَوْلاَدِهِمْ بِالنَّصْبِ شَامِيُّهُمْ تَلَا",
    "وَيُخْفَضُ عَنْهُ الرَّفْعُ فِي شُرَكَاؤُهُمْ # وَفِي مُصْحَفِ الشَّامِينَ بِالْيَاءِ مُثِّلاَ",
    "وَمَفْعُولُهُ بَيْنَ المُضَافَيْنِ فَاصِلٌ # وَلَمْ يُلْفَ غَيْرُ الظُرْفِ فِي الشِّعْرِ فَيْصَلَا",
    "كَلِلَّهِ دَرُّ الْيَوْمَ مَنْ لاَمَهَا فَلاَ # تَلُمْ مِنْ مُلِيمِي النَّحْوِ إِلاَّ مُجَهِّلَا",
    "وَمَعْ رَسْمِهِ زَجَّ الْقَلُوصَ أَبِي مَزَا # دَةَ اْلأَخْفَشُ النَّحْوِيُّ أَنْشَدَ مُجْمِلَا",
    "وَإِنْ يَكُن اَنِّثْ كُفْؤَ صِدْقٍ وَمَيْتَةٌ # دَنَا كَافِيًا وَافْتَحْ حِصَادِ كَذِي حُلَا",
    "نَمَا وَسُكُونُ المَعْزِ حِصْنٌ وَأَنَّثُوا # يَكُونُ كَمَا فِي دِينِهِمْ مَيْتَةٌ كَلَا",
    "وَتَذَّكَّرُونَ الْكُلُّ خَفَّ عَلَى شَذَا # وَأَنَّ اكْسِرُوا شَرْعًا وَبِالْخِفِّ كُمِّلَا",
    "وَيَأْتِيَهُمْ شَافٍ مَعَ النَّحْلِ فَارَقُوا # مَعَ الرُّومِ مَدَّاهُ خَفِيفًا وَعَدَّلَا",
    "وَكَسْرٌ وَفَتْحٌ خَفَّ فِي قِيَمًا ذَكَا # وَيَاآتُهَا وَجْهِيْ مَمَاتِيَ مُقْبِلَا",
    "وَرَبِّيْ صِرَاطِيْ ثُمَّ إِنِّيْ ثَلاَثَةٌ # وَمَحْيَايَ وَالإِسْكَانُ صَحَّ تَحَمُّلَا",
  ]},
  {id:"shat-35",title:"سُوْرَةُ الأَعْرَافِ",sub:"Sourate Al-A'râf",clr:["#0c2f35","#155a5e"],bayts:[
    "وَتَذَّكَّرُونَ الْغَيْبَ زِدْ قَبْلَ تَائِهِ # كَرِيمًا وَخِفُّ الذَّالِ كَمْ شَرَفًا عَلَا",
    "مَعَ الزُّخْرُفِ اعْكِسْ تُخْرَجُونَ بِفَتْحَةٍ # وَضَمٍّ وَأُولَى الرُّومِ شَافِيهِ مُثِّلَا",
    "بِخُلْفٍ مَضَى فِي الرُّومِ لاَ يَخْرُجُونَ فِي # رِضًا وَلِباَسُ الرَّفْعُ فِي حَقِّ نَهْشَلَا",
    "وَخَالِصَةٌ أَصْلٌ وَلاَ يَعْلَمُونَ قُلْ # لِشُعْبَةَ فِي الثَّانِي وَيُفْتَحُ شَمْلَلَا",
    "وَخَفِّفْ شَفَا حُكْمًا وَماَ الْوَاوَ دَعْ كَفَى # وَحَيْثُ نَعَمْ بِالْكَسْرِ فِي الْعَيْنِ رُتِّلَا",
    "وَأَنْ لَعْنَةُ التَّخْفِيفُ وَالرَّفْعُ نَصُّهُ # سَماَ مَا خَلاَ الْبَزِّي وَفِي النُّورِ أُوصِلاَ",
    "وَيُغْشِي بِهاَ وَالرَّعْدِ ثَقَّلَ صُحْبَةٌ # وَوَالشَّمْسُ مَعْ عَطْفِ الثَّلاَثَةِ كَمَّلَا",
    "وَفِي النَّحْلِ مَعْهُ فِي الأَخِيرَيْنِ حَفْصُهُمْ # وَنُشْرًا سُكُونُ الضَّمِّ فِي الْكُلِّ ذَلِّلَا",
    "وَفي النُّونِ فَتْحُ الضمِّ شَافٍ وَعَاصِمٌ # رَوى نُونَهُ بِالْبَاءِ نُقْطَةٌ اَسْفَلَا",
    "وَرَا مِنْ إِلهٍ غَيْرُهُ خَفْضُ رَفْعِهِ # بِكُلٍّ رَسَا وَالْخِفُّ أُبْلِغُكُمْ حَلَا",
    "مَعَ اَحْقَافِهاَ وَالْوَاوَ زِدْ بَعْدَ مُفْسِدِ # يْنَ كُفْؤًا وَبِالإِخْبَارِ إِنَّكُمُو عَلَا",
    "أَلاَ وعَلَى الحِرْمِيُّ إنَّ لَنَا هُنَا # وَأَوْ أَمِنَ الإسْكَانَ حَرْمِيُّهُ كَلا",
    "عَلَيَّ عَلَى خَصُّوا وَفي سَاحِرٍ بِهَا # وَيُونُسَ سَحَّارٍ شَفَا وتَسَلْسَلَا",
    "وَفِي الْكُلِّ تَلْقَفْ خِفُّ حَفْصٍ وَضُمَّ فِي # سَنَقْتُلُ وَاكْسِرْ ضَمَّهُ مُتَثَقِّلَا",
    "وَحَرِّكْ ذَكَا حُسْنٍ وَفِي يَقْتُلُونَ خُذْ # مَعًا يَعْرِشُونَ الْكَسْرُ ضُمَّ كَذِي صِلَا",
    "وَفي يَعْكُفُونَ الضَّمُّ يُكْسَرُ شَافِيًا # وَأَنْجَى بِحَذْفِ الْيَاءِ وَالنُّونِ كُفِّلَا",
    "وَدَكَّاءَ لاَ تَنْوِينَ وَامْدُدْهُ هَامِزًا # شَفَا وَعَنِ الْكُوفِيِّ فِي الْكَهْفِ وُصِّلَا",
    "وَجَمْعُ رسَالاَتِي حَمَتْهُ ذُكُورُهُ # وَفي الرُّشْدِ حَرِّكْ وَافْتَحِ الضَّمَّ شُلْشُلَا",
    "وَفِي الْكَهْفِ حُسْنَاهُ وَضَمُّ حُلِيِّهِمْ # بَكَسْرٍ شَفَا وَافٍ وَالاِتْبَاعُ ذُو حُلَا",
    "وَخَاطَبَ يَرْحَمْنَا وَيَغْفِرْ لَنَا شَذًا # وَبَا رَبَّنَا رَفْعٌ لِغَيْرِهِمَا انْجَلَا",
    "وَمِيمَ ابْنَ أُمَّ اكْسِرْ مَعًا كُفْؤَ صُحْبَةٍ # وَآصَارَهُمْ بِالْجَمْعِ وَالْمَدِّ كُلِّلاَ",
    "خَطِيئَاتُكُمْ وَحِّدَهُ عَنْهُ وَرَفْعُهُ # كَمَا أَلَّفُوا وَالْغَيْرُ بِالْكَسْرِ عَدَّلَا",
    "وَلكِنْ خَطَايَا حَجَّ فِيهَا وَنُوحِهَا # وَمَعْذِرَةً رَفْعٌ سِوَى حَفْصِهمْ تَلَا",
    "وَبِيسٍ بِيَاءٍ أَمَّ وَالْهَمْزُ كَهْفُهُ # وَمِثْلَ رَئِيْسٍ غَيْرُ هذَيْنِ عَوَّلَا",
    "وَبَيْئَسٍ اَسْكِنْ بَيْنَ فَتْحَيْنِ صَادِقًا # بِخُلْفٍ وَخَفِّفْ يُمْسِكُونَ صَفَا وِلَا",
    "وَيَقْصُرُ ذُرِّيَّاتِ مَعْ فَتْحِ تَائِهِ # وَفِي الطُّورِ فِي الثَّانِي ظَهِيرٌ تَحَمَّلَا",
    "وَيَاسِينَ دُمْ غُصْنًا وَيُكْسَرُ رَفْعُ أَوْ # وَّلِ الطُّورِ لِلْبَصْرِيْ وَبِالْمَدِّ كَمْ حَلَا",
    "يَقُولُوا مَعًا غَيْبٌ حَمِيدٌ وَحُيْثُ يُلْـ # ـحِدُونَ بِفَتْحِ الضمِّ وَالْكَسْرِ فُصِّلَا",
    "وَفِي النَّحْلِ وَالاَهُ الْكِسَائِيْ وَجَزْمُهُمْ # يَذَرْهُمْ شَفَا وَالْيَاءُ غُصْنٌ تَهَدَّلَا",
    "وَحَرِّكْ وَضُمَّ الْكَسْرَ وَامْدُدْهُ هَامِزًا # وَلاَ نُونَ شِرْكًا عَنْ شَذَا نَفَرٍ مِلَا",
    "وَلاَ يَتْبَعُوكُمْ خَفَّ مَعْ فَتْحِ بَائِهِ # وَيَتْبَعُهُمْ فِي الظُّلَّةِ احْتَلَّ وَاعْتَلَا",
    "وَقُلْ طَائِفٌ طَيْفٌ رِضىً حَقُّهُ وَيَا # يَمُدُّونَ فَاضْمُمْ وَاكْسِرِ الضَّمَّ أَعْدَلَا",
    "وَرَبِّيْ مَعِيْ بَعْدِيْ وَإِنِّيْ كِلاَهُمَا # عَذَابِيَ آيَاتِيْ مُضَافَاتُهَا الْعُلَا",
  ]},
  {id:"shat-36",title:"سُوْرَةُ الأَنْفَالِ",sub:"Sourate Al-Anfâl",clr:["#0a1f3a","#153a63"],bayts:[
    "وَفِي مُرْدِفِينَ الدَّالَ يَفْتَحُ نَافِعٌ # وَعَنْ قُنْبُلٍ يُرْوَى وَلَيْسَ مُعَوَّلَا",
    "وَيُغْشِي سَمَا خِفًّا وَفِي ضَمِّهِ افْتَحُوا # وَفِي الْكَسْرِ حَقًّا وَالنُّعَاسَ ارْفَعُوا وِلَا",
    "وَتَخْفِيفُهُمْ فِي الأَوَّلَينَ هُنَا وَلـ # ـكِنِ اللهُ وَارْفَعْ هَاءهُ شَاعَ كُفَّلاَ",
    "وَمُوهِنُ بِالتَّخْفِيفِ ذَاعَ وَفِيهِ لَمْ # يُنَوَّنْ لِحَفْصٍ كَيْدَ بِالْخَفْضِ عَوَّلَا",
    "وَبَعْدُ وَإِنَّ الْفَتْحُ عَمَّ عُلًا وَفِيـ # ـهِمَا الْعُدْوَةِ اكْسِرْ حَقًّا الضَّمَّ وَاعْدِلَا",
    "وَمَنْ حَيِيَ اكْسِرْ مُظْهِرًا إِذْ صَفَا هُدًى # وَإِذْ يَتَوَفَّى أَنِّثُوهُ لَهُ مُلَا",
    "وَبِالْغَيْبِ فِيهَا تَحْسَبَنَّ كَمَا فَشَا # عَمِيمًا وَقُلْ فِي النُّورِ فَاشِيهِ كَحَّلَا",
    "وَإِنَّهُمُ افْتَحْ كَاِفيًا وَاكْسِرُوا لِشُعْـ # ـبَةَ السَّلْمَ وَاكْسِرْ فِي الْقِتاَلِ فَطِبْ صِلَا",
    "وَثَانِيْ يَكُنْ غُصْنٌ وَثَالِثُهاَ ثَوَى # وَضُعْفًا بِفَتْحِ الضَّمِّ فَاشِيهِ نُفِّلا",
    "وِفي الرُّومِ صِفْ عَنْ خُلْفِ فَصْلٍ وَأَنِّثَ اَنْ # يَكُونَ مَعَ الأَسْرَى الأُسَارَى حُلًا حَلَا",
    "وَلاَيَتِهِمْ بِالْكَسْرِ فُزْ وَبِكَهْفِهِ # شَفَا وَمَعًا إِنِّيْ بِيَاءَيْنِ أَقْبَلا",
  ]},
  {id:"shat-37",title:"سُوْرَةُ التَّوْبَةِ",sub:"Sourate At-Tawba",clr:["#0d2b2b","#1a4f4a"],bayts:[
    "وَيُكْسَرُ لاَ أَيْمَانَ عِنْدَ ابْنِ عَامِرٍ # وَوَحَّدَ حَقٌّ مَسْجِدَ اللهِ الاَوَّلَا",
    "عَشِيرَاتُكُمْ بِالجمْعِ صِدْقٌ وَنَوِّنُوا # عُزَيْرٌ رِضَى نَصٍّ وَبِالْكَسْرِ وُكِّلَا",
    "يُضَاهُونَ ضَمَّ الْهَاءِ يَكْسِرُ عَاصِمٌ # وَزِدْ هَمْزَةً مَضْمُومَةً عَنهُ وَاعْقِلَا",
    "يَضِلُّ بِضَمِّ الْيَاءِ مَعْ فَتْحِ ضَادِهِ # صِحَابٌ وَلَمْ يَخْشَوْا هُنَاكَ مُضَلِّلَا",
    "وَأَنْ تُقْبَلَ التَّذْكِيرُ شَاعَ وِصَالُهُ # وَرَحْمَةٌ الْمَرْفُوعُ بِالْخَفْضِ فَاقْبَلَا",
    "وَيُعْفَ بِنُونٍ دُونَ ضَمٍّ وَفَاؤُهُ # يُضَمُّ تُعَذَّبْ تَاهُ بِالنُّونِ وُصِّلَا",
    "وَفِي ذَالِهِ كَسْرٌ وَطَائِفَةٌ بِنَصْـ # ـبِ مَرْفُوعِهِ عَنْ عَاصِمٍ كُلُّهُ اعْتَلاَ",
    "وَحَقٌّ بِضَمِّ السَّوْءِ مَعْ ثَانِ فَتْحِهَا # وَتَحْرِيكُ وَرْشٍ قُرْبَةٌ ضَمُّهُ جَلَا",
    "وَمِنْ تَحْتِهَا المَكِّيْ # يَجُرُّ وَزَادَ مِنْ صَلاَتَكَ وَحِّدْ وَافْتَحِ التَّا شَذًّا عَلَا",
    "وَوَحِّدْ لَهُمْ في هُودَ تُرْجِئُ هَمْزُهُ # صَفَا نَفَرٍ مَعْ مُرْجَئُونَ وَقَدْ حَلَا",
    "وَعَمَّ بِلاَ وَاوِ الَّذِينَ وَضُمَّ فِي # مَنَ اَسَّسَ مَعْ كَسْرٍ وَبُنْيَانُهُ وِلَا",
    "وَجُرْفٍ سكونُ الضَّمِّ فِي صَفْوِ كَامِلٍ # تُقَطَّعُ فَتْحُ الضَّمِّ فِي كَامِلٍ عَلَا",
    "يَزِيغُ عَلَى فَصْلٍ يَرَوْنَ مُخَاطَبٌ # فَشَا وَمَعِيْ فِيهَا بِيَاءَيْنِ حُمِّلَا",
  ]},
  {id:"shat-38",title:"سُوْرَةُ يُوْنُسَ عليه السلام",sub:"Sourate Yûnus",clr:["#0a2540","#154568"],bayts:[
    "وَإِضْجَاعُ رَا كُلِّ الْفَوَاتِحِ ذِكْرُهُ # حِمًى غَيْرَ حَفْصٍ طَا وَيَا صُحْبَةٌ وَلَا",
    "وَكَمْ صُحْبَةٍ يَا كَافَ والْخُلْفُ يَاسِرٌ # وَهَا صِفْ رِضًى حُلْوًا وَتَحْتَ جَنًى حَلَا",
    "شَفَا صادِقًا حَم مُخْتَارُ صُحْبَةٍ # وَبَصْرٍ وَهُمْ أَدْرَى وَبِالْخُلْفِ مُثِّلَا",
    "وَذو الرَّا لِوَرْشٍ بَيْنَ بَيْنَ وَناَفِعٌ # لَدى مَرْيَمٍ هَايَا وَحَا جِيدُهُ حَلَا",
    "نُفَصِّلُ يَا حَقٍّ عُلًا سَاحِرٌ ظُبَى # وَحَيْثُ ضِيَاءً وَافَقَ الْهَمْزُ قُنْبُلَا",
    "وَفِي قُضِيَ الْفَتْحانِ مَعْ أَلِفٍ هُنَا # وَقُلْ أَجَلُ المَرْفُوعُ بِالنَّصْبِ كُمِّلَا",
    "وَقَصْرُ وَلاَ هَادٍ بِخُلْفٍ زَكَا وَفي الْـ # ـقِيَامَةِ لاَ الأُوْلَى وَبِالْحَالِ أُوِّلَا",
    "وَخَاطَبَ عَمَّا يُشْرِكُونَ هُناَ شَذًا # وَفي الرُّومِ وَالْحَرْفَيْنِ في النَّحْلِ أَوَّلَا",
    "يُسَيِّرُكُمْ قُلْ فِيهِ يَنْشُرُكُمْ كَفَى # مَتَاعَ سِوَى حَفْصٍ بِرَفْعٍ تَحَمَّلاَ",
    "وَإِسْكَانُ قِطْعًا دُونَ رَيْبٍ وُرُودُهُ # وفِي بَاءِ تَبْلُو التَّاءُ شَاعَ تَنَزُّلَا",
    "وَيَا لاَ يَهَدِّي اكْسِرْ صَفِيًّا وَهَاهُ نَلْ # وَأَخْفَى بَنُو حَمْدٍ وَخُفِّفَ شُلْشُلَا",
    "وَلكِنْ خَفِيفٌ وَارْفَعِ النَّاسَ عَنْهُمَا # وَخَاطَبَ فِيهَا يَجْمَعُونَ لَهُ مُلَا",
    "وَيَعْزُبُ كَسْرُ الضَّمِّ مَعْ سَبَأٍ رَسَا # وَأَصْغَرَ فَارْفَعْهُ وَأَكْبَرَ فَيْصَلَا",
    "مَعَ الْمدِّ قَطْعُ السِّحْرِ حُكْمٌ تَبَوَّءا # بِيَا وَقْفُ حَفْصٍ لَمْ يَصِحَّ فَيُحْمَلَا",
    "وَتَتَّبِعَانِ النُّونُ خَفَّ مَدًا وَمَـ # ـاجَ بِالْفَتْحِ وَالإِسْكَانِ قَبْلُ مُثَقَّلَا",
    "وَفِي أَنَّهُ اكْسِرْ شَافِيًا وَبِنُونِهِ # وَنَجْعَلُ صِفْوَ الْخِفُّ نُنْجِ رِضىً عَلَا",
    "وَذَاكَ هُوَ الثَّانِي وَنَفْسِيَ يَاؤُهَا # وَرَبِّيَ مَعْ أَجْرِيَ وَإِنِّي وَلِي حُلَا",
  ]},
  {id:"shat-39",title:"سُوْرَةُ هُوْدٍ عليه السلام",sub:"Sourate Hûd",clr:["#0e2e30","#1c5658"],bayts:[
    "وَإِنِّي لَكُمْ بِالْفَتْحِ حَقُّ رُوَاتِهِ # وَبَادِيءَ بَعْدَ الدَّالِ بِالْهَمْزِ حُلِّلَا",
    "وَمِنْ كُلِّ نَوِّنْ مَعْ قَدْ اَفْلَحَ عَالِمًا # فَعُمِّيَتِ اضْمُمْهُ وَثَقِّلْ شَذًّا عَلَا",
    "وَفِي ضَمِّ مَجْرَاهَا سِوَاهُمْ وَفَتْحُ يَا # بُنَيِّ هُنَا نَصٌّ وَفِي الْكُلِّ عُوِّلَا",
    "وَآخِرُ لُقْماَنٍ يُوَالِيهِ أَحْمَدُ # وَسَكَّنَهُ زَاكٍ وَشَيْخُهُ الاَوَّلَا",
    "وَفِي عَمَلٌ فَتْحٌ وَرَفْعٌ وَنَوِّنُوا # وَغَيْرَ ارْفَعُوا إِلاَّ الْكِسَائِيَّ ذَا الْمَلَا",
    "وَتَسْئَلْنِ خِفُّ الْكَهْفِ ظِلٌّ حِمًي وَهَا # هُنَا غُصْنُهُ وَافْتَحْ هُنَا نُونَهُ دَلَا",
    "وَيَوْمَئِذٍ مَعْ سَالَ فَافْتَحْ أَتَى رِضًا # وَفِي النَّمْلِ حِصْنٌ قَبْلَهُ النُّونُ ثُمِّلاَ",
    "ثَمُودَ مَعَ الْفُرْقَانِ وَالْعَنْكَبُوتِ لَمْ # يُنَوَّنْ عَلَى فَصْلٍ وَفِي النَّجْمِ فُصِّلَا",
    "نَمَا لِثَمُودٍ نَوِّنُوا وَاخْفِضُوا رِضًا # وَيَعْقُوبُ نَصْبُ الرَّفْعِ عَنْ فَاضِلٍ كَلَا",
    "هُناَ قَالَ سِلْمٌ كسْرُهُ وَسُكُونُهُ # وَقَصْرٌ وَفَوْقَ الطُّورِ شَاعَ تَنَزُّلاَش",
    "وَفَاسْرِ أَنِ اسْرِ الْوَصْلُ أَصْلٌ دَناَ وَهَا # هُنَا حَقٌّ إِلاَّ امْرَاتَكَ ارْفَعْ وَأَبْدِلَا",
    "وَفِي سَعِدُوا فَاضْمُمْ صِحَابًا وَسَلْ بِهِ # وَخِفُّ وَإِنْ كُلًاّ إِلَى صَفْوِهِ دَلَا",
    "وَفِيها وَفِي يس وَالطَّارِقِ العُلا # يُشَدِّدُ لَمَّا كَامِلٌ نَصَّ فَاعْتَلا",
    "وَفي زُخْرُفٍ فِي نَصِّ لُسْنٍ بِخُلْفِهِ # وَيَرْجِعُ فِيه الضَّمُّ وَالْفَتْحُ إِذْ عَلَا",
    "وَخَاطَبَ عَمَّا يَعْمَلُونَ هُنَا وَآ # خِرَ النَّمْلِ عِلْمًا عَمَّ وَارْتَادَ مَنْزِلَا",
    "وَيَاآتُهاَ عَنِّيْ وَإِنِّيْ ثَمَانِيا # وَضَيْفِيْ وَلكِنِّيْ وَنُصْحِيَ فَاقْبَلَا",
    "شِقَاقِيْ وَتَوْفِيقِيْ وَرَهْطِيَ عُدَّهاَ # وَمَعْ فَطَرَنْ أَجْرِيْ مَعًا تُحْصِ مُكْمِلَا",
  ]},
  {id:"shat-40",title:"ُسُوْرَةُ يُوْسُفَ عليه السلام",sub:"Sourate Yûsuf",clr:["#0a2030","#134560"],bayts:[
    "وَيَا أَبَتِ افْتَحْ حَيْثُ جَا لاِبْنِ عَامِرٍ # وَوُحِّدَ لِلْمَكِّيِّ آيَاتٌ الْوِلَا",
    "غَيَابَاتِ فِي الْحَرْفَيْنِ بِالْجَمْعِ نَافِعٌ # وَتَأْمَنُنَا لِلْكُلِّ يُخْفَى مُفَصَّلَا",
    "وَأَدْغَمَ مَعْ إِشْمَامِهِ البَعْضُ عَنْهُمُ # وَنَرْتَعْ وَنَلْعَبْ يَاءُ حِصْنٍ تَطَوَّلَا",
    "وَيَرْتَعْ سُكُونُ الْكَسْرِ فِي الْعَيْنِ ذُو حِمًا # وَبُشْرَايَ حَذْفُ الْيَاءِ ثَبْتٌ وَمُيِّلَا",
    "شِفَاءٌ وَقَلِّلْ جِهْبِذَا وَكِلاَهُمَا # عَنِ ابْنِ الْعَلاَ وَالْفَتْحُ عَنْهُ تَفَضَّلاَ",
    "وَهَيْتَ بِكَسْرٍ أَصْلُ كُفْؤٍ وَهَمْزُهُ # لِسَانٌ وَضَمُّ التَّا لِوَى خُلْفُهُ دَلَا",
    "وَفِي كَافَ فَتْحُ الَّلامِ فِي مُخْلِصًا ثَوَى # وَفِي الْمُخْلِصِينَ الْكُلُّ حِصْنٌ تَجَمَّلَا",
    "معًا وَصْلُ حَاشَا حَجَّ دَأْبًا لِحَفْصِهِمْ # فَحَرِّكْ وَخَاطِبْ يَعْصِرُونَ شَمَرْدَلَا",
    "وَنَكْتَلْ بِيَا شَافٍ وَحَيْثُ يَشَاءُ نُو # نُ دَارٍ وَحِفْظًا حَافِظًا شَاعَ عُقَّلَا",
    "وَفِتْيَتِهِ فِتْيَانِهِ عَنْ شَذًا وَرُدْ # بِالاِخْبَارِ فِي قَالُوا أَئِنَّكَ دَغْفَلَا",
    "وَيَيْأَسْ مَعًا وَاسْتَيْأَسَ اسْتَيْأَسُوا وَتَيْـ # ـأَسُوا اقْلِبْ عَنِ الْبَزِّيْ بِخُلْفٍ وَأَبْدِلَا",
    "وَيُوحَى إِلَيْهِمْ كَسْرُ حَاءِ جَمِيعِهَا # وَنُونٌ عُلًا يُوحَى إِلَيْهِ شَذًا عَلَا",
    "وَثَانِيَ نُنْجِ احْذِفْ وَشَدِّدْ وَحَرِّكَنْ # كَذَا نَلْ وَخَفِّفْ كُذِّبُوا ثَابِتًا تَلَا",
    "وَأَنِّيْ وَإِنَّىْ الْخَمْسُ رَبِّيْ بِأَرْبَعٍ # أَرَانِيْ مَعًا نَفْسِيْ لَيُحْزِنُنِي حُلَا",
    "وَفِي إِخْوَتِيْ حُزْنِيْ سَبِيلِيْ بِيْ وَلِيْ # لَعَلِّيَ آبَاءِيْ أَبِيْ فَاخْشَ مَوْحَلَا",
  ]},
  {id:"shat-41",title:"سُوْرَةُ الرَّعْدِ",sub:"Sourate Ar-Ra'd",clr:["#0a2a2e","#124a4f"],bayts:[
    "وَزَرْعٌ نَخِيلٌ غَيْرُ صِنْوَانٍ اَوَّلاَ # لَدَى خَفْضِهَا رَفْعٌ عَلَى حَقُّهُ طُلَا",
    "وَذَكَّرَ تُسْقَى عَاصِمٌ وَابْنُ عَامِرٍ # وَقُلْ بَعْدَهُ بِالْيَا يُفَضِّلُ شُلْشُلَا",
    "وَمَا كُرِّرَ اسْتِفْهَامُهُ نَحْوُ آئِذَا # أَئِنَّا فَذُو اسْتِفْهَامٍ الْكُلُّ أَوَّلَا",
    "سِوَى نَافِعٍ فِي النَّمْلِ وَالشَّامِ مُخْبِرٌ # سِوَى النَّازِعَاتِ مَعْ إِذَا وَقَعَتْ وِلَا",
    "وَدُونَ عِنَادٍ عَمَّ فِي الْعَنْكَبُوتِ مُخْـ # ـبِرًا وَهْوَ في الثَّانِي أَتَى رَاشِدًا وَلاَ",
    "سِوَى الْعَنْكَبُوتِ وَهْوَ فِي الْنَّمْلِ كُنْ رِضَا # وَزَادَاهُ نُونًا إِنَّنَا عَنْهُمَا اعْتَلَا",
    "وَعَمَّ رِضًا فِي النَّازِعَاتِ وَهُمْ عَلَى # أُصُولِهِمْ وَامْدُدْ لِوَى حَافِظٍ بَلَا",
    "وَهَادٍ وَوَالٍ قِفْ وَوَاقٍ بِيَائِهِ # وَبَاقٍ دَنَا هَلْ يَسْتَوِي صُحْبَةٌ تَلَا",
    "وَبَعْدُ صِحَابٌ يُوْقِدُونَ وَضَمُّهُمْ # وَصُدُّوا ثَوَى مَعْ صُدَّ فِي الطَّوْلِ وَانْجَلَا",
    "وَيُثْبِتُ فِي تَخْفِيفِهِ حَقُّ نَاصِرٍ # وَفِي الْكَافِرُ الْكُفَّارُ بِالْجَمْعِ ذُلِّلَا",
  ]},
  {id:"shat-42",title:"سُوْرَةُ إِبْرَاهِيْمَ عليه الصلاة والسلام",sub:"Sourate Ibrâhîm",clr:["#0a2438","#123f5c"],bayts:[
    "وَفِي الْخَفْضِ فِي اللهِ الَّذِي الرَّفْعُ عَمَّ خَا # لِقُ امْدُدْهُ وَاكْسِرْ وَارْفَعِ الْقَافَ شُلْشُلَا",
    "وَفِي النُّورِ وَاخْفِضْ كُلَّ فِيهَا وَالأرْضَ هَا # هُنَا مُصْرِخِيَّ اكْسِرْ لِحَمْزَةَ مُجْمِلَا",
    "كَهَا وَصْلٍ أَوْ لِلسَّاكِنَينِ وَقُطْرُبٌ # حَكَاهَا مَعَ الْفَرَّاءِ مَعْ وَلَدِ الْعَلَا",
    "وَضُمَّ كِفَا حِصْنٍ يَضِلُّوا يَضِلَّ عَنْ # وَأَفْئِدَةً بِالْيَا بِخُلْفٍ لَهُ وَلَا",
    "وَفِي لِتَزُولَ الْفَتْحُ وَارْفَعْهُ رَاشِدًا # وَمَا كَانَ لِيْ إِنِّيْ عِبَادِيَ خُذْ مُلا",
  ]},
  {id:"shat-43",title:"سُوْرَةُ الْحِجْرِ",sub:"Sourate Al-Hijr",clr:["#0c2f35","#155a5e"],bayts:[
    "وَرُبَّ خَفِيفٌ إِذْ نَمَا سُكِّرَتْ دَنَا # تَنَزَّلُ ضَمُّ التَّا لِشُعْبَةَ مُثِّلَا",
    "وَبِالنُّونِ فِيهاَ وَاكْسِرِ الزَّايَ وَانُصِبِ الْ # مَلائِكَةَ المَرْفُوعَ عَنْ شَائِدٍ عُلَا",
    "وَثُقِّلَ لِلْمَكِّيِّ نُونُ تُبَشِّرُو # نَ وَاكْسِرْهُ حِرْمِيَّا وَمَا الْحَذُفُ أَوَّلَا",
    "وَيَقْنَطُ مَعْهُ يَقْنَطُونَ وَتَقْنَطُوا # وَهُنَّ بِكَسْرِ النُّونِ رَافَقْنَ حُمَّلاَ",
    "وَمُنْجُوهُمُ خِفٌّ وَفِي الْعَنْكَبُوتِ نُنْـ # ـجِيَنَّ شَفَا مُنْجُوكَ صُحْبَتُهُ دَلَا",
    "قَدَرْنَا بِهَا وَالنَّمْلِ صِفْ وَعِبَادِ مَعْ # بَناتِيْ وَأَنيْ ثُمَّ إِنِّيْ فَاعْقِلَا",
  ]},
  {id:"shat-44",title:"سُوْرَةُ النَّحْلِ",sub:"Sourate An-Nahl",clr:["#0a1f3a","#153a63"],bayts:[
    "وَيُنْبِتُ نُونٌ صَحَّ يَدْعُونَ عَاصِمٌ # وَفِي شُرَكَايَ الْخُلْفُ فِي الْهَمْزِ هَلْهَلَا",
    "وَمِنْ قَبْلِ فِيهِمْ يَكْسِرُ النُّونَ نَافِع # مَعًا يَتَوَفَّاهُمْ لِحَمْزَةَ وُصِّلَا",
    "سَمَا كامِلًا يَهْدِيْ بِضَمٍّ وَفَتْحَةٍ # وَخَاطِبْ تَرَوْا شَرْعًا وَاْلآخِرُ فِي كِلَا",
    "وَرَا مُفْرِطُونَ اكْسِرْ أَضاَ يَتَفَيَّؤاُ الْـ # ـمُؤَنَّثُ لِلْبَصْرِيِّ قَبْلُ تُقُبِّلَا",
    "وَحَقُّ صِحَابٍ ضَمَّ نَسْقِيكُمُو مَعَا # لِشُعْبَةَ خَاطِبْ يَجْحَدُونَ مُعَلَّلَا",
    "وَظَعْنِكُمُ إِسْكَانُهُ ذَائِعٌ وَنَجْـ # ـزِيَنَّ الَّذِينَ النُّونُ دَاعِيهِ نُوِّلَا",
    "مَلَكْتُ وَعَنْهُ نَصَّ الاخْفَشُ يَاءَهُ # وَعَنْهُ رَوَى النَّقَّاشُ نُونًا مُوَهَّلَا",
    "سِوَى الشَّامِ ضُمُّوا وَاكْسِرُوا فَتَنُوا لَهُمْ # وَيُكْسَرُ فِي ضَيْقٍ مَعَ النَّمْلِ دُخْلُلَا",
  ]},
  {id:"shat-45",title:"سُوْرَةُ الإِسْرَاءِ",sub:"Sourate Al-Isrâ'",clr:["#0d2b2b","#1a4f4a"],bayts:[
    "وَيَتَّخِذُوا غَيْبٌ حَلاَ لِيَسُوءَ نُو # نُ رَاوٍ وَضَمُّ الْهَمْزِ وَالْمَدِّ عُدِّلَا",
    "سَمَا وَيُلَقَّاهُ يُضَمُّ مُشَدَّدًا # كَفَى يَبْلُغَنَّ امْدُدْهُ وَاكْسِرْ شَمَرْدَلَا",
    "وَعَنْ كُلِّهِمْ شَدِّدْ وَفَا أُفِّ كُلِّهاَ # بِفَتْحٍ دَناَ كُفْؤًا وَنَوِّنْ عَلَى اعْتِلَا",
    "وَبِالْفَتْحِ وَالتَّحْرِيكِ خِطْأً مُصَوَّب # وَحَرَّكَهُ الْمَكِّيْ وَمَدَّ وَجَمَّلَا",
    "وَخَاطَبَ فِي يُسْرِفْ شُهُودٌ وَضَمُّنَا # بِحَرْفَيْهِ بِالْقِسْطَاسِ كَسْرُ شَذٍ عَلاَ",
    "وَسَيِّئَةً فِي هَمْزِهِ اضْمُمْ وَهَائِهِ # وَذَكِّرْ وَلاَ تَنْوِينَ ذِكْرًا مُكَمَّلَا",
    "وَخَفِّفْ مَعَ الْفُرْقَانِ وَاضُمُمْ لِيَذْكُرُوا # شِفَاءً وَفِي الْفُرْقَانِ يَذْكُرُ فُصِّلَا",
    "وَفِي مَرْيَمٍ بِالْعَكْسِ حَقٌّ شِفَاؤُهُ # يَقُولُونَ عَنْ دَارٍ وَفِي الثَّانِ نُزِّلَا",
    "سَمَا كِفْلُهُ أَنِّثْ يُسَبِّحُ عَنْ حِميً # شَفَا وَاكْسِرُوا إِسْكَانَ رَجْلِكَ عُمَّلَا",
    "وَيَخْسِفَ حق نُونُهُ وَيُعِيدَكُمْ # فَيُغْرِقَكُمْ وَاثْنَانِ يُرْسِلَ يُرْسِلَا",
    "خِلاَفَكَ فَافْتَحْ مَعْ سُكُونٍ وَقَصْرِهِ # سَمَا صِفْ نَآى أَخِّرْ مَعًا هَمْزَهُ مَلَا",
    "تُفَجِّرَ فِي اْلأُولَى كَتَقْتُلَ ثَابِتٌ # وَعَمَّ نَدىً كِسْفًا بِتَحْرِيكِهِ وَلَا",
    "وَفي سَبَأٍ حَفْصٌ مَعَ الشُّعَرَاءِ قُلْ # وَفِي الرُّومِ سَكِّنْ لَيْسَ بِالْخُلْفِ مُشْكِلَا",
    "وَقُلْ قَالَ اْلاُولَى كَيْفَ دَارَ وَضُمَّ تَا # عَلِمْتَ رِضىً وَالْيَاءُ فِي رَبِّيَ انْجَلَا",
  ]},
  {id:"shat-46",title:"سُوْرَةُ الْكَهْفِ",sub:"Sourate Al-Kahf",clr:["#0a2540","#154568"],bayts:[
    "وَسَكْتَةُ حَفْصٍ دُونَ قَطْعٍ لَطِيفَةٌ # عَلَى أَلِفِ التَّنْوِينِ فِي عِوَجًا بَلَا",
    "وَفِي نُونِ مَنْ رَاق وَمَرْقَدِناَ وَلاَ # مِ بَلْ رَانَ وَالْبَاقُونَ لاَ سَكْتَ مُوصَلَا",
    "وَمِنْ لَدْنِهِ في الضَّمِّ أَسْكِنْ مُشِمَّهُ # وَمِنْ بَعْدِهِ كَسْرَانِ عَنْ شُعْبَةَ اعْتَلَا",
    "وَضُمَّ وَسَكِّنْ ثُمَّ ضُمَّ لِغَيْرِهِ # وَكُلُّهُمُ فِي الْهَا عَلَى أَصْلِهِ تَلَا",
    "وَقُلْ مِرْفَقًا فَتْحٌ مَعَ الْكَسْرِ عَمَّهُ # وَتَزْوَرُّ لِلشَّامِيْ كَتَحْمَرُّ وُصِّلَا",
    "وَتَزَّاوَرُ التَّخْفِيفُ فِي الزَّايِ ثَاِبتٌ # وَحِرْمِيُّهُمْ مُلِّئْتَ فِي اللاَّمِ ثَقَّلاَ",
    "بَوَرْقِكُمُ الإِسْكَانُ فِي صَفْوِ حُلْوِهِ # وَفِيهِ عَنِ الْبَاقِينَ كَسْرٌ تَأَصَّلا",
    "وَحَذْفُكَ لِلتَّنْوِينِ مِنْ مِائَةٍ شَفَا # وَتُشْرِكْ خِطَابٌ وَهْوَ بِالْجَزْمِ كُمِّلَا",
    "وَفِي ثُمُرٍ ضَمَّيْهِ يَفْتَحُ عَاصِمٌ # بِحَرْفَيْهِ وَاْلإِسْكَانُ فِي الْمِيمِ حُصِّلاِ",
    "وَدَعْ مِيمَ خَيْرًا مِنْهُمَا حُكْمُ ثَابِتٍ # وَفِي الْوَصْلِ لكِنَّا فَمُدَّ لَهُ مُلَا",
    "وَذَكِّرْ تَكُنْ شَافٍ وَفِي الْحَقِّ جَرُّهُ # عَلَى رَفْعِهِ حَبْرٌ سَعِيدٌ تَأَوَّلَا",
    "وَعُقُبًا سُكُونُ الضَّمِّ نَصُّ فَتىً وَيَا # نُسَيِّرُ وَالَى فَتْحَهَا نَفَرٌ مَلَا",
    "وَفِي النُّونِ أَنِّثْ وَالْجِبَالَ بِرَفْعِهِمْ # وَيَوْمُ يقُولُ النُّونُ حَمْزَةُ فَضَّلَا",
    "لِمَهْلَكِهِمْ ضَمُّوا وَمَهْلَكَ أَهْلِهِ # سِوى عَاصِمٍ وَالْكَسْرُ فِي الْلاَّمِ عُوِّلَا",
    "وَهَا كَسْرِ أَنْسَانِيهِ ضُمَّ لِحَفْصِهِمْ # وَمَعْهُ عَلَيْهِ اللهَ فِي الْفَتْحِ وَصَّلَا",
    "لِتُغْرِقَ فَتْحُ الضَّمِّ وَالْكَسْرِ غَيْبَةً # وَقُلْ أَهْلَهَا بِالرَّفْعِ رَاوِيهِ فَصَّلَا",
    "وَمُدَّ وَخَفِّفْ يَاءَ زَاكِيَةً سَمَا # وَنُونَ لَدُنِّي خَفَّ صَاحِبُهُ إِلَى",
    "وَسَكِّنْ وَأَشْمِمْ ضَمَّةَ الدَّالِ صَادِقًا # تَخِذْتَ فَخَفِّفْ وَاكْسِرِ الْخَاءَ دُمْ حُلَا",
    "وَمِنْ بَعْدُ بِالتَّخْفِيفِ يُبْدِلُ هَاهُنَا # وَفَوْقَ وَتَحْتَ الْمُلْكِ كَافِيهِ ظَلَّلَا",
    "فَأَتْبَعَ خَفِّفْ فِي الثَّلاَثَةِ ذَاكِرًا # وَحَامِيَةٍ بِالْمَدِّ صُحْبَتُهُ كَلَا",
    "وَفِي الْهَمْزِ يَاءٌ عَنْهُمْ وَصِحَابُهُمْ # جَزَاءُ فَنَوِّنْ وَانْصِبِ الرَّفْعَ وَأَقْبَلَا",
    "عَلَى حَقٍّ السُّدَّيْنِ سُدًّا صِحَابُ حَقْ # قٍ الضَّمُّ مَفْتُوحٌ وَيَاسِينَ شِدْ عُلاَ",
    "وَيَأْجُوجَ مَأْجُوجَ اهْمِزِ الْكُلَّ نَاصِرًا # وَفِي يَفْقَهُونَ الضَّمُّ وَالْكَسْرُ شُكِّلَا",
    "وَحَرِّكْ بِهاَ وَالمُؤْمِنينَ وَمُدَّهُ # خَرَاجًا شَفَا وَاعْكِسْ فَخَرْجُ لَهُ مُلَا",
    "وَمَكَّنَنِي أَظْهِرْ دَلِيلًا وَسَكَّنُوا # مَعَ الضَّمِّ فِي الصُّدْفَيْنِ عَنْ شُعْبَةَ الْمَلَا",
    "كَمَا حَقُّهُ ضَمَّاهُ وَاهْمِزْ مُسَكِّنًا # لَدَى رَدْمًا ائْتُونِي وَقَبْلُ اكْسِرِ الْوِلَا",
    "لِشُعْبَةَ وَالثَّانِي فَشَا صِفْ بِخُلْفِهِ # وَلاَ كَسْرَ وَابْدَأْ فِيهِمَا الْيَاءَ مُبْدِلا",
    "وَزِدْ قَبْلُ هَمْزَ الْوَصْلِ وَالْغَيْرُ فِيهِمَا # بِقَطْعِهِمَا وَالْمَدِّ بَدْءًا وَمَوْصِلَا",
    "وَطَاءَ فَمَا اسْطَاعُوا لِحَمْزَةَ شَدِّدُوا # وَأَنْ تَنْفَدَ التَّذْكِيرُ شَافٍ تَأَوَّلَا",
    "ثَلاَثٌ مَعيْ دُونِيْ وَرَبِّيْ بِأَرْبَعٍ # وَمَا قَبْلَ إِنْ شَاءَ الْمُضَافَاتُ تُجْتَلَا",
  ]},
  {id:"shat-47",title:"سُوْرَةُ مَرْيَمَ عليها السلام",sub:"Sourate Maryam",clr:["#0e2e30","#1c5658"],bayts:[
    "وَحَرْفَا يَرِثْ بِالْجَزْمِ حُلْوُ رِضىً وَقُلْ # خَلَقْتُ خَلَقْنَا شَاعَ وَجْهًا مُجَمَّلَا",
    "وَضَمُّ بُكِيًّا كَسْرُهُ عَنْهُمَا وَقُلْ # عُتيًّا صُلِيًّا مَعْ جُثِيًّا شَذًا عَلَا",
    "وَهَمْزُ أَهَبْ بِالْيَا جَرَى حُلْوُ بَحْرِهِ # بِخُلْفٍ وَنِسْيًا فَتْحُهُ فَائِزٌ عُلَا",
    "وَمَنْ تَحْتَهَا اكْسِرْ وَاخْفِضِ الدَّهْرَ عَنْ شَذًا # وَخَفَّ تَسَاقَطْ فَاصِلًا فَتُحُمِّلَا",
    "وَبِالضَّمِّ وَالتَّخْفِيفِ وَالْكَسْرِ حَفْصُهُمْ # وَفِي رَفْعِ قَوْلُ الْحَقِّ نَصْبُ نَدٍ كَلَا",
    "وَكَسْرُ وَأَنَّ اللهَ ذَاكٍ وأَخْبَروا # بِخُلْفٍ إِذَا مَا مُتُّ مُوفِينَ وُصَّلَا",
    "وَنُنَجِّي خَفِيفًا رُضْ مَقَامًا بِضَمِّهِ # دَنَا رِءْيًا اَبْدِلْ مُدْغِمًا بَاسِطًا مُلاَ",
    "وَوُلْدَا بِهاَ وَالزُّخْرُفِ اضْمُمْ وَسَكِّنَنْ # شِفاَءً وَفِي نُوحٍ شَفاَ حَقُّهُ وَلَا",
    "وَفِيهاَ وَفِي الشُّورى يَكَادُ أَتَى رِضًا # وَطَا يَتَفَطَّرْنَ اكْسِرُوا غَيْرَ أَثْقَلَا",
    "وَفي التَّاءِ نُونٌ سَاكِنٌ حَجَّ فِي صَفا # كَمَالٍ وَفِي الشُّورى حَلاَ صَفْوُهُ وِلَا",
    "وَرَاءِيَ وَاجْعَلْ لِي وَإِنِّيْ كِلاَهُماَ # وَرَبِّيْ وَآتَانِيْ مُضَافَاتُهَا الْعُلا",
  ]},
  {id:"shat-48",title:"سُوْرَةُ طَه",sub:"Sourate Tâ-Hâ",clr:["#0a2030","#134560"],bayts:[
    "لِحَمْزَةَ فَاضْمُمْ كَسْرَهاَ أَهْلِهِ امْكُثُوا # مَعًا وَافْتَحُوا إِنِّي أَنَا دَائِمًا حُلَا",
    "وَنَوِّنْ بِها وَالنَّازِعَاتِ طُوًى ذَكَا # وَفِي اخْتَرْتُكَ اخْتَرْناَكَ فَازَ وَثَقَّلَا",
    "وَأَنَّا وَشَامٍ قَطْعُ أَشْدُدْ وَضُمَّ فِي ابْـ # ـتِدَا غَيْرِهِ واضْمُمْ وَأَشْرِكْهُ كَلْكَلَا",
    "معَ الزُّخْرُفِ اقْصُرْ بَعْدَ فَتْحٍ وَسَاكِنٍ # مِهَادًا ثَوَى واضْمُمْ سِوىً فِي نَدٍ كَلَا",
    "وَيَكْسِرُ بَاقِيهِمْ وَفِيهِ وَفِي سُدىً # مُمَالُ وُقُوفٍ فِي الأَصُولِ تَأَصَّلَا",
    "فَيَسْحَتَكمْ ضَمٌّ وَكَسْرٌ صِحَابُهُمْ # وَتَخْفِيفُ قَالُوا إِنَّ عَالِمُهُ دَلَا",
    "وَهذَيْنِ فِي هذَانِ حَجَّ وَثِقْلُهُ # دَناَ فَاجْمَعُوا صِلْ وَافْتَحِ الْمِيمَ حُوَّلَا",
    "وَقُلْ سَاحِرٍ سِحْرٍ شَفَا وَتَلَقَّفُ ارْ # فَعِ الْجَزْمَ مَعْ أُنْثى يُخَيَّلُ مُقْبِلَا",
    "وَأَنْجَيْتُكُمْ وَاعَدْتُكُمْ مَا رَزَقْتُكُمْ # شَفَا لاَ تَخَفْ بِالْقَصْرِ وَالْجَزْمِ فُصِّلَا",
    "وَحاَ فَيَحِلَّ الضَّمُّ فِي كَسْرِهِ رِضًا # وَفِي لاَمِ يَحْلِلْ عَنْهُ وَافَى مُحَلَّلَا",
    "وَفي مُلكِناَ ضَمٌّ شَفَا وَافْتَحُوا أُولِي # نُهَىً وَحَمَلْناَ ضُمَّ وَاكْسِرْ مُثَقِّلاَ",
    "كَمَا عِنْدَ حِرْمِيٍّ وَخَاطَبَ يَبْصُرُوا # شَذًا وَبِكَسْرِ اللاَّمِ تُخْلِفَهُ حَلَا",
    "دَرَاكِ وَمَعْ يَاءٍ بِنَنْفُخُ ضَمُّهُ # وَفي ضَمِّهِ افْتَحْ عَنْ سِوَى وَلَدِ الْعَلاِ",
    "وَبِالْقَصْرِ لِلْمَكِّيِّ وَاجْزِمْ فَلاَ يَخَفْ # وَأَنَّكَ لاَ فِي كَسْرِهِ صَفْوَةُ الْعُلَا",
    "وَبِالْضَّمِّ تُرْضَى صِفْ رِضًا يَأْتِهِمْ مُؤَنْ # نَثٌ عَنْ أُولِي حِفْظٍ لَعَلِّيْ أَخِيْ حُلَا",
    "وَذِكْرِيْ مَعًا إِنِّيْ مَعًا لِيْ مَعًا حَشَرْ # تَنِيْ عَيْنِ نَفْسِيْ إِنَّنِيْ رَأْسِيَ انْجَلَا",
  ]},
  {id:"shat-49",title:"سُوْرَةُ الأَنْبِيَاءِ عليهم السلام",sub:"Sourate Al-Anbiyâ'",clr:["#0a2a2e","#124a4f"],bayts:[
    "وَقُلْ قَالَ عَنْ شُهْدٍ وَآخِرُهَا عَلاَ # وَقُلْ أَوَلَمْ لاَ وَاوَ دَارِيهِ وَصَّلَا",
    "وَتُسْمِعُ فَتْحُ الضَّمِّ وَالْكَسْرِ غَيْبَةً # سِوَى الْيَحْصَبِيْ وَالصُّمَّ بِالرَّفْعِ وُكِّلا",
    "وَقَالَ بِهِ فِي النَّمْلِ وَالرُّومِ دَارِمٌ # وَمِثْقَالُ مَعْ لُقْمَانَ بِالرَّفْعِ أُكْمِلَا",
    "جُذَاذًا بِكَسْرِ الضَّمِّ رَاوٍ وَنُونُهْ # لِيُحْصِنَكُمْ صَافَى وَأُنِّثَ عَنْ كِلَا",
    "وَسَكَّنَ بَيْنَ الْكَسْرِ وَالْقَصْرِ صُحْبَةٌ # وَحِرْمٌ وَنُنْجِي اِحْذِفْ وَثَقِّلْ كَذِيْ صِلَا",
    "وَلِلْكُتُبِ اجْمَعْ عَنْ شَذًا وَمُضَافُهَا # مَعِيْ مَسَّنِيْ إِنِّيْ عِبَادِيَ مُجْتَلَا",
  ]},
  {id:"shat-50",title:"سُوْرَةُ الْحَجِّ",sub:"Sourate Al-Hajj",clr:["#0a2438","#123f5c"],bayts:[
    "سُكَارَى مَعاَ سَكْرَى شَفاَ وَمُحَرَّكٌ # لِيَقْطَعْ بِكَسْرِ اللاَّمِ كَمْ جِيدُهُ حَلَا",
    "لِيُوفُوا ابْنُ ذَكْوَانٍ لِيَطَّوَّفُوا لَهُ # لِيَقْضُوا سِوَى بَزِّيِّهِمْ نَفَرٌ جَلَا",
    "وَمَعْ فَاطِرِ انْصِبْ لُؤْلُؤًا نَظْمُ أُلْفَةٍ # وَرَفْعَ سَوَاءً غَيْرُ حَفْصٍ تَنَخَّلاَ",
    "وَغَيْرُ صِحَابٍ فِي الشَّرِيَعةِ ثُمَّ وَلْـ # ـيُوَفُّوا فَحَرِّكْهُ لِشُعْبَةَ أَثْقَلَا",
    "فَتَخْطَفُهُ عَنْ نَافِعٍ مِثْلُهُ وَقُلْ # معًا مَنْسَكًا بالكَسْرِ فِي السِّينِ شُلْشُلَا",
    "وَيُدْفَعُ حَقٌّ بَيْنَ فَتْحَيْهِ سَاكِنٌ # يُدَافِعُ وَالْمَضْمُومُ فِي أَذِنَ اَعْتَلَا",
    "نَعَمْ حَفِظُوا وَالْفَتْحُ فِي تَا يُقَاتِلُو # نَ عَمَّ عُلاَهُ هُدِّمَتْ خَفَّ إِذْ دُلَا",
    "وَبَصْرِيٌّ أَهْلَكْنَا بِتَاءٍ وَضَمِّهَا # يَعُدُّونَ فِيهِ الْغَيْبُ شَايَعَ دُخْلُلَا",
    "وَفِي سَبَإٍ حَرْفَانِ مَعْهَا مُعَاجِزِيْـ # ـنَ حَقٌّ بِلاَ مَدٍّ وَفِي الْجِيمِ ثُقِّلَا",
    "وَالاَوَّلُ مَعْ لُقْماَنَ يَدْعُونَ غَلَّبُوا # سِوَى شُعْبَةٍ وَالْيَاءُ بَيْتِيَ جَمَّلَا",
  ]},
  {id:"shat-51",title:"سُوْرَةُ الْمُؤْمِنُونَ",sub:"Sourate Al-Mu'minûn",clr:["#0c2f35","#155a5e"],bayts:[
    "أَمَانَاتِهِمْ وَحِّدْ وَفِي سَالَ دَارِيًا # صَلاَتِهِمُ شَافٍ وَعَظْمًا كَذِيْ صِلَا",
    "مَعَ الْعَظْمِ وَاضْمُمْ وَاكْسِرِ الضَّمَّ حَقُّهُ # بِتَنْبُتُ وَالمَفْتُوحُ سِيناَءَ ذُلِّلَا",
    "وَضَمٌّ وَفَتْحٌ مَنْزِلًا غَيْرَ شُعْبَةٍ # وَنَوَّنَ تَتْرًا حَقُّهُ وَاكْسِرِ الْوِلَا",
    "وَأَنَّ ثَوَى وَالنُّونَ خَفِّفْ كَفَى وَتَهْـ # ـجُرُونَ بِضَمٍّ وَاكْسِرِ الضَّمَّ أَجْمَلَا",
    "وَفِي لاَمِ لِلهِ الأَخِيرَيْنِ حَذْفُهاَ # وَفِي الْهَاءِ رَفْعُ الْجَرِّ عَنْ وَلَدِ الْعَلَا",
    "وَعَالِمُ خَفْضُ الرَّفْعِ عَنْ نَفَرٍ وَفَتْـ # ـحُ شِقْوَتُنَا وَامْدُدْ وَحَرِّكُهُ شُلْشُلَا",
    "وَكَسْرُكَ سُخْرِيًّا بِهاَ وَبِصَادِهاَ # عَلَى ضَمِّهِ أَعْطَى شِفَاءً وَأَكْمَلَا",
    "وَفِي أَنَّهُمْ كَسْرٌ شَرِيفٌ وَتُرْجَعُـ # ـونَ في الضَّمِّ فَتْحٌ وَاكْسِرِ الْجيمَ وَاكْمُلاَ",
    "وَفي قَالَ كَمْ قُلْ دُونَ شَكٍّ وَبَعْدَهُ # شَفَا وَبِهَا يَاءٌ لَعَلِّيَ عُلِّلَا",
  ]},
  {id:"shat-52",title:"سُوْرَةُ النُّورِ",sub:"Sourate An-Nûr",clr:["#0a1f3a","#153a63"],bayts:[
    "وَحَقٌّ وَفَرَّضْناَ ثَقِيلًا وَرَأْفَةٌ # يُحَرِّكُهُ الْمَكِّيْ وَأَرْبَعُ أَوَّلَا",
    "صِحَابٌ وَغَيْرُ الْحَفْصِ خَامِسَةُ الأَخِيْـ # ـرُ أَنْ غَضِبَ التَّخْفِيفُ وَالْكَسْرُ أُدْخِلَا",
    "وَيَرْفَعُ بَعْدَ الْجَرِّ يَشْهَدُ شَائِعٌ # وَغَيْرُ أُولِيْ بِالنَّصْبِ صَاحِبُهُ كَلَا",
    "وَدُرِّيٌّ اكْسِرْ ضَمَّهُ حُجَّةً رِضَى # وَفِي مَدِّهِ وَالْهَمْزِ صُحْبَتُهُ حَلَا",
    "يُسَبِّحُ فَتْحُ الْبَا كَذَا صِفْ وَيوقَدُ الْـ # ـمُؤَنَّثُ صِفْ شَرْعًا وَحَقٌّ تَفَعَّلَا",
    "وَمَا نَوَّنَ البَزِّيْ سَحاَبٌ وَرَفْعُهُمْ # لَدَى ظُلُمَاتٍ جَرَّ دَارٍ وَأَوْصَلَا",
    "كَمَا اسْتُخْلِفَ اضْمُمْهُ مَعَ الْكَسْرِ صَادِقًا # وَفِي يُبْدِلَنَّ الْخِفُّ صَاحِبُهُ دَلَا",
    "وَثَانِيْ ثَلاَثَ ارْفَعْ سِوَى صُحْبَةٍ # وَقِفْ وَلاَ وَقْفَ قَبْلَ النَّصْبِ إِنْ قُلْتَ أُبْدِلَا",
  ]},
  {id:"shat-53",title:"سُوْرَةُ الْفُرْقَانِ",sub:"Sourate Al-Furqân",clr:["#0d2b2b","#1a4f4a"],bayts:[
    "وَيَأْكُلُ مِنْهَا النُّونُ شَاعَ وَجَزْمُنَا # وَيَجْعَلْ بِرَفْعٍ دَلَّ صَافِيهِ كُمَّلَا",
    "وَنَحْشُرُ يَا دَارٍ عَلاَ فَيَقُولُ نُـ # ـونُ شَامٍ وَخَاطِبْ تَسْتَطِيعُونَ عُمَّلَا",
    "وَنُزِّلَ زِدْهُ النُّونَ وَارْفَعْ وَخِفَّ وَالْـ # ... ـمَلاَئِكَةُ المَرْفُوعُ يُنْصَبُ دُخْلُلَا",
    "تَشَقَّقُ خِفُّ الشِّينِ مَعْ قَافَ غَالِبٌ # وَيَأْمُرُ شَافٍ وَاجْمَعُوا سُرُجًا وِلَا",
    "وَلَمْ يَقْتِرُوا اضْمُمْ عَمَّ وَالْكَسْرَ ضُمَّ ثِقْ # يُضَاعَفْ وَيَخْلُدْ رَفْعُ جَزْمٍ كَذِي صِلَا",
    "وَوَحَّدَ ذُرِّيَّاتِنَا حِفْظُ صُحْبَةٍ # وَيَلْقَوْنَ فَاضْمُمْهُ وَحَرِّكْ مُثَقِّلاَ",
    "سِوى صُحْبَةٍ وَالْيَاءُ قَوْمِي وَلَيْتَنِي # وَكَمْ لَوْ وَلَيْتٍ تُورِثُ الْقَلْبَ أَنْصُلَا",
  ]},
  {id:"shat-54",title:"سُوْرَةُ الشُّعَرَاءِ",sub:"Sourate Ash-Shu'arâ'",clr:["#0a2540","#154568"],bayts:[
    "وَفِي حَاذِرُونَ الْمدُّ مَا ثُلَّ فَارِهِيْـ # ـنَ ذَاعَ وَخَلْقُ اضْمُمْ وَحَرِّكْ بِهِ الْعُلَا",
    "كَمَا فِي نَدٍ وَالأيْكَةِ اللاَّمُ سَاكِنٌ # مَعَ الْهَمْزِ وَاخْفِضْهُ وَفِي صَادَ غَيْطَلَا",
    "وَفِي نَزَّلَ التَّخْفِيفُ وَالرُّوحُ وَالأَمِيْـ # ـنُ رَفْعُهُماَ عُلْوٌّ سَمَا وَتَبَجَّلَا",
    "وَأَنِّثْ يَكُنْ لِلْيَحْصَبِيْ وَارْفَعَ آيَةً # وَفَا فَتَوَكَّلْ وَاوُ ظَمْآنِهِ حَلَا",
    "وَيَا خَمْسِ أَجْرِيْ مَعْ عِبَادِيْ وَلِيْ مَعِيْ # مَعًا مَعْ أَبِيْ إِنِّيْ مَعًا رَبِّيَ انْجَلا",
  ]},
  {id:"shat-55",title:"سُوْرَةُ النَّمْلِ",sub:"Sourate An-Naml",clr:["#0e2e30","#1c5658"],bayts:[
    "شِهَابٍ بِنُونٍ ثِقْ وَقُلْ يَأْتِيَنَّنِي # دَنَا مَكُثَ افْتَحْ ضَمَّةَ الْكَافِ نَوْفَلَا",
    "مَعًا سَبَأَ افْتَحْ دُونَ نُونٍ حِمًى هُدًى # وَسَكِّنْهُ وَانْوِ الْوَقْفَ زُهْرًا وَمَنْدَلَا",
    "أَلاَ يَسْجُدُوا رَاوٍ وَقِفْ مُبْتَلىً أَلاَ # وَياَ وَاسْجُدُوا وَأبْدَأْهُ بِالضَّمِّ مُوصِلَا",
    "أَرَادَ أَلاَ يَا هؤُلاَءِ اسْجُدُوا وَقِفْ # لَهُ قَبْلَهُ وَالْغَيْرُ أَدْرَجَ مُبْدِلَا",
    "وَقَدْ قِيلَ مَفْعُولًا وَأَنْ أَدْغَمُوا بِلاَ # وَلَيْسَ بِمَقْطُوعٍ فَقِفْ يَسْجُدُوا وَلَا",
    "وَيُخْفُونَ خَاطِبْ يُعْلِنُونَ عَلَى رِضًا # تُمِدُّونَنِي الإِدْغامُ فَازَ فَثَقَّلَا",
    "مَعَ السُّوقِ سَاقَيهاَ وَسُوقِ اهْمِزُوا زَكَا # وَوَجْهٌ بِهَمْزٍ بَعْدَهُ الْوَاوُ وُكِّلَا",
    "نَقُولَنَّ فَاضْمُمْ رَابِعًا وَنُبَيِّتَنْـ # ـنَهُ وَمَعًا فِي النُّونِ خَاطِبْ شَمَرْدَلَا",
    "وَمَعْ فَتْحِ أَنَّ النَّاسَ مَا بَعْدَ مَكْرِهِمْ # لِكُوفٍ وَأَمَّا يُشْرِكُونَ نَدٍ حَلاَ",
    "وَشَدِّدْ وَصِلْ وَامْدُدْ بَلِ أدَّارَكَ الَّذِي # ذَكاَ قَبْلَهُ يَذَّكَّرُونَ لَهُ حُلَا",
    "بِهَادِيْ مَعًا تَهْدِيْ فَشَا الْعُمْيِ نَاصِبًا # وَبِالْيَا لِكُلٍّ قِفْ وَفِي الرُّومِ شَمْلَلَا",
    "وَآتُوهُ فَاقْصُرْ وَافْتَحِ الضَّمَّ عِلْمُهُ # فَشاَ تَفْعَلُونَ الْغَيْبُ حَقٌّ لَهُ وَلَا",
    "وَمَالِيْ وَأَوْزِعْنِيْ وَإِنِّيْ كِلاَهُماَ # لِيَبْلُوَنِي الْيَاءَاتُ فِي قَوْلِ مَنْ بَلَا",
  ]},
  {id:"shat-56",title:"سُوْرَةُ الْقَصَصِ",sub:"Sourate Al-Qasas",clr:["#0a2030","#134560"],bayts:[
    "وَفِي نُرِيَ الْفَتْحَانِ مَعْ أَلِفٍ وَيَا # ئِهِ وَثَلاَثٌ رَفْعُهَا بَعْدُ شُكِّلَا",
    "وَحُزْنًا بِضَمٍّ مَعْ سُكُونٍ شَفَا وَيَصْـ # ـدُرَ اضْمُمْ وَكَسْرُ الضَّمِّ ظَامِيهِ أَنْهَلَا",
    "وَجِذْوَةٍ اضْمُمْ فُزْتَ وَالْفَتْحَ نَلْ وَصُحْـ # ـبَةٌ كَهْفُ ضَمِّ الرَّهْبِ وَاسْكِنْهُ ذُبَّلَا",
    "يُصَدِّقُنِي ارْفَعْ جَزْمَهُ فِي نُصُوصِهِ # وَقُلْ قَالَ مُوسَى وَاحْذِفِ الْوَاوَ دُخْلُلَا",
    "نَمَا نَفَرٌ بِالضَّمِّ وَالْفَتْحِ يَرْجِعُو # نَ سِحْرَانِ ثِقْ فِي سَاحِرَانِ فَتُقْبَلَا",
    "وَيُجْبَى خَلِيطٌ يَعْقِلُونَ حَفِظْتُهُ # وَفِي خُسِفَ الْفَتْحَتَيْنِ حَفْصٌ تَنَخَّلَا",
    "وَعِنْدِيْ وَذُو الثُّنْياَ وَإِنِّيَ أَرْبَعٌ # لَعَلِّيْ مَعًا رَبِّيْ ثَلاَثٌ مَعِيْ اعْتَلَا",
  ]},
  {id:"shat-57",title:"سُوْرَةُ الْعَنْكَبُوتِ",sub:"Sourate Al-'Ankabût",clr:["#0a2a2e","#124a4f"],bayts:[
    "يَرَوْا صُحْبَةٌ خَاطِبْ وَحَرِّكْ وَمُدَّ فِي النْـ # ـنَشَاءَةِ حَقًاّ وَهْوَ حَيْثُ تَنَزَّلَا",
    "مَوَدَّةً المَرْفُوعُ حَقُّ رُوَاتِهِ # وَنَوِّنْهُ وَانْصِبْ بَيْنَكُمْ عَمَّ صَنْدَلَا",
    "وَيَدْعُونَ نَجْمٌ حَافِظٌ وَمُوَحِّدٌ # هُنَا آيَةٌ مِنْ رَبِّهِ صُحْبَةٌ دَلَا",
    "وَفِي وَنَقُولُ الْيَاءُ حِصْنٌ وَيُرْجَعُو # نَ صَفْوٌ وَحَرْفُ الرُّومِ صَافِيهِ حُلِّلاَ",
    "وَذَاتُ ثَلاَثٍ سُكِّنَتْ بَا نُبُوِّئَنْـ # نَ مَعْ خِفِّهِ وَالْهَمْزُ بِالْيَاءِ شَمْلَلَا",
    "وَإِسْكَانُ وَلْ فَاكْسِرْ كَمَا حَجَّ جَا نَدىً # وَرَبِّيْ عِبَادِيْ أَرْضِيَ الْيَا بِهَا انْجَلَا",
  ]},
  {id:"shat-58",title:"مِنْ سُوْرَةِ الرُّوْمِ إِلَى سُوْرَةِ سَبَأٍ",sub:"De sourate Ar-Rûm à sourate Saba'",clr:["#0a2438","#123f5c"],bayts:[
    "وَعَاقِبَةُ الثَّانِيْ سَمَا وَبِنُونِهِ # نُذِيقُ زَكَا لِلْعَالَمِينَ اكْسِرُوا عُلَا",
    "لِيَرْبُوا خِطَابٌ ضُمَّ وَالْوَاوُ سَاكِنٌ # أَتَى وَاجْمَعُوا آثَارِ كَمْ شَرَفًا عَلَا",
    "وَيَنْفَعُ كُوفِيٌّ وَفِي الطَّولِ حِصْنُهُ # وَرَحْمَةً ارْفَعْ فَائِزًا وَمُحَصِّلَا",
    "وَيَتَّخِذَ المَرْفُوعُ غَيْرُ صِحَابِهِمْ # تُصَعِّرْ بِمدٍّ خَفَّ إِذْ شَرْعُهُ حَلَا",
    "وَفِي نِعْمَةً حَرِّكْ وَذُكِّرَ هَاؤُهَا # وَضُمَّ وَلاَ تَنْوِينَ عَنْ حُسْنٍ اعْتَلَا",
    "سِوَى ابْنِ الْعَلاَ وَالْبَحْرُ أُخْفِي سُكُونُهُ # فَشاَ خَلْقَهُ التَّحْرِيكُ حِصْنٌ تَطَوَّلَا",
    "لِمَا صَبَرُوا فَاكْسِرْ وَخَفِّفْ شَذًا وَقُلْ # بِماَ يَعْمَلُونَ اثْناَنِ عَنْ وَلَدِ الْعَلَا",
    "وَبِالْهَمْزِ كُلُّ اللاَّءِ وَالْياَءِ بَعْدَهُ # ذَكَا وَبِيَاءٍ سَاكِنٍ حَجَّ هُمَّلَا",
    "وَكَالْيَاءِ مَكْسُورًا لِوَرْشٍ وَعَنْهُمَا # وَقِفْ مُسْكِنًا وَالْهَمْزُ زَاكِيهِ بُجِّلَا",
    "وَتَظَّاهَرُونَ اضْمُمْهُ وَاكْسِرْ لِعاَصِمٍ # وَفِي الْهَاءِ خَفِّفْ وَامْدُدِ الظَّاءَ ذُبَّلَا",
    "وَخَفَّفَهُ ثَبْتٌ وَفِي قَدْ سَمِعْ كَمَا # هُنَا وَهُناَكَ الظَّاءُ خُفِّفَ نَوْفَلَا",
    "وَحَقُّ صِحَابٍ قَصْرُ وَصْلِ الظَّنُونَ وَالرَّ # سُولَ السَّبِيَلا وَهْوَ فِي الْوَقْفِ فِي حُلَا",
    "مَقَامَ لِحَفْصٍ ضُمَّ وَالثَّانِ عَمَّ فِي الدْ # دُخَانِ وَآتَوْهَا عَلَى الْمَدِّ ذُو حُلاَ",
    "وَفِي الْكُلِّ ضَمُّ الْكَسْرِ فِي إِسْوَةٌ نَدىً # وَقَصْرُ كِفَا حَقٍّ يُضَاعَفْ مُثَقَّلَا",
    "وَبِالْيَا وَفَتْحِ الْعَيْنِ رَفْعُ الْعَذَابَ حِصْـ # ـنُ حُسْنٍ وَتَعْمَلْ نُؤْتِ بِالْيَاءِ شَمْلَلَا",
    "وَقِرْنَ افْتَحْ اذْ نَصُّوا يَكُونَ لَهُ ثَوى # يَحِلُّ سِوَى الْبَصْرِيْ وَخَاتِمَ وُكِّلَا",
    "بِفَتْحٍ نَمَا سَادَاتِنَا اجْمَعْ بِكَسْرَةٍ # كَفَى وَكَثِيرًا نُقْطَةٌ تَحْتُ نُفِّلَا",
  ]},
  {id:"shat-59",title:"سُوْرَةُ سَبَأٍ وَفَاطِرٍ",sub:"Sourates Saba' et Fâtir",clr:["#0c2f35","#155a5e"],bayts:[
    "وَعَالِمِ قُلْ عَلاَّمِ شَاعَ وَرَفْعُ خَفْـ # ... ـضِهِ عَمَّ مِنْ رِجْزٍ أَلِيْمٍ مَعًا وِلَا",
    "عَلَى رَفْعِ خَفْضِ الْمِيمِ دَلَّ عَلِيمُهُ # وَنَخْسِفْ نَشَأْ نُسْقِطْ بِهاَ الْيَاءُ شَمْلَلَا",
    "وَفِي الرِّيحَ رَفْعٌ صَحَّ مِنْسَأَتَهْ سُكُو # نُ هَمْزَتِهِ مَاضٍ وَأَبْدِلْهُ إِذْ حَلَا",
    "مَسَاكِنِهِمْ سَكِّنْهُ وَاقْصُرْ عَلَى شَذًا # وَفِي الْكَافِ فَافْتَحْ عَالِمًا فَتُبَجَّلَا",
    "نُجَازِي بِيَاءٍ وَافْتَحِ الزَّايَ وَالْكَفُو # رَ رَفْعٌ سَمَا كَمْ صَابَ أُكْلٍ أَضِفْ حُلَا",
    "وَحَقُّ لِوَا بَاعِدْ بِقَصْرٍ مُشَدَّدَا # وَصَدَّقَ لِلْكُوفِيِّ جَاءَ مُثَقَّلَا",
    "وَفُزِّعَ فَتْحُ الضَّمِّ وَالْكَسْرِ كَامِلٌ # وَمَنْ أَذِنَ اضْمُمْ حُلْوَ شَرْعٍ تَسَلْسَلَا",
    "وَفِي الْغُرْفَةِ التَّوْحِيدُ فَازَ وَيُهْمَزْ التْـ # ـتَنَاوُشُ حُلْوًا صُحْبَةً وَتَوَصُّلَا",
    "وَأَجْرِىْ عِبَادِيْ رَبِّيَ الْيَا مُضَافُهاَ # وَقُلْ رَفْعُ غَيْرُ اللهِ بِالْخَفْضِ شُكِّلَا",
    "وَنَجْزِي بِياَءٍ ضُمَّ مَعْ فَتْحِ زَايِهِ # وَكُلَّ بِهِ ارْفَعْ وَهْوَ عَنْ وَلَدِ الْعَلَا",
    "وَفِي السَّيِّئِ المَخْفُوضِ هَمْزًا سُكُونُهُ # فَشاَ بَيِّناتٍ قَصْرُ حَقٍّ فَتًى عَلَا",
  ]},
  {id:"shat-60",title:"سُوْرَةُ يس",sub:"Sourate Yâ-Sîn",clr:["#0a1f3a","#153a63"],bayts:[
    "وَتَنْزِيلُ نَصْبُ الرَّفْعِ كَهْفُ صِحاَبِهِ # وَخَفِّفْ فَعَزَّزْناَ لِشُعْبَةَ مُحْمِلَا",
    "وَمَا عَمِلَتْهُ يَحْذِفُ الْهاَءَ صُحْبَةٌ # وَوَالْقَمَرَ ارْفَعْهُ سَماَ وَلَقَدْ حَلَا",
    "وَخَا يَخْصِمُونَ افْتَحْ سَمَا لُذْ وَأَخْفِ حُلْـ # ـوَ بَرٍّ وَسَكِّنْهُ وَخَفِّفْ فَتُكْمِلَا",
    "وَسَاكِنَ شُغْلٍ ضُمَّ ذِكْرًا وَكَسْرُ فِي # ظِلاَلٍ بِضَمٍّ وَاقْصُرِ اللاَّمَ شُلْشُلَا",
    "وَقُلْ جُبُلًا مَعْ كَسْرِ ضَمَّيْهِ ثِقْلُهُ # أَخُو نُصْرَةٍ وَاضْمُمْ وَسَكِّنْ كَذِيْ حَلَا",
    "وَتَنْكُسْهُ فَاضْمُمْهُ وَحَرِّكْ لِعَاصِمٍ # وَحَمْزَةَ وَاكْسِرْ عَنْهُمَا الضَّمَّ أَثْقَلَا",
    "لِيُنْذِرَ دُمْ غُصْنًا وَالاَحْقَافُ هُمْ بِهَا # بِخُلْفٍ هَدَى مَالِيْ وَإِنِّيْ مَعًا حُلَا",
  ]},
  {id:"shat-61",title:"سُوْرَةُ الصَّافَّاتِ",sub:"Sourate As-Sâffât",clr:["#0d2b2b","#1a4f4a"],bayts:[
    "وَصَفًّا وَزَجْرًا ذِكْرًا ادْغَمَ حَمْزَةٌ # وَذَرْوًا بِلاَ رَوْمٍ بِها التَّا فَثَقَّلَا",
    "وَخَلاَّدُهُمْ بِالْخُلْفِ فَالْمُلْقِياَتِ فَالْـ # ـمُغِيرَاتِ فِي ذِكْرًا وَصُبْحًا فَحَصِّلَا",
    "بِزِينَةِ نَوِّنْ فِي نَدٍ وَالْكَوَاكِبِ انْـ # صِبُوا صَفْوَةً يَسَّمَّعُونَ شَذًا عَلَا",
    "بِثِقْلَيْهِ وَاضْمُمْ تَا عَجِبْتَ شَذًا وَسَا # كِنٌ مَعًا اَوْ آبَاؤُنَا كَيْفَ بَلَّلَا",
    "وَفِي يُنْزَفُونَ الزَّايَ فَاكْسِرْ شَذًا وَقُلْ # في الاُخْرى ثَوَى وَاضْمُمْ يَزِفُّونَ فَاكْمُلَا",
    "وَمَاذَا تُرِي بِالضَّمِّ وَالْكَسْرِ شَائِعٌ # وَإِلْيَاسَ حَذْفُ الْهَمْزِ بِالْخُلْفِ مُثِّلَا",
    "وَغَيْرُ صِحَابٍ رَفْعُهُ اللهَ رَبَّكُمْ # وَرَبَّ وَإِلْيَاسِينَ بِالْكَسْرِ وُصِّلَا",
    "مَعَ الْقَصْرِ مَعْ إِسْكَانِ كَسْرٍ دَنَا غِنىً # وَإِنِّيْ وَذُو الثُّنْيَا وَأَنِّيَ اجْمِلَا",
  ]},
  {id:"shat-62",title:"سُوْرَةُ ص",sub:"Sourate Sâd",clr:["#0a2540","#154568"],bayts:[
    "وَضَمُّ فَوَاقٍ شَاعَ خَالِصَةٍ أَضِفْ # لَهُ الرَّحْبُ وَحِّدْ عَبْدَنَا قَبْلُ دُخْلُلَا",
    "وَفي يُوعَدُونَ دمُ حُلًا وَبِقَافَ دُمْ # وَثَقَّلْ غَسَّاقًا مَعًا شَائِدٌ عُلَا",
    "وَآخَرُ لِلْبَصْرِيْ بَضَمٍّ وَقَصْرِهِ # وَوَصْلُ اتَّخَذْناَهُمْ حَلاَ شَرْعُهُ وِلَا",
    "وَفَالْحَقُّ فِى نَصْرٍ وَخُذْ يَاءَ لِيْ مَعًا # وَإِنِّيْ وَبَعْدِيْ مَسَّنِيْ لَعْنَتِيْ إِلَى",
  ]},
  {id:"shat-63",title:"سُوْرَةُ الزُّمَرِ",sub:"Sourate Az-Zumar",clr:["#0e2e30","#1c5658"],bayts:[
    "أَمَنْ خَفَّ حِرْمِيٌّ فَشَا مَدَّ سَالِمًا # مَعَ الْكَسْرِ حَقٌّ عَبْدَهُ اِجْمَعْ شَمَرْدَلَا",
    "وَقُلْ كَاشِفاَتٌ مُمْسِكَاتٌ مُنَوِّنًا # وَرَحْمَتِهِ مَعْ ضُرِّهِ النَّصْبُ حُمِّلَا",
    "وَضُمَّ قَضَى وَاكْسِرْ وَحَرِّكْ وَبَعْدُ رَفْـ # ـعُ شَافٍ مَفَازَاتٍ اجْمَعُوا شَاعَ صَنْدَلَا",
    "وَزِدْ تَأْمُرونِيْ النُّونَ كَهْفًا وَعَمَّ خِفْـ # ـفُهُ فُتِّحَتْ خَفِّفْ وَفِي النَّبإ الْعُلَا",
    "لِكُوفٍ وَخُذْ يَا تَأْمُرُونِي أَرَادَنِيْ # وَإِنِّيْ مَعًا مَعْ يَا عِبَادِيْ فَحَصِّلَا",
  ]},
  {id:"shat-64",title:"سُوْرَةُ الْمُؤْمِنِ",sub:"Sourate Ghâfir",clr:["#0a2030","#134560"],bayts:[
    "وَيَدْعُونَ خَاطِبْ إِذْ لَوَى هَاءُ مِنْهُمُ # بِكَافٍ كَفَى أَوْ أَنْ زِدِ الْهَمْزَ ثُمَّلَا",
    "وَسَكِّنْ لَهُمْ وَاضْمُمْ بِيَظْهَرَ وَاكْسِرَنْ # وَرَفْعَ الْفَسَادَ انْصِبْ إِلَى عَاقِلٍ حَلَا",
    "فَأَطَّلِعَ ارْفَعْ غَيْرَ حَفْصٍ وَقَلْبِ نَوْ # وِنُوا مِنْ حَمِيدٍ أَدْخِلُوا نَفَرٌ صِلَا",
    "عَلَى الْوَصْلِ وَاضْمُمْ كَسْرَهُ يَتَذَكَّرُو # نَ كَهْفٌ سَماَ وَاحْفَظْ مُضاَفَاتِهاَ الْعُلَا",
    "ذَرُونِيَ وَادْعُونِيْ وَإِنِّيْ ثَلاثَةٌ # لَعَلِيِّ وَفِيْ مَالِيْ وَأَمْرِيَ مَعْ إِلى",
  ]},
  {id:"shat-65",title:"سُوْرَةُ فُصِّلَتْ",sub:"Sourate Fussilat",clr:["#0a2a2e","#124a4f"],bayts:[
    "وَإِسْكَانُ نَحْسَاتٍ بِهِ كَسْرُهُ ذَكاَ # وَقَوْلُ مُمِيلِ السِّينِ لِلَّيْثِ أُخْمِلَا",
    "وَنَحْشُرُ يَاءٌ ضُمَّ مَعْ فَتْحِ ضَمِّهِ # وَأَعْدَاءُ خُذْ وَالْجَمْعُ عَمَّ عَقَنْقَلَا",
    "لَدَى ثَمَرَاتٍ ثُمَّ يَا شُرَكَائِىَ الْـ # ـمُضَافُ وَيَا رَبِّيْ بِهِ الْخُلْفُ بُجِّلَا",
  ]},
  {id:"shat-66",title:"سُوْرَةُ الشُّوْرَى وَالزُّخْرُفِ وَالدُّخَانِ",sub:"Sourates Ash-Shûrâ, Az-Zukhruf et Ad-Dukhân",clr:["#0a2438","#123f5c"],bayts:[
    "وَيُوحَى بِفَتْحِ الْحَاءِ دَانَ وَيَفْعَلُو # نَ غَيْرُ صِحَابٍ يَعْلَمَ ارْفَعْ كَماَ اعْتَلَا",
    "بِمَا كَسَبَتْ لاَ فَاءَ عَمَّ كَبِيرَ في # كَبَائِرَ فِيها ثُمَّ فِي النَّجْمِ شَمْلَلَا",
    "وَيُرْسِلَ فَارْفَعْ مَعْ فَيُوحِي مُسَكِّنًا # أَتَانَا وَأَنْ كُنْتُمْ بِكَسْرٍ شَذَا الْعُلَا",
    "وَيَنْشَأُ فِي ضَمٍّ وَثِقْلٍ صِحاَبُهُ # عِبَادُ بِرَفْعِ الدَّالِ فِي عِنْدَ غَلْغَلَا",
    "وَسَكِّنْ وَزِدْ هَمْزًا كَوَاوٍ أَؤُشْهِدوا # أَمِينًا وَفِيهِ الْمَدُّ بِالْخُلْفِ بَلَّلَا",
    "وَقُلْ قَالَ عَنْ كُفْؤٍ وَسَقْفًا بِضَمِّهِ # وَتَحْرِيكِهِ بِالضَّمِّ ذَكَّرَ أَنْبَلَا",
    "وَحُكْمُ صِحَابٍ قَصْرُ هَمْزَةِ جَاءَنَا # وَأَسْوِرَةٌ سَكِّنْ وَبِالْقَصْرِ عُدِّلَا",
    "وَفِي سَلَفًا ضَمَّا شَرِيفٍ وَصَادُهُ # يَصُدُّونَ كَسْرُ الضَّمِّ فِى حَقِّ نَهْشَلَا",
    "ءَآلِهةٌ كُوفٍ يُحَقِّقُ ثَانِيًا # وَقُلْ أَلِفًا لِلْكُلِّ ثَالِثًا اُبْدِلَا",
    "وَفِي تَشْتَهِيهِ تَشْتَهِيْ حَقُّ صُحْبَةٍ # وَفِي تُرْجَعُونَ الْغَيْبُ شَايَعَ دُخْلُلَا",
    "وَفِي قِيلَهُ اكْسِرْ وَاكْسِرِ الضَّمَّ بَعْدُ فِي # نَصِيرٍ وَخَاطِبْ يَعْلَمُونَ كَمَا انْجَلَا",
    "بِتَحْتِيْ عِبَادِيْ الْيَا وَيَغْلِيْ دَناَ عُلًا # وَرَبُّ السَّموَاتِ اخْفِضُوا الرَّفْعَ ثُمَّلاَ",
    "وَضَمَّ اعْتِلُوهُ اكْسِرْ غِنىً إِنَّكَ افْتَحُوا # رَبِيعًا وَقُلْ إِنِّيْ وَلِيْ الْيَاءُ حُمِّلَا",
  ]},
  {id:"shat-67",title:"سُوْرَةُ الشَّرِيْعَةِ وَالأَحْقَافِ",sub:"Sourates Al-Jâthiya et Al-Ahqâf",clr:["#0c2f35","#155a5e"],bayts:[
    "مَعًا رَفْعُ آيَاتٍ عَلَى كَسْرِهِ شَفَا # وَإِنَّ وَفِي أَضْمِرْ بِتَوْكِيدٍ اَوَّلَا",
    "لِنَجْزِيَ يَا نَصٍّ سَمَا وَغِشَاوَةً # بِهِ الْفَتْحُ وَاْلإِسْكَانُ وَالْقَصْرُ شُمِّلَا",
    "وَوَالسَّاعَةَ ارْفَعْ غَيْرَ حَمْزَةَ حُسْنًا الْـ # ـمُحَسِّنُ إِحْسَانًا لِكُوفٍ تَحَوَّلَا",
    "وَغَيْرُ صِحَابٍ أَحْسَنَ ارْفَعْ وَقَبْلَهُ # وَبَعْدُ بِياءٍ ضُمَّ فِعْلاَنِ وُصِّلَا",
    "وَقَلْ عَنْ هِشاَمٍ أَدْغَمُوا تَعِدَانِنِيْ # نُوَفيَهُمْ بِالْيَا لَهُ حَقُّ نَهْشَلَا",
    "وَقُلْ لاَ تَرَى بِالْغَيْبِ وَاضْمُمْ وَبَعْدَهُ # مَسَاكِنَهُمْ بِالرَّفْعِ فَاشِيهِ نُوِّلَا",
    "وَيَاءُ وَلكِنِّيْ وَيَا تَعِدَانِنِيْ # وَإِنِّيْ وَأَوْزِعْنِيْ بِهاَ خُلْفُ مَنْ بَلَا",
  ]},
  {id:"shat-68",title:"وَمِنْ سُوْرَةِ مُحَمَّدٍ ﷺ إِلَى سُوْرَةِ الرَّحْمَنِ عز وجل",sub:"De sourate Muhammad à sourate Ar-Rahmân",clr:["#0a1f3a","#153a63"],bayts:[
    "وَبِالضَّمِّ وَاقْصُرْ وَاكْسِرِ التَّاءَ قَاتَلُوا # عَلَى حُجَّةٍ وَالْقَصْرُ فِي آسِنٍ دَلَا",
    "وَفِي آنِفًا خُلْفٌ هَدَى وَبِضَمِّهِمْ # وَكَسْرٍ وَتَحْرِيْكٍ وَأُمْلِيَ حُصِّلَا",
    "وَأَسْرَارَهُمْ فَاكْسِرْ صِحَابًا وَنَبْلُوَنْـ # ـنَكُمْ نَعْلَمَ الْيَا صِفْ وَنَبْلُوَ وَاقْبَلَا",
    "وَفِي يُؤْمِنُوا حَقٌّ وَبَعْدُ ثَلاثَةٌ # وَفي ياَءِ يُؤْتيِهِ غَدِيرٌ تَسَلْسَلَا",
    "وَبِالضَّمِّ ضُرًّا شَاعَ وَالْكَسْرُ عَنْهُماَ # بِلاَمِ كلاَمَ اللهِ وَالْقَصْرُ وُكِّلَا",
    "بِمَا يَعْمَلُونَ حَجَّ حَرَّكَ شَطْأَهُ # دُعَا مَاجِدٍ وَاقْصُرْ فَآزَرَهُ مُلاَ",
    "وَفِي يَعْمَلُونَ دُمْ يَقُولُ بِياَءٍ إذْ # صَفَا وَاكْسِرُوا أَدْبَارَ إذ فَازَ دُخْلُلَا",
    "وَبِالْيَا يُنَادِيْ قِفْ دَلِيلاَ بِخُلْفِهِ # وَقُلْ مِثْلُ مَا بِالرَّفْعِ شَمَّمَ صَنْدَلَا",
    "وَفي الصَّعْقَةِ اقْصُرْ مُسْكِنَ الْعَيْنِ رَاوِيًا # وَقَوْمَ بِخَفْضِ الْمِيمِ شَرَّفَ حُمَّلَا",
    "وَبَصْرٍ وَأَتْبَعنَا بِوَاتَّبَعَتْ وَمَا # أَلَتْنَا اكْسِرُوا دِنْيًا وَإِنَّ افْتَحُوا الْجَلَا",
    "رِضًا يَصْعَقُونَ اضُمُمْهُ كَمْ نَصَّ وَالْمُسَيْـ # ـطِرُونَ لِساَنٌ عَابَ بِالْخُلْفِ زُمَّلَا",
    "وَصَادٌ كَزَايٍ قَامَ بِالْخُلْفِ ضَبْعُهُ # وَكَذَّبَ يَرْوِيهِ هِشَامٌ مُثَقَّلَا",
    "تُمَارُونَهُ تَمْرُونَهُ وَافْتَحُوا شَذًا # مَناءَةَ لِلْمَكِّيْ زِدِ الْهَمْزَ وَأَحْفِلَا",
    "ويَهْمِزُ ضِيزَى خُشَّعًا خَاشِعًا شَفَا # حَمِيدًا وَخَاطِبْ يَعْلَمُونَ فطِبْ كَلَا",
  ]},
  {id:"shat-69",title:"سُوْرَةُ الرَّحْمَنِ عز وجل",sub:"Sourate Ar-Rahmân",clr:["#0d2b2b","#1a4f4a"],bayts:[
    "وَوَالْحَبُّ ذُو الرَّيْحاَنُ رَفْعُ ثَلاَثِهَا # بِنَصْبٍ كَفَى وَالنُّونُ بِالْخَفْضِ شُكِّلَا",
    "وَيَخْرُجُ فَاضْمُمْ وَافْتَحِ الضَّمَّ إِذْ حَمَى # وَفِى الْمُنْشَآتُ الشِّينُ بِالْكَسْرِ فَاحْمِلَا",
    "صَحِيحًا بِخُلْفٍ نَفْرُغُ الْياءُ شَائِعٌ # شُوَاظٌ بِكَسْرِ الضَّمِّ مَكِّيُّهُمْ جَلَا",
    "وَرَفْعَ نُحَاسٌ جَرَّ حَقٌّ وَكَسْرَ مِيْـ # ـمِ يَطْمِثْ فِي الاُولَى ضُمَّ تُهْدَى وَتُقْبَلَا",
    "وَقَالَ بِهِ اللَّيْثِ فِي الثَّانِ وَحْدَهُ # شُيُوخٌ وَنَصُّ اللَّيْثِ بِالضَّمِّ الاوَّلَا",
    "وَقَوْلُ الْكِسَائِيْ ضُمَّ أَيُّهُمَا تَشَا # وَجِيهٌ وَبَعْضُ الْمُقْرِئِينَ بِهِ تَلا",
    "وَآخِرُهَا يَا ذِي الْجَلاَلِ ابْنُ عَامِرٍ # بِوَاوٍ وَرَسْمُ الشَّامِ فِيهِ تَمَثَّلاَ",
  ]},
  {id:"shat-70",title:"سُوْرَةُ الْوَاقِعَةِ وَالَحَدِيدِ",sub:"Sourates Al-Wâqi'a et Al-Hadîd",clr:["#0a2540","#154568"],bayts:[
    "وَحُورٌ وَعِينٌ خَفْضُ رَفْعِهِمَا شَفَا # وَعُرْبًا سُكُونُ الضَّمِّ صُحِّحَ فَاعْتَلَى",
    "وَخِفُّ قَدَرْناَ دَارَ وَانْضَمَّ شُرْبَ فِي # نَدَى الصَّفْوِ وَاسْتِفْهَامُ إِنَّا صَفَا وِلَا",
    "بِمَوْقِعِ بِالإِسْكاَنِ وَالْقَصْرِ شَائِعٌ # وَقَدْ أَخَذَ اضْمُمْ وَاكْسِرِ الْخَاءَ حُوَّلَا",
    "ومِيثَاقُكُمْ عَنْهُ وَكُلٌّ كَفَى وَأَنْـ # ـظِرُوناَ بِقَطْعٍ وَاكْسِرِ الضَّمَّ فَيْصَلَا",
    "وَيؤْخَذُ غَيْرُ الشَّامِ مَا نَزَلَ الْخَفِيْـ # ـفُ إِذْ عَزَّ وَالصَّادَانِ مِنْ بَعْدُ دُمْ صِلَا",
    "وَآتَاكُمُ فَاقْصُرْ حَفِيظًا وَقُلْ هُوَ الْـ # ـغَنِيُّ هُوَ احْذِفْ عَمَّ وَصْلًا مُوَصَّلَا",
  ]},
  {id:"shat-71",title:"وَمِنْ سُوْرَةِ الْمُجَادَلَةِ إِلَى سُوْرَةِ (ن)",sub:"De sourate Al-Mujâdala à sourate Al-Qalam",clr:["#0e2e30","#1c5658"],bayts:[
    "وَفي يَتَنَاجَوْنَ اقْصُرِ النُّونَ سَاكِنًا # وَقَدِّمْهُ وَاضْمُمْ جِيمَهُ فَتُكَمِّلَا",
    "وَكَسْرُ انْشِزُوا فَاضْمُمْ مَعًا صَفْوَ خُلْفِهِ # عُلًا عَمَّ وَامْدُدْ فِي المَجَالِسِ نَوْفَلَا",
    "وَفي رُسُلِي الْيَا يُخْرِبُونَ الثَّقِيلَ حُزْ # وَمَعْ دُوْلَةً أَنِّثْ يَكُونَ بِخُلْفِ لَاَ",
    "وَكَسْرَ جِدَارٍ ضُمَّ وَالْفَتْحَ وَاقْصُرُوا # ذَوِيْ أُسْوَةٍ إِنِّيْ بَياءٍ تَوَصَّلَا",
    "وَيُفْصَلُ فَتْحُ الضَّمِّ نَصٌّ وَصَادُهُ # بِكَسْرٍ ثَوَى وَالثِّقْلُ شَافِيْهِ كُمِّلَا",
    "وَفى تُمْسِكُوا ثِقْلٌ حَلاَ وَمُتِمُّ لاَ # تُنَوِّنْهُ وَاخْفِضْ نُورَهُ عَنْ شَذًا دَلَا",
    "وَلِله زِد لاَمًا وَأَنْصَارَ نَوِّنًا # سَماَ وَتُنَجِّيكُمْ عَنِ الشَّامِ ثُقِّلَا",
    "وَبَعْدِيْ وَأَنْصَارِيْ بِيَاءِ إِضاَفَةٍ # وَخُشْبٌ سُكُونُ الضَّمِّ زَادَ رِضًا حَلاَ",
    "وَخَفَّ لَوَوْا إِلْفًا بِمَا يَعْمَلُونَ صِفْ # أَكُونَ بِوَاوٍ وَانْصِبُوا الْجَزْمَ حُفَّلَا",
    "وَبَالِغُ لاَ تَنْوِينَ مَعْ خَفْضِ أَمْرِهِ # لِحَفْصٍ وَبِالتَّخَّفِيفِ عَرَّفَ رُفِّلَا",
    "وَضَمَّ نَصُوحًا شُعْبَةٌ مِنْ تَفَوُّتٍ # عَلَى الْقَصْرِ وَالتَّشْدِيدِ شَقَّ تَهَلُّلَا",
    "وَآمِنْتُمُو فِي الْهَمْزَتَيْنِ أُصُولُهُ # وَفي الْوَصْلِ الاُولَى قُنْبُلٌ وَاوًا اَبْدَلَا",
    "فَسُحْقًا سُكُونًا ضُمَّ مَعْ غَيْبِ يَعْلَمُو # نَ مَنْ رُضْ مَعِيْ بِالْيَا وَأَهْلَكَنِيْ انْجَلَا",
  ]},
  {id:"shat-72",title:"وَمِنْ سُوْرَةِ (ن) إِلَى سُوْرَةِ الْقِيَامَةِ",sub:"De sourate Al-Qalam à sourate Al-Qiyâma",clr:["#0a2030","#134560"],bayts:[
    "وَضَمُّهُمُ فِي يَزْلِقُونَكَ خَالِدٌ # وَمَنْ قَبْلَهُ فَاكْسِرْ وَحَرِّكْ رِوًى حَلَا",
    "وَيَخْفَى شِفَاءً مَالِيَهْ مَاهِيَهْ فَصِلْ # وَسُلْطَانِيَهْ مِنْ دُونِ هَاءٍ فَتُوصلَا",
    "وَيَذَّكَّرُونَ يُؤْمِنُونَ مَقاَلُهُ # بِخُلْفٍ لَهُ دَاعٍ وَيَعْرُجُ رُتِّلَا",
    "وَسَالَ بِهَمْزٍ غُصْنُ دَانٍ وَغَيْرُهُمْ # مِنَ الْهَمْزِ أَوْ مِنْ وَاوٍ اَوْ يَاءٍ اَبْدَلَا",
    "وَنَزَّاعَةً فَارْفعْ سِوى حَفْصِهِمْ وَقُلْ # شَهَادَاتِهِمْ بِالْجَمْعِ حَفْصٌ تَقَبَّلَا",
    "إِلى نُصُبٍ فَاضُمُمْ وَحَرِّكْ بِهِ عُلا # كِرَامٍ وَقُلْ وُدًّا بِهِ الضَّمُّ أُعْمِلَا",
    "دُعَائِيْ وَإِنِّيْ ثُمَّ بَيْتِيْ مُضَافُها # مَعَ الْوَاوِ فَافْتَحْ إِنَّ كَمْ شَرَفًا علَا",
    "وَعَنْ كُلِّهِمْ أَنَّ المَسَاجِدَ فَتْحُهُ # وَفِي أَنّهُ لَمَّا بِكَسْرٍ صُوَى العُلَا",
    "وَنَسْلُكْهُ يَا كُوفٍ وَفِي قَالَ إِنَّمَا # هُنَا قُلْ فَشاَ نَصًّا وَطَابَ تَقَبُّلَا",
    "وَقُلْ لِبَدًا فِي كَسْرِهِ الضَّمُّ لَازِمٌ # بِخُلْفٍ وَيَا رَبِّيْ مُضَافٌ تَجَمَّلاَ",
    "وَوَطْئًا وِطَاءً فَاكْسِرُوهُ كَمَا حَكَوْا # وَرَبُّ بِخَفْضِ الرَّفْعِ صُحْبَتُهُ كَلَا",
    "وَثَا ثُلُثِهْ فَانْصِبْ وَفَا نِصْفِهِ ظُبىً # وَثُلْثَيْ سُكُونُ الضَّمِّ لَاحَ وَجَمَّلَا",
    "وَوَالرِّجْزَ ضَمَّ الْكَسْرَ حَفْصٌ إِذَا قُلِ إذْ # وَأَدْبَرَ فَاهْمِزْهُ وَسَكِّنْ عَنِ اجْتِلَا",
    "فَبَادِرْ وَفَا مُسْتَنْفِرَهْ عَمَّ فَتْحُهُ # وَمَا يَذْكُرُونَ الْغَيْبَ خُصَّ وَخُلِّلَا",
  ]},
  {id:"shat-73",title:"وَمِنْ سُوْرَةِ الْقِيَامَةِ إِلَى سُوْرَةِ النَّبَأِ",sub:"De sourate Al-Qiyâma à sourate An-Naba'",clr:["#0a2a2e","#124a4f"],bayts:[
    "وَرَا بَرِقَ افْتَحْ آمِنًا يَذَرُونَ مَعْ # يُحِبُّونَ حَقٌّ كَفَّ يُمْنَى عُلًا عَلَا",
    "سَلاَسِلَ نَوِّنْ إِذْ رَوَوَا صَرْفَهُ لَنَا # وَبَالْقَصْرِ قِفْ مِنْ عَنْ هُدىً خُلْفُهُمْ فَلَا",
    "زَكاَ وَقَوَارِيرًا فَنَوِّنْهُ إِذْ دَنَا # رِضَا صَرْفِهِ وَاقْصُرْهُ فِي الْوَقْفِ فَيْصَلَا",
    "وَفِي الثَّانِ نَوِّنْ إِذْ رَوَوْا صَرْفَهُ وَقُلْ # يَمُدُّ هِشَامٌ وَاقِفًا مَعْهُمُ وِلَا",
    "وَعَالِيهِمُ اسْكِنْ وَاكْسِرِ الضَّمَّ إِذْ فَشَا # وَخُضْرٌ بِرَفْعِ الْخَفْضِ عَمَّ حُلًا عُلَا",
    "وَإِسْتَبْرَقٌ حِرْمِيُّ نَصْرٍ وَخَاطَبُوا # تَشَاءُونَ حِصْنٌ وُقِّتَتْ وَاوُهُ حَلَا",
    "وَبِالْهَمْزِ بَاقِيهِمْ قَدَرْنَا ثَقِيلًا اِذْ # رَساَ وَجِماَلاَتٌ فَوَحِّدْ شَذًا عَلَا",
  ]},
  {id:"shat-74",title:"وَمِنْ سُوْرَةِ النَّبَأِ إِلَى سُوْرَةِ الْعَلَقِ",sub:"De sourate An-Naba' à sourate Al-'Alaq",clr:["#0a2438","#123f5c"],bayts:[
    "وَقُلْ لاَبِثِينَ الْقَصْرُ فَاشٍ وقُلْ وَلاَ # كِذَابًا بِتَخْفِيفِ الْكِسَائِيِّ أَقْبَلَا",
    "وَفي رَفْعِ بَا رَبُّ السَّموَاتِ خَفْضُهُ # ذَلُولٌ وَفِي الرَّحْمنِ نَامِيهِ كَمَّلَا",
    "وَنَاخِرَةً بِالْمَدِّ صُحْبَتُهُمْ وَفي # تَزَكَّى تَصَدَّى الثَّانِ حِرْمِيٌّ اَثْقَلاَ",
    "فَتَنْفَعُهُ فِي رَفْعِهِ نَصْبُ عَاصِمٍ # وَإِنَّا صَبَبْناَ فَتْحُهُ ثَبْتُهُ تَلَا",
    "وَخَفَّفَ حَقٌّ سُجِّرَتْ ثِقْلُ نُشِّرْتْ # شَرِيعَةُ حَقٍّ سُعِّرَتْ عَنْ أُولِي مَلَا",
    "وَظَا بِضَنِينٍ حَقُّ رَاوٍ وَخَفَّ فِي # فَعَدَّلَكَ الْكُوفِي وَحَقُّكَ يَوْمُ لَا",
    "وَفِي فَاكهِينَ اقْصُرْ عُلًا وَخِتاَمُهُ # بِفَتْحٍ وَقَدِّمْ مَدَّهُ رَاشِدًا وَلَا",
    "يُصَلَّى ثَقِيلًا ضُمَّ عَمَّ رِضًا دَنَا # وَبَا تَرْكَبَنَّ اضْمُمْ حَيًا عَمَّ نُهَّلَا",
    "وَمَحْفُوظٌ اخْفِضْ رَفْعَهُ خُصَّ وَهْوَ فِي الْـ # ـمَجِيدِ شَفَا وَالْخِفُّ قَدَّرَ رُتِّلَا",
    "وَبَلْ يُوْثِرُونَ حُزْ وَتَصْلَى يُضَمُّ حُزْ # صَفَا تُسْمَعُ التَّذْكِيرُ حَقٌّ وَذُو جِلَا",
    "وَضَمَّ أُولُوا حَقٍّ وَلاَغِيَةٌ لَهُمْ # مُصَيْطِرٍ اشْمِمْ ضَاعَ وَالْخُلْفُ قُلِّلَا",
    "وَبِالسِّينِ لُذْ وَالْوَتْرِ بِالْكَسْرِ شَائِعٌ # فَقَدَّرَ يَرْوِي اليَحْصَبْيُّ مُثَقَّلَا",
    "وَأَرْبَعُ غَيْبٍ بَعْدَ بَلْ لاَ حُصُولُهَا # يَحُضُّونَ فَتْحُ الضَّمِّ بِالْمَدِّ ثُمِّلَا",
    "يُعَذِّبُ فَافْتَحْهُ وَيُوثِقُ رَاوِيًا # وَيَاءَانِ فِي رَبِّيْ وَفَكَّ ارْفَعَنْ وِلَا",
    "وَبَعْدُ اخْفِضَنْ وَاكْسِرْ وَمُدَّ مُنَوِّنًا # مَعَ الرَّفْعِ إِطْعَامٌ نَدىً عَمَّ فَانْهَلَا",
    "وَمُؤْصَدَةٌ فَاهْمِزْ مَعًا عَنْ فَتىً حِمىً # وَلاَ عَمَّ فِي وَالشَّمْسِ بِالْفاَءِ وَانْجَلَا",
  ]},
  {id:"shat-75",title:"مِنْ سُوْرَةِ الْعَلَقِ إِلَى آخِرِ الْقُرْآنِ",sub:"De sourate Al-'Alaq à la fin du Coran",clr:["#0c2f35","#155a5e"],bayts:[
    "وَعَنْ قُنْبُلٍ قَصْرًا رَوَى ابْنُ مُجاَهِدِ # رَآهُ وَلَمْ يَأْخُذْ بِهِ مُتَعَمِّلَا",
    "وَمَطلَعِ كَسْرُ اللاَّمِ رَحْبٌ وَحَرْفَي الْـ # ـبَرِيَّةِ فَاهْمِزْ آهِلًا مُتَأَهِّلاَ",
    "وَتَا تَرَوُنَّ اضْمُمْ في الاُولَى كَمَا رَسَا # وَجَمَّعَ بِالتَّشْدِيدِ شَافِيهِ كَمَّلَا",
    "وَصُحْبَةٌ الضَّمَّيْنِ فِي عَمَدٍ وَعَوْا # لإِيلاَفِ بِالْيَا غَيْرُ شَامِيِّهِمْ تَلَا",
    "وَإِيلاَفِ كُلٌّ وَهْوَ في الْخَطِّ سَاقِطٌ # وَلِى دِينِ قُلْ فِي الْكَافِرِينَ تَحَصَّلَا",
    "وَهَا أَبِي لَهْبٍ بِالاِسْكَانِ دَوَّنُوا # وَحَمَّالَةُ المَرْفُوعُ بِالنَّصْبِ نُزِّلَا",
  ]},
  {id:"shat-76",title:"بَابُ التَّكْبِيرِ",sub:"At-Takbîr",clr:["#0a1f3a","#153a63"],bayts:[
    "رِوَى الْقَلْبِ ذِكْرُ اللهِ فَاسْتَسْقِ مُقْبِلاَ # وَلاَ تَعْدُ رَوْضَ الذَّاكِرِينَ فَتُمحِلَا",
    "وَآثِرْ عَنِ الآثَارِ مَثْرَاةَ عَذْبِهِ # وَمَا مِثْلُهُ لِلْعَبدِ حِصْنًا وَمَوْئِلَا",
    "وَلاَ عَمَلٌ أَنْجَى لَهُ مِنْ عَذَابِهِ # غَدَاةَ الْجَزَا مِنْ ذِكْرِهِ مُتَقَبَّلَا",
    "ومَنْ شَغَلَ الْقُرْآنُ عَنْهُ لِسَانَهُ # يَنَلْ خَيْرَ أَجْرِ الذَّاكِرِينَ مُكَمَّلَا",
    "وَمَا أَفْضَلُ الأَعْمَالِ إِلاَّ افْتِتَاحُهُ # مَعَ الْخَتْمِ حِلًاّ وَارْتِحاَلًا مُوَصَّلَا",
    "وَفِيهِ عَنِ الْمَكِّيْنَ تَكْبِيرُهُمْ مَعَ الْـ # ـخَوَاتِمِ قُرْبَ الْخَتْمِ يُرْوَى مُسَلْسَلَا",
    "إِذا كَبَّرُوا في آخِرِ النَّاسِ أَرْدَفُوا # مَعَ الْحَمْدِ حَتَّى الْمُفْلِحُونَ تَوَسُّلَا",
    "وَقَالَ بِهِ الْبَزِّيُّ مِنْ آخِرِ الضُّحَى # وَبَعْضٌ لَهُ مِنْ آخِرِ اللَّيْلِ وَصَّلَا",
    "فَإِنْ شِئْتَ فَاقْطَعْ دُونَهُ أَوْ عَلَيْهِ أَوْ # صِلِ الْكُلَّ دُونَ الْقَطْعِ مَعْهُ مُبَسْمِلَا",
    "وَمَا قَبْلَهُ مِنْ سَاكِنٍ أَوْ مُنَوَّنٍ # فَلِلسَّاكِنَيْنِ اكْسِرْهُ فِي الْوَصْلِ مُرْسَلَا",
    "وَأَدْرِجْ عَلَى إِعْرَابِهِ مَا سِوَاهُمَا # وَلاَ تَصِلَنْ هَاءَ الضَّمِيرِ لِتُوصَلاَ",
    "وَقُلْ لَفْظُهُ اللهُ أَكْبَرْ وَقَبْلَهُ # لَأَحْمَدَ زَادَ ابْنُ الْحُبَابِ فَهَلَّلَا",
    "وَقِيلَ بِهذَا عَنْ أَبِي الْفَتْحِ فَارِسٍ # وَعَنْ قُنْبُلٍ بَعْضٌ بِتَكْبِيرِهِ تَلَا",
  ]},
  {id:"shat-77",title:"بَابُ مَخَارِجِ الْحُرُوفِ وَصِفَاتِهَا الَّتِي يَحْتَاجُ الْقَارِئُ إِلَيْهَا",sub:"Points d'articulation et caractéristiques des lettres",clr:["#0d2b2b","#1a4f4a"],bayts:[
    "وَهَاكَ مَوَازِينَ الْحُرُوفِ وَمَا حَكَى # جَهَابِذَةُ النُّقَّادِ فِيهاَ مُحَصَّلَا",
    "وَلاَ رِيَبةٌ فِي عَيْنِهِنَّ وَلاَ رِبَا # وَعِنْدَ صَلِيلِ الزَّيْفِ يَصْدُقُ الاِبْتِلَا",
    "وَلاَ بُدَّ فِي تَعْيِينِهِنَّ مِنَ الأُولَى # عُنُوا بِالْمَعانِيْ عَامِلِيْنَ وَقُوَّلا",
    "فَابْدَأْ مِنْهاَ بِالْمَخَارِجِ مُرْدِفًا # لَهُنَّ بِمَشْهُورِ الصِّفَاتِ مُفَصِّلَا",
    "ثَلاَثٌ بِأَقْصَى الْحَلْقِ وَاثْنانِ وَسْطَهُ # وَحَرْفَانِ مِنْهاَ أَوَّلَ الْحَلْقِ جُمِّلَا",
    "وَحَرْفٌ لَهُ أَقْصَى اللِّسَانِ وَفَوْقَهْ # مِنَ الْحَنَكِ احْفَظْهُ وَحَرْفٌ بِأَسْفَلَا",
    "وَوَسْطُهُمَا مِنْهُ ثَلاَثٌ وَحَافَةُ الْـ # ـلِسَانِ فَأَقْصَاهَا لِحَرْفٍ تَطَوَّلَا",
    "إِلى مَا يَلِي الأَضْرَاسَ وَهْوَ لَدَيْهِمَا # يَعِزُّ وَبِالْيُمْنَى يَكُونُ مُقَلَّلًا",
    "وَحَرْفٌ بِأَدْنَاهَا إِلى مُنْتَهاَهُ قَدْ # يَلِي الْحَنَكَ الأَعْلى وَدُونَهُ ذُو وِلَا",
    "وَحَرْفٌ يُدَانِيهِ إِلَى الظَّهْرِ مَدْخَلٌ # وَكَمْ حَاذِقٍ مَعْ سِيبَويْهِ بِهِ اجْتَلَا",
    "وَمِنْ طَرَفٍ هُنَّ الثَّلاثُ لِقُطْرُبٍ # وَيَحْيَى مَعَ الْجَرْمِيِّ مَعْناَهُ قُوِّلَا",
    "وَمِنْهُ وَمِنْ عُلْيَا الثَّنَايَا ثَلاَثَةٌ # وَمِنْهُ وَمِنْ أَطْرَافِهاَ مِثْلُهاَ انْجَلَى",
    "وَمِنْهُ وَمِنْ بَيْنِ الثنَايَا ثَلاَثَةٌ # وَحَرْفٌ مِنْ اطْرَافِ الثَّنَاياَ هِيَ الْعُلاَ",
    "وَمِنْ بَاطِنِ السُّفْلَى مِنَ الشَّفَتَيْنِ قُلْ # وَلِلشَّفَتَيْنِ اجْعَلْ ثَلاَثًا لِتَعْدِلَا",
    "وَفِي أَوَّلٍ مِنْ كِلْمِ بَيْتَيْنِ جَمْعُهَا # سِوَى أَرْبَعٍ فِيهِنَّ كِلْمَةٌ اَوَّلَا",
    "أَهَاعَ حَشَا غَاوٍ خَلاَ قَارِئٍ كَمَا # جَرَى شَرْطُ يُسْرَى ضَارِعٍ لاحَ نَوْفَلَا",
    "رَعَى طُهْرَ دِينٍ تَمَّهُ ظِلُّ ذِي ثَناَ # صَفَا سَجْلُ زُهْدٍ فِي وُجُوهِ بَنِي مَلَا",
    "وَغُنَّةُ تَنْوِينٍ وَنُونٍ وَمِيمٍ اِنْ # سَكَنَّ وَلاَ إِظْهَارَ فِي الأَنْفِ يُجْتَلَى",
    "وَجَهْرٌ وَرَخْوٌ وَانْفِتَاحٌ صِفَاتُهَا # وَمُسْتَفِلٌ فَاجْمَعْ بِالاَضْدَادِ أَشْمُلَا",
    "فَمَهْمُوسُهاَ عَشْرٌ (حَثَتْ كِسْفَ شَخْصِهِ) # (أَجَدَّتْ كَقُطْبٍ) لِلشَّدِيدَةِ مُثِّلَا",
    "وَمَا بَيْنَ رَخْوٍ وَالشَّدِيدَةِ (عَمْرُنَلْ) # وَ(وَايٌ) حُرُوفُ الْمَدِّ وَالرَّخْوِ كَمَّلَا",
    "وَ(قِظْ خُصَّ ضَغْطٍ) سَبْعُ عُلُوٍ وَمُطْبَقٌ # هُوَ الضَّادُ وَالظَّا أُعْجِما وَإِنُ اهْمِلَا",
    "وَصَادٌ وَسِينٌ مُهْمَلانِ وَزَايُهَا # صَفِيرٌ وَشِينٌ بِالتَّفَشِّي تَعَمَّلَا",
    "وَمُنْحَرِفٌ لاَمٌ وَرَاءٌ وَكُرِّرَتْ # كَمَا الْمُسْتَطِيلُ الضَّادُ لَيْسَ بِأَغْفَلَا",
    "كَمَا اْلأَلِفُ الْهَاوِي وَ(آوِي) لِعِلَّةٍ # وَفِي (قُطْبِ جَدٍّ) خَمْسُ قَلْقَلَةٍ عُلَا",
    "وَأَعْرَفُهُنَّ الْقَافُ كُلُّ يَعُدُّهَا # فَهذَا مَعَ التَّوْفِيقِ كَافٍ مُحَصِّلَا",
  ]},
  {id:"shat-78",title:"(الخاتمة)",sub:"Conclusion",clr:["#0a2540","#154568"],bayts:[

    "صِفَاتُهَا جَهْرٌ وَرَخْوٌ مُسْتَفِلْ # مُنْفَتِحٌ مُصْمَتَةُ وَالضِّدَّ قُلْ",
    "مَهْمُوسُهَا فَحَثَّهُ شَخْصٌ سَكَتْ # شدِيدُهَا لَفْظُ أَجِدْ قَطِ بَكَتْ",
    "وَبَيْنَ رِخْوٍ وَالشَّدِيدِ لِنْ عُمَرْ # وَسَبْعُ عُلْوٍ خُصَّ ضَغْطٍ قِظْ حَصَرْ",
    "وَصَادُ ضَادٌ طَاءُ ظَاءٌ مُطبَقَهْ # وَفِرَّ مِنْ لُبِّ الْحُرُوفُ المُذْلَقَهْ",
    "صَفِيرُهَا صَادٌ وَزَايٌ سِينُ # قَلْقَلَةٌ قُطْبُ جَدٍ وَالِّلِيْنُ",
    "وَاوٌ وَيَاءٌ سَكَنَا وَانْفَتَحَا # قَبْلَهُمَا والاِنْحِراَفُ صُحِّحَا",
    "فِى اللاَّمِ وَالرَّا وَبِتَكْرِيرٍ جُعِلْ # وَللِتَّفَشِّي الشِّينُ ضَادًا اسْتَطِلْ",
    "وَيُقْرَأُ الْقُرآنُ بِالتَّحْقِيقِ مَعْ # حَدْرٍ وَتَدْوِيرٍ وَكُلٌّ مُتَّبَعْ",
    "مَعْ حُسْنِ صَوْتٍ بِلُحُونِ الْعَرَبِ # مُرَتَّلًا مُجَوَّدًا بِالْعَرَبِي",
    "وَاْلأَخْذُ بِالتَّجْوِيدِ حَتْمٌ لاَزِمُ # مَنْ لَمْ يُجَوِّدِ الْقُرَآنَ آثِمُ",
    "ِلأَنَّهُ بِهِ اْلإلَهُ أَنْزَلاَ # وَهكَذَا عَنْهُ إِلَيْنَا وَصَلاَ",
    "وَهُوَ إِعْطَاءُ الحُرُوفِ حَقَّهَا # مِنْ صِفَةٍ لهَاَ وَمُسْتَحَقَّهَا",
    "مُكَمَّلًا مِنْ غَيْرِمَا تَكَلُّفِ # بِاللُّطْفِ فِى النُّطْقِ بِلاَ تَعَسُّفِ",
    "فَرَقِّقَنْ مُسْتَفِلًا مِنْ أَحْرُفِ # وَحَاذِرَنْ تَفْخِيمَ لَفْظِ اْلأَلِفِ",
    "كَهَمْزِ أَلْحَمْدُ أَعُوذُ إِهْدِنَا # اللهُ ثُمَّ لاَمِ لِلَّهِ لَنَا",
    "وَلْيَتَلَطَّفْ وَعَلَى اللهِ وَلاَ الضْ # وَالْمِيمِ مِنْ مَخْمَصَةٍ وَمِنْ مَرَضْ",
    "وَبَاءِ بِسْمِ بَاطِلٌ وَبَرْقُ # وَحَاءِ حَصْحَصَ أَحَطْتُ الْحَقُّ",
    "وَبَيِّنِ اْلأِطْبَاقَ مِنْ أَحَطْتُ مَعْ # بَسَطْتَ وَالْخُلْفُ بِنَخْلُقْكُمْ وَقَعْ",
    "وَأَظْهِرِ الْغُنَّةَ مِنْ نُونٍ وَمِنْ # مِيمٍ إِذَا مَا شُدِّدَا وَأخْفِيَنْ",
    "اَلْمِيْمَ إِنْ تَسْكُنْ بِغُنَّةٍ لَدَى # بَاءٍ عَلى المُخْتَارِ مِنْ أَهْلِ اْلأَدَا",
    "وَأَظْهِرَنْهاَ عِنْدَ بَاقِي اْلأَحْرُفِ # وَاحْذَرْ لَدىَ وَاوٍ وَفَا أَنْ تَخْتَفِي",
    "وَأَوَّلَيْ مِثْلٍ وَجِنْسٍ إنْ سَكَنْ # أَدْغِمْ كَقُلْ رَبِّ وَبَلْ لاَ وَأَبِنْ",
    "سَبِّحْهُ فَاصْفَحْ عَنْهُمُ قَالُوا وَهُمْ # فِى يَوْمِ لاَ تُزِغْ قُلُوبَ قُلْ نَعَمْ",
    "وَبَعْدَ مَا تُحْسِنُ أَنْ تَجَوِّدَا # لاَبُدَّ أَنْ تَعْرِفَ وَقْفًا وَابْتِدَا",
    "فاَلَّلفْظُ إِنْ تَمَّ وَلاَ تَعَلُّقَا # تَامٌّ وَكَافٍ إِنْ بِمَعْنىً عُلِّقَا",
    "قِفْ وَابْتَدِئْ وَإِنْ بِلَفْظٍ فَحَسَنْ # فَقِفْ وَلاَ تَبْدَا سِوَى الآيِ يُسَنْ",
    "وَغَيْرُ مَاَ تَمَّ قَبِيحٌ وَلَهُ # يُوقَفُ مُضْطَرًّا وَيُبْدَا قَبْلَهُ",
    "وَلَيْسَ فِى الْقُرآنِ مِنْ وَقْفٍ يَجِبْ # وَلاَ حَرَامٍ غَيْرَ مَالَهُ سَبَبْ",
    "وَفِيهِمَا رِعَايَةُ الرَّسْمِ اشْتُرِطْ # وَالْقَطْعُ كَالْوَقْفِ وَبِالآيِ شُرِطْ",
    "والسَّكْتُ مِنْ دُونِ تَنَفُّسٍ وَخُصْ # بِذِيْ اتِصَالٍ وَانْفِصَالٍ حَيْثُ نُصْ",
    "وَالآنَ حِينُ اْلأَخْذِ فى المُرَاد # والله ُحَسْبِيْ وَهُوَ اعْتِمادِيْ",
  ]},
  {id:"tayb-02",title:"بَابُ الاسْتِعَاذَة",sub:"Al-Isti'âdha (formule de refuge)",clr:["#0a2438","#123f5c"],bayts:[
    "وَقُلْ أَعُوذُ إِنْ أَرَدتَ تَقْرَا # كَالنَّحْلِ جَهْرًا لِجَمِيعِ الْقُرَّا",
    "وَإِنْ تُغَيِّرْ أَوْ تَزِدْ لَفْظًا فَلاَ # تَعْدُ الَّذِى قَدْ صَحَّ مِمَّا نُقِلاَ",
    "وَقِيلَ يُخْفِي حَمْزَةٌ حَيْثُ تَلاَ # وَقِيلَ لاَ فَاتِحَةٌ وَعُلِّلاَ",
    "وَقِفْ لَهُمْ عَلَيْهِ أَوْ صِلْ وَاسْتُحِبْ # تَعُوُّذٌ وَقالَ بَعْضُهُمْ يَجِبْ",
  ]},
  {id:"tayb-03",title:"بَابُ الْبَسْمَلَةِ",sub:"Al-Basmala",clr:["#0c2f35","#155a5e"],bayts:[
    "بَسْمَلَ بَيْنَ السُّوَرتَيْنِ بِي نَصَفْ # دُمْ ثِقْ رَجا وَصِلْ فَشَا وَعَنْ خَلَفْ",
    "فاَسْكُتْ فَصِلْ وَالخُلْفُ كَمْ حِمًا جَلاَ # وَاخْتِيْرَ لِلسَّاكِتِ فى وَيْلٌ وَلاَ",
    "بَسْمَلَةٌ، وَالسَّكْتُ عَمَّنْ وَصَلاَ # وَفِي اْبتِدَا السُّورَةِ كُلٌّ بَسْمَلاَ",
    "سِوَى بَرَاءَةٍ فَلاَ وَلَوْ وُصِلْ # وَوَسَطًا خَيِّرْ وَفِيهَا يَحْتَمِلْ",
    "وَإِنْ وَصَلْتَهَا بِآخِرِ السُّوَرْ # فَلاَ تَقِفْ وَغَيْرُهُ لاَ يُحْتَجَرْ",
  ]},
  {id:"tayb-04",title:"سُورَةُ أُمِّ الْقُرْآنِ",sub:"Sourate Al-Fâtiha",clr:["#0a1f3a","#153a63"],bayts:[
    "مَالِكِ نَلْ ظِلًاّ رَوَى السِّرَاطَ مَعْ # سِرَاطَ زِنْ خُلْفًا غَلاَ كَيْفَ وَقَعْ",
    "وَالصَّادُ كَالزَّايِ ضَفَا اْلأَوَّلُ قِفْ # وَفِيهِ وَالثَّانِيْ وَذِيْ اللاَّمِ اخْتُلِفْ",
    "وَبَابُ أَصْدَقُ شَفَا وَالْخُلْفُ غَرْ # يُصْدِرَ غِثْ شَفَا المُصَيْطِروُنَ ضَرْ",
    "قِ الْخُلْفَ مَعْ مُصَيْطِرٍ وَالسِّينُ لِي # وَفِيهِما الْخُلْفُ زَكِيٌّ عَنْ مَلِي",
    "عَلَيْهِمُو إلَيْهِمُو لَدَيْهِمُو # بِضَمِّ كَسْرِ الْهَاَءِ ظَبْيٌ فَهِمُ",
    "وَبَعْدَ يَاءٍ سَكَنَتْ لاَ مُفْرَدَا # ظَاهِرْ وَإِنْ تَزُلْ كَيُخْزِهْمِ غَدَا",
    "وَخُلْفُ يُلْهِهِمْ قِهِمْ ويُغْنِهِمْ # عَنْهُ وَلاَ يَضُمُّ مَنْ يُوَلِّهِمْ",
    "وَضَمَّ مِيمَ الْجَمْعِ صِلْ ثَبْتٌ دَرَا # قَبْلَ مُحَرَّكٍ وَبِالْخُلْفِ بَرَا",
    "وَقَبْلَ هَمْزِ الْقَطْعِ وَرْشٌ وَاكْسِرُوا # قَبْلَ السُّكُونِ بَعْدَ كَسْرٍ حَرَّرُوا",
    "وَصْلًا وَبَاقِيهِمْ بِضَمٍ وَشَفَا # مَعْ مِيمٍ الهْاَءَ وَأَتْبِعْ ظُرَفَا",
  ]},
  {id:"tayb-05",title:"بَابُ الإِدْغَامِ الْكَبِيرِ",sub:"Le grand Idghâm",clr:["#0d2b2b","#1a4f4a"],bayts:[
    "إِذَا الْتَقَى خَطًّا مُحَرَّكَانِ # مِثْلاَنِ جِنْسَانِ مُقَارِبَانِ",
    "أَدْغِمْ بِخُلْفِ الدُّورِ وَالسُّوسِي مَعَا # لَكِنْ بِوَجْهِ الْهَمْزِ وَالمَدِّ امْنَعَا",
