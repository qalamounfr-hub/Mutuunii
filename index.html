    "فَكِلْمَةً مِثْلَيْ مَنَاسِككُّمْ وَما # سَلَكَكُمْ وَكِلْمَتَيْنِ عَمِّمَا",
    "مَا لَمْ يُنَوَّنْ أَوْ يَكُنْ تَا مُضْمَرِ # وَلاَ مُشَدَّدًا وَفى الْجَزْمِ انْظُرِ",
    "فإِنْ تَمَاثَلاَ فَفِيْهِ خُلْفُ # وَإِنْ تقَارَبَا فَفِيْهِ ضُعْفُ",
    "والْخُلْفُ فِى وَاوِ هُوَ المضْمُومِ هَا # وَآلَ لُوطٍ جِئْتِ شَيْئًا كَافَ هَا",
    "كالَّلآءِ لاَ يَحْزُنْكَ فَامْنَعْ وَكَلِمْ # رُضْ سَنَشُدُّ حُجَّتَكْ بَذْلُ قُثَمْ",
    "تُدْغَمُ فِى جِنْسٍ وَقُرْبٍ فُصِّلاَ # فَالرَّاءُ فِى اللاَّمِ وَهِي فى الرَّاءِ لاَ",
    "إِن فُتِحَا عَنْ سَاكِنٍ لاَ قَالَ ثُمْ # لاَ عَنْ سُكُونٍ فِيهِمَا النُّونُ اُدُّغِمْ",
    "وَنَحْنُ أَدْغِمْ ضَادَ بَعْضِ شَانِ نُصْ # سِينُ النُّفُوسِ الرَّاسُ بِالْخُلْفِ يُخَصْ",
    "مَعْ شِينِ عَرْشِ الدِّالُ فِى عَشْرٍ سَنَا # ذَا ضِقْ تَرَى شِدْ ثِقْ ظُبًا زِدْ صِفْ جَنَا",
    "إِلاَّ بِفَتْحٍ عَنْ سُكُونٍ غَيْرَ تَا # وَالتَّاءُ فِى الْعَشْرِ وَفِي الطَّا ثَبَتَا",
    "وَالخُلْفُ فِى الزَّكَاةَ وَالتَّوْرَاةَ حَلْ # وَلْتَأْتِ آتٍ وَلِثَا الخَمْسُ اْلأُوَلْ",
    "وَالكَافُ فِى الْقَافِ وَهِي فِيهَا وَإِنْ # بِكِلْمَةٍ فَمِيمُ جَمْعٍ وَاشْرُطَنْ",
    "فِيهِنَّ عَنْ مُحَرَّكٍ وَالْخُلْفُ فِي # طَلَّقَكُنَّ وَلِحَا زُحْزِحَ فِي",
    "وَالذَّالُ فِى سِينٍ وَصَادِ الجْيِمُ صَحْ # مِنْ ذِي المَعَارِجِ وَشَطْأَهُ رَجَحْ",
    "وَالْبَاءُ فِى مِيمِ يُعَذِّبْ مَنْ فَقَطْ # وَالْحَرْفُ بِالصِّفَةِ إِنْ يُدْغَمْ سَقَطْ",
    "وَالمْيِمُ عِنْدَ الْبَاءِ عَنْ مُحَرَّكِ # تَخْفَى وَأَشْمِمَنْ وَرُمْ أَوِ اتْرُكِ",
    "فِى غَيْرِ بَا وَالمْيِمِ عَنْهُماَ وَعَنْ # بَعْضٍ بِغَيْرِ الْفَا وَمُعْتَلٌّ سَكَنْ",
    "قَبْلُ امْدُدَنْ وَاقْصُرْهُ وَالصَّحِيحُ قَلْ # إِدْغَامُهُ لِلْعُسْرِ وَاْلإِخْفَا أَجَلْ",
    "وَافَقَ فِى إِدْغَامِ صَفًاّ زَجْرَا # ذِكْرًا وَذَرْوًا فِدْ وَذِكْرًا الاُخْرَى",
    "صُبْحًا قَرَا خُلْفٍ وَبَا وَالصَّاحِبِ # بِكَ تَّمَارَى ظَنَّ أَنْسَابَ غَبِي",
    "ثُمَّ تَّفَكَّروُا نُسَبِّحَكْ كِلاَ # بَعْدُ وَرَجِّحْ لَذَهَبْ وَقِبَلاَ",
    "جَعَلَ نَحْلٍ أَنَّهُ النَّجْمِ مَعَا # وَخُلْفُ الاَوَّلَيْنِ مَعْ لِتُصْنَعَا",
    "مُبَدِّلَ الْكَهْفِ وَبَا الْكِتَابَا # بِأَيْدِ بِالْحَقِّ وَإِنْ عَذَبَا",
    "وَالْكَافُ فِى كَانُوا وَكَلاَّ أَنْزَلاَ # لَكُمْ تَمَثَّلْ وَجَهَنَّمْ جَعَلاَ",
    "شُورى وَعَنْهُ (رويس) الْبَعْضُ فِيهَا أَسْجَلاَ # وقِيلَ عَنْ يَعْقُوبَ مَا ِلاْبنِ الْعَلاَ",
    "بَيَّتَ حُزْ فُزْ تَعِدَانِنِي لَطُفْ # وَفِى تُمِدُّونَنِ فَضْلُهُ ظَرُفْ",
    "مَكَّنِّ غَيْرُ الْمَكِّ تَأْمَنَّا أَشِمْ # وَرُمْ لِكُلِّهِمْ وَبِالْمَحْضِ ثَرِمْ",
  ]},
  {id:"tayb-06",title:"بَابُ هَاءِ الْكِنَايَةِ",sub:"Le Hâ' de rappel (Kinâya)",clr:["#0a2540","#154568"],bayts:[
    "صِلْ هَا الضَّمِيرِ عَنْ سُكُوِنٍ قَبْل مَا # حُرِّكَ دِنْ فِيْهِ مُهَانًا عَنْ دُمَا",
    "سَكِّنْ يُؤَدِّهْ نُصْلِهِ نُؤْتِهْ نُوَلْ # صِف لِيْ ثَنًا خُلْفُهُمَا فِنَاهُ حَلْ",
    "وَهُمْ وَحَفْصٌ أَلْقِهِ اِقْصُرْهُنَّ كَمْ # خُلْفٌ ظُبىً بِنْ ثِقْ وَيَتَّقِهْ ظُلَمْ",
    "بَلْ عُدْ وَخُلْفًا كَمْ ذَكَا وَسَكِّنَا # خَفْ لَوْمَ قَوْمٍ خُلْفُهُمْ صَعْبٌ حَنَا",
    "وَالْقَافَ عُدْ يَرْضَهْ يَفِي وَالْخُلْفُ لَا # صُنْ ذاَ طُوَى اقْصُرْ فِى ظُبىً لُذْ نَلْ أَلاَ",
    "واَلْخُلْفُ خَلْ مِزْ يَأْتِهِ الْخُلْفُ بُرَهْ # خُذْ غِثْ سُكُونُ الْخُلْفِ يَا وَلَمْ يَرَهْ",
    "لِي الْخُلْفُ زُلْزِلَتْ خَلاَ الْخُلْفُ لِمَا # وَاقْصُرْ بخُلْفِ السَّورَتَيْنِ خَفْ ظَمَا",
    "بِيَدِهِ غِثْ تُرْزَقَانِهِ اْختُلِفْ # بِنْ خُذْ عَلَيْهِ اللهَ أَنْسَانِيهِ عِفْ",
    "بِضَمِّ كَسْرٍ أَهْلِهِ امْكُثُوا فِدَا # وَاَلاصْبَهَانِيُّ بِهِ انْظُرْ جَوَّدَا",
    "وَهَمْزُ أَرْجِئْهُ كَسَا حَقًّا وَهَا # فَاقْصُرْ حِمًا بِنْ مِلْ وَخُلْفٌ خُذْ لَهَا",
    "وَأَسْكِنَنْ فُزْ نَلْ وَضُمَّ الكَسْرَ لِيْ # حَقٌّ وَعَنْ شُعْبَةَ كَالْبَصْرِ انْقُلِ",
    "إِنْ حَرْفُ مَدٍّ قَبْلَ هَمْزٍ طَوَّلاَ # جُدْ فِدْ وَمِزْ خُلْفًا وَعَنْ بَاقِي الْمَلاَ",
    "وَسِّطْ وَقِيلَ دُونَهُمْ نَلْ ثُمَّ كَلْ # رَوَى فَبَاقِيهِمْ أَوَ اشْبِعْ مَا اتَّصَلْ",
    "لِلْكُلِّ عَنْ بَعْضٍ وَقَّصْرُ المنُفْصِلْ # بِنْ لِي حِمًا عَنْ خُلْفِهِمْ دَاعٍ ثَمِلْ",
    "وَالْبَعْضُ للِتَّعْظِيمِ عَن ذِي الْقَصْرِ مَدْ # وَأَزْرَقٌ إِنْ بَعْدَ هَمْزٍ حَرْفُ مَدْ",
    "مُدَّ لَهُ وَاقْصُرْ وَوَسِّطْ كَنَأَى # فَاْلآنَ أُوتُوا إِيْءَءَامَنْتُمْ رَأَى",
  ]},
  {id:"tayb-07",title:"بَابُ الْمَدِّ وَالْقَصْرِ",sub:"Madd et Qasr (prolongations)",clr:["#0e2e30","#1c5658"],bayts:[
    "لاَ عَنْ مُنَوَّنٍ وَلاَ السَّاكِنِ صَحْ # بِكلْمِةٍ أَوْ هَمْزِ وَصْلٍ فِي اْلأَصَحْ",
    "وَامْنَعْ يُؤَاخِذْ وَبِعَادًا الاُوْلَى # خُلْفٌ وَآلآنَ وَإِسْرَائِيلاَ",
    "وَحَرْفَيِ اللِّينِ قُبَيْلَ هَمْزَةِ # عَنْهُ امْدُدَنْ وَوَسِّطَنْ بِكِلْمَةِ",
    "لاَ مَوْئِلًا مَوْءُودَةٌ وَالْبَعْضُ قَدْ # قَصَّرَ سَوْءاتٍ وَبَعْضٌ خَصَّ مَدْ",
    "شَيْئٍ لَهُ مَعْ حَمْزَةٍ وَالْبَعْضُ مَدْ # لِحَمْزَةٍ فِى نَفْيِ لاَ كَلاَ مَرَدْ",
    "وَأَشْبِعِ الْمَدَّ لِسَاكِنٍ لَزِمْ # وَنَحْوُ عَيْنٍ فَالثَّلاَثَةُ لَهُمْ",
    "كَسَاكِنِ الْوَقْفِ وَفِي اللِّينِ يَقِلْ # طُولٌ وَأَقْوىَ السَّبَبَيْنِ يَسْتَقِلْ",
    "وَالْمَدُّ أَوْلَى إِنْ تَغَيَّرَ السَّبَبْ # وَبَقِيَ اْلأَثَرُ أَوْ فَاقْصُرْ أَحَبْ",
    "ثَانِيهِمَا سَهِّلْ غِنَى حِرْمٍ حَلاَ # وَخُلْفُ ذِي الْفَتْحِ لَوىَ أَبْدِلْ جَلاَ",
    "خُلْفًا وَغَيْرُ المَكِّ أَنْ يُؤْتَى أَحَدْ # يُخْبِرُ أَنْ كَانَ رَوَى اعْلَمْ حَبْرُ عَدْ",
    "وَحُقِّقَتْ شِمْ فِي صَبَا وَأَعْجَمِي # حَم شِدْ صُحْبَةَ أَخْبِرْ زِدْ لُمِ",
    "غُصْ خُلْفُهُمْ أَذْهَبْتُمُ اتْلُ حُزْ كَفَا # وَدِنْ ثَنَا إِنَّكْ َلأَنْتَ يُوسُفَا",
    "وَءَائِذَا مَامُتُّ بِالْخُلْفِ مَتَى # إِنَّا لَمُغْرَمُونَ غَيْرُ شُعْبَتَا",
    "أَئِنَّكُمْ َلاْعَرافَ عَنْ مَدًا أَئِنْ # لَناَ بِهَا حِرْمٌ عَلاَ وَالْخُلْفُ زِنْ",
    "آمَنْتُمُو طَهَ وَفِي الثَّلاَثِ عَنْ # حَفْصٍ رُوَيْسٍ اَلاصْبَهَانِيْ أَخْبِرَنْ",
    "وَحَقَّقَ الثَّلاَثَ لِي الْخُلْفُ شَفَا # صِفْ شِمْءَآلِهَتُنَا شَهْدٌ كَفَا",
  ]},
  {id:"tayb-08",title:"بَابُ الهَمْزَتَيْنِ مِنْ كَلِمَةٍ",sub:"Les deux Hamza dans un mot",clr:["#0a2030","#134560"],bayts:[
    "وَالْمُلْكَ وَالأَعْرَافَ الاُولى أَبْدِلاَ # فِى الْوَصْلِ وَاوًا زُرْ وَثَانٍ سَهَّلاَ",
    "بِخُلْفِهِ أَئِنَّ الاَنْعَامَ اخْتُلِفْ # غَوْثٌ أَئِنَّ فُصِّلَتْ خُلْفٌ لَطُفْ",
    "أَأَسْجُدُ الْخِلاَفُ مِزْ وَأَخْبِرَا # بِنَحْوَءَائِذَا أَئِنَّا كُرِّرا",
    "أَوَّلُه ثَبْتُ كَمَا الثَّانِي رُدِ # إِذْ ظَهَرُوا وَالنَّمْلُ مَعْ نُونٍ زِدِ",
    "رُضْ كِسْ وَأُولاَهَا مَدًا وَالسَّاهِرَهْ # ثَنَا وَثَانِيهَا ظُبىً إِذْ رُمْ كَرَهْ",
    "وَأَوَّلَ اْلأَوَّلِ مِنْ ذِبْحٍ كَوَى # ثَانِيَهُ مَعْ وَقَعَتْ رُدْ إِذْ ثَوَى",
    "وَالكُلُّ أُولاَهَا وَثَانِي العَنْكَباَ # مُسْتَفْهِمُ اَلأَوَّلِ صُحْبَةٌ حَبَا",
    "وَالمَدُّ قَبْلَ الْفَتْحِ وَالكَسْرِ حَجَرْ # بِنْ ثِقْ لَهُ الخُلْفُ وَقَبْلَ الضَّمِّ ثَرْ",
    "وَالْخُلْفُ حُزْ بِي لُذْ وَعَنْهُ أَوَّلاَ # كَشُعْبَةٍ وَغَيْرُهُ امْدُدْ سَهِّلاَ",
    "وَهَمْزَ وَصْلٍ مِنْ كآللهُ أَذِنْ # أَبْدِلْ لكُلٍّ أَوْ فَسَهِّلْ وَاقْصُرَنْ",
    "كَذَا بِهِ السِّحْرُ ثَنَا حُزْ وَالْبَدَلْ # وَالْفَصْلُ مِنْ نَحْوِءَءَامَنْتُمْ خَطَلْ",
    "أَئِمَّةً سَهِّلْ أَوَ ابْدِلْ حُطْ غِنَا # حِرْمٍ وَمَدٌّ لَاحَ بالْخُلْفِ ثَنَا",
    "مُسَهِّلًا وَالأَصْبَهَانِي بِالْقَصَصْ # فِى الثَّانِ وَالسَّجْدَةِ مَعْهُ المَدُّ نَصْ",
    "أَنْ كَانَ أَعْجَمِىُّ خُلْفٌ مُلِيَا # وَالكُلُّ مُبْدِلٌ كَآسَى أُوتِيَا",
    "أَسْقَطَ الاُوْلَى فِى اتِّفَاَقٍ زِنْ غَدَا # خُلْفُهُمَا حُزْ وَبِفَتْحٍ بِنْ هُدَى",
    "وَسَهَّلًا فِى الكَسْرِ وَالضَّمِّ وَفِي # بِالسُّوءِ وَالنَّبِيءِ اِلادْغَامُ اصْطُفِي",
  ]},
  {id:"tayb-09",title:"بَابُ الهَمْزَتَيْنِ مِنْ كَلِمَتَيْنِ",sub:"Les deux Hamza entre deux mots",clr:["#0a2a2e","#124a4f"],bayts:[
    "وَسَهَّلَ الأُخْرَى رُوَيْسٌ قُنْبُلُ # وَرْشٌ وَثَامِنٌ وَقِيلَ تُبْدَلُ",
    "مَدًّا زَكَا جُودًا وَعَنْهُ هَؤُلاَ # إِنْ وَالْبِغَا إِنْ كَسْرَ يَاءٍ أَبْدِلاَ",
    "وَعِنْدَ الاِخْتِلاَفِ الاُخْرَى سَهِّلَنْ # حِرْمٌ حَوَى غِنًا وَمِثْلُ السُّوءُ إِنْ",
    "فَالْوَاوُ أَوْ كَالْيا وَكَالسَّمَاءِ أَوْ # تَشَاءُ أَنْتَ فَباِلاِبْدَالِ وَعَوْا",
    "وَكُلَّ هَمْزٍ سَاكِنٍ أَبْدِلْ حِذَا # خُلْفٍ سِوَى ذِي الْجَزْمِ وَاْلأَمْرِ كَذَا",
    "مُؤْصَدَةٌ رِئْيًا وَتُؤْوِي وَلِفَا # فِعْلٍ سِوَى اْلإِيوَاءِ اْلأَزْرَقُ اقْتَفَى",
    "وَاْلأَصْبَهَانِيْ مُطْلَقًا لاَ كَاسُ # وَلُؤْلُؤًا وَالرَّأْسُ رِئْيًا بَاسُ",
    "تُؤْوِي وَمَايَجِيءُ مِنْ نَبَأْتُ # هَيِّيءْ وَجِئْتُ وَكَذَا قَرَأْتُ",
    "وَالكُلَّ ثِقْ مَعْ خُلْفِ نَبِّئْناَ وَلَنْ # يُبْدَلَ أَنْبِئْهُمْ وَنَبِّئْهُمْ إِذَنْ",
    "وَافَقَ فِى مُؤْتَفِكٍ بِالْخُلْفِ بَرْ # وَالذِّئْبُ جَانِيهِ رَوَى اللُّؤْلُؤُ صَرْ",
    "وَبئْسَ بِئْرٍ جُدْ وَرُؤْيَا فَأدَّغِمْ # كُلًاّ ثَنَا رِئْيًا بِهِ ثَاوٍ مُلِمْ",
    "مُؤْصَدَةٌ بِالْهَمْزِ عَنْ فَتًى حِمًا # ضِئْزَى دَرَى يَأْجُوجَ مَأْجُوجَ نَمَا",
    "وَالْفَاءَ مِنْ نَحْوِ يُؤَدِّهْ أَبْدِلوُا # جُدْ ثِقْ يُؤَيِّدْ خُلْفُ خُذْ وَيُبْدَلُ",
    "ِلْلأَصْبَهَانِيْ مَعْ فُؤَادٍ إِلاَّ # مُؤَذِّنٌ وَأَزْرَقٌ لِيَلاَّ",
    "وَشَانِئَكْ قُرِيْ نُبَوِّيْ اسْتُهْزِئَا # بَابُ مِائَهْ فِئَهْ وَخَاطِئَهْ رِئَا",
    "يُبَطِّئَنْ ثُبْ وَخِلاَفُ مَوْطِيَا # وَاْلاَصْبَهَانِي وَهْوَ (أبو جعفر) قَالاَ خَاسِيَا",
  ]},
  {id:"tayb-10",title:"بَابُ الْهَمْزِ المُفْرَدِ",sub:"Le Hamza isolé",clr:["#0a2438","#123f5c"],bayts:[
    "مُلِي وَنَاشِيَهْ وَزَادَ فَبِأَيْ # بِالْفاَ بِلاَ خُلْفٍ وَخُلْفُهُ بِأَيْ",
    "وَعَنْهُ سَهِّلِ اطْمَأَنَّ وَكَأَنْ # أُخْرَى فَأَنْتَ فَأَمِنْ لأَمْلأَنْ",
    "أَصْفَا رَأَيْتَهُمْ رَآهَا بِالْقَصَصْ # لمَاَّ رَأَتْهُ وَرَآهُ النَّمْلَ خُصْ",
    "رَأَيْتَهُمْ تُعْجِبْ رَأَيْتَ يُوسُفَا # تَأَذَّنَ اْلأَعْراَفَ بَعْدُ اخْتَلَفَا",
    "وَالْبَزِّ بِالْخُلْفِ لأَعْنَتَ وَفِي # كَائِنْ وَإِسْرَائِيلَ ثَبْتٌ وَاحْذِفِ",
    "كَمُتَّكُونَ اسْتَهْزِءُوا يُطْفُوا ثَمَدْ # صَابُونَ صَابِينَ مَدًا مُنْشُونَ خَدْ",
    "خُلْفًا وَمُتَكِينَ مُسْتَهْزِينَ ثَلْ # وَمُتَّكًا تَطَوْ يَطَوْ خَاطِينَ وَلْ",
    "أَرَيْتَ كُلًاّ رُمْ وَسَهِّلْهَا مَدَا # هَا أَنْتُمُ حَازَ مَدًا أَبْدِلْ جَدَا",
    "بِالْخُلْفِ فِيهِمَا وَيَحْذِفُ اْلأَلِفْ # وَرْشٌ وَقُنْبُلٌ وَعَنْهُمَا اخْتُلِفْ",
    "وَحَذْفُ يَا اللاَّئِيْ سمَاَ وَسَهَّلُوا # غَيْرَ ظُبىً بِهِ زَكَا وَالْبَدَلُ",
    "سَاكِنَةَ الْيَا خُلْفُ هَادِيْهِ حَسَبْ # وَبَابَ يَيْأَسِ اقْلِبَ ابْدِلْ خُلْفُ هَبْ",
    "هَيْئَةَ أَدْغِمْ مَعْ بَرِيْ مَرِيْ هَنِيْ # خُلْفٌ ثَنَا النَّسِيْءُ ثَمْرُهُ جَنِي",
    "جُزًّا ثَنَا وَاهْمِزْ يُضَاهُوَن نَدَى # بَابَ النَّبِيِّ وَالنُّبُوَّةِ الْهُدَى",
    "ضِيَاءَ زِنْ مُرْجُونَ تُرْجِي حَقَّ صُمْ # كَسَا الْبَرِيَّةُ اتْلُ مِزْ بَادِيَ حُمْ",
  ]},
  {id:"tayb-11",title:"بابُ نَقْلِ حَرَكَةِ الهَمْزةِ إِلىَ السَّاكِنِ قَبْلَهَا",sub:"Transfert de la voyelle du Hamza",clr:["#0c2f35","#155a5e"],bayts:[
    "وَانْقُلْ إِلَى الآخِرِ غَيْرَ حَرْفِ مَدْ # لِوَرْشٍ إِلاَّ هَا كِتَابِيَهْ أَسَدْ",
    "وَافَقَ مِنْ إِسْتَبْرَقٍ غَرْ وَاخْتُلفْ # فِى اْلآنَ خُذْ وَيُونُسٍ بِهِ خَطِفْ",
    "وَعَادًا اْلأُولى فَعَادًا لُولَى # مَدًا حِمَاهُ مُدْغَمًا مَنْقُولاَ",
    "وَخُلْفُ هَمْزِ الْوَاوِ فِى النَّقْلِ بَسَمْ # وَابْدَا لِغَيْرِ وَرْشِ بِاْلأَصْلِ أَتَمْ",
    "وَابْدَأَ بِهَمْزِ الْوَصْلِ فِى النَّقْلِ أَجَلْ # وَانْقُلْ مَدًا رِدًا وَثَبْتٌ الْبَدَلْ",
    "وَمِلْءُ اْلاَصْبَهَانِي مَعْ عِيسَى اخْتُلِفْ # وَسَلْ رَوَى دُمْ كَيْفَ جَا الْقُرَانُ دُفْ",
    "وَالسَّكْتُ عَنْ حَمْزةَ فِى شَيْءٍ وَأَلْ # وَالْبَعْضُ مَعْهُمَا لَهُ فِيْمَا انْفَصَلْ",
    "وَالْبَعْضُ مُطْلَقًا وَقِيلَ بَعْدَ مَدْ # أَوْ لَيْسَ عَنْ خَلاَّدٍ السَّكْتُ اطَّرَدْ",
    "قِيلَ وَلاَ عَنْ حَمْزَةٍ وَالْخُلْفُ عَنْ # إِدْرِيسَ غَيْرَ المَدَّ أَطْلِقْ وَاخْصُصَنْ",
    "وَقِيلَ حَفْصٌ وَابْنُ ذَكْوَانَ وَفيْ # هِجَا الْفَوَاتِحِ كَطَهَ ثَقِّفِ",
    "وَأَلِفَيْ مَرْقَدِنَا وَعِوَجًا # بَل رَّانَ مَن رَّاقٍ لِحَفْصِ الْخُلْفُ جَا",
    "إِذَا اعْتَمَدْتَ الْوَقْفَ خَفِّفْ هَمْزَهْ # تَوَسُّطًا أَوْ طَرَفًا لِحَمْزَةْ",
    "فَإِنْ يُسَكَّنْ بِالّذِيْ قَبْلُ ابْدِلِ # وَإِنْ يُحَرَّكْ عَنْ سُكُونٍ فَانْقُلِ",
    "إلاَّ مُوَسَّطًا أَتى بَعْدَ أَلِفْ # سَهِّلْ وَمِثْلَهُ فَأَبْدِلْ فى الطَّرَفْ",
    "وَالْوَاوُ وَالْيَا إِنْ يزُاَداَ أَدْغِماَ # وَالْبَعْضُ فِي اْلأَصْلِيِّ أَيْضًا أَدْغَماَ",
    "وَبَعْدَ كَسْرَةٍ وَضَمٍ أَبْدِلاَ # إِنْ فُتِحَتْ يَاءً وَوَاوًا مُسْجَلًا",
    "وَغَيْرُ هُذَا بَيْنَ بَيْنَ وَنُقِلْ # يَاءٌ كَيُطْفِئُوا وَوَاوٌ كَسُئِلْ",
  ]},
  {id:"tayb-12",title:"بَابُ السَّكْتِ عَلىَ السَّاكِنِ قَبْلَ الهَمْزِ وَغَيْرِهِ",sub:"As-Sakt (la pause brève)",clr:["#0a1f3a","#153a63"],bayts:[
    "وَالْهَمْزُ اَلاَوَّلُ إِذَا مَا اتَّصَلاَ # رَسْمًا فَعَنْ جُمْهُورِهِمْ قَدْ سُهِّلاَ",
    "أَوْ يَنْفَصِلْ كَاسْعَوْا إِلَى قُلْ إِنْ رجَحْ # لاَ مِيمَ جَمْعٍ وَبِغَيْرِ ذَاكَ صَحْ",
    "وَعَنْهُ تَسَهِيلٌ كَخَطِّ المُصْحَفِ # فَنَحُو مُنْشُونَ مَعَ الضَّمِّ احْذِفِ",
    "وَأَلِفُ النَّشْأَةِ مَعْ وَاوِكُفَا # هُزْؤًا وَيَعْبَؤُا الْبَلَؤُا الضُعَفَا",
    "وَيَاءَ مِنْ آنَا نَباَ الْ وَرِيَّا # تُدْغَمُ مَعْ تُؤْوِي وَقِيلَ رُؤْيَا",
    "وَبَيْنَ بَيْنَ إِنْ يُوَافِقْ وَاتْرُكِ # مَا شَذَّ وَاكْسِرْهَا كَأَنْبِئْهُمْ حُكِي",
    "وَأَشْمِمَنْ وَرُمْ بِغَيْرِ المُبْدَلِ # مَدًّا وَآخِرًا بِرَوْمٍ سَهِّلِ",
    "بَعْدَ مُحَرَّكٍ كَذَا بَعْدَ أَلِفْ # وَمِثْلُهُ خُلْفُ هِشَامٍ فِى الطَّرَفْ",
  ]},
  {id:"tayb-13",title:"فَصْلُ ذَالِ إذْ",sub:"Le Dhâl de « idh »",clr:["#0d2b2b","#1a4f4a"],bayts:[
    "إِذْ فِي الصَّفِيرِ وَتَجِدْ أَدْغِمْ حَلاَ # لِيْ وَبِغَيْرِ الْجِيمِ قَاضٍ رَتَّلاَ",
    "وَالْخُلْفُ فِي الدَّالِ مُصِيبٌ وَفَتَى # قَدْ وَصَّلَ اْلإدْغَامَ فِى دَالٍ وَتَا",
  ]},
  {id:"tayb-14",title:"فصُلُ دَالِ قَدْ",sub:"Le Dâl de « qad »",clr:["#0a2540","#154568"],bayts:[
    "بِالْجِيمِ وَالصَّفِيرِ وَالذَّالِ ادُّغِمْ # قَدْ وَبِضَادِ الشِّينِ وَالظَّا تَنْعَجِمْ",
    "حُكْمٌ شَفَا لَفْظًا وَخُلْفُ ظَلَمَكْ # لَهُ وَوَرْشُ الظَّاءَ وَالضَّادَ مَلَكْ",
    "َوالضَّادُ وَالظَّا الذَّالُ فِيهَا وَافَقَا # مَاضٍ وَخُلْفُهُ بِزَايٍ وُثِّقَا",
  ]},
  {id:"tayb-15",title:"فَصْلُ تَاءِ التَّأْنِيثِ",sub:"Le Tâ' du féminin",clr:["#0e2e30","#1c5658"],bayts:[
    "وَتَاءُ تَأْنِيثٍ بِجِيمِ الظَّا وَثَا # مَعَ الصَّفِيرِ ادْغِمْ رِضىً حُزْ وَجَثَا",
    "بِالظَّا وَبَزَّارٌ بِغَيْرِ الثَّا وَكَمْ # بِالصَّادِ وَالظَّا وَسَجَزْ خُلْفٌ لَزِمْ",
    "كَهُدِّمَتْ وَالثَّا لَناَ والْخُلْفُ مِلْ # مَعْ أَنْبَتَتْ لاَ وَجَبَتْ وَإِنْ نُقِلْ",
  ]},
  {id:"tayb-16",title:"فَصْلُ لاَمِ هَلْ وَبَلْ",sub:"Le Lâm de « hal » et « bal »",clr:["#0a2030","#134560"],bayts:[
    "وَبَلْ وَهَلْ فِى تَا وَثَا السِّينِ ادُّغِمْ # وَزَايِ طَا ظَا النُّونِ وَالضَّادِ رُسِمْ",
    "وَالسِّينُ مَعْ تَاءٍ وَثَا فِدْ وَاخْتُلِفْ # بِالطَّاءِ عَنْهُ هَلْ تَرَى الادْغَامُ حِفْ",
    "وَعَنْ هِشَامٍ غَيْرُ نَضٍّ يُدَّغَمْ # عَنْ جُلِّهِمْ لاَحَرْفُ رَعْدٍ فِى اْلأَتَمْ",
  ]},
  {id:"tayb-17",title:"بابُ حُروفٍ قَرُبَتْ مَخَارِجُهَا",sub:"Lettres aux points d'articulation proches",clr:["#0a2a2e","#124a4f"],bayts:[
    "إِدْغَامُ بَاءِ الْجَزْمِ فِى الْفَا لِيْ قَلاَ # خُلْفُهُمَا رُمْ حُزْ يُعَذِّبْ مَنْ حَلاَ",
    "رَوَى وَخُلْفٌ فِى دَوًا بِنْ وَلِرَا # فِى اللاَّمِ طِبْ خُلفٌ يَدٍ يَفْعَلْ سَرَا",
    "نَخْسِفْ بِهِمْ رُبًا وَفِى ارْكَبْ رُضْ حِمَا # وَالخُلْفُ دِنْ بِي نَلْ قُوًى عُذْتُ لُمَا",
    "خُلْفٌ شَفَا حُزْ ثِقْ وَصَادَ ذِكْرُ مَعْ # يُرِدْ شَفَا كَمْ حُطْ نَبَذْتُ حُزْ لُمَعْ",
    "خُلْفٌ شَفَا أُورِثْتُمُو رِضىً لَجَا # حُزْ مِثْلَ خُلْفٍ وَلَبِثْتُ كَيْفَ جَا",
    "حُطْ كَمْ ثَنَا رِضىً وَيَس رَوَى # ظَعْنٌ لِوًى وَالْخُلْفُ مِزْ نَلْ إِذْ هوَى",
    "كَنُونَ لاَ قَالُونَ يَلْهَثْ أَظْهِرِ # حِرْمٍ لَهُمْ نَالَ خَلاَفُهُم وُرِيْ",
    "وَفى أَخَذْتُ وَاتَّخَذْتُ عَنْ دَرَى # وَالْخُلْفُ غِثْ طَس مِيْمٍ فِدْ ثَرَى",
  ]},
  {id:"tayb-18",title:"بَابُ أَحْكَامِ النُّونِ السَّاكِنَةِ وَالتَّنْوِينِ",sub:"Le Nûn Sâkin et le Tanwîn",clr:["#0a2438","#123f5c"],bayts:[
    "أَظْهِرْهُمَا عِنْدَ حُرُوفِ الْحَلْقِ عَنْ # كُلٍّ وَفِي غَيْنٍ وَخَا أَخْفَى ثَمَنْ",
    "َلا مُنْخَنِقْ يُنْغِضْ يَكُنْ بَعْضٌ أًبَى # وَاقْلِبْهُمَا مَعْ غُنَّةٍ مِيمًا بِبَا",
    "وَادْغِمْ بِلاَغُنِّةِ فِى لاَمٍ وَرَا # وَهْيَ لِغَيْرِ صُحْبَةٍ أيْضًا تُرَى",
    "وَالْكُلُّ فِى يَنْمُو بِهَا وَضِقْ حَذَفْ # فِى الْوَاوِ وَالْيَا وَتَرَى فِى الْيَا اخْتَلَفْ",
    "وَأَظْهَرُوا لَدَيْهِمَا بِكِلْمَةِ # وَفِي الْبَوَاقِي أَخْفِيَنْ بِغُنَّةِ",
  ]},
  {id:"tayb-19",title:"بَابُ الفَتْحِ وَاْلإِمَالَةِ وَبَيْنَ اللَّفْظَيْنِ",sub:"Al-Fath et Al-Imâla",clr:["#0c2f35","#155a5e"],bayts:[
    "أَمِلْ ذَوَاتِ الْيَاءِ فِى الْكُلِّ شَفَا # وَثَنِّ اَلاَسْمَا إِنْ تُرِدْ أَنْ تَعْرِفَا",
    "وَرُدَّ فِعْلَهَا إِلَيْكَ كَالْفَتىَ # هُدَى الْهَوَى اشْتَرَى مَعَ اسْتَعْلَى أَتَى",
    "وَكَيْفَ فَعْلَى وَفُعَالَى ضَمُّهُ # وَفَتْحُهُ وَمَا بِيَاءٍ رَسْمُهُ",
    "كَحَسْرَتَى أَنَّى ضُحًى مَتَى بَلَى # غَيْرَ لَدَى زَكَى عَلَى حَتَّى إِلَى",
    "وَمَيَّلُوا الرِّباَ الْقُوَى الْعُلَى كِلاَ # كَذَا مَزِيدًا مِنْ ثُلاَثِي كَابْتَلَى",
    "مَعْ رُوسِ آيِ النَّجْمِ طَهَ اقْرَأَ مَعَ الَ # قِيَامَةِ اللَّيْلِ الضُّحَى الشَّمْسِ سَأَلْ",
    "عَبَسَ وَالنَّزْعِ وَسَبِّحْ وَعَلِي # أَحْيَا بِلاَ وَاوٍ وَعَنْهُ مَيِّلِ",
    "محَيْاهُمُ تَلاَ خَطَايَا وَدَحَا # تُقَاتِه مَرْضَاتِ كَيْفَ جَا طَحَا",
    "سَجى وَأَنْسَانِيهِ مَنْ عَصَانِي # أَتَانِ لاَ هُودَ وَقَدْ هَدَانِي",
    "أَوْصَانِ رُؤْيَايَ لَهُ الرُّؤْيَا رَوَى # رُؤْيَاكَ مَعْ هُدَايَ مَثْوَايَ تَوَى",
    "مَحْيَايَ مَعْ آذَانِنَا آذَانِهِمْ # جَوَارِ مَعْ بَارِئْكُمُ طُغْيَانِهِمْ",
    "مِشْكَاةِ جَبَّارِينَ مَعْ أَنْصَارِيْ # وَبابِ سَارِعُوا وَخُلْفُ الْبَارِيْ",
    "تمُارِ مَعْ أُوَارِ مَعْ يُوَارِ مَعْ # عَيْنِ يَتَامَى عَنْهُ الاِتْبَاعُ وَقَعْ",
    "وَمِنْ كُسَالَى وَمِنَ النَّصَارَى # كَذَا أُسَارَى وَكَذَا سُكَارَى",
    "وَافَقَ فِي أَعْمَى كِلاَ اْلإسْرَى صَدَا # وَأَوَّلًا حمًِا وَفي سِوًى سُدًى",
    "رَمىَ بَلى صُنْ خُلْفُهُ وَمُتَّصِفْ # مُزْجَا يُلَقَّاهُ أَتَى أَمْرُ اخْتُلِفْ",
    "إِنَاهُ لِي خُلْفٌ نَأَى اْلإِسْرَا صِفِ # مَعْ خُلْفِ نُونِهِ وَفيِهِمَا ضِفِ",
    "رَوَى وَفِيمَا بَعْدَ رَاءٍ حُطْ مَلاَ # خُلْفٌ وَمَجْرَى عُدْ وَأَدْرَى أَوَّلاَ",
    "صِلْ وَسِوَاهَا مَعَ يَابُشْرَى اخْتَلَفْ # وَافْتَحْ وَقَلِّلْهَا وَأَضْجِعْهَا حَتَفْ",
    "وَقَلِّلِ الرَّا وَرُءُوسَ الآي جِفْ # وَما بِه هَا غَيْرَ ذِي الرَّا يَخْتَلِفْ",
    "مَعْ ذَاتِ ياءٍ مَعْ أَرَاكَهُمْ وَرَدْ # وَكَيْفَ فُعْلى مَعْ رُءُوسِ الآيِ حَدْ",
    "خُلْفٌ سِوَى ذِي الرَّا وَأَنَّى وَيْلَتَى # ياحَسْرَتَى الْخُلْفُ طَوَى قيلَ مَتىَ",
    "بَلى عَسَى وَأَسَفَى عَنْهُ نُقِلْ # وَعَنْ جَمَاعَةٍ لَهُ دُنْيَا أَمِلْ",
    "حَرْفَيْ رَأَى مِنْ صُحْبَةٍ لَناَ اْخْتُلِفْ # وَغَيْرَ الاُولَى الْخُلْفُ صِفْ وَالْهَمْزَ حِفْ",
    "وَذُو الضَّمِيرِ فيهِ أَوْ هَمْزٍ وَرَا # خُلْفٌ مُنىً قَلِّلْهُمَا كُلًاّ جَرَى",
    "وَقَبْلَ سَاكِنٍ أَمِلْ لِلرَّا صَفَا # فِي وَكَغَيْرِهِ الجَمِيعُ وَقَفَا",
    "وَاْلأَلِفَاتُ قَبْلَ كَسْرِ رَا طَرَفْ # كَالدَّارِ نَارٍ حُزْ تَفُزْ مِنْهُ اخْتَلَفْ",
    "وَخُلْفُ غَارٍ تَمَّ وَالجَارِ تَلاَ # طِبْ خُلْفَ هَارٍ صِفْ حَلاَ رُمْ بِنْ مَلاَ",
    "خُلفُهُماَ وَإِنْ تَكَرَّرْ حُطْ رَوَى # وَالخُلْفُ مِنْ فَوْزٍ وَتَقْليلٌ جَوَى",
    "لِلْبَابِ جَبَّارِينَ جَارِ اخْتَلَفَا # وَافَقَ فى التّكْرِيرِ قِسْ خُلْفٌ ضَفَا",
    "وَخُلْفُ قَهَّارِ الْبَوَارِ فُضِّلاَ # تَوْرَاةَ جُدْ وَالْخُلْفُ فَضْلٌ بُجِّلاَ",
    "وَكَيْفَ كَافِرِينَ جَادَ وَأَمِلْ # تُبْ حُزْ مُنَا خُلْفٍ غَلاَ وَرْوحُ قُلْ",
    "مَعْهُمْ بِنَمْلٍ وَالثُّلاَثِيْ فُضِّلاَ # فِي خَافَ طَابَ ضَاقَ حَاقَ زَاغَ لاَ",
    "زَاغَتْ وَزَادَ خَابَ كَمْ خُلْفٌ فِنَا # وَشَاءَ جَا لِيْ خُلْفُهُ فَتىً مُنَا",
    "وَخُلْفُهُ اْلإِكْرَامَ شَارِبِيْنَا # إِكْرَاهِهِنَّ وَالحْوَاَرِيِّيْنَا",
    "عِمْرَانَ وَالْمِحْرابَ غَيْرَ مَا يُجَرْ # فَهْوَ وَأُولَى زَادَ لاَخُلْفَ اسْتَقَرْ",
    "مَشَارِبُ كَمْ خُلْفُ عَيْنٍ آنِيَهْ # مَعْ عَابِدُونَ عَابِدُ الْجَحْدِ لِيَهْ",
    "خُلْفٌ تَرَاءَى الرَّا فَتَى النَّاسِ بِجَرْ # طَيِّبُ خُلْفًا رَانَ رُدْ صَفَا فَخَرْ",
    "وَفِى ضِعَافًا قَامَ بِالْخُلْفِ ضَمَرْ # آتِيْكَ فى النَّمْلِ فَتىً وَالْخُلْفُ قَرْ",
    "وَرَا الْفَوَاتِحِ أَمِلْ صُحْبَةُ كَفْ # حُلًا وَهَا كَافَ رَعَى حَافِظَ صِفْ",
    "وَتَّحْتُ صُحْبَةٌ جَنَا الخُلْفُ حَصَلْ # يَا عَيْنَ صُحْبَةٌ كَسَاَ وَالخُلْفُ قَلْ",
    "لِثَالِثٍ (أبوعمرو) لاَ عَنْ هِشَامٍ طَا شَفَا # صِفْ حَا مُنَى صُحْبَةُ يَس صَفَا",
    "رُدْ شُدْ فَشَا وَبَيْنَ بَيْنَ فِى أَسَفْ # خُلْفُهُمَا رَا جُدْ وَإِذْ هَا يَا اخْتَلَفْ",
    "وَتَحْتُ هَا جِئْ حَا حُلًا خُلْفٌ جَلاَ # تَوْرَاةَ مِنْ شَفَا حَكِيمًا مَيَّلاَ",
    "وَغَيْرُهَا لِلأَصْبَهَانِي لَمْ يُمَلْ # وَخُلْفُ إِدْرِيسَ بِرُؤْيَا لاَ بِأَلْ",
    "وَلَيْسَ إَدْغَامٌ وَوَقفٌ إِنْ سَكَنْ # يَمْنَعُ مَا يُمَالُ لِلْكَسْرِ وَعَنْ",
    "سُوسٍ خِلاَفٌ وَلِبَعْضٍ قُلِّلاَ # وَمَا بِذِي التَّنْوِينِ خُلْفٌ يُعْتَلاَ",
    "بَلْ قَبْلَ سَاكِنٍ بِمَا أُصِّلَ قِفْ # وَخُلْفُ كَالْقُرَى الَّتِي وَصْلًا يَصِفْ",
    "وَقِيلَ قَبْلَ سَاكِنٍ حَرْفَيْ رَأَى # عَنْهُ وَرَا سِوَاهُ مَعْ هَمْزِ نَأَى",
  ]},
  {id:"tayb-20",title:"بَابُ إمَالَةِ هَاءِ التّأنِيثِ وَمَا قَبْلَهَا فِي الوَقْفِ",sub:"Imâla du Hâ' du féminin (Al-Kisâ'î)",clr:["#0a1f3a","#153a63"],bayts:[
    "وَهَاءَ تَأْنِيثٍ وَقَبْلُ مَيِّلِ # لاَ بَعْدَ الاِسْتِعْلاَ وحَاعٍ لِعَلِي",
    "وَأَكْهَرٍ لاَ عَنْ سُكُونِ يَا وَلاَ # عَنْ كَسْرَةٍ وَسَاكِنٌ إِنْ فَصَلاَ",
    "لَيْسَ بِحَاجِزٍ وَفِطْرَتَ اخْتُلِفْ # وَالْبَعْضُ أَهْ كَالْعَشْرِ أَوْ غَيْرِ اْلأَلِفْ",
    "يُمَالُ وَالمُخْتَارُ مَا تَقَدَّماَ # وَالْبَعْضُ عَنْ حَمْزَةَ مِثْلُهُ نَمَا",
  ]},
  {id:"tayb-21",title:"بَابُ مَذَاهِبِهِمْ فِي الرَّاءَاتِ",sub:"Les Râ' (roulement du Ra')",clr:["#0d2b2b","#1a4f4a"],bayts:[
    "وَالرَّاءَ عَنْ سُكُونِ يَاءٍ رَقِّقِ # أَوْ كَسْرَةٍ مِنْ كِلْمَةٍ لِلأزْرَقِ",
    "وَلَمْ يَرَالسَّاكِنَ فَصلًا غَيْرَ طَا # وَالصَّادِ وَالْقَافِ عَلَى مَا اشتُرِطَا",
    "وَرَقِّقَنْ بِشَرَرٍ لِلأَكْثَرِ # وَاْلأَعْجَمِيْ فَخِّمْ مَعَ المُكَرَّرِ",
    "وَنَحْوُ سِتْرًا غَيْرَ صِهْرًا فِى اْلأَتَمْ # وَخُلْفُ حَيْرَانَ وَذِكْرَكَ إِرَمْ",
    "وَزْرَ وَحِذْرَكُمْ مِرَاءً وَافْتِرَا # تَنْتَصِرَانِ سَاحِرَانِ طَهِّرَا",
    "عَشِيَرَةُ التَّوْبَةِ مَعْ سِرَاعَا # وَمَعْ ذِرَاعَيْهِ فَقُلْ ذِرَاعَا",
    "إِجْرَامِ كِبْرَهُ لَعِبْرَةً وَجَلَ # تَفْخِيمُ مَا نُوِّنَ عَنْهُ إِنْ وَصَلْ",
    "كَشَاكِرًا خَيْرًا خَبِيًرا خَضِرَا # وَحَصِرَتْ كَذَاكَ بَعْضٌ ذَكَراَ",
    "كَذَاكَ ذَاتَ الضَّمِّ رَقِّقْ فِي الأَصَحْ # والْخُلْفُ فِى كِبْرٌ وَعِشْرُونَ وَضَحْ",
    "وإِنْ تَكُنْ سَاكِنَةً عَنْ كَسْرِ # رَقَّقَهَا يَا صَاحِ كُلُّ مُقْرِي",
    "وَحَيْثُ جَاءَ بَعْدُ حَرْفُ اسْتِعْلاَ # فَخِّمْ وَفِي ذِي الْكَسْرِ خُلْفٌ إِلاَّ",
    "صِرَاطِ وَالصَّوَابُ أَنْ يُفَخَّماَ # عَنْ كُلٍ الْمَرْءُ وَنَحْوُ مَرْيَمَا",
    "وَبَعْدَ كَسْرٍ عَارِضٍ أَوْ مُنْفَصِلْ # فَخِّمْ وَإِنْ تَرُمْ فَمِثْلَ مَا تَصِلْ",
    "وَرَقِّقِ الرَّا إِنْ تُمَلْ أَوْ تُكْسَرِ # وَفِي سُكُونِ الْوَقْفِ فَخِّمْ وَانْصُرِ",
    "مَا لَمْ تَكُنْ مِنْ بَعْدِ يَا سَاكِنَةِ # أَوْ كَسْرٍ اَوْ تَرْقِيقٍ اَوْ إِمَالَةِ",
  ]},
  {id:"tayb-22",title:"بَابُ اللاَّمَاتِ",sub:"Les Lâm",clr:["#0a2540","#154568"],bayts:[
    "وَأَزْرَقٌ لِفَتْحِ لاَمٍ غَلَّظَا # بَعْدَ سَكُونِ صَادٍ اَوْ طَاءٍ وَظَا",
    "أَوْ فَتْحِهَا وَإِنْ يَحُلْ فِيهَا أَلِفْ # أَوْ إِنْ تُمَلْ مَعْ سَاكِنِ الْوَقْفِ اخْتُلِفْ",
    "وَقِيلَ عِنْدَ الطَّاءِ وَالظَّا واْلأَصَحْ # تَفْخِيمُها وَالْعَكْسُ فِى الآيِ رجَحْ",
    "كَذَاكَ صَلْصَالٍ وَشَذَّ غَيْرُ مَا # ذكَرْتُ وَاسْمَ اللهِ كُلٌّ فَخَّمَا",
    "مِنْ بَعْدِ فَتْحَةٍ وَضَمٍّ واخْتُلِفْ # بَعْدَ مُمَالِ لاَ مُرَقَّقٍ وُصِفْ",
  ]},
  {id:"tayb-23",title:"بَابُ الْوَقْفِ عَلَى أَوَاخِرِ الْكَلِمِ",sub:"L'arrêt en fin de mot",clr:["#0e2e30","#1c5658"],bayts:[
    "وَالأَصْلُ فِى الوَقْفِ السُّكُونُ وَلَهُمْ # فىِ الرَّفْعِ وَالضَّمِ اشْمِمَنَّهُ ورُمْ",
    "وَامْنَعْهُمَا فِى النَّصْبِ وَالْفَتْحِ بَلَى # فىِ الجَرِّ وَالكَسْرِ يُرَامُ مُسْجَلاَ",
    "وَالرَّوْمُ اِلاتْيَانُ بِبَعْضِ الحَرَكَةْ # إِشْمَامُهُمْ إِشَاَرةٌ َلا حَرَكَةْ",
    "وَعَنْ أَبِى عَمْرٍو وَكُوفٍ وَرَدَا # نَصًّا وَلِلْكُلِّ اخْتِيَارًا أُسْنِداَ",
    "وَخُلْفُ هَا الضَّمِيرِ وَامْنَعْ فِى اْلأَتَمْ # مِنْ بَعْدِ يَا أَوْ وَاوٍ اَوْكَسْرٍ وَضَمْ",
    "وَهَاءُ تَأْنِيثٍ وَمِيمُ الْجَمْعِ مَعْ # عَارِضِ تَحْرِيكٍ كِلاَهُمَا امْتَنَعْ",
  ]},
  {id:"tayb-24",title:"بابُ الْوَقْفِ عَلَى مَرْسُومِ الْخَطِّ",sub:"L'arrêt selon le tracé du Mushaf",clr:["#0a2030","#134560"],bayts:[
    "وَقِفْ لِكُلٍّ باِتّبَاعِ مَا رُسِمْ # حَذْفًا ثُبُوتَا اتِصَّالًا فِى الْكَلِمْ",
    "لَكِنْ حُروفٌ عَنْهُمُو فِيهَا اخْتُلِفْ # كَهَاءِ أُنْثى كُتِبَتْ تَاءً فَقِفْ",
    "بِالْهَا رَجَا حَقٍّ وَذَاتَ بَهْجَه # والَّلاتَ مَرْضَاتِ وَلاَتَ رَجَّهْ",
    "هَيْهَاتَ هُدْ زِنْ خُلْفَ رَاضٍ يَا أَبَهْ # دُمْ كَمْ ثَوىَ فِيمَهْ لِمَهْ عَمَّهُ بِمَهْ",
    "مِمَّهْ خِلاَفٌ هَبْ ظُبىً وَهْيَ وَهُو # ظِلٌّ وَفى مُشَدَّدِ اسْمٍ خُلْفُهُ",
    "نَحوُ إِلَىَّ هُنَّ وَالْبَعْضُ نَقَلْ # بِنَحْوِ عَالَمِينَ مُوفُونَ وَقَلْ",
    "وَوَيْلَتىَ وَحَسْرَتَى وَأَسَفَى # وَثَمَّ غَرْ خُلْفًا وَوَصْلًا حَذَفَا",
    "سُلْطَانِيَهْ وَمَالِيَهْ وَمَاهِيَهْ # فِي ظَاهِرٍ كِتَابِيَهْ حِسَابِيَهْ",
    "ظَنَّ اقْتَدِهْ شَفَا ظُبًا وَيَتَسَنْ # عَنْهُمْ وَكَسْرُهَا اقْتَدِهْ كِسْ أَشْبِعَنْ",
    "مِنْ خُلْفِهِ أَيًّا بِأَيًّا مَا غَفَلْ # رِضىً وَعَنْ كُلٍّ كَمَا الرَّسْمُ أَجَلْ",
    "كَذَاكَ وَيْكَأَنَّهُ وَوَيْكَأَنْ # وَقِيْلَ بِالْكَافِ حَوَى وَالْيَاءِ رَنْ",
    "وَمَالِ سَالَ الْكَهْفِ فُرْقَانِ النِّسَا # قِيلَ عَلَى مَا حَسْبُ حِفْظُهُ رَسَا",
    "هَا أَيُّهَ الرحَّمْنِ نُورِ الزُّخْرُفِ # كَمْ ضَمَّ قِفْ رَجَا حِمًا بِاْلأَلِفِ",
    "كَأَيِّنِ النُّونُ وَبِالْيَاءِ حِمَا # وَالْيَاءُ إِنْ تُحْذَفْ لِسَاكِنٍ ظَمَا",
    "يُرِدْنِ يُؤْتِ يَقْضِ تُغْنِ الْوَادِ # صَالِ الْجَوَارِ اخْشَوْنِ نُنْجِ هَادِ",
    "وَافَقَ وَادِ النَّمْلِ هَادِ الرُّومِ رُمْ # تَهْدِ بِهَا فَوزٌ يُنَادِ قَافَ دُمْ",
    "بِخُلْفِهِمْ وَقِفْ بِهَادٍ بَاقِ # بِالْيَا لِمَكٍّ مَعَ وَالٍ وَاقِ",
  ]},
  {id:"tayb-25",title:"بابُ مَذَاهِبِهِمْ فِى يَاءَاتِ الإِضَافَةِ",sub:"Les Yâ' d'annexion (Yâ'ât al-Idâfa)",clr:["#0a2a2e","#124a4f"],bayts:[
    "لَيْسَتْ بِلاَمِ الْفِعْلِ يَا المُضَافِ # بَلْ هِيَ فىِ الْوَضْعِ كَهَا وَكَافِ",
    "تِسْعٌ وَتِسْعُونَ بِهَمْزٍ انْفَتَحْ # ذَرُونِ اَلاصْبَهَانِ مَعْ مَكيِّ فَتَحْ",
    "وَاجْعَلْ لِي ضَيْفِي دُونِي يَسِّرْ لِيْ وَلِيْ # يُوسُفَ إِنِّي أَوَّلاَهَا حَلِّلِ",
    "مَدًا وَهُمْ وَالْبَزِّ لَكِنِّيْ أَرَى # تَحْتِيَ مَعْ إِنِّيْ أَرَاكُمْ وَدَرَى",
    "أُدعُونِي وَاْذكُرُونِي ثُمَّ المَدَنِي # وَالمَكِّ قُلْ حَشَرْتَنِي يَحْزُنُنِي",
    "مَعْ تَأْمُروُنِي تَعِدَانِنْ وَمَدَا # يَبْلُوَنِيْ سَبِيلِيْ وَاتْلُ ثِقْ هُدَا",
    "فَطَرَنِي وَفَتْحُ أَوْزِعْنِيْ جَلاَ # هَوَى وَبَاقِي البَابِ حِرْمٌ حَمَّلاَ",
    "وَافَقَ فِي مَعِي عُلَى كُفْؤٍ وَمَا # لِي لُذْ مِنَ الخُلْفِ لَعَلِّيْ كُرِّمَا",
    "رَهْطِيَ مَنْ لِي الخُلْفُ عِنْدِي دُوِّنَا # خُلْفٌ وَعَنْ كُلِّهِمُ تَسَكَّنَا",
    "تَرْحَمْنِي تَفْتِنِّي اتَّبِعْنِي أَرِنِي # وَاْثنَانِ مَعْ خَمْسِينَ مَعْ كَسْرٍ عُنِي",
    "وافْتَحْ عِبَادِيْ لَعْنَتِي تَجِدُنِي # بَنَاتِ أَنْصَارِي مَعًا لِلْمَدَنِي",
    "وَإِخْوَتِي ثِقْ جُدْ وَعَمَّ رُسُلِي # وَبَاقِيَ الْبَابِ إِلَى ثَنًا حُلِي",
    "وَافَقَ فِي حُزْنِي وَتَوْفِيْقِي كَلاَ # يَدِي عُلًا أُمِّي وَأَجْرِي كَمْ عَلاَ",
    "دُعَائِي آبَاءِي دمًا كِسْ وَبَنَا # خُلْفٌ إِلىَ رَبِّي وَكُلٌّ أَسْكَنَا",
    "ذُرِيَّتِي يَدْعُونَنِي تَدْعُونَنِي # أَنْظِرنِ مَعْ بَعْدَ رِدًا أَخَّرْتَنِي",
    "وَعِنْدَ ضَمِّ الْهَمْزِ عَشْرٌ فَافْتَحَنْ # مَدًا وَأَنِّي أُوفِ بِالْخُلْفِ ثَمَنْ",
    "لِلْكُلِّ آتُونِي بِعَهْدِي سَكَنَتْ # وَعِنْدَ لاَمِ الْعُرْفِ أَرْبَعْ عَشَرَتْ",
    "رَبِّي الَّذِي حَرَّمَ رَبِّي مَسَّنِي # اَلآخَراَنِ آتَانِ مَعْ أَهْلَكَنِي",
    "أَرَادَنِي عِبَادِ اْلاَنْبِيَا سَبَا # فُزْ لِعَبادِي شُكْرُهُ رِضًى كَبَا",
    "وَفِى النِّدَا حِمًا شَفَا عَهْديِ عَسَى # فَوْزٌ وَآيَاتِي اسْكنَِنَّ فِي كَسَا",
    "وَعِنْدَ هَمْزِ الْوْصْلِ سَبْعٌ لَيْتَنِي # فَافْتَحْ حُلًا قَوْمِي مَدًا حُزْ شِمْ هَنِي",
    "إِنِّي أَخِي حَبْرٌ وَبَعْدِي صِفْ سَمَا # ذِكْرِي لِنَفْسِي حَافِظٌ مَدًا دُمَا",
    "وَفِي ثَلاَثِينَ بِلاَ هَمْزٍ فَتَحْ # بَيْتِي سِوَى نُوحٍ مَدًا لُذْ عُدْ وَلَحْ",
    "عَوْنٌ بِهَا لىِ دِينِ هَبْ خُلْفًا عَلاَ # إِذْ لَاَذَ لِي فِي النَّمْلِ رُدْ نَوَى دَلاَ",
    "وَالخْلْفُ خُذْ لَنَا مَعِي مَا كَانَ لِي # عُدْ مَنْ مَعِي مِنْ مَعْهُ وَرْشٌ فَانْقُلِ",
    "وَجْهِي عُلًا عَمَّ وَلِي فِيهَا جَنَا # عُدْ شُرَكَائِي مِنْ وَرَائِي دَوَّنَا",
    "أَرْضِي صِرَاطِي كَمْ مَمَاتِي إِذْ ثَنَا # لِي نَعْجَهٌ َلَاذَ بِخُلْفٍ عَيَّنَا",
    "وَلْيُؤْمِنُوا بِي تُؤْمِنُوا لِي وَرْشُ يا # عِبَادِ لاَ غَوْثٌ بِخُلْفٍ صَلِيَا",
    "وَالْحَذْفُ عَنْ شُكْرٍ دُعَا شَفَا وَلِي # يَس سَكِّنْ لَاَحَ خُلْفٌ ظُلَلِ",
    "فَتىً وَمَحْيَايَ بِهِ ثَبْتٌ جَنَحْ # خُلْفٌ وَبَعْدَ سَاكِنٍ كُلٌّ فَتَحْ",
  ]},
  {id:"tayb-26",title:"بابُ مَذَاهِبِهِمْ فِي الزَّوَائِدِ",sub:"Les Yâ' additionnels (Zawâ'id)",clr:["#0a2438","#123f5c"],bayts:[
    "وَهْىَ الَّتِي زَادُوا عَلَى مَا رُسِمَا # تَثْبُتُ فِى الْحَالَيْنِ لِي ظِلٌّ دُمَا",
    "وَأَوَّلَ النَّمْلِ فِدًا وَتَثْبُتُ # وَصْلًا رِضىً حِفْظٍ مَدًا وَمِائَةُ",
    "إِحْدَى وَعِشْرُونَ أَتَتْ تُعَلِّمَنْ # يَسْرِ إِلَى الدَّاعِ الْجَوارِ يَهْدِيَنْ",
    "كَهْفُ المُنَادِ يُؤْتِيَنْ تَتَّبِعَنْ # أَخَّرْتَنِ اْلإِسْرَا سَمَا وَفِي تَرَنْ",
    "وَاتَّبِعُونِ أَهْدِ بِي حَقٌّ ثَمَا # وَيَأْتِ هُوْدَ نَبْغِ كَهْفِ رُمْ سَمَا",
    "تُؤْتُونِ ثُِبْ حَقًّا وَيَرْتَعْ يَتَّقِي # يُوسُفَ زِنْ خُلْفًا وَتَسَأَلْنِ ثِقِ",
    "حمًِا جَنَا الدَّاعِي إِذَا دَعَانِ هُمْ # مَعْ خُلْفِ قَالوُنَ وَيَدْعُ الدَّاعِ حُمْ",
    "هُدْ جُدْ ثَوَى وَالْبَادِ ثِقْ حَقٌّ جَنَنْ # وَالْمُهْتَدِي لاَ أَوَّلًا وَاتَّبَعَنْ",
    "وَقُلْ حِمًا مَدًا وَكَالْجَوَابِ جَا # حَقٌّ تُمِدُّونَنِ فِى سَمَا وَجَا",
    "تُخْزُونِ فِى اتَّقُونِ يَا اخْشَوْنِ وَلاَ # وَاتَّبِعُونِ زُخْرُفٍ ثَوَى حَلاَ",
    "خَافُونِ إِنْ أَشْرَكْتُمُونِ قَدْ هَدَا # نِ عَنْهُمُ كِيدُونِ اَلاعْرَافِ لَدَى",
    "خُلْفٌ حِمًا ثَبْتٌ عِبَادِ فَاتَّقُو # خُلْفٌ غِنىً بَشِّرْ عِبَادِ افْتَحْ يَقُو",
    "بِالْخُلْفِ وَالْوَقْفُ يَلِي خُلْفَ ظُبَى # آتَانِ نَمْلٍ وافْتَحُوا مَدًا غَبَى",
    "حُزْ عُدْ وَقِفْ ظَعْنًا وَخُلْفٌ عَنْ حَسَنْ # بِنْ زُرْ يُرِدْنِ افْتَحْ كَذَا تَتَّبِعَنْ",
    "وَقِفْ ثَنَا وَكُلَّ روُسِ الآيِ ظَلْ # وَافَقَ بِالْوَادِ دَنَا جُدْ وَزُحَلْ",
    "بِخُلْفِ وَقْفٍ وَدُعَاءٍ فِي جَمَعَ # ثِقْ حُطْ زَكَا الْخُلْفُ هُدَى التَّلاَقِ مَعْ",
    "تَنَادِ خُذْ دُمْ جُلْ وَقِيلَ الْخُلْفُ بَرْ # وَالمُتَعَالِ دِنْ وَعِيدِ وَنُذُرْ",
    "يُكَذِّبُوَنِ قَالَ مَعْ نَذِيرِي # فَاعْتَزِلُونِ تَرْجُمُو نَكِيرِي",
    "تُرْدِينِ يُنْقِذُونِ جُودٌ أَكْرَمَنْ # أَهَانَنِيْ هَدَا مَدًا وَالْخُلْفُ حَنْ",
    "وَشَذَّ عَنْ قُنْبُلَ غَيْرُ مَا ذُكِرْ # وَاْلاَصْبَهَانِيُّ كَاْلاَزْرَقِ اسْتَقَرْ",
    "مَعْ تَرَنِ وَاتَّبِعُونِ وَثَبَتْ # تَسْأَلْنِ فِى الكَهْفِ وَخُلْفُ الْحَذْفِ مَتْ",
  ]},
  {id:"tayb-27",title:"بَابُ إِفرادِ القِراءَاتِ وَجَمْعِهَا",sub:"Lecture séparée ou combinée des Qirâ'ât",clr:["#0c2f35","#155a5e"],bayts:[
    "وَقَدْ جَرَى مِنْ عَادَةِ الأَئِمَّهْ # إِفْرَادُ كُلِّ قَارِىءٍ بِخَتْمَهْ",
    "حَتَّى يُؤَهَّلُوا لِجَمْعِ الْجَمْعِ # بِالْعَشْرِ أَوْ أَكْثَرَ أَوْ بِالسَّبْعِ",
    "وَجَمْعُنَا نَخْتَارُهُ بِالْوَقْفِ # وَغَيْرُنَا يَأْخُذُهُ بِالْحَرْفِ",
    "بِشَرْطِهِ فَلْيَرْعَ وَقْفًا وَابْتِدَا # وَلاَ يُرَكِّبْ وَلْيُجِدْ حُسْنَ اْلأَدَا",
    "فَالْمَاهِرُ الَّذِي إِذَا مَا وَقَفَا # يَبْدَا بِوَجْهِ مَنْ عَلَيْهِ وَقَفَا",
    "يَعْطِفُ أَقْرَبًا بِهِ فَأَقْرَبَا # مُخْتَصِرًا مُسْتَوْعِبًا مُرَتِّبَا",
    "وَلْيَلْزَمِ الْوَقَارَ وَالتَّأَدُّبَا # عِنْدَ الشُّيُوخِ إِنْ يُرِدْ أَنْ يَنْجَبَا",
    "وَبَعْدَ إِتْمَامِ اْلأُصُولِ نَشْرَعُ # فِى الْفَرْشِ وَاللهُ إِلَيْهِ نَضْرَعُ",
  ]},
  {id:"tayb-28",title:"سُورَةُ البَقَرَةِ",sub:"Sourate Al-Baqara",clr:["#0a1f3a","#153a63"],bayts:[
    "وَمَا يُخَادِعُونَ يَخْدَعُونَا # كَنْزٌ ثَوىَ اضْمُمْ شُدَّ يَكْذِبُونَا",
    "كَمَا سَمَا وَقِيلَ غِيضَ جِي أَشِمْ # فِي كَسْرِهَا الضَّمَّ رَجَا غِنىً لَزِمْ",
    "وَحِيلَ سِيقَ كَمْ رَسَا غَيْثٌ وَسِي # سِيئَتْ مَدًا رَحْبٍ غَلاَلَةٌ كُسِيِ",
    "وَتُرْجَعُوا الضَّمَّ افْتَحًا واكْسِرْ ظَمَا # إِنْ كَانَ لِلأُخْرَى وَذُو يَوْمًا حِمَا",
    "والْقَصَصُ اْلأُولَى أَتَى ظُلْمًا شَفَا # وَالْمُؤْمِنُونَ ظِلُّهُمْ شَفَا وَفَا",
    "الاُمُورُ هُمْ والشَّامِ وَاعْكِسْ إِذْ عَفَا # الاَمْرُ وَسَكِّنْ هَاءَ هُوْ هِيْ بَعْدَ فَا",
    "وَاوٍ وَلاَمٍ رُدْ ثَنَا بَلْ حُزْ وَرُمْ # ثُمَّ هْوَ وَالْخُلْفُ يُمِلَّ هُوْ وَثُمْ",
    "ثَبْتٌ بَدَا وَكَسْرُ تَا الْمَلاَئِكَتْ # قَبْلَ اسْجُدُوا اضْمُمْ ثِقْ وَالاِشْمَامُ خَفَتْ",
    "خُلْفًا بِكُلٍّ وَأَزَالَ فِى أَزَلْ # فَوْزٌ وَآدَمُ انْتِصَابُ الرَّفْعِ دَلْ",
    "وَكَلِمَاَتٌ رَفْعُ كَسْرٍ دِرْهَمِ # لاَخَوْفَ نَوِّنْ رَافِعًا لاَ الْحَضْرَمِي",
    "رَفَثَ لاَ فُسُوقَ ثِقْ حَقًّا وَلاَ # جِدَالَ ثَبْتٌ بَيْعَ خُلَّةٌ وَلاَ",
    "شَفَاعَةٌ لاَ بَيْعَ لاَ خِلاَلَ لاَ # تَأْثِيمَ لاَ لَغْوَ مَدًا كَنْزٌ وَلاَ",
    "يُقْبَلُ أَنِّثْ حَقُّ وَاعَدْنَا اقْصُرَا # مَعْ طَهَ اَلاَعْرَافِ حَلاَ ظُلْمٌ ثَرَا",
    "بَارِئْكُمُ يَأْمُرْكُمُ يَنْصُرْكُمْ # يَأْمُرْهُمُ تَأْمُرْهُمُ يُشْعِرْكُمُ",
    "سَكِّنْ أَوِ اخْتَلِسْ حُلًا وَالخُلْفُ طِبْ # يُغْفَرْ مَدًا أَنِّثْ هُنَا كَمْ وَظَرِبْ",
    "عَمَّ بِاْلاَعْرَافِ وَنُونُ الْغَيْرِ لاَ # تُضَمُّ وَاكْسِرْ فَاءَهُمْ وَأَبْدِلاَ",
    "عُدْ هُزُؤًا مَعْ كُفُؤًا هُزْؤًا سَكَنْ # ضُمَّ فَتىً كُفْؤًا فَتىً ظَنَّ اْلأُذُنْ",
    "أُذْنَ اتْلُ وَالسُّحْتُ ابْلُ نَلْ فَتىً كَسَا # وَالْقُدْسِ نُكْرٍ دُمْ وَثُلْثَيْ لَبْسَا",
    "عُقْبًا نُهًى فَتىً وَعُرْبًا فِي صَفَا # خُطْوَاتِ إِذْ هُدْ خُلْفُ صِفْ فَتىً حَفَا",
    "وَرُسْلُنَا مَعْ هُمْ وَكُمْ وَسُبْلَنَا # حُزْ جُرُفٍ لِي الْخُلْفُ صِفْ فَتىً مُنَا",
    "وَاْلأُكْلُ أَكْلٌ إِذْ دَنَا وَأُكْلُهَا # شُغْلٌ أَتَى حَبْرٍ وَخُشْبٌ حُطْ رَهَا",
    "زِدْ خُلْفُ نُذْرًا حِفْظُ صَحْبٍ وَاعْكِسَا # رُعْبُ الرُّعُبْ رُمْ كَمْ ثَوى رُحْمًا كَسَا",
    "ثَوى وَجُزْأً صِفْ وَعُذْرًا أَوْ شَرَطْ # وَكَيْفَ عُسْرُ الْيُسْرِ ثِقْ وَخُلْفُ خَطْ",
    "بِالذَّرْوُ سُحْقًا ذُقْ وَخُلْفًا رُمْ خَلاَ # قُرْبَةُ جُدْ نُكْرًا ثَوَى صُنْ إِذْ مَلاَ",
    "مَاَ يَعْمَلُونَ دُمْ وَثَانٍ إِذْ صَفَا # ظِلٌّ دَنَا بَابُ اْلأَمَانِيْ خُفِّفَا",
    "أُمْنِيِّةٌ وَالرَّفْعَ وَالْجَرَّ اسْكِنَا # ثَبْتٌ خَطِيئَاتُهُ جَمْعُ إِذْ ثَنَا",
    "لاَ يَعْبُدُونَ دُمْ رِضىً وَخُفِّفَا # تَظَّاهَرُونَ مَعَ تَحْرِيمٍ كَفَا",
    "حُسْنًا فَضُمَّ اسْكِنْ نُهىً حُزْ عَمَّ دَلْ # أَسْرَى فَشَا تَفْدُو تُفَادُو رُدْ ظَلَلْ",
    "نَالَ مَدًا يُنْزِلُ كُلًاّ خِفَّ حَقْ # لاَ الْحِجْرِ وَاْلأَنْعَامِ أَنْ يُنْزِلَ دَقْ",
    "لاسْرَى حِمًا وَالنَّحْلِ الاُخْرَى حُزْ دَفَا # وَالْغَيْثُ مَعْ مُنْزِلُهَا حَقٌّ شَفَا",
    "وَيَعْمَلُون قُلْ خِطَابٌ ظَهَرَا # جِبْرِيلَ فَتْحُ الْجِيمِ دُمْ وَهْيَ وَرَا",
    "فَافْتَحْ وَزِدْ هَمْزًا بِكَسْرٍ صُحْبَهْ # كُلًاّ وَحَذْفُ الْيَاءِ خُلْفُ شُعْبَهْ",
    "مِيْكَالَ عَنْ حِمًا وَمِيكَائِيلَ لاَ # يَا بَعْدَ هَمْزٍ زِنْ بِخُلْفٍ ثِقْ أَلاَ",
    "وَلَكِنِ الْخِفُّ وَبَعْدُ ارْفَعْهُ مَعْ # أَوَّلَيِ اْلأَنْفَالِ كَمْ فَتىً رَتَعْ ١س",
    "وَلَكِنِ النَّاسُ شَفَا وَالْبِرُّ مَنْ # كَمْ أَمَّ نَنْسَخْ ضُمَّ وَاكَسِرْ مَنْ لَسَنْ",
    "خُلْفٍ كَنُنْسِهَا بِلاَ هَمْزٍ كَفَى # عَمَّ ظُبىً بَعْدَ عَلِيمٌ احْذِفَا",
    "وَاوًا كَسَا كُنْ فَيَكُونُ فَانْصِبَا # رَفْعًا سِوَى الْحَقِّ وَقَوْلُهُ كَبَا",
    "وَالنَّحْلُ مَعْ يَس رُدْ كَمْ تُسْئَلُ # لِلضَّمِّ فَافْتَحْ وَاجْزِمَنْ إِذْ ظَلَّلُوا",
    "وَيْقَرا إِبْرَاهِيمَ ذِيْ مَعْ سُورَتِهْ # مَعْ مَرْيَمَ النَّحْلِ أَخِيرَا تَوْبَتِهْ",
    "آخِرَ اَلانْعَامِ وَعَنْكَبُوتِ مَعْ # أَوَاخِرِ النِّسا ثَلاَثَةٌ تَبَعْ",
    "وَالذَّرْوِ وَالشُّوْرَى امْتِحَانٍ أَوَّلاَ # وَالنَّجْمِ وَالْحَدِيدِ مَازَ الْخُلْفُ لَا",
    "وَاتَّخِذُوا بِالْفَتْحِ كَمْ أَصْلٍ وَخِفْ # أُمْتِعُهُ كَمْ أَرِنَا أَرْنِي اخْتُلِفْ",
    "مُخْتَلِسًا حُزْ وَسُكُونُ الْكَسْرِ حَقْ # وَفُصِّلَتْ لِي الْخلْفُ مِنْ حَقٍّ صَدَقْ",
    "أَوْصَى بِوَصَّى عَمَّ أَمْ يَقْولُ حُفْ # صِفْ حِرْمُ شِمْ وَصُحْبَةٌ حِمًا رَؤُفْ",
    "فاقْصُرْ وَعَمَّا يَعْمَلُونَ إِذْ صَفَا # حَبْرٌ غَدَا عَوْنًا وَثانِيْهِ حَفَا",
    "وَفِى مُوَلِّيْهَا مُوَلاَّهَا كَنَا # تَطَوَّعَ التَّا يَا وَشَدِّدْ مُسْكِنَا",
    "ظُبىً شَفَا الثَّانِي شَفَا وَالَّريحُ هُمْ # كَالْكَهْفِ مَعْ جَاثِيَةٍ تَوْحِيدُهُمْ",
    "حِجْرٍ فَتىً اْلاَعْرَافَ ثَانِي الرُّومِ مَعْ # فَاطِرِ نمْلٍ دُمْ شَفَا الْفُرْقَانُ دَعْ",
    "وَاجْمَعْ بِإِبْرَاهِيمَ شُورَى إِذْ ثَنَا # وَصَادَ الاِسْرَى اْلأَنبِيَا سَبَا ثَنَا",
    "وَالْحَجُّ خُلْفُهُ تَرَى الْخِطَابُ ظَلْ # إِذْ كَمْ خَلاَ خُلْفٌ يَرَوْنَ الضِّمَّ كَلْ",
    "أَنَّ وَأَنَّ اكْسِرْ ثَوى وَمَيِّتَةْ # وَالْمَيْتَةُ اشْدُدْ ثُبْ وَالارْضُ الَمَيِّتَةْ",
    "مَدًا وَمَيْتًا ثِقْ وَالاَنْعَامُ ثَوَى # إِذْ حُجُرَاتٍ غِثْ مَدًا وَثُبْ أَوَى",
    "صَحْبٍ بِمَيْتِ بَلَدٍ وَالْمَيْتِ هُمْ # وَالْحَضْرَمِي وَالسَّاكِنَ اْلأَوَّلَ ضُمْ",
    "لِضَمِّ هَمْزِ الْوَصْلِ وَاكْسِرْهُ نَمَا # فُزْ غَيْرَ قُلْ حَلاَ وَغَيْرُ أَوْ حِمَا",
    "وَالْخُلْفُ فِى التَّنْوِينِ مِزْ وَإِنْ يُجَرْ # زِنْ خُلْفُهُ وَاضْطُرَّ ثِقْ ضَمًّا كَسَرْ",
    "وَمَا اضْطُرِرْ خُلْفٌ خَلاَ وَالْبِرُّ أَنْ # بِنَصْبِ رَفْعٍ فِي عُلًا مُوصٍ ظَعَنْ",
    "صُحْبَةُ ثَقِّلْ لاَ تُنَوِّنْ فِدْيَةُ # طَعَامُ خَفْضُ الرَّفْعِ مِلْ إِذْ ثَبَّتُوا",
    "مِسْكِينٍ اجْمَعْ َلا تُنَوِّنْ وَافْتَحَا # عَمَّ لِتُكْمِلُوا اشْدُدَنْ ظَنَّا صَحَا",
    "بُيُوتِ كَيْفَ جَا بِكَسْرِ الضَّمِّ كَمْ # دِنْ صُحْبَةٌ بَلَى غُيُوبِ صَوْنُ فَمْ",
    "عُيُونِ مَعْ شُيُوخِ مَعْ جُيُوبِ صِفْ # مِزْ دُمْ رِضًا وَالْخُلْفُ فِى الْجِيمِ صُرِفْ",
    "لاَ تَقْتَلُوهُمْ وَمَعًا بَعْدُ شَفَا # فَاقْصُرْ وَفَتْحُ السِّلْمِ حِرْمٌ رَشَفَا",
    "عَكْسُ الْقِتَالِ فِى صَفَا اْلأَنْفَالِ صُرْ # وَخَفْضُ رَفْعِ وَالْمَلاَئِكَةُ ثُرْ",
    "لِيَحْكُمَ اضْمُمْ وَافْتَحِ الضَّمَّ ثَنَا # كُلًاّ يَقُولُ ارْفَعْ أَلاَ الْعَفْوُ حَنَا",
    "إِثْمٌ كَبِيرٌ ثَلِّثِ الْباَ فِي رفَا # يَطْهُرْنَ يَطَّهَّرْنَ فِى رَخَا صَفَا",
    "ضَمَّ يَخَافَا فُزْ ثَوَى تُضَارَ حَقْ # رَفْعٌ وَسَكِّنْ خَفِّفِ الْخُلْفَ ثَدَقْ",
    "مَعْ َلا يُضَارَ وَأَتَيْتُمْ قَصْرُهُ # كَأَوَّلِ الرُّومِ دَنَا وَقَدْرُهُ",
    "حَرِّكْ مَعًا مِنْ صَحْبِ ثَابِتٍ وَفَا # كُلُّ تَمَسُّوهُنَّ ضُمَّ امْدُدْ شَفَا",
    "وَصِيَّةٌ حِرْمٌ صَفَا ظِلًاّ رَفَهْ # وَارْفَعْ شَفَا حِرْمٍ حَلاَ يُضَاعِفَهْ",
    "مَعًا وَثَقِّلْهُ وَبَابَهُ ثَوَىَ # كِسْ دِنْ وَيبْصُطْ سِينَهُ فَتىً حوًى",
    "لِيْ غِثْ وَخُلْفٌ عَنْ قُوًى زِنْ مَنْ يَصُرْ # كَبَسْطَةِ الْخَلْقِ وَخُلْفُ الْعِلْمِ زُرْ",
    "عَسَيْتُمُ اكْسِرْ سِينَهُ مَعًا أَلاَ # غَرْفَةً اضْمُمْ ظِلُّ كَنْزٍ وَكِلاَ",
    "دَفْعُ دِفَاعُ وَاكْسِرِ اِذْ ثَوَى امْدُدَا # أَنَا بِضَمِّ الْهَمْزِ أَوْ فَتْحٍ مَدَا",
    "وَالْكَسْرِ بِنْ خُلْفًا وَرَا فِى نُنْشِزُ # سَمَا وَوَصْلُ اعْلَمْ بِجَزْمٍ فِي رُزُوا",
    "صُرْهُنَّ كَسْرُ الضَّمِّ غِثْ فَتىً ثُمَا # رَبْوَةٌ الضَّمُ مَعًا شَفَا سَمَا",
    "فِى الْوَصْلِ تَاتَيَمَّمُوا اشْدُدْ تَلْقَفُ # تَلَهَّ لاَ تَنَازَعُوا تَعَارَفُوا",
    "تَفَرَّقُوا تَعَاوَنُوا تَنَابَزُوا # وَهَلْ تَرَبَصَّوُنَ مَعْ تَمَيَّزوُا",
    "تَبَرَّجُ اذْ تَلَقَّوُا التَّجَسُّسَا # وَفَتَّفَرَّقَ تَوَفَّى فِى النِّسَا",
    "تَنَزَّلُ اْلأَرْبَعُ أَنْ تَبَدَّلاَ # تَخَيَّرُونَ مَعْ تَوَلَّوْا بَعْدَ لاَ",
    "مَعْ هُودَ وَالنُّورِ وَاِلامْتِحَانِ َلا # تَكَلَّمُ الْبَزِّي تَلَظَّى هَبْ غَلاَ",
    "تَنَاصَرُوا ثِقْ هُدْ وَفِي الْكُلِّ اخْتُلِفْ # لَهُ (البزي) وَبَعْدَ كُنْتُمُ ظَلْتُمْ وُصِفْ",
    "وَلِلسُّكُونِ الصِّلَةِ امْدُدْ واْلأَلِفْ # مِنْ يُؤْتَ كَسْرُ التَّا ظُبىً بِاليَاءِ قِفْ",
    "مَعًا نِعِمَّا افْتَحْ كَمَا شَفَا وفِي # إِخْفَاءِ كَسْرِ الْعَيْنِ حُزْ بِهَا صَفِي",
    "وَعَنْ أَبِي جَعْفَرَ مَعْهُمْ سَكِّنَا # وَيَا نُكَفِّرْ شَامُهُمْ وَحَفْصُنَا",
    "وَجَزْمُهُ مَدًا شَفَا وَيحْسِبُ # مُسْتَقْبَلًا بِفَتْحِ سِينٍ كَتَبُوا",
    "فِي نَصِّ ثَبْتٍ فَأْذَنُوا امْدُدْ واكْسِرِ # فِى صَفْوَةٍ مَيْسَرَةِ الضَّمَّ انْصُرِ",
    "تَصَّدَّقُوا خِفٌّ نَمَا وَكَسْرُ أَنْ # تَضِلَّ فُزْ تُذْكِرَ حَقًّا خَفِّفَنْ",
    "وَالرَّفْعَ فِدْ تِجَارَةٌ حَاضِرَةُ # لِنَصْبِ رَفْعٍ نَلْ رِهَانٌ كَسْرَةُ",
    "وَفَتْحَةٌ ضَمًّا وَقَصْرُ حُزْ دَوَا # يَغْفِرْ يُعَذِّبْ رَفْعُ جَزْمٍ كَمْ ثَوَى",
    "نَصُّ كِتَابِه بِتَوحِيدٍ شَفَا # وَلاَ نُفَرِّقُ بِيَاءٍ ظَرُفَا",
  ]},
  {id:"tayb-29",title:"سُورَةُ آلِ عِمْرَانَ",sub:"Sourate Âl 'Imrân",clr:["#0d2b2b","#1a4f4a"],bayts:[
    "سَيُغْلَبُونَ يُحْشَرُونَ رُد فَتىَ # يَرَوْنَهُمْ خَاطِبْ ثَنَا ظِلٌّ أَتَى",
    "رِضْوَانُ ضَمُّ الكَسْرِ صِفْ وَذُو السُّبُلْ # خُلْفٌ وَإِنَّ الدِّينَ فَافْتَحْهُ رَجُلْ",
    "يُقَاتِلُونَ الثَّانِ فُزْ فِي يَقْتُلوُ # تَقِيَّةً قُلْ فِي تُقَاةً ظُلَلُ",
    "كَفَّلَهَا الثِّقْلُ كَفَى واسْكِنْ وضُمْ # سُكُونَ تَا وَضَعْتُ صُنْ ظَهْرًا كَرُمْ",
    "وَحَذْفُ هَمْزِ زَكَرِيَّا مُطْلَقَا # صَحْبٌ وَرَفْعُ اْلأَوَّلِ انْصِبْ صَدِّقَا",
    "ناَدَتْهُ نَادَاهُ شَفَا وَكَسْرُ أَنْ # نَ اللهَ فِى كَمْ يَبْشُرُ اضْمُمْ شَدِّدَنْ",
    "كَسْرًا كَاِلاسْرَى الكَهْفِ وَالْعَكْسُ رِضَى # وَكَافَ أُولَى الْحِجْرِ تَوْبَةٌ فَضَا",
    "وَدُمْ رِضىً حَلاَ الَّذِى يُبَشِّرُ # نُعَلِّمُ الْياَ إِذ ثَوَى نَلْ وَاكْسِرُوا",
    "أَنِّيَ أَخْلُق اتْلُ ثُبْ والطَّائِرِ # فِي الطَّيْرِ كَالْعُقُودِ خَيْرَ ذَاكِرِ",
    "وَطَائِرًا مَعًا بَِطْيرًا إِذْ ثَنَا # ظُبىً نُوَفِّيْهِمْ بِيَاءٍ عَنْ غِنَا",
    "وَتَعْلَمُونَ ضُمَّ حَرِّكْ واكْسِرَا # وَشُدَّ كَنْزًا وَارْفَعُوا لاَ يَأْمُرَا",
    "حِرْمٌ حَلاَ رُحْبًا لِمَا فَاكْسِرْ فِدَا # آتَيْتُكُمْ يُقْرَأُ آتَيْنَا مَدَا",
    "وَيُرْجَعُونَ عَنْ ظُبىً يَبْغُونَ عَنْ # حِمًا وَكَسْرُ حَجَّ عَنْ شَفَا ثَمَنْ",
    "مَا يَفْعَلُوا لَنْ يُكْفَرُوا صَحْبٌ طَلاَ # خُلْفًا يَضِرْكُمُ اكْسِرِ اجْزِمْ أَوْصِلاَ",
    "حَقًّا وَضُمَّ اشْدُدْ لِبَاقٍ واشْدُدُوا # مُنَزَّلِينَ مُنْزِلُونَ كَبَّدُوا",
    "وَمُنْزَلٌ عَنْ كَمْ مُسَوَّمِينَ نَمْ # حَقُّ اكْسِرِ الوَاوَ وَحَذْفُ الْوَاوِ عَمْ",
    "مِنْ قَبْلِ سَارِعُوا وَقُرْحُ الْقُرْحُ ضُمْ # صُحْبَةُ كَائِنْ فِي كَأَيِّنْ ثَلَّ دُمْ",
    "قَاتَلَ ضُمَّ اكسِرْ بِقَصْرٍ أُوجَفَا # حَقًاّ وَكُلُّهُ حِمًا يَغْشَى شَفَا",
    "أَنِّثْ وَيَعْمَلُونَ دُمْ شَفَا اكْسِرِ # ضَمًّا هُنَا فِي مُتُّمُ شَفَا أُرِيْ",
    "وَحَيْثُ جَا صَحْبٌ أَتى وَفَتْحُ ضَمْ # يُغَلَّ وَالضَّمُ حَلاَ نَصْرٍ دَعَمْ",
    "وَيَجْمَعُونَ عَالِمٌ مَا قُتِلُوا # شُدَّ لَدَى خُلْفٍ وَبَعْدُ كَفَلوُا",
    "كَالْحَجِّ واَلآخِرُ وَاْلأَنْعَامُ # دُمْ كَمْ وَخُلْفُ يَحْسَبَنَّ لَاَمُوا",
    "وَخَاطِبَنْ ذَا الْكُفْرِ وَالْبُخْلِ فَنَنْ # وَفَرَحٍ ظَهْرٌ كَفَى واكْسِرْ وأنْ",
    "الله رُمْ يَحْزُنُ فِي اْلكُلِّ اضْمُمَا # مَعْ كَسْرِ ضَمٍّ أَمَّ اْلاَنْبِيَا ثَمَا",
    "يَمِيزَ ضُمَّ افْتَحْ وَشَدِّدْهُ ظَعَنْ # شَفَا مَعًا يَكْتُبُ يَا وَجَهِّلَنْ",
    "قَتْلَ ارْفَعُوا يَقُولُ يَا فُزْ يَعْمَلو # حَقٌّ وَفي الزُّبُرِ بِالْبَا كَمَّلُوا",
    "وَبالكِتُابِ الْخُلْفِ لُذ يُبَيِّنُنْ # وَيَكْتُمُوُنَ حَبْرُ صِفْ ويَحْسَبَنْ",
    "غَيْبٌ وَضَمُّ البَاءِ حَبْرٌ قُتِّلوُا # قَدِّمْ وَفِى التَّوْبَةِ أَخِّرْ يَقْتُلُوا",
    "شَفَا يَغُرَّنْكَ الْخَفِيفُ يَحْطِمَنْ # أَوْ نُرِيَنْ وَيَسْتَخِفَّنْ نَذْهَبَنْ",
    "وَقِفْ بِذَا بِأَلِفٍ غُصْ وَثَمَرْ # شَدَّدَ لَكِنَّ الَّذِينَ كَالزُّمَرْ",
  ]},
  {id:"tayb-30",title:"سُورَةُ النِّسَاءِ",sub:"Sourate An-Nisâ'",clr:["#0a2540","#154568"],bayts:[
    "تَسَاءَلُونَ الْخِفُّ كُوفٍ واجْرُرَا # الاَرْحَامُ فُقْ وَاحِدَةٌ رَفْعٌ ثَرَا",
    "الاُخْرَى مَدًا وَاقْصُرْ قِيَامًا كُنْ أَبَا # وَتَحْتُ كَمْ يَصْلَوْنَ ضُمَّ كَمْ صَبَا",
    "يُوصَى بِفَتْحِ الصَّادِ صِفْ كِفْلًا دَرَا # وَمَعْهُمُ حَفْصٌ فِي الاُخْرَى قَدْ قَرَا",
    "ِلأُمِّهِ فِى أُمِّ أُمِّهَا كَسَرْ # ضَمًّا لَدَى الْوَصْلِ رِضًى كَذَا الزُّمَرْ",
    "وَالنَّحْلُ نُورُ النَّجْمِ والْمِيمُ تَبَعْ # فَاشٍ وَنُدْخِلْهُ مَعَ الطَّلاَقِ مَعْ",
    "فَوْقُ يُكَفِرْ وَيُعَذِّبْ مَعْهُ فِي # إِنَّا فَتَحْنَا نُونُهَا عَمَّ وَفِي",
    "لَذَانِ ذَانِ ولَذَيْنِ تَيْنِ شَدْ # مَكٍّ فَذَانِكَ غَنًا دَاعٍ حَفَدْ",
    "كُرْهًا مَعَا ضَمٌّ شَفَا اْلأَحْقَافُ # كَفَى ظَهِيًرا مَنْ لَهُ خِلاَفُ",
    "وَصِفْ دُمًا بِفَتْحِ يَا مُبَيِّنَهْ # وَالْجَمْعُ حِرْمٍ صُنْ حِمًا وَمُحْصَنَهْ",
    "فِي الْجَمْعِ كَسْرُ الصَّادِ لاَ الأُولَى رَمَا # أَحْصَّنَّ ضُمَّ اكْسِرْ عَلَى كَهْفٍ سَمَا",
    "أَحَلَّ ثُبْ صَحْبًا تِجَارَةٌ عَدَا # كُوفٍ وَفَتْحُ ضَمِّ مَدْخَلًا مَدَا",
    "كَالْحَجِّ عَاقَدَتْ لِكُوفٍ قُصِرَا # وَنَصْبُ رَفْعِ حَفِظَ اللهُ ثَرَا",
    "وَالْبُخْلِ ضُمَّ اسْكِنْ مَعًا كَمْ نَلْ سَمَا # حَسَنَةٌ حِرْمٌ تَسَوَّى اضْمُمْ نَمَا",
    "حَقٌّ وَعَمَّ الثِّقْلُ لاَمَسْتُمْ قَصَرْ # مَعًا شَفَا إِلاَّ قَلِيلًا نَصْبُ كَرْ",
    "فِى الرِّفْعِ تَأْنِيثُ تَكُنْ دِنْ عَنْ غَفَا # لاَ يُظْلَمُو دُمْ ثِقْ شَذَا الْخُلْفُ شَفَا",
    "وَحَصِرَتْ حَرِّكْ وَنَوِّنْ ظَلَماَ # تَثَبَّتُوا شَفَا مِنَ الثَّبْتِ مَعَا",
    "مَعْ حُجُرَاتٍ وَمِنَ الْبَيَانِ عَنْ # سِوَاهُمُ السَّلاَمَ لَسْتَ فَاقْصُرَنْ",
    "عَمَّ فَتىً وَبَعْدُ مُؤْمِنًا فَتَحْ # ثَالِثَهُ بِالْخُلْفِ ثَابِتًا وَضَحْ",
    "غَيْرَ ارْفعُوا فِى حَقِّ نَلْ نُؤْتِيْهِ يَا # فَتىً حُلًا وَيَدْخُلُونَ ضَمَّ يَا",
    "وَفَتْحُ ضَمٍّ صِفْ ثَنَا حَبْرٍ شُفِي # وَكَافَ أُولَى الطَّوْلِ ثُبْ حَقٌّ صُفِي",
    "وَالثَّانِ دَعْ ثَطَا صَبَا خُلْفًا غَدَا # وَفَاطِرٍ حُز يُصْلِحَا كُوفٍ لَدَا",
    "يصَّالَحَا تَلْوُوا تَلُوا فَضْلٌ كَلاَ # نَزَّلَ أَنْزَلَ اضْمُمِ اكْسِرْ كَم حَلاَ",
    "دُمْ وَاعكِسِ اْلأُخْرى ظُبىً نَلْ وَالدَّرَكْ # سَكِنْ كَفَى نُؤْتِيهِمُ الْيَاءُ عَرَكْ",
    "تَعْدُوا فَحَرِّكْ جُدْ وَقَالوُنُ اخْتَلَسْ # بِالْخُلْفِ واشْدُدَنْ لَهُ ثُمَّ أَنَسْ",
    "وَيَا سَنُؤْتِيهِمْ فَتىً وَعَنْهُمَا # زَايَ زَبُورًا كَيْفَ جَاءَ فَاضْمُمَا",
  ]},
  {id:"tayb-31",title:"سُورَة المَائِدَةِ",sub:"Sourate Al-Mâ'ida",clr:["#0e2e30","#1c5658"],bayts:[
    "سَكِّنْ مَعًا شَنْآنُ كَمْ صَحَّ خَفَا # ذَا الْخُلْفِ أَنْ صَدُّوكُمُ اكْسِرْ حُز دَفَا",
    "أَرْجُلِكُمْ نَصْبُ ظُبىً عَنْ كَمْ أَضَا # رُدْ وَاقْصُرِ اشْدُدْ يَا قَسِيَّةً رِضَى",
    "مِنْ أَجْلِ كَسْرُ الْهَمْزِ والنَّقْلِ ثَنَا # والْعَيْنَ والْعَطْفَ ارْفَعِ الخَمْسَ رَنَا",
    "وَفىِ الجُرُوحَ ثَعْبُ حَبْرٍ كَمْ رَكَا # وَلْيَحْكُمَ اكسِرْ وَانْصِبَنْ مُحَرِّكَا",
    "فُقْ خَاطَبُوا يَبْغُونَ كَمْ وقَبْلاَ # يَقُولُ وَاوُهُ كَفَى حُزْ ظِلاَّ",
    "وَارْفَعْ سِوَى الْبَصْرِي وَعَمَّ يَرْتَدِدْ # وَخَفْضُ وَالْكُفَّارِ رُمْ حِمًا عَبُدْ",
    "بِضَمِّ بَائِهِ وَطَاغُوتَ اجْرُرِ # فَوْزًا رِسَالاَتِهِ فَاجْمَعْ وَاكْسِرِ",
    "عَمَّ صَرَا ظُلْمٌ وَاَلاْنَعَامِ اعْكِسَا # دِنْ عُدْ تَكُونُ ارْفَعْ حِمًا فتىً رَسَا",
    "عَقَدْتُمُ الْمَدُّ مُنىً وَخَفَّفَا # مِنْ صُحْبَةٍ جَزَاءُ تَنْوِينٌ كَفَى",
    "ظَهْرًا وَمِثْلِ رَفْعُ خَفْضِهِمْ وَسَمْ # وَالْعَكْسُ فِى كَفَّارَةٍ طَعَامُ عَمْ",
    "ضَمَّ اسْتُحِقَّ افْتَحْ وَكَسْرَهُ عُلاَ # وَالأَوْلَيَانِ اْلأَوَّليِنَ ظُلِلاَ",
    "صَفْوٌ فَتَى وَسِحْرُ سَاحِرٌ شَفَا # كَالصَّفِّ هُودٍ وَبِيُونُسٍ دَفَا",
    "كَفَى وَيَسْتَطِيعُ رَبُّكَ سِوَى # عَليِّهِمْ يَوْمُ انْصِبِ الرَّفْعَ أَوَى",
  ]},
  {id:"tayb-32",title:"سُورةَ الأنعَامُ",sub:"Sourate Al-An'âm",clr:["#0a2030","#134560"],bayts:[
    "يُصْرَفْ بِفَتْحِ الضَّمِّ وَاكْسِرْ صُحْبَةُ # ظَعْنٍ وَيَحْشُرْ يَا يَقُولُ ظُنَّةُ",
    "وَمَعْهُ حَفْصٌ فىِ سَبَا يَكُنْ رِضَا # صِفْ خُلْفَ ظَامٍ فِتْنَةُ ارْفَعْ كَمْ عَضَا",
    "دُمْ رَبَّنَا النَّصْبُ شَفَا نُكَذِّبُ # بِنَصْبِ رَفْعٍ فَوْزُ ظُلْمٍ عَجَبُ",
    "كَذَا نَكُونُ مَعْهُمُ شَامٍ وَخَفْ # لَلدَّارُ الآخِرَةُ خَفْضُ الرَّفْعِ كَفْ",
    "لاَ يَعْقِلُونَ خَاطَبُوا وَتَحْتُ عَمْ # عَنْ ظَفَرٍ يُوسُفَ شُعْبَةُ وَهُمْ",
    "يس كَمْ خُلْفٍ مَدَا ظِلٍّ وَخِفْ # يُكَذِّبُ اتْلُ رُمْ فَتَحْناَ اشْدُدْ كَلَفْ",
    "خُذْهُ كَالاعْرَافِ وخُلْفًا ذُقْ غَدَا # وَاقْتَرَبَتْ كَمْ ثِقْ غَلاَ الخُلْفُ شَدَا",
    "وَفُتِّحَتْ يَأْجُوجَ كَمْ ثَوَى وَضَمْ # غُدْوَةَ فِى غَدَاةَ كَالْكَهْفِ كَتَمْ",
    "وَإِنَّهُ افْتَحْ عَمَّ ظِلًاّ نَلْ فإِنْ # نَلْ كَمْ ظُبىً وَيَسْتَبِينَ صَوْنُ فَنْ",
    "رَوى سَبِيلَ لاَ الْمَدِينِي وَيَقُصْ # فِى يَقْضِ أَهْمِلَنْ وَشَدِّدْ حِرْمُ نَصْ",
    "وَذَكِّرِ اسْتَهوَى تَوَفَّى مُضْجِعَا # فَضْلٌ وَنُنْجِي الْخِفُّ كَيْفَ وَقَعَا",
    "ظِلَّ وَفِي الثَّانِ اتْلُ مِنْ حَقٍّ وَفِي # كَافَ ظُبىً رُضْ تَحْتَ صَاد شَرِّفِ",
    "وَالحِجْرِ أُولَى الْعَنْكَباَ ظُلْمٌ شَفَا # والثَّانِ صُحْبَةٌ ظَهيرٌ دَلَفَا",
    "وَيوُنُسَ اْلأُخْرَى عَلاَ ظَبْىٌ رَعَا # وَثِقْلُ صَفٍّ كَمْ وَخُفْيَةً مَعَا",
    "بِكَسْرِ ضَمٍّ صِفْ وأنْجَانَا كَفَى # أَنْجَيْتَنَا الْغَيْرُ وَيُنْسِي كَيَّفَا",
    "ثِقْلًا وَآزَرَ ارْفَعُوا ظُلْمًا وَخِفْ # نُونَ تُحَاجُّونِي مَدًا مَنْ لِى اخْتُلِفْ",
    "وَدَرَجَاتِ نَوَّنُوا كَفَا مَعَا # يَعْقُوبَ مَعْهُمُ هُنَا وَاللَّيْسَعَا",
    "شَدِّدْ وَحَرِّكْ سَكِّنَنْ مَعًا شَفَا # وَيَجْعَلُوا يُبْدُو وَيُخْفُو دَعْ حَفَا",
    "يُنْذِرَ صِفْ بَيْنَكُمُ ارْفَعْ فِي كَلاَ # حَقٍّ صَفَا وَجَاعِلُ اقْرَأْ جَعَلاَ",
    "وَاللَّيْلُ نَصْبُ الكُوفِ قَافَ مُسْتَقِرْ # فَاكْسِرْ شَذَا حَبْرٍ وَفىِ ضَمَّيْ ثَمَرْ",
    "شَفَا كَيَس وَخَرَّقُوا اشْدُدِ # مَدًا وَدَارَسْتَ لِحَبْرٍ فَامْدُدِ",
    "وَحَرِّكِ اسْكِنْ كَمْ ظُبىً وَالْحَضْرَمِي # عَدْوًا عُدُوًّا كَعُلُوًّا فَاعْلَمِ",
    "وَإِنَّهاَ افْتَحْ عَنْ رِضىً عَمَّ صَدَا # خُلْفٍ وَتُؤمِنُونَ خَاطِبْ فِى كُدَا",
    "وَقِبَلًا كَسْرًا وَفَتْحًا ضَمَّ حَقْ # كَفَى وَفِي الْكَهْفِ كَفَى ذِكْرًا خَفَقْ",
    "وَكَلِمَاتُ اقْصُرْ كَفَى ظِلًاّ وَفِي # يُونُسَ وَالطَّوْلِ شَفَا حَقًاّ نُفِي",
    "فُصِّلَ فَتْحُ الضَّمِّ والْكَسْرِ أَوَى # ثَوَى كَفَى وَحُرِّمَ اتْلُ عَنْ ثَوى",
    "وَاضْمُمْ يَضِلُّوا مَعَ يُونُسٍ كَفَى # ضَيْقًا مَعًا فِى ضَيِّقًا مَكٍّ وَفَى",
    "رَا حَرَجًا بِالْكَسْرِ صُنْ مَدًا وَخِفْ # سَاكِنَ يَصْعَدُ دَنَا وَالْمَدُّ صِفْ",
    "وَالْعَيْنَ خَفِّفْ صُنْ دُمًا يَحْشُرُ يَا # حَفْصٌ وَرَوْحٌ ثَانِ يُونُسٍ عَيَا",
    "خِطَابَ عَمَّا تَعْمَلو كَمْ هُودَ مَعْ # نَمْلِ اذْ ثَوَى عُدْ كِسْ مَكَانَاتٍ جَمَعْ",
    "فِي الْكُلِّ صِفْ وَمَنْ يَكُونُ كَالْقَصَصْ # شَفَا بِزَعْمِهِمْ مَعًا ضُمَّ رَمَصْ",
    "زُيِّنَ ضُمَّ اكْسِرْ وَقَتْلُ الرَّفْعُ كَرْ # أَوْلاَدُ نَصْبُ شُرَكَائِهِمْ بِجَرْ",
    "رَفْعٍ كُدًا أَنِّثْ يَكُنْ لِي خُلْفُ مَا # صِبْ ثِقْ وَمَيْتَةٌ كَسَا ثَنَا دُمَا",
    "والثَّانِ كَمْ ثَنَّى حِصَادِ افْتَحْ كَلاَ # حِمًا نَمَا وَالمَعْزِ حَرِّكْ حَقُّ لَا",
    "خُلْفٌ مُنىً يَكُونُ إِذْ حِمًا نَفَا # رَوَى تَذَكَّرُونَ صَحْبٌ خَفَّفَا",
    "كُلًاّ وَأَنْ كَمْ ظَنَّ وَاكْسِرْهَا شَفَا # يَأْتِيَهُمْ كَالنَّحْلِ عَنْهُمْ وُصِفَا",
    "وَفَرَّقُوا امْدُدْهُ وخَفِّفْهُ مَعَا # رِضىً وَعَشْرٌ نَوِّنَنْ بَعْدُ ارْفَعَا",
    "خَفْضًا لِيَعْقُوبَ وَدِينًا قَيِّمَا # فَافْتَحْهُ مَعْ كَسْرٍ بِثِقْلِهِ سَمَا",
  ]},
  {id:"tayb-33",title:"سُورَة الأعْرَافِ",sub:"Sourate Al-A'râf",clr:["#0a2a2e","#124a4f"],bayts:[
    "تَذَكَّرُونَ الْغَيْبَ زِدْ مِنْ قَبْلُ كَمْ # وَالْخِفُّ كُنْ صَحْبًا وَتُخْرَجُونَ ضَمْ",
    "فَافْتَحْ وَضُمَّ الرَّا شَفَا ظِلٌّ مَلاَ # وَزُخْرَفٌ مَنٌّ شَفَا وَأَوَّلاَ",
    "رُومٍ شَفَا مِنْ خُلْفِهِ الْجَاثِيَةَ # شَفَا لِبَاسُ الرَّفْعِ نَلْ حَقًّا فَتَى",
    "خَالِصَةٌ إِذْ يَعْلَمُو الرَّابِعَ صِفْ # يُفْتَحُ فِي رَوَى وَحُزْ شَفَا يَخِفْ",
    "وَاوَ وَمَا احْذِفْ كَمْ نَعَمْ كُلًاّ كَسَرْ # عَيْنًا رَجَا أَنْ خِفَّ نَلْ حِمًا زَهَرْ",
    "خُلْفَ اتْلُ لَعْنَةُ لهُمْ يُغْشِي مَعَا # شَدِّدْ ظَمَا صُحْبَةُ وَالشَّمْسَ ارْفَعَا",
    "كَالنَّحْلِ مَعْ عَطْفِ الثَّلاَثِ كَمْ وَثَمْ # مَعْهُ فِي الآخِرَيْنِ عُدْ نُشْرًا يَضُمْ",
    "فَافْتَحْ شَفَا كُلًاّ وسَاكِنًا سَمَا # ضَمَّ وَبَا نَلْ نَكِدًا فَتْحٌ ثَمَا",
    "وَرَا إِلهٍ غَيْرِهِ اخْفِضْ حَيْثُ جَا # رَفعًا ثَنا رُدْ أُبْلِغَ الْخِفُّ حَجَا",
    "كُلًاّ وَبَعْدَ المُفْسِدِيِنَ الْوَاوُ كَمْ # أَوْ أَمِنَ الإِْسْكَانُ كَمْ حِرْمٌ وَسَمْ",
    "عَلَى عَلَىَّ اتْلُ وسَحَّارٍ شَفَا # مَعْ يُونُسٍ فى سَاحِرِ وَخَفَّفَا",
    "تَلْقَفُ كُلًاّ عُدْ سَنَقْتُلُ اضْمُمَا # وَاشْدُدْهُ واكْسِرْ ضَمَّهُ كَنْزٌ حِمَا",
    "وَيقْتُلُونَ عَكْسُهُ انْقُلْ يَعْرِشُو # مَعًا بِضَمِّ الْكَسْرِ صَافٍ كَمَشُوا",
    "وَيَعْكُفُو اكْسِرْ ضَمَّهُ شَفَا وَعَنْ # إِدْرِيسَ خُلْفُهُ وَأَنْجَانَا احْذِفَنْ",
    "يَاءً وَنُونًا كَمْ وَدَكَّاءَ شَفَا # فى دَكًّا المَدُّ وَفِي الْكَهْفِ كَفَى",
    "رِسَالَتِي اجْمَعْ غَيْثُ كَنْزٍ حَجَفَا # وَالرُّشْدِ حَرِّكْ وَافْتَحِ الضَّمَ شَفَا",
    "وَآخِرَ الكَهْفِ حِمًا وَخَاطَبُوا # يَرْحَمْ وَيَغْفِرْ رَبُّنَا الرَّفْعَ انْصِبُوا",
    "شَفَا وَحَلْيِهِمْ مَعَ الْفَتْحِ ظَهَرْ # وَاكْسِرْ رِضَى وَأُمَّ مِيمَهُ كَسَرْ",
    "كَمْ صُحْبَةٍ مَعًا وَآصَارَ اجْمَعِ # وَاعْكِسْ خَطِيئَاتِ كَمَا الكَسْرَ ارْفَعِ",
    "عَمَّ ظُبىً وَقُلْ خَطَايَا حَصَرَهْ # مَعْ نُوحَ وَارْفَعْ نَصْبَ حَفْصٍ مَعْذِرَهْ",
    "بِيْسَ بِيَاءٍ لَاَحَ بِالْخُلْفِ مَدَا # وَالهَمْزُ كَمْ وَبَيْئَسٍ خُلْفٌ صَدَا",
    "بَئِيْسٍ الْغَيْرُ وَصِفْ يُمْسِكُ خِفْ # ذُرِّيَّةَ اقْصُرْ وَافْتَحِ التَّاءَ دَنِفْ",
    "كَفَى كَثَانِ الطُّورِ يَاسِينَ لَهُمْ # وابْنِ الْعَلاَ كِلاَ تَقُولُ الْغَيْبُ حُمْ",
    "وَضَمَّ يُلْحِدُونَ وَالكَسْرَ فَتَحْ # كَفُصِّلَتْ فَشَا وَفِي النَّحْلِ رَجَحْ",
    "فَتىً يَذَرْهُمُ اجْزِمَوا شَفَا وَيَا # كَفَى حِمًا شِرْكًا مَدَاهُ صَلِيَا",
    "فِي شُرَكَاءَ يَتْبَعُوا كْالظُّلَّهْ # بِالْخِفِّ والْفَتْحِ اتْلُ يَبْطِشْ كُلَّهْ",
    "بِضَمِّ كَسْرٍ ثِقْ وَلِيِّيَ احْذِفِ # بِالْخُلْفِ وَافْتَحْهُ أَوِ اكْسِرْهُ يَفِي",
    "وَطَائِفٌ طَيْفٌ رَعَى حَقًّا وَضُمْ # وَاكْسِرْ يُمِدُّونَ لِضَمٍّ ثَدْيَ أُمْ",
  ]},
  {id:"tayb-34",title:"سُوْرَةُ اَلأنفَالِ",sub:"Sourate Al-Anfâl",clr:["#0a2438","#123f5c"],bayts:[
    "وَمُرْدِفي افْتَحْ دَالَهُ مَدًا ظُمِي # رَفْعَ النُّعَاسَ حَبْرُ يَغْشَى فَاضْمُمِ",
    "وَاكْسِرْ لِبَاقٍ واشْدُدَنْ مَعْ مُوهِنُ # خَفِّفْ ظُبىَ كَنْزٍ وَلاَ يُنَوَّنُ",
    "مَعْ خَفْضِ كَيْدِ عُدْ وَبَعْدُ افْتَحْ وَأَنْ # عَمَّ عُلًا وَيَعْمَلُوا الْخِطَابُ غَنْ",
    "بِالْعُدْوَةِ اكْسِرْ ضَمَّهُ حَقًّا مَعَا # وَحَيِيَ اكْسِرْ مُظْهِرًا صَفَا زَعَا",
    "خُلْفٌ ثَوَى إِذْ هَبْ وَيَحْسَبَنَّ فِي # عَنْ كَمْ ثَنَا وَالنُّورُ فَاشِيهِ كُفِي",
    "وَفِيهِمَا خِلاَفُ إِدْرِيسَ اتَّضَحْ # وَيَتَوَفَّى أَنِّثِ انَّهُمْ فَتَحْ",
    "كِفْلٌ وَتُرْهِبُونَ ثِقْلُهُ غَفَا # ثَانِي يَكُنْ حِمًا كَفَى بَعْدُ كَفَا",
    "ضُعْفًا فَحَرِّكْ لاَ تُنَوِّنْ مُدَّ ثُبْ # وَالضَّمَّ فافْتَحْ نَلْ فَتىً وَالرُّومُ صِبْ",
    "عَنْ خُلْفِ فَوْزٍ أَنْ يَكُونَ أَنِّثَا # ثَبْتُ حِمًا أَسْرَى أُسَارَى ثَلِّثَا",
    "مِنَ اْلأُسَارَى حُزْ ثَنَا وَلاَيَةُ # فَاكْسِرْ فَشَا الكَهْفِ فَتىً رِوَايةُ",
  ]},
  {id:"tayb-35",title:"سُورَةُ التَّوْبَةِ",sub:"Sourate At-Tawba",clr:["#0c2f35","#155a5e"],bayts:[
    "وَكسْرَ لاَ أَيْمَانَ كَمْ مَسْجِدَ حَقّْ # الاَوَّلَ وَحِّدْ وَعَشِيرَاتٌ صَدَقْ",
    "جَمْعًا عُزَيْرٌ نَوِّنُوا رُمْ نَلْ ظُبَى # عَيْنَ عَشَرْ فى الكُلِّ سَكِّنْ ثَغَبَا",
    "يُضَلُّ فَتْحُ الضَّادِ صَحْبٌ ضَمَّ يَا # صَحْبٌ ظُبىً كَلِمَةُ انْصِبْ ثَانِيَا",
    "رَفْعًا وَمَدْخَلًا مَعَ الفَتْحِ لِضَمُ # يَلْمِزُ ضَمُّ الكَسْرِ فىِ الكُلِّ ظُلَمْ",
    "يُقْبَلُ رُدْ فَتىً وَرَحْمَةٌ رَفَعْ # فَاخْفِضْ فَشَا يُعْفَ بِنُونٍ سَمِّ مَعْ",
    "نُونٍ لَدَى اُنْثَى تُعَذَّبْ مِثْلَهُ # وَبَعْدُ نَصْبُ الرَّفْعِ نَلْ وَظِلَّهُ",
    "المُعْذِرُونَ الخِفُّ والسُّوءِ اضْمُمَا # كَثَانِ فَتْحٍ حَبْرُ اْلانْصَارِ ظَمَا",
    "بِرَفْعِ خَفْضٍ تَحْتَهَا اخْفِضْ وَزِدِ # مِنْ دُمْ صَلاَتَكَ لِصَحْبٍ وَحِّدِ",
    "مَعْ هُودَ وَافْتَحْ تَاءَهُ هُنَا وَدَعْ # وَاوَ الَّذِينَ عَمَّ بُنْيَانَ ارْتَفَعْ",
    "مَعْ أُسِّسَ اضْمُمْ وَاكْسِرِ اعْلَمْ كَمْ مَعَا # إِلاَّ إِلَى أَنْ ظُفَرٌ تَقَطَّعَا",
    "ضُمَّ اَتْلُ صِفْ حَبْرًا رَوَى يَزِيغُ عَنْ # فَوْزٍ يَرَوْنَ خَاطِبُوا فِيهِ ظَعَنْ",
  ]},
  {id:"tayb-36",title:"سُورَةُ يُونُسَ عليه السلام",sub:"Sourate Yûnus",clr:["#0a1f3a","#153a63"],bayts:[
    "وَإِنَّهُ افْتَحْ ثِقْ وَيَا يُفَصِّلُ # حَقٌّ عَلاَ قُضِيَ سَمَّى أَجَلُ",
    "فِي رَفْعِهِ انْصِبْ كَمْ ظُبىً وَاقْصُرْ وَلاَ # أَدْرَى وَلاَ أُقْسِمُ الاُولَى زِنْ هَلاَ",
    "خُلْفٌ وَعَماَّ يُشْرِكُوا كَالنَّحْلِ مَعْ # رُومٍ سَمَا نَلْ كَمْ وَيمْكُرو شَفَعْ",
    "وَكَمْ ثَنَا يَنْشُرُ فىِ يُسَيِّرُ # مَتَاعُ لاَ حَفْصٌ وَقِطْعًا ظُفَرُ",
    "رُمْ دِنْ سُكُونًا بَاءَ تَبْلوُ التَّا شَفَا # لاَ يَهْدِ خِفُّهُمْ وَيَا اكْسِرْ صُرِفَا",
    "وَالْهَاءَ نَلْ ظُلْمًا وَأَسْكِنْ ذَا بَدَا # خُلْفُهُمَا شَفَا خُذِ الإِْخْفَا حَدَا",
    "خُلْفٌ بهِ ذُقْ تَفْرَحُوا غِثْ خَاطَبُوا # وَتَجْمَعُوا ثِبْ كَمْ غَوَى اكْسِرْ يَعْزُبُ",
    "ضَمًا مَعًا رُمْ أَصْغَرَ ارْفَعْ أَكْبَراَ # ظِلٌّ فَتىً صِلْ فَاجْمَعُوا وافْتَحْ غَرَا",
    "خُلْفٌ وَظَنَّ شُرَكَاؤُكُمْ وَخِفْ # تَتَّبِعَانِ النُّونُ مَنْ لَهُ اخْتُلِفْ",
    "يَكُونَ صِفْ خُلْفًا وَأَنَّهُ شَفَا # فَاكْسِرْ وَيَجْعَلُ بِنُونٍ صُرِّفَا",
  ]},
  {id:"tayb-37",title:"سُورَةُ هوُدٍ عليه السلام",sub:"Sourate Hûd",clr:["#0d2b2b","#1a4f4a"],bayts:[
    "إِنِّي لَكُمْ فَتْحًا رَوَى حَقٌّ ثَنَا # عُمِّيَتِ اضْمُمْ شُدَّ صَحْبٌ نَوِّنَا",
    "مِنْ كُلِّ فِيهِمَا عَلاَ مَجْرَى اضْمُمَا # صِفْ كَمْ سَمَا وَيَابُنَيِّ افْتَحْ نَمَا",
    "وَحَيْثُ جَا حَفْصٌ وَفِي لُقْمَانَا # الاُخْرَى هُدَى عِلْمٍ وَسَكِّنْ زَانَا",
    "وَأَوَّلًا دِنْ عَمَلٌ كَعَلِمَا # غَيْرُ انْصِبِ الرَّفعَ ظَهِيرٌ رَسَمَا",
    "تَسْئَلْنِ فَتْحُ النُّونِ دُمْ لِي الخُلْفُ # واشْدُدْ كَمَا حِرْمٍ وَعَمَّ الكَهْفُ",
    "يَوْمَئِذٍ مَعْ سَالَ فَافْتَحْ إِذْ رَفَا # ثِقْ نَمْلِ كُوفٍ مَدَنٍ نَوِّنْ كَفَا",
    "فَزَعِ وَاعْكِسُوا ثَمُودَ هَا هُنَا # وَالعَنْكَبَا الفُرْقَانِ عُجْ ظُبىً فِنَا",
    "وَالنَّجْمِ نَلْ فِي ظَنِّهِ اكْسِرْ نَوِّنِ # رُدْ لِثَمُودَ قَالَ سِلْمٌ سَكِّنِ",
    "وَاكْسِرْهُ وَاقْصَرْ مَعَ ذَرْوٍ فِى رُبَا # يَعْقُوبَ نَصْبُ الرَّفْعِ عَنْ فَوْزٍ كَبَا",
    "وَامْرَأَتُكْ حَبْرٌ أَنِ اسْرِ فَاسْرِ صِلْ # حِرْمٌ وَضَمَّ سَعِدُوا شَفَا عُدِلْ",
    "إِنْ كُلًاّ الخِفُّ دَنَا اتْلُ صُنْ وَشُدْ # لَماَّ كَطَارِقٍ نُهًى كُنْ فِى ثَمَدْ",
    "يَس فِي ذَا كَمْ نَوَى لاَمَ زُلَفْ # ضُمَّ ثَنَا بِقْيَةِ ذُقْ كَسْرٌ وَخَفْ",
  ]},
  {id:"tayb-38",title:"سُورَةُ يُوسُفَ عليه السلام",sub:"Sourate Yûsuf",clr:["#0a2540","#154568"],bayts:[
    "يا أَبَتِ افْتَحْ حَيْثُ جَا كَمْ ثَطَعَا # آيَاتٌ افْرِدْ دِنْ غَيَاباتِ مَعَا",
    "فَاجْمَعْ مَدًا يَرْتَعْ وَيَلْعَبْ نُونُ دَا # حُزْ كَيْفَ يَرْتَعْ كَسْرُ جَزْمٍ دُمْ مَدَا",
    "بُشْرَايَ حَذْفُ الْيَا كَفَى هَيْتَ اكْسِرَا # عَمَّ وَضَمُّ التَّا لَدَى الخُلْفِ دَرَى",
    "وَاهْمِزْ لَنَا وَالمُخْلِصِينَ الْكَسْرُ كَمْ # حَقٌّ وَمُخْلِصًا بِكَافٍ حَقُّ عَمْ",
    "حَاشَا مَعًا صِلْ حُزْ وَسِجْنٌ أوَّلاَ # افْتَحْ ظُبىً وَدأَبًا حَرِّكْ عُلاَ",
    "وَيَعْصِرُو خَاطِبْ شَفَا حَيْثُ يَشَا # نُونٌ دَنَا وَيَاءُ يَرْفَعْ مَنْ يَشَا",
    "ظِلٌّ وَيَا نَكْتَلْ شَفَا فِتْيَانِ فِي # فِتْيَةِ حِفْظًا حَافِظًا صَحْبٌ وَفِي",
    "يُوحَى إِلَيْهِ النَّونُ والْحَاءَ اكْسِرَا # صَحْبٌ وَمَعْ إِلَيْهِمُ الْكُلُّ عَرَا",
    "وَكُذِّبوا الْخِفُّ ثَنَا شَفَا نَوَى # نُنْجِي فَقُلْ نُجِّيَ نَلْ ظِلُّ كَوَى",
  ]},
  {id:"tayb-39",title:"سُورَةُ الرَّعْدِ وَأَخْتَيْهَا [أي: وَإِبْرَاهِيْمَ وَالْحِجْرِ]",sub:"Sourate Ar-Ra'd et ses sœurs",clr:["#0e2e30","#1c5658"],bayts:[
    "زَرْعٌ وَبَعْدَهُ الثَّلاَثُ الخَفْضُ عَنْ # حَقِّ ارْفَعُوا يُسْقَى كَمَا نَصْرٍ ظَعَنْ",
    "يُفَضِّلُ الْيَاءُ شَفَا وَيُوقِدُو # صَحْبٌ وَأَمْ هَلْ يَسْتَوِى شَفَا صُدُوا",
    "يُثْبِتُ خَفِّفْ نَصُّ حَقٍّ وَاضْمُمِ # صَدُّوا وَصَدَّ الطَّوْلِ كُوفِ الْحَضْرَمي",
    "والكَافِرُ الْكُفَّارُ شُدْ كَنْزَ غُذِي # وَعَمَّ رَفْعُ الخَفْضِ فِي اللهِ الَّذِي",
    "وَالاِبْتِدَا غَرْ خَالِقُ امْدُدْ وَاكْسِرِ # وَارْفَعْ كَنُورٍ كُلَّ وَاْلأَرْضَ اَجْرُرِ",
    "شَفَا وَمُصْرِخِيَّ كَسْرُ الْيَا فَخَرْ # يُضِلَّ فَتْحُ الضَّمِ كَالْحَجِّ الزُّمَرْ",
    "حَبْرٌ غِنًا لُقْمَانَ حَبْرٌ وَأَتَى # عَكْسَ رُوَيْسٍ وَاشْبِعَنْ أَفْئِدَتَا",
    "لِي الخُلْفُ وَافْتَحْ لِتَزُولَ ارْفَعْ رُمَا # وَرُبَّمَا الخِفُّ مَدًا نَلْ وَاضْمُمَا",
    "تُنَزَّلُ الكُوفِيْ وَفِي التَّا النُّونُ مَعْ # زَاهَا اكْسِرًا صَحْبًا وَبَعْدُ مَا رَفَعْ",
    "وَخِفُّ سُكِّرَتْ دَنَا وَلاَمَا # عَلَىَّ فَاكْسِرْ نَوِّنِ ارْفَعْ ظَامَا",
    "هَمْزَ ادْخُلُوا انْقُلِ اكْسِرِ الضَّمَ اخْتُلفْ # غَيْثُ تُبَشِّرونِ ثِقْلُ النُّونِ دِفْ",
    "وَكَسْرُهَا اعْلَمْ دُمْ كَيَقْنَطُ اجْمَعَا # رَوَى حِمًا خِفُّ قَدَرْنَا صِفْ مَعَا",
  ]},
  {id:"tayb-40",title:"سُورَةٌ النَّحْلِ",sub:"Sourate An-Nahl",clr:["#0a2030","#134560"],bayts:[
    "يُنْزِلُ مَعْ مَا بَعْدُ مِثْلُ الْقَدْرِ عَنْ # رَوحٍ بِشِقِّ فَتْحُ شِينِهِ ثَمَنْ",
    "يُنْبِتُ نُونٌ صَحَّ يَدْعُونَ ظِبَا # نَلْ وَتُشَاقُّوْنَ اكْسِرِ النُّونَ أَبَا",
    "وَيَتَوَفَّاهْمْ مَعًا فَتىً وَضَمْ # وَفَتْحُ يَهْدِي كَمْ سَمَا تَرَوْا فَعَمْ",
    "رَوَى الخِطَابُ وَاْلأَخِيْرُ كَمْ ظَرُفْ # فَتًى تَرَوْا كَيْفَ شَفَا وَالْخُلْفَ صِفْ",
    "وَيَتَفَيَّؤُا سِوْى البَصْرِي وَرَا # مُفَرِّطُونَ اكْسِرْ مَدًا وَاشْدُدْ ثَرَا",
    "وَنُونَ نُسْقِيكُمْ مَعًا أَنِّثْ ثَنَا # وَضَمَّ صَحْبٌ حَبْرُ يَجْحَدُوا غِنَا",
    "صَبَا الْخِطَابُ ظَعْنِكُمْ حَرِّكْ سَمَا # لَيَجْزِيَنَّ النُّونُ كَمْ خُلْفٌ نَمَا",
    "دُمْ ثِقْ وَضُمَّ فَتَنُوا واكْسِرْ سِوَى # شَامٍ وَضَيْقٍ كَسْرُهَا مَعًا دَوَى",
  ]},
  {id:"tayb-41",title:"سُورَةُ الإسْرَاءِ",sub:"Sourate Al-Isrâ'",clr:["#0a2a2e","#124a4f"],bayts:[
    "يَتَّخِذُوا حَلا يَسُوءَ فَاضْمُمَا # هَمْزًا وَأَشْبِعْ عَنْ سَمَا النُّونُ رَمَى",
    "وَنُخْرِجُ الْيَاءُ ثَوى وَفَتْحُ ضَمْ # وَضَمُّ رَاءٍ ظَنَّ فَتْحُهَا ثَكَمْ",
    "يَلْقَا اضْمُمِ اشْدُدْ كمْ ثَنَا مَدَّ أَمَرْ # ظَهْرٌ وَيَبْلُغَنَّ مَدَّ وَكَسَرْ",
    "شَفَا وَحَيْثُ أُفِّ نَوِّنْ عَنْ مَدَا # وَفَتْحُ فَائِهِ دَنَا ظِلُّ كَدَا",
    "وَفَتْحُ خِطْئًا مَنْ لَهُ الخُلْفُ ثَرَا # حَرِّك لَهُمْ وَالمَكِّ والمَدُِّ دَرَى",
    "يُسْرِفْ شَفَا خَاطِبْ وَقُسْطَاسِ اكْسِرِ # ضَمَّا مَعًا صَحْبٌ وَضُمَّ ذَكِّرِ",
    "سَيِّئَةً وَلاَ تُنَوِّنْ كَمْ كَفَى # لِيَذْكُرُوا اضْمُمْ خَفِّفَنْ مَعًا شَفَا",
    "وَبَعْدَ أَنْ فَتىً وَمَرْيَمٌ نَمَا # إِذْ كَمْ يَقُولُ عَنْ دُعَا الثَّانِي سَمَا",
    "نَلْ كَمْ يُسَبِحُ صَدَا عَمَّ دُعَا # وَفِيهِمَا خُلْفُ رُوَيْسٍ وَقَعَا",
    "وَرَجِْلِكَ اكْسِرْ سَاكِنًا عُدْ نَخْسِفَا # وَبَعْدَهُ اْلأَرْبَعُ نُونٌ حُزْ دَفَا",
    "يُغْرِقَكُمْ مِنْهَا فَأَنِّثْ ثِقْ غِنَا # خَلْفَكَ فِي خِلاَفَكَ اتْلُ صِفْ ثَنَا",
    "حَبْرٌ نَأَى نَاءَ مَعًا مِنْهُ ثُبَا # تَفْجُرَ فِي اْلأُولَى كَتَقْتُلَ ظُبَا",
    "كَفَى وَكِسْفًا حَرِّكَنْ عَمَّ نَفَسْ # وَالشُّعَرَا سَبَا عَلاَ الرُّومِ عَكَسْ",
    "مَنْ لِي بِخُلْفٍ ثِقْ وَقُلْ قَالَ دَنَا # كَمْ وَعَلِمْتُ مَا بِضَمِّ التَّا رَنَا",
  ]},
  {id:"tayb-42",title:"سُورَةُ الْكَهْفِ",sub:"Sourate Al-Kahf",clr:["#0a2438","#123f5c"],bayts:[
    "مِنْ لَدْنِهِ لِلضَّمِّ سَكِّنْ وَأَشِمّْ # وَاكْسِرْ سُكُونَ النُّونِ وَالضَّمِ صُرِمْ",
    "مِرْفَقًا اَفْتَحِ اكْسِرَنْ عَمَّ وَخِفْ # تَزَّاوَرُ الكُوفِي وَتَزْوَرُّ ظُرِفْ",
    "كَمْ وَمُلِئْتَ الثِّقْلُ حِرْمٌ وَرْقِكُمْ # سَاكِنُ كَسْرٍ صِفْ فَتىً شَافٍ حَكُمْ",
    "وَلاَ تُنَوِّنْ مَِائَةٍ شَفَا وَلاَ # يُشْرِكْ خِطَابٌ مَعَ جَزْمٍ كَمَّلاَ",
    "وَثَمَرٌ ضَمَّاهُ بِالْفَتْحِ ثَوَى # نَصْرٍ بِثَمِْرِهِ ثَنَا شادٍ نَوَى",
    "سَكِّنْهُمَا حَلاَ وَمِنْهَا مِنْهُمَا # دِنْ عَمَّ لَكِنَّا فَصِلْ ثُبْ غُصْ كَمَا",
    "يَكُنْ شَفَا وَرَفْعُ خَفْضِ الحَقِّ رُمْ # حُطْ يا نُسَيِّرُ افْتحُوا حَبْرٌ كَرُمْ",
    "وَالنُّونَ أَنِّثْ والْجِبَالَ ارْفَعْ وَثَمْ # أَشْهَدْتُ أَشْهَدْنَا وَكُنْتَ التَّاءَ ضَمْ",
    "سِوَاهُ والنُّونُ يَقُولُ فَرْدَا # مُهْلَكَ مَعْ نَمْلِ افْتَحِ الضَّمَّ نَدَا",
    "واللاَّمَ فَاكْسِرْ عُدْ وَغَيْبَ يُغْرِقَا # وَالضَّمَّ والكَسْرَ افْتَحًا فَتىً رَقَا",
    "وَعَنْهَمُ ارْفَعْ أَهْلَهَا وامْدُدْ وَخِفْ # زَاكِيَةً حَبْرٌ مَدًا غِثْ وَصُرِفْ",
    "لَدْنِي أَشِمَّ أَوْ رُمِ الضَّمَّ وَخِفْ # نُونٍ مَدًا صُنْ تَخِذَ الْخَا اكِْسِرْ وخِفْ",
    "حَقًّا وَمَعْ تَحْريمِ نُونٍ يُبْدِلاَ # خَفِّفْ ظُبًا كَنْزٍ دَنَا النُّورَ دَلاَ",
    "صِفْ ظَنَّ أَتْبَعَ الثَّلاَثَ كَمْ كَفَى # حَامِيَةٍ حَمِئَةٍ وَاهْمِزْ أَفَا",
    "عُدْ حَقُّ وَالرَّفْعَ انْصِبَنْ نَوِّنْ جَزَا # صَحْبُ ظُبَى افْتَحْ ضَمَّ سَدَّيْنِ عَزَا",
    "حَبْرٌ وَسُدًّا حُكْمُ صَحْبٍ دَبَرَا # يَاسِيَنَ صَحْبٌ يَفْقَهُوا ضُمَّ اكْسِرَا",
    "شَفَا وَخَرْجًا قُلْ خَرَاجًا فِيهِمِا # لَهُمْ فَخَرْجُ كَمْ وَصُدْفَيْنَ اضْمُمَا",
    "وسَكِّنَنْ صِفْ وَبِضَمَّيْ كُلِّ حَقْ # آتُونِ هَمْزُ الْوَصْلِ فِيهِمَا صَدَقْ",
    "خُلْفٌ وَثَانٍ فُزْ فَمَا اسْطَاعُوا اشْدُدَا # طَاءً فَشَا وَرُدْ فَتىً أَنْ يَنْفَدَا",
  ]},
  {id:"tayb-43",title:"سُورَةُ مَرْيَمَ عليها السلام",sub:"Sourate Maryam",clr:["#0c2f35","#155a5e"],bayts:[
    "وَاجْزِمْ يَرِثْ حُزْ رُدْ مَعًا بُكِيَّا # بِكَسْرِ ضَمِّهِ رِضًى عُتِيَّا",
    "مَعْهُ صُلِيًّا وَجُثِيًّا عَنْ رِضَى # وَقُلْ خَلَقْنَا فِى خَلَقْتُ رُحْ فَضَا",
    "هَمْزُ أَهَبْ بِالْيَا بِهِ خُلْفٌ جَلاَ # حِمًا وَنِسْيًا فَافْتَحَنْ فَوْزٌ عَلاَ",
    "مِنْ تَحْتِهَا اكْسِرْ جُرَّ صَحْبٌ شُذْ مَدَا # خِفُّ تُسَاقِطْ فِى عُلًا ذَكَرْ صَدَا",
    "خُلْفٌ ظُبىً وَضُمَّ واكْسِرْ عُدْ وَفِي # قَوْلُ انْصِبِ الرَّفْعَ نُهَى ظِلٍّ كُفِي",
    "وَاكْسِرْ وَأَنَّ اللهَ شِمْ كَنْزًا وَشُدْ # نُورِثُ غِثْ مُقَامًا اضْمُمْ هَامَ زِدْ",
    "وُلْدًا مَعَ الزُّخْرُفِ فَاضْمُمْ أَسْكِنَا # رِضًا يَكَادُ فِيهِمَا أَبٌ رَنَا",
    "وَيَنْفَطِرْنَ يَتَفَطَّرْنَ عَلَمْ # حِرْمٌ رَقَا الشُّورَى شَفَا عَنْ دُونِ عَمْ",
  ]},
  {id:"tayb-44",title:"سُورَةُ طَهَ",sub:"Sourate Tâ-Hâ",clr:["#0a1f3a","#153a63"],bayts:[
    "أَنِّي أَنَا افْتَحْ حَبْرُ ثَبْتٍ وَأَنَا # شَدِّدْ وَفِى اخْتَرْتُ قُلِ اخْتَرْنَا فَِنَا",
    "طُوًى مَعًا نَوِّنْهُ كَنْزًا فَتْحُ ضَمْ # اشْدُدْ مَعَ القَطْعِ وَأَشْرِكْهُ يُضَمْ",
    "كَمْ خَافَ خُلْفًا وَلِتُصْنَعْ سَكِّنَا # كَسْرًا وَنَصْبًا ثِقْ مِهَادًا كُوِّنَا",
    "سَمَا كَزُخْرُفٍ بِمَهْدًا وَاجْزِمِ # تُخْلِفْهُ ثِبْ سِوًى بِكَسْرِهِ اضْمُمِ",
    "نَلْ كَمْ فَتىً ظَنَّ وَضُمَّ وَاكْسِرَا # يُسْحِتَ صَحْبٌ غَابَ إِنْ خَفِّفْ دَرَا",
    "عِلْمًا وَهذَيْنِ بِهذَانِ حَلاَ # فَأَجْمِعُوا صِلْ وَافْتَحِ الْمِيمَ حَلاَ",
    "يُخَيَّلُ التَّأْنِيثُ مِنْ شِمْ وَارْفَعِ # جَزْمَ تَلَقَّفْ لابْنِ ذَكْوَانَ وُعِي",
    "وَسَاحِرٌ سِحْرٌ شَفَا أَنْجَيْتُكُمْ # وَاعْدَتُكُمْ لَهُمْ كَذَا رَزَقْتُكُمْ",
    "وَلاَ تَخَفْ جَزْمًا فَشَا وَإِثْرِي # فَاكْسِرْ وَسَكِّنْ غِثْ وَضَمُّ كَسْرِ",
    "يَحِلَّ مَعْ يَحْلُلْ رَنَا ِبمُلْكِنَا # ضَمٌّ شَفَا وَافْتَحْ إِلَى نَصِّ ثَنَا",
    "وَضُمَّ وَاكْسِرْ ثِقْلَ حُمِّلْنَا عَفَا # كَمْ غَنَّ حِرْمٌ تَبْصُرُوا خَاطِبْ شَفَا",
    "تُخْلِفَهُ اكْسِرْ لاَمَ حَقٍّ نُحْرِقَنْ # خَفِّفْ ثَنَا وَافْتَحْ لِضَمٍّ وَاضْمُمَنْ",
    "كَسْرًا خَلاَ نَنْفُخُ بِالْياَ وَاضْمُمِ # وَفَتْحُ ضَمٍّ لاَ أَبُو عَمْرِهِمِ",
    "يَخَافُ فَاجْزِمْ دُمْ وَيُقْضَى يَقْضِيَا # مَعْ نُونِهِ انْصِبْ رَفْعَ وَحْىٍ ظَمِيَا",
    "إِنَّكَ لاَ بِالْكَسْرِ آهِلٌ صَبَا # تَرْضَى بِضَمِّ التَّاءِ صَدْرٌ رَحَبَا",
    "زَهْرَةَ حَرِّكْ ظَاهِرًا يَأْتِهِمُ # صُحْبَةُ كَهْفٍ خَوْفَ خُلْفٍ دَهِمُوا",
  ]},
  {id:"tayb-45",title:"سُورَةُ الأَنْبِيَاءِ عليهم السلام",sub:"Sourate Al-Anbiyâ'",clr:["#0d2b2b","#1a4f4a"],bayts:[
    "قُلْ قَالَ عَنْ شَفَا وَآخْرُهَا عَظُمْ # وَأَوَلَمْ أَلَمْ دَنَا يَسْمَعُ ضُمْ",
    "خِطَابُهُ وَاكْسِرْ وَلِلضَّمِّ انْصِبَا # رَفْعًا كَسَا وَالْعَكْسُ فِي النَّمْلِ دَبَا",
    "كَالرُّومِ مِثْقَالَ كَلُقْماَنَ ارْفَعِ # مَدًا جُذَاذًا كَسْرُ ضَمِّهِ رُعِي",
    "يُحْصِنَ نُونٌ صِفْ غِنًا أَنِّثْ عَلَنْ # كُفْؤَ ثَنَا نَقْدِرَ بِالْيَا وَاضْمُمَنْ",
    "وَافْتَحْ ظُبًى نُنْجِي احْذِفِ اشْدُدْ لِي مَضَى # صُنْ حُرِّمَ اكْسِرْ سَكِّنِ اقْصُرْ صِف ْرِضَى",
    "نَطْوِي فَجهِّلْ أَنِّثِ النُّونَ السَّمَا # فَارْفَعْ ثَنَا وَرَبِّ لِلْكَسْرِ اضْمُمَا",
    "عَنْهُ (أبوجعفر) وَلِلْكِتَابِ صَحْبٌ جَمَعَا # وَخُلْفُ غَيْبِ تَصِفُونَ مَنْ وَعَا",
  ]},
  {id:"tayb-46",title:"سُورَةُ الحَجِّ وَالمؤْمِنُونَ",sub:"Sourates Al-Hajj et Al-Mu'minûn",clr:["#0a2540","#154568"],bayts:[
    "سَكْرَى مَعًا شَفَا رَبَتْ قُلْ رَبَأَتْ # ثَرى مَعًا لاَمَ لِيَقْطَعْ حُرِّكَتْ",
    "بِالكَسْرِ جُدْ حُزْ كَمْ غِنًا لِيَقْضُوا # لَهُمْ وَقُنْبُلٌ لِيُوفُوا مَحْضُ",
    "وَعَنْهُ (ابن ذكوان) وَلْيَطَّوَّفُوا انْصِبْ لُؤْلُؤَا # نَلْ إِذَ ثَوىَ وَفَاطِرًا مَدًا نَأَى",
    "سَوَاءً انْصِبْ رَفْعَ عِلْمِ الجَاثِيَهْ # صَحْبٌ لِيُوفُوا حَرِّكِ اشْدُدْ صَافِيَهْ",
    "كَتَخْطَفُ اتْلُ ثِقْ كِلاَ يَنَالُ ظَنْ # أَنِّثْ وَسِيْنَيْ مَنْسَكًا شَفَا اكْسِرَنْ",
    "يَدْفَعُ فِي يُدَافِعُ الْبَصْرِي وَمَكْ # وَأُذِنَ الضَّمُّ حِمًا مَدًا نَسَكْ",
    "مَعْ خُلْفِ إِدْرِيسَ يُقَاتِلُونَ عَفْ # عَمَّ افْتَحِ التَّا هُدِّمَتْ لِلْحِرْمِ خَفْ",
    "أَهْلَكْتُهَا الْبَصْرِىُّ وَاقْصُرْ ثُمَّ شُدْ # مُعَاجِزِينَ الْكُلَّ حَبْرٌ وَيَعُدْ",
    "دَانٍ شَفَا يَدْعُوا كَلُقْمَانَ حِمَا # صَحْبٌ وَالاُخْرَى ظَنَّ عَنْكَبَا نَمَا",
    "حِمًا أَمَانَاتٍ مَعًا وَحِّدْ دَعَمْ # صَلاَتِهِمْ شَفَا وَعَظْمُ العَظْمِ كَمْ",
    "صِفْ تَنْبُتُ اضْمُمْ وَاكْسِرِ الضَّمَّ غِنَا # حَبْرٍ وَسِينَاءَ اكْسِرُوا حِرْمٌ حَنَا",
    "مُنْزَلًا افْتَحْ ضَمَّهُ واكْسِرْ صَبَنْ # هَيْهَاتَ كَسْرُ التَّا مَعًا ثُبْ نَوِّنَنْ",
    "تَتْرَا ثَنَا حَبْرٍ وَأَنَّ اكْسِرْ كَفَى # خَفِفَ كَرَا وَتَهْجُرُونَ اضْمُمْ أفَا",
    "مَعْ كَسْرِ ضَمٍّ وَاْلأَخِيَريْنِ مَعَا # اللهُ فِي للهِ وَالْخَفْضَ ارفَعَا",
    "بَصْرٍ كَذَا عَالِمُ صُحْبَهٌ مَدَا # وابْتَدِ غَوْثَ الخُلْفِ وَافْتَحْ وامْدُدَا",
    "مُحَرِّكًا شِقْوَتُنَا شَفَا وَضُمْ # كَسْرَكَ سُخْرِيًّا كَصَادِ ثَابَ أُمْ",
    "شَفَا وَكَسْرَ أَنَّهُمْ وَقَالَ إِنْ # قُلْ فِي رَقَا قُلْ كَمْ هُمَا وَالْمَكِّ دِنْ",
  ]},
  {id:"tayb-47",title:"سُورَةُ النُّورِ وَالفُرقَانِ",sub:"Sourates An-Nûr et Al-Furqân",clr:["#0e2e30","#1c5658"],bayts:[
    "ثَقِّلْ فَرَضْنَا حَبْرُ رَأْفَةٌ هُدَى # خُلْفٌ زكَا حَرِّكْ وَحَرِّكْ وَامْدُدَا",
    "خُلْفُ الحَدِيدِ زِنْ وَأُوْلَى أَرْبَعُ # صَحْبٌ وَخَامِسَةُ الاُخْرَى فَارْفَعُوا",
    "لاَ حَفْصُ أَنْ خَفِّفْ مَعًا لَعْنَةُ ظَنْ # إِذْ غَضَبُ الحَضْرَمِ وَالضَّادَ اكْسِرَنْ",
    "وَاللهِ رَفْعُ الخَفْضِ أَصْلُ كِبْرُ ضَمْ # كَسْرًا ظُبًا وَيَتَأَلَّ خَافَ ذُمْ",
    "يَشْهَدُ رُدْ فَتىً وَغَيْرِ انْصِبْ صَبَا # كَمْ ثَابَ دُرِّيُّ اكْسِرِ الضَّمَّ رُبَا",
    "حُزْ وَامْدُدِ اهْمِزْ صِفْ رِضىً حُطْ وافْتَحُوا # لِشُعْبَةٍ وَالشَّامِ بَا يُسَبِّحُ",
    "يُوقَدُ أَنِّثْ صُحْبَةً تفَعَّلاَ # حَقٌّ ثَنَا سَحَابُ لاَ نُونٌ هَلاَ",
    "وَخَفْضُ رَفْعٍ بَعْدُ دُمْ يَذْهَبُ ضُمْ # وَاكْسِرْ ثَنَا كَذَا كَماَ اسْتُخْلِفَ صُمْ",
    "ثَانِي ثَلاَثٍ كَمْ سَمَا عُدْ يَأْكُلُ # نُونٌ شَفَا يَقُولُ كَمْ وَيَجْعَلُ",
    "فَاجْزِمْ حِمَا صَحْبٍ مَدا يَا نَحْشُرُ # دِنْ عَنْ ثَوَى نَتَّخِذَ اضْمُمَنْ ثُرُوا",
    "وَافْتَحْ وَزِنْ خُلْفَ يَقُولُون وَعَفُوا # مَا يَسْتَطِيعُوا خَاطِبَنْ وَخَفَّفُوا",
    "شِينَ تَشَقَّقُ كَقَافٍ حُزْ كَفَا # نُزِّلَ زِدْهُ النُّونَ وَارْفَعْ خَفِّفَا",
    "وَبَعْدُ نَصْبُ الرَّفْعِ دِنْ وَسُرُجَا # فَاجْمَعْ شَفَا يَأْمُرُنَا فَوْزًا رَجَا",
    "وَعَمَّ ضَمَّ يَقْتِرُوا وَالْكَسْرَ ضَمْ # كُوفٍ وَيَخْلُدْ وَيُضَاعَفْ مَا جَزَمْ",
    "كَمْ صِفْ وَذُرِّيَّتِنَا حُطْ صُحْبَةَ # يَلْقَواْ يُلَقَّوْا ضُمَّ كَمْ سَمَا عَتَا",
  ]},
  {id:"tayb-48",title:"سُورَةُ الشُّعَرَاءِ وَأُخْتَيْهَا",sub:"Sourate Ash-Shu'arâ' et ses sœurs",clr:["#0a2030","#134560"],bayts:[
    "يَضِيقُ يَنْطَلِقُ نَصْبُ الرَّفْعِ ظَن # وَحذِرُونَ امْدُدْ كَفَى لِي الخُلْفُ مِنْ",
    "وَفَارِهِينَ كَنْزُ وَاتَّبَعَكَا # أَتْبَاعُ ظَعْنُ خَلْقُ فَاضْمُمْ حَرِّكَا",
    "بِالضَّمِّ نَلْ إِذْ كَمْ فَتىً وَاْلأَيْكَةِ # لَيْكَةَ كَمْ حِرْمٍ كَصَادٍ وَقِّتِ",
    "نَزَّلَ خَفِّفْ وَاْلأَمِينُ الرُّوحُ عَنْ # حِرْمٍ حَلاَ أَنِّثْ يَكُنْ بَعْدُ ارْفَعَنْ",
    "كَمْ وَتَوَكَّلْ عَمَّ فَا نَوِّنْ كَفَا # ظِلُّ شِهَابٍ يَأْتِيَنَّنِي دَفَا",
    "سَبَأَ مَعًا لاَ نُونَ وَافْتَحْ هَلْ حَكَمْ # سَكِّنْ زَكَا مَكُثْ نُهىً شُدْ فَتْحُ ضَمْ",
    "أَلاَّ أَلاَ وَمُبْتَلًى قِفْ يَا أَلاَ # وَابْدَأْ بِضَمٍّ اسْجُدُوا رُحْ ثُبْ غَلاَ",
    "يُخْفُونَ يُعْلِنُونَ خَاطِبْ عَنْ رَقَا # وَالسُّوقِ سَاقَيْها وَسُوقِ اهْمِزْ زَقَا",
    "سُؤُقِ عَنْهُ ضُمَّ تَانُبَيِّتَنْ # لاَمَ نَقُولَنَّ وَنُونَيْ خَاطِبَنْ",
    "شَفَا وَيُشْرِكُوا حِمًا نَلْ فَتْحُ أَنْ # نَ النَّاسَ أَنَّا مَكْرِهِمْ كَفَى ظَعَنْ",
    "يَذَّكَّرُوا لَمْ حُزْ شَذَا ادَّارَكَ فِي # أَدْرَكَ أَيْنَ كَنْزُ تَهْدِي الْعُمْيَ فِي",
    "مَعًا بِهَادِي العُمْيِ نَصْبٌ فَلَتَا # آتُوهُ فَاقْصُرْ وَافْتَحِ الضَّمَّ فَتَا",
    "عُدْ يَفْعَلُوا حَقًّا وَخُلْفٌ صُرِفَا # كَمْ نُرِيَ الْيَا مَعَ فَتْحَيْهِ شَفَا",
    "وَرَفْعُهُمُ بَعْدُ الثَّلاَثَ وَحَزَنْ # ضُمَّ وَسَكِّنْ عَنْهُمُ يَصْدُرَ حَنْ",
    "ثِبْ كِدْ بِفَتْحِ الضَّمِّ وَالكَسْرُ يُضَمْ # وَجَذْوَةٍ ضُمَّ فَتىً وَالفَتْحَ نَمْ",
    "وَالرَّهْبِ ضُمَّ صُحْبَةٌ كَمْ سَكَّنَا # كَنْزٌ يُصَدِّقْ رَفْعُ جَزْمٍ نَلْ فَنَا",
    "وَقَالَ مُوسَى الوَاوَ دَعْ دُمْ سَاحِرًا # سِحْرَانِ كُوفٍ يَعْقِلُوا طِبْ يَاسِرا",
    "خُلْفٌ وَيُجْبَى أَنَّثُوا مَدًا غَبَا # وَخُسِفَ الْمَجْهُولُ سَمِّ عَنْ ظَبَا",
  ]},
  {id:"tayb-49",title:"سُوَرةُ العَنْكَبُوتِ وَالرُّومِ",sub:"Sourates Al-'Ankabût et Ar-Rûm",clr:["#0a2a2e","#124a4f"],bayts:[
    "وَالنَّشْأَةَ امْدُدْ حَيْثُ جَا حِفْظٌ دَنَا # مَوَدَّةً رَفْعٌ غِنًا حَبْرٌ رَنَا",
    "وَنَوِّنِ انْصِبْ بَيْنَكُمْ عَمَّ صَفَا # آيَاتٌ التَّوْحِيدُ صُحْبَةٌ دَفَا",
    "نَقُولُ بَعْدُ الْيَا كَفَى اتْلُ يُرْجَعُوا # صَدْرٌ وَتَحْتُ صَفْوُ حُلْوٍ شَرَعُوا",
    "لَنُثْوِيَنَّ الْبَاءَ ثَلِّثْ مُبْدِلاَ # شَفَا وَسَكِّنْ كَسْرَ وَلْ شَفَا بَلاَ",
    "دُمْ ثَانِ عَاقِبَةُ رَفْعُهَا سَمَا # لِلْعَالَمِينَ اكْسِرْ عِدًا تُرْبُوا ظَمَا",
    "مَدًا خِطَابٌ ضُمَّ أَسْكِنْ وَشَهُمْ # زَيْنُ خِلاَفِ النُّونِ مِنْ نُذِيقَهُمْ",
    "آثَارِ فَاجْمَعْ كَهْفُ صَحْبٍ يَنْفَعُ # كَفَى وَفِي الطَّوْلِ فَكُوفٍ نَافِعُ",
  ]},
  {id:"tayb-50",title:"وَمِنْ سُورَةِ لُقْمَانَ عليه السلام إِلَى سُوَرَةِ يَس",sub:"De sourate Luqmân à sourate Yâ-Sîn",clr:["#0a2438","#123f5c"],bayts:[
    "وَرَحْمَةٌ فَوْزٌ وَرَفْعُ يَتَّخِذْ # فَانْصِبْ ظُبىً صَحْبٍ تُصَاعِرْ حَلَّ إِذْ",
    "شَفَا فَخَفِّفْ مُدَّ نِعْمَةً نِعَمْ # عُدْ حُزْ مَدًا وَالبَحْرُ لاَ الْبَصْرِي وَسَمْ",
    "أُخْفِيَ سَكِّنْ فِي ظُبىً وَإِذْ كَفَى # خَلَقَهُ حَرِّكْ لِمَا اكْسِرْ خَفِّفَا",
    "غَيْثُ رِضىً وَيَعْمَلُو مَعًا حَوَى # تَظَّاهَروُنَ الضَّمَّ وَالكَسْرَ نَوَى",
    "وَخَفِّفِ الْهَا كَنْزُ وَالظَّاءَ كَفَى # وَاقْصُرْ سَمَا وَفِي الظُّنُونَا وَقَفَا",
    "مَعَ الرَّسُولاَ وَالسَّبِيلاَ بِالأَلِفْ # دِنْ عَنْ رَوى وَحَالَتَيْهِ عَمَّ صِفْ",
    "مَقَامَ ضُمَّ عُدْ دُخَانُ الثَّانِ عَمْ # وَقَصْرُ آتَوْهَا مَدًا مِنْ خُلْفِ دُمْ",
    "وَيَسْأَلُونَ اشْدُدْ وَمُدَّ غِثْ وَضُمْ # كَسْرًا لَدَى أُسْوَةُ فِي الْكُلِّ نَعَمْ",
    "ثَقِّلْ يُضَاعِفْ كَمْ ثَنَا حَقٌّ وَيَا # وَالْعَيْنَ فَافْتَحْ بَعْدُ رَفْعُ احْفَظْ حَيَا",
    "ثَوَى كَفَى يَعْمَلْ وَيُؤْتِ الْياَ شَفَا # وَفَتْحُ قَرْنَ نَلْ مَدًا وَلِيْ كَفَا",
    "يَكُونَ خَاتَمَ افْتَحُوُه نَصَّعَا # يَحِلُّ لاَ بَصْرٍ وسَادَاتِ اجْمَعَا",
    "بِالكَسْرِ كَمْ ظَنَّ كَثِيرًا ثَاهُ بَا # لِي الخُلْفُ نَلْ عَالِمِ عَلاَّمِ رُبَا",
    "فُزْ وَارْفَعِ الخَفْضَ غِنًا عَمَّ كَذَا # أَلِيمٌ الْحَرفَانِ شِمْ دِنْ عَنْ غَذَا",
    "وَيَا نَشَأْ نَخْسِفْ بِهِمْ نُسْقِطْ شَفَا # وَالرِّيحُ صِفْ مِنْسَأَتَهُ أَبْدِلْ حَفَا",
    "مَدًا سُكُونُ الْهَمْزِ لِي الخُلْفُ مُلاَ # تُبُيِّنَتْ مَعْ إِنْ تُوُلِّيْتُمْ غَلاَ",
    "ضَمَّانِ مَعْ كَسْرٍ مَسَاكِنْ وَحِّدَا # صَحْبٌ وَفَتْحُ الكَافِ عَالِمٌ فِدَا",
    "أُكْلِ أَضِفْ حِمًا نُجَازِيْ اليَا افْتَحَنْ # زَايًا كَفُورَ رَفْعُ حَبْرٍ عَمَّ صُنْ",
    "وَرَبَّنَا ارْفَعْ ظُلْمَنَا وَبَاعَدَا # فَافْتَحْ وَحَرِّكْ عَنْهُ وَاقْصُرْ شَدِّدَا",
    "حَبْرٌ لِوًى وَصَدَّقَ الثِقْلُ كَفَا # وَسَمِّ فُزِّعَ كَمَالٌ ظَرُفَا",
    "وَأَذِنَ اضْمُمْ حُزْ شَفَا نَوِّنْ جَزَا # لاَ تَرْفَعِ الضِّعْفِ ارْفَعِ الخَفْضَ غَزَا",
    "وَالغُرْفَةَ التَّوحِيدَ فِدْ وبَيَّنَتْ # حَبْرٌ فَتىً عُدْ وَالتَّنَاوُشْ هُمِزَتْ",
    "حُزْ صُحْبَةٌ غَيْرَ اخْفِضِ الرَّفْعَ ثُبَا # شَفَا وَتَذْهَبْ ضُمَّ وَاكْسِرْ ثَغَبَا",
    "نَفْسُكَ غَيْرُهُ وَيَنْقُصُ افْتَحَا # ضَمًّا وَضُمَّ غَوْثُ خُلْفٍ شَرَحَا",
    "نَجْزِي بِيَا جَهِّلَ وَكُلَّ ارْفَعْ حَدَا # وَالسَّيئَّ المَخْفُوضِ سَكِنْهُ فِدَا",
  ]},
  {id:"tayb-51",title:"سُورَةُ يَس",sub:"Sourate Yâ-Sîn",clr:["#0c2f35","#155a5e"],bayts:[
    "تَنْزِيلُ صُنْ سَمَا عَزَزْنَا الْخِفُّ صِفْ # وَافْتَحْ أَئِنْ ثِقْ وَذُكِرْتُمْ عَنْهُ خِفْ",
    "أُولَى وأُخْرَى صَيْحَةٌ وَاحِدَةُ # ثُبْ عَمِلَتْهُ يَحْذِفُ الْهَا صُحْبَةُ",
    "والقَمَرَ ارْفَعْ إِذْ شَذَا حَبْرٌ وَيَا # يَخَصِّمُوا اكْسِرْ خُلْفَ صَافِي الْخَا لِيَا",
    "خُلْفٌ رَوَى نَلْ مِنْ ظُبىً وَاخْتَلَسَا # بِالْخُلْفِ حُطْ بَدْرًا وَسَكِنْ بَخَسَا",
    "بِالْخُلْفِ فِى ثَبْتٍ وَخَفَّفُوا فِنَا # وَفَاكِهُونَ فَاكِهِينُ اقْصُرْ ثَنَا",
    "تَطْفِيفُ كَوْنُ الْخُلْفِ عَنْ ثَرًا ظُلَلْ # لِلْكَسْرِ ضُمَّ وَاقْصُرُوا شَفَا جُبُلْ",
    "فِى كَسْرِ ضَمَّيْهِ مَدًا نَلْ وَاشْدُدَا # لَهُمْ وَرَوْحٍ ضَمُّهُ اسْكِنْ كَمْ حَدَا",
    "نَنْكُسْهُ ضُمَّ حَرِّكِ اشْدُدْ كَسْرَ ضَمْ # نَلْ فُزْ لِيُنْذِرَ الخِطَابُ ظَلَّ عَمْ",
    "وَحَرْفَ الاَحْقَافِ لَهُمْ والْخُلْفُ هَلْ # بِقَادِرٍ يَقْدِرُ غُصْ الاحْقَافِ ظَلْ",
  ]},
  {id:"tayb-52",title:"سُورَةُ الصَّافَاتِ",sub:"Sourate As-Sâffât",clr:["#0a1f3a","#153a63"],bayts:[
    "بِزيِنَةٍ نَوِّنْ فِدًا نَلْ بَعْدُ صِفْ # فَانْصِبْ وَثِقْلَيْ يَسْمَعُوا شَفَا عُرِفْ",
    "عَجِبْتَ ضُمَّ التَّا شَفَا اسْكِنْ أَوَ عَمْ # لاَ أَزْرَقٌ مَعًا يَرِفُّوا فُزْ بِضَمْ",
    "زَا يَنْزِفُونَ اكْسِرْ شَفَا الاُخْرَى كَفَا # مَاذَا تَرَى بِالضَّمِّ والكَسْرِ شَفَا",
    "إلْيَاسَ وَصْلُ الهَمْزِ خُلْفُ لَفْظِ مَنْ # أَللهُ رْبُّ رَبُّ غَيْرُ صَحْبِ ظَنْ",
    "وَآلِ يَاسِينَ بِإِلْيَاسِينَ كَمْ # أَتَى ظُبىً وَصْلُ اصْطَفَى جُدْ خُلْفَ ثَمْ",
  ]},
  {id:"tayb-53",title:"وَمِنْ سُورَةِ (ص) إِلَى سُورَةِ الأَحْقَافِ",sub:"De sourate Sâd à sourate Al-Ahqâf",clr:["#0d2b2b","#1a4f4a"],bayts:[
    "فَوَاقٍ الضَّمُّ شَفَا خَاطِبْ وَخِفْ # يَدَّبَّرُوا ثِقْ عَبْدَنَا وَحِّدْ دَنِفْ",
    "وَقَبْلُ ضَمَّا نَصْبُ ثُبْ ضُمَّ اسْكِنَا # لاَ الْحَضْرَمِيْ خالِصَةٌ أَضِفْ لَنَا",
    "خُلْفٌ مَدَا وَيُوعَدُونَ حُزْ دَعَا # وَقَافَ دِنْ غَسَّاقٌ الثِقْلُ مَعَا",
    "صَحْبٌ وَآخَرُ اضْمُمِ اقْصُرْهُ حِمَا # قَطْعُ اتَّخَذْنَا عَمَّ نَلْ دُمْ أَنَّمَا",
    "فَاكْسِرْ ثَنَا فَالْحَقُّ نَلْ فَتىً أَمَنْ # خَفَّ اتْلُ فُزْ دُمْ سَالِمًا مُدَّ اكْسِرَنْ",
    "حَقًّا وَعَبْدَهُ اجْمَعُوا شَفَا ثَنَا # وَكَاشِفَاتٌ مُمْسِكَاتٌ نَوِّنَا",
    "وَبَعْدُ فِيْهِمَا انْصِبَنْ حِمًا قَضَى # قُضِيَ وَالْمْوتُ ارْفَعُوا رَوَى فَضَا",
    "يا حَسْرَتَايَ زِدْ ثَنَا سَكِّنْ خَفَا # خُلْفِ مَفَازَاتِ اجْمَعُوا صَبْرًا شَفَا",
    "زِدْ تَأْمُرُونِي النُّونَ مِنْ خُلْفٍ لِبَا # وَعَمَّ خِفُّهُ وَفِيهَا والنَّبَا",
    "فُتِّحَتِ الْخِفُّ كَفَا وَخَاطِبِ # يَدْعُونَ مِنْ خُلْفٍ إِلَيْهِ لَاَزِبِ",
    "وَمِنْهُمُ مِنْكُمْ كَمَا أَوْ أَنْ وَأَنْ # كُنْ حَوْلَ حِرْمٍ يَظْهَرَ اضْمُمْ وَاكْسِرَنْ",
    "وَالرَّفْعَ فِي الْفَسَادَ فَانْصِبْ عَنْ مَدَا # حمًِا وَنَوِّنْ قَلْبِ كَمْ خُلْفٍ حَدَا",
    "أَطَّلِعَ ارْفَعْ غَيْرَ حَفْصٍ أَدْخِلوُا # صِلْ واضْمُمِ الكَسْرَ كَمَا حَبْرٍ صِلُوا",
    "مَا يَتَذَكَّرُونَ كَافِيْهِ سَمَا # سَوَاءً ارْفَعْ ثِقْ وَخَفْضَهُ ظَمَا",
    "نَحْسَاتٍ اَسْكِنْ كَسْرَهُ حَقًّا أَبَا # وَيُحْشَرُ النُّوْنُ وَسَمِّ اتْلُ ظُبَا",
    "أَعْدَاءُ عَنْ غَيْرِهِمَا اجْمَعْ ثَمَرَتْ # عَمَّ عُلًا وَحَاءَ يُوحَى فُتِحَتْ",
    "دُمًا وخَاطِبْ يَفْعَلوُ صَحْبٌ غَمَا # خُلْفٌ بِمَا فِي فَبِمَا مَعْ يَعْلَمَا",
    "بِالرَّفْعِ عَمَّ وَكَبَائِرَ مَعَا # كَبِيرَ رُمْ فَتىً وَيُرْسِلَ ارْفَعَا",
    "يُوحِي فَسَكِّنْ مَازَ خُلْفًا أَنْصِفَا # أَنْ كُنْتُمُ بِكَسْرَةٍ مَدًا شَفَا",
    "وَيَنْشَأُ الضَّمُّ وَثِقْلٌ عَنْ شَفَا # عِبَادِ فىِ عِنْدَ بِرَفْعٍ حُزْ كَفَا",
    "أَشَهِدُوا اقْرَأْهُءَأُشْهِدُوا مَدَا # قُلْ قَالَ كَمْ عِلْمٍ وَجِئْنَا ثَمَدًا",
    "بِجِئْتُكُمْ وَسُقُفًا وَحِّدْ ثَبَا # حَبْرٍ وَلَمَّا اشْدُدْ لَدَا خُلْفٍ نَبَا",
    "فِى ذَا نُقَيِّضْ يَا صَدًا خُلْفٍ ظَهَرْ # وَجَاءَنَا امْدُدْ هَمْزَهُ صِفْ عَمَّ دَرْ",
    "أَسْوِرَةٌ سَكِّنْهُ وَاقْصُرْ عَنْ ظُلَمْ # وَسُلُفًا ضَمًّا رِضىً يَصُدُّ ضَمْ",
    "كَسْرًا رَوَى عَمَّ وَتَشْتَهِيْهِ هَا # زِدْ عَمَّ عِلْمٍ وَيُلاَقُوا كُلُّهَا",
    "يَلْقَوْا ثَنَا وَقِيْلِهِ اخْفِضْ فِى نَمُوا # وَيُرْجَعُوا دُمْ غِثْ شَفَا وَيَعْلَمُوا",
    "حَقٌّ كَفَا رَبُّ السَّمَوَاتِ خَفَضْ # رَفْعًا كَفَى يَغْلِي دَنَا عِنْدَ غَرَضْ",
    "وَضُمَّ كَسْرَ فَاعْتِلُوا إِذْ كَمْ دَعَا # ظَهْرًا وَإِنَّكَ افْتَحُوا رُمْ وَمَعَا",
    "آيَاتٌ اكْسِرْ ضَمَّ تَاءٍ فِى ظُبَا # رُضْ يُؤْمِنُونَ عَنْ شَذَا حِرْمٍ حَبَا",
    "لِنَجْزِيَ الْيَا نَلْ سَمَا ضُمَّ افْتَحَا # ثِقْ غَشْوَةَ افْتَحِ اقْصُرَنْ فَتىً رَحَا",
    "وَنَصْبُ رَفْعِ ثَانِ كُلَّ أُمَةٍ # ظِلٌّ وَوَالسَّاعَةُ غَيْرُ حَمْزَةِ",
  ]},
  {id:"tayb-54",title:"سُورَةُ الأَحْقَافِ وَأُخْتَيْهَا",sub:"Sourate Al-Ahqâf et ses sœurs",clr:["#0a2540","#154568"],bayts:[
    "وَحُسْنًا احْسَانًا كَفَا وَفَصْلُ فِي # فِصَالُ ظَبْىٌ نَتَقَبَّلُ يَا صَفِي",
    "كَهْفٌ سَمَا مَعْ نَتَجَاوَزْ وَاضْمُمَا # أَحْسَنُ رَفْعُهُمْ وَنَلْ حَقٌّ لَمَا",
    "خُلْفٌ نُوَفِّيَهُمُ الْيَا وَتَرَى # لِلْغَيْبِ ضُمَّ بَعْدَهُ ارْفَعْ ظَهَرَا",
    "نَصٌّ فَتىً وَقَاتَلُوا ضُمَّ اكْسِرِ # وَاقْصُرْ عُلاَ حِمًا وَآسِنِ اقْصُرِ",
    "دُمْ آنِفًا خُلْفٌ هُدًا والْحَضْرَمِي # تُقَطِّعُوا كَتَفْعَلُوا أَمْلَى اضْمُمِ",
    "وَاكْسِرْ حِمًا وَحَرِّكِ اليَاءَ حُلاَ # أَسْرَارَ فَاكْسِرْ صَحْبُ يَعْلَمْ وَكِلاَ",
    "نَبْلُو بِيَا صِفْ سَكِّنِ الثَّانِي غَلاَ # لِيُؤْمِنُوا مَعَ الثَّلاَثِ دُمْ حَلاَ",
    "نُؤْتِيْهِ يَا غِثْ حُزْ كَفَا ضَرًّا فَضُمْ # شَفَا اقْصُرِ اكْسِرْ كَلِمَ اللهُ لَهُمْ",
    "مَا يَعْمَلوُا حُطْ شَطْأَهُ حَرِّكْ دَلا # مِزْ آزَرَ اقْصُرِ مَاجِدًا وَالْخُلْفُ لَاَ",
  ]},
  {id:"tayb-55",title:"وَمِنْ سُورَةِ الحُجُرَاتِ إِلَى سُوْرَةِ الرَّحْمَنِ عز وجل",sub:"De sourate Al-Hujurât à sourate Ar-Rahmân",clr:["#0e2e30","#1c5658"],bayts:[
    "تَقَدَّمُوا ضُمُّوا اكْسِرُوا لاَ الحَضْرمِي # إِخْوَتِكُمْ جَمْعُ مُثَنَّاهُ ظَمِي",
    "وَالحُجُرَاتِ فَتْحُ ضَمِّ الجِيمِ ثَرْ # يَأْلِتْكُمُ البَصْرِي وَيَعْلَمُونَ دَرْ",
    "نَقُولُ يَا إِذْ صَحَّ أَدْبَارَ كَسَرْ # حِرْمٌ فَتىً مِثْلُ ارْفَعُوا شَفَا صَدَرْ",
    "صَاعِقَةُ الصَّعْقَةُ رُمْ قَوْمُ اخْفِضَنْ # حَسْبُ فَتىً رَاضٍ وَأَتْبَعْنَا حَسَنْ",
    "بِاْتَّبَعَتْ ذُرِّيَّةُ امْدُدْ كَمْ حِمَا # وَكَسْرُ رَفْعِ التَّا حَلاَ وَاكْسِرْ دُمَا",
    "لاَمَ أَلِتْنَا حَذْفُ هَمْزٍ خُلْفُ زُمْ # وَإِنَّهُ افْتَحْ رُمْ مَدًا يَصْعَقُ ضُمْ",
    "كَمْ نَالَ كَذَّبَ الثَّقِيلُ لِي ثَنَا # تَمْرُوا تُمَارُوا حَبْرُ عَمَّ نَصُّنَا",
    "تَا اْللاَّتَ شَدِّدْ غَرْ مَنَاةَ الْهَمْزَ زِدْ # دِلْ مُسْتَقِرٌّ خَفْضُ رَفْعِهِ ثَمِدْ",
    "وَخَاشِعًا فِى خُشَّعًا شَفَا حِمَا # سَيَعْلَمُونَ خَاطَبُوا فَصْلًا كَمَا",
  ]},
  {id:"tayb-56",title:"سُورَةُ الرَّحْمَنِ عز وجل",sub:"Sourate Ar-Rahmân",clr:["#0a2030","#134560"],bayts:[
    "وَالحَبُّ ذُو الرَّيْحَانِ نَصْبُ الرَّفْعِ كَمْ # وَخَفْضُ نُونِهَا شَفَا يَخْرُجُ ضَمْ",
